<script>
/* Foundations · Caching & Eviction (FND-CACHE) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-CACHE","front":"Cache layers ordered by latency (CPU → CDN)","back":"From fastest/smallest to slowest/largest: <code>CPU caches</code> (L1/L2/L3, ~1–40ns) → <strong>in-process cache</strong> (heap, ~100ns, no network) → <strong>distributed cache</strong> like Redis/Memcached (~0.1–1ms, network hop, shared across nodes) → <strong>CDN edge</strong> (~10–50ms, geographically close to the user). Each layer trades capacity and sharing for latency."},
  {"sec":"FND-CACHE","front":"Define hit ratio and why a small drop is catastrophic","back":"<code>hit_ratio = hits / (hits + misses)</code>. Average latency is <code>h·t_hit + (1−h)·t_miss</code>; because <code>t_miss</code> (DB/origin) can be 100–1000× <code>t_hit</code>, going from 99% to 95% hits <em>quintuples</em> the miss traffic to the backend (1% → 5%) and can collapse the origin. The backend must be sized for the <strong>miss rate</strong>, not the request rate."},
  {"sec":"FND-CACHE","front":"LRU vs LFU — what each evicts and the failure mode of each","back":"<strong>LRU</strong> evicts the item unused for the longest time; it tracks <em>recency</em> and is fooled by a one-time scan that flushes the working set. <strong>LFU</strong> evicts the item with the fewest accesses; it tracks <em>frequency</em> and is fooled by <em>cache pollution</em> — a once-popular item with a huge historical count refuses to leave (unless counts are aged/decayed). Modern caches (e.g. Caffeine's W-TinyLFU) blend both."},
  {"sec":"FND-CACHE","front":"FIFO vs LRU — why FIFO is worse despite looking similar","back":"FIFO evicts by <em>insertion order</em>, ignoring access — a hot item inserted long ago is evicted even if it's hit every millisecond. LRU evicts by <em>last access</em>, keeping hot items. FIFO can also exhibit <strong>Bélády's anomaly</strong> (more cache slots → more misses); LRU cannot because it is a <em>stack algorithm</em> (the inclusion property guarantees a larger cache is a superset of a smaller one)."},
  {"sec":"FND-CACHE","front":"Cache-aside (lazy loading) — the read and write sequence","back":"Read: app checks cache; on miss it loads from the DB, populates the cache, and returns. Write: app writes the DB, then <strong>invalidates (deletes)</strong> the key — it does not update it. The cache is a side store the application orchestrates; the DB is the source of truth and only requested keys are ever cached."},
  {"sec":"FND-CACHE","front":"Write-through vs write-back vs write-around","back":"<ul><li><strong>Write-through</strong>: write cache and DB synchronously — consistent, but every write pays both latencies.</li><li><strong>Write-back (write-behind)</strong>: write cache, ack, flush to DB async — fast writes, but a crash before flush <em>loses acknowledged data</em>.</li><li><strong>Write-around</strong>: write straight to the DB, bypassing the cache — avoids polluting the cache with write-only data, but the next read of that key misses.</li></ul>"},
  {"sec":"FND-CACHE","front":"Why is cache invalidation \"one of the two hard things\"?","back":"There is no general way to know <em>which</em> cached entries a write makes stale, <em>where</em> all copies live (multiple layers/replicas/CDNs), or <em>when</em> readers will observe the change. Every strategy — TTL, explicit delete, versioned keys, event-driven busting — trades staleness against complexity and write amplification. TTL guarantees an upper bound on staleness but never freshness."},
  {"sec":"FND-CACHE","front":"Cache stampede / thundering herd — the trigger and three mitigations","back":"When a hot key expires (or is cold), many concurrent requests miss simultaneously and all hammer the origin to recompute the same value. Mitigations: (1) <strong>request coalescing / single-flight</strong> — one recompute, others wait; (2) <strong>probabilistic early expiration</strong> — a request refreshes slightly before TTL so one renews while others still hit; (3) <strong>locks/leases</strong> — only the lock holder recomputes, others serve stale."},
  {"sec":"FND-CACHE","front":"Hot key problem in a distributed cache and how to fix it","back":"Hashing maps one key to one shard, so a viral key sends all its traffic to a single node and saturates it regardless of cluster size. Fixes: <strong>key splitting / replication</strong> (suffix the key into N copies <code>key:0..N</code> and read a random one), client-side near-cache for the hottest keys, or a dedicated replica set for the key. Cost: N× write amplification on update/invalidation."},
  {"sec":"FND-CACHE","front":"Negative caching — what and why","back":"Caching the <em>absence</em> of a result (a miss, 404, or empty lookup) for a short TTL so repeated requests for non-existent data don't repeatedly hit the origin. It blunts <strong>cache penetration</strong> (flooding requests for keys that never exist). Use a short TTL or sentinel value, and pair with a Bloom filter to cheaply reject keys that are definitely absent."},
  {"sec":"FND-CACHE","front":"TTL eviction vs capacity eviction — they answer different questions","back":"<strong>TTL</strong> answers <em>\"is this entry too stale to trust?\"</em> — time-based expiry for correctness/freshness. <strong>Capacity eviction</strong> (LRU/LFU/FIFO/random) answers <em>\"the cache is full, who leaves?\"</em> — space-based for memory limits. A real cache runs both: an entry can be evicted for space before its TTL, or expire by TTL while space remains."},
  {"sec":"FND-CACHE","front":"Why does Redis recommend random/sampled eviction over true LRU?","back":"Exact LRU requires a doubly-linked list reordered on every access, costing memory and pointer churn. Redis instead <strong>samples</strong> a few keys (<code>maxmemory-samples</code>, default 5) and evicts the best candidate — <em>approximate</em> LRU/LFU at far lower overhead. Pure <code>allkeys-random</code> goes further, evicting a random key with no bookkeeping at all."},
  {"sec":"FND-CACHE","front":"What is the working set and why does it govern cache sizing?","back":"The working set is the set of items actively reused in a time window. If the cache holds the working set, hit ratio is high and stable; once the cache is smaller than the working set you get <strong>thrashing</strong> — constant eviction of items about to be reused. Sizing targets the working set, not the total key space, which is why the hit-ratio curve has a sharp knee."},
  {"sec":"FND-CACHE","front":"Stale-while-revalidate — how it changes the miss path","back":"On expiry the cache serves the <em>stale</em> value immediately while asynchronously refreshing in the background, so the user never waits on the origin. It converts a blocking miss into a non-blocking refresh, smooths stampedes, and trades a small bounded staleness for latency — widely used in CDNs and HTTP <code>Cache-Control</code>."}
);

Object.assign(GLOSSARY_DATA, {
  "hit-ratio": {"term":"Hit Ratio","group":"FND-CACHE","aliases":["hit ratio","hit rate","cache hit ratio","miss rate","hit-ratio"],"eli5":"The fraction of lookups the cache can answer itself without bothering the slow backend.","memory":"Think of the miss rate as the bill: at 99% you pay 1% of full price, at 95% you pay 5% — five times more, not 'a bit' more.","full":"<p><code>hit_ratio = hits / (hits + misses)</code>. The value of a cache is governed by the <b>amplification</b> between a hit and a miss: average latency is <code>h·t_hit + (1−h)·t_miss</code>, and since <code>t_miss</code> is often 100–1000× <code>t_hit</code>, the miss term dominates until <code>h</code> is very close to 1.</p><p>The non-obvious consequence is that the backend must be provisioned for the <b>miss rate</b>. At 1M req/s and 99% hits the origin sees 10k req/s; drop to 95% and it sees 50k — a 5× surge from a 4-point change. This is why \"the cache is up but the DB is on fire\" happens during a partial cache failure.</p>","trap":"Saying 90% is 'a good hit ratio.' For a hot path, 90% means 10% of traffic hits the origin — often enough to melt it. The question is always 'can the backend survive the miss rate?'","worked":"100k req/s, t_hit=0.2ms, t_miss=50ms. At 98% hits, mean ≈ 1.2ms and origin load = 2k req/s. At 90%, mean ≈ 5.2ms and origin load = 10k req/s — 5× the backend traffic.","related":["cache-stampede","negative-caching"]},
  "eviction-policy": {"term":"Eviction Policy","group":"FND-CACHE","aliases":["eviction policy","eviction","replacement policy","LRU","LFU","FIFO","eviction-policy"],"eli5":"The rule for who gets kicked out when a full cache needs to make room.","memory":"LRU = recency (when did you last touch it?), LFU = frequency (how often?), FIFO = age (when did it arrive?).","full":"<p>When a capacity-bounded cache is full, the eviction (replacement) policy chooses the victim. <b>LRU</b> evicts the least-recently-used (bets on recency), <b>LFU</b> the least-frequently-used (bets on frequency), <b>FIFO</b> the oldest-inserted (ignores access), <b>random</b> any key (zero bookkeeping), and <b>TTL</b> expiry removes by age regardless of fullness.</p><p>No policy is universally best — it's a bet on the access pattern. LRU dies on a one-shot scan; LFU dies on stale-but-popular pollution. Production caches favor <b>approximations</b> (sampled LRU, W-TinyLFU) because exact recency/frequency tracking costs memory and per-access writes that hurt throughput.</p>","trap":"Claiming LFU is strictly smarter than LRU. LFU suffers cache pollution — a once-viral key with a huge count never leaves; it needs aging/decay to be usable.","worked":"Sequential full-table scan through an LRU cache: every item is touched exactly once, evicting your hot working set in insertion order — the scan poisons the cache and hit ratio craters. LFU or a scan-resistant admission filter survives this.","related":["ttl","cache-stampede"]},
  "cache-aside": {"term":"Cache-Aside Pattern","group":"FND-CACHE","aliases":["cache-aside","cache aside","lazy loading","look-aside","cache-aside pattern"],"eli5":"The app, not the cache, is in charge: check the cache, and on a miss go load the DB and stash the result yourself.","memory":"'Aside' = the cache sits to the side; the app walks over to it. The DB is truth, the cache is a convenience copy.","full":"<p>In cache-aside (lazy loading) the application orchestrates the cache as a side store. <b>Read</b>: look in cache → on miss, read DB, write cache, return. <b>Write</b>: write DB, then <b>delete</b> the key (invalidate, not update). Only requested keys are ever cached, and a cache outage degrades to direct-DB reads rather than failing.</p><p>The classic race: reader misses and loads an old value, a concurrent writer updates the DB and deletes the key, then the slow reader writes its stale value back — a durable stale entry. Mitigations are short TTLs, versioned keys, or write-through. Crucially, write-then-delete (not write-then-update) avoids caching a value that may never be read.</p>","trap":"On write, updating the cache instead of deleting it. Updating re-introduces the stale-write race and caches values nobody requested; delete-and-lazy-reload is the safe default.","worked":"User edits profile: <code>UPDATE users…</code> then <code>DEL user:42</code>. Next read misses, reloads fresh from the DB, repopulates <code>user:42</code>. No code ever has to compute the new cached value at write time.","related":["write-policies","cache-invalidation","ttl"]},
  "write-policies": {"term":"Write Policies","group":"FND-CACHE","aliases":["write policy","write policies","write-through","write-back","write-behind","write-around"],"eli5":"Three choices for how a write touches the cache and the database, trading speed against durability.","memory":"THROUGH = goes all the way through to disk now; BACK = comes back to disk later; AROUND = goes around the cache.","full":"<p><b>Write-through</b> writes cache and DB synchronously: the cache is always consistent with the DB, at the cost of write latency on both. <b>Write-back (write-behind)</b> writes the cache and acknowledges immediately, flushing to the DB asynchronously (often batched/coalesced): lowest write latency and highest throughput, but a crash before flush loses acknowledged writes. <b>Write-around</b> writes only the DB and skips the cache entirely: it keeps write-only/bulk data from evicting hot read data, but the first read after a write is guaranteed to miss.</p><p>These are about the <i>write path</i> and are orthogonal to read population (cache-aside vs read-through). Pick by workload: write-through for correctness-critical, write-back for write-heavy with loss tolerance, write-around for write-once-read-rarely.</p>","trap":"Calling write-back 'just a faster write-through.' It changes the durability contract — acknowledged data can vanish on crash. That's a correctness decision, not a perf knob.","worked":"A metrics counter hammered 10k/s: write-back coalesces thousands of increments into one periodic DB flush. Write-through would issue 10k DB writes/s and likely fall over.","related":["cache-aside","cache-invalidation","hit-ratio"]},
  "cache-invalidation": {"term":"Cache Invalidation","group":"FND-CACHE","aliases":["cache invalidation","invalidation","stale data","cache-invalidation"],"eli5":"Making sure a cached copy gets thrown away or refreshed once the real data underneath it changes.","memory":"Which / Where / When — the three unknowns. If you can't answer all three, you can't claim 'consistent.'","full":"<p>Invalidation is hard because three questions rarely have clean answers: <b>which</b> entries a given write makes stale (one write can affect many derived/aggregated keys), <b>where</b> every copy lives (in-process per node, Redis, CDN, browser), and <b>when</b> readers observe the change (replication lag, propagation delay). Strategies: <b>TTL</b> (bounded staleness, zero coordination), <b>explicit delete/event-driven busting</b> (precise but needs a reliable change feed), and <b>versioned/immutable keys</b> (never invalidate — change the key, e.g. content-hash URLs).</p><p>The honest framing: you choose a <b>staleness budget</b>. TTL guarantees an upper bound on staleness but never guarantees freshness; explicit busting guarantees freshness only if every copy is reachable and the bust is delivered reliably.</p>","trap":"'We'll just delete the key on every write so it's always fresh.' Misses multi-layer copies (CDN/near-cache), fan-out to derived keys, and delivery failures — and introduces the cache-aside stale-write race.","worked":"Immutable-key trick: serve <code>/app.9f3a1.js</code> with a 1-year TTL. On deploy you ship <code>/app.b22c7.js</code> and change the HTML reference — nothing is ever invalidated, the new content has a new name.","related":["ttl","cache-aside","write-policies","negative-caching"]},
  "cache-stampede": {"term":"Cache Stampede","group":"FND-CACHE","aliases":["cache stampede","thundering herd","dogpile","stampede","cache-stampede"],"eli5":"A popular cached value expires and a swarm of requests all rush the slow backend at the same instant to rebuild it.","memory":"Stampede = the herd hears the same dinner bell (one TTL) and charges the origin together. Cure: don't ring one bell — stagger or single-file them.","full":"<p>Also called thundering herd or dogpile. When a hot key expires (or the cache is cold/cleared), every concurrent request misses at once and independently recomputes the same expensive value, multiplying origin load by the in-flight request count — sometimes enough to take the backend down and prevent recovery.</p><p>Mitigations: <b>request coalescing / single-flight</b> (the first miss recomputes; others wait on the same in-flight promise), <b>probabilistic early expiration</b> (a request near TTL volunteers to refresh early via <code>now − Δ·β·ln(rand) ≥ expiry</code>, where Δ is the recompute cost, so renewals are staggered, not synchronized), <b>locks/leases</b> (only the lock holder recomputes; others serve the stale value), and <b>stale-while-revalidate</b> (serve stale, refresh in background).</p>","trap":"Thinking a bigger cache or higher hit ratio prevents it. Stampede is about <i>simultaneity of misses on one key</i>, not overall miss rate — a 99.9%-hit key still stampedes the instant it expires.","worked":"A homepage feed cached for 60s, 50k req/s. At second 60 it expires and ~50k requests each run the 800ms feed query against the DB. With single-flight, exactly one query runs and 49,999 requests await its result.","related":["hot-key","ttl","hit-ratio"]},
  "hot-key": {"term":"Hot Key","group":"FND-CACHE","aliases":["hot key","hot keys","hotspot","hot-key","key splitting"],"eli5":"One super-popular key whose traffic all lands on a single cache shard and overloads just that node.","memory":"One hash → one shard. A hot key is a fire hose pointed at a single bucket; you fix it by splitting the hose into N buckets.","full":"<p>Distributed caches shard by hashing the key, so a single key deterministically lives on one node. A viral or skewed key (Zipf-distributed traffic) concentrates all its reads on that one shard, saturating its CPU/network while the rest of the cluster idles — adding nodes doesn't help because the key can't be split by the hash alone.</p><p>Fixes: <b>key splitting/replication</b> — fan the value into <code>key:0…key:N-1</code> across shards and have clients read a random replica (read load ÷ N); a <b>client-side near-cache</b> for the few hottest keys to absorb reads before the network; or a <b>dedicated replica set</b> for the key. The trade-off is write amplification: N replicas mean N writes and N invalidations.</p>","trap":"'We'll just scale out the cluster.' More shards don't help a single hot key — its hash still pins it to one node. You must replicate/split the key itself.","worked":"A celebrity's profile <code>user:legend</code> takes 200k req/s on one shard. Replicate to <code>user:legend:{0..9}</code>; clients pick a random suffix, so each of 10 shards sees ~20k req/s.","related":["cache-stampede","hit-ratio","eviction-policy"]},
  "ttl": {"term":"TTL (Time-To-Live)","group":"FND-CACHE","aliases":["TTL","time-to-live","time to live","expiry","expiration","ttl"],"eli5":"A stopwatch on each cached entry; when it runs out, the entry is considered stale and dropped.","memory":"TTL = 'best before' date. It bounds how stale, never how fresh — expiry doesn't mean the data changed, just that you stopped trusting it.","full":"<p>TTL attaches a maximum age to an entry; after it elapses the entry expires regardless of cache fullness. It is the cheapest invalidation mechanism — no coordination, no change feed — and it converts the consistency problem into a tunable <b>staleness budget</b>: a 30s TTL means readers may see data up to 30s old. Redis combines <b>lazy</b> expiry (check on access) with <b>active</b> sampling so memory is reclaimed even for untouched keys.</p><p>TTL is distinct from capacity eviction: an entry can be evicted for space before its TTL (LRU/LFU), or expire by TTL while space is free. The tension is short TTL (fresher, lower hit ratio, more origin load) vs long TTL (higher hit ratio, staler) — and synchronized TTLs are a primary cause of stampedes, which is why jitter is added.</p>","trap":"Treating TTL as consistency. TTL bounds <i>staleness</i>; within the window you can serve data that's already wrong. If you need freshness, you need explicit invalidation, not a shorter TTL.","worked":"Setting identical 300s TTLs on a batch of keys loaded together makes them all expire in the same second → synchronized stampede. Adding ±10% jitter (270–330s) de-synchronizes the misses.","related":["cache-invalidation","eviction-policy","cache-stampede","negative-caching"]},
  "negative-caching": {"term":"Negative Caching","group":"FND-CACHE","aliases":["negative caching","negative cache","caching misses","cache penetration","negative-caching"],"eli5":"Remembering that something does NOT exist, so you stop re-asking the slow backend the same hopeless question.","memory":"Cache the 'no' too. A 404 you compute a million times is a million wasted DB trips — store the 'no' for a few seconds.","full":"<p>Negative caching stores the <i>absence</i> of a result — a not-found, 404, or empty query — usually under a short TTL or a sentinel value. Without it, every request for a key that doesn't exist becomes a guaranteed cache miss that falls through to the origin, which is the mechanism behind <b>cache penetration</b>: an attacker (or buggy client) floods requests for keys that will never be in the cache, sending 100% of that traffic to the DB.</p><p>Implement with a short negative TTL (so a later insert isn't masked for long) and pair it with a <b>Bloom filter</b> of known-existing keys: a Bloom filter never yields a false negative, so a 'not present' answer is definitive and the lookup can be rejected before it touches the cache or DB. The trade-off: too long a negative TTL hides newly-created records; a sentinel must be distinguishable from a real empty value.</p>","trap":"Only caching successful lookups. That leaves the miss path fully exposed to penetration — repeated lookups of non-existent IDs bypass the cache entirely and hammer the DB.","worked":"<code>GET product:99999</code> (doesn't exist) → DB returns nothing. Cache <code>product:99999 = NULL</code> for 30s. The next 10k requests for that bogus id are served from cache, sparing the DB, and any real creation appears within 30s.","related":["cache-invalidation","ttl","hit-ratio"]}
});

</script>

<!-- content: 10-fnd-cap.js -->
<script>
/* Foundations · Consistency, CAP & PACELC (FND-CAP) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-CAP","front":"The precise CAP theorem statement","back":"During a network <strong>partition</strong>, a distributed system can guarantee at most one of <strong>consistency</strong> (linearizable reads) or <strong>availability</strong> (every request to a non-failed node gets a non-error response) — not both. CAP is a constraint that only bites <em>during</em> a partition; with no partition you can have both."},
  {"sec":"FND-CAP","front":"Why is the \"P\" in CAP not a choice you get to make?","back":"Partitions are caused by the network (dropped packets, severed links, even long GC pauses that look like a node vanished), not by your design. In any system that communicates over an unreliable network, partitions <em>will</em> happen, so you cannot opt out of P. The real choice is what to do <em>when</em> one occurs: forfeit C (stay AP) or forfeit A (stay CP)."},
  {"sec":"FND-CAP","front":"What does a CP system do when a partition hits a replica it can't reach?","back":"It sacrifices availability to preserve consistency: a node that can't reach a quorum will <strong>refuse</strong> the request (error or block) rather than serve possibly-stale or divergent data. Examples: ZooKeeper, etcd, HBase, and a single-leader RDBMS with synchronous replication. (Spanner is CP in CAP terms but stays highly available in practice via TrueTime + Paxos, only the minority side blocks.)"},
  {"sec":"FND-CAP","front":"What does an AP system do during a partition?","back":"It sacrifices consistency to stay available: every reachable replica keeps accepting reads and writes, so different sides of the partition can diverge and must be <strong>reconciled later</strong> (e.g. via vector clocks or CRDTs). Examples: Dynamo, Cassandra (with low consistency levels), and Riak."},
  {"sec":"FND-CAP","front":"Linearizability vs sequential consistency","back":"Both give a single total order of operations consistent with each process's program order. <strong>Linearizability</strong> additionally respects <em>real-time</em>: if op A completes before op B starts, A must precede B in the order — so it composes and behaves like one atomic copy. <strong>Sequential consistency</strong> drops the real-time constraint (and does <em>not</em> compose), so a read may legally return a stale value even after a later write completed."},
  {"sec":"FND-CAP","front":"What is causal consistency and what does it NOT order?","back":"Causal consistency guarantees that operations related by <strong>happens-before</strong> (a write you read, then a write you make) are seen in that order by everyone. Operations that are <strong>concurrent</strong> (causally unrelated) may be seen in different orders on different replicas. It is notable as the <em>strongest</em> consistency model that can stay fully available and convergent during a partition — no strictly stronger model has that property."},
  {"sec":"FND-CAP","front":"Read-your-writes vs monotonic reads consistency","back":"<strong>Read-your-writes</strong>: once you write a value, your own subsequent reads never see a version older than that write. <strong>Monotonic reads</strong>: successive reads by the same client never go <em>backward</em> in time (you won't see value v then later see an older v−1). Both are <em>session</em> guarantees scoped to one client, not global properties."},
  {"sec":"FND-CAP","front":"State the PACELC formulation","back":"<strong>If Partition (P) then choose Availability or Consistency (A/C); Else (E, normal operation) choose Latency or Consistency (L/C).</strong> PACELC extends CAP by noting that even with no partition, replication forces a tradeoff between low latency and strong consistency."},
  {"sec":"FND-CAP","front":"Classify Dynamo/Cassandra and a fully-synchronous system in PACELC","back":"Dynamo-style stores are <strong>PA/EL</strong>: available under partition, low-latency otherwise (both sacrifice consistency). A strongly-consistent system like Spanner or VoltDB is <strong>PC/EC</strong>: it gives up availability under partition and latency in normal operation to always stay consistent. (MongoDB is usually classed <strong>PA/EC</strong>.)"},
  {"sec":"FND-CAP","front":"The quorum inequality for strong reads, and the write-overlap rule","back":"With N replicas, a read can see the latest write iff <code>R + W > N</code> (read and write quorums overlap on at least one node). The companion rule <code>W > N/2</code> forces any two <em>write</em> quorums to overlap, so two writes can't both \"succeed\" on fully disjoint node sets — important for durability and read-recency reasoning. Common config: <code>N=3, R=2, W=2</code>."},
  {"sec":"FND-CAP","front":"What does R+W>N actually guarantee — and what does it NOT?","back":"It guarantees the read quorum <em>intersects</em> the most recent write quorum, so a fresh value is <strong>present</strong> in the set read. It does <strong>not</strong> by itself give linearizability: without read-repair/anti-entropy and careful version reconciliation, concurrent writes and sloppy quorums (hinted handoff) can still surface stale or conflicting versions. Strict quorum ≠ linearizable register."},
  {"sec":"FND-CAP","front":"Why is last-writer-wins (LWW) dangerous for conflict resolution?","back":"LWW picks the write with the highest timestamp and silently <strong>discards</strong> the other — so concurrent updates cause <em>lost writes</em>. It also depends on synchronized clocks; clock skew can let an older write win. It's only safe when losing concurrent updates is acceptable or writes are genuinely immutable/idempotent."},
  {"sec":"FND-CAP","front":"What do vector clocks detect that a single timestamp cannot?","back":"A vector clock (one counter per node) lets you compare two versions and determine whether one <strong>causally descends</strong> from the other or they are <strong>concurrent</strong>. Concurrent versions are flagged as conflicts (siblings) for application or CRDT resolution, instead of one silently overwriting the other as with LWW."},
  {"sec":"FND-CAP","front":"What property makes CRDTs converge without coordination?","back":"CRDT merge is <strong>commutative and associative</strong>, and for state-based (CvRDT) types also <strong>idempotent</strong> — a join/least-upper-bound on a semilattice — so replicas that have applied the same set of updates reach the identical state regardless of order (and, for CvRDTs, even with duplicated/redelivered states). This gives <strong>strong eventual consistency</strong> with no consensus needed (e.g. G-Counter, OR-Set, LWW-Register)."},
  {"sec":"FND-CAP","front":"Is \"eventual consistency\" enough to reason about application behavior?","back":"No — eventual consistency only promises that <em>if writes stop, replicas eventually converge</em>; it says nothing about <em>what</em> intermediate values you read or for how long they're stale. Senior designs layer <strong>session guarantees</strong> (read-your-writes, monotonic reads) or causal consistency on top to make behavior reasonable for users."}
);

Object.assign(GLOSSARY_DATA, {
  "cap-theorem": {"term":"CAP Theorem","group":"FND-CAP","aliases":["cap","cap theorem"],"eli5":"When the network splits in two, a distributed system can stay correct or stay up, but not both.","memory":"Pick 2 of 3 is the lazy phrasing; the real phrasing is \"during P, pick C or A.\"","full":"<p>Proven by Gilbert & Lynch (2002) from Brewer's conjecture: a system cannot simultaneously provide <b>Consistency</b> (linearizability), <b>Availability</b> (every request to a non-failed node returns a non-error response), and <b>Partition tolerance</b> (the system keeps working despite dropped messages between nodes).</p><p>The sharp reading: partitions are unavoidable, so CAP is really a <b>binary choice made only during a partition</b> — give up C (become AP) or give up A (become CP). When there is no partition, a well-designed system provides both C and A.</p>","trap":"Saying \"a CP system is never available\" or \"you permanently pick 2 of 3.\" CAP only forces a choice <i>during</i> a partition; the rest of the time CP systems are available and AP systems are consistent.","worked":"Two datacenters lose their link. A CP store (etcd) makes the minority side reject writes; an AP store (Cassandra at CL=ONE) lets both sides accept writes and reconciles afterward.","related":["consistency-availability-partition","linearizability","pacelc","eventual-consistency"]},
  "consistency-availability-partition": {"term":"CP vs AP","group":"FND-CAP","aliases":["cp","ap","cp system","ap system","cp vs ap"],"eli5":"During a split, a CP system would rather error than lie; an AP system would rather answer than block.","full":"<p>The two ways to resolve CAP during a partition. <b>CP</b>: when a node can't reach a quorum it refuses or blocks the request, never returning divergent data — chosen by coordination systems (ZooKeeper, etcd), HBase, and synchronously-replicated databases. <b>AP</b>: every reachable replica keeps serving, accepting that copies diverge and must be merged later — chosen by Dynamo, Cassandra, Riak.</p><p>The label is per-operation, not per-system: Cassandra is AP at CL=ONE but behaves CP-ish at <code>QUORUM</code> reads+writes; many systems are tunable.</p>","trap":"Calling a database flatly \"AP\" or \"CP\" — modern stores are <i>tunable</i> per request via consistency levels / quorum sizes, so the classification depends on configuration.","worked":"etcd minority partition: writes fail (CP). Cassandra with <code>RF=3</code>, write CL=ONE: both partition sides accept writes, creating siblings reconciled by read-repair (AP).","related":["cap-theorem","quorum","eventual-consistency","pacelc"]},
  "linearizability": {"term":"Linearizability","group":"FND-CAP","aliases":["linearizable","linearizability","atomic consistency","strong consistency"],"eli5":"The whole cluster behaves as if there's exactly one copy of the data, updated instantly at one moment.","memory":"Linearizable = a single global timeline with a real-time wall clock; sequential = a single timeline but no clock.","full":"<p>The strongest single-object consistency model. Each operation appears to take effect atomically at some instant between its invocation and response, and the resulting total order respects <b>real time</b>: if op A returns before op B begins, A is ordered before B. This is what makes a register \"behave like one atomic copy\" and is the C in CAP.</p><p>Linearizability is <b>composable</b> (a system of linearizable objects is linearizable) and is required for things like distributed locks and leader election. It's strictly stronger than sequential consistency, which omits the real-time constraint.</p>","trap":"Conflating linearizability (single-object real-time order) with serializability (multi-object transaction isolation). Spanner's <i>external consistency</i> = strict serializability = both together; they are different guarantees.","related":["cap-theorem","sequential-consistency","causal-consistency","quorum"]},
  "sequential-consistency": {"term":"Sequential Consistency","group":"FND-CAP","aliases":["sequential consistency","sequentially consistent"],"eli5":"Everyone agrees on one order of operations, but that order doesn't have to match real-world timing.","full":"<p>Defined by Lamport (1979): there exists a single total order of all operations that (a) is consistent with each individual process's program order and (b) is seen identically by every process. Unlike linearizability it imposes <b>no real-time constraint</b>, so a read issued after another client's write completed may legally return the old value. It is also <b>not composable</b>: composing two sequentially-consistent objects need not be sequentially consistent.</p><p>Practically rare as a top-level database guarantee but central to memory-model reasoning; it's the bridge between linearizability (adds real time) and causal consistency (drops the global total order).</p>","trap":"Assuming sequential consistency means \"reads see the latest write.\" It only means everyone sees writes in <i>the same</i> order — that order can lag real time arbitrarily.","related":["linearizability","causal-consistency"]},
  "causal-consistency": {"term":"Causal Consistency","group":"FND-CAP","aliases":["causal consistency","causally consistent","causal+"],"eli5":"If B could have been influenced by A, everyone sees A before B; unrelated things can be seen in any order.","memory":"Causal = \"reply can't appear before the message it answers.\" Comment ordering, not clock ordering.","full":"<p>Orders only operations related by Lamport's <b>happens-before</b> relation (a read-then-write dependency, or same-session order). Causally related writes are observed in the same order by all replicas; <b>concurrent</b> (causally independent) writes may be observed in different orders.</p><p>It is significant because it is the <b>strongest consistency model that remains fully available and convergent under partitions</b> (Mahajan et al. on real-time causal; Attiya et al. on observable causal) — no strictly stronger model has that property. Systems like COPS track dependencies, often with vector clocks, to enforce it.</p>","trap":"Thinking causal consistency gives a global order. Concurrent writes genuinely have no agreed order — only causally-linked ones do.","worked":"User posts \"I lost my keys\" then \"Found them!\". Causal consistency forbids any replica from showing \"Found them!\" without the first post; two unrelated posts by strangers may appear in either order.","related":["linearizability","sequential-consistency","eventual-consistency","vector-clocks","session-guarantees"]},
  "pacelc": {"term":"PACELC","group":"FND-CAP","aliases":["pacelc","pa/el","pc/ec"],"eli5":"CAP plus the part everyone forgets: even with no partition, you trade latency against consistency.","memory":"\"PAC ... ELC\" — the ELC half is the everyday tax; the PAC half only matters during the rare partition.","full":"<p>Daniel Abadi's 2010/2012 extension: <b>if Partition then Availability-or-Consistency, Else Latency-or-Consistency</b>. It captures that replication imposes a cost in the common, no-partition case: to stay strongly consistent you must coordinate replicas (higher latency); to be fast you must relax consistency.</p><p>Classifications: Dynamo/Cassandra/Riak are <b>PA/EL</b>; Spanner/VoltDB/HBase are <b>PC/EC</b>; MongoDB is often labeled <b>PA/EC</b>. PACELC is the more honest framework for steady-state design decisions.</p>","trap":"Treating CAP as the whole story. The latency-vs-consistency tradeoff (the ELC half) dominates real designs because partitions are rare but every request pays the L/C cost.","related":["cap-theorem","consistency-availability-partition","linearizability","quorum"]},
  "quorum": {"term":"Quorum (R+W>N)","group":"FND-CAP","aliases":["quorum","quorums","r+w>n","read quorum","write quorum","sloppy quorum"],"eli5":"If your read group and your write group always share a member, the reader sees the latest write.","memory":"R+W>N = the two committees must always share at least one person who knows the latest news.","full":"<p>In a replicated store with N copies, require <code>R + W > N</code> so any read set intersects the latest write set on at least one node, and <code>W > N/2</code> so any two write quorums overlap (no two writes commit on fully disjoint sets). Tuning R and W slides between latency and consistency: small W = fast writes, small R = fast reads, but both small breaks the overlap.</p><p>Quorum overlap alone is <b>not</b> linearizability — you still need read-repair/anti-entropy and careful versioning, and <b>sloppy quorums</b> with hinted handoff (Dynamo) deliberately break the strict intersection for availability, trading away the guarantee.</p>","trap":"Claiming \"R+W>N gives strong/linearizable consistency.\" It only guarantees overlap; concurrent writes, sloppy quorums, and read-without-repair still expose stale or conflicting values.","worked":"N=3: R=2,W=2 → 2+2>3, balanced. R=1,W=3 → fast reads, slow durable writes (CP-leaning). R=1,W=1 → 1+1≤3, no overlap, eventual only.","related":["consistency-availability-partition","linearizability","eventual-consistency","last-writer-wins"]},
  "eventual-consistency": {"term":"Eventual Consistency","group":"FND-CAP","aliases":["eventual consistency","eventually consistent","strong eventual consistency"],"eli5":"Stop writing and wait, and eventually every replica shows the same value — with no promise about the meantime.","full":"<p>The weakest useful liveness guarantee: <b>if updates stop, all replicas eventually converge</b> to the same value. It says nothing about which intermediate values reads observe or how long staleness lasts, so it's hard to build user-facing logic on alone.</p><p>Engineers strengthen it with <b>session guarantees</b> (read-your-writes, monotonic reads), <b>causal consistency</b>, or <b>CRDTs</b>, which give <i>strong</i> eventual consistency: replicas that have delivered the same updates are <i>immediately</i> in the same state, with deterministic conflict-free merges.</p>","trap":"Treating \"eventual\" as \"fast and basically consistent.\" It permits arbitrary staleness and non-monotonic reads unless you add session/causal guarantees on top.","related":["consistency-availability-partition","causal-consistency","session-guarantees","crdt","last-writer-wins"]},
  "vector-clocks": {"term":"Vector Clocks","group":"FND-CAP","aliases":["vector clock","vector clocks","version vector"],"eli5":"A per-node counter that tells you whether one version came after another or they happened at the same time.","memory":"One stopwatch per node; \"every counter ≥ and at least one >\" means happened-after, otherwise concurrent.","full":"<p>A vector clock keeps one monotonically-increasing counter per node and attaches it to each version. Comparing two vectors classifies them as one <b>descends from</b> the other (keep the newer) or <b>concurrent</b> (neither dominates → a true conflict). This is exactly what a single wall-clock timestamp cannot tell you.</p><p>Dynamo/Riak use them (often as version vectors) to surface concurrent updates as <b>siblings</b> for application- or CRDT-level resolution instead of silently losing one via LWW. Cost: metadata grows with the number of writers; pruning is needed.</p>","trap":"Confusing vector clocks (detect concurrency / causality) with Lamport clocks (give a total order but cannot detect concurrency). Only vector clocks identify true conflicts.","worked":"Node A writes → {A:1}. Network splits; A writes {A:2}, B (having seen {A:1}) writes {A:1,B:1}. Neither dominates (A:2>A:1 but B:0<B:1) → concurrent → store both as siblings rather than overwrite.","related":["causal-consistency","last-writer-wins","crdt","eventual-consistency"]},
  "last-writer-wins": {"term":"Last-Writer-Wins (LWW)","group":"FND-CAP","aliases":["last-writer-wins","last writer wins","lww"],"eli5":"On a conflict, keep the write with the newest timestamp and throw the other away.","full":"<p>A conflict-resolution rule that orders concurrent writes by a timestamp (or other tiebreaker) and keeps only the \"latest,\" discarding the rest. It's simple and bounded in metadata, which is why Cassandra uses it per-cell.</p><p>The danger is <b>silent lost updates</b>: two genuinely concurrent writes both succeed but one is dropped at merge. It also depends on <b>clock synchronization</b> — skew can let a stale write win. Safe only when writes are immutable/idempotent or losing concurrent updates is acceptable.</p>","trap":"Using LWW for read-modify-write state (counters, sets, balances). Concurrent increments collapse to one — use a CRDT or vector-clock siblings instead.","worked":"Two users edit a profile field at the \"same\" time; LWW keeps whichever node's clock reads later and silently drops the other edit — even if that clock was fast by 200ms.","related":["vector-clocks","crdt","eventual-consistency","quorum"]},
  "crdt": {"term":"CRDT","group":"FND-CAP","aliases":["crdt","crdts","conflict-free replicated data type","g-counter","or-set"],"eli5":"Data types whose merge function is built so replicas always converge no matter the order updates arrive.","memory":"CRDT = the merge is a math join (least upper bound); for state-based types order, retries, and duplicates can't change the answer.","full":"<p>Conflict-free Replicated Data Types make merge <b>commutative and associative</b>, and for state-based types also <b>idempotent</b> — a join over a semilattice — so applying the same set of updates yields the same state regardless of order, giving <b>strong eventual consistency</b> with zero coordination. Two flavors: <b>state-based (CvRDT)</b> ship and merge full states (idempotent, duplicate-safe); <b>op-based (CmRDT)</b> ship commutative operations but typically require exactly-once causal delivery.</p><p>Examples: G-Counter (grow-only counter), PN-Counter, G-Set, OR-Set (add/remove with tags), LWW-Register. Used in Riak, Redis CRDTs, Automerge/Yjs collaborative editors. Cost: merge metadata (tombstones, per-replica state) can grow.</p>","trap":"Believing CRDTs make all app logic conflict-free. They give a deterministic <i>merge</i>, but the semantics may not be what users want (e.g. OR-Set \"add wins\" can resurrect a deleted item) — you must pick the type matching intended behavior.","related":["eventual-consistency","vector-clocks","last-writer-wins","causal-consistency"]},
  "session-guarantees": {"term":"Session Guarantees","group":"FND-CAP","aliases":["session guarantee","session guarantees","read-your-writes","read your writes","monotonic reads","monotonic writes"],"eli5":"Per-client promises that make eventual consistency feel sane for the person doing the writing.","full":"<p>Client-centric guarantees (Terry et al., Bayou) scoped to a single session rather than the whole system. The four classics: <b>read-your-writes</b> (see your own updates), <b>monotonic reads</b> (never see time go backward), <b>monotonic writes</b> (your writes apply in issue order), and <b>writes-follow-reads</b> (a write is ordered after the writes you read).</p><p>They're cheap to implement (sticky routing to a replica, or version tokens) and turn a bare eventually-consistent store into something users tolerate — e.g. you always see your own comment immediately even if other replicas lag.</p>","trap":"Assuming read-your-writes implies others see your write, or that monotonic reads imply global order. They're <i>single-client</i> guarantees only — two clients can still observe different orders.","worked":"You post a comment and a load balancer routes your next read to a lagging replica that lacks it — without read-your-writes (e.g. sticky sessions or version token) your own comment \"vanishes.\"","related":["eventual-consistency","causal-consistency"]}
});

</script>

<script>
/* Foundations · Concurrency & Parallelism (FND-CONC) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-CONC","front":"Concurrency vs parallelism","back":"<strong>Concurrency</strong> is <em>dealing</em> with many tasks at once — interleaving progress on multiple tasks via a scheduler; it can run on a single core. <strong>Parallelism</strong> is <em>doing</em> many tasks at literally the same instant on multiple cores/CPUs. Concurrency is a structuring concern; parallelism is an execution/hardware property. You can have concurrency without parallelism (one core, time-slicing) and parallelism is one way to <em>execute</em> a concurrent design."},
  {"sec":"FND-CONC","front":"Threads vs processes — the core distinction","back":"<ul><li><strong>Processes</strong> have isolated address spaces; communication needs IPC (pipes, sockets, shared-memory segments). Heavier to create, crash-isolated, no shared-memory data races by default.</li><li><strong>Threads</strong> share the parent process's heap, code, and file descriptors (each still has its <em>own stack and registers</em>); communication is just shared variables. Cheap to create/switch, but a bug in one thread can corrupt the whole process and shared state must be synchronized.</li></ul>"},
  {"sec":"FND-CONC","front":"What is a race condition, and when is it possible?","back":"A <strong>race condition</strong> is when program correctness depends on the <em>relative timing/interleaving</em> of operations across threads. It requires (1) two or more threads, (2) at least one <em>writing</em> shared mutable state, and (3) no synchronization ordering the accesses. Two concurrent reads never race. The fix is to make the conflicting accesses mutually exclusive or use atomics."},
  {"sec":"FND-CONC","front":"Critical section — definition and the goal","back":"A <strong>critical section</strong> is the region of code that accesses shared state and must not be executed by more than one thread at a time. The goal is <strong>mutual exclusion</strong>: at most one thread inside at once. Good solutions also guarantee <em>progress</em> (a waiting thread eventually enters) and <em>bounded waiting</em> (no starvation). Keep critical sections short — they serialize execution and cap your parallel speedup (Amdahl)."},
  {"sec":"FND-CONC","front":"Mutex vs binary semaphore — what's the real difference?","back":"Both enforce one-at-a-time access, but a <strong>mutex</strong> has an <em>owner</em>: only the locking thread may unlock it, which enables priority inheritance and lets the runtime detect misuse. A <strong>semaphore</strong> has no ownership — any thread can <code>post()</code>, so it's a signaling/counting primitive, not strictly a lock. Use a mutex for mutual exclusion; use a semaphore to signal events or to limit concurrency to N permits."},
  {"sec":"FND-CONC","front":"When is a spinlock the right choice over a blocking mutex?","back":"Use a <strong>spinlock</strong> when the expected wait is shorter than the cost of a context switch (a few hundred ns to a couple µs) and you're on a multicore machine — typically in kernel/interrupt contexts. It busy-waits, burning CPU instead of sleeping. It's a <em>terrible</em> choice on a single core (the holder can't run to release it) or for long critical sections. Userspace usually wants an adaptive mutex that spins briefly then blocks."},
  {"sec":"FND-CONC","front":"The four Coffman conditions for deadlock","back":"All four must hold simultaneously: <strong>(1) Mutual exclusion</strong> — resources are non-shareable; <strong>(2) Hold and wait</strong> — a thread holds one resource while waiting for another; <strong>(3) No preemption</strong> — resources can't be forcibly taken; <strong>(4) Circular wait</strong> — a cycle of threads each waiting on the next. Break any one to prevent deadlock; the most practical is to impose a <em>global lock ordering</em>, which kills circular wait."},
  {"sec":"FND-CONC","front":"Deadlock vs livelock vs starvation","back":"<ul><li><strong>Deadlock</strong>: threads are permanently blocked waiting on each other — no one makes progress and no one runs.</li><li><strong>Livelock</strong>: threads <em>are</em> running and changing state but keep responding to each other so none makes useful progress (two people sidestepping in a hallway).</li><li><strong>Starvation</strong>: a thread <em>could</em> run but is perpetually denied the resource because others keep winning (unfair scheduling/locking).</li></ul>"},
  {"sec":"FND-CONC","front":"Compare-and-swap (CAS): semantics and the ABA problem","back":"<code>CAS(addr, expected, new)</code> atomically sets <code>*addr = new</code> only if <code>*addr == expected</code>, returning success/failure — the hardware primitive (<code>cmpxchg</code>) behind lock-free algorithms. The classic trap is <strong>ABA</strong>: a value changes A→B→A between your read and your CAS, so CAS succeeds even though the world changed underneath you. Mitigate with a version/tag counter (double-width CAS) or hazard pointers."},
  {"sec":"FND-CONC","front":"Why does a thread need a memory barrier even with a mutex held elsewhere?","back":"Compilers and CPUs <em>reorder</em> memory operations and buffer writes in store buffers, so one thread's writes may become visible to another in a different order — or not at all. <strong>Memory visibility</strong> isn't guaranteed by writing alone. Synchronization primitives (locks, <code>volatile</code>/<code>atomic</code> with the right ordering, barriers) establish a <strong>happens-before</strong> edge that forces the writes to be flushed and ordering to be respected before the other thread reads."},
  {"sec":"FND-CONC","front":"Happens-before relationship — what it guarantees","back":"<strong>Happens-before</strong> is a partial order: if action A happens-before B, then A's memory effects are <em>visible</em> to B and ordered before it. It's established by program order within a thread, an unlock→subsequent-lock of the same monitor, a volatile/atomic write→subsequent read, and thread <code>start()</code>/<code>join()</code>. If two accesses to the same location aren't ordered by happens-before and at least one is a write, that's a <strong>data race</strong> — undefined behavior in C++/Java's model."},
  {"sec":"FND-CONC","front":"Async I/O vs thread-per-request — why async scales for I/O-bound work","back":"<strong>Thread-per-request</strong> dedicates an OS thread per connection; under high concurrency you pay a per-thread stack (often ~1MB of virtual reserve) plus context-switch and scheduler overhead, and threads sit <em>blocked</em> on I/O doing nothing. <strong>Async I/O</strong> (event loop + non-blocking syscalls like <code>epoll</code>/<code>io_uring</code>) multiplexes thousands of connections onto a few threads, parking nothing — a thread only runs when an event is ready. Async wins for I/O-bound, high-connection workloads (the C10k problem); threads are simpler for CPU-bound or low-concurrency code."},
  {"sec":"FND-CONC","front":"Why use a thread pool instead of spawning a thread per task?","back":"A <strong>thread pool</strong> reuses a fixed set of worker threads pulling from a queue, which (1) amortizes thread creation/teardown cost, (2) <em>bounds</em> concurrency to protect downstream resources and memory, and (3) provides backpressure via the queue. Sizing rule of thumb: ~<code>N_cores</code> threads for CPU-bound work; for I/O-bound, scale up by the wait-to-compute ratio (Goetz: <code>N_cores × target_utilization × (1 + wait/compute)</code>). Beware: blocking calls inside a small pool can deadlock or stall it (pool starvation)."},
  {"sec":"FND-CONC","front":"What does a context switch actually cost?","back":"The direct switch (save/restore registers, switch kernel stacks, run the scheduler) is roughly <strong>1–5 µs</strong>, but the <em>dominant</em> cost is indirect: cache and TLB pollution as the new thread evicts the old one's working set, which can cost tens of µs of degraded performance afterward. Process switches add a full address-space change (TLB flush, unless tagged/PCID). This is why busy spinning can beat blocking for very short waits, and why oversubscribing threads thrashes."},
  {"sec":"FND-CONC","front":"Atomic operation — what 'atomic' actually means","back":"An <strong>atomic</strong> operation is indivisible from the perspective of other threads: it either fully happens or not at all, with no observable intermediate state and no torn read/write. <code>x++</code> is <em>not</em> atomic — it's load, increment, store, and another thread can interleave between them. Hardware provides atomic primitives (<code>cmpxchg</code>, <code>fetch_add</code>, <code>xchg</code>); language atomics also carry a <em>memory ordering</em> that controls visibility/reordering, not just indivisibility."}
);

Object.assign(GLOSSARY_DATA, {
  "concurrency-vs-parallelism": {"term":"Concurrency vs Parallelism","group":"FND-CONC","aliases":["concurrency","parallelism","concurrent","parallel"],"eli5":"Concurrency is juggling many tasks by switching between them; parallelism is having many hands so you genuinely do several at once.","memory":"Concurrency = the dealing (cards to many players); Parallelism = many dealers dealing at once.","full":"<p><b>Concurrency</b> is a property of program <i>structure</i>: composing independent tasks that can make progress in overlapping time periods, mediated by a scheduler. <b>Parallelism</b> is a property of <i>execution</i>: multiple computations physically running at the same instant on multiple cores. Rob Pike's framing: concurrency is about <i>dealing with</i> lots of things at once; parallelism is about <i>doing</i> lots of things at once.</p><p>They're orthogonal. A single-core machine runs concurrent code via time-slicing (no parallelism). A SIMD vectorized loop is parallel without being concurrent. A well-structured concurrent program is what <i>enables</i> the runtime to exploit parallelism when cores are available — but the design and the hardware are separate concerns.</p>","trap":"Saying they're the same thing, or that concurrency 'requires multiple cores.' Concurrency is structure and works on one core; parallelism is simultaneous hardware execution.","worked":"A web server handling 10k connections on a 4-core box is highly concurrent (10k logical tasks) but only 4-way parallel (4 things truly run at any instant).","related":["async-io","context-switch"]},
  "race-condition": {"term":"Race Condition","group":"FND-CONC","aliases":["race condition","race conditions","data race","races"],"eli5":"Two threads touch the same data at the same time and the answer depends on who got there first.","memory":"No race without a shared WRITE. Two readers never collide.","full":"<p>A <b>race condition</b> exists when the correctness of a result depends on the nondeterministic interleaving of concurrent operations. The canonical example is <code>x++</code> from two threads: each does load→add→store, and an unlucky interleaving loses an update. A <b>data race</b> (the stricter, language-model term) is specifically two unsynchronized accesses to the same location where at least one is a write — in C++/Java this is undefined behavior, not merely 'a wrong number.'</p><p>Fixes serialize the conflicting accesses: a mutex around the critical section, an atomic read-modify-write (<code>fetch_add</code>), or eliminating the sharing (immutable data, thread-local state, message passing). Note every race needs a shared <i>write</i> — purely read-only sharing is safe.</p>","trap":"Conflating 'race condition' (a logic/timing bug, possibly benign) with 'data race' (a formally undefined memory-model violation). Also: thinking a single line like <code>x++</code> is safe because it 'looks atomic.'","worked":"Two threads each run <code>counter++</code> 1M times. Final value is often < 2M because interleaved load/store pairs overwrite each other's increments.","related":["critical-section","atomic-cas","happens-before","mutex-vs-semaphore"]},
  "critical-section": {"term":"Critical Section","group":"FND-CONC","aliases":["critical section","critical sections","mutual exclusion","mutually exclusive"],"eli5":"The stretch of code that only one thread may run at a time because it touches shared stuff.","memory":"MEPB: Mutual Exclusion, Progress, Bounded waiting — the three guarantees.","full":"<p>A <b>critical section</b> is a code region accessing shared resources that must be executed under <b>mutual exclusion</b> — at most one thread inside at any moment. A correct solution to the critical-section problem must satisfy three properties: <i>mutual exclusion</i>, <i>progress</i> (if no one is inside, a contender must be able to enter — no needless blocking), and <i>bounded waiting</i> (a thread can't be made to wait forever — no starvation).</p><p>Critical sections are pure serialization, so they directly limit scalability per <b>Amdahl's law</b>: the fraction of time spent holding locks is the fraction that can't speed up with more cores. Staff-level instinct: make critical sections as <i>short</i> as possible (do expensive work outside the lock), and prefer finer-grained or lock-free structures when contention is the bottleneck.</p>","trap":"Holding the lock while doing I/O, logging, or allocation. The critical section should bracket only the shared-state access; everything else stays outside.","related":["race-condition","mutex-vs-semaphore","deadlock","context-switch"]},
  "mutex-vs-semaphore": {"term":"Mutex vs Semaphore","group":"FND-CONC","aliases":["mutex","semaphore","binary semaphore","counting semaphore","lock","spinlock"],"eli5":"A mutex is a single key that only its holder can return; a semaphore is a bowl of N tickets anyone can drop in or take.","memory":"Mutex = ownership (you locked it, you unlock it). Semaphore = tickets (anyone posts).","full":"<p>A <b>mutex</b> provides mutual exclusion and has the key property of <b>ownership</b>: only the thread that locked it may unlock it. Ownership enables priority inheritance (to fight priority inversion), recursive locking, and runtime detection of unlock-by-wrong-thread. A <b>semaphore</b> is a counter with <code>wait()</code>/<code>post()</code> (P/V) and <i>no ownership</i> — any thread can post. A counting semaphore limits concurrency to N permits; a binary semaphore (count 0/1) is a signaling latch, not a true lock.</p><p>Rule of thumb: use a <b>mutex to protect data</b> (mutual exclusion), use a <b>semaphore to signal events or count permits</b> (producer/consumer, connection pools, rate limiting). A <b>spinlock</b> is a mutex variant that busy-waits instead of sleeping — good only for ultra-short critical sections on multicore.</p>","trap":"Calling a binary semaphore 'the same as a mutex.' It's not: no ownership means no priority inheritance, and one thread can release a 'lock' another thread acquired — a recipe for bugs.","worked":"Connection pool of 10: a counting semaphore initialized to 10. Each request <code>wait()</code>s a permit before borrowing a connection and <code>post()</code>s on return, capping in-flight DB connections at 10.","related":["critical-section","deadlock","thread-pool","race-condition"]},
  "deadlock": {"term":"Deadlock (Coffman Conditions)","group":"FND-CONC","aliases":["deadlock","deadlocks","coffman conditions","circular wait","hold and wait","livelock","starvation"],"eli5":"Two threads each holding something the other needs, both waiting forever.","memory":"MHNC — 'Must Have No Cycles': Mutual exclusion, Hold-and-wait, No-preemption, Circular-wait. Break any one.","full":"<p><b>Deadlock</b> requires all four <b>Coffman conditions</b> at once: (1) <i>mutual exclusion</i> — resources can't be shared; (2) <i>hold and wait</i> — a thread keeps held resources while requesting more; (3) <i>no preemption</i> — you can't yank a resource away; (4) <i>circular wait</i> — a cycle of threads each waiting on the next. Prevention means denying any one: e.g., acquire all locks atomically (no hold-and-wait), allow rollback (preemption), or — most practical — impose a <b>global lock ordering</b> so cycles are impossible.</p><p>Distinguish three failure modes. <b>Deadlock</b>: blocked, no progress. <b>Livelock</b>: actively running and changing state but no useful progress (mutual retry/backoff that keeps colliding). <b>Starvation</b>: a thread is runnable but perpetually loses to others (unfair scheduling). Deadlock is total and static; livelock is dynamic; starvation is about fairness.</p>","trap":"Naming only three conditions, or confusing livelock with deadlock. Livelock threads ARE running (CPU is busy); deadlocked threads are blocked. Also: lock ordering breaks <i>circular wait</i>, not mutual exclusion.","worked":"Thread A locks <code>L1</code> then wants <code>L2</code>; Thread B locks <code>L2</code> then wants <code>L1</code>. Cycle → deadlock. Fix: every thread always acquires <code>L1</code> before <code>L2</code>.","related":["mutex-vs-semaphore","critical-section","thread-pool"]},
  "atomic-cas": {"term":"Atomicity & Compare-and-Swap","group":"FND-CONC","aliases":["atomic","atomicity","compare-and-swap","cas","compare and swap","cmpxchg","lock-free","aba problem"],"eli5":"CAS is the CPU's 'change this only if no one beat me to it' instruction — the building block for locking-free updates.","memory":"CAS = 'change-if-unchanged.' ABA = the value left and came back wearing the same shirt.","full":"<p>An operation is <b>atomic</b> if other threads can never observe it half-done — no torn reads, no interleaved intermediate state. <b>Compare-and-swap</b> (<code>CAS(addr, expected, new)</code>) is the workhorse atomic read-modify-write: it writes <code>new</code> only if the current value still equals <code>expected</code>, reporting whether it succeeded. Lock-free algorithms loop on CAS — read the value, compute an update, CAS it in, retry if someone else changed it meanwhile.</p><p>The famous pitfall is the <b>ABA problem</b>: the value goes A→B→A between your read and your CAS, so CAS sees 'A' and succeeds even though the structure changed (e.g., a popped-and-reused node in a lock-free stack). Defenses: a monotonic version tag stored alongside the pointer (tagged/double-width CAS), or hazard pointers / epoch-based reclamation to keep freed memory from being reused too soon.</p>","trap":"Assuming CAS success means 'nothing happened in between.' It only means the value <i>matches</i> now — that's exactly the ABA hole. Also: thinking <code>x++</code> is atomic (it's a non-atomic load-add-store).","worked":"Lock-free counter: <code>do { old = load(); new = old + 1; } while(!CAS(&c, old, new));</code> — retries only on contention, never blocks.","related":["race-condition","happens-before","mutex-vs-semaphore"]},
  "happens-before": {"term":"Memory Visibility & Happens-Before","group":"FND-CONC","aliases":["happens-before","happens before","memory visibility","memory barrier","memory model","memory ordering","volatile","memory fence"],"eli5":"Writing a value in one thread doesn't mean another thread sees it — you need a synchronization edge that forces visibility and ordering.","memory":"Happens-before is the 'visibility receipt': no edge, no guarantee the other thread ever sees your write.","full":"<p>Modern CPUs and compilers reorder memory operations and buffer writes in per-core store buffers, so without synchronization there's no guarantee that thread B ever sees thread A's write, or sees A's writes in program order. The <b>happens-before</b> relation is the formal tool: if A <i>happens-before</i> B, then A's effects are visible to and ordered before B. Edges are created by program order within a thread, an unlock→later-lock of the same mutex, an atomic/<code>volatile</code> write→later read, and <code>thread.start()</code>/<code>join()</code>.</p><p>A <b>memory barrier</b> (fence) is the low-level mechanism enforcing an ordering edge; locks and acquire/release atomics insert them for you. If two accesses to the same location are <i>not</i> ordered by happens-before and at least one writes, you have a <b>data race</b> — undefined behavior in the C++/Java memory models, where the compiler may legally assume races don't happen. This is why 'it worked in my test' is no proof: visibility bugs are timing- and hardware-dependent.</p>","trap":"Believing a value written in one thread is automatically visible in another, or that <code>volatile</code> provides mutual exclusion. <code>volatile</code>/atomic gives visibility + ordering, NOT atomicity of compound operations like <code>x++</code>.","worked":"Thread A sets <code>data=42</code> then <code>ready=true</code>; without happens-before, B may see <code>ready==true</code> but still read stale <code>data</code>. Making <code>ready</code> a release-store / acquire-load fixes the ordering.","related":["atomic-cas","race-condition","critical-section"]},
  "async-io": {"term":"Async I/O vs Thread-per-Request","group":"FND-CONC","aliases":["async i/o","async io","asynchronous i/o","thread-per-request","thread per request","event loop","non-blocking i/o","c10k"],"eli5":"Instead of one thread sitting blocked per connection, one event loop watches thousands of connections and wakes only for the ready ones.","memory":"Threads block-and-wait (1 thread parked per call); async loop watch-and-dispatch (N connections, few threads).","full":"<p>The <b>thread-per-request</b> model assigns an OS thread to each connection and lets it block on I/O. It's simple to reason about but expensive at scale: each thread reserves a stack (often ~1MB of virtual address space, though committed RSS is usually less), the scheduler must context-switch among them, and blocked threads consume memory while doing nothing. This breaks down at high connection counts — the classic <b>C10k problem</b>.</p><p><b>Async I/O</b> inverts control: a small number of threads run an <b>event loop</b> over non-blocking syscalls (<code>epoll</code>, <code>kqueue</code>, <code>io_uring</code>, IOCP). A connection consumes only a small state object, not a thread, and a thread runs only when an event is ready — so 10k idle connections cost almost nothing. The trade-off: code becomes callback/async-await style, CPU-bound work blocks the loop (must be offloaded), and debugging is harder. Heuristic: async for I/O-bound high-concurrency servers; threads for CPU-bound or low-concurrency, easier-to-read code.</p>","trap":"Claiming async is 'faster' in general. For CPU-bound work it isn't — async only wins by avoiding the memory/switch overhead of blocked threads during I/O waits. And a single blocking call inside an event loop stalls everything.","worked":"A Node/Netty server holds 50k mostly-idle websockets on a handful of threads; the thread-per-request equivalent would need ~50k threads (tens of GB of reserved stack) and drown in context switches.","related":["thread-pool","context-switch","concurrency-vs-parallelism"]},
  "thread-pool": {"term":"Thread Pool","group":"FND-CONC","aliases":["thread pool","thread pools","worker pool","executor","pool starvation"],"eli5":"A reusable crew of worker threads pulling tasks off a queue, instead of hiring a new thread for every task.","memory":"Pool = reuse + bound + backpressure. The trap is tasks-waiting-on-tasks eating every worker (self-deadlock).","full":"<p>A <b>thread pool</b> keeps a fixed (or bounded) set of worker threads that pull tasks from a shared queue. Benefits: it amortizes the cost of thread creation/destruction, <b>bounds concurrency</b> so a burst of work can't spawn unbounded threads and exhaust memory or hammer a downstream service, and the queue provides natural <b>backpressure</b>. Sizing: for CPU-bound tasks ~<code>N_cores</code> workers; for I/O-bound, Goetz's formula scales by the wait-to-compute ratio, <code>N_cores × target_utilization × (1 + wait/compute)</code> (with target utilization ≈ 1 this is just <code>N_cores × (1 + wait/compute)</code>).</p><p>The staff-level gotcha is <b>pool starvation / deadlock</b>: if pooled tasks block waiting on results from <i>other</i> tasks that also need the pool, a small pool can wedge — every worker is parked waiting for work that can't be scheduled. Avoid by not blocking inside pool tasks, sizing for the dependency depth, or using separate pools for dependent stages.</p>","trap":"Using one shared pool for stages that block on each other — the parent task occupies a worker while waiting for a child task that can never get a worker. Also: an unbounded queue hides backpressure until you OOM.","worked":"8-core box, requests spend 90% time waiting on DB (wait/compute = 0.9/0.1 = 9): a CPU-rule pool of 8 leaves cores idle; ~<code>8 × (1 + 9) = 80</code> workers keeps them busy.","related":["async-io","deadlock","context-switch"]},
  "context-switch": {"term":"Context Switch Cost","group":"FND-CONC","aliases":["context switch","context switches","context-switch","tlb flush","scheduler overhead"],"eli5":"Swapping the CPU from one thread to another isn't free — and the hidden cost is the cold caches the new thread inherits.","memory":"The switch itself is cheap (µs); the cold caches it leaves behind are what hurt.","full":"<p>A <b>context switch</b> saves the outgoing thread's registers and kernel stack, runs the scheduler, and restores the incoming thread. The <i>direct</i> cost is small — roughly <b>1–5 µs</b> — but the <i>indirect</i> cost usually dominates: the new thread runs with cold caches and a polluted TLB, paying tens of µs of cache/TLB misses to re-warm its working set. A <b>process</b> switch additionally changes the address space, flushing the TLB unless tagged entries (ASID/PCID) avoid it.</p><p>This cost shapes design decisions: a spinlock can beat a blocking mutex when the wait is shorter than a switch; oversubscribing far more runnable threads than cores causes <b>thrashing</b> (constant switching, caches never warm); and async I/O wins partly by avoiding per-connection switches.</p>","trap":"Quoting only the direct register-save cost. The interview answer is that cache/TLB pollution after the switch is the real, larger expense — and process switches add a TLB flush on top.","worked":"A latency-sensitive thread pinned to a core with a brief spinlock outperforms a blocking lock when contention is <~1 µs, because it skips two context switches (sleep + wake).","related":["concurrency-vs-parallelism","mutex-vs-semaphore","async-io","thread-pool"]}
});

</script>
