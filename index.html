<!-- content: 00-demo.js -->
<script>
/* ============================================================================
   VERTICAL SLICE — Reliable messaging cluster (sourced from NexusPay)
   Proves the forked engine renders SWE content: cards, drill-down glossary,
   memory hooks, Gotchas, worked examples, cross-links.
   ============================================================================ */
/* topics + decks are defined in 00-decks.js */
CARDS_DATA.push(
  { sec:"EDA", front:"The dual-write problem",
    back:"A service that must <strong>update its database AND publish an event</strong> as two separate writes can crash in between — committing one without the other. The result: a lost event or a ghost event, and permanent divergence between your data and your stream. The transactional outbox solves it." },
  { sec:"EDA", front:"Transactional outbox pattern",
    back:"Write the event row into an <strong>outbox table in the SAME database transaction</strong> as the business change. Either both commit or neither does. A separate relay (often change data capture) then publishes the outbox rows to Kafka. One atomic write — no dual-write inconsistency." },
  { sec:"DELIV", front:"Why 'exactly-once' is usually 'effectively-once'",
    back:"True exactly-once <em>delivery</em> over a network is impossible (you can't distinguish a lost ack from a lost message). What systems actually deliver is <strong>at-least-once delivery + idempotent processing</strong>, which yields exactly-once <em>effects</em>. Kafka's 'exactly-once' is transactions + idempotent producer, still leaning on dedup downstream." },
  { sec:"MSG", front:"Idempotent consumer",
    back:"A consumer you can safely feed the <strong>same message twice</strong> with no extra effect — e.g., dedup by an idempotency key in a fast store (Valkey/Redis), or an upsert keyed by event id. Mandatory under at-least-once delivery, because duplicates <em>will</em> happen." },
  { sec:"MSG", front:"Dead-letter queue (DLQ)",
    back:"A side channel where messages that <strong>repeatedly fail</strong> processing are parked after N retries, so one poison-pill message can't block the partition for everyone behind it. You alert on DLQ depth and replay after a fix." },
  { sec:"MSG", front:"Change data capture (CDC)",
    back:"Stream every row change by <strong>tailing the database's commit log</strong> (e.g., Debezium reading the Postgres WAL) instead of polling. It's how the outbox relay publishes events durably and in commit order, without the service doing a second write." }
);

Object.assign(GLOSSARY_DATA, {
"dual-write-problem":{ term:"The Dual-Write Problem", group:"EDA",
  aliases:["dual-write problem","dual write","dual-write"],
  eli5:"Updating your database AND publishing an event as two separate steps risks doing one but not the other if the process crashes in between — leaving data and stream out of sync.",
  full:"<p>Many services must do two things on one action: persist a state change and tell the rest of the system about it. If those are <b>two independent writes</b> (DB commit, then Kafka send), a crash or network blip between them corrupts the system of record:</p><ul><li>DB commits, publish fails &rarr; a <b>lost event</b> (downstream never learns).</li><li>Publish succeeds, DB rolls back &rarr; a <b>ghost event</b> (downstream acts on a change that never happened).</li></ul><p>There is no ordering of two separate writes that is safe. The fix is to make them <b>one</b> atomic write — the transactional outbox.</p>",
  related:["transactional-outbox","change-data-capture","idempotency","exactly-once"] },

"transactional-outbox":{ term:"Transactional Outbox", group:"EDA",
  aliases:["transactional outbox","outbox pattern","outbox"],
  eli5:"Write the event into an 'outbox' table inside the same transaction as your business change, so they commit together; a separate relay publishes it afterward. One atomic write, zero lost events.",
  full:"<p>The <b>transactional outbox</b> turns the dual-write problem into a single-write problem. In one local DB transaction you write both the business row and an <code>outbox</code> row describing the event. Because they share a transaction, they commit or roll back together — atomicity guarantees you never have one without the other.</p><p>A separate <b>relay</b> then moves outbox rows to the message broker. Two common relays: poll-and-publish (a worker selects unsent rows) or, better, <b>change data capture</b> tailing the commit log. The relay marks rows sent (or CDC tracks its offset), and consumers dedupe by event id for idempotency.</p>",
  related:["dual-write-problem","change-data-capture","idempotency","dead-letter-queue","exactly-once"] },

"idempotency":{ term:"Idempotency", group:"MSG",
  aliases:["idempotency","idempotent","idempotent consumer","idempotency key"],
  eli5:"An operation is idempotent if doing it twice has the same effect as doing it once. Essential because at-least-once delivery guarantees you'll sometimes get duplicates.",
  full:"<p><b>Idempotency</b> lets you safely retry. Formally, <code>f(f(x)) = f(x)</code> — applying the operation again changes nothing. In messaging this is the only sane defense against duplicates, which are inevitable under <b>at-least-once</b> delivery.</p><p>Practical techniques: dedupe on a unique <b>idempotency key</b> (request id / event id) recorded in a fast store; use database <b>upserts</b> keyed by a natural id; or design operations to be naturally idempotent (set balance to X, not add X).</p>",
  related:["exactly-once","dead-letter-queue","transactional-outbox"] },

"exactly-once":{ term:"Exactly-Once Semantics", group:"DELIV",
  aliases:["exactly-once","exactly once","effectively-once","delivery semantics"],
  eli5:"The appearance that each message is processed exactly once. In practice it's at-least-once delivery plus idempotent processing ('effectively-once') — true once-only delivery is impossible over a network.",
  full:"<p>The three delivery guarantees: <b>at-most-once</b> (fire and forget; may lose), <b>at-least-once</b> (retry until acked; may duplicate), and <b>exactly-once</b> (the holy grail). Because a sender can't tell a lost message from a lost acknowledgment, exactly-once <i>delivery</i> is unachievable — but exactly-once <i>effects</i> are, via at-least-once delivery + an idempotent consumer.</p><p>Kafka's 'exactly-once' combines the idempotent producer (dedupe by producer id + sequence) with transactions spanning consume-process-produce; downstream sinks still typically dedupe.</p>",
  related:["idempotency","transactional-outbox","dead-letter-queue"] },

"dead-letter-queue":{ term:"Dead-Letter Queue (DLQ)", group:"MSG",
  aliases:["dead-letter queue","dead letter queue","DLQ","poison pill"],
  eli5:"A side channel where messages that keep failing get parked after a few retries, so one bad ('poison') message doesn't block everything queued behind it.",
  full:"<p>A <b>dead-letter queue</b> is where messages go to be quarantined after exceeding a retry budget. Without it, a single un-processable <b>poison pill</b> (malformed payload, an unhandled schema change) stalls the partition and grows consumer lag for everyone behind it.</p><p>Operational pattern: retry with backoff a bounded number of times; on exhaustion, route to the DLQ with failure metadata; alert on DLQ depth; fix the bug or data; then replay. Entropy Engine specifically chaos-tests this with injected poison pills.</p>",
  related:["idempotency","transactional-outbox","exactly-once"] },

"change-data-capture":{ term:"Change Data Capture (CDC)", group:"MSG",
  aliases:["change data capture","CDC","Debezium","write-ahead log"],
  eli5:"Stream every change to a database by reading its commit log (the write-ahead log) instead of polling — capturing inserts, updates, and deletes in commit order as events.",
  full:"<p><b>CDC</b> reads the database's <b>write-ahead log</b> (WAL/binlog) and emits each committed change as an event. Tools like <b>Debezium</b> do this for Postgres/MySQL. Because it reads the log the DB already writes for durability, it adds no second write and preserves commit order.</p><p>It's the durable engine behind the transactional outbox relay: the service only writes the outbox row; Debezium tails the WAL and publishes it to Kafka — turning the database's own log into the source of truth for the stream.</p>",
  related:["transactional-outbox","dual-write-problem"] }
});

enh({
"dual-write-problem":{
  memory:"Two separate writes can't be made atomic &mdash; a crash between them corrupts your system of record.",
  trap:"There is NO safe ordering of DB-then-publish or publish-then-DB. Retries don't fix it (the crash happens before the retry). Only a single atomic write does." },
"transactional-outbox":{
  memory:"One DB transaction writes both the business row AND the event; a relay publishes the outbox later.",
  trap:"The outbox alone doesn't give exactly-once &mdash; the relay delivers at-least-once, so consumers STILL must dedupe by event id (idempotency).",
  examples:[{ title:"Why the crash is now harmless", scenario:"A payment service writes the payment row and an OutboxEvent row in one transaction, then crashes before the relay runs.",
    result:"On restart the relay finds the un-published outbox row and sends it &mdash; <b>nothing is lost</b>, because the event was committed atomically with the payment. Compare the dual-write version, where the event would be gone forever." }] },
"idempotency":{
  memory:"f(f(x)) = f(x): safe to repeat. Required because at-least-once delivery WILL duplicate.",
  trap:"&lsquo;Insert a row&rsquo; is NOT idempotent (second try violates a key or double-inserts). &lsquo;Upsert by event id&rsquo; or &lsquo;dedupe on an idempotency key&rsquo; is." },
"exactly-once":{
  memory:"Exactly-once = at-least-once delivery + idempotent processing (&lsquo;effectively-once&rsquo;).",
  trap:"True exactly-once DELIVERY is impossible &mdash; a sender can't distinguish a lost message from a lost ack. Anyone promising it is really doing at-least-once + dedup." },
"dead-letter-queue":{
  memory:"Park repeatedly-failing messages aside so one poison pill can't block the partition.",
  trap:"Don't retry a poison pill forever in place &mdash; it grows consumer lag for everyone behind it. Bound retries, then DLQ + alert + replay." },
"change-data-capture":{
  memory:"Tail the commit log (WAL) instead of polling &mdash; every change, in order, no second write.",
  trap:"CDC captures what COMMITTED, in commit order &mdash; not application intent. Schema changes to the source table flow straight through, so pair it with schema-drift handling." }
});

</script>

<script>
/* Demo: code blocks, comparison tables, console output — exercises the new engine. */
CARDS_DATA.push(
  { sec:"EDA", front:"Transactional outbox — the atomic write (Java)",
    back:"The business row and the event row are saved in the <strong>same</strong> <code>@Transactional</code> method, so they commit together:" +
      CODE("java", `
@Transactional
public Payment create(CreatePaymentCommand cmd) {
    Payment p = paymentRepository.save(Payment.from(cmd)); // business row
    var evt = OutboxEvent.of("payment.created", p.id(), toJson(p));

}`) +
      "<p>A relay then publishes the unsent rows. Note: <em>outbox</em> appears in the code above but isn't linked — the auto-linker skips code.</p>" },

  { sec:"MSG", front:"Outbox relay query (SQL) — claim unsent events",

<script>
/* Foundations · Algorithms & Problem-Solving (FND-ALGO) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-ALGO","front":"Binary search: the canonical loop invariant","back":"Maintain that the target, if present, always lies within <code>[lo, hi]</code> (inclusive) or <code>[lo, hi)</code> (half-open) — pick one and stay consistent. Every iteration must <em>strictly shrink</em> the interval, and the loop condition (<code>lo <= hi</code> vs <code>lo < hi</code>) must match the interval convention. Most binary-search bugs are an invariant/condition mismatch, not arithmetic."},
  {"sec":"FND-ALGO","front":"Binary search: why <code>mid = lo + (hi - lo) / 2</code> instead of <code>(lo + hi) / 2</code>?","back":"<code>(lo + hi)</code> can <strong>overflow</strong> a fixed-width integer when both are large (the infamous JDK <code>Arrays.binarySearch</code> bug, fixed 2006). <code>lo + (hi - lo) / 2</code> computes the <em>same</em> midpoint without ever forming a sum that exceeds the max value. Both formulas floor toward <code>lo</code> via integer division; the only difference is overflow safety, not which side the midpoint lands on."},
  {"sec":"FND-ALGO","front":"Off-by-one: when does binary search infinite-loop?","back":"When the interval fails to shrink. With <code>lo < hi</code> and you set <code>lo = mid</code> (not <code>mid + 1</code>), then <code>mid</code> can equal <code>lo</code> forever once <code>hi = lo + 1</code>, since integer division floors. Rule: if you assign <code>lo = mid</code>, round <code>mid</code> <em>up</em> (<code>mid = lo + (hi - lo + 1) / 2</code>); if you assign <code>hi = mid</code>, round down. Mismatch = spin."},
  {"sec":"FND-ALGO","front":"lower_bound vs upper_bound","back":"<code>lower_bound(x)</code> returns the first index whose value is <code>>= x</code>; <code>upper_bound(x)</code> returns the first index whose value is <code>> x</code>. Their difference is the count of elements equal to <code>x</code>. Plain \"find any match\" binary search is the wrong tool when duplicates exist — you need one of these boundary variants to get a deterministic leftmost/rightmost answer."},
  {"sec":"FND-ALGO","front":"Sorting algorithms: stability and in-place at a glance","back":"<ul><li><strong>Quicksort</strong>: in-place (O(log n) stack), <em>not</em> stable, avg O(n log n) / worst O(n²).</li><li><strong>Mergesort</strong>: stable, <em>not</em> in-place (O(n) aux for arrays), always O(n log n).</li><li><strong>Heapsort</strong>: in-place, <em>not</em> stable, always O(n log n).</li><li><strong>Counting/Radix</strong>: stable, not in-place, O(n+k) / O(d·(n+k)) — non-comparison.</li></ul>"},
  {"sec":"FND-ALGO","front":"Why is quicksort usually faster than mergesort despite equal big-O?","back":"Both are O(n log n) on average, but quicksort sorts <strong>in place</strong> with excellent cache locality and a tiny inner loop, while array mergesort pays for O(n) auxiliary memory and the bandwidth to copy through it. Constants and memory traffic — not asymptotics — make quicksort the default for in-memory arrays. Mergesort wins when stability or a guaranteed worst case is required (and for linked lists / external sort)."},
  {"sec":"FND-ALGO","front":"Quicksort worst case and how to avoid it","back":"Worst case is <strong>O(n²)</strong>, hit when the pivot is consistently the min or max — e.g. picking the first element on already-sorted data. Mitigations: <em>randomized pivot</em> or <em>median-of-three</em>, and switch to heapsort on deep recursion (<strong>introsort</strong>) to cap the worst case at O(n log n). Always recursing on the smaller partition first bounds stack depth to O(log n)."},
  {"sec":"FND-ALGO","front":"When can you beat the O(n log n) comparison-sort lower bound?","back":"Any sort that only <em>compares</em> elements needs Ω(n log n) comparisons (there are n! orderings; a binary decision tree resolving them has height ≥ log₂(n!) ≈ n log n). You beat it only by <em>not comparing</em>: counting sort O(n+k) and radix sort O(d·(n+k)) exploit bounded integer keys. They trade generality for linear time when <code>k</code> (key range) is small relative to <code>n</code>."},
  {"sec":"FND-ALGO","front":"Recursion vs iteration: the real tradeoff","back":"They're computationally equivalent (any recursion can be made iterative with an explicit stack). Recursion is clearer for tree/divide-and-conquer shapes but risks <strong>stack overflow</strong> at depth O(n) and adds call-frame overhead. <em>Tail recursion</em> can be optimized to a loop by some compilers (notably <em>not</em> CPython or the JVM). Convert deep recursion to an explicit stack/loop when input depth is unbounded."},
  {"sec":"FND-ALGO","front":"Memoization vs tabulation — same DP, what differs?","back":"Both cache subproblem results to kill exponential re-computation. <strong>Memoization</strong> is top-down + recursion + lazy: computes only reachable states, natural to write, but pays recursion overhead and can stack-overflow. <strong>Tabulation</strong> is bottom-up + iterative: fills a table in dependency order, no recursion, and enables <em>space optimization</em> (e.g. rolling 1D array) but may compute states that are never needed."},
  {"sec":"FND-ALGO","front":"Greedy vs DP — when is greedy actually correct?","back":"Greedy is correct only when the problem has the <strong>greedy-choice property</strong> (a locally optimal choice is part of some global optimum) <em>and</em> optimal substructure — e.g. interval scheduling, Huffman, Dijkstra. When choices interact and you must compare overlapping subproblems (0/1 knapsack, edit distance), greedy fails and you need DP. The interview tell: if a counterexample breaks the greedy choice, switch to DP."},
  {"sec":"FND-ALGO","front":"BFS vs DFS: traversal properties","back":"<strong>BFS</strong> uses a queue, visits in nondecreasing distance from the source, and finds the <em>fewest-edges</em> path in an unweighted graph; frontier space is O(width). <strong>DFS</strong> uses a stack/recursion, dives deep first; space is O(depth). DFS underlies cycle detection, topological sort, SCCs, and connected components — but does <em>not</em> give shortest paths."},
  {"sec":"FND-ALGO","front":"Shortest paths: which algorithm for which graph?","back":"<ul><li><strong>Unweighted</strong>: plain BFS — O(V+E).</li><li><strong>Non-negative weights</strong>: Dijkstra with a binary heap — O((V+E) log V).</li><li><strong>Negative edges (no neg cycle)</strong>: Bellman-Ford — O(V·E).</li><li><strong>0/1 weights</strong>: 0-1 BFS with a deque — O(V+E).</li></ul> Dijkstra is wrong with negative edges because its greedy \"finalize the min on pop\" assumption breaks."},
  {"sec":"FND-ALGO","front":"Topological sort: two algorithms and the failure mode","back":"A linear ordering of a DAG where every edge <code>u→v</code> places <code>u</code> before <code>v</code>. Two standard methods: <strong>Kahn's</strong> (BFS repeatedly removing in-degree-0 nodes) and <strong>DFS postorder reversed</strong>. Both are O(V+E). The failure mode is diagnostic: if you can't order all nodes (Kahn leaves nodes with in-degree > 0, or DFS finds a back edge), the graph has a <strong>cycle</strong> — no topo order exists."},
  {"sec":"FND-ALGO","front":"Two pointers vs sliding window — when each applies","back":"<strong>Two pointers</strong>: indices move toward each other (or in tandem) over a <em>sorted</em> array / linked list — e.g. pair-sum, dedup, palindrome, fast/slow cycle detection. <strong>Sliding window</strong>: a variable-size contiguous range where you expand the right edge and shrink the left to maintain an invariant (sum ≤ k, ≤ K distinct chars). Both convert an O(n²) brute force into a single O(n) linear pass."}
);

Object.assign(GLOSSARY_DATA, {
  "binary-search": {"term":"Binary Search","group":"FND-ALGO","aliases":["binary search","binary-search"],"eli5":"Repeatedly halve a sorted range, throwing away the half that can't contain the target.","memory":"Invariant + matching condition + strict shrink = correct. Drop any one and you get an off-by-one or an infinite loop.","full":"<p>Binary search finds a target in a sorted array in <code>O(log n)</code> by comparing against the midpoint and discarding the half that cannot contain it. Correctness hinges on a <b>loop invariant</b> (the answer always lies in the current interval) plus an interval convention — inclusive <code>[lo, hi]</code> with <code>lo <= hi</code>, or half-open <code>[lo, hi)</code> with <code>lo < hi</code> — held consistently.</p><p>Beyond \"find x in array,\" its real power is <b>binary search on the answer</b>: any monotonic predicate <code>p(x)</code> (false…false, true…true) can be bisected to find the boundary, which is how problems like \"minimum capacity to ship in D days\" are solved.</p>","trap":"Writing <code>mid = (lo + hi) / 2</code> — integer overflow on large indices (the real JDK bug). Also: assigning <code>lo = mid</code> with a round-<em>down</em> midpoint, which spins forever once the range is two elements.","worked":"Search 7 in <code>[1,3,5,7,9]</code> with inclusive <code>[lo,hi]</code>: lo=0,hi=4,mid=2→a[2]=5<7→lo=3; mid=3→a[3]=7 found. Two comparisons.","related":["loop-invariant","divide-and-conquer"]},
  "loop-invariant": {"term":"Loop Invariant","group":"FND-ALGO","aliases":["loop invariant","loop invariants","invariant"],"eli5":"A statement that's true before and after every iteration, so it's true when the loop ends.","memory":"Init → Maintain → Terminate. If all three hold, the loop is correct by induction over iterations.","full":"<p>A loop invariant is a property that holds at the top of every iteration. You prove a loop correct in three steps: <b>initialization</b> (true before the first iteration), <b>maintenance</b> (if true before an iteration, still true after), and <b>termination</b> (combined with the exit condition, it yields the desired result). It is the formal backbone behind binary search, sorting partitions, and sliding windows.</p><p>In practice, naming the invariant out loud — \"everything left of <code>i</code> is sorted,\" \"the window <code>[l, r]</code> always has sum ≤ k\" — is the fastest way to find off-by-one bugs and to convince an interviewer your code is correct.</p>","trap":"Treating it as a comment rather than a contract. A subtle bug is usually a step where maintenance silently breaks (the invariant was true, your update made it false) — that's exactly where the off-by-one hides.","related":["binary-search","sliding-window"]},
  "quicksort": {"term":"Quicksort","group":"FND-ALGO","aliases":["quicksort","quick sort"],"eli5":"Pick a pivot, partition smaller/larger around it, then recurse on each side.","memory":"\"Partition then conquer.\" Mergesort splits trivially and merges hard; quicksort splits hard (partition) and conquers trivially.","full":"<p>Quicksort partitions the array around a pivot so smaller elements go left and larger go right, then recurses. It is <b>in-place</b> (O(log n) stack when you recurse on the smaller partition first; O(n) otherwise), has <code>O(n log n)</code> average time, but <code>O(n²)</code> worst case when pivots are pathological (e.g. first-element pivot on sorted input). Its excellent cache locality and small constant make it the default in-memory array sort.</p><p>Production implementations harden it: randomized or <b>median-of-three</b> pivots avoid the worst case in practice, and <b>introsort</b> switches to heapsort past a recursion-depth limit to guarantee <code>O(n log n)</code>. Quicksort is <b>not stable</b>.</p>","trap":"Claiming O(n log n) worst case — it's O(n²). And calling it stable: it isn't, because partitioning swaps non-adjacent equal keys past each other.","worked":"Sort <code>[3,7,1,5]</code>, pivot=last (5): elements <5 → <code>[3,1]</code>, ≥5 (excl. pivot) → <code>[7]</code>, giving <code>[3,1] 5 [7]</code>; recurse left → <code>[1,3,5,7]</code>.","related":["divide-and-conquer","mergesort","stability","comparison-sort-lower-bound"]},
  "mergesort": {"term":"Mergesort","group":"FND-ALGO","aliases":["mergesort","merge sort"],"eli5":"Split the list in half, sort each half, then merge the two sorted halves.","memory":"Splitting is free, merging does the work — the mirror image of quicksort.","full":"<p>Mergesort recursively splits the input in half, sorts each half, and merges them in linear time. It is <b>stable</b> and runs in <code>O(n log n)</code> in <em>all</em> cases, but needs <code>O(n)</code> auxiliary space for the merge (the array variant; the linked-list variant uses O(1) extra beyond recursion). The guaranteed worst case and stability make it the choice when those properties matter.</p><p>It is the basis of <b>external sorting</b> (k-way merge of sorted runs that don't fit in RAM) and of hybrid sorts like <b>Timsort</b> (Python lists, Java object arrays), which exploits existing runs and merges them with mergesort's stability.</p>","trap":"Calling it in-place. The standard array mergesort uses O(n) extra memory; true in-place merge exists but is complex and slow, so it's not what \"mergesort\" means by default.","related":["quicksort","stability","divide-and-conquer"]},
  "stability": {"term":"Sort Stability","group":"FND-ALGO","aliases":["stable","stability","stable sort","unstable"],"eli5":"A stable sort keeps equal elements in their original relative order.","memory":"Radix sort only works because each digit pass is stable — stability is load-bearing, not cosmetic.","full":"<p>A sort is <b>stable</b> if elements comparing equal retain their input order. This matters when sorting by a secondary key after a primary key (sort by name, then stably by department, and within each department names stay alphabetical) and underpins <b>radix sort</b>, which relies on the stability of each digit pass.</p><p>Mergesort, insertion sort, counting sort, and Timsort are stable; quicksort, heapsort, and selection sort are not. An unstable sort can be made stable by appending the original index as a tiebreaker key — at the cost of O(n) extra space.</p>","trap":"Assuming the language default is stable. C++ <code>std::sort</code> is <em>not</em> guaranteed stable (use <code>std::stable_sort</code>); Python <code>list.sort</code> and Java <code>Collections.sort</code> are. Know your platform.","related":["mergesort","quicksort","counting-radix-sort"]},
  "counting-radix-sort": {"term":"Counting & Radix Sort","group":"FND-ALGO","aliases":["counting sort","radix sort","counting/radix","non-comparison sort"],"eli5":"Sort integers by bucketing on key values instead of comparing pairs.","memory":"Counting sort = histogram + prefix sums → positions. Radix = repeated stable counting sort, one digit at a time.","full":"<p><b>Counting sort</b> sorts <code>n</code> integers in range <code>[0, k)</code> in <code>O(n + k)</code> by counting occurrences and computing prefix sums for output positions — no comparisons, and stable. It is only practical when <code>k</code> is not much larger than <code>n</code>.</p><p><b>Radix sort</b> extends this to large keys by stably counting-sorting digit by digit (LSD-first), costing <code>O(d·(n + k))</code> for <code>d</code> digits over a radix of size <code>k</code>. These beat the <code>Ω(n log n)</code> comparison bound precisely because they exploit key structure rather than comparing elements.</p>","trap":"Calling radix sort \"O(n), strictly better than quicksort.\" The hidden factor is <code>d·k</code>; for 64-bit keys or large alphabets the constants and memory often lose to a cache-friendly quicksort.","related":["stability","comparison-sort-lower-bound"]},
  "comparison-sort-lower-bound": {"term":"Comparison-Sort Lower Bound","group":"FND-ALGO","aliases":["comparison sort","n log n lower bound","comparison-sort lower bound","comparison-based sort"],"eli5":"Any sort that only compares elements needs at least about n log n comparisons.","memory":"n! leaves ⇒ tree height ≥ log₂(n!) ≈ n log n. The factorial is the whole argument.","full":"<p>A comparison sort decides order using only pairwise comparisons. Model the algorithm as a binary <b>decision tree</b>: each comparison is a node with two outcomes, and each of the <code>n!</code> possible input permutations must reach a distinct leaf. A binary tree with <code>n!</code> leaves has height ≥ <code>log₂(n!) = Θ(n log n)</code>, so some input forces that many comparisons.</p><p>This is why mergesort/heapsort are asymptotically optimal among comparison sorts, and why counting/radix sort can only go faster by <em>not</em> comparing — they read key bits directly.</p>","trap":"Thinking the bound applies to all sorting. It bounds <em>comparison</em> sorts only; counting and radix sort legitimately run in linear time on bounded integer keys.","related":["counting-radix-sort","quicksort","mergesort"]},
  "divide-and-conquer": {"term":"Divide & Conquer","group":"FND-ALGO","aliases":["divide and conquer","divide-and-conquer","divide & conquer"],"eli5":"Break a problem into smaller independent subproblems, solve each, and combine the results.","memory":"Divide, conquer, <b>combine</b> — the combine step's cost <code>f(n)</code> is what the Master Theorem weighs against the recursion.","full":"<p>Divide & conquer splits a problem into independent subproblems, solves them recursively, and combines their answers. Its running time often follows a recurrence <code>T(n) = a·T(n/b) + f(n)</code>, solved by the <b>Master Theorem</b> — e.g. mergesort's <code>T(n) = 2T(n/2) + O(n) = O(n log n)</code>.</p><p>It differs from dynamic programming in that subproblems are <em>disjoint</em> (no overlap), so no memoization is needed. Canonical examples: mergesort, quicksort, binary search, Karatsuba multiplication, and FFT.</p>","trap":"Confusing it with DP. D&C subproblems don't overlap; DP exists precisely <em>because</em> subproblems overlap and would otherwise be recomputed exponentially.","related":["mergesort","quicksort","binary-search","dynamic-programming"]},
  "dynamic-programming": {"term":"Dynamic Programming","group":"FND-ALGO","aliases":["dynamic programming","dp","memoization","tabulation"],"eli5":"Solve a problem by reusing answers to overlapping subproblems instead of recomputing them.","memory":"Two preconditions: <b>optimal substructure + overlapping subproblems</b>. Missing the overlap → it's just divide & conquer.","full":"<p>Dynamic programming applies when a problem has <b>optimal substructure</b> (optimal solution built from optimal sub-solutions) and <b>overlapping subproblems</b> (the same sub-solutions recur). You cache each subproblem's answer once. <b>Memoization</b> is top-down/recursive/lazy; <b>tabulation</b> is bottom-up/iterative and enables space tricks like a rolling array.</p><p>DP beats greedy when a locally optimal choice can be wrong (0/1 knapsack, edit distance, longest common subsequence). The design recipe: define the state, write the recurrence, identify base cases, choose an evaluation order, then optimize space.</p>","trap":"Reaching for greedy when subproblem choices interact. Greedy on 0/1 knapsack (by value/weight ratio) is provably wrong — only DP gives the optimum.","worked":"Fibonacci: naive recursion is O(φⁿ) due to overlap; memoizing each <code>F(k)</code> once makes it O(n). Same recurrence, exponential → linear.","related":["greedy","divide-and-conquer"]},
  "greedy": {"term":"Greedy Algorithm","group":"FND-ALGO","aliases":["greedy","greedy algorithm","greedy-choice property"],"eli5":"Build a solution by always taking the choice that looks best right now, never reconsidering.","memory":"Greedy = commit and never look back. Prove it with an exchange argument before you trust it.","full":"<p>A greedy algorithm makes the locally optimal choice at each step and never backtracks. It is correct only when the problem has the <b>greedy-choice property</b> (some global optimum contains the greedy first choice) plus optimal substructure — provable via exchange arguments or matroid theory.</p><p>Correct examples: interval scheduling (earliest finish time), Huffman coding, Dijkstra, Kruskal/Prim MST. It is fast (often sort + single pass) but fragile: a single counterexample to the greedy choice means you must fall back to DP.</p>","trap":"Assuming greedy works because it gives the right answer on your examples. Coin change with arbitrary denominations breaks greedy (coins {1,3,4}, target 6: greedy 4+1+1 = 3 coins, optimal 3+3 = 2). Always seek a counterexample.","related":["dynamic-programming","dijkstra"]},
  "bfs-dfs": {"term":"BFS & DFS","group":"FND-ALGO","aliases":["bfs","dfs","breadth-first search","depth-first search","graph traversal"],"eli5":"BFS explores level by level with a queue; DFS dives deep down one path with a stack.","memory":"BFS = <b>queue</b> = wide. DFS = <b>stack</b> = deep. Queue→breadth, stack→depth.","full":"<p><b>BFS</b> uses a FIFO queue, visiting vertices in nondecreasing distance from the source; on an unweighted graph it yields shortest (fewest-edge) paths in <code>O(V+E)</code>, with frontier space proportional to graph width. <b>DFS</b> uses a stack (often the call stack), exploring as far as possible before backtracking, also <code>O(V+E)</code>.</p><p>DFS is the engine behind cycle detection, topological sort, strongly connected components, and edge classification (tree/back/forward/cross edges). Pick BFS for shortest unweighted paths or shallow targets; pick DFS for connectivity, ordering, and recursion-shaped exploration.</p>","trap":"Using DFS to find a shortest path. DFS finds <em>a</em> path, not the shortest — only BFS (unweighted) or Dijkstra (non-negative weights) guarantee minimal distance.","related":["dijkstra","greedy"]},
  "dijkstra": {"term":"Dijkstra's Algorithm","group":"FND-ALGO","aliases":["dijkstra","dijkstra's algorithm","dijkstras"],"eli5":"Greedily expand the closest unfinished node, relaxing its edges, until all are finalized.","memory":"\"Closest-first, finalize-on-pop.\" The finalize-on-pop step is precisely what negative edges violate.","full":"<p>Dijkstra computes single-source shortest paths on graphs with <b>non-negative</b> edge weights. It repeatedly extracts the unvisited vertex of smallest tentative distance from a min-heap, finalizes it, and relaxes its outgoing edges — <code>O((V+E) log V)</code> with a binary heap (or <code>O(E + V log V)</code> with a Fibonacci heap). It is fundamentally a <b>greedy</b> algorithm: once a node is popped, its distance is assumed final.</p><p>That assumption is exactly why <b>negative edges break it</b> — a later, cheaper path through a negative edge can undercut an already-finalized node. Use Bellman-Ford (<code>O(V·E)</code>) for negative edges, or plain BFS when the graph is unweighted.</p>","trap":"Running Dijkstra on a graph with negative edges \"because it usually works.\" It can return wrong distances — the greedy finalization is unsound. Switch to Bellman-Ford.","related":["bfs-dfs","greedy"]},
  "two-pointers": {"term":"Two Pointers","group":"FND-ALGO","aliases":["two pointers","two-pointer","two pointer","fast and slow pointers"],"eli5":"Use two indices that move through the data in a coordinated way to avoid a nested loop.","memory":"Sorted array + \"find a pair\" → converge from both ends, move the pointer that pushes the sum the right way.","full":"<p>The two-pointer pattern coordinates two indices over a sequence to replace an <code>O(n²)</code> nested scan with an <code>O(n)</code> pass. Variants: <b>opposite ends</b> converging (pair-sum on a sorted array, palindrome check, container-with-most-water), <b>same direction</b> (in-place dedup, partitioning), and <b>fast/slow</b> (Floyd's cycle detection, find middle of a list).</p><p>Opposite-end two-pointer usually requires the data to be <b>sorted</b> so that moving a pointer monotonically changes the quantity you're tracking — that monotonicity is what makes discarding the other half safe.</p>","trap":"Applying opposite-end two pointers to <em>unsorted</em> data. Without the sorted (monotonic) precondition, moving a pointer doesn't safely prune candidates and you'll miss answers — use a hash map instead.","related":["sliding-window","binary-search"]},
  "sliding-window": {"term":"Sliding Window","group":"FND-ALGO","aliases":["sliding window","sliding-window","variable window"],"eli5":"Keep a contiguous range, grow its right edge and shrink its left, to scan all valid sub-ranges in one pass.","memory":"Right grows, left chases. Each element is added once and removed once → O(n), not O(n·window).","full":"<p>Sliding window maintains a contiguous sub-range and an aggregate (sum, char counts, max) as it advances. For a <b>variable</b> window you expand the right edge and, whenever the window violates an invariant (sum > k, more than K distinct chars), shrink from the left until valid again — each index enters and leaves at most once, giving <code>O(n)</code>. A <b>fixed</b> window of size <code>k</code> just slides one step at a time.</p><p>It's the go-to for \"longest/shortest contiguous substring/subarray satisfying P\" problems. The amortized linear bound depends on the monotonic-invariant property: shrinking only ever moves the left edge forward.</p>","trap":"Using a sliding window when the array has <em>negative</em> numbers and you need a target sum / longest subarray. The shrink logic assumes adding elements grows the aggregate monotonically; with negatives that breaks — use a prefix-sum + hash map instead.","related":["two-pointers","loop-invariant"]}
});

</script>
