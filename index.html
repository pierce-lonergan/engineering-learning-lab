<script>
/* Partitioning & Sharding (DB-SHARD) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-SHARD","front":"Why does horizontal partitioning (sharding) scale writes where a read replica cannot?","back":"Read replicas only scale <em>read</em> throughput — every write still goes through a single primary's write path, log, and storage. Sharding splits the dataset across independent nodes so each shard owns a disjoint key range and accepts writes in parallel, multiplying write throughput <em>and</em> total storage/IOPS. The cost is that any operation spanning shards (cross-shard joins, transactions, secondary-index lookups) becomes a distributed problem."},
  {"sec":"DB-SHARD","front":"Range partitioning vs hash partitioning: the core read/write tradeoff","back":"<strong>Range</strong> keeps adjacent keys co-located, so range scans (<code>WHERE ts BETWEEN ...</code>) hit one or few shards — but monotonically increasing keys (timestamps, auto-increment IDs) funnel all new writes to the last partition (hotspot). <strong>Hash</strong> spreads writes evenly via <code>hash(key) mod N</code>, killing write hotspots, but destroys locality — a range scan becomes a scatter-gather across every shard."},
  {"sec":"DB-SHARD","front":"Why do sequential shard keys (timestamps, auto-increment IDs) cause a write hotspot under range partitioning?","back":"Range partitioning maps contiguous key ranges to shards, so the partition holding the current maximum key receives <em>every</em> new insert. All write traffic concentrates on one node while the rest sit idle. Mitigations: hash or salt a prefix onto the key, or use a compound key (e.g. <code>(shard_salt, ts)</code>) so writes fan out — at the cost of needing a scatter-gather for pure time-range scans."},
  {"sec":"DB-SHARD","front":"What problem does consistent hashing solve over plain hash-mod-N partitioning?","back":"With <code>hash(key) mod N</code>, changing <code>N</code> (adding/removing a node) remaps almost <em>every</em> key, forcing a full reshuffle. Consistent hashing maps both keys and nodes onto a ring; a key belongs to the next node clockwise. Adding/removing a node only moves the keys between that node and its neighbor — on average <code>K/N</code> keys move instead of nearly all of them."},
  {"sec":"DB-SHARD","front":"Why does consistent hashing add virtual nodes (vnodes) instead of one ring position per physical node?","back":"With one point per node, the ring is uneven: a node may own a huge arc (load skew), and removing a node dumps its entire range onto a single successor. <strong>Vnodes</strong> give each physical node many small positions on the ring, so load averages out and a departing node's keys spread across <em>many</em> survivors. Vnodes also let heterogeneous hardware carry proportional load by assigning more vnodes to bigger machines."},
  {"sec":"DB-SHARD","front":"What is the hot-shard / celebrity-key problem and why doesn't a good hash function fix it?","back":"Even with perfectly uniform hashing, a <em>single</em> key can be disproportionately hot (a celebrity user, a viral product, a global config row). All its traffic lands on one shard because the key is atomic — hashing distributes <em>keys</em>, not the load <em>within</em> a key. The shard for that key saturates while others idle. Hashing solves skew across keys, never within one."},
  {"sec":"DB-SHARD","front":"How do you mitigate a celebrity / hot key once identified?","back":"<ul><li><strong>Split the key</strong>: append a random suffix (<code>user123_00..99</code>) to fan writes across 100 logical sub-keys; reads must scatter-gather and merge.</li><li><strong>Cache / read-replica</strong> the hot key in front of the shard for read-heavy hotspots.</li><li><strong>Dedicated shard</strong> for the whale.</li></ul>Most systems can't auto-detect this, so it's usually application-level. The fan-out trades write relief for read complexity."},
  {"sec":"DB-SHARD","front":"Local (document-partitioned) secondary indexes: how they work and their read cost","back":"Each shard indexes only the documents it stores, so writes are <strong>local</strong> — inserting a doc updates only that shard's index, no cross-shard coordination. But a query on the indexed attribute (e.g. <code>color = red</code>) doesn't know which shards hold matches, so it must <strong>scatter-gather</strong>: query every shard and merge. Cheap writes, expensive reads. This is the common default (e.g. Elasticsearch per-shard inverted index, MongoDB, DynamoDB LSIs)."},
  {"sec":"DB-SHARD","front":"Global (term-partitioned) secondary indexes: how they work and their write cost","back":"The index itself is partitioned by the <em>indexed term</em>, not by the document's shard — all docs with <code>color = red</code> live in one index partition regardless of where the document is stored. Reads are targeted (one index partition), but a single document write may touch <em>multiple</em> index partitions on different nodes, so keeping the index consistent needs a distributed transaction — which is why most systems (e.g. DynamoDB GSIs) update it asynchronously, exposing read-your-writes lag."},
  {"sec":"DB-SHARD","front":"Why is the shard-key choice the single highest-leverage decision in a sharded system?","back":"The shard key determines write distribution (hotspots), which queries are single-shard vs scatter-gather, whether transactions can stay local, and how painful future resharding is. A bad key bakes in skew and forces cross-shard fan-out on your hottest path — and unlike an index, you usually <em>cannot</em> change it without migrating the entire dataset. It's chosen early, on the least information, with the highest blast radius."},
  {"sec":"DB-SHARD","front":"What makes resharding so painful, and what design choice minimizes it?","back":"Resharding moves large volumes of data live while serving traffic: you must dual-write or backfill, keep routing consistent during the cutover, and avoid losing writes. <code>hash mod N</code> makes it catastrophic (almost all keys move). Pre-splitting into <strong>many more fixed logical partitions than nodes</strong> (e.g. Riak/Elasticsearch/Citus-style, 1024 partitions on 8 nodes) means rebalancing just reassigns whole partitions to nodes — no rehashing of individual keys."},
  {"sec":"DB-SHARD","front":"Directory-based (lookup) partitioning: what it buys and what it costs","back":"A lookup service maps each key (or key range) to its shard explicitly, decoupling placement from any hash/range function. This enables <strong>arbitrary, mutable placement</strong> — move a hot tenant to its own shard, rebalance unevenly, do gradual migrations — without rehashing. Costs: the directory is an extra hop on every request and a potential bottleneck/SPOF, so it must be cached and highly available."},
  {"sec":"DB-SHARD","front":"Why don't auto-increment primary keys work well across shards, and what replaces them?","back":"A single global auto-increment sequence reintroduces a central bottleneck and a write hotspot on the highest partition. Replacements: per-shard ID ranges/blocks, snowflake-style IDs (timestamp + shard/worker id + counter), or random UUIDs. Note UUIDv4 spreads writes well but is poor as a B-tree/clustered-index key (random insert points hurt write locality); time-ordered IDs (UUIDv7, ULID) trade some spread for index-friendly ordering."},
  {"sec":"DB-SHARD","front":"Why can't you generally enforce a UNIQUE constraint or foreign key across shards cheaply?","back":"Uniqueness and referential integrity require checking <em>all</em> shards, which is a distributed coordination problem the database won't do for free per-write. If the unique column isn't the shard key, enforcement needs a global index or a separate consistency service. Practical answer: make the uniqueness/relationship align with the shard key (co-locate related rows on the same shard) so the constraint stays local."},
  {"sec":"DB-SHARD","front":"Cross-shard transactions and joins: why they're avoided and the usual escape hatches","back":"A transaction or join spanning shards needs distributed coordination — two-phase commit (blocking, slow, coordinator failure risk) or scatter-gather joins (fan-out latency bounded by the slowest shard). Senior playbook: design the shard key so related entities are <strong>co-located</strong> (e.g. shard by <code>tenant_id</code> so a tenant's data is single-shard), keeping the hot transactional paths local and reserving cross-shard ops for rare/batch analytics."},
  {"sec":"DB-SHARD","front":"Rebalancing: why 'partitions proportional to nodes' is an anti-pattern","back":"If you size partitions so there's exactly one per node, then adding a node forces splitting existing partitions and the partition count tracks the node count — every scale event reshuffles data. Better: fix a large partition count independent of nodes (e.g. 256 or 1024 partitions on 8 nodes). Scaling just hands whole partitions to the new node; partition count stays constant, and data movement is minimal and predictable."}
);

Object.assign(GLOSSARY_DATA, {
  "horizontal-partitioning": {"term":"Horizontal Partitioning (Sharding)","group":"DB-SHARD","aliases":["horizontal partitioning","sharding","shard","shards","partitioning","partition","partitions"],"eli5":"Split one giant table's rows across many machines so each handles a slice of the data and the writes that go with it.","memory":"Replicas copy the whole pie to more tables (scale reads); shards cut the pie into slices, one per table (scale writes).","full":"<p>Horizontal partitioning splits a dataset <b>by rows</b> across independent nodes (vs vertical partitioning, which splits by columns). Each shard owns a disjoint subset of keys and serves reads and writes for that subset autonomously, so write throughput, storage, and IOPS scale roughly linearly with shard count.</p><p>The price is that the database is no longer a single coordinated unit: cross-shard joins, multi-key transactions, global uniqueness, and secondary-index lookups all become distributed problems. The whole discipline of sharding is choosing a partitioning scheme and shard key that keep your <i>hot</i> operations single-shard.</p>","trap":"Saying sharding scales reads. Read replicas scale reads; sharding's distinctive win is scaling <i>writes</i> and total storage by partitioning the write path.","related":["shard-key","range-partitioning","hash-partitioning","resharding"]},
  "range-partitioning": {"term":"Range Partitioning","group":"DB-SHARD","aliases":["range partitioning","range partition","range-partitioned","range scans","range scan"],"eli5":"Give each shard a contiguous slice of the key space (A–F, G–M, ...) so neighbors stay together.","memory":"Range = a dictionary: words near each other share a page. Great for 'all words between cat and dog', terrible if every new word is alphabetically last.","full":"<p>Range partitioning assigns contiguous key ranges to partitions, keeping adjacent keys physically co-located. This makes <b>range scans</b> efficient — a query over a key interval touches only the one or few partitions covering it — which is why time-series and analytical stores favor it.</p><p>Its fatal weakness is sequential write skew: any monotonically increasing key (timestamp, auto-increment id) sends every new insert to the partition holding the current maximum, creating a single write hotspot while other partitions idle.</p>","trap":"Picking range partitioning on a timestamp/auto-increment shard key 'because we do time scans' — you've just funneled 100% of writes to the tail partition. Salt or hash the prefix if writes are sequential.","worked":"Partition orders by <code>created_at</code>: shard A = Jan, B = Feb, C = Mar. Today is in March, so <i>every</i> new order hits shard C; A and B take zero write traffic.","related":["hash-partitioning","shard-key","hot-shard","horizontal-partitioning"]},
  "hash-partitioning": {"term":"Hash Partitioning","group":"DB-SHARD","aliases":["hash partitioning","hash partition","hash-partitioned","hash mod n","hash-mod-n"],"eli5":"Run the key through a hash and use the result to pick a shard, so keys scatter evenly.","memory":"Hash = shuffling a deck before dealing: every player gets an even, random hand — but you can no longer ask for 'all the hearts in order' from one player.","full":"<p>Hash partitioning assigns a key to a partition via a hash of the key (classically <code>hash(key) mod N</code>). A good hash distributes keys uniformly, eliminating the write hotspots that plague range partitioning on sequential keys.</p><p>The tradeoff is the loss of <b>locality</b>: adjacent keys land on different shards, so any range scan degenerates into a scatter-gather across all partitions. The naive <code>mod N</code> form also reshuffles nearly every key when <code>N</code> changes — which is exactly what consistent hashing fixes.</p>","trap":"Claiming hash partitioning fixes hotspots. It fixes <i>cross-key</i> skew, not a single <i>celebrity key</i> — that one key still hashes to exactly one shard.","related":["range-partitioning","consistent-hashing","hot-shard","shard-key"]},
  "hot-shard": {"term":"Hot Shard / Celebrity Key","group":"DB-SHARD","aliases":["hot shard","hot-shard","celebrity key","celebrity-key","hot key","hotspot","hotspots"],"eli5":"One key (a celebrity user, a viral item) is so popular that its single shard melts while the others nap.","memory":"A stadium with one open turnstile for Taylor Swift's line — adding turnstiles (shards) elsewhere doesn't help <i>her</i> line. You must split <i>her</i> line.","full":"<p>A hot shard occurs when traffic concentrates on one partition. Two distinct causes: <b>sequential-key skew</b> (range partitioning on a monotonic key) and the <b>celebrity key</b> — a single atomic key whose own traffic exceeds one node's capacity. Hashing fixes the first by spreading keys, but cannot fix the second: a hash sends one key to exactly one shard.</p><p>Mitigation is application-level: split the hot key into N sub-keys with a random suffix (fan writes out, scatter-gather reads back), cache it, or give the whale its own dedicated shard. Detection usually requires per-key telemetry the database doesn't provide automatically.</p>","trap":"'We hash, so no hotspots.' Uniform hashing distributes load <i>across</i> keys; it does nothing for load concentrated <i>within</i> a single key.","worked":"A 'likes' counter for a viral post: every like hits one row → one shard. Fix: shard the counter into <code>post42_shard0..9</code>, increment a random one, sum all 10 on read.","related":["hash-partitioning","range-partitioning","shard-key"]},
  "shard-key": {"term":"Shard Key (Partition Key)","group":"DB-SHARD","aliases":["shard key","shard-key","partition key","partition-key","shard keys"],"eli5":"The column you partition on — it decides where every row lives and which queries are cheap.","memory":"The shard key is load-bearing concrete, not drywall — chosen first, with the least info, and the hardest thing to change later.","full":"<p>The shard key is the attribute (or compound attribute) fed to the partitioning function. It is the highest-leverage design decision in a sharded system because it simultaneously determines write distribution (hotspots), which queries are single-shard vs scatter-gather, whether multi-row transactions stay local, and the cost of any future resharding.</p><p>The senior heuristic: pick a key that has high cardinality (avoids skew), matches your hottest access pattern so those queries hit one shard, and co-locates entities that must be transactional together (e.g. shard by <code>tenant_id</code> so a tenant's data and transactions stay on one shard).</p>","trap":"Choosing the shard key for even distribution alone. A perfectly uniform key that doesn't match your query pattern turns every important read into a scatter-gather. Distribution AND locality both matter.","worked":"Multi-tenant SaaS: shard by <code>tenant_id</code> → each tenant's reads/writes/transactions are single-shard. Shard by <code>order_id</code> instead → listing one tenant's orders fans out to every shard.","related":["horizontal-partitioning","range-partitioning","hash-partitioning","resharding","hot-shard"]},
  "local-secondary-index": {"term":"Local (Document-Partitioned) Secondary Index","group":"DB-SHARD","aliases":["local secondary index","local index","document-partitioned","document partitioned","scatter-gather","scatter gather"],"eli5":"Each shard indexes only its own rows, so writes stay local but a search must ask every shard.","memory":"Local index = each library branch keeps its own card catalog. Filing a new book is one branch's job; finding every book on 'tides' means calling all branches.","full":"<p>A local (document-partitioned) secondary index lives alongside the data on each shard and indexes only that shard's documents. Writes are cheap and atomic — adding a document updates one shard's index with no cross-shard coordination. This is the default in Elasticsearch (per-shard inverted index), MongoDB, and DynamoDB LSIs.</p><p>The cost is on reads: a query on a non-shard-key attribute doesn't know which shards hold matches, so it must <b>scatter-gather</b> — fan out to every shard, then merge results. Latency is bounded by the slowest shard, and tail latency grows with shard count.</p>","trap":"Forgetting that scatter-gather tail latency scales with shard count — at 1000 shards, p99 is governed by your single slowest shard on every secondary-attribute query.","related":["global-secondary-index","shard-key","horizontal-partitioning"]},
  "global-secondary-index": {"term":"Global (Term-Partitioned) Secondary Index","group":"DB-SHARD","aliases":["global secondary index","global index","term-partitioned","term partitioned","global secondary indexes"],"eli5":"Partition the index by the indexed value itself, so searches hit one place but each write may touch several index shards.","memory":"Global index = one central catalog organized by topic. Easy to find all 'tides' books in one lookup, but shelving one new book may mean updating multiple topic-cabinets at once.","full":"<p>A global (term-partitioned) secondary index is partitioned by the <b>indexed term</b> rather than by the source document's shard — every document with <code>status = active</code> is indexed in one place, wherever those documents physically live. Reads on the indexed attribute are targeted to a single index partition instead of scatter-gather.</p><p>The cost moves to writes: one document update may need to modify several index partitions (old term, new term, possibly on different nodes), so keeping the index strongly consistent requires a distributed transaction. Most systems (e.g. DynamoDB GSIs) therefore update global indexes <b>asynchronously</b>, trading consistency for write speed and exposing brief read-your-writes lag.</p>","trap":"Assuming a global secondary index gives you free strong consistency. It usually doesn't — to avoid distributed commits on every write, vendors update it asynchronously, so reads can lag the underlying write.","related":["local-secondary-index","shard-key","horizontal-partitioning"]},
  "resharding": {"term":"Resharding / Rebalancing","group":"DB-SHARD","aliases":["resharding","reshard","rebalancing","rebalance","fixed-count partitioning","pre-splitting"],"eli5":"Moving data to new shards as you grow — done badly it moves almost everything; done right it moves whole pre-made partitions.","memory":"Don't size partitions to nodes — pre-cut 1000 pizza slices for 8 guests, then just hand slices to a 9th guest when they arrive. No re-cutting.","full":"<p>Resharding redistributes data when nodes are added or removed. The naive <code>hash mod N</code> scheme is catastrophic here: changing <code>N</code> remaps nearly every key. The two standard fixes are consistent hashing (only ~K/N keys move) and <b>fixed-count partitioning</b> — pre-split into far more logical partitions than nodes (e.g. 1024 partitions on 8 nodes) and rebalance by reassigning whole partitions, never rehashing individual keys. This fixed-partition-count model is used by Riak, Elasticsearch, and Citus (default shard count independent of node count).</p><p>Even with a good scheme, live resharding is operationally hard: you must dual-write or backfill, keep routing consistent through the cutover, and not drop writes mid-migration. This pain is why the shard key and partition count are decisions you want to get right up front.</p>","trap":"Sizing partition count to node count (one partition per node). Then every scale event splits partitions and reshuffles data; fix the partition count high and independent of node count instead.","related":["consistent-hashing","hash-partitioning","shard-key","horizontal-partitioning"]}
});

</script>

<script>
/* Storage Engines: B-Tree vs LSM (DB-STORAGE) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-STORAGE","front":"Core write-path difference: B-tree vs LSM","back":"A <strong>B-tree</strong> updates pages <strong>in place</strong>: locate the leaf, modify it, and write the page back — random I/O at the page level. An <strong>LSM-tree</strong> never updates in place; it <strong>appends</strong> writes to an in-memory <code>memtable</code> (after a WAL append) and later flushes immutable sorted files to disk. This makes LSM writes mostly <strong>sequential</strong> and B-tree writes more scattered."},
  {"sec":"DB-STORAGE","front":"Why is the LSM write path considered \"write-optimized\"?","back":"Foreground writes only touch the WAL (a sequential append) and the in-memory <code>memtable</code> (a sorted structure like a skip-list) — no disk seeks on the hot path. Bulk disk work (flush + compaction) happens in the background as large sequential writes. B-trees instead pay random page reads/writes plus a WAL fsync on the critical path."},
  {"sec":"DB-STORAGE","front":"Why do B-trees suffer write amplification even for a 1-byte change?","back":"B-trees write at <strong>page granularity</strong> (commonly 4–16 KB). Changing one row dirties a whole page that must be flushed, so a tiny logical write becomes a full-page physical write. Page splits and rebalancing amplify further, and the change is also written once to the <strong>WAL</strong> — so the byte is effectively written twice (WAL + page) at minimum."},
  {"sec":"DB-STORAGE","front":"Why must the WAL be fsynced BEFORE the data pages in a B-tree?","back":"This is <strong>write-ahead logging</strong> / the <em>log-before-data</em> rule. The redo record for a change must be durable on disk before the corresponding dirty page is written, so that after a crash recovery can replay committed changes and roll back uncommitted ones. If the page were written first and the system crashed before the log, recovery couldn't reconstruct or undo the change. Commit returns only after the WAL fsync."},
  {"sec":"DB-STORAGE","front":"What is an SSTable and what are its two defining properties?","back":"An <strong>SSTable</strong> (Sorted String Table) is the on-disk file an LSM flushes from a memtable. It is <strong>sorted by key</strong> (enabling binary search / sparse indexing and merge joins during compaction) and <strong>immutable</strong> (never modified after being written — updates and deletes become new entries in newer files)."},
  {"sec":"DB-STORAGE","front":"How does an LSM serve a read, and why is it often slower than a B-tree read?","back":"A point read checks the <code>memtable</code>, then SSTables from <strong>newest to oldest</strong>, stopping at the first hit (newest wins). A key can live in many files, so one logical read may touch several files — <strong>read amplification</strong> (Bloom filters cut this for misses, but not for range scans). A B-tree read is typically a single root-to-leaf traversal of <code>O(log n)</code> pages, mostly cached, so reads are predictable and fast."},
  {"sec":"DB-STORAGE","front":"How do Bloom filters cut LSM read amplification?","back":"Each SSTable carries a <strong>Bloom filter</strong> over its keys. Before doing any I/O on a file, the engine queries the filter: a <em>negative</em> means the key is <strong>definitely absent</strong>, so the file is skipped with zero disk reads. Only possible-positives are probed. This eliminates almost all wasted reads for non-existent keys, but doesn't help <strong>range scans</strong> (Bloom filters only answer point membership)."},
  {"sec":"DB-STORAGE","front":"Leveled vs size-tiered compaction: the core tradeoff","back":"<strong>Size-tiered</strong> (Cassandra's historical default) merges several similarly-sized SSTables into one bigger file — lower <strong>write amplification</strong> but a key can sit in many overlapping files, so worse <strong>read &amp; space amplification</strong>. <strong>Leveled</strong> (RocksDB/LevelDB default) keeps each level's files <strong>non-overlapping</strong>, so a key is in at most one file per level — better read &amp; space amplification at the cost of much higher <strong>write amplification</strong> from constant re-merging."},
  {"sec":"DB-STORAGE","front":"Define the read/write/space amplification triangle (RUM conjecture)","back":"Three factors you trade off in a storage engine: <strong>read amplification</strong> (bytes/pages read per logical read), <strong>write amplification</strong> (bytes physically written per logical write), and <strong>space amplification</strong> (on-disk size ÷ live data size). The RUM conjecture says you <strong>can't minimize all three at once</strong> — pushing one down typically pushes another up. LSM leveled compaction trades write-amp for read+space-amp; size-tiered trades read+space-amp for write-amp; B-trees take a middle road with moderate read-amp and a small (~2x) write-amp floor."},
  {"sec":"DB-STORAGE","front":"Where does compaction write amplification come from in an LSM?","back":"The same key gets <strong>rewritten every time it passes through a compaction</strong>. In leveled compaction, data migrates down levels, each ~10x larger, and merging an upper-level file rewrites overlapping lower-level files — so a single record may be physically written 10–30x over its lifetime. This background write-amp is the LSM's hidden cost and the main consumer of disk bandwidth and SSD endurance."},
  {"sec":"DB-STORAGE","front":"How does an LSM handle deletes, and what's the side effect?","back":"A delete writes a <strong>tombstone</strong> — a marker that shadows the key in older SSTables — because files are immutable and the old value can't be erased in place. The key (and its now-dead data) lingers until compaction merges past the tombstone. Until then it still consumes space and must be read past, and prematurely dropping a tombstone can <strong>resurrect deleted data</strong> (e.g. Cassandra's <code>gc_grace_seconds</code>)."},
  {"sec":"DB-STORAGE","front":"Why do LSM-trees tend to be more space-efficient on disk than B-trees?","back":"B-tree pages are deliberately left partially empty (after random inserts, leaves average ~70% full) to absorb in-place inserts without splitting, wasting space via <strong>fragmentation</strong>. LSM SSTables are written <strong>densely packed and compressed</strong> in one sequential pass, with no per-page slack. The catch is transient: stale/overwritten versions and tombstones inflate size until compaction reclaims them."},
  {"sec":"DB-STORAGE","front":"Which engine is better for a write-heavy ingest workload, and why?","back":"<strong>LSM</strong>. Sequential append-only writes give high write throughput, lower per-write amplification on the hot path, and — critically on <strong>SSDs</strong> — far less random-write wear. B-trees bottleneck on random page writes and WAL fsync under heavy ingest. This is why RocksDB, Cassandra, ScyllaDB, and HBase back high-volume write systems while most OLTP RDBMS (Postgres, InnoDB) use B-trees for balanced read/write."},
  {"sec":"DB-STORAGE","front":"Do B-trees have write amplification? Contrast it with LSM's.","back":"Yes — but it's <strong>bounded and roughly predictable</strong>: every change is written at least <strong>twice</strong> (once to the WAL, once to the data page), plus occasional page splits and full-page-image logging (e.g. Postgres <code>full_page_writes</code> for the first write of a page after a checkpoint). LSM write-amp is <strong>unbounded by design and workload-dependent</strong>, growing with compaction depth (10–30x typical). So B-tree write-amp is small/predictable; LSM's is large but buys sequential I/O and write throughput."},
  {"sec":"DB-STORAGE","front":"Why are B-tree reads more latency-predictable than LSM reads?","back":"A B-tree lookup is always one root-to-leaf path of fixed height <code>O(log n)</code> over hot, cached internal pages — bounded worst case. An LSM read's cost depends on how many SSTables currently overlap the key, which varies with compaction state; a key just flushed vs one waiting on compaction differ widely. LSM tail latency therefore spikes during compaction and write stalls, whereas B-tree latency is steadier."},
  {"sec":"DB-STORAGE","front":"Does the WAL exist in BOTH engines? What does each use it for?","back":"Yes. <strong>B-tree</strong>: the WAL (redo/undo log) provides crash recovery and atomic commit for in-place page updates — replay redo, roll back undo. <strong>LSM</strong>: the WAL (commit log) makes the volatile <code>memtable</code> durable — if the process crashes before the memtable flushes to an SSTable, the WAL is replayed to rebuild it. In both, a write isn't acknowledged until its WAL record is fsynced (modulo async/group-commit modes)."}
);

Object.assign(GLOSSARY_DATA, {
  "lsm-tree": {"term":"LSM-Tree","group":"DB-STORAGE","aliases":["lsm-tree","lsm-trees","lsm","log-structured merge-tree","log-structured merge tree"],"eli5":"Buffer writes in RAM, periodically dump them as sorted immutable files, and merge those files in the background.","memory":"LSM = Log, Sort in memory, Merge later. Writes go to RAM; disk work is deferred and sequential.","full":"<p>A <b>Log-Structured Merge-tree</b> turns random writes into sequential ones. Incoming writes append to a WAL (for durability) and update an in-memory sorted <code>memtable</code>. When the memtable fills, it's flushed as an immutable, sorted <b>SSTable</b> on disk. A background <b>compaction</b> process merges SSTables to bound their count and reclaim space from overwrites/tombstones.</p><p>This is <b>write-optimized</b>: the hot path is a sequential WAL append plus an in-memory insert. The costs are <b>read amplification</b> (a key may live in several SSTables, mitigated by per-file Bloom filters) and <b>compaction write amplification</b> (records get rewritten repeatedly as they move through levels). Backs RocksDB, LevelDB, Cassandra, ScyllaDB, HBase, and the storage layer of many newer databases.</p>","trap":"Claiming LSM is \"faster for everything because writes are sequential.\" It's faster for writes but pays read- and space-amplification; point/range reads can touch many files and tail latency spikes during compaction.","worked":"RocksDB ingest: 1M writes/s land in the memtable + WAL with no seeks; a flush every ~64 MB produces one SSTable; leveled compaction then rewrites that data several times as it sinks to L1, L2, …","related":["b-tree","memtable","sstable","compaction","bloom-filter","write-ahead-log"]},
  "memtable": {"term":"Memtable","group":"DB-STORAGE","aliases":["memtable","memtables","mem-table"],"eli5":"The in-RAM sorted buffer that absorbs all fresh writes before they hit disk.","memory":"Memtable = mutable RAM table; its WAL twin is the durable on-disk copy.","full":"<p>The <b>memtable</b> is an in-memory, sorted, mutable structure (commonly a skip-list or balanced tree) that receives every write in an LSM engine. Because it's sorted, it can serve reads of recent data instantly and can be flushed to disk as an already-sorted SSTable in a single sequential pass. Durability for the memtable comes from the <b>WAL</b>: the write is logged before being acknowledged, so a crash before flush is recoverable by replaying the log.</p><p>When the memtable hits a size threshold it becomes <b>immutable</b> and a new active memtable takes over; the frozen one is flushed in the background. If flushes can't keep up with writes, the engine triggers <b>write stalls</b> / backpressure to avoid unbounded memory growth.</p>","trap":"Thinking the memtable alone makes writes durable. It's volatile — durability is the WAL. Lose the WAL and you lose un-flushed writes.","related":["lsm-tree","sstable","write-ahead-log","compaction"]},
  "sstable": {"term":"SSTable","group":"DB-STORAGE","aliases":["sstable","sstables","sorted string table","sorted-string table"],"eli5":"An immutable, sorted file of key-value pairs that an LSM writes when it flushes the memtable.","memory":"SSTable = Sorted + Sealed (immutable). Write once, merge later, never edit.","full":"<p>A <b>Sorted String Table</b> is the on-disk file format of an LSM. It is <b>sorted by key</b> — enabling binary search via a sparse block index, efficient range scans, and merge-based compaction — and <b>immutable</b>: once written it is never modified. Updates and deletes don't edit it; they're newer entries (or tombstones) in later SSTables, and \"newest wins\" resolves conflicts at read time.</p><p>An SSTable typically bundles its data blocks, a sparse index, and a <b>Bloom filter</b> so readers can skip the file entirely on a miss. Immutability is what makes LSM writes sequential, crash-safe (a half-written SSTable is simply discarded), and trivially cacheable/checksummable — but it forces compaction to ever reclaim space from superseded versions.</p>","trap":"Assuming a key lives in exactly one SSTable. The same key can appear in many SSTables across levels; the read path must resolve the newest version (Bloom filters + level structure limit how many it checks).","related":["lsm-tree","memtable","compaction","bloom-filter","tombstone"]},
  "compaction": {"term":"Compaction","group":"DB-STORAGE","aliases":["compaction","compactions","compacting","leveled compaction","size-tiered compaction"],"eli5":"The background merge that combines SSTables, drops dead versions, and keeps reads from getting slow.","memory":"Size-Tiered = Save Writes (cheap to write, costly to read). Leveled = Lean reads, Lots of writes.","full":"<p><b>Compaction</b> merges multiple SSTables into fewer, dropping overwritten values and expired <b>tombstones</b>. It bounds <b>read amplification</b> (fewer files to check) and <b>space amplification</b> (reclaims stale data) — but is itself the main source of LSM <b>write amplification</b>, since live data is rewritten on every merge.</p><p>The strategy sets the tradeoff. <b>Size-tiered</b> merges similarly-sized files into a bigger one: low write-amp, but overlapping files inflate read- and space-amp (and need ~2x headroom for the merge). <b>Leveled</b> keeps each level's files key-disjoint and each level ~10x the previous, so a key is in ≤1 file per level: low read/space-amp, high write-amp from constant re-leveling. RocksDB/LevelDB default to leveled; Cassandra historically defaulted to size-tiered (and also offers leveled and time-window strategies).</p>","trap":"Treating compaction as free background work. It competes for disk bandwidth and CPU with foreground traffic; under heavy ingest it triggers write stalls and is a top cause of LSM p99 latency spikes.","worked":"Leveled RocksDB: L0→L1 merge rewrites overlapping L1 files; as data sinks L1→L2→…(each 10x), a record may be physically written 10–30x total — that's the write-amp you pay for cheap reads.","related":["lsm-tree","sstable","tombstone","amplification-triangle"]},
  "amplification-triangle": {"term":"Amplification Triangle (RUM)","group":"DB-STORAGE","aliases":["amplification triangle","rum conjecture","read amplification","write amplification","space amplification","read-amplification","write-amplification","space-amplification"],"eli5":"Reads, writes, and space form a three-way tug-of-war — you can't make all three great at once.","memory":"RUM: Read, Update, Memory. Improve one, another pays the bill.","full":"<p>Storage engines trade off three quantities (the <b>RUM conjecture</b>): <b>Read amplification</b> = bytes/pages read per logical read; <b>Write amplification</b> = bytes physically written per logical write; <b>Space amplification</b> = on-disk bytes ÷ live logical bytes. The conjecture's claim is that you can't drive all three to their minimum simultaneously — pushing one down tends to push another up, so a design picks where to spend.</p><p>Concretely: LSM <b>leveled</b> compaction minimizes read- and space-amp by paying high write-amp; LSM <b>size-tiered</b> minimizes write-amp by accepting high read- and space-amp; <b>B-trees</b> take a middle road — modest read-amp (one tree traversal), a small (~2x) write-amp floor (WAL + page), and space-amp from partially-empty pages. There is no universally best engine; the right choice follows the workload's read/write/storage-cost mix.</p>","trap":"Saying one engine is strictly better, or that you can \"only optimize two of three.\" The precise claim is you can't minimize all three at once — and the comparison is meaningless without naming the workload (read-heavy vs write-heavy, SSD endurance, storage cost).","worked":"Same dataset: size-tiered Cassandra might use 1.5–2x disk and check 4+ SSTables per read but barely rewrite data; switch to leveled and disk/read-amp drop but compaction write-amp (and SSD wear) jumps several-fold.","related":["lsm-tree","b-tree","compaction"]},
  "tombstone": {"term":"Tombstone","group":"DB-STORAGE","aliases":["tombstone","tombstones"],"eli5":"A delete marker that shadows a key, because immutable SSTables can't erase the old value in place.","memory":"Tombstone = a gravestone over the key: the body's still there until the groundskeeper (compaction) clears the plot.","full":"<p>Because SSTables are immutable, an LSM can't physically remove a value on delete; instead it writes a <b>tombstone</b> — a marker that records \"this key is deleted as of this version.\" At read time the tombstone (being newer) shadows any older value in lower SSTables. The dead data and the tombstone are only physically reclaimed when <b>compaction</b> merges past them.</p><p>Tombstones create real operational hazards: they consume space and must be read/scanned over until purged (heavy delete or TTL workloads can make range scans crawl through millions of them), and dropping a tombstone <b>too early</b> can <b>resurrect</b> deleted data if an older SSTable holding the original value still exists — which is why Cassandra enforces <code>gc_grace_seconds</code> before reclaiming them.</p>","trap":"Thinking a delete frees space immediately. It does the opposite short-term — it adds a tombstone; space is reclaimed only at the next compaction past it, and premature purge can un-delete data.","related":["sstable","compaction","lsm-tree"]}
});

</script>

<script>
/* Wide-Column Stores (Cassandra/DynamoDB) (DB-WIDECOL) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-WIDECOL","front":"What are the two components of a Cassandra/DynamoDB primary key, and what does each control?","back":"The primary key is the <strong>partition key</strong> plus zero or more <strong>clustering keys</strong>. The partition key is hashed to determine <em>which node(s)</em> store the row (placement/distribution). Clustering keys define the <em>sort order of rows within a single partition</em> on disk. Together they must be unique per row; the partition key alone need not be."},
  {"sec":"DB-WIDECOL","front":"Why can't you do an efficient range scan across partition keys in Cassandra?","back":"Partition keys are <strong>hashed</strong> (e.g. Murmur3) before placement, so adjacent key values land on random, unrelated nodes — there is no global ordering of partitions to scan. Range queries are only efficient <em>within</em> a partition, over the clustering columns, which ARE stored sorted. Cross-partition range scans degrade to a full-cluster scan."},
  {"sec":"DB-WIDECOL","front":"In DynamoDB terms, what maps to Cassandra's partition key and clustering key?","back":"DynamoDB's <strong>partition key (HASH key)</strong> = Cassandra's partition key, and DynamoDB's <strong>sort key (RANGE key)</strong> = Cassandra's clustering key. A DynamoDB item with only a partition key is a simple key; partition + sort key is a composite key. Same physical model: hash for placement, sort key for in-partition ordering and range queries."},
  {"sec":"DB-WIDECOL","front":"What does 'query-first data modeling' mean in a wide-column store, and how does it differ from relational modeling?","back":"You design tables around <strong>access patterns, not entities</strong>: enumerate every query you need, then create one denormalized table per query so each read hits exactly one partition with no joins. This is the opposite of relational 3NF — you <em>duplicate</em> data across tables and accept write-time fan-out and update anomalies in exchange for predictable single-partition reads. There are no joins to fall back on."},
  {"sec":"DB-WIDECOL","front":"How do you satisfy two different access patterns (e.g. lookup-by-user vs lookup-by-email) in Cassandra without secondary indexes?","back":"Create <strong>two tables</strong> with the same data but different partition keys — one keyed by <code>user_id</code>, one keyed by <code>email</code> — and write to both on every update (often via a multi-partition <code>BATCH</code> or app-level dual write). This is intentional denormalization; the cost is keeping the copies consistent, which the database does NOT do for you."},
  {"sec":"DB-WIDECOL","front":"State the consistency formula for strong reads in Cassandra and give the canonical QUORUM example.","back":"You read the last acknowledged write when <code>R + W > N</code>, where N = replication factor and R/W are the read/write consistency levels (node counts). The canonical setup is <code>QUORUM</code> reads and writes at N=3: W=2, R=2, and 2+2 > 3, so the read set and write set always overlap by at least one node. It is <em>tunable per query</em>, not a fixed cluster setting."},
  {"sec":"DB-WIDECOL","front":"Does R+W>N give you linearizability in Cassandra? Why or why not?","back":"<strong>No.</strong> <code>R+W>N</code> guarantees the read quorum overlaps the last write quorum so you see the latest <em>committed</em> value, but writes are not serialized — two concurrent writes both succeed and are reconciled later by last-write-wins timestamp. For true linearizable compare-and-set you need Cassandra's <strong>lightweight transactions (LWT / Paxos)</strong> with <code>IF</code> conditions, which are far more expensive."},
  {"sec":"DB-WIDECOL","front":"How does Cassandra resolve conflicting writes to the same cell, and what is the silent danger?","back":"<strong>Last-write-wins (LWW)</strong> by cell timestamp: the write with the highest timestamp wins, per individual cell. The danger is <strong>silent lost updates</strong> — if two clients read-modify-write concurrently, the later timestamp clobbers the other with no error, no conflict marker, and no merge. Read-modify-write without LWT is unsafe."},
  {"sec":"DB-WIDECOL","front":"What happens to LWW correctness if two nodes' clocks disagree?","back":"LWW trusts the client/coordinator-supplied timestamp, so <strong>clock skew corrupts ordering</strong>: a write that happened <em>later</em> in real time but carried a lower timestamp loses and is silently discarded. Worse, a node with a fast clock can make stale writes 'win' for a long time. This makes NTP discipline a correctness concern, not just an ops nicety."},
  {"sec":"DB-WIDECOL","front":"How does conflict resolution differ between DynamoDB and Cassandra for concurrent writes?","back":"Both default to <strong>last-write-wins</strong> for unconditional writes. The safe alternative differs in cost: Cassandra's <code>IF</code> conditions are <strong>lightweight transactions over Paxos</strong> (multi-round, cross-node, much slower than a normal write), whereas DynamoDB's <strong>conditional writes / <code>ConditionExpression</code></strong> (e.g. version-number optimistic locking) are a <em>single-shard</em> compare-and-set with roughly the latency of an ordinary write — no consensus round-trip."},
  {"sec":"DB-WIDECOL","front":"Trace the LSM write path in Cassandra from commit to flush.","back":"<ul><li>Write appends to the <strong>commit log</strong> (durability, sequential disk write)</li><li>and updates the in-memory <strong>memtable</strong> (sorted by key).</li><li>When the memtable fills, it flushes to an immutable, sorted <strong>SSTable</strong> on disk; the corresponding commit-log segment can then be recycled.</li></ul>Writes never do random in-place updates — that's why they're fast and append-only."},
  {"sec":"DB-WIDECOL","front":"Why are LSM-tree writes fast but reads potentially slow, and what mitigates the read cost?","back":"Writes are fast because they're <strong>append-only</strong> (commit log + memtable, no read-before-write, no in-place mutation). Reads can be slow because a single row's data may be scattered across the memtable plus many immutable SSTables, requiring a merge. Mitigations: <strong>bloom filters</strong> (skip SSTables that can't hold the key), partition/key caches, and <strong>compaction</strong> (merges SSTables, drops shadowed/expired cells)."},
  {"sec":"DB-WIDECOL","front":"What is a tombstone, why does it exist, and how does it hurt reads?","back":"A <strong>tombstone</strong> is a marker written on DELETE (or TTL expiry) that records 'this cell/row is dead at timestamp T'. It's needed because SSTables are immutable — you can't erase data in place, and the delete must shadow older copies on other replicas until compaction. Reads must scan <em>through</em> accumulated tombstones to know what's actually live, so heavy delete/TTL workloads make reads slow and can trip <code>tombstone_failure_threshold</code> (default 100k), failing the query."},
  {"sec":"DB-WIDECOL","front":"Why is a queue-like table (insert then delete each row) an anti-pattern in Cassandra?","back":"It generates a tombstone for every processed row, and those tombstones pile up <em>in the same partition</em> you keep reading from the front of. Reads at the head of the queue must skip over thousands of tombstones for already-deleted rows until <code>gc_grace_seconds</code> (default 10 days) passes and compaction removes them — causing latency spikes and read timeouts. Wide-column stores are not message queues."},
  {"sec":"DB-WIDECOL","front":"What makes a partition 'too large', and why is it dangerous?","back":"A partition grows unbounded when its partition key has <strong>low cardinality or no time/size bucketing</strong> (e.g. partition by <code>sensor_id</code> with years of readings). Danger: the whole partition is owned by one replica set, so it creates hotspots, can't be split, blows past memory during compaction/repair, and slows every read of that partition. Rules of thumb: keep partitions under ~100MB / ~100k rows; <strong>bucket</strong> by time (e.g. <code>(sensor_id, day)</code>) to bound size."},
  {"sec":"DB-WIDECOL","front":"Why are naive secondary indexes on high-cardinality columns an anti-pattern in Cassandra?","back":"A native (local) secondary index is stored <strong>per-node</strong> alongside the base data, so a query on it has no partition key to route by and must <strong>fan out to every node (scatter-gather)</strong>. On a high-cardinality column (e.g. email, UUID) each value lives on few nodes, so you query the whole cluster to find a handful of rows — terrible scaling. Prefer a <strong>denormalized lookup table</strong> keyed by that column (a materialized view is an alternative, though long considered experimental)."},
  {"sec":"DB-WIDECOL","front":"What does Cassandra's logged BATCH actually guarantee about atomicity and isolation?","back":"A <strong>logged BATCH</strong> guarantees <em>atomicity</em> — all statements eventually apply or none do (via the batchlog) — and is meant to keep <em>denormalized copies in sync</em> across tables. Isolation is only guaranteed for a <strong>single-partition</strong> batch; a <strong>multi-partition</strong> batch is NOT isolated (concurrent reads can see partial results) and is NOT a performance optimization — it pressures the coordinator, so batches should be small and ideally single-partition."}
);

Object.assign(GLOSSARY_DATA, {
  "partition-key": {"term":"Partition Key","group":"DB-WIDECOL","aliases":["partition key","partition keys","hash key","partition column"],"eli5":"The part of the key that decides which machine your row lives on.","memory":"Partition key = the postal code that routes the row to a building; clustering key = the apartment number that sorts it inside.","full":"<p>The <b>partition key</b> is the portion of the primary key that is <b>hashed</b> (Murmur3 in Cassandra) to produce a token, which maps via consistent hashing to the replica nodes that own the row. All rows sharing a partition key live together on the same node set and form a single <b>partition</b> — the unit of storage, replication, and most read/write atomicity.</p><p>Because placement is by hash, you can only do an O(1) point lookup or a sorted scan <i>within</i> a partition; there is no efficient ordering <i>across</i> partition keys. Choosing the partition key is the single most consequential modeling decision: it determines data distribution (avoid hotspots), partition size (avoid unbounded growth), and which queries are cheap.</p>","trap":"Saying the partition key 'sorts' the data. It does the opposite — it's hashed, destroying order across partitions. Only clustering keys sort, and only within a partition.","worked":"<code>PRIMARY KEY ((sensor_id, day), reading_ts)</code>: the composite partition key is <code>(sensor_id, day)</code> (note the double parens) which buckets one sensor's readings per day onto a node; <code>reading_ts</code> clusters them in time order within that day.","related":["clustering-key","query-first-modeling","large-partition"]},
  "clustering-key": {"term":"Clustering Key","group":"DB-WIDECOL","aliases":["clustering key","clustering keys","clustering column","clustering columns","sort key","range key"],"eli5":"The part of the key that sorts rows inside one partition so you can range-scan them.","memory":"Clustering = how rows CLUSTER together in sorted order under one partition.","full":"<p>A <b>clustering key</b> (DynamoDB: sort/RANGE key) defines the on-disk sort order of rows <i>within</i> a single partition. Rows are stored physically ordered by the clustering columns, which makes range queries (<code>WHERE ... AND ts > ?</code>), <code>ORDER BY</code>, and <code>LIMIT</code> cheap as long as they stay inside one partition and respect the leftmost-prefix ordering of the clustering columns.</p><p>You set the order with <code>WITH CLUSTERING ORDER BY (ts DESC)</code>, which lets you read the newest rows first with no sort at query time. Clustering columns are also what make slices and paging efficient — the engine seeks into the sorted run rather than scanning the whole partition.</p>","trap":"Thinking you can filter on a later clustering column while skipping an earlier one. Like a composite B-tree index, you must supply a leftmost prefix of the clustering columns (or use ALLOW FILTERING, which scans).","related":["partition-key","query-first-modeling"]},
  "query-first-modeling": {"term":"Query-First Data Modeling","group":"DB-WIDECOL","aliases":["query-first","query-first modeling","query-driven modeling","denormalization","denormalized table","one table per query"],"eli5":"List the queries you need, then build one table shaped for each — duplicating data instead of joining.","memory":"Relational: store once, join many. Wide-column: write many, read one.","full":"<p><b>Query-first modeling</b> inverts relational design: instead of normalizing entities and joining at read time, you enumerate every access pattern and create a denormalized table per pattern, each with a partition key chosen so the query hits exactly one partition. There are no joins and no efficient ad-hoc queries, so an access pattern you didn't model is effectively unsupported (short of a full scan).</p><p>The cost is <b>write-time fan-out and update anomalies</b>: the same fact lives in several tables, and your application (or a logged batch) must update all copies. You trade relational integrity and flexibility for predictable, horizontally-scalable single-partition reads.</p>","trap":"Modeling entities first ('a Users table, an Orders table') then bolting on indexes. That's the relational reflex; in Cassandra it produces scatter-gather queries. Model the QUERY, accept the duplication.","worked":"Need users by id AND by email? Build <code>users_by_id</code> and <code>users_by_email</code>, write both on signup. There is no 'users' table with a unique index — you maintain two tables.","related":["partition-key","clustering-key","secondary-index","lww"]},
  "tunable-consistency": {"term":"Tunable Consistency","group":"DB-WIDECOL","aliases":["tunable consistency","consistency level","consistency levels","QUORUM","quorum","ONE","ALL","R+W>N","R + W > N"],"eli5":"You pick per-query how many replicas must answer, trading latency for freshness.","memory":"R + W > N: the two quorums must 'touch' on at least one node — overlap = you can't miss the last write.","full":"<p>Cassandra lets each query choose a <b>consistency level</b> — <code>ONE</code>, <code>QUORUM</code>, <code>LOCAL_QUORUM</code>, <code>ALL</code>, etc. — for reads and writes independently. With replication factor N, a write at level W is acked once W replicas persist it, and a read at level R waits for R replicas. When <b>R + W > N</b>, the read set is guaranteed to overlap the last successful write set by at least one replica, so reads see the most recent acknowledged write.</p><p>This is a freshness-vs-latency-vs-availability dial, not a global mode: you can run <code>LOCAL_QUORUM</code> for money paths and <code>ONE</code> for telemetry in the same cluster. Note that overlap guarantees seeing the latest committed value but does NOT serialize concurrent writes.</p>","trap":"Claiming QUORUM gives linearizability. It gives strong/monotonic reads of committed data, but concurrent writes still race and resolve by LWW. Linearizable CAS needs lightweight transactions (Paxos), not just R+W>N.","worked":"N=3, W=QUORUM(2), R=QUORUM(2): 2+2=4 > 3, overlap of 1 guaranteed → read the last acknowledged write. Drop the read to <code>ONE</code> (R=1): 1+2=3, not > 3 → you may read a stale replica.","related":["lww","lsm-tree"]},
  "lww": {"term":"Last-Write-Wins (LWW)","group":"DB-WIDECOL","aliases":["last-write-wins","last write wins","LWW","lww","cell timestamp","write timestamp"],"eli5":"When two writes conflict, the one with the bigger timestamp wins — the other vanishes silently.","memory":"LWW = 'highest timestamp clobbers all', no merge, no warning — a guillotine, not a negotiation.","full":"<p>Cassandra resolves conflicts with <b>last-write-wins at the cell level</b>: every column value carries a timestamp (microseconds, client- or coordinator-supplied), and on read/repair the highest-timestamp cell wins. There is no vector-clock merge and no sibling/conflict surfaced to the application — resolution is automatic and total per cell. DynamoDB likewise defaults to LWW for unconditional writes.</p><p>The hazard is <b>silent lost updates</b>: two clients that read-modify-write concurrently both succeed, and the later timestamp overwrites the other with no error. Correctness also hinges on clock quality — skew lets a stale write 'win' or a fresh write lose. Safe read-modify-write requires a conditional write: Cassandra's <b>lightweight transactions</b> (<code>IF</code> / Paxos compare-and-set, costly) or DynamoDB's single-shard <code>ConditionExpression</code> (cheap by comparison).</p>","trap":"Assuming a successful write means your update stuck. Under concurrency a later writer can silently erase it. And LWW depends on synced clocks — skew is a correctness bug, not just monitoring noise.","worked":"Two clients read balance=100. A writes 100+10=110 @ t=5; B writes 100-20=80 @ t=6. Final = 80. A's +10 is lost with no conflict raised. The fix is an LWT: <code>UPDATE ... IF balance=100</code>.","related":["tunable-consistency","tombstone"]},
  "large-partition": {"term":"Large / Unbounded Partition","group":"DB-WIDECOL","aliases":["large partition","wide partition","unbounded partition","hot partition","huge partition","bucketing","partition size"],"eli5":"A partition key that keeps collecting rows forever becomes a giant, un-splittable hotspot.","memory":"One partition = one node's burden. No bucket, no bound — bucket by time/hash to cap the blast radius.","full":"<p>A partition is the unit of placement and is owned by a single replica set, so its size is bounded only by how the partition key is chosen. A low-cardinality or time-unbounded key (e.g. partition solely by <code>sensor_id</code>) grows without limit, creating <b>hotspots</b> (one node takes all the traffic), memory pressure during compaction and repair, and slow reads of an ever-growing run. Partitions cannot be split after the fact.</p><p>The fix is <b>bucketing</b>: add a time or hash component to the partition key — e.g. <code>((sensor_id, day), reading_ts)</code> — to cap each partition's size while keeping related rows co-located. Rules of thumb: target well under ~100MB and ~100k rows per partition (the hard ceiling is ~2 billion cells, but you want to stay far below it).</p>","trap":"Partitioning by a coarse key 'for locality' (e.g. by country, or by a single device id over all time). It co-locates data but creates an enormous hot partition that can't scale out.","worked":"IoT: <code>PRIMARY KEY (sensor_id, ts)</code> grows one partition per sensor forever. Re-key to <code>PRIMARY KEY ((sensor_id, day), ts)</code> so each partition holds one day, bounding size and spreading load across nodes/time.","related":["partition-key","tombstone","lsm-tree"]}
});
