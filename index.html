<script>
/* Foundations · API Design & Protocols (FND-API) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-API","front":"The 6 REST constraints (Fielding)","back":"<ul><li><strong>Client-server</strong> separation</li><li><strong>Stateless</strong> — each request self-contained</li><li><strong>Cacheable</strong> — responses label themselves cacheable or not</li><li><strong>Uniform interface</strong> — the central constraint (resources, representations, self-descriptive messages, HATEOAS)</li><li><strong>Layered system</strong> — proxies/gateways are transparent</li><li><strong>Code-on-demand</strong> (optional)</li></ul>"},
  {"sec":"FND-API","front":"Statelessness: what it does and doesn't forbid","back":"It forbids <em>per-client session state on the server</em> — every request must carry everything needed to process it (auth token, params). It does <strong>not</strong> forbid <em>resource state</em> in a database. The payoff is horizontal scalability: any node can serve any request, so load balancers need no sticky sessions."},
  {"sec":"FND-API","front":"Safe vs idempotent HTTP methods","back":"<strong>Safe</strong> = no observable server state change: <code>GET</code>, <code>HEAD</code>, <code>OPTIONS</code> (also <code>TRACE</code>). <strong>Idempotent</strong> = N identical calls ≡ 1 call's effect: all safe methods plus <code>PUT</code> and <code>DELETE</code>. <code>POST</code> and <code>PATCH</code> are neither by default. All safe methods are idempotent; the converse is false (<code>DELETE</code> is idempotent but not safe)."},
  {"sec":"FND-API","front":"Why is DELETE idempotent but not safe?","back":"<strong>Idempotent</strong>: deleting the same resource twice leaves the same end state (gone) — even if the 2nd call returns <code>404</code>, the <em>state</em> is unchanged. <strong>Not safe</strong>: it mutates server state. Idempotency is about the resulting state, not the response code, which is the classic gotcha."},
  {"sec":"FND-API","front":"PUT vs PATCH vs POST","back":"<code>PUT</code> = full replacement at a client-known URI, idempotent. <code>PATCH</code> = partial update; idempotent only if the patch is absolute (set field=x), not relative (increment). <code>POST</code> = create-under-collection / non-idempotent action; the server assigns the URI. Use <code>PUT</code> when the client owns the ID, <code>POST</code> when the server mints it."},
  {"sec":"FND-API","front":"HTTP status-code families (and the ones that bite)","back":"<strong>2xx</strong> success, <strong>3xx</strong> redirect, <strong>4xx</strong> client error (don't retry as-is), <strong>5xx</strong> server error. Per RFC 9110, an idempotent request is safe to auto-retry on a <em>connection failure/timeout</em>; for a 5xx you can retry idempotent calls (with backoff), but beware a 5xx whose effect may already have landed. Know the sharp ones: <code>201 Created</code>, <code>202 Accepted</code> (async), <code>204 No Content</code>, <code>401</code> (unauthenticated) vs <code>403</code> (authenticated-but-forbidden), <code>409 Conflict</code>, <code>422</code> (validation), <code>429 Too Many Requests</code>, <code>503</code> (with <code>Retry-After</code>)."},
  {"sec":"FND-API","front":"Idempotency keys: how a payments API makes POST safe to retry","back":"Client generates a unique key (UUID) and sends it as <code>Idempotency-Key</code>. The server stores key→response on first success; a retry with the same key returns the <em>cached</em> response instead of charging twice. Essential because <code>POST</code> is non-idempotent and network timeouts leave the client unsure whether the first call landed. Keys need a TTL and must hash the request body to reject key-reuse with a different payload."},
  {"sec":"FND-API","front":"Offset vs cursor (keyset) pagination","back":"<strong>Offset</strong> (<code>LIMIT 20 OFFSET 10000</code>) is simple and jumpable but O(offset) to scan and <em>unstable</em> — inserts/deletes shift rows, causing skips/dupes. <strong>Cursor/keyset</strong> (<code>WHERE id > :last ORDER BY id LIMIT 20</code>) fetches the next page via an index seek (O(log n) to locate + O(page) to read, independent of how deep you are) and is stable under writes, but can't random-jump to page N. Cursor wins for large, mutating datasets and infinite scroll."},
  {"sec":"FND-API","front":"API versioning strategies and their tradeoffs","back":"<ul><li><strong>URI path</strong> (<code>/v2/users</code>) — most visible, easy routing/caching, but not 'RESTful' (same resource, two URIs)</li><li><strong>Header / media-type</strong> (<code>Accept: application/vnd.api.v2+json</code>) — clean URIs, harder to test/cache</li><li><strong>Query param</strong> (<code>?version=2</code>) — easy but pollutes caching</li></ul>Prefer additive, backward-compatible changes so you rarely bump the major version at all."},
  {"sec":"FND-API","front":"gRPC/protobuf vs REST/JSON — when to pick which","back":"<strong>gRPC</strong>: binary protobuf over HTTP/2 (multiplexing, streaming), schema-first <code>.proto</code> contract, codegen, low latency — ideal for internal service-to-service and high-throughput data planes. <strong>REST/JSON</strong>: human-readable, ubiquitous tooling/caching, browser-native — ideal for public/external and broad-compatibility APIs. gRPC's weaknesses: poor browser support (needs grpc-web + a proxy) and not human-debuggable on the wire."},
  {"sec":"FND-API","front":"GraphQL: the problem it solves and its costs","back":"Solves REST's <strong>over-fetching</strong> (endpoint returns fields you don't need) and <strong>under-fetching</strong> (you'd need multiple round-trips to stitch related data) — the client asks for exactly the shape it wants from one endpoint. Costs: HTTP caching is hard (everything is one <code>POST /graphql</code>), the server-side <strong>N+1 resolver problem</strong> (mitigated by DataLoader batching), and unbounded query complexity needs depth/cost limiting to avoid DoS."},
  {"sec":"FND-API","front":"Real-time delivery: polling vs long-polling vs SSE vs WebSocket","back":"<ul><li><strong>Polling</strong>: client re-requests on a timer — simple, wasteful, high latency.</li><li><strong>Long-polling</strong>: server holds the request open until data arrives (or timeout), responds, then the client immediately re-requests — near-real-time over plain HTTP.</li><li><strong>SSE</strong>: server→client one-way text stream over a single long-lived HTTP response, auto-reconnect via <code>Last-Event-ID</code>.</li><li><strong>WebSocket</strong>: full-duplex bidirectional over one TCP connection after an HTTP <code>Upgrade</code> — best for chat/trading/games.</li></ul>"},
  {"sec":"FND-API","front":"SSE vs WebSocket — how to choose","back":"Use <strong>SSE</strong> when data flows one way (server→client: live feeds, notifications, dashboards): it runs over ordinary HTTP, auto-reconnects with <code>Last-Event-ID</code>, and traverses proxies cleanly (over HTTP/1.1 watch the ~6-connections-per-origin browser cap — HTTP/2 multiplexing removes it). Use <strong>WebSocket</strong> when you need <strong>bidirectional</strong>, low-latency messaging (chat, multiplayer, collaborative editing). Don't reach for WebSocket if the client never talks back — SSE is simpler and HTTP-friendly."},
  {"sec":"FND-API","front":"Webhooks: delivery guarantees and how to consume one safely","back":"A webhook is a server-to-server HTTP <code>POST</code> the provider sends on an event (reverse API). Treat delivery as <strong>at-least-once</strong>: it can retry, so consumers must be <strong>idempotent</strong> (dedupe on event ID). Verify authenticity via an <strong>HMAC signature</strong> header over the raw body, return <code>2xx</code> fast and process async, and expect <strong>out-of-order</strong> arrival. Contrast with polling: webhooks push, eliminating wasted empty polls."}
);

Object.assign(GLOSSARY_DATA, {
  "rest-uniform-interface": {"term":"Uniform Interface","group":"FND-API","aliases":["uniform interface","rest","restful","rest principles","hateoas"],"eli5":"Talk to every thing the same way: name it with a URL, act on it with standard HTTP verbs, and let the response tell you what you can do next.","memory":"\"Nouns in the URL, verbs in the method.\" If your endpoint is <code>/getUser?id=5</code> you've put a verb in the noun slot — that's RPC, not REST.","full":"<p>The uniform interface is REST's defining constraint, with four sub-constraints: <b>identification of resources</b> (URIs name things), <b>manipulation through representations</b> (you send/receive JSON/XML, not the resource itself), <b>self-descriptive messages</b> (each request carries its own method, media type, and cache directives), and <b>HATEOAS</b> (responses embed links to next actions so clients don't hardcode URIs).</p><p>This uniformity is what lets generic infrastructure — caches, proxies, gateways — operate on any REST API without knowing the domain. The tradeoff Fielding acknowledged: a uniform interface is less efficient than a purpose-built one, but it buys evolvability and visibility at internet scale.</p>","trap":"Claiming an API is 'RESTful' when it's really JSON-over-HTTP RPC. The honest answer in interviews: almost no production API implements HATEOAS (Richardson Maturity Level 3); most stop at resource URIs + proper verbs (Level 2), and that's usually the pragmatic right call.","related":["statelessness","http-idempotency","graphql"]},
  "http-idempotency": {"term":"Idempotency (HTTP methods)","group":"FND-API","aliases":["idempotent","idempotency","safe method","safe methods"],"eli5":"An idempotent call gives the same end result whether you make it once or ten times — so retrying after a timeout is safe.","memory":"Safe ⊂ Idempotent. Every safe method is idempotent; not every idempotent method is safe (<code>DELETE</code>/<code>PUT</code> mutate but are idempotent).","full":"<p><b>Safe</b> methods (<code>GET</code>, <code>HEAD</code>, <code>OPTIONS</code>, <code>TRACE</code>) cause no observable state change. <b>Idempotent</b> methods are all the safe ones plus <code>PUT</code> and <code>DELETE</code> — they produce the same server <i>state</i> for 1 vs N identical calls. <code>POST</code> and <code>PATCH</code> are neither by default. This matters because networks fail mid-flight: per RFC 9110, a client may automatically retry an idempotent request after a connection failure/timeout, which is the foundation of safe retry logic and at-least-once delivery.</p><p>Idempotency is defined by resulting <b>state</b>, not response code — a second <code>DELETE</code> returning <code>404</code> is still idempotent. To make <code>POST</code> retry-safe, you bolt on an idempotency key.</p>","trap":"\"DELETE isn't idempotent because the second call returns 404.\" The status code differs, but the resource state is identical (gone) — so it IS idempotent. Idempotency is about state, not the response.","worked":"<code>PUT /users/5 {name:\"Ada\"}</code> ten times → user 5 is always <code>{name:\"Ada\"}</code>. <code>POST /users {name:\"Ada\"}</code> ten times → ten users. That's why create-by-POST needs an idempotency key.","related":["idempotency-key","statelessness","webhook"]},
  "idempotency-key": {"term":"Idempotency Key","group":"FND-API","aliases":["idempotency key","idempotency-key","idempotency keys"],"eli5":"A unique ticket you attach to a 'charge me' request so that if you have to resend it, the server honors it only once.","memory":"It's a 'do this at most once' ticket. The server's job: 'have I seen this ticket? then replay, don't re-run.'","full":"<p>An idempotency key is a client-generated unique token (typically a UUID) sent in a header like <code>Idempotency-Key</code> to make an otherwise non-idempotent <code>POST</code> safe to retry. On first receipt the server processes the request and persists <code>key → (status, response)</code>; any retry with the same key short-circuits and replays the stored response, so a double-submit or timeout-driven retry can't create two charges/orders.</p><p>Robust implementations: scope the key per endpoint+account, give it a TTL (e.g. 24h), store a hash of the request body so reusing a key with a <i>different</i> payload is rejected (<code>422</code>), and handle the concurrent-retry race with a lock or a unique constraint on the key.</p>","trap":"Assuming the key alone is enough. Without binding it to the request body, a client that accidentally reuses a key for a different operation gets the wrong cached response — production keys must validate the payload hash.","worked":"Stripe: <code>POST /v1/charges</code> with <code>Idempotency-Key: a1b2...</code>. Timeout → client retries same key → Stripe returns the original charge, customer billed once.","related":["http-idempotency","webhook","statelessness"]},
  "cursor-pagination": {"term":"Cursor Pagination","group":"FND-API","aliases":["cursor pagination","keyset pagination","cursor","offset pagination","seek pagination"],"eli5":"Instead of saying 'skip 10,000 rows,' you say 'give me the rows after this exact item' — fast and stable even as data changes.","memory":"Offset = 'skip 10,000' (re-counts every time). Cursor = 'start after this bookmark' (seeks straight there). Infinite scroll → cursor.","full":"<p><b>Offset pagination</b> (<code>LIMIT n OFFSET m</code>) is intuitive and supports jumping to an arbitrary page, but the database must scan and discard all <code>m</code> skipped rows (O(offset), slow deep in the list), and it's <b>unstable</b>: a row inserted/deleted near the front shifts every subsequent row, causing duplicates or skipped items between page loads.</p><p><b>Cursor (keyset) pagination</b> encodes the last-seen sort key and fetches <code>WHERE (sort_key) > :cursor ORDER BY sort_key LIMIT n</code>. Each page is an index seek to the cursor (O(log n)) plus a sequential read of n rows — cost independent of how deep you are — and it's stable under concurrent writes. The cost: no random page jumps, and the cursor must be over a unique, ordered column (often a composite of <code>(created_at, id)</code> to break ties).</p>","trap":"Cursoring on a non-unique column (e.g. just <code>created_at</code>): ties at the boundary silently drop or duplicate rows. Always make the cursor a unique tiebreaker like <code>(created_at, id)</code>.","worked":"Page 1: <code>...ORDER BY id LIMIT 20</code> → last id = 4839. Page 2: <code>WHERE id > 4839 ORDER BY id LIMIT 20</code> — instant, regardless of inserts above.","related":["rest-uniform-interface"]},
  "grpc-protobuf": {"term":"gRPC / Protobuf","group":"FND-API","aliases":["grpc","protobuf","protocol buffers","grpc/protobuf"],"eli5":"A fast, schema-first way for services to call each other using compact binary messages over HTTP/2 instead of chatty JSON.","memory":"gRPC = internal, fast, typed, binary. REST/JSON = external, readable, cacheable, universal. 'Binary for machines, JSON for humans.'","full":"<p>gRPC is an RPC framework using <b>Protocol Buffers</b> (a binary, schema-defined serialization) over <b>HTTP/2</b>. You write a <code>.proto</code> contract, generate strongly-typed client/server stubs in many languages, and get small payloads, low latency, and four call types: unary, server-streaming, client-streaming, and bidirectional streaming (the latter enabled by HTTP/2 multiplexing).</p><p>Versus REST/JSON: gRPC wins on throughput, latency, contract enforcement, and streaming — ideal for <b>internal east-west service traffic</b> and data planes. REST/JSON wins on human readability, universal tooling, HTTP caching, and browser support. gRPC's pain points: browsers can't speak it natively (need grpc-web + a proxy), payloads aren't human-debuggable, and load balancing HTTP/2 long-lived connections needs an L7-aware proxy.</p>","trap":"\"gRPC is always faster so use it everywhere.\" For a public/browser-facing API the lack of native browser support, weaker caching, and opaque payloads often make REST/JSON the better choice despite higher per-byte cost.","related":["graphql","rest-uniform-interface"]},
  "graphql": {"term":"GraphQL","group":"FND-API","aliases":["graphql","over-fetching","under-fetching","overfetching","underfetching","n+1"],"eli5":"One endpoint where the client writes a query for exactly the fields it wants, so it never gets too much or too little data in one round-trip.","memory":"REST = server decides the shape (fixed endpoints). GraphQL = client decides the shape (one query). Trade fixed-shape simplicity + free HTTP caching for flexible-shape power + caching/complexity headaches.","full":"<p>GraphQL exposes a single endpoint and a typed schema; clients send a query describing the precise shape they want, fixing two REST pain points: <b>over-fetching</b> (a fixed endpoint returns fields you ignore) and <b>under-fetching</b> (you must call several endpoints and stitch results — an N+1 of <i>client round-trips</i>). It shines when many heterogeneous clients (mobile, web) need different slices of a deeply linked graph.</p><p>Costs that interviewers probe: <b>HTTP caching breaks</b> because everything is one <code>POST /graphql</code> (you push caching into the app/persisted-queries layer); the <b>N+1 resolver problem</b> on the server — a distinct N+1, where each field resolver hits the DB (mitigated by <b>DataLoader</b> batching); and unbounded query depth/breadth is a DoS vector, so you need query cost analysis, depth limits, and persisted queries.</p>","trap":"Thinking GraphQL 'solves N+1.' It removes N+1 client round-trips but can <i>introduce</i> an N+1 of database queries in resolvers; you still need DataLoader-style batching server-side.","related":["grpc-protobuf","rest-uniform-interface"]},
  "websocket": {"term":"WebSocket vs SSE","group":"FND-API","aliases":["websocket","websockets","sse","server-sent events","long-polling","long polling"],"eli5":"WebSocket is a two-way phone line kept open; SSE is the server reading you a one-way news ticker over a normal web connection.","memory":"One way → SSE. Both ways → WebSocket. Don't pull out the two-way phone line (WebSocket) when a one-way ticker (SSE) will do.","full":"<p>For server-pushed data the options escalate in capability: <b>polling</b> (client asks on a timer — wasteful, latency = interval), <b>long-polling</b> (server holds the request open until it has data, replies, then the client immediately re-requests — near-real-time over plain HTTP), <b>SSE</b> (a single long-lived HTTP response streaming UTF-8 text events server→client, with built-in auto-reconnect via <code>Last-Event-ID</code>), and <b>WebSocket</b> (an HTTP <code>Upgrade</code> to a persistent full-duplex TCP channel).</p><p>Choose <b>SSE</b> for one-way streams (notifications, live metrics, feeds): it's simpler, rides ordinary HTTP/proxies, and reconnects itself — though over HTTP/1.1 it's bound by the ~6-connections-per-origin browser limit, which HTTP/2 multiplexing lifts. Choose <b>WebSocket</b> for <b>bidirectional</b>, low-latency interaction (chat, trading, multiplayer, collaborative editing). WebSocket's costs: it bypasses normal HTTP semantics (auth, caching, some proxies), needs its own heartbeat/reconnect logic, and is harder to scale/load-balance. SSE also carries text only — to send binary you must encode it (e.g. base64).</p>","trap":"Reaching for WebSocket for a simple live dashboard. If the client never sends data back, SSE gives you auto-reconnect and HTTP-friendliness for free — WebSocket just adds operational burden.","related":["webhook","http-idempotency"]},
  "webhook": {"term":"Webhook","group":"FND-API","aliases":["webhook","webhooks","reverse api"],"eli5":"Instead of you repeatedly asking 'anything new?', the other server calls YOU the moment something happens.","memory":"Webhook = 'don't call us, we'll call you.' Polling pulls; webhooks push. Always: verify signature, dedupe by event ID, ack fast, process async.","full":"<p>A webhook is a user-defined HTTP callback: the provider sends a <code>POST</code> to your registered URL when an event occurs, inverting the normal client→server direction ('reverse API' / push instead of poll). It eliminates the wasted empty polls of pull-based checking and delivers events with low latency.</p><p>Consuming webhooks safely is a design problem interviewers love: delivery is <b>at-least-once</b> (retries on non-2xx or timeout), so handlers must be <b>idempotent</b> via the event ID; events can arrive <b>out of order</b>, so reconcile by timestamp/version, not arrival; authenticity is verified with an <b>HMAC signature</b> over the raw body (never trust the payload alone); and you should return <code>2xx</code> immediately and process asynchronously so slow work doesn't trigger provider retries.</p>","trap":"Treating webhook delivery as exactly-once and ordered. It's at-least-once and can be out-of-order — non-idempotent handlers will double-process retried events (e.g. ship an order twice).","worked":"Stripe sends <code>POST /webhooks</code> with <code>Stripe-Signature</code>. You verify the HMAC, check <code>event.id</code> against a processed-set (dedupe), enqueue the work, and return <code>200</code> in &lt;5s so Stripe doesn't retry.","related":["idempotency-key","http-idempotency","websocket"]}
});

</script>

<!-- content: 10-fnd-bigo.js -->
<script>
/* Foundations · Complexity & Big-O (FND-BIGO) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-BIGO","front":"What does <code>O(f(n))</code> actually assert?","back":"An <em>upper bound</em>: there exist constants <code>c &gt; 0</code> and <code>n₀</code> such that the runtime <code>T(n) ≤ c·f(n)</code> for all <code>n ≥ n₀</code>. It bounds growth from above for large <code>n</code> only — it says nothing about small inputs or the actual constant."},
  {"sec":"FND-BIGO","front":"O vs Θ vs Ω — what's the precise difference?","back":"<ul><li><code>O(f)</code> — asymptotic <strong>upper</strong> bound (≤).</li><li><code>Ω(f)</code> — asymptotic <strong>lower</strong> bound (≥).</li><li><code>Θ(f)</code> — <strong>tight</strong> bound: both <code>O(f)</code> and <code>Ω(f)</code> hold.</li></ul>Saying an algorithm is <code>O(n²)</code> doesn't mean it isn't also <code>O(n³)</code> — O is just a ceiling, not a promise of tightness."},
  {"sec":"FND-BIGO","front":"Why do constant factors and lower-order terms drop in Big-O?","back":"Big-O describes growth as <code>n → ∞</code>, where the fastest-growing term dominates and any constant multiplier is absorbed into the definition's <code>c</code>. So <code>3n² + 100n + 5</code> is <code>Θ(n²)</code> — the <code>100n</code>, <code>+5</code>, and the <code>3</code> all become irrelevant to the <em>shape</em> of growth."},
  {"sec":"FND-BIGO","front":"Best / average / worst case vs Big-O — common conflation?","back":"Best/avg/worst pick <em>which input</em> you analyze; O/Θ/Ω bound <em>a function</em>. They're orthogonal. You can state a tight <code>Θ</code> bound on the worst case (e.g. quicksort worst case is <code>Θ(n²)</code>) and a different tight bound on the average case (<code>Θ(n log n)</code>)."},
  {"sec":"FND-BIGO","front":"Quicksort: best, average, and worst case time?","back":"<ul><li>Best/average: <code>Θ(n log n)</code> (balanced partitions).</li><li>Worst: <code>Θ(n²)</code> — e.g. already-sorted input with a naive first/last-element pivot, giving maximally unbalanced partitions.</li></ul>Randomized or median-of-three pivots make the <code>n²</code> case vanishingly unlikely, which is why quicksort wins in practice despite the bad worst case."},
  {"sec":"FND-BIGO","front":"Why is comparison-sort lower bound <code>Ω(n log n)</code>?","back":"Any comparison sort is a decision tree that must distinguish all <code>n!</code> possible orderings. A binary tree with <code>n!</code> leaves has height <code>≥ log₂(n!) = Θ(n log n)</code> (by Stirling), and height = worst-case comparisons. So no comparison-based sort can beat <code>Ω(n log n)</code> — only non-comparison sorts (counting, radix) can, by exploiting key structure."},
  {"sec":"FND-BIGO","front":"Dynamic-array append: why amortized <code>O(1)</code> despite <code>O(n)</code> resizes?","back":"Doubling capacity on overflow means <code>n</code> appends trigger resizes copying <code>1+2+4+…+n ≈ 2n</code> elements total. Spread over <code>n</code> appends that's <code>O(1)</code> each <em>amortized</em>. Any single append is still <code>O(n)</code> worst case — amortized ≠ average over random inputs; it's a guaranteed bound on a <em>sequence</em>."},
  {"sec":"FND-BIGO","front":"Why doubling (not adding a fixed chunk) for array growth?","back":"Geometric growth (×2, ×1.5) gives <code>O(1)</code> amortized append because total copy work is a geometric series <code>≈ 2n</code>. Growing by a fixed <code>k</code> makes total work <code>k(1+2+…+n/k) = Θ(n²/k) = Θ(n²)</code>, i.e. <code>O(n)</code> amortized per append — quadratic and unacceptable."},
  {"sec":"FND-BIGO","front":"Hash table lookup: stated complexity and the honest caveat?","back":"Average/expected <code>O(1)</code> under a good hash and bounded load factor. Worst case is <code>O(n)</code> when every key collides into one bucket (or <code>O(log n)</code> if buckets are balanced trees, as in Java 8+ <code>HashMap</code> after a bucket treeifies). Adversarial inputs can force the worst case — hence hash-flooding DoS and the use of keyed/SipHash."},
  {"sec":"FND-BIGO","front":"Balanced BST vs hash table — the operation complexities?","back":"<ul><li>Balanced BST (red-black, AVL): search/insert/delete <code>O(log n)</code> <em>worst case</em>, ordered traversal in <code>O(n)</code>.</li><li>Hash table: search/insert <code>O(1)</code> average, <code>O(n)</code> worst, <strong>no order</strong>.</li></ul>Pick the BST when you need ordering, range queries, or a hard worst-case guarantee."},
  {"sec":"FND-BIGO","front":"Rank these classes by growth: <code>1, log n, n, n log n, n², 2ⁿ, n!</code>","back":"Strictly increasing growth: <code>O(1) &lt; O(log n) &lt; O(n) &lt; O(n log n) &lt; O(n²) &lt; O(2ⁿ) &lt; O(n!)</code>. The cliff is between polynomial (<code>n²</code>) and exponential (<code>2ⁿ</code>): polynomials scale; exponentials hit a wall around <code>n ≈ 40–50</code>."},
  {"sec":"FND-BIGO","front":"Time vs space complexity — and the classic trade?","back":"Time counts operations; space counts extra memory as a function of <code>n</code> (often excluding the input — that's <em>auxiliary</em> space). They trade off: memoization/hash indexes spend <code>O(n)</code> space to cut time; in-place algorithms spend <code>O(1)</code> auxiliary space at the cost of more work or destroying the input."},
  {"sec":"FND-BIGO","front":"When does Big-O <em>mislead</em> you in practice?","back":"<ul><li><strong>Small n</strong>: a hidden constant dominates (insertion sort beats quicksort below ~10–20 elements).</li><li><strong>Huge constants</strong>: an <code>O(n)</code> algorithm with a 10⁶ constant loses to <code>O(n log n)</code>.</li><li><strong>Cache/locality</strong>: a contiguous <code>O(n²)</code> scan can beat a pointer-chasing <code>O(n)</code> structure due to memory hierarchy.</li></ul>"},
  {"sec":"FND-BIGO","front":"Is binary search's <code>O(log n)</code> the whole story on real hardware?","back":"No. Binary search jumps unpredictably across memory, causing cache misses and branch mispredictions. For arrays that fit in cache, a linear or block/SIMD scan can be faster despite <code>O(n)</code>, and B-trees beat balanced BSTs precisely because their wide, contiguous nodes are cache-friendly — Big-O ignores the constant the memory hierarchy imposes."},
  {"sec":"FND-BIGO","front":"What's the space complexity of recursion, and why it bites?","back":"Recursion depth costs <code>O(depth)</code> stack space even when no heap is allocated. Naive recursive Fibonacci is <code>O(2ⁿ)</code> time but only <code>O(n)</code> stack; mergesort is <code>O(n)</code> auxiliary + <code>O(log n)</code> stack. Deep non-tail recursion can blow the stack long before it's slow — a space limit masquerading as a crash."}
);

Object.assign(GLOSSARY_DATA, {
  "big-o-notation": {"term":"Big-O Notation","group":"FND-BIGO","aliases":["big-o","big o","o(f(n))","asymptotic upper bound","upper bound"],"eli5":"A ceiling on how fast work grows as the input gets huge, ignoring constants and small inputs.","memory":"O is an Overhead-blind Ceiling: it caps growth and is blind to constants.","full":"<p><code>f(n) = O(g(n))</code> means there exist constants <code>c &gt; 0</code> and <code>n₀ ≥ 0</code> such that <code>0 ≤ f(n) ≤ c·g(n)</code> for all <code>n ≥ n₀</code>. It is an <b>asymptotic upper bound</b> — a statement about growth rate as <code>n → ∞</code>, not about runtime at a specific size.</p><p>Because the definition only requires <em>some</em> constant and only holds <em>eventually</em>, Big-O deliberately discards constant factors and lower-order terms. This is its power (machine-independent comparison) and its limitation (it hides the constants that decide real-world performance).</p>","trap":"Saying \"<code>O(n²)</code> means it takes <code>n²</code> steps.\" No — O is only an upper bound, so an <code>O(n²)</code> algorithm is also legitimately <code>O(n³)</code>. Use <code>Θ</code> when you mean a tight, exact-shape bound.","worked":"<code>T(n) = 3n² + 100n + 5</code> is <code>O(n²)</code>: pick <code>c = 4</code>, <code>n₀ = 101</code>, then <code>3n²+100n+5 ≤ 4n²</code> for all <code>n ≥ 101</code>.","related":["theta-tight-bound","growth-classes","big-o-misleads"]},
  "theta-tight-bound": {"term":"Θ (Tight Bound) & Ω (Lower Bound)","group":"FND-BIGO","aliases":["theta","Θ(f)","tight bound","omega","Ω(f)","lower bound","big-theta","big-omega"],"eli5":"Ω is a floor, Θ is when the floor and ceiling meet — the exact growth shape.","memory":"Θ = Theta = Tight (both start with T). Ω looks like a cup holding things up from below — a floor.","full":"<p><code>Ω(g)</code> is an asymptotic <b>lower</b> bound: <code>f(n) ≥ c·g(n)</code> eventually. <code>Θ(g)</code> is a <b>tight</b> bound: <code>f(n)</code> is both <code>O(g)</code> and <code>Ω(g)</code>, so <code>g</code> captures the exact growth rate up to constants.</p><p>In interviews, prefer <code>Θ</code> when you actually know the growth shape (\"mergesort is <code>Θ(n log n)</code>\") and reserve <code>O</code> for genuine upper bounds or worst-case ceilings. <code>Ω</code> is the right tool for impossibility results — e.g. comparison sorting is <code>Ω(n log n)</code>, meaning <em>no</em> comparison sort can do better.</p>","trap":"Claiming an <code>Ω</code> bound to brag about speed. <code>Ω</code> is a lower bound — <code>T(n) = Ω(n)</code> means it takes <em>at least</em> linear time, which is bad news, not good. People misuse \"Ω(n)\" to mean \"about n.\"","worked":"Comparison sort: a decision tree with <code>n!</code> leaves has height <code>≥ log₂(n!) = Θ(n log n)</code>, proving the <code>Ω(n log n)</code> lower bound.","related":["big-o-notation","comparison-sort-bound"]},
  "growth-classes": {"term":"Common Growth Classes","group":"FND-BIGO","aliases":["growth classes","complexity classes","growth rate","polynomial","exponential","logarithmic","linearithmic"],"eli5":"The handful of curves nearly every algorithm's cost follows, from flat to explosive.","memory":"Mnemonic for the order: \"Can Larry Not Lift Quite Enough Fruit\" → 1, log n, n, n log n, n², 2ⁿ, n!.","full":"<p>Ordered by growth: <code>O(1)</code> (constant) &lt; <code>O(log n)</code> (logarithmic — halving search) &lt; <code>O(n)</code> (linear) &lt; <code>O(n log n)</code> (linearithmic — optimal comparison sort, divide-and-conquer) &lt; <code>O(n²)</code> (quadratic — nested loops) &lt; <code>O(2ⁿ)</code> (exponential — subset enumeration) &lt; <code>O(n!)</code> (factorial — permutations, brute-force TSP).</p><p>The decisive line is <b>polynomial vs exponential</b>: polynomial algorithms scale to large <code>n</code>; exponential ones are intractable past <code>n ≈ 40–50</code> regardless of hardware. \"Efficient\" in complexity theory means polynomial.</p>","trap":"Assuming <code>2ⁿ</code> and <code>n!</code> are close. <code>n!</code> grows far faster — at <code>n=20</code>, <code>2²⁰ ≈ 10⁶</code> but <code>20! ≈ 2.4×10¹⁸</code>. Also: <code>n log n</code> is much closer to <code>n</code> than to <code>n²</code>.","worked":"At <code>n = 50</code>: <code>log₂ n ≈ 5.6</code>, <code>n log₂ n ≈ 282</code>, <code>n² = 2500</code>, <code>2ⁿ ≈ 1.1×10¹⁵</code>, <code>n! ≈ 3×10⁶⁴</code> — the exponential/factorial gap to the polynomials is astronomical.","related":["big-o-notation","big-o-misleads"]},
  "amortized-analysis": {"term":"Amortized Analysis","group":"FND-BIGO","aliases":["amortized","amortized analysis","amortized o(1)","amortized cost"],"eli5":"Average the cost of a rare expensive operation across the many cheap ones it enables.","memory":"Like a phone plan: pay a flat monthly rate even though some months you make one expensive call — the cost is amortized.","full":"<p>Amortized analysis bounds the <b>total cost of a sequence</b> of operations divided by the number of operations, giving a per-operation cost that's honest even when individual operations vary wildly. The canonical case is dynamic-array append: most appends are <code>O(1)</code>, but an occasional resize copies all <code>n</code> elements. With capacity <b>doubling</b>, the total copy work over <code>n</code> appends is <code>≈ 2n</code>, so each append is <code>O(1)</code> amortized.</p><p>Techniques: <b>aggregate</b> (total ÷ count), <b>accounting</b> (overcharge cheap ops to bank credit for expensive ones), and <b>potential</b> (a stored-energy function). Amortized is a <em>worst-case guarantee over a sequence</em> — strictly stronger than average-case, which assumes an input distribution.</p>","trap":"Conflating amortized with average-case. Amortized <code>O(1)</code> makes <strong>no</strong> probabilistic assumption — it holds for the worst sequence. Average-case assumes a distribution over inputs. They are different guarantees.","worked":"<code>n</code> appends into a doubling array: resizes copy <code>1+2+4+…+n ≈ 2n</code> elements total; <code>2n / n = O(1)</code> amortized per append, even though one append is <code>O(n)</code>.","related":["dynamic-array-doubling","best-avg-worst"]},
  "dynamic-array-doubling": {"term":"Dynamic-Array Doubling","group":"FND-BIGO","aliases":["dynamic array","doubling","geometric growth","vector growth","arraylist","capacity doubling"],"eli5":"Grow a full array by multiplying its size, not adding a fixed amount, so resizes stay rare.","memory":"Double or die: only multiplicative growth keeps append at amortized O(1).","full":"<p>When a dynamic array (C++ <code>vector</code>, Java <code>ArrayList</code>, Python <code>list</code>, Go slice) fills up, it allocates a larger buffer and copies. Using <b>geometric growth</b> (×2, or ×1.5) makes the total copy work a geometric series bounded by <code>O(n)</code>, yielding <code>O(1)</code> amortized append. The growth factor trades memory waste against copy frequency — ×1.5 wastes less and can reuse freed blocks better.</p><p><b>Arithmetic growth</b> (add a fixed <code>k</code> slots) destroys this: resizes happen every <code>k</code> appends, total copy work is <code>Θ(n²)</code>, and append degrades to <code>O(n)</code> amortized. The multiplicative factor is exactly what buys the constant.</p>","trap":"\"Append is always O(1).\" It's <em>amortized</em> O(1); a single append that triggers a resize is <code>O(n)</code>, and that latency spike matters for real-time/tail-latency-sensitive systems.","worked":"Growing by +k for <code>n</code> appends: copies <code>k+2k+…+n = Θ(n²/k) = Θ(n²)</code> total ⇒ <code>O(n)</code> per append. Doubling: <code>≈2n</code> total ⇒ <code>O(1)</code>.","related":["amortized-analysis","time-vs-space"]},
  "best-avg-worst": {"term":"Best / Average / Worst Case","group":"FND-BIGO","aliases":["best case","average case","worst case","worst-case","average-case","case analysis"],"eli5":"Which input you analyze — the luckiest, the typical, or the nastiest — not which notation you use.","memory":"Cases choose the input; Greek letters bound the curve. Two knobs, not one.","full":"<p>Best/average/worst select <b>which input</b> the cost function describes; O/Θ/Ω <b>bound a function</b>. They are independent axes — you can give a tight <code>Θ</code> bound on the worst case or an <code>O</code> ceiling on the average case. Average case requires an explicit input distribution (usually uniform), which is why it's fragile: real inputs are rarely uniform.</p><p>Senior interviews care about the worst case for tail latency and adversarial safety (hash flooding, quicksort's sorted-input trap), and the average case for throughput. State both, and name the input that triggers the worst case.</p>","trap":"Saying \"worst case is <code>O(n²)</code>\" as if O implies worst case. O is just an upper bound on whatever case you named; you can equally write \"best case is <code>O(n)</code>.\" Always pair the case with the bound explicitly.","worked":"Quicksort: best/avg <code>Θ(n log n)</code> (balanced pivots), worst <code>Θ(n²)</code> (sorted input, naive pivot). Hash lookup: avg <code>O(1)</code>, worst <code>O(n)</code> (all collide).","related":["theta-tight-bound","hash-vs-bst","amortized-analysis"]},
  "hash-vs-bst": {"term":"Hash Table vs Balanced BST","group":"FND-BIGO","aliases":["hash table","hash map","hash lookup","balanced bst","binary search tree","red-black tree","avl tree"],"eli5":"Hashes are O(1)-average but unordered; balanced trees are O(log n) but keep keys sorted with a hard guarantee.","memory":"Hash = fast but forgetful (no order); Tree = orderly but logarithmic.","full":"<p><b>Hash table:</b> insert/lookup/delete <code>O(1)</code> expected under a good hash and bounded load factor, but <code>O(n)</code> worst case on collisions (or <code>O(log n)</code> if a bucket degrades to a balanced tree, as in Java 8+ <code>HashMap</code> after treeify). No ordering, no range queries. Vulnerable to adversarial keys (hash flooding) without a keyed hash like SipHash.</p><p><b>Balanced BST</b> (red-black, AVL, B-tree): search/insert/delete <code>O(log n)</code> <b>worst case</b> — a real guarantee — plus in-order traversal, range queries, and predecessor/successor in <code>O(log n)</code>. Choose the hash for raw point-lookup throughput; choose the tree when you need order, ranges, or a worst-case SLA.</p>","trap":"Quoting hash lookup as <code>O(1)</code> with no caveat. It's <em>expected</em> <code>O(1)</code>; the worst case is <code>O(n)</code>, and an attacker who controls keys can force it. Staff candidates must mention load factor and adversarial collisions.","worked":"Need \"all keys between 100 and 200 in sorted order\": a BST does it in <code>O(log n + k)</code>; a hash table must scan all <code>n</code> entries — <code>O(n)</code>.","related":["best-avg-worst","growth-classes","big-o-misleads"]},
  "comparison-sort-bound": {"term":"Comparison-Sort Lower Bound","group":"FND-BIGO","aliases":["comparison sort","n log n lower bound","sorting lower bound","decision tree bound"],"eli5":"Any sort that only compares pairs needs at least n log n comparisons — provably.","memory":"n! leaves ⇒ log(n!) height ⇒ n log n floor. Structure (radix) is the only escape hatch.","full":"<p>A comparison sort learns the input's order only through pairwise comparisons, so it is a binary <b>decision tree</b> whose leaves are the <code>n!</code> possible permutations. A binary tree distinguishing <code>n!</code> outcomes has height <code>≥ ⌈log₂(n!)⌉</code> (and height equals the worst-case number of comparisons), and by Stirling <code>log₂(n!) = Θ(n log n)</code>. Hence every comparison sort is <code>Ω(n log n)</code> in the worst case — mergesort and heapsort are asymptotically optimal.</p><p>The bound is escapable only by <b>not</b> comparing: counting sort, radix sort, and bucket sort run in <code>O(n + k)</code> or <code>O(nw)</code> by exploiting key structure (bounded range, fixed width), not order comparisons.</p>","trap":"\"Radix sort beats the <code>n log n</code> lower bound, so the bound is wrong.\" The bound applies <em>only</em> to comparison sorts; radix sidesteps it by using digit/key structure, not by comparing.","worked":"<code>log₂(n!) ≈ n log₂ n − 1.44n</code> (Stirling). For <code>n=1000</code> that's ≈ 8500 comparisons minimum — no comparison sort can do fewer in the worst case.","related":["theta-tight-bound","best-avg-worst"]},
  "big-o-misleads": {"term":"When Big-O Misleads","group":"FND-BIGO","aliases":["big-o misleads","constant factors","cache effects","small n","galactic algorithm","hidden constants"],"eli5":"Big-O ignores constants, small inputs, and memory locality — exactly the things that decide real speed.","memory":"Big-O forgets the 3 C's: Constants, Cache, and Cutoff (small n).","full":"<p>Big-O is asymptotic, so it hides three things that dominate practice: (1) <b>small n</b> — insertion sort beats quicksort below ~10–20 elements, which is why real sorts switch to it (introsort/Timsort); (2) <b>huge constants</b> — a \"galactic\" <code>O(n)</code> algorithm with a <code>10⁶</code> constant loses to <code>O(n log n)</code> for any realistic <code>n</code>; (3) <b>memory hierarchy</b> — a contiguous <code>O(n²)</code> scan can beat a pointer-chasing <code>O(n)</code> structure because a cache miss costs roughly 100× a cache hit.</p><p>This is why B-trees beat balanced BSTs (wide, cache-friendly nodes), why arrays often beat linked lists despite identical Big-O, and why benchmarks — not asymptotics alone — settle performance for the <code>n</code> you actually run.</p>","trap":"Picking the lower-Big-O algorithm reflexively. For your real <code>n</code>, the constant and cache behavior may invert the ranking — measure before declaring a winner.","worked":"Linked list vs array, both <code>O(n)</code> traversal: the array is often 10×+ faster because sequential memory access is prefetched and cache-resident, while list nodes scatter across the heap (cache misses).","related":["growth-classes","hash-vs-bst","time-vs-space"]},
  "time-vs-space": {"term":"Time vs Space Complexity","group":"FND-BIGO","aliases":["space complexity","time complexity","auxiliary space","in-place","time-space tradeoff","in place"],"eli5":"Two separate budgets — operations and extra memory — that you can often trade against each other.","memory":"Space = the desk you need; time = the work you do. A bigger desk (cache/table) often means faster work.","full":"<p><b>Time complexity</b> counts operations as a function of <code>n</code>; <b>space complexity</b> counts memory. Space usually means <b>auxiliary space</b> — extra memory beyond the input. An <code>O(1)</code>-auxiliary (\"in-place\") algorithm uses constant extra memory regardless of input size.</p><p>The two trade off: memoization, hash indexes, and precomputed tables spend <code>O(n)</code>+ space to cut time; in-place and streaming algorithms minimize memory at the cost of more work or destroying the input. Recursion adds a hidden space cost — <code>O(depth)</code> stack — so a fast recursive algorithm can still blow the stack before it's slow.</p>","trap":"Forgetting recursion's stack space, or counting the input itself as space. \"In-place\" refers to <em>auxiliary</em> space — mergesort is <code>O(n)</code> auxiliary, while quicksort recursing into the smaller partition first uses <code>O(log n)</code> stack and is conventionally called in-place.","worked":"Two-sum: brute force is <code>O(n²)</code> time / <code>O(1)</code> space; the hash-set version is <code>O(n)</code> time / <code>O(n)</code> space — a textbook time-for-space trade.","related":["amortized-analysis","big-o-misleads","dynamic-array-doubling"]}
});

</script>
