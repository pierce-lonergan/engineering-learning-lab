<script>
/* Kafka Architecture & Internals (DSS-KAFKA) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-KAFKA","front":"What is a Kafka partition, fundamentally?","back":"An <strong>ordered, immutable, append-only sequence of records</strong> — the unit of parallelism, ordering, and replication. Each record gets a monotonically increasing <code>offset</code> within its partition. A topic is just a named collection of partitions; ordering is guaranteed <em>only within a partition</em>, never across the topic."},
  {"sec":"DSS-KAFKA","front":"How does Kafka decide which partition a produced record lands in?","back":"<ul><li>If a key is set: <code>partition = murmur2(key) % numPartitions</code> by default, so same key → same partition → ordered.</li><li>If no key: the modern default partitioner uses <strong>sticky batching</strong> — it fills one partition's batch before rotating to another (replacing pure per-record round-robin), to cut request count.</li><li>You can also pin an explicit partition or supply a custom partitioner.</li></ul>"},
  {"sec":"DSS-KAFKA","front":"Why is per-partition ordering the only ordering Kafka gives you?","back":"Because partitions are independent logs spread across brokers and consumed in parallel — there is no global clock or cross-partition sequencer. If you need a strict order for a set of records (e.g. all events for a user), you must <strong>route them to the same partition via a shared key</strong>. Adding partitions later breaks the <code>hash(key) % N</code> mapping, so historical key→partition stability is lost."},
  {"sec":"DSS-KAFKA","front":"How is a partition physically stored on disk (segments)?","back":"A partition log is split into <strong>segments</strong> — a sequence of <code>.log</code> files plus <code>.index</code> (offset→byte position) and <code>.timeindex</code> (timestamp→offset) files. Only the newest segment is <em>active</em> (open for appends); older segments are sealed and read-only. Retention and compaction operate at <strong>segment granularity</strong>, which is why a whole sealed segment is the unit you can cheaply delete."},
  {"sec":"DSS-KAFKA","front":"Time/size retention vs log compaction — what's the difference?","back":"<ul><li><strong>Deletion retention</strong> (<code>cleanup.policy=delete</code>): drop whole segments older than <code>retention.ms</code> or once the log exceeds <code>retention.bytes</code>. Time-series / event-stream semantics.</li><li><strong>Compaction</strong> (<code>cleanup.policy=compact</code>): keep at least the <em>latest value per key</em> forever, garbage-collecting superseded versions. Gives changelog / materialized-state semantics.</li></ul>You can set <code>compact,delete</code> to do both."},
  {"sec":"DSS-KAFKA","front":"What exactly does log compaction guarantee — and how do you delete a key?","back":"It guarantees a consumer reading to the <strong>head of the log will see at least the most recent value for every key</strong> (older duplicates may be GC'd, but the latest survives). To actually remove a key you publish a <strong>tombstone</strong>: a record with that key and a <code>null</code> value, which is retained for <code>delete.retention.ms</code> (commonly 24h) so consumers can observe the delete, then purged."},
  {"sec":"DSS-KAFKA","front":"What is the ISR (in-sync replica) set?","back":"The subset of a partition's replicas that are <strong>fully caught up to the leader</strong> within <code>replica.lag.time.max.ms</code> (commonly 30s). The leader is always in the ISR. A follower that stalls or lags falls <em>out</em> of the ISR; when it catches up it rejoins. The ISR is the pool from which a new leader can be safely elected without committed-data loss."},
  {"sec":"DSS-KAFKA","front":"How do producer acks 0 / 1 / all differ in durability?","back":"<ul><li><code>acks=0</code>: fire-and-forget, no broker ack — fastest, can silently lose data.</li><li><code>acks=1</code>: leader persists to its log and acks — lost if the leader dies before followers replicate.</li><li><code>acks=all</code> (a.k.a. <code>-1</code>): leader waits until <strong>all in-sync replicas</strong> replicate the record before acking — strongest durability.</li></ul>"},
  {"sec":"DSS-KAFKA","front":"Why is acks=all alone NOT enough for durability, and what fixes it?","back":"<code>acks=all</code> only waits for the <em>current</em> ISR. If the ISR has shrunk to just the leader, \"all\" means \"one\" — a single failure loses data. You pair it with <code>min.insync.replicas</code> (commonly 2): if fewer than that many replicas are in-sync, the leader <strong>rejects the write</strong> with <code>NOT_ENOUGH_REPLICAS</code> rather than accepting an under-replicated record. The classic safe config is RF=3, <code>min.insync.replicas=2</code>, <code>acks=all</code>."},
  {"sec":"DSS-KAFKA","front":"What is the high watermark, and why can't consumers read past it?","back":"The <strong>high watermark (HW)</strong> is the highest offset replicated to <em>every</em> in-sync replica (the min of the ISR's log-end offsets). Consumers can only read up to the HW — records above it are on the leader's log but not yet committed, so exposing them could violate durability if the leader failed and a follower with less data became leader. The HW is what makes a committed read repeatable across leader changes."},
  {"sec":"DSS-KAFKA","front":"What does the Kafka controller do?","back":"Exactly one broker (or, in KRaft, the active controller node) acts as the <strong>controller</strong>. It manages cluster metadata: detecting broker failures, <strong>electing partition leaders</strong>, updating and propagating ISR changes, and handling partition reassignment. Brokers are otherwise peers serving the data path; the controller is the single coordinator that keeps the leadership/replica map consistent."},
  {"sec":"DSS-KAFKA","front":"ZooKeeper vs KRaft — what changed and why?","back":"Classic Kafka stored cluster metadata (brokers, configs, ACLs, ISR) in an external <strong>ZooKeeper</strong> ensemble; the controller mirrored that state. <strong>KRaft</strong> (KIP-500) removes ZooKeeper: metadata lives in an internal <strong>Raft-replicated metadata log</strong> managed by a quorum of controller nodes. Benefits: one system to operate, far faster failover/metadata propagation, and scaling to millions of partitions. KRaft is the default in modern Kafka, and 4.0 removes ZooKeeper support entirely."},
  {"sec":"DSS-KAFKA","front":"Why is Kafka fast despite writing every message to disk?","back":"<ul><li><strong>Sequential append-only I/O</strong>: writes go to the end of a segment, so disks (even spinning) hit near-sequential throughput, not random-seek speeds.</li><li><strong>OS page cache</strong>: writes/reads go through the kernel page cache, so hot data is served from RAM without a user-space cache.</li><li><strong>Zero-copy</strong> (<code>sendfile</code>): bytes go disk→socket in-kernel, skipping user-space copies on the read path.</li><li><strong>Batching + compression</strong>: producers and the broker store records in compressed batches, amortizing per-message overhead.</li></ul>"},
  {"sec":"DSS-KAFKA","front":"What is zero-copy and when does Kafka lose it?","back":"<strong>Zero-copy</strong> uses the <code>sendfile</code> syscall to transfer log bytes directly from the page cache to the network socket inside the kernel, avoiding copies into the JVM and back. It works because the broker stores records in the <em>same wire format</em> it sends. You <strong>lose</strong> zero-copy whenever the broker must re-touch payloads — e.g. TLS encryption, or re-compressing/down-converting batches for an older client protocol version."},
  {"sec":"DSS-KAFKA","front":"How do consumer offsets and consumer groups relate to partitions?","back":"Within a <strong>consumer group</strong>, each partition is assigned to exactly one consumer, so group parallelism is capped at the partition count. Each consumer tracks its position with a committed <strong>offset</strong>, stored in the internal compacted topic <code>__consumer_offsets</code>. Offsets are per-(group, partition); a new group can replay from the start because Kafka retains records independently of who has read them."},
  {"sec":"DSS-KAFKA","front":"What is the leader epoch and which problem does it solve?","back":"A <strong>leader epoch</strong> is a monotonically increasing number assigned each time a partition gets a new leader. Followers tag their fetched ranges with the epoch, so after a leader change a follower can ask \"what's the end offset of epoch N?\" and <strong>truncate correctly</strong>. This replaces the old high-watermark-only truncation that could silently diverge (lose or duplicate records) during rapid leader failovers."},
  {"sec":"DSS-KAFKA","front":"What does the idempotent producer actually guarantee — and what doesn't it?","back":"With <code>enable.idempotence=true</code> (default in modern clients) the broker dedups <strong>retries within a single producer session</strong> using a producer ID + per-partition sequence number, so a retried batch isn't written twice and ordering is preserved. It does <em>not</em> give cross-session or cross-partition exactly-once — that requires <strong>transactions</strong> (transactional producer + <code>read_committed</code> consumers), which add atomic multi-partition writes and zombie fencing via the producer epoch."}
);

Object.assign(GLOSSARY_DATA, {
  "partition": {"term":"Partition","group":"DSS-KAFKA","aliases":["partition","partitions"],"eli5":"A topic is split into numbered append-only logs; each log is a partition, and that's where ordering and parallelism actually live.","memory":"Partition = the real database table; the topic is just the folder name around a set of them.","full":"<p>A partition is an <b>ordered, immutable, append-only sequence of records</b>, each stamped with a monotonically increasing <code>offset</code>. It is Kafka's atomic unit of three things at once: <b>ordering</b> (guaranteed only within a partition), <b>parallelism</b> (one partition → one consumer per group), and <b>replication</b> (the leader/follower/ISR machinery operates per partition).</p><p>A topic is merely a named bag of partitions. Records with the same key hash to the same partition, which is the <i>only</i> way to get an ordering guarantee across multiple records. Partition count is effectively a one-way door: you can add partitions but that rehashes future key→partition mappings, and you cannot reduce them.</p>","trap":"Saying \"Kafka guarantees ordering.\" It guarantees ordering <i>per partition</i> only — across a topic there is no global order.","worked":"Order events keyed by <code>order_id</code> all land in one partition, so a consumer sees CREATE → PAY → SHIP in order; two different orders may interleave across partitions and that's fine.","related":["topic","offset","replication-isr","log-compaction"]},
  "topic": {"term":"Topic","group":"DSS-KAFKA","aliases":["topic","topics"],"eli5":"A named stream that's physically just a set of partitions you produce to and consume from.","full":"<p>A topic is a logical, named channel for records, implemented as a fixed set of <b>partitions</b> distributed across brokers. It has no storage of its own beyond its partitions; all durability, ordering, replication, and retention semantics are properties of the underlying partitions and segments.</p><p>Key topic-level configs include the <b>partition count</b> (parallelism ceiling), <b>replication factor</b> (how many copies of each partition), <code>cleanup.policy</code> (delete vs compact), and retention bounds. Choosing partition count is a capacity/parallelism decision; choosing replication factor is a durability/availability decision.</p>","trap":"Treating a topic as a queue with a single read cursor. It's a multi-subscriber log: many independent consumer groups can read the same records at their own offsets.","related":["partition","segment","retention","replication-isr"]},
  "offset": {"term":"Offset","group":"DSS-KAFKA","aliases":["offset","offsets","high watermark","high-watermark","log end offset"],"eli5":"The position number of a record inside its partition — and where each consumer bookmarks how far it has read.","memory":"LEO = the writer's pen tip; HW = the line everyone has copied; consumers read only up to the HW.","full":"<p>An offset is the <b>monotonic position of a record within a single partition</b> (it is meaningless across partitions). Two distinct offset frontiers matter on the broker: the <b>log end offset (LEO)</b>, the next offset the leader will write, and the <b>high watermark (HW)</b>, the highest offset replicated to all in-sync replicas. Consumers may only read up to the HW, so committed reads stay stable across leader failover.</p><p>Consumers persist their progress as a <b>committed offset</b> per (group, partition) in the internal compacted topic <code>__consumer_offsets</code>. Because Kafka retains data independently of consumption, a consumer can seek to an arbitrary offset (or to a timestamp via the time index) to replay history.</p>","trap":"Assuming a committed offset means \"processed.\" It only means \"this is where I'll resume\" — commit semantics (at-least-once vs exactly-once) depend on whether you commit before or after side effects.","related":["partition","replication-isr","consumer-group","log-compaction"]},
  "segment": {"term":"Log Segment","group":"DSS-KAFKA","aliases":["segment","segments","log segment","active segment"],"eli5":"Each partition log is chopped into fixed-ish files; the newest one takes writes, the rest are sealed and read-only.","memory":"Think of a partition as a daily journal: today's page is open (active segment), yesterday's pages are bound and only get shredded a whole page at a time.","full":"<p>A partition isn't one giant file — it's a rolling series of <b>segments</b>, each a <code>.log</code> data file paired with an <code>.index</code> (sparse offset→byte map) and a <code>.timeindex</code> (timestamp→offset map). Only the <b>active segment</b> accepts appends; it rolls to a new segment when it hits <code>segment.bytes</code> (commonly 1 GiB) or <code>segment.ms</code>.</p><p>Segments are the granularity at which the broker reclaims space: time/size retention deletes <b>whole sealed segments</b>, and the log cleaner compacts segment by segment. This is why retention is coarse — Kafka never rewrites the active segment to expire individual old records inside it.</p>","trap":"Thinking <code>retention.ms</code> deletes records the instant they age out. Deletion happens only after the <i>segment</i> rolls and its newest record is past retention — so data can linger past the nominal window.","related":["partition","retention","log-compaction"]},
  "replication-isr": {"term":"Replication & ISR","group":"DSS-KAFKA","aliases":["replication","replica","replicas","isr","in-sync replica","in-sync replicas","leader","follower","leader epoch"],"eli5":"Each partition has one leader and some follower copies; the ones caught up to the leader form the ISR, the safe pool to promote from.","memory":"ISR = the study group that's actually kept up with the reading; only they're eligible to lead the next class.","full":"<p>Each partition is replicated <code>replication.factor</code> times. One replica is the <b>leader</b> (handles all reads/writes); the others are <b>followers</b> that fetch from the leader. The <b>ISR (in-sync replica set)</b> is the leader-plus-followers caught up within <code>replica.lag.time.max.ms</code> (commonly 30s). The leader advances the high watermark only to the minimum offset replicated across the ISR.</p><p>On leader failure the controller elects a new leader, normally <b>from the ISR</b> so no committed data is lost. Allowing election from outside the ISR (<code>unclean.leader.election.enable=true</code>) restores availability at the cost of possibly dropping committed records. <b>Leader epochs</b> let followers truncate correctly after failover instead of relying on the high watermark alone.</p>","trap":"Confusing replication factor with ISR size. RF is how many copies <i>exist</i>; the ISR is how many are <i>currently caught up</i> — under lag the ISR can shrink to just the leader even with RF=3.","worked":"RF=3, ISR=[L,f1,f2], <code>min.insync.replicas=2</code>. f2 lags out → ISR=[L,f1], writes still succeed. f1 also lags out → ISR=[L]; now an <code>acks=all</code> producer is rejected because in-sync count < 2.","related":["partition","producer-acks","min-insync-replicas","controller","offset"]},
  "producer-acks": {"term":"Producer acks","group":"DSS-KAFKA","aliases":["acks","ack","producer acks","acks=all","acks=1","acks=0"],"eli5":"How many brokers must confirm a write before the producer calls it done — the durability dial.","memory":"0 = shout into the void, 1 = the manager signed off, all = the whole in-sync team signed off.","full":"<p><code>acks</code> controls the durability/latency tradeoff on the write path. <code>acks=0</code> means the producer never waits (can lose data freely). <code>acks=1</code> waits for the <b>leader</b> to persist to its local log. <code>acks=all</code> (a.k.a. <code>-1</code>) waits for <b>every in-sync replica</b> to replicate before acknowledging.</p><p><code>acks=all</code> is necessary but not sufficient for durability: it only waits for whoever is currently in the ISR, so it must be paired with <code>min.insync.replicas</code> to refuse writes when the ISR is too small. Separately, <b>idempotence</b> (<code>enable.idempotence=true</code>, default in modern clients) dedups producer <i>retries</i> within a session via a producer ID + sequence number — preventing duplicates from retries, not the same as full exactly-once (which needs transactions).</p>","trap":"Believing <code>acks=all</code> guarantees no data loss by itself. With ISR shrunk to the leader, \"all\" = \"one\"; you need <code>min.insync.replicas≥2</code> to make it meaningful.","related":["replication-isr","min-insync-replicas","offset"]},
  "min-insync-replicas": {"term":"min.insync.replicas","group":"DSS-KAFKA","aliases":["min.insync.replicas","min insync replicas","minimum in-sync replicas"],"eli5":"A floor on how many caught-up copies must exist for an acks=all write to be accepted — otherwise the broker refuses it.","memory":"It's the \"don't accept the write unless at least N teammates have a copy\" rule — quorum on the write path.","full":"<p><code>min.insync.replicas</code> is a topic/broker config that, <b>together with</b> <code>acks=all</code>, sets the durability floor. If the current ISR size is below this value, the leader rejects the produce request with <code>NOT_ENOUGH_REPLICAS</code> rather than accepting a write that only one or two copies hold.</p><p>The canonical safe configuration is <b>RF=3, <code>min.insync.replicas=2</code>, <code>acks=all</code></b>: it tolerates one broker loss while still requiring two copies per committed record, balancing durability against availability. Setting <code>min.insync.replicas</code> equal to RF maximizes durability but means a <i>single</i> replica outage halts writes.</p>","trap":"<code>min.insync.replicas</code> does nothing on its own — it's only enforced when the producer uses <code>acks=all</code>. With <code>acks=1</code> it's silently ignored.","worked":"RF=3, min.insync=2: tolerate 1 broker down (writes continue). RF=3, min.insync=3: lose any 1 broker and all <code>acks=all</code> writes start failing — durability up, availability down.","related":["producer-acks","replication-isr"]},
  "log-compaction": {"term":"Log Compaction","group":"DSS-KAFKA","aliases":["log compaction","compaction","compact","tombstone","tombstones","cleanup.policy"],"eli5":"Instead of deleting by age, keep the latest value for every key forever — turning the log into a replayable key→value snapshot.","memory":"Compaction = \"git for keys\": history collapses but the current value of each key is always recoverable; a tombstone is the delete commit.","full":"<p>With <code>cleanup.policy=compact</code>, a background <b>log cleaner</b> rewrites segments so that at least the <b>most recent record per key is retained</b>, garbage-collecting older versions of the same key. Reading to the head of a compacted topic yields the latest state for every key — the basis for changelog topics, <code>__consumer_offsets</code>, and Kafka Streams state stores.</p><p>Deletion in a compacted topic uses a <b>tombstone</b>: a record with the key and a <code>null</code> value. Consumers see the tombstone (so they can delete the key downstream), and it is retained for <code>delete.retention.ms</code> (commonly 24h) before the cleaner removes it. Compaction does <i>not</i> deduplicate across keys or guarantee removal of <i>every</i> stale version immediately — only that the latest survives.</p>","trap":"Expecting compaction to bound topic size or remove old data by time. It bounds by <i>distinct key count</i>, not age — a topic with unbounded unique keys grows forever. Use <code>compact,delete</code> if you also need a time bound.","worked":"User-profile changelog keyed by <code>user_id</code>: writes v1,v2,v3 for a user get compacted to just v3; a <code>null</code>-value tombstone for that key removes them entirely after <code>delete.retention.ms</code>.","related":["retention","partition","offset","segment"]},
  "controller": {"term":"Controller","group":"DSS-KAFKA","aliases":["controller","kafka controller","active controller"],"eli5":"The one broker (or quorum, in KRaft) that owns cluster metadata and decides who leads each partition.","memory":"Brokers are the workers; the controller is the shift manager assigning who's the leader of each station.","full":"<p>The controller is the single coordinator of cluster-wide state: it detects broker failures, <b>elects partition leaders</b>, maintains the replica/ISR maps, and drives partition reassignments. Regular brokers are peers serving data; the controller is the brain that keeps the leadership map consistent and propagates metadata updates.</p><p>Under <b>ZooKeeper-based</b> Kafka, one broker won a ZK election to become controller and stored metadata in ZK. Under <b>KRaft</b>, a dedicated quorum of controller nodes runs Raft over an internal metadata log; the active controller is the Raft leader, giving much faster failover and metadata propagation at large partition counts.</p>","trap":"Saying clients route data through the controller. They don't — clients talk to partition <i>leaders</i> for reads/writes; the controller only manages metadata/leadership, not the data path.","related":["replication-isr","kraft","partition"]},
  "kraft": {"term":"KRaft (vs ZooKeeper)","group":"DSS-KAFKA","aliases":["kraft","kip-500","zookeeper","zk","metadata quorum","metadata log"],"eli5":"Kafka's newer mode where cluster metadata lives in an internal Raft log instead of an external ZooKeeper cluster.","memory":"KRaft = Kafka eats its own dog food — it stores its metadata in a Kafka-style replicated log instead of phoning ZooKeeper.","full":"<p>Historically Kafka externalized cluster metadata — broker registry, topic configs, ACLs, ISR state — into a <b>ZooKeeper</b> ensemble, and the controller mirrored it. This meant operating two distributed systems and made metadata propagation a bottleneck at high partition counts.</p><p><b>KRaft</b> (KIP-500) replaces ZooKeeper with a self-managed <b>Raft quorum of controller nodes</b> that replicate an internal metadata log; brokers consume that log to learn cluster state. Wins: a single system to deploy, near-instant controller failover, and scaling to millions of partitions. KRaft is the default in modern Kafka, and Kafka 4.0 removes ZooKeeper support entirely.</p>","trap":"Calling KRaft \"just embedding ZooKeeper inside Kafka.\" It's a different mechanism — a Raft metadata log with event-driven propagation, not a ZK port.","related":["controller","replication-isr"]},
  "zero-copy": {"term":"Zero-Copy & Page Cache","group":"DSS-KAFKA","aliases":["zero-copy","zero copy","sendfile","page cache","sequential io","sequential disk"],"eli5":"Kafka is fast because it appends sequentially and ships bytes straight from OS cache to the socket without copying them through the app.","memory":"Don't copy what you can stream: append in a straight line, let the kernel hand the bytes to the network untouched.","full":"<p>Kafka's throughput comes from leaning on the OS rather than fighting it. Writes are <b>sequential appends</b> to the active segment, so disks achieve near-streaming throughput instead of random-seek latency. Both writes and reads pass through the <b>OS page cache</b>, so hot data is served from RAM with no separate user-space cache (and the JVM heap stays small).</p><p>On the read path Kafka uses <b>zero-copy</b> via <code>sendfile</code>: log bytes move disk→page-cache→socket entirely in the kernel, skipping copies into the JVM and back, because the broker stores records in the exact wire format it transmits. Batching and compression amortize per-message overhead. Zero-copy is forfeited whenever the broker must touch payloads — e.g. TLS encryption or protocol down-conversion/re-compression for older clients.</p>","trap":"Claiming Kafka is fast \"because it's in-memory.\" It writes every record to disk; the speed comes from sequential I/O + page cache + zero-copy, not from avoiding disk.","worked":"A consumer fetching old data triggers <code>sendfile</code> from page cache straight to its socket — no JVM copy. Turn on TLS and that fetch now routes through user space for encryption, measurably lowering throughput.","related":["segment","partition","offset"]},
  "retention": {"term":"Retention (delete policy)","group":"DSS-KAFKA","aliases":["retention","retention.ms","retention.bytes","cleanup.policy=delete","time retention","size retention"],"eli5":"With the delete policy, Kafka throws away whole old segments once they exceed an age or size budget.","memory":"Delete = a shredder on a timer/quota; compaction = a deduper that keeps the newest of each key.","full":"<p>Under <code>cleanup.policy=delete</code> (the default), Kafka bounds a partition by <b>time</b> (<code>retention.ms</code>, commonly 7 days) and/or <b>size</b> (<code>retention.bytes</code>). When a sealed segment's records fall outside the bound, the whole segment is eligible for deletion. Retention is decoupled from consumption — Kafka deletes by policy, not by whether consumers have read the data.</p><p>Because reclamation is per-segment, the effective retention is always a bit fuzzy: data persists until the segment containing it rolls and ages out. This is the opposite semantic to compaction — delete is for event streams where old facts genuinely expire, compaction is for keyed state you always want the latest of.</p>","trap":"Assuming consumers reading slowly will block deletion. They won't — Kafka can delete unread data once it ages out, causing slow consumers to hit <code>OFFSET_OUT_OF_RANGE</code>.","related":["segment","log-compaction","topic","offset"]},
  "consumer-group": {"term":"Consumer Group","group":"DSS-KAFKA","aliases":["consumer group","consumer groups","rebalance","rebalancing","group coordinator"],"eli5":"A set of consumers that split a topic's partitions among themselves so each record is processed once per group.","memory":"A consumer group is a pizza-cutting rule: N slices (partitions), one eater per slice; more eaters than slices means some go hungry.","full":"<p>A consumer group is a named set of consumers that <b>collectively</b> read a topic, with each partition assigned to exactly one member — so group parallelism is capped at the partition count and extra consumers sit idle. A broker-side <b>group coordinator</b> tracks membership and assigns partitions via an assignor (range, round-robin, sticky/cooperative). Multiple groups read the same topic independently, each at its own offsets.</p><p>When membership changes (a consumer joins, leaves, or times out), the group <b>rebalances</b> — partitions are reassigned. Classic ('eager') rebalancing stops the world by revoking all partitions first; <b>cooperative/incremental</b> rebalancing reassigns only what moves, avoiding a full stop. Committed positions live in the compacted <code>__consumer_offsets</code> topic, so a restarted consumer resumes where it left off.</p>","trap":"Thinking adding consumers always increases throughput. Beyond the partition count, extra consumers are idle — you must raise the partition count to scale a group further.","related":["partition","offset","log-compaction"]}
});

</script>

<script>
/* Partitioning & Ordering (DSS-PART) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-PART","front":"Why is the partition the fundamental unit of a streaming log?","back":"Because a partition is simultaneously the unit of <strong>parallelism</strong> and the unit of <strong>ordering</strong>. A topic is split into partitions so independent consumers can read in parallel, but each partition is an append-only, totally-ordered log. You cannot increase one without affecting the other — there is no way to get more parallelism than you have partitions, and no way to get ordering wider than a single partition."},
  {"sec":"DSS-PART","front":"What is the actual ordering guarantee Kafka/Kinesis provide — global or per-partition?","back":"Ordering is guaranteed <strong>only within a single partition</strong>, never across the whole topic. Within a partition, records have monotonically increasing offsets and are delivered in append order. Across partitions there is <em>no</em> ordering relationship — two records in different partitions can be consumed in any relative order regardless of when they were produced."},
  {"sec":"DSS-PART","front":"How does a producer decide which partition a record goes to when a key is present?","back":"By hashing the key and taking it modulo the partition count: <code>partition = hash(key) % numPartitions</code>. Kafka's default partitioner uses <strong>murmur2</strong> on the key bytes (not Java <code>hashCode()</code>), so the mapping is consistent across clients/languages. It is deterministic, so every record with the same key lands in the same partition — which is what gives you <em>keyed ordering</em>."},
  {"sec":"DSS-PART","front":"Where do records go when the key is null (no key supplied)?","back":"They are spread across partitions for load balance. Kafka 2.4–3.2 used the <strong>sticky partitioner</strong> by default: it fills one partition's batch, then switches to another, improving batching/latency versus per-record round-robin. Kafka ≥3.3 (KIP-794) deprecated it for an improved adaptive partitioner that also avoids piling onto slow brokers. Either way, <em>null-key records get no ordering guarantee</em> relative to each other."},
  {"sec":"DSS-PART","front":"What does \"keyed ordering\" buy you, and what is its precise scope?","back":"All records sharing a key go to the same partition, so they are totally ordered <em>relative to each other</em>. This is how you keep per-entity event order (e.g. all events for <code>user_id=42</code>). The scope is exactly one key's worth of events — you get no ordering guarantee between different keys, even if they happen to hash to the same partition."},
  {"sec":"DSS-PART","front":"Two records have different keys but hash to the same partition. Are they ordered?","back":"They will be delivered in offset order on that partition, but you must <strong>not rely on it</strong>. The guarantee is per-key intent, and any repartitioning (adding partitions) can move one key and not the other, silently breaking any cross-key order you accidentally depended on. Treat ordering as defined only within a single key."},
  {"sec":"DSS-PART","front":"What is a hot (skewed) partition and why is it a problem?","back":"A partition receiving disproportionate traffic because a few keys dominate the volume (e.g. one <code>tenant_id</code> is 80% of events). It becomes a throughput and latency bottleneck: one consumer thread/instance owns it and can't keep up, so <strong>lag concentrates on that partition</strong> while others sit idle. Adding partitions or consumers does <em>not</em> help, because a single key can't be split across partitions."},
  {"sec":"DSS-PART","front":"Name three mitigations for a hot key / skewed partition.","back":"<ul><li><strong>Composite/salted key</strong>: append a bounded suffix (e.g. <code>userId#0..N</code>) to fan one hot key across N partitions — but you lose strict per-key order and must re-aggregate downstream.</li><li><strong>Custom partitioner</strong> that special-cases known hot keys.</li><li><strong>Pre-aggregation / batching</strong> upstream to shrink the hot key's record count before it hits the log.</li></ul>"},
  {"sec":"DSS-PART","front":"What is the core tradeoff when choosing partition count?","back":"More partitions = more achievable parallelism (consumers, throughput) but more <strong>overhead</strong>: more open file handles and memory on brokers, more metadata, slower leader elections, longer rebalances, and more end-to-end latency (each partition adds replication/flush work). You size for peak required consumer parallelism plus headroom — not arbitrarily high."},
  {"sec":"DSS-PART","front":"Why can you add partitions but not (easily) remove them in Kafka?","back":"Kafka supports increasing partition count online but has <strong>no supported shrink operation</strong> — removing a partition would orphan its committed data and offsets. So partition count is effectively a high-water mark: plan for growth, because the only way down is creating a new topic and re-keying/re-copying data into it."},
  {"sec":"DSS-PART","front":"Why does adding partitions break key→partition stability?","back":"Because routing is <code>hash(key) % N</code>. Changing <code>N</code> changes the modulus, so most keys remap to different partitions. From the moment you add partitions, a key's new events may land on a different partition than its history — <strong>ordering across the change boundary is no longer guaranteed</strong>, and stateful consumers keyed by partition can see split state."},
  {"sec":"DSS-PART","front":"You must keep per-key ordering forever but also anticipate growth. What's the safe play?","back":"<strong>Over-provision partitions up front</strong> to a count you'll never exceed, since adding later breaks <code>hash(key) % N</code> stability. Alternatively use consistent-hashing-style routing or a partition count chosen as a highly composite number, and treat the count as immutable. The cheapest fix for a future resize is a brand-new topic plus a controlled re-key migration."},
  {"sec":"DSS-PART","front":"What are the concrete costs of over-partitioning (too many partitions)?","back":"<ul><li>Higher <strong>end-to-end latency</strong> — leader failover must move more partitions; produce/replicate batching is thinner.</li><li>More broker memory/file descriptors and longer recovery and controller load.</li><li>Slower, more frequent <strong>consumer-group rebalances</strong>.</li><li>Each partition needs enough traffic to batch well; thousands of near-empty partitions waste resources.</li></ul>"},
  {"sec":"DSS-PART","front":"How does partition count relate to the maximum useful consumer-group parallelism?","back":"A partition is assigned to <strong>at most one consumer in a group</strong>, so the number of partitions is the hard ceiling on parallelism within that group. If you have 12 partitions, the 13th consumer instance sits idle. This is the main reason to provision partition count for your peak fan-out — you can add consumers cheaply, but not partitions safely."},
  {"sec":"DSS-PART","front":"How do you preserve global-ish ordering when the business truly needs it?","back":"You can't get cross-partition order from the log, so either (a) use a <strong>single partition</strong> (sacrificing all parallelism — only viable at low volume), or (b) push ordering into the data: carry a sequence number / event-time / version and let consumers <strong>sort or reconcile</strong> (e.g. last-writer-wins by version, or a buffer-and-reorder window). Most systems redefine the requirement to per-entity order instead of global."},
  {"sec":"DSS-PART","front":"Why does increasing partitions mid-stream risk duplicate or out-of-order processing in a stateful consumer?","back":"When a key remaps to a new partition, its in-flight history is on the old partition while new events arrive on the new one. A consumer holding <strong>partition-local state</strong> (e.g. a running aggregate keyed by the old partition) now splits that key's state across two partitions/instances, producing wrong aggregates or apparent reordering until state is rebuilt or repartitioned."},
  {"sec":"DSS-PART","front":"With retries enabled, what producer setting actually keeps records ordered within a partition?","back":"Enable the <strong>idempotent producer</strong> (<code>enable.idempotence=true</code>, default in modern clients). It tags each record with a producer ID + per-partition sequence number, so the broker rejects duplicates and preserves order on retry even with up to <code>max.in.flight.requests.per.connection=5</code>. Without idempotence, any <code>max.in.flight &gt; 1</code> can reorder records when an earlier batch is retried after a later one succeeds."}
);

Object.assign(GLOSSARY_DATA, {
  "partition-unit-of-parallelism-and-ordering": {"term":"Partition (Unit of Parallelism + Ordering)","group":"DSS-PART","aliases":["partition","partitions","topic partition"],"eli5":"A partition is one append-only lane of a topic: it's both how you go faster (more lanes = more parallel readers) and the only place order is promised.","memory":"One lane = one queue. More lanes = more speed but cars only stay in order within their own lane.","full":"<p>A topic is divided into <b>partitions</b>; each is an independent, ordered, append-only log with monotonically increasing offsets. The dual role is the whole point of the topic: partitions exist so consumers can read in <b>parallel</b>, and each partition is the boundary inside which <b>order</b> is guaranteed. These two properties are coupled — you cannot raise parallelism without more partitions, and you cannot widen the ordering guarantee beyond a single partition.</p><p>Within a partition: total order by offset. Across partitions: no order at all. Within a consumer group a partition is owned by exactly one consumer, so partition count is also the parallelism ceiling.</p>","trap":"Saying Kafka \"guarantees ordering.\" It guarantees ordering <i>per partition</i> only — never across a topic. Stating it unqualified is the classic senior-interview miss.","related":["per-partition-ordering","key-hash-partitioning","partition-count-sizing"]},
  "per-partition-ordering": {"term":"Per-Partition Ordering","group":"DSS-PART","aliases":["per-partition ordering","ordering guarantee","within-partition ordering","ordering"],"eli5":"Order is promised only inside one partition; across partitions, anything goes.","full":"<p>Records inside a single partition are delivered in append (offset) order and never reordered. There is <b>no</b> ordering relationship between records in different partitions — relative delivery order across partitions is arbitrary and can differ run to run. Therefore any ordering requirement must be reduced to \"order within a key\" (so all related events share a partition) or solved in the data layer with sequence numbers / event-time reconciliation.</p><p>Even producer-side, within-partition order can be broken by retries when <code>max.in.flight.requests.per.connection &gt; 1</code> and a later batch lands before a retried earlier one. The <b>idempotent producer</b> fixes this: it preserves order on retry for any <code>max.in.flight ≤ 5</code> (its required ceiling) via per-partition sequence numbers.</p>","trap":"Assuming two events produced \"close in time\" to different partitions will be consumed in that time order. They won't — cross-partition timing is meaningless to the consumer.","worked":"Bank events: deposit then withdraw for account A must be ordered, so key by <code>account_id</code> → same partition → correct order. Events for account B (different partition) have no defined order relative to A's, which is fine.","related":["partition-unit-of-parallelism-and-ordering","keyed-ordering","single-partition-total-order"]},
  "key-hash-partitioning": {"term":"Key-Hash Partitioning","group":"DSS-PART","aliases":["key hash","default partitioner","partitioner","hash(key) % N","murmur2"],"eli5":"The producer hashes your key and mods by partition count to pick a lane, so the same key always lands in the same lane.","memory":"hash mod N — change N, lose your map. The modulus is the load-bearing wall.","full":"<p>With a key present, the default partitioner computes <code>partition = murmur2(keyBytes) % numPartitions</code>. This is deterministic and is exactly what delivers keyed ordering: identical keys → identical partition. The fragility is baked in — the result depends on <code>numPartitions</code>, so the mapping is only stable while partition count is fixed.</p><p>You can override routing with a custom <code>Partitioner</code> (e.g. to tame hot keys), but you then own the ordering and balance guarantees yourself.</p>","trap":"Believing the partitioner uses Java's <code>Object.hashCode()</code>. Kafka uses murmur2 on the key bytes precisely so partitioning is consistent across languages/JVMs.","related":["keyed-ordering","null-key-partitioning","rehash-on-repartition"]},
  "keyed-ordering": {"term":"Keyed Ordering","group":"DSS-PART","aliases":["keyed ordering","key-based ordering","per-key ordering"],"eli5":"Give related events the same key and they share a partition, so that one entity's events stay in order.","memory":"Same key, same lane, same order. The key IS the ordering contract.","full":"<p><b>Keyed ordering</b> is the practical ordering model: choose a key (e.g. <code>user_id</code>, <code>order_id</code>) so all events for one entity route to one partition and are therefore totally ordered relative to each other. The guarantee is scoped to a <i>single key</i> — never across keys, even two keys that happen to share a partition.</p><p>Key choice is a design decision balancing <b>order granularity</b> against <b>skew</b>: a coarse key (e.g. <code>country</code>) gives strong ordering but huge hot partitions; a fine key (e.g. <code>session_id</code>) spreads load but only orders within that narrow scope.</p>","trap":"Claiming two records that hashed to the same partition are \"ordered together.\" They share a partition by accident; only same-key ordering is a guarantee you can depend on across repartitioning.","related":["key-hash-partitioning","per-partition-ordering","hot-partition-skew"]},
  "null-key-partitioning": {"term":"Null-Key Partitioning (Sticky / Round-Robin)","group":"DSS-PART","aliases":["sticky partitioner","round-robin","null key","null-key","round robin"],"eli5":"No key means no ordering need, so the producer just spreads records to balance load.","memory":"No key, no order — sticky just means \"fill one batch before hopping lanes.\"","full":"<p>When the key is null, there is nothing to hash, so the producer optimizes for balance. Kafka 2.4–3.2 used the <b>sticky partitioner</b> by default: it keeps sending to one partition until the batch fills or lingers, then sticks to a new one — improving batching (fewer, larger requests → lower latency/higher throughput) versus the old per-record round-robin. Kafka ≥3.3 (KIP-794) deprecated it for an <b>adaptive partitioner</b> that distributes more uniformly and avoids piling records onto slow brokers.</p><p>The consequence is unchanged across versions: null-key records have <b>no ordering guarantee</b> among themselves. Use null keys only when order genuinely doesn't matter (e.g. independent log lines, metrics).</p>","trap":"Thinking round-robin/sticky still gives some ordering. It gives none — that's the deal you accept by not supplying a key. (Also: don't claim the sticky partitioner is still the default — it's deprecated as of 3.3.)","related":["key-hash-partitioning","keyed-ordering"]},
  "hot-partition-skew": {"term":"Hot / Skewed Partition","group":"DSS-PART","aliases":["hot partition","skewed partition","partition skew","hot key","data skew"],"eli5":"A few popular keys pile onto one partition, overloading the single consumer that owns it while others idle.","memory":"One whale key sinks one lane. You can't shard a single key — only salt it.","full":"<p>Because routing is by key hash, a few high-volume keys can concentrate traffic onto one partition — a <b>hot partition</b>. Since one partition is owned by one consumer in a group, that consumer becomes the bottleneck and lag piles up there even though other partitions and consumers are underutilized. Adding partitions or consumers does <i>not</i> help, because a single key cannot be split across partitions.</p><p>Mitigations: <b>salt/composite keys</b> (<code>hotKey#0..N</code>) to fan a hot key across partitions at the cost of per-key order; a <b>custom partitioner</b> special-casing known hot keys; or upstream <b>pre-aggregation</b> to cut the record count.</p>","trap":"\"Just add more partitions/consumers.\" Useless for skew from a single dominant key — that key still lands on one partition.","worked":"Multi-tenant events keyed by <code>tenant_id</code>; one mega-tenant is 80% of volume. Re-key to <code>tenant_id#shard</code> with N shards to spread it, then re-aggregate per tenant downstream.","related":["keyed-ordering","key-hash-partitioning"]},
  "partition-count-sizing": {"term":"Choosing Partition Count","group":"DSS-PART","aliases":["partition count","number of partitions","partition sizing","over-partitioning","too many partitions"],"eli5":"Pick enough partitions for your peak parallelism plus headroom, but not so many that broker overhead and rebalances dominate.","memory":"Partitions = parallelism budget. Buy enough for peak, not infinite — empty lanes still cost toll.","full":"<p>Partition count is the ceiling on consumer-group parallelism (one partition per consumer max) and on throughput, so size it to peak required fan-out plus growth headroom. But each partition costs broker memory, file handles, replication/flush work, controller metadata, and slower/longer <b>rebalances</b> and leader elections. <b>Over-partitioning</b> raises end-to-end latency (failover moves more partitions; batches are thinner) and wastes resources on near-empty partitions.</p><p>Practical guidance: derive a target from <code>throughput / per-partition-throughput</code> for both produce and consume, take the max, add headroom, and prefer a <b>highly composite</b> count so future salting/shard math stays clean. Treat the chosen number as hard to change.</p>","trap":"\"Just set partitions very high to be safe.\" Over-partitioning inflates latency, rebalance time, and controller load; thousands of idle partitions are a real cost, not free insurance.","related":["partition-unit-of-parallelism-and-ordering","rehash-on-repartition"]},
  "rehash-on-repartition": {"term":"Repartitioning Breaks Key Stability","group":"DSS-PART","aliases":["adding partitions","repartition","repartitioning","increase partitions","partition expansion"],"eli5":"Adding partitions changes the modulus in hash(key)%N, so keys jump to new partitions and ordering across the change is lost.","memory":"Change N, scramble the map. Adding lanes reshuffles which car is in which lane.","full":"<p>Kafka lets you <b>increase</b> partitions online but not shrink them, so count is a high-water mark. Increasing <code>N</code> changes <code>hash(key) % N</code> for most keys: a key's future events may route to a different partition than its history. Across that boundary, <b>per-key ordering is no longer guaranteed</b>, and stateful consumers holding partition-local state can split a key's state across two partitions, producing wrong aggregates or apparent reordering.</p><p>Safe approaches: over-provision up front; treat partition count as immutable; or, when a resize is unavoidable, create a new topic and run a controlled re-key/copy migration rather than expanding in place.</p>","trap":"\"Adding partitions is a safe online operation.\" It's online, but it silently breaks key→partition stability and any keyed-ordering or partition-local-state assumptions — the dangerous part isn't the operation, it's the data consequence.","worked":"A consumer keeps a per-user running total keyed by partition. Ops grows 6→12 partitions; user 42 remaps from p3 to p7. Its old total sits on p3's consumer, new events land on p7 → totals split and look reordered until state is rebuilt.","related":["key-hash-partitioning","partition-count-sizing","keyed-ordering"]},
  "single-partition-total-order": {"term":"Single-Partition Total Order","group":"DSS-PART","aliases":["single partition","one partition","global ordering","total order"],"eli5":"The only way to get true global order in a log is one partition — which means zero parallelism.","full":"<p>If you genuinely need a single global total order, the only log-native way is a <b>single partition</b>: one ordered lane, one consumer, no parallelism. This is viable only at low volume. Above that, you push ordering into the data: attach a monotonic <b>sequence number / version / event-time</b> and have consumers reorder within a window or apply last-writer-wins, rather than relying on the transport for global order.</p><p>The senior framing: \"global ordering\" is almost always over-specified — the real requirement is usually per-entity order, which keyed partitioning gives you with full parallelism.</p>","trap":"Designing for \"global ordering\" by default. It throws away all parallelism; interview-strong answer is to challenge the requirement and reduce it to per-key ordering plus data-level sequencing.","related":["per-partition-ordering","keyed-ordering"]}
});

</script>

<script>
/* Stream Processing & State (DSS-PROC) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-PROC","front":"The stream–table duality (precise statement)","back":"A <strong>stream is the changelog of a table</strong> (the ordered sequence of inserts/updates that produced it), and a <strong>table is a materialized snapshot of a stream</strong> (the result of replaying that changelog and keeping only the latest value per key). They are two views of the same data: you can derive either from the other, which is why a stateful operator can be reconstructed purely from its changelog topic."},
  {"sec":"DSS-PROC","front":"Stateless vs stateful operations — the dividing line","back":"<strong>Stateless</strong> operators (<code>map</code>, <code>filter</code>, <code>flatMap</code>, <code>branch</code>) decide each record using only that record, so they need no memory and trivially parallelize. <strong>Stateful</strong> operators (<code>aggregate</code>/<code>reduce</code>/<code>count</code>, joins, windows) accumulate results across records keyed by a partition key, so they require a <strong>local state store</strong> and a recovery mechanism."},
  {"sec":"DSS-PROC","front":"Why stateful operators force a repartition (co-partitioning)","back":"A key-based aggregate or join must see every record for a given key on the <em>same</em> task. If the upstream isn't already partitioned by that key, the framework inserts a <strong>repartition/shuffle</strong> — it writes records to an internal repartition topic keyed correctly, so each downstream task owns a disjoint key range. Two streams can be joined only if they're <strong>co-partitioned</strong>: same key, same partition count, same partitioner."},
  {"sec":"DSS-PROC","front":"How is local state made fault-tolerant in Kafka Streams?","back":"Each state store is backed by a <strong>changelog topic</strong>: every write to the local store (e.g. RocksDB) is also produced to a compacted Kafka topic. If the instance/task dies, a new instance <strong>restores</strong> the store by replaying the changelog. Because the topic is <strong>log-compacted</strong>, replay only needs the latest value per key, bounding recovery size to the keyspace, not the full history."},
  {"sec":"DSS-PROC","front":"Why are changelog topics log-compacted rather than time-retained?","back":"State is a <em>snapshot</em> (latest value per key), so only the most recent record per key matters for recovery. <strong>Log compaction</strong> keeps the newest value for each key and garbage-collects older ones, so restore time scales with the number of distinct keys, not total updates. A <code>null</code> value is a <strong>tombstone</strong> that deletes the key and is itself purged after <code>delete.retention.ms</code> (commonly 24h)."},
  {"sec":"DSS-PROC","front":"KStream vs KTable — semantics of a record","back":"A <strong>KStream</strong> is an <em>append-only</em> event stream: every record is an independent fact, so <code>count</code> over a key sums all occurrences. A <strong>KTable</strong> is a <em>changelog/upsert</em> abstraction: each record with key K <em>replaces</em> the prior value for K (and a <code>null</code> deletes it), so it represents the current state per key. Same bytes on the wire — different interpretation."},
  {"sec":"DSS-PROC","front":"KStream–KTable join vs KTable–KTable join","back":"A <strong>KStream–KTable join</strong> is a <em>stream enrichment</em>: each arriving stream event looks up the current KTable value (table acts as a dimension lookup), and <em>only stream-side</em> records trigger output — a KTable update just refreshes the lookup view and emits nothing. A <strong>KTable–KTable join</strong> is <em>maintained materialized-view</em> semantics: an update on <em>either</em> side re-emits the joined result, keeping the output table continuously consistent."},
  {"sec":"DSS-PROC","front":"Why can't a KStream–KStream join work without windows?","back":"Two append-only streams have no \"current value\" to look up, so a join must buffer records from each side waiting for a match on the other. Without a bound that buffer grows forever. A <strong>windowed stream–stream join</strong> bounds it: records join only if their timestamps fall within a join window, and state for old windows is expired, keeping the buffered state finite."},
  {"sec":"DSS-PROC","front":"What does the processing topology (DAG) represent?","back":"The <strong>topology</strong> is a directed acyclic graph of <strong>processor nodes</strong> — source nodes (consume topics), stateless/stateful processors, and sink nodes (produce topics) — connected by edges. It's built (via the DSL or Processor API) before execution and is split into <strong>tasks</strong> (one per input partition), with stateful nodes attaching state stores. Repartition points break the topology into independently-parallelizable <strong>sub-topologies</strong>."},
  {"sec":"DSS-PROC","front":"Task ↔ partition ↔ thread mapping in Kafka Streams","back":"Parallelism is fixed by the input: <strong>one task per input partition</strong> of a sub-topology. Tasks are the unit of work and of state; a task owns the partitions and state stores it's assigned. <strong>Stream threads</strong> (configurable per instance via <code>num.stream.threads</code>) run one or more tasks, and tasks are balanced across all instances of the application via the consumer group. So max parallelism = partition count — adding instances/threads past that idles them."},
  {"sec":"DSS-PROC","front":"Why RocksDB for local state instead of an in-memory map?","back":"RocksDB is an embedded <strong>LSM-tree</strong> key-value store that spills to local disk, so state can exceed RAM (large keyspaces, large windows) while keeping hot data cached. It gives ordered range scans (needed for windowed/session stores) and fast point lookups. It is purely a <em>local</em> cache of truth — the <strong>changelog topic</strong> in Kafka, not RocksDB, is the durable source of state."},
  {"sec":"DSS-PROC","front":"Kafka Streams vs Flink — the core mental-model difference","back":"<strong>Kafka Streams</strong> is a <em>library</em> embedded in your app: no separate cluster, state lives in local RocksDB backed by Kafka changelog topics, scaling = run more instances in a consumer group. <strong>Flink</strong> is a <em>distributed dataflow engine/cluster</em> (JobManager + TaskManagers) with managed state and periodic distributed <strong>checkpoints/savepoints</strong> to durable storage, giving it cluster-managed rescaling and a richer event-time/operator model."},
  {"sec":"DSS-PROC","front":"How does Flink achieve fault tolerance differently from Kafka Streams?","back":"Flink uses <strong>asynchronous barrier snapshotting</strong> (a Chandy–Lamport variant for DAGs): the checkpoint coordinator (JobManager) injects checkpoint barriers into the source streams; each operator snapshots its state once barriers on its inputs align, and the whole consistent cut is written to durable storage (e.g. S3/HDFS) as a <strong>checkpoint</strong>. On failure the job rewinds to the last checkpoint. Kafka Streams instead reconstructs state per-store by replaying changelog topics."},
  {"sec":"DSS-PROC","front":"exactly-once in stream processing — what actually guarantees it?","back":"EOS isn't magic dedup; it requires the <strong>read–process–write</strong> cycle to be atomic. Kafka Streams (<code>processing.guarantee=exactly_once_v2</code>) wraps consuming, state updates (via the changelog), and producing plus the offset commit in a single <strong>Kafka transaction</strong>, so a crash rolls all of it back together. Flink gets internal EOS from <strong>checkpoints</strong>, and for end-to-end EOS ties them to transactional / two-phase-commit sinks."},
  {"sec":"DSS-PROC","front":"Standby replicas / interactive queries — reducing recovery time","back":"Restoring a large state store by replaying its changelog can take minutes. <strong>Standby replicas</strong> (<code>num.standby.replicas</code>, default <code>0</code>) keep warm copies of state stores on other instances by continuously consuming the changelog, so failover promotes a standby instead of cold-restoring. <strong>Interactive Queries</strong> let you read these local stores directly (point/range lookups) without an external DB — the app <em>is</em> the serving layer."},
  {"sec":"DSS-PROC","front":"Co-partitioning requirement for joins — the three conditions","back":"To join two streams/tables on a key without surprises, they must be <strong>co-partitioned</strong>: (1) records keyed by the <em>same</em> key, (2) the input topics have the <em>same number of partitions</em>, and (3) the same partitioning strategy so equal keys land on equal partition numbers. Kafka Streams auto-repartitions a stream if you re-key it, but it cannot fix mismatched partition counts on source topics — that throws a co-partitioning error. A <code>GlobalKTable</code> sidesteps the requirement by replicating the whole table to every task."}
);

Object.assign(GLOSSARY_DATA, {
  "stream-table-duality": {"term":"Stream–Table Duality","group":"DSS-PROC","aliases":["stream-table duality","stream–table duality","duality"],"eli5":"A stream is the list of changes; a table is the running total — and each can be turned into the other.","memory":"Stream = the bank statement (every transaction); Table = the balance (the snapshot). Sum the statement to get the balance; diff the balance over time to get the statement.","full":"<p>The central abstraction of stream processing: a <b>table</b> is a point-in-time snapshot holding the latest value per key, and a <b>stream</b> is the ordered <b>changelog</b> of edits that built that table. Replaying a stream and upserting by key <i>materializes</i> a table (stream→table); capturing every change to a table (CDC) <i>emits</i> a stream (table→stream).</p><p>This duality is why stateful streaming is recoverable: any aggregate's table can be rebuilt by replaying its changelog topic. It also explains KStream vs KTable — the same Kafka topic is read as append-only facts or as a per-key upsert depending on which side of the duality you want.</p>","trap":"Saying \"a stream and a table are just different storage formats.\" The point is semantic: the stream is the <i>derivative</i> (changes) and the table is the <i>integral</i> (accumulated state). One is reconstructible from the other.","related":["kstream-vs-ktable","changelog-topic","log-compaction"]},
  "kstream-vs-ktable": {"term":"KStream vs KTable","group":"DSS-PROC","aliases":["kstream","ktable","kstream vs ktable","kstream-ktable","ktable-ktable","globalktable"],"eli5":"A KStream treats every record as a new fact; a KTable treats every record as an overwrite of the previous value for that key.","memory":"KStream = chat messages (each is new). KTable = a user's status field (each write overwrites). GlobalKTable = the whole table replicated to every task (no co-partitioning needed).","full":"<p>A <b>KStream</b> models an unbounded, append-only sequence of independent events — two records with the same key are two distinct facts. A <b>KTable</b> models a changelog: a record with key K <i>upserts</i> K (a <code>null</code> value is a tombstone that deletes it), so the KTable always represents current state per key. They are the code-level embodiment of the stream–table duality.</p><p>Operation semantics follow from this: <code>count()</code> on a KStream tallies event occurrences; on a KTable it tracks latest-state and can <i>decrement</i> when a key's prior value is overwritten or deleted. KStream–KTable joins are stream enrichments (only the stream side triggers output); KTable–KTable joins maintain a materialized view (either side triggers re-emission); KStream–KStream joins must be windowed.</p>","trap":"Doing a <code>count()</code> expecting event totals when you've modeled the input as a KTable — you'll get latest-state counts (which can go down on updates/deletes), not occurrence counts. Pick the abstraction to match the question being asked.","related":["stream-table-duality","stateful-operation","co-partitioning","changelog-topic"]},
  "changelog-topic": {"term":"Changelog Topic","group":"DSS-PROC","aliases":["changelog topic","changelog topics","changelog","state store changelog"],"eli5":"A Kafka topic that mirrors every write to a local state store so the state can be rebuilt after a crash.","memory":"RocksDB is the cache; the changelog topic is the backup tape. Lose the laptop, replay the tape, get your state back.","full":"<p>Every Kafka Streams state store is backed by an internal, <b>log-compacted</b> changelog topic (named like <code>&lt;app-id&gt;-&lt;store&gt;-changelog</code>). Each update to the local store (RocksDB) is also produced to this topic, making Kafka — not the local disk — the durable source of truth for state. On task reassignment or crash, a new instance <b>restores</b> the store by replaying the changelog.</p><p>Because the topic is compacted, restore replays only the latest value per key, so recovery cost is bounded by the keyspace rather than the update count. Under exactly-once, changelog writes are part of the same Kafka transaction as the output and offset commit, so state and output never diverge.</p>","trap":"Claiming RocksDB is the durable store. RocksDB is a <i>local, disposable</i> cache; if you wiped every local disk, state would survive because it lives in the changelog topic in Kafka.","related":["state-store","log-compaction","stream-table-duality","stateful-operation"]},
  "state-store": {"term":"Local State Store","group":"DSS-PROC","aliases":["state store","state stores","local state store","rocksdb","rocks db"],"eli5":"A small embedded database (usually RocksDB) on each task's machine that holds the running results of stateful operators.","memory":"Think \"embedded SQLite per shard, but LSM\" — fast and local, but the real backup is the changelog topic in Kafka.","full":"<p>Stateful operators keep their accumulators in a <b>local state store</b> co-located with the task, avoiding a network hop per record. The default in Kafka Streams is <b>RocksDB</b>, an embedded LSM-tree key-value store that spills to local disk so state can exceed RAM and supports ordered range scans (needed for windowed/session stores) plus fast point lookups. An in-memory store option exists for small state.</p><p>The store is partitioned with the task: each task owns a disjoint key range and its own store instance. Durability comes from the backing <b>changelog topic</b>, and the store can be served directly to callers via <b>Interactive Queries</b> or kept warm elsewhere via <b>standby replicas</b>.</p>","trap":"Assuming local state means the data is unsafe or non-durable. Locality is a performance choice; durability is delegated to the changelog topic, so a dead instance loses nothing permanently.","related":["changelog-topic","stateful-operation","task-partition-parallelism","log-compaction"]},
  "stateful-operation": {"term":"Stateful vs Stateless Operations","group":"DSS-PROC","aliases":["stateful operation","stateful operations","stateless operation","stateless operations","stateful","stateless"],"eli5":"Stateless ops judge each record alone; stateful ops remember past records, so they need a key, a store, and a recovery plan.","memory":"Stateless = a pure function (no globals). Stateful = a running tally on a whiteboard you must back up and re-shard.","full":"<p><b>Stateless</b> transforms — <code>map</code>, <code>filter</code>, <code>flatMap</code>, <code>branch</code> — produce output from a single record and hold no memory, so they parallelize freely and need no recovery. <b>Stateful</b> operations — <code>aggregate</code>/<code>reduce</code>/<code>count</code>, joins, and windowed variants — accumulate across records grouped by key, so they require a <b>local state store</b> and a <b>changelog</b> for fault tolerance.</p><p>Stateful operators impose two structural costs: the records for a key must be <b>co-partitioned</b> onto one task (often forcing a repartition/shuffle), and the operator's accumulated state must be checkpointed/restorable. This is why the interesting hard parts of streaming — joins, aggregations, windows, exactly-once — are all about managing state.</p>","trap":"Forgetting that re-keying for a stateful op triggers a network shuffle. People treat <code>groupByKey().aggregate()</code> as free; the implicit repartition topic is real I/O and a latency/ordering consideration.","related":["state-store","repartition-shuffle","changelog-topic","co-partitioning","processing-topology"]},
  "repartition-shuffle": {"term":"Repartition / Shuffle","group":"DSS-PROC","aliases":["repartition","repartitioning","shuffle","repartition topic","repartition/shuffle"],"eli5":"Re-routing records by a new key so that all records for the same key end up on the same task before a join or aggregation.","memory":"Shuffle = a mail-sorting facility: incoming letters (records) get re-bucketed by ZIP code (new key) so each delivery route (task) gets only its own.","full":"<p>Key-based stateful operators require that every record for a key reach the <i>same</i> task. When the stream isn't already keyed/partitioned that way (e.g. after a <code>selectKey</code>/<code>map</code> that changes the key, or to align two inputs), the framework inserts a <b>repartition</b>: it writes records to an internal repartition topic partitioned by the new key, and a downstream sub-topology re-reads them. This is the streaming analog of a MapReduce/Spark <b>shuffle</b>.</p><p>Repartitioning is a correctness requirement for co-partitioning, but it costs an extra topic round-trip (network + broker I/O) and creates a sub-topology boundary. Avoiding needless re-keys, and matching partition counts up front, are common performance wins.</p>","trap":"Believing a join \"just works\" across arbitrarily partitioned topics. If the inputs aren't co-partitioned, you either get a repartition (when re-keying) or a co-partitioning <i>error</i> (when source partition counts differ) — it is never silently correct.","related":["co-partitioning","stateful-operation","processing-topology","task-partition-parallelism"]},
  "co-partitioning": {"term":"Co-partitioning","group":"DSS-PROC","aliases":["co-partitioning","copartitioning","co-partitioned","copartitioned"],"eli5":"Two streams are co-partitioned when matching keys land on the same partition number, so a single task can join them locally.","memory":"Co-partition = two decks of cards both sorted into 12 identical piles by suit-rank; pile 7 of each can be matched without touching the others.","full":"<p>A key-based join is local only if both inputs are <b>co-partitioned</b>: (1) keyed by the same key, (2) the input topics have the <b>same partition count</b>, and (3) the same partitioner so equal keys map to equal partition numbers. Then task N holds the partition-N slice of <i>both</i> sides and can join without a network lookup.</p><p>Kafka Streams will automatically insert a repartition if you re-key a stream, but it <b>cannot</b> reconcile mismatched source partition counts — that surfaces as a co-partitioning error at build time. The escape hatch for a small dimension table is a <b>GlobalKTable</b>, which replicates the full table to every task and lifts the co-partitioning requirement (at the cost of full replication).</p>","trap":"Thinking \"same key\" is enough. Same <i>key</i> with different <i>partition counts</i> still breaks, because the modulo lands keys on different partition numbers. Partition count and partitioner must match too.","related":["repartition-shuffle","kstream-vs-ktable","stateful-operation","task-partition-parallelism"]},
  "processing-topology": {"term":"Processing Topology (DAG)","group":"DSS-PROC","aliases":["processing topology","topology","dag","sub-topology","sub-topologies","processor node"],"eli5":"The compiled graph of sources, processors, and sinks that describes how records flow and where state lives.","memory":"Topology = the wiring diagram; tasks = the actual workers wired up per partition. Repartition topics are the solder joints between sub-topologies.","full":"<p>A Kafka Streams app builds a <b>topology</b>: a DAG of <b>processor nodes</b> — sources (consume topics), stateless/stateful processors, and sinks (produce topics) — with state stores attached to stateful nodes. It's the blueprint executed by the runtime and is split at <b>repartition</b> points into <b>sub-topologies</b>, each independently parallelizable.</p><p>Parallelism derives from the topology: each sub-topology becomes one <b>task per input partition</b>, tasks carry the relevant state stores, and tasks are distributed across stream threads and application instances. Flink expresses the same idea as a <b>dataflow/operator graph</b> scheduled onto TaskManager slots.</p>","trap":"Confusing the logical DAG with runtime parallelism. The topology is one description; at runtime it's instantiated as (sub-topology × partition) tasks — so partition count, not DAG shape, caps your parallelism.","related":["task-partition-parallelism","repartition-shuffle","stateful-operation","kafka-streams-vs-flink"]},
  "task-partition-parallelism": {"term":"Task / Partition Parallelism","group":"DSS-PROC","aliases":["task","tasks","stream thread","stream threads","task parallelism","partition parallelism"],"eli5":"Each input partition becomes one task; tasks run on threads spread across instances, so max parallelism equals the partition count.","memory":"Partitions are the seats; tasks are the people who must sit one-per-seat. More chairs than seats = people standing idle.","full":"<p>In Kafka Streams the unit of parallelism is the <b>task</b>: one task per partition of a sub-topology's input. A task owns its assigned partitions and the matching slice of every state store. <b>Stream threads</b> (configurable per instance via <code>num.stream.threads</code>) each run one or more tasks, and the consumer-group protocol balances tasks across all running application instances.</p><p>Consequently maximum parallelism is bounded by the input <b>partition count</b> — adding instances or threads beyond that leaves tasks idle. Scaling out is just starting more instances with the same <code>application.id</code>; the group rebalances and migrates tasks (and their state, restored from changelogs or warmed via standbys).</p>","trap":"Expecting more threads/instances to keep speeding things up. Past <code>partition_count</code> tasks, extra capacity sits idle — to scale further you must <i>add partitions</i> (which itself reshuffles keys and is disruptive for stateful apps).","related":["processing-topology","state-store","co-partitioning","kafka-streams-vs-flink"]},
  "kafka-streams-vs-flink": {"term":"Kafka Streams vs Flink","group":"DSS-PROC","aliases":["kafka streams vs flink","kafka streams","flink","kafka-streams"],"eli5":"Kafka Streams is a library inside your app with state in local RocksDB+changelogs; Flink is a separate cluster engine with managed state and checkpoints.","memory":"Kafka Streams = a library you import (state on your own laptop, backup in Kafka). Flink = a cluster you submit a job to (state managed by the engine, backup in S3).","full":"<p><b>Kafka Streams</b> is an embedded <i>library</i> (a JVM dependency, no separate cluster): it consumes from and produces to Kafka, keeps state in local RocksDB backed by <b>changelog topics</b>, and scales by running more instances in a consumer group. Fault tolerance = changelog replay; exactly-once = Kafka transactions over the read-process-write cycle.</p><p><b>Flink</b> is a distributed <i>dataflow engine</i> (JobManager + TaskManagers) with first-class managed state, a richer event-time/operator model, and fault tolerance via <b>asynchronous barrier checkpoints</b> to durable storage (S3/HDFS), enabling cluster-managed rescaling and savepoints. Rule of thumb: Kafka-centric microservice-style topologies → Kafka Streams; large, complex, multi-source dataflows with heavy event-time logic → Flink.</p>","trap":"Saying Kafka Streams \"runs on a cluster.\" It has <i>no</i> processing cluster of its own — it's just your app instances plus the Kafka brokers; the only shared infra is Kafka itself.","related":["state-store","changelog-topic","processing-topology","task-partition-parallelism"]}
});

</script>
