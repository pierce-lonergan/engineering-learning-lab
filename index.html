<script>
/* Foundations · Networking (FND-NET) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-NET","front":"OSI 7-layer model vs the TCP/IP model","back":"<strong>OSI</strong> is a 7-layer reference model: Physical, Data Link, Network, Transport, Session, Presentation, Application. The <strong>TCP/IP</strong> model is what the internet actually runs: Link, Internet (<code>IP</code>), Transport (<code>TCP</code>/<code>UDP</code>), Application — collapsing OSI's top three (5-6-7) into one Application layer. OSI is a teaching/diagnostic vocabulary (\"that's a layer-7 problem\"); TCP/IP is the deployed stack."},
  {"sec":"FND-NET","front":"Which OSI layer does each common protocol live at?","back":"<ul><li><strong>L2 Data Link</strong> — Ethernet, ARP, MAC addresses, switches</li><li><strong>L3 Network</strong> — IP, ICMP, routers (logical addressing + routing)</li><li><strong>L4 Transport</strong> — TCP, UDP (ports, end-to-end delivery)</li><li><strong>L7 Application</strong> — HTTP, DNS, gRPC; TLS is usually placed at L6/presentation but in practice runs as a shim above L4 (TCP)</li></ul>"},
  {"sec":"FND-NET","front":"The TCP 3-way handshake — exact steps and flags","back":"<ul><li><code>SYN</code> — client sends SYN with its initial sequence number (ISN)</li><li><code>SYN-ACK</code> — server replies with its own ISN and ACKs the client's</li><li><code>ACK</code> — client ACKs the server's ISN; connection is ESTABLISHED</li></ul>It costs <strong>1 round trip (1 RTT)</strong> before the client can send data (the third segment, the ACK, may itself carry payload). The randomized ISNs defend against off-path spoofing and stale-segment confusion."},
  {"sec":"FND-NET","front":"How does TCP provide reliable, ordered delivery?","back":"Every byte has a <strong>sequence number</strong>; the receiver returns <strong>cumulative ACKs</strong> for the highest contiguous byte received. Unacknowledged data is <strong>retransmitted</strong> (on RTO timeout or fast-retransmit after 3 duplicate ACKs). The receiver <strong>reorders</strong> out-of-order segments and discards duplicates, and a <strong>checksum</strong> drops corrupted segments. The result is a reliable, in-order byte stream over an unreliable packet network."},
  {"sec":"FND-NET","front":"Flow control vs congestion control in TCP — what's the difference?","back":"<strong>Flow control</strong> protects the <em>receiver</em>: the advertised <strong>receive window</strong> (<code>rwnd</code>) tells the sender how much buffer space is free so a fast sender can't overrun a slow receiver. <strong>Congestion control</strong> protects the <em>network</em>: the sender maintains a <strong>congestion window</strong> (<code>cwnd</code>) it grows/shrinks based on loss/delay signals (slow start, congestion avoidance, fast recovery). The sender may have at most <code>min(rwnd, cwnd)</code> unacked bytes in flight."},
  {"sec":"FND-NET","front":"What is TCP head-of-line (HOL) blocking?","back":"TCP delivers a single in-order byte stream, so one lost segment forces <strong>every</strong> later segment to wait in the kernel buffer until the gap is retransmitted and filled — even logically independent data is stalled behind it. This is why HTTP/2, which multiplexes many streams over <em>one</em> TCP connection, still suffers HOL blocking at the transport layer; HTTP/3 fixes it by moving to QUIC over UDP with per-stream ordering."},
  {"sec":"FND-NET","front":"UDP — what it provides and what it deliberately omits","back":"UDP is a thin, <strong>connectionless</strong> datagram layer over IP: it adds only ports and a checksum (mandatory in IPv6, optional in IPv4). <strong>No</strong> handshake, no ACKs/retransmission, no ordering, no flow/congestion control. Datagrams may be lost, duplicated, or reordered. That minimalism means low latency and no per-connection kernel state — apps that want reliability (e.g. QUIC) build it themselves on top."},
  {"sec":"FND-NET","front":"TCP vs UDP — when do you pick which?","back":"Pick <strong>TCP</strong> when you need reliable, ordered delivery and can tolerate handshake/retransmit latency: HTTP(S) over TCP, file transfer, databases, RPC. Pick <strong>UDP</strong> when low latency or one-to-many beats perfect delivery, or you'll roll your own reliability: DNS queries, real-time video/VoIP, gaming, QUIC/HTTP3. Rule of thumb: <em>TCP = a phone call (connection, ordered); UDP = postcards (fire-and-forget).</em>"},
  {"sec":"FND-NET","front":"HTTP/1.1 vs HTTP/2 — what actually changed?","back":"HTTP/1.1 is <strong>text-based</strong>, one in-flight request per TCP connection (responses must return in order → application-level HOL blocking); browsers worked around it with ~6 parallel connections per host (pipelining was specified but rarely usable). HTTP/2 is <strong>binary-framed</strong> and <strong>multiplexes</strong> many concurrent streams over a single connection, with header compression (<code>HPACK</code>) and stream prioritization. It removes app-layer HOL blocking but is still pinned to one TCP connection, so transport-layer HOL blocking remains. (Server push was part of HTTP/2 but is now deprecated and removed from major browsers.)"},
  {"sec":"FND-NET","front":"HTTP/3 and QUIC — what problem does it solve?","back":"HTTP/3 runs over <strong>QUIC</strong>, a transport built on <strong>UDP</strong>. QUIC gives each stream its <em>own</em> ordering, so a lost packet stalls only its own stream — eliminating TCP's transport-layer head-of-line blocking. It also folds the TLS 1.3 handshake into the transport for <strong>1-RTT</strong> (or <strong>0-RTT</strong> resumed) connection setup, and supports <strong>connection migration</strong> via a connection ID so a session survives an IP change (Wi-Fi→cellular)."},
  {"sec":"FND-NET","front":"The TLS 1.3 handshake — what happens and how many round trips?","back":"TLS 1.3 establishes an encrypted channel in <strong>1 RTT</strong>: the client sends <code>ClientHello</code> with its (EC)DHE key-share guess; the server replies <code>ServerHello</code> + key share, then (now encrypted) its certificate and <code>Finished</code>, and both derive session keys via the (EC)DHE exchange. The cert <em>authenticates</em> the server (validated up a CA chain); the session key always comes from ephemeral DH (forward secrecy). <strong>0-RTT</strong> resumption lets a returning client send data in the first flight using a pre-shared key (at the cost of replay risk for that early data)."},
  {"sec":"FND-NET","front":"DNS resolution — the recursive lookup chain","back":"To resolve <code>www.example.com</code>: the <strong>stub resolver</strong> asks a <strong>recursive resolver</strong>, which (on a cache miss) walks the hierarchy — <strong>root</strong> servers → <strong>TLD</strong> server (<code>.com</code>) → <strong>authoritative</strong> server for <code>example.com</code> → the A/AAAA record. Results are cached per-record <strong>TTL</strong> at each layer. Mostly UDP/53; a response too large for the (EDNS0-advertised) UDP buffer is truncated with the <code>TC</code> bit, prompting a retry over TCP (also used for zone transfers). <code>DoH</code>/<code>DoT</code> add encryption."},
  {"sec":"FND-NET","front":"What uniquely identifies a TCP connection (the socket 4-tuple)?","back":"A connection is keyed by the <strong>4-tuple</strong> <code>(src IP, src port, dst IP, dst port)</code> — plus the protocol. Because the client's source port is ephemeral, one client can hold thousands of simultaneous connections to the same server <code>(IP, 443)</code>. A <strong>socket</strong> is the OS endpoint object; a <strong>port</strong> is a 16-bit number (0–65535) demultiplexing traffic to the right socket. Well-known: 80 HTTP, 443 HTTPS, 53 DNS, 22 SSH."},
  {"sec":"FND-NET","front":"\"What happens when you type a URL and press Enter?\" — the path","back":"<ul><li><strong>DNS</strong> resolves the hostname to an IP (cache → recursive resolver → root/TLD/authoritative)</li><li><strong>TCP</strong> 3-way handshake to the IP:443 (after ARP/routing get packets there)</li><li><strong>TLS</strong> handshake negotiates keys + verifies the certificate</li><li><strong>HTTP request</strong> sent; server responds; browser parses HTML and fetches sub-resources (often over HTTP/2 or HTTP/3 multiplexing)</li><li>Build DOM/CSSOM and render</li></ul>Staff-level nuance: ARP/IP routing under it all, OS/connection caches, HSTS upgrade and redirects, and CDN/anycast edge selection all shape the real path."},
  {"sec":"FND-NET","front":"NAT — why your private IP isn't what the server sees","back":"<strong>NAT</strong> (Network Address Translation) lets many hosts on a private network (e.g. <code>192.168.x.x</code>) share one public IP. The router rewrites the source IP/port on outbound packets and keeps a translation table to map replies back — the common form is <strong>PAT/NAPT</strong> (port-based, many-to-one). Consequences: inbound connections need port-forwarding or hole-punching, and the server only ever sees the router's public IP, not your device's private one."}
);

Object.assign(GLOSSARY_DATA, {
  "tcp-three-way-handshake": {"term":"TCP Three-Way Handshake","group":"FND-NET","aliases":["3-way handshake","three-way handshake","syn","syn-ack","tcp handshake"],"eli5":"Before sending data, two machines say \"can you hear me? — yes, can you hear me? — yes\" to agree on starting points.","memory":"SYN → SYN-ACK → ACK = \"knock, knock-back, enter.\"","full":"<p>TCP opens a connection with three segments: <code>SYN</code> (client → server, carrying the client's randomized initial sequence number), <code>SYN-ACK</code> (server → client, carrying the server's ISN and acknowledging the client's), and <code>ACK</code> (client → server). After the third segment the connection is ESTABLISHED. This synchronizes both sides' sequence numbers so the byte stream can be ordered and ACKed.</p><p>It costs <b>one round trip</b> before the client can send application data — the third segment (the ACK) may itself carry payload; TLS then adds more setup on top. Randomized ISNs make off-path spoofing and stale-segment injection much harder. Connections are torn down separately via a <code>FIN</code>/<code>ACK</code> exchange (or an abrupt <code>RST</code>).</p>","trap":"Saying it's 'two messages' or forgetting the final ACK. Also: the handshake establishes sequence numbers — it is NOT where TLS/encryption happens (that's a separate handshake layered on top).","worked":"Client sends SYN seq=1000; server sends SYN seq=5000, ack=1001; client sends ack=5001. Now both know where the other's byte stream begins.","related":["tcp","sequence-number-and-ack","udp"]},
  "tcp": {"term":"TCP (Transmission Control Protocol)","group":"FND-NET","aliases":["tcp","transmission control protocol","reliable transport"],"eli5":"A protocol that turns the internet's lossy packets into a reliable, in-order stream of bytes — like a phone call where nothing is dropped.","memory":"TCP = \"Telephone Call Protocol\": dial (handshake), ordered conversation, hang up (FIN).","full":"<p>TCP is a connection-oriented, reliable, byte-stream transport (L4). It provides ordering via <b>sequence numbers</b>, reliability via <b>cumulative ACKs + retransmission</b>, integrity via a checksum, <b>flow control</b> (receive window) so it doesn't overrun the receiver, and <b>congestion control</b> (congestion window: slow start, congestion avoidance, fast recovery) so it doesn't overrun the network. The sender's in-flight unacked data is bounded by <code>min(rwnd, cwnd)</code>.</p><p>Its strict single-stream ordering is also its weakness: a single lost segment causes <b>head-of-line blocking</b> for everything behind it. This is the core motivation for QUIC/HTTP3.</p>","trap":"Conflating flow control with congestion control — flow control protects the receiver (rwnd), congestion control protects the network (cwnd). They are independent limits.","worked":"A 1 GB upload over a lossy link: cwnd grows exponentially in slow start, then linearly in congestion avoidance; a packet loss cuts cwnd (e.g. halves it in classic Reno) and triggers fast recovery — the classic TCP sawtooth.","related":["tcp-three-way-handshake","sequence-number-and-ack","head-of-line-blocking","udp","osi-vs-tcp-ip"]},
  "udp": {"term":"UDP (User Datagram Protocol)","group":"FND-NET","aliases":["udp","user datagram protocol","datagram","connectionless"],"eli5":"Fire-and-forget packets with no guarantees — fast, stateless, and it's on you to handle anything that gets lost.","memory":"UDP = \"Unreliable Datagram Protocol\" / sending postcards — cheap, fast, might not arrive.","full":"<p>UDP is a connectionless datagram transport that adds almost nothing to IP: source/destination ports and a checksum (mandatory under IPv6, optional under IPv4). There is <b>no</b> handshake, no acknowledgements, no retransmission, no ordering, and no flow or congestion control. Datagrams can be lost, duplicated, or reordered, and there's no per-connection state in the kernel.</p><p>That minimalism is the point: it's the substrate for latency-sensitive or one-to-many traffic (DNS, VoIP, video, gaming) and for protocols like <b>QUIC</b> that implement their own reliability and congestion control in user space, free of TCP's rigidity.</p>","trap":"Claiming UDP is 'just unreliable TCP.' It's a different contract: no connection, no ordering — and crucially, QUIC/HTTP3 chose UDP precisely so they could build BETTER, HOL-blocking-free reliability on top.","worked":"A DNS lookup is one UDP request + one UDP reply (no handshake), which is why it's so fast; if the response is too big to fit the UDP buffer it's truncated and retried over TCP.","related":["tcp","quic","dns","head-of-line-blocking"]},
  "head-of-line-blocking": {"term":"Head-of-Line (HOL) Blocking","group":"FND-NET","aliases":["head-of-line blocking","hol blocking","head of line blocking"],"eli5":"One stuck item at the front of a line freezes everyone behind it, even though they're ready to go.","memory":"Picture one stalled car in a single-lane tunnel — everyone behind waits, no matter their destination.","full":"<p>HOL blocking is when the first item in an ordered queue stalls all the items behind it. It appears at two layers. <b>Application layer (HTTP/1.1):</b> one response per connection must complete before the next starts. HTTP/2 fixed this by multiplexing streams. <b>Transport layer (TCP):</b> because TCP delivers a single in-order byte stream, one lost segment blocks delivery of <em>all</em> later bytes — including independent HTTP/2 streams — until it's retransmitted.</p><p>QUIC/HTTP3 eliminates transport-layer HOL blocking by giving each stream independent ordering over UDP, so a lost packet only stalls its own stream.</p>","trap":"Thinking HTTP/2 fully solved HOL blocking. It removed it at the APPLICATION layer but left it at the TCP layer — which is the whole reason HTTP/3 moved to QUIC/UDP.","worked":"On a 1% loss link, HTTP/2's many streams share one TCP connection: a single dropped packet freezes all of them; HTTP/3 over QUIC keeps the unaffected streams flowing.","related":["tcp","quic","http-versions","udp"]},
  "quic": {"term":"QUIC","group":"FND-NET","aliases":["quic","http/3","http3"],"eli5":"A modern transport over UDP that's basically a faster, encrypted TCP with no head-of-line blocking and connections that survive network switches.","memory":"QUIC = TCP's reliability + TLS's security, minus the HOL blocking (and it lives over UDP).","full":"<p>QUIC is a transport protocol built on <b>UDP</b> that underpins <b>HTTP/3</b>. It reintroduces TCP-like reliability, ordering, and congestion control in user space, but with three big wins: (1) <b>per-stream ordering</b>, so a lost packet only stalls its own stream (no transport HOL blocking); (2) <b>TLS 1.3 baked into the handshake</b>, giving 1-RTT (or 0-RTT resumed) secure setup; and (3) <b>connection migration</b> via a connection ID, so a session survives an IP/network change like Wi-Fi→cellular.</p><p>Because it lives in user space (not the kernel), QUIC can evolve far faster than TCP, which is largely frozen by middlebox ossification.</p>","trap":"Calling QUIC 'just UDP' — it's UDP only as a substrate; QUIC adds full reliability, congestion control, and encryption on top. Also: HTTP/3 ≠ QUIC; HTTP/3 is the HTTP mapping that runs over QUIC. (And 'QUIC' is the official protocol name, not an acronym in the RFC.)","worked":"You start a video call on Wi-Fi and walk out to cellular; the IP changes but QUIC's connection ID keeps the same session alive — no re-handshake, no dropped call.","related":["udp","head-of-line-blocking","tls-handshake","http-versions"]},
  "tls-handshake": {"term":"TLS Handshake","group":"FND-NET","aliases":["tls","tls handshake","ssl","ssl handshake","https"],"eli5":"A quick negotiation that proves the server is who it claims to be and agrees on secret keys, so the rest of the conversation is encrypted.","memory":"\"Hello, here's my key-guess / Hello back, here's my key + cert\" → both compute the same secret. 1.3 = 1 round trip.","full":"<p>TLS layers authentication, integrity, and confidentiality over TCP (or is fused into QUIC). In <b>TLS 1.3</b> the handshake is <b>1 RTT</b>: <code>ClientHello</code> offers cipher suites and an (EC)DHE key share; <code>ServerHello</code> returns the chosen suite and the server's key share, after which the server's certificate and <code>Finished</code> are sent <em>encrypted</em>; both sides then derive identical session keys, and the cert is validated up a chain to a trusted root CA. <b>0-RTT</b> resumption lets returning clients send data in the very first flight via a pre-shared key.</p><p>TLS 1.3 dropped the old RSA key-transport and the extra round trip of TLS 1.2, and always uses forward-secret ephemeral Diffie-Hellman so capturing the server's private key later can't decrypt past sessions.</p>","trap":"Saying TLS encrypts with the certificate's RSA key. In TLS 1.3 the cert only AUTHENTICATES (signs); the symmetric session key comes from an ephemeral DH exchange (forward secrecy). RSA key transport is gone.","worked":"Visiting an HTTPS site over TCP: TCP handshake (1 RTT) + TLS 1.3 handshake (1 RTT) = ~2 RTT before the first byte of HTTP — which is exactly the latency QUIC's combined 1-RTT setup cuts down.","related":["tcp","quic","what-happens-when-you-type-a-url","dns"]},
  "dns": {"term":"DNS (Domain Name System)","group":"FND-NET","aliases":["dns","domain name system","resolver","name resolution"],"eli5":"The internet's phone book: it turns a human name like example.com into the IP address machines actually route to.","memory":"Root → TLD → Authoritative = \"phone book → section → exact listing.\" UDP/53.","full":"<p>DNS is a distributed, hierarchical, cached lookup system. A host's <b>stub resolver</b> asks a <b>recursive resolver</b>; on a cache miss the recursive resolver walks the tree: a <b>root</b> server points to the <b>TLD</b> server (e.g. <code>.com</code>), which points to the <b>authoritative</b> server for the domain, which returns the record (A/AAAA for IPs, plus CNAME, MX, NS, TXT, etc.). Every record carries a <b>TTL</b> that governs how long each layer caches it.</p><p>It runs mostly over <b>UDP port 53</b> (fast, single round trip); a response too large for the UDP buffer (512 bytes by default, larger if negotiated via EDNS0) is truncated with the <b>TC</b> bit set, and the resolver retries over <b>TCP</b> (also used for zone transfers). <b>DoH/DoT</b> add encryption to stop eavesdropping on queries.</p>","trap":"Describing it as a single server lookup. It's a recursive walk down a hierarchy with caching at every hop — and a stale/long TTL is why DNS changes take time to propagate.","worked":"First visit to example.com: resolver hits root (→ .com servers), then .com (→ example.com's NS), then authoritative (→ A record 93.184.x.x), caches each for its TTL; the next visitor in that TTL window gets an instant cached answer.","related":["udp","what-happens-when-you-type-a-url","ports-and-sockets"]},
  "ports-and-sockets": {"term":"Ports & Sockets","group":"FND-NET","aliases":["port","ports","socket","sockets","4-tuple","ephemeral port"],"eli5":"A port is a numbered door on a machine; a socket is one specific open conversation; the combination of both ends' IPs and ports names a unique connection.","memory":"IP = the building's street address; port = the apartment number; 4-tuple = the full \"from-this-apartment to-that-apartment\" line.","full":"<p>A <b>port</b> is a 16-bit number (0–65535) that the transport layer uses to demultiplex traffic to the right process. Servers listen on <b>well-known</b> ports (80 HTTP, 443 HTTPS, 53 DNS, 22 SSH); clients pick a transient <b>ephemeral</b> source port per connection. A <b>socket</b> is the OS endpoint object an app reads/writes.</p><p>A live TCP connection is uniquely identified by the <b>4-tuple</b> <code>(src IP, src port, dst IP, dst port)</code> (plus protocol). Because the client's source port varies, one client can hold thousands of concurrent connections to the same <code>server-IP:443</code> — each is a distinct tuple, hence a distinct socket.</p>","trap":"Thinking a connection is identified only by destination IP+port. It's the FULL 4-tuple — which is exactly why thousands of clients (and even many connections from one client) can all talk to :443 simultaneously.","worked":"Your browser opens 3 connections to a server: all share dst (1.2.3.4:443) but each has a different ephemeral src port (e.g. 50001/50002/50003), so the kernel keeps them as three separate sockets.","related":["tcp","udp","dns","what-happens-when-you-type-a-url"]},
  "osi-vs-tcp-ip": {"term":"OSI vs TCP/IP Model","group":"FND-NET","aliases":["osi","osi model","tcp/ip model","layered model","seven layers"],"eli5":"OSI is the 7-layer textbook map for talking about networks; TCP/IP is the 4-layer model the real internet actually runs on.","memory":"OSI top-down: \"All People Seem To Need Data Processing\" (App, Presentation, Session, Transport, Network, Data link, Physical).","full":"<p>The <b>OSI model</b> has 7 layers — Physical, Data Link, Network, Transport, Session, Presentation, Application — and is a vendor-neutral reference vocabulary for reasoning about and diagnosing networks (\"that's a layer-3 routing issue\"). The <b>TCP/IP model</b> is the deployed 4-layer stack: Link, Internet (IP), Transport (TCP/UDP), Application — it merges OSI's Session/Presentation/Application into one Application layer.</p><p>Each layer adds its own header (encapsulation) and treats the layer below as an opaque pipe. The mapping matters in interviews for placing protocols: routers are L3, switches L2, TCP/UDP L4, HTTP/DNS L7.</p>","trap":"Forcing every real protocol into a clean OSI layer. TLS is conceptually L6 (presentation) but runs as a shim above L4; the internet was built on TCP/IP, and OSI's session/presentation layers have no clean real-world counterpart.","worked":"Diagnosing 'site won't load': L3 = can I ping the IP? L4 = is :443 open (TCP handshake)? L7 = does the HTTP/TLS response come back? Naming the layer scopes the bug.","related":["tcp","udp","ports-and-sockets","http-versions"]},
  "http-versions": {"term":"HTTP/1.1 vs HTTP/2 vs HTTP/3","group":"FND-NET","aliases":["http","http/1.1","http/2","http/3","multiplexing","hpack"],"eli5":"The same web protocol got faster in three steps: one-request-at-a-time, then many-at-once over one connection, then many-at-once with no head-of-line blocking.","memory":"1.1 = one lane / 2 = many lanes, one road (one bad pothole jams all) / 3 = many lanes, independent roads (QUIC).","full":"<p><b>HTTP/1.1:</b> text-based, one outstanding request per TCP connection (ordered responses → application HOL blocking); browsers opened ~6 connections per host to parallelize. <b>HTTP/2:</b> binary framing, <b>multiplexing</b> of many concurrent streams over a single connection, header compression (<code>HPACK</code>), and prioritization — but still one TCP connection, so a lost packet causes transport-layer HOL blocking. <b>HTTP/3:</b> the same multiplexed semantics over <b>QUIC/UDP</b>, where each stream is independently ordered, removing transport HOL blocking and adding 0/1-RTT setup and connection migration.</p><p>The throughline: each version reduces blocking and connection overhead while keeping HTTP semantics (methods, headers, status codes) identical. (HTTP/2's server push was little-used and has since been deprecated/removed from major browsers.)</p>","trap":"Believing HTTP/2's multiplexing eliminated HOL blocking. It killed APPLICATION-layer HOL but kept TCP-layer HOL — the precise reason HTTP/3 switched to QUIC over UDP.","worked":"Loading 50 small assets: HTTP/1.1 needs ~6 connections and queues; HTTP/2 sends all 50 as parallel streams on one connection (but one dropped TCP packet stalls all 50); HTTP/3 keeps the 49 unaffected streams flowing.","related":["head-of-line-blocking","quic","tcp","tls-handshake"]},
  "what-happens-when-you-type-a-url": {"term":"What Happens When You Type a URL","group":"FND-NET","aliases":["type a url","url to page","page load path"],"eli5":"Your browser looks up the name, opens a secure connection, asks for the page, and renders what comes back — with DNS, TCP, TLS, and HTTP each doing a step.","memory":"DNS → TCP → TLS → HTTP → render. \"Find it, dial it, secure it, ask it, draw it.\"","full":"<p>The canonical chain: (1) <b>DNS</b> resolves the hostname to an IP (browser/OS cache → recursive resolver → root/TLD/authoritative). (2) The OS routes packets (ARP for the next-hop MAC, IP routing) and opens a <b>TCP</b> connection to <code>IP:443</code> via the 3-way handshake. (3) The <b>TLS</b> handshake negotiates keys and verifies the certificate. (4) The browser sends the <b>HTTP</b> request; the server responds; the browser parses the HTML and fetches sub-resources (often multiplexed over HTTP/2 or HTTP/3). (5) It builds the DOM/CSSOM and renders.</p><p>Staff-level texture: HSTS upgrades to HTTPS before any request, CDNs/anycast pick a nearby edge, keep-alive/connection reuse avoids repeat handshakes, and caching (DNS TTL, HTTP cache) short-circuits whole steps.</p>","trap":"Stopping at 'DNS then HTTP.' Strong answers name the TCP handshake, the TLS handshake, ARP/IP routing beneath, and caching/CDN/HSTS effects that reorder or skip steps.","worked":"Returning to a site you visited seconds ago: DNS is cached, the TCP+TLS connection is reused (keep-alive), so the browser skips straight to the HTTP request — sub-second load.","related":["dns","tcp-three-way-handshake","tls-handshake","http-versions","ports-and-sockets"]},
  "sequence-number-and-ack": {"term":"Sequence Numbers & ACKs","group":"FND-NET","aliases":["sequence number","sequence numbers","acknowledgement","cumulative ack","retransmission"],"eli5":"TCP numbers every byte and the receiver reports the highest run it has, so the sender knows exactly what to resend.","memory":"Cumulative ACK = \"I have everything up to byte N\" — like a bookmark, not a per-page receipt.","full":"<p>Each byte in a TCP stream has a <b>sequence number</b> (offset from the randomized ISN). The receiver returns a <b>cumulative ACK</b> for the next byte it expects — implicitly acknowledging everything contiguous before it. The sender retransmits unacked data on a timeout (RTO) or, faster, after <b>three duplicate ACKs</b> (fast retransmit), which signal a gap while later data is still arriving.</p><p>Out-of-order segments are buffered and reordered; duplicates and corrupt segments (checksum) are dropped. Together this turns IP's unreliable, unordered packets into a reliable in-order stream — but the single-stream guarantee is what creates head-of-line blocking.</p>","trap":"Assuming each segment gets its own ACK. TCP ACKs are cumulative (and often delayed/coalesced); SACK is an extension that reports non-contiguous blocks so the sender retransmits only the true gaps.","worked":"Sender sends bytes 1–1000 in 4 segments; segment 2 (251–500) is lost. Receiver keeps ACKing 'expect 251' as 3,4 arrive → 3 duplicate ACKs → sender fast-retransmits just segment 2.","related":["tcp","tcp-three-way-handshake","head-of-line-blocking"]}
});

</script>

<script>
/* Foundations · Rate Limiting & Backpressure (FND-RL) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-RL","front":"Why rate-limit at all? (the four core motives)","back":"To protect a service from being overwhelmed and ensure fair, predictable behavior: <ul><li><strong>Stability</strong> — cap load so a traffic spike or a runaway client can't exhaust CPU/memory/DB connections.</li><li><strong>Fairness</strong> — stop one noisy tenant from starving others (the noisy-neighbor problem).</li><li><strong>Cost</strong> — bound spend on metered downstream resources (API calls, compute).</li><li><strong>Security</strong> — blunt brute-force, scraping, and DoS attacks.</li></ul>"},
  {"sec":"FND-RL","front":"Token bucket vs leaky bucket — the one-line distinction","back":"Both bound a long-run average rate, but the <strong>token bucket allows bursts</strong> up to the bucket capacity, while the <strong>leaky bucket smooths output to a constant rate</strong> regardless of arrival pattern. Token bucket controls <em>how many</em> you can spend now; leaky bucket controls <em>how fast</em> they drain. Token bucket is the more common API limiter because bursting is usually desirable."},
  {"sec":"FND-RL","front":"How does a token bucket actually work (refill + capacity)?","back":"Tokens are added at a fixed rate <code>r</code> per second up to a max <code>capacity</code> (the burst size). Each request consumes one token; if the bucket is empty the request is rejected or queued. Steady-state throughput is <code>r</code>, but an idle client accumulates up to <code>capacity</code> tokens and can spend them in one burst. Implemented lazily: on each request compute <code>tokens = min(capacity, tokens + elapsed * r)</code> rather than running a background timer."},
  {"sec":"FND-RL","front":"Fixed window counter — the boundary-spike flaw","back":"A fixed window counts requests per discrete interval (e.g. per minute) and resets the counter at each boundary. It's O(1) memory but has a <strong>double-rate burst at the edge</strong>: a client can fire a full limit in the last second of one window and a full limit in the first second of the next, achieving up to <strong>2x the limit</strong> across a window-spanning interval."},
  {"sec":"FND-RL","front":"Sliding window log — accuracy vs cost","back":"Stores a <strong>timestamp for every request</strong> and counts how many fall within the trailing window on each call (evicting older ones). It's the most accurate algorithm — no boundary artifacts — but memory grows with request volume (<code>O(N)</code> per key), making it expensive at high throughput. Typically backed by a sorted set (e.g. Redis <code>ZADD</code> + <code>ZREMRANGEBYSCORE</code>)."},
  {"sec":"FND-RL","front":"Sliding window counter — the weighted-approximation trick","back":"Approximates a sliding window cheaply by blending two fixed-window counts. Estimated count = <code>current_window_count + previous_window_count * (overlap fraction of the previous window still inside the trailing window)</code>. It removes most of the fixed-window boundary spike at <code>O(1)</code> memory, assuming a roughly uniform request distribution within each window. This is the algorithm Cloudflare popularized for production rate limiting."},
  {"sec":"FND-RL","front":"Distributed rate limiting — why a shared store is needed","back":"With N stateless app servers behind a load balancer, per-instance counters let a client do <code>N x limit</code> by spreading requests. Correct global limiting requires a <strong>shared, atomic counter</strong> (commonly Redis). The trade-off is a network round-trip per request and a single coordination point; some systems prefer approximate local limiting (each node gets <code>limit/N</code>) to avoid that latency and SPOF."},
  {"sec":"FND-RL","front":"The race condition in distributed counters (and the fix)","back":"A naive read-modify-write (<code>GET</code>, increment in app, <code>SET</code>) lets two concurrent requests both read the same count and both write back, overshooting the limit. Fix with <strong>atomicity</strong>: a Redis <code>INCR</code> (atomic, returns the new value), a Lua script that reads+checks+writes in one server-side operation, or <code>WATCH</code>/<code>MULTI</code> optimistic transactions. The check-and-increment must be one indivisible step."},
  {"sec":"FND-RL","front":"Backpressure vs load shedding","back":"Both respond to overload but in opposite directions: <strong>backpressure pushes the signal upstream</strong> — it slows or blocks the producer so the whole pipeline self-throttles (e.g. a bounded queue that blocks writers, TCP flow control). <strong>Load shedding drops work</strong> — it rejects or discards requests the system can't handle (429s, dropping low-priority traffic) to protect the rest. Backpressure preserves work; shedding sacrifices some to save the majority."},
  {"sec":"FND-RL","front":"Throttling vs rate limiting — are they the same?","back":"Closely related and often used interchangeably, but the useful distinction is the <strong>response to excess</strong>: <em>rate limiting</em> typically <strong>rejects</strong> over-limit requests (returns <code>429</code>), while <em>throttling</em> often <strong>delays/queues/slows</strong> them to fit the allowed rate (shaping rather than dropping). Rate limiting is a policy; throttling (smoothing) is one enforcement mechanism alongside rejection."},
  {"sec":"FND-RL","front":"429 Too Many Requests + Retry-After — the contract","back":"<code>429</code> is the standard status for exceeding a rate limit. Per RFC 6585 the response <strong>MAY</strong> include a <strong><code>Retry-After</code></strong> header telling the client when to retry — either a delay in seconds (<code>Retry-After: 30</code>) or an HTTP date. Well-behaved clients honor it; without it, clients should back off exponentially with jitter. Returning <code>429</code> (vs <code>503</code>) signals the limit is per-client/quota, not a server outage."},
  {"sec":"FND-RL","front":"Why exponential backoff needs jitter","back":"If many clients are throttled at the same instant and all back off by the same deterministic schedule, they <strong>retry in synchronized waves</strong> (the thundering herd) and re-overload the server. Adding randomness (<strong>jitter</strong>) spreads retries over time. <em>Full jitter</em> — sleep a random value in <code>[0, base * 2^attempt]</code> (capped) — is the AWS-recommended formulation; in their simulations it did the least total work, beating equal jitter and no-jitter."},
  {"sec":"FND-RL","front":"Circuit breaker — the three states and transitions","back":"<ul><li><strong>Closed</strong>: requests flow normally; failures are counted. Trips to Open when the failure threshold is exceeded.</li><li><strong>Open</strong>: requests fail fast immediately (no call attempted) for a cooldown timeout, giving the dependency time to recover.</li><li><strong>Half-Open</strong>: after the timeout, a limited number of trial requests are allowed through. Success closes the breaker; any failure re-opens it.</li></ul>"},
  {"sec":"FND-RL","front":"Circuit breaker vs rate limiter — what problem does each solve?","back":"A <strong>rate limiter protects a service from its callers</strong> — it caps inbound load you're willing to accept. A <strong>circuit breaker protects a caller from a failing dependency</strong> — it stops sending requests to something that's already broken, failing fast to avoid wasting resources and cascading the failure. One is about volume; the other is about an outage."},
  {"sec":"FND-RL","front":"Where to place a rate limiter, and what to key it on","back":"Place it as early as possible — at the API gateway / edge / load balancer — so rejected traffic never reaches expensive app and DB tiers. Choose the <strong>key</strong> deliberately: per API-key/tenant (fairness + billing), per user ID (abuse), or per IP (anonymous/DoS, but fragile behind NAT and shared proxies). Multiple limiters often stack (per-IP <em>and</em> per-key <em>and</em> global)."}
);

Object.assign(GLOSSARY_DATA, {
  "token-bucket": {"term":"Token Bucket","group":"FND-RL","aliases":["token bucket","token buckets"],"eli5":"A jar refills with coins at a steady rate; each request spends a coin, and a full jar lets you spend a burst all at once.","memory":"Coins drip into a jar; you can save up and splurge, but only up to the jar's size.","full":"<p>Tokens are added to a bucket at a constant rate <code>r</code> up to a maximum <code>capacity</code> (the burst allowance). Each request removes one token; if none are available the request is rejected or delayed. The long-run average rate is bounded by <code>r</code>, but accumulated tokens permit short bursts up to <code>capacity</code>.</p><p>Implementations are <b>lazy</b>: rather than a timer adding tokens, each request computes <code>tokens = min(capacity, tokens + (now - last_refill) * r)</code>, then decrements. This makes it <code>O(1)</code> in time and memory per key, which is why it's the default algorithm for most API gateways and is the model behind the Linux <code>tc</code> token bucket filter (<code>tbf</code>) used for traffic shaping.</p>","trap":"Saying token bucket 'enforces a constant rate' — that's the leaky bucket. The token bucket's defining feature is that it <em>permits bursts</em> up to the bucket capacity.","worked":"<code>r=10/s</code>, <code>capacity=10</code>. Client idle for 1s accumulates 10 tokens, fires 10 requests instantly (a burst), then is limited to 10/s thereafter.","related":["leaky-bucket","rate-limiting","throttling"]},
  "leaky-bucket": {"term":"Leaky Bucket","group":"FND-RL","aliases":["leaky bucket","leaky buckets"],"eli5":"Water pours into a bucket with a hole; it drips out at a fixed rate no matter how fast it pours in, and overflow spills (is dropped).","memory":"Bucket with a hole: input is bursty, output always drips at the same steady pace.","full":"<p>Requests enter a FIFO queue (the bucket) and are processed/leaked at a fixed rate. If the queue is full, new requests overflow and are dropped. The key property is <b>output smoothing</b>: regardless of bursty arrivals, downstream sees a perfectly constant rate — ideal for protecting a fragile downstream that can't tolerate spikes (e.g. a legacy DB or a metered third-party API).</p><p>The cost is added latency (requests wait in the queue) and no burst accommodation. Contrast with the token bucket, which lets bursts through immediately. The leaky bucket is fundamentally a <i>shaper</i> (it buffers and smooths); the deeper networking distinction is buffer vs no-buffer — <b>shaping</b> queues excess, <b>policing</b> drops or marks it, and a token bucket can be used for either.</p>","trap":"Claiming leaky bucket allows bursts. It does the opposite — it <em>absorbs</em> bursts into a queue and emits a smooth, constant rate.","related":["token-bucket","throttling","backpressure"]},
  "fixed-window": {"term":"Fixed Window Counter","group":"FND-RL","aliases":["fixed window","fixed window counter","fixed-window"],"eli5":"Count requests in each clock-aligned bucket (per minute) and reset to zero at the boundary.","memory":"A new minute = a clean slate, so requests pile up on both sides of the midnight line.","full":"<p>Maintain a counter per key per fixed interval (e.g. <code>user:123:202606211200</code>). Increment on each request; reject when the counter exceeds the limit; the counter resets at the next boundary. It's trivially <code>O(1)</code> memory and the easiest to implement atomically (<code>INCR</code> + <code>EXPIRE</code>).</p><p>Its flaw is the <b>boundary spike</b>: because the window snaps to clock time, a client can place a full limit just before the reset and another full limit just after, sending up to <b>2x the limit</b> in a short span crossing the boundary. Acceptable when occasional 2x bursts are tolerable; otherwise use a sliding-window variant.</p>","trap":"Forgetting the 2x edge burst. Interviewers expect you to name the boundary-spike weakness immediately — it's the whole reason sliding windows exist.","worked":"Limit 100/min. 100 requests at 12:00:59 + 100 at 12:01:00 = 200 requests in ~1 second, all 'within limits'.","related":["sliding-window-log","sliding-window-counter","rate-limiting"]},
  "sliding-window-log": {"term":"Sliding Window Log","group":"FND-RL","aliases":["sliding window log","sliding-window log","sliding window"],"eli5":"Keep the timestamp of every request and count how many happened in the last N seconds, dropping old ones.","memory":"A logbook of every knock at the door; you literally count the last N minutes of entries.","full":"<p>Store every request's timestamp (typically in a sorted set). On each request, evict timestamps older than <code>now - window</code> and count what remains; admit if the count is under the limit. This is <b>exact</b> — no boundary artifacts, the window truly slides — but memory and processing scale with request count (<code>O(N)</code> per key), which is costly under high volume or abuse.</p><p>In Redis it's <code>ZREMRANGEBYSCORE</code> (evict) + <code>ZCARD</code> (count) + <code>ZADD</code> (record), wrapped in a transaction or Lua script for atomicity. The sliding-window <i>counter</i> exists precisely to approximate this at <code>O(1)</code> memory.</p>","trap":"Pitching it as the best choice without flagging the memory cost. The right framing is 'most accurate, but <code>O(N)</code> memory per key — a DoS amplifies storage.'","related":["fixed-window","sliding-window-counter","distributed-rate-limiting"]},
  "sliding-window-counter": {"term":"Sliding Window Counter","group":"FND-RL","aliases":["sliding window counter","sliding-window counter"],"eli5":"Blend this window's count with a fraction of last window's count to fake a smooth sliding window cheaply.","memory":"Two adjacent buckets; you borrow a slice of the older one proportional to how far you've slid.","full":"<p>A hybrid that keeps two fixed-window counters and weights the previous one by how much of it still overlaps the trailing window: <code>estimate = curr + prev * (1 - elapsed_fraction_of_current_window)</code>. It removes most of the fixed-window boundary spike while staying <code>O(1)</code> in memory — only two integers per key.</p><p>The estimate assumes requests are <b>uniformly distributed</b> within a window, so it can be slightly off for highly clustered traffic. Cloudflare reported that over 400M requests from 270K sources only ~0.003% were wrongly allowed or limited (and none below threshold were blocked) — far cheaper than a log, which makes it the pragmatic default for large-scale limiting.</p>","trap":"Calling it exact. It's an <em>approximation</em> that assumes uniform arrival within the window — accurate enough for production, but not a true sliding window.","worked":"Limit 100/min, 30s into the current minute (50% elapsed): prev=80, curr=20 → estimate = 20 + 80*0.5 = 60 < 100, so admit.","related":["fixed-window","sliding-window-log","rate-limiting"]},
  "distributed-rate-limiting": {"term":"Distributed Rate Limiting","group":"FND-RL","aliases":["distributed rate limiting","distributed rate limiter","shared store"],"eli5":"Make many app servers share one global counter so a client can't multiply its limit by hitting different nodes.","memory":"One shared scoreboard for the whole cluster — otherwise every server keeps its own and the total drifts way over.","full":"<p>With multiple stateless nodes behind a load balancer, per-node counters let a client achieve <code>nodes x limit</code> by spreading traffic. A correct global limit needs <b>shared state</b> — usually an atomic counter in Redis — incremented from every node. The cost is a network round-trip per request plus a coordination point that becomes a latency and availability dependency.</p><p>The two hard problems are <b>atomicity</b> (concurrent increments must not lose updates — see the race-condition card; solved with <code>INCR</code> or Lua) and <b>resilience</b> (what if the store is down — fail open to availability or fail closed to safety). High-scale systems often trade exactness for speed: give each node <code>limit/N</code> as a local budget, or sync counts asynchronously/probabilistically rather than on every request.</p>","trap":"Doing read-modify-write across the network (<code>GET</code> then <code>SET</code>). Under concurrency that loses increments and overshoots — the check and increment must be a single atomic operation.","related":["fixed-window","sliding-window-log","rate-limiting"]},
  "backpressure": {"term":"Backpressure","group":"FND-RL","aliases":["backpressure","back-pressure","back pressure"],"eli5":"When a consumer can't keep up, send a 'slow down' signal upstream so the producer eases off instead of flooding you.","memory":"A clogged drainpipe: the backup pushes water all the way up to the tap, forcing you to turn it down.","full":"<p>Backpressure is a feedback mechanism that propagates overload <b>upstream</b>: a slow consumer causes its bounded queue to fill, which blocks or slows the producer, which cascades back to the original source until the whole pipeline runs at the slowest stage's pace. TCP flow control (the receive window), bounded blocking queues, and Reactive Streams' <code>request(n)</code> demand signaling are all backpressure.</p><p>Its virtue is that <b>no work is dropped</b> — the system self-throttles to a sustainable rate. Its risk is that blocking can propagate all the way to user-facing latency or, if a stage can't push back (e.g. UDP, an external firehose), it degenerates and you must fall back to load shedding. Bounded buffers are essential: an unbounded queue 'absorbs' backpressure only until it OOMs.</p>","trap":"Conflating it with load shedding. Backpressure <em>slows the producer to preserve work</em>; load shedding <em>drops work</em>. They're complementary opposites, not synonyms.","related":["load-shedding","leaky-bucket","circuit-breaker"]},
  "load-shedding": {"term":"Load Shedding","group":"FND-RL","aliases":["load shedding","load-shedding","shedding"],"eli5":"When you're overloaded and can't slow the source, deliberately drop some requests to keep the rest healthy.","memory":"Rolling blackouts: cut power to some neighborhoods so the whole grid doesn't crash.","full":"<p>Load shedding intentionally rejects or discards work the system can't handle — returning <code>429</code>/<code>503</code>, dropping low-priority or already-late requests, or sampling traffic — to protect overall health and latency. It's the answer when backpressure isn't possible (the source won't slow down) or when blocking would be worse than dropping.</p><p>Good shedding is <b>prioritized</b>: shed cheap/low-value/retryable traffic first, protect critical paths (health checks, paying customers, in-flight transactions). Naive shedding under overload can make things worse if every dropped request is retried — pair it with <code>Retry-After</code>, backoff, and request deduplication. It's a deliberate partial failure to avoid total collapse.</p>","trap":"Treating it as a failure mode rather than a designed control. Shedding is a <em>chosen</em> survival strategy, and dropping the right requests (low priority) matters more than dropping fewer.","related":["backpressure","rate-limiting","circuit-breaker"]},
  "circuit-breaker": {"term":"Circuit Breaker","group":"FND-RL","aliases":["circuit breaker","circuit-breaker","breaker"],"eli5":"Like a household fuse: after too many failures it trips open and fails fast, then occasionally tests if the dependency recovered before resuming.","memory":"An electrical breaker: it trips Open on overload, you wait, then flip it Half-Open to test before fully resetting (Closed).","full":"<p>A circuit breaker wraps calls to a dependency and tracks failures. <b>Closed</b>: calls pass through and failures are counted; exceeding a threshold trips it. <b>Open</b>: calls fail fast immediately for a cooldown period — no request is even attempted — sparing the caller's threads and giving the dependency room to recover. <b>Half-Open</b>: after the cooldown, a few trial calls are admitted; success transitions back to Closed, any failure snaps back to Open.</p><p>It protects the <i>caller</i> from a failing <i>dependency</i> (opposite direction from a rate limiter), and its main job is to prevent <b>cascading failure</b> and thread-pool exhaustion from piling up against a dead service. Tuning the failure threshold, cooldown, and half-open trial count is the real engineering; too sensitive and you trip on transient blips, too lax and you don't protect anything.</p>","trap":"Confusing it with a retry or a rate limiter. A breaker <em>stops</em> calling a broken dependency to fail fast; retries (worse, without backoff) do the opposite and hammer it harder.","worked":"Threshold 50% over 20 calls, cooldown 30s: dependency starts erroring → breaker Opens → 30s of instant failures → 1 trial request (Half-Open) → succeeds → Closed.","related":["load-shedding","backpressure","rate-limiting"]},
  "rate-limiting": {"term":"Rate Limiting","group":"FND-RL","aliases":["rate limiting","rate limiter","rate-limit","rate limit"],"eli5":"Cap how many requests a client may make in a time window, rejecting the excess to protect the service.","memory":"A bouncer with a clicker: only N in per minute, the rest wait outside (429).","full":"<p>Rate limiting bounds the request volume a client (per API key, user, IP, or globally) may consume over time, typically <b>rejecting</b> over-limit requests with <code>429 Too Many Requests</code> and an optional <code>Retry-After</code> hint. It serves stability, fairness (anti noisy-neighbor), cost control, and abuse/DoS defense. It's enforced via algorithms like token bucket, leaky bucket, fixed window, and the sliding-window variants.</p><p>Place it as early as possible — gateway or edge — so rejected load never reaches expensive tiers, and stack multiple keys (per-IP, per-tenant, global) for layered protection. Distinguish it from <b>throttling</b> (delaying to fit a rate vs rejecting) and from a <b>circuit breaker</b> (protecting a caller from a broken dependency, not capping inbound volume).</p>","trap":"Equating rate limiting with throttling. Rate limiting's classic enforcement is <em>rejection</em> (429); throttling often <em>shapes/delays</em> instead. Also: per-instance counters silently give <code>N x limit</code> in a cluster.","related":["token-bucket","throttling","distributed-rate-limiting","fixed-window"]},
  "throttling": {"term":"Throttling","group":"FND-RL","aliases":["throttling","throttle","throttled"],"eli5":"Instead of rejecting excess requests, slow them down or queue them so they fit within the allowed rate.","memory":"A throttle on an engine: you don't cut requests off, you just ease how fast they're fed in.","full":"<p>Throttling regulates the <i>pace</i> of processing. Where rate limiting characteristically rejects over-limit requests, throttling often <b>delays, queues, or smooths</b> them to conform to a target rate — traffic <i>shaping</i> rather than dropping. A leaky bucket is a canonical throttle: bursts are absorbed into a queue and released at a constant rate.</p><p>The terms overlap heavily and many systems use them interchangeably; the interview-useful distinction is the <b>response to excess</b> — reject (limit) vs slow/queue (throttle). Throttling trades latency for completeness (no work dropped) but risks unbounded queues and latency blow-up if arrivals persistently exceed capacity — at which point you fall back to rejection or load shedding.</p>","trap":"Using 'throttling' and 'rate limiting' as exact synonyms in an interview. State the nuance: throttle = shape/slow/queue; rate limit = reject excess. The distinction signals depth.","related":["rate-limiting","leaky-bucket","backpressure"]}
});

</script>

<script>
/* Foundations · System Design Building Blocks (FND-SYS) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-SYS","front":"The canonical request path (happy-path order)","back":"<code>client → DNS → load balancer → app tier → cache → database</code>, with writes/async work fanning out to a <strong>queue → workers</strong>, and large static assets served from <strong>blob storage → CDN</strong>. DNS resolves the hostname (typically cached, not re-resolved every request), the LB spreads connections across stateless app servers, the cache absorbs reads before they hit the DB, and the queue decouples slow work from the request."},
  {"sec":"FND-SYS","front":"Why is statelessness in the app tier a prerequisite for horizontal scaling?","back":"If any request can land on any server (round-robin through the LB), no server may hold session/user state in local memory. Push state to a shared store (Redis, DB, signed cookie/JWT) so servers are interchangeable. Stateless tiers scale by adding boxes and survive any single box dying with zero session loss."},
  {"sec":"FND-SYS","front":"Horizontal vs vertical scaling — the one-line tradeoff","back":"<strong>Vertical</strong> = bigger box (more CPU/RAM): trivial, no code change, but a hard ceiling and a single point of failure. <strong>Horizontal</strong> = more boxes behind a LB: near-unlimited and fault-tolerant, but requires statelessness and introduces distributed-systems complexity (consistency, coordination)."},
  {"sec":"FND-SYS","front":"Sharding (partitioning) vs replication — what problem does each solve?","back":"<strong>Sharding</strong> splits <em>distinct</em> data across nodes by a partition key — it scales <strong>write throughput and total dataset size</strong>. <strong>Replication</strong> copies the <em>same</em> data to multiple nodes — it scales <strong>read throughput and availability/durability</strong>. They are orthogonal; large systems use both (sharded, each shard replicated)."},
  {"sec":"FND-SYS","front":"How do read replicas help, and what do they cost you?","back":"Reads fan out to follower replicas while writes go only to the leader, multiplying <strong>read</strong> capacity for read-heavy workloads. The cost is <strong>replication lag</strong>: a follower may serve stale data, so a client can write then fail to read its own write. Mitigate with read-your-writes routing (send the user's reads to the leader briefly after a write)."},
  {"sec":"FND-SYS","front":"Read-heavy vs write-heavy — which lever do you reach for first?","back":"<strong>Read-heavy</strong> (e.g. social feed, catalog): add <strong>caching</strong> and <strong>read replicas</strong>; reads scale cheaply by duplication. <strong>Write-heavy</strong> (e.g. metrics, event ingest): caching/replicas don't help writes — reach for <strong>sharding</strong>, write-optimized stores (LSM-tree), and a <strong>queue</strong> to buffer/batch and smooth bursts."},
  {"sec":"FND-SYS","front":"Why put a queue between the app tier and workers?","back":"The queue <strong>decouples</strong> the synchronous request from slow/bursty work (email, video transcode, fan-out). Benefits: absorbs traffic spikes (buffering), smooths load on downstream systems, enables retries, and lets you scale workers independently. Cost: eventual consistency — the result isn't ready when the response returns."},
  {"sec":"FND-SYS","front":"What is a single point of failure (SPOF), and where do they hide?","back":"A SPOF is any component whose failure takes down the whole system. Common hideouts: a <strong>single DB leader</strong>, one LB instance, a lone cache, a single AZ/region, or shared config/DNS. Eliminate with redundancy + automatic failover (multi-AZ replicas, redundant LBs, health checks). The LB itself must be made HA or it becomes the SPOF."},
  {"sec":"FND-SYS","front":"Availability 'nines' — translate the percentages to downtime/year","back":"<ul><li><strong>99%</strong> (two nines) ≈ <strong>3.65 days</strong>/yr</li><li><strong>99.9%</strong> (three nines) ≈ <strong>8.76 hours</strong>/yr</li><li><strong>99.99%</strong> (four nines) ≈ <strong>52.6 minutes</strong>/yr</li><li><strong>99.999%</strong> (five nines) ≈ <strong>5.26 minutes</strong>/yr</li></ul>Rule of thumb: each extra nine cuts downtime ~10×."},
  {"sec":"FND-SYS","front":"How does serial dependency affect a system's composite availability?","back":"Components in series <strong>multiply</strong>: two services at 99.9% in series give <code>0.999 × 0.999 ≈ 99.8%</code> — availability only drops as you add dependencies. Redundant components in <strong>parallel</strong> (assuming independent, uncorrelated failures) instead multiply their <em>failure</em> probabilities, so two 99% replicas give <code>1 − 0.01² = 99.99%</code>. Redundancy up, dependency chains down."},
  {"sec":"FND-SYS","front":"Back-of-envelope latency ladder (the numbers to have memorized)","back":"<ul><li>L1 cache ref: <strong>~1 ns</strong></li><li>Main memory (RAM) ref: <strong>~100 ns</strong></li><li>SSD random read: <strong>~16–150 µs</strong> (~100 µs)</li><li>Same-datacenter round trip: <strong>~0.5 ms</strong></li><li>Disk (HDD) seek: <strong>~10 ms</strong></li><li>Cross-region (e.g. CA↔Netherlands) round trip: <strong>~150 ms</strong></li></ul>"},
  {"sec":"FND-SYS","front":"Latency intuition: RAM vs SSD vs network — the order-of-magnitude jumps","back":"Each tier is roughly <strong>100–1000× slower</strong> than the one above: RAM (~100 ns) is ~100× slower than L1 (~1 ns); SSD (~100 µs) is ~1000× slower than RAM; a cross-region hop (~150 ms) is ~1000×+ slower than SSD. This is <em>why</em> caching in RAM beats SSD beats a network call — and why a single cross-region round trip dominates everything else."},
  {"sec":"FND-SYS","front":"Where does a CDN sit and what does it actually buy you?","back":"A CDN caches static/blob content (images, JS, video) at <strong>edge PoPs near users</strong>, so a fetch is a short hop instead of a cross-region trip to origin. It cuts latency, slashes origin/egress load, and absorbs traffic spikes (including some DDoS). Origin blob storage (e.g. S3) is the durable source of truth behind it."},
  {"sec":"FND-SYS","front":"Leader-follower replication: what's the consistency/availability tradeoff on leader failure?","back":"All writes serialize through one <strong>leader</strong>; followers replicate asynchronously (fast, but can lose the last un-replicated writes on failover) or synchronously (durable, but a slow/down follower stalls writes). On leader death, <strong>failover</strong> promotes a follower — during the gap writes are unavailable, and async lag can cause lost or conflicting writes (split-brain if two leaders emerge)."}
);

Object.assign(GLOSSARY_DATA, {
  "horizontal-scaling": {"term":"Horizontal vs Vertical Scaling","group":"FND-SYS","aliases":["horizontal scaling","vertical scaling","scale out","scale up","scaling horizontally","scaling vertically"],"eli5":"Vertical = buy a bigger machine; horizontal = buy more machines and split the load across them.","memory":"Up = a taller pile on one desk; Out = more desks. Piles topple (ceiling + SPOF); desks don't.","full":"<p><b>Vertical (scale up)</b> adds CPU/RAM/disk to one node. It's the path of least resistance — no architecture change — but hits a hardware ceiling, costs grow super-linearly at the top end, and the box remains a single point of failure. <b>Horizontal (scale out)</b> adds commodity nodes behind a load balancer. It scales near-linearly and tolerates node failure, but demands a <b>stateless</b> app tier and drags in distributed-systems problems: consistency, coordination, data partitioning.</p><p>Senior framing: scale vertically first (cheap, fast), but design horizontally from day one (statelessness, no sticky local state) so the transition isn't a rewrite. The database is usually the hard part to scale horizontally, which is what forces sharding and replication.</p>","trap":"Saying horizontal scaling is 'just add servers.' The catch is the stateful tier — you can't add DB nodes the way you add app nodes; that's why sharding/replication exist and why the DB is the real scaling bottleneck.","worked":"A monolith on a 4-core box maxes at ~2k rps. Vertical: move to 64 cores → ~10k rps, then you're stuck and have one box to lose. Horizontal: run 20 stateless instances behind an LB → ~40k rps and any instance can die with no session loss.","related":["statelessness","load-balancer","sharding","replication"]},
  "statelessness": {"term":"Statelessness","group":"FND-SYS","aliases":["stateless","statelessness","stateful","sticky session","session affinity"],"eli5":"Each server keeps no memory of past requests, so any server can handle any request interchangeably.","memory":"Stateless server = a vending machine: it doesn't remember you, every coin (request) carries its own context.","full":"<p>A <b>stateless</b> service stores no client-specific state in local process memory between requests; everything needed is either in the request (token/JWT, params) or in a shared backing store (Redis, DB). This makes app servers fungible: the load balancer can route any request anywhere, you can add/remove nodes freely, and a crash loses no session data. Statelessness is the enabling property for horizontal scaling and zero-downtime deploys.</p><p><b>Sticky sessions</b> (session affinity) pin a user to one server to keep in-memory state working — a stopgap that re-introduces a mini-SPOF and uneven load. The clean fix is to externalize state, not pin traffic.</p>","trap":"Claiming 'stateless means no state anywhere.' It means no state in the app process — state still lives in the DB/cache/token. The point is the server tier holds nothing irreplaceable.","worked":"Move HTTP sessions from in-process memory to Redis. Now a deploy can rolling-restart every app box, the LB can round-robin freely, and losing a node drops zero logins.","related":["horizontal-scaling","load-balancer","cache"]},
  "load-balancer": {"term":"Load Balancer","group":"FND-SYS","aliases":["load balancer","load balancing","LB","reverse proxy"],"eli5":"A traffic cop in front of your servers that spreads incoming requests across them and routes around dead ones.","memory":"Maître d' at a busy restaurant: seats each guest at an open table, skips the table that just caught fire.","full":"<p>A <b>load balancer</b> distributes client requests across a pool of backend servers (round-robin, least-connections, hashing) and runs <b>health checks</b> to stop sending traffic to unhealthy nodes. It's the entry point that makes a stateless app tier usable and enables rolling deploys and autoscaling. L4 LBs route on TCP/IP; L7 LBs (reverse proxies) route on HTTP (path, host, headers) and can do TLS termination.</p><p>Because all traffic flows through it, the LB is a prime <b>SPOF</b> — you make it highly available with a redundant pair plus a floating/virtual IP or DNS failover, or use a managed cloud LB that's redundant under the hood.</p>","trap":"Forgetting the LB itself needs HA. A single LB in front of 50 redundant app servers makes the whole fleet only as available as that one box.","worked":"L7 LB does least-connections + health checks: when one app node's checks fail, it's pulled from rotation in seconds and traffic redistributes — users never see the dead node.","related":["statelessness","horizontal-scaling","single-point-of-failure"]},
  "sharding": {"term":"Sharding (Partitioning)","group":"FND-SYS","aliases":["sharding","shard","partitioning","partition","partition key","shard key","horizontal partitioning"],"eli5":"Split one giant table across many databases by a key, so each machine owns a slice of the data.","memory":"Sharding cuts the data pie into slices (different rows per node); replication photocopies the whole pie (same rows everywhere).","full":"<p><b>Sharding</b> (horizontal partitioning) divides a dataset across nodes by a <b>partition key</b> so each shard holds a disjoint subset. It's the primary way to scale <b>write throughput</b> and dataset size past one machine — each shard takes independent writes. Strategies: <b>hash</b> (even spread, but range scans hit every shard), <b>range</b> (great for scans, risks hotspots), and <b>directory/lookup</b> (flexible, adds a lookup hop). Consistent hashing minimizes resharding churn when nodes change.</p><p>Costs: cross-shard queries/joins and distributed transactions become expensive or impossible, and a bad key choice creates <b>hot shards</b>. Pick a key that's high-cardinality and spreads load evenly under your real access pattern.</p>","trap":"Confusing sharding with replication. Sharding = different data per node (scales writes/size). Replication = same data copied (scales reads/availability). Interviewers probe whether you know which scales writes.","worked":"Shard <code>users</code> by <code>hash(user_id) % 16</code>. Each of 16 shards handles ~1/16 of writes. But 'list all users in CA' now fan-outs to all 16 shards — a known cross-shard cost.","related":["replication","horizontal-scaling"]},
  "replication": {"term":"Replication (Leader-Follower)","group":"FND-SYS","aliases":["replication","leader-follower","primary-replica","master-slave","read replica","read replicas","replica","replication lag","failover"],"eli5":"Keep copies of the same data on multiple nodes so reads scale and the system survives a node dying.","memory":"Leader writes the master copy; followers are photocopies that arrive a beat late — that beat is the lag.","full":"<p><b>Replication</b> copies identical data to multiple nodes. In <b>leader-follower</b> (primary-replica), one leader takes all writes and streams them to followers; <b>read replicas</b> serve reads to multiply read capacity, and a follower can be promoted on leader failure for availability/durability. <b>Synchronous</b> replication waits for follower acks (durable, higher write latency, stalls if a follower lags); <b>asynchronous</b> is fast but can lose the last un-acked writes on failover.</p><p>The defining cost is <b>replication lag</b>: followers trail the leader, so reads can be <b>stale</b> (eventual consistency). This breaks read-your-writes unless you route a user's post-write reads to the leader. Failover risks <b>split-brain</b> (two leaders) without proper fencing.</p>","trap":"Saying read replicas help write-heavy workloads. They scale READS only — every write still goes through the single leader, which is the write bottleneck. For write scaling you need sharding.","worked":"1 leader + 3 read replicas serves a 95%-read workload: reads fan out 3-wide, writes hit the leader. After a write, a user re-reads from a lagging replica and sees old data — fix by pinning their reads to the leader for a few seconds.","related":["sharding","single-point-of-failure"]},
  "cache": {"term":"Cache","group":"FND-SYS","aliases":["cache","caching","cache hit","cache miss","cache-aside","CDN","content delivery network"],"eli5":"A fast in-memory copy of hot data placed in front of a slow store so most reads never touch the DB.","memory":"Cache is the snacks on your desk vs the grocery store (DB): grab-able instantly, but they go stale and you must restock.","full":"<p>A <b>cache</b> (e.g. Redis/Memcached) keeps frequently-read data in RAM. A networked cache hit returns in ~0.2–1 ms (dominated by the in-DC round trip) versus a heavier DB query + disk read. <b>Cache-aside</b> is the common pattern: app checks cache; on a <b>miss</b> it reads the DB and populates the cache. Caching is the first lever for <b>read-heavy</b> systems — a high hit ratio offloads the DB dramatically. A <b>CDN</b> is a cache for static/blob content placed at edge PoPs near users.</p><p>Hard parts: <b>invalidation</b> (stale data after writes), <b>TTL</b> tuning, and failure modes — <b>cache stampede</b> (many misses hit the DB at once when a hot key expires) and cold-cache thundering herd after a flush.</p>","trap":"'Just add a cache' — but invalidation is famously one of the two hard problems. A cache without an invalidation/TTL strategy serves stale data; a hot-key expiry without protection causes a stampede onto the DB.","worked":"Product page at 95% cache hit: 95% of reads hit Redis (~0.5 ms), only 5% reach Postgres. DB read load drops ~20×, letting one leader serve the whole catalog.","related":["replication","latency-numbers"]},
  "single-point-of-failure": {"term":"Single Point of Failure & Availability Nines","group":"FND-SYS","aliases":["single point of failure","SPOF","availability","nines","high availability","HA","redundancy"],"eli5":"Any one part whose death kills the whole system — kill it with redundancy, then measure uptime in 'nines'.","memory":"Series = a chain (weakest link multiplies you down); Parallel = a safety net (both must fail). Nines: each one is a 10× downtime cut.","full":"<p>A <b>SPOF</b> is a component with no redundancy whose failure brings everything down: a lone DB leader, single LB, one AZ. The remedy is <b>redundancy + automatic failover</b> (multi-AZ replicas, redundant LBs, health checks). <b>Availability</b> is measured in nines: 99% ≈ 3.65 days/yr down, 99.9% ≈ 8.76 hr, 99.99% ≈ 53 min, 99.999% ≈ 5 min — each nine cuts downtime ~10×.</p><p>Math that matters: components <b>in series multiply</b> their availabilities (more dependencies → lower uptime), while <b>independent redundant components in parallel</b> multiply their <i>failure</i> rates (two 99% nodes → 99.99%). The parallel math assumes uncorrelated failures and ignores the shared LB/failover layer in front — correlated outages and that front-door erode the gain. So shorten dependency chains and duplicate critical components.</p>","trap":"Quoting a high SLA while ignoring serial dependencies. If your service calls 5 dependencies each at 99.9% in series, your ceiling is ~99.5% — you can't be more available than the product of your dependency chain. (And parallel redundancy only multiplies failure rates if the failures are independent.)","worked":"Single DB leader = SPOF: it dies, writes stop. Add a synchronous standby with auto-failover → the pair reaches ~99.99% and a leader crash promotes the standby in seconds instead of an outage.","related":["load-balancer","replication","horizontal-scaling"]},
  "latency-numbers": {"term":"Back-of-Envelope Latency Numbers","group":"FND-SYS","aliases":["latency numbers","latency","back-of-envelope","numbers every programmer should know","round trip","RTT"],"eli5":"The rough speed ladder — L1 to RAM to SSD to network — that lets you sanity-check a design in your head.","memory":"1 ns / 100 ns / 100 µs / 0.5 ms / 10 ms / 150 ms — L1, RAM, SSD, same-DC, disk, cross-region. Roughly ×100–×1000 per rung.","full":"<p>The canonical ladder: <b>L1 ~1 ns</b>, <b>RAM ~100 ns</b>, <b>SSD random read ~100 µs</b>, <b>same-DC round trip ~0.5 ms</b>, <b>HDD seek ~10 ms</b>, <b>cross-region RTT ~150 ms</b>. Each tier is ~100–1000× slower than the one above. The takeaway: RAM beats SSD beats network by orders of magnitude, which is exactly why caching in memory, co-locating services, and minimizing cross-region round trips dominate latency budgets.</p><p>Use them for back-of-envelope checks: if a user request makes 3 sequential cross-region calls, you've spent ~450 ms before any compute — the network, not the CPU, is your budget.</p>","trap":"Optimizing CPU while ignoring round trips. One cross-region RTT (~150 ms) dwarfs millions of RAM accesses; the win is removing the network hop (cache, CDN, co-location), not shaving instructions.","worked":"A page that issues 10 sequential DB calls within one DC (~0.5 ms each) spends ~5 ms in network. Move those same 10 calls cross-region (~150 ms each) and it's ~1.5 s — same code, 300× the latency.","related":["cache"]}
