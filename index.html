<script>
/* NoSQL Data Models (DB-NOSQL) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-NOSQL","front":"Why did NoSQL arise — what 3 forces drove it?","back":"<ul><li><strong>Web-scale horizontal sharding</strong>: relational joins and cross-node ACID don't shard cheaply; NoSQL trades them for partition-friendly data layouts.</li><li><strong>Flexible/evolving schema</strong>: <code>schema-on-read</code> lets teams add fields without a migration on every change.</li><li><strong>Access-pattern-specific stores</strong>: pick an engine whose physical model matches your dominant query, rather than forcing one relational store to do everything.</li></ul>"},
  {"sec":"DB-NOSQL","front":"What unifies key-value, document, and wide-column stores (and how does graph differ)?","back":"The first three are all <strong>aggregate-oriented</strong>: data is clustered into self-contained units fetched/written as a whole by key, which is what lets an aggregate live on one partition and shard cleanly. <strong>Graph databases are the exception</strong> — they deliberately break data into fine-grained nodes and edges to make relationship traversal cheap, which is exactly why they shard poorly."},
  {"sec":"DB-NOSQL","front":"Key-value store: physical model and sweet spot","back":"An opaque dictionary: <code>O(1)</code> get/put/delete by primary key, value is a blob the engine doesn't interpret on the primary path. Sweet spot is session stores, caches, feature flags, shopping carts, rate-limit counters — anything addressed by a known key with no server-side querying on the value. Redis and DynamoDB (used in pure KV mode) are canonical."},
  {"sec":"DB-NOSQL","front":"Document store: what does it add over a plain key-value store?","back":"The value is a <strong>transparent</strong> self-contained JSON/BSON aggregate the engine can index and query <em>inside</em>: filter on nested fields, range scans, secondary indexes, partial in-place updates. MongoDB is canonical. You trade the KV store's O(1) opacity for rich single-document querying — but cross-document joins (<code>$lookup</code>) stay expensive and are usually designed away via embedding."},
  {"sec":"DB-NOSQL","front":"Wide-column store: what does 'query-first' modeling mean in Cassandra?","back":"You design the table <em>around the query</em>: the <code>PRIMARY KEY</code> splits into a partition key (which node) plus optional clustering columns (on-disk sort order within the partition). You can only efficiently query by that key in that clustering order, so you <strong>create one denormalized table per access pattern</strong> and duplicate data across them. There's no efficient ad-hoc <code>WHERE</code> on non-key columns (secondary indexes exist but are an anti-pattern at scale)."},
  {"sec":"DB-NOSQL","front":"Why is a wide-column row called 'sparse', and why does that matter?","back":"Each row physically stores only the columns it actually has — columns are key→value cells written per row, not a fixed table-wide schema. A row with 3 cells and a row with 300 cost storage proportional to what's present, so a partition can hold millions of distinct column keys (e.g. time-series timestamps as column names) with no penalty for absent ones."},
  {"sec":"DB-NOSQL","front":"Graph database: what specific SQL pain does it solve?","back":"Multi-hop relationship traversal. In SQL each hop is another self-join, and a <em>k</em>-hop query (friends-of-friends-of-friends) suffers a <strong>join explosion</strong> whose cost grows with table size. A native graph store uses <code>index-free adjacency</code> — each node directly references its edges — so traversal cost is proportional to the subgraph touched, independent of total graph size. Neo4j (with Cypher) is canonical."},
  {"sec":"DB-NOSQL","front":"Index-free adjacency — what is it and what's the catch?","back":"Each node stores direct physical pointers to its adjacent edges/nodes, so following a relationship is a pointer chase — no index lookup, no join. Traversal cost depends on the local neighborhood, not dataset size. The catch: this locality is destroyed when the graph is partitioned across machines, which is why native graph DBs <strong>scale out poorly</strong> and are often run on one large node."},
  {"sec":"DB-NOSQL","front":"Why does NoSQL embrace denormalization and duplication?","back":"Without cheap joins, the read-time join is replaced by a <strong>write-time copy</strong>: you embed or duplicate data so a query hits one aggregate/partition. The cost moves from read (fast, what you optimize for) to write and consistency — every copy of a fact must be updated, and there's a window where copies disagree. It's a deliberate trade, not sloppiness — the core modeling discipline of aggregate stores."},
  {"sec":"DB-NOSQL","front":"Embedding vs referencing in a document store — how do you choose?","back":"<ul><li><strong>Embed</strong> when the child is owned by and read with the parent, is bounded in size, and needs no independent access (e.g. order line-items in an order).</li><li><strong>Reference</strong> when the child is shared across parents, unbounded/high-cardinality, or updated independently (e.g. a user referenced by many orders) — to avoid unbounded documents and high update fan-out.</li></ul>"},
  {"sec":"DB-NOSQL","front":"\"NoSQL can't do transactions\" — true or false today?","back":"<strong>False.</strong> MongoDB has had multi-document ACID transactions since 4.0 (4.2 across sharded clusters); DynamoDB has <code>TransactWriteItems</code> (up to 100 items, cannot span regions); Cassandra offers lightweight transactions (single-partition compare-and-set via Paxos). The honest framing: distributed transactions are <em>expensive and constrained</em>, so good modeling makes the consistency boundary a single aggregate/partition and avoids them."},
  {"sec":"DB-NOSQL","front":"What is the single-aggregate consistency boundary, and why does it matter?","back":"Aggregate stores typically guarantee atomicity and isolation only <strong>within one aggregate</strong> (one document, one partition, one item). Operations spanning aggregates need an explicit multi-aggregate transaction or app-level compensation. Good modeling draws aggregate boundaries so that things that must change together <em>live together</em>, keeping the common case a single atomic write."},
  {"sec":"DB-NOSQL","front":"DynamoDB single-table design — what is it and why?","back":"Putting multiple entity types (users, orders, line-items) in <em>one</em> table, overloading the partition/sort keys and global secondary indexes so several access patterns are served by one query with no joins. It's the extreme of query-driven, denormalized modeling — fast and cheap at scale, but the schema is opaque, rigid against genuinely new access patterns (often a backfill), and notoriously hard to reason about."},
  {"sec":"DB-NOSQL","front":"Polyglot persistence — what is it and what's the cost?","back":"Using <strong>multiple purpose-built datastores in one system</strong>, each matched to an access pattern — e.g. Postgres for the transactional core, Redis for sessions, Elasticsearch for search, a graph DB for recommendations. Each store plays to its strength; the cost is operational sprawl, cross-store consistency (no global transaction or join), and more failure modes — so you justify each store, don't collect them."},
  {"sec":"DB-NOSQL","front":"Schema-on-read vs schema-on-write — where does the schema actually live?","back":"<strong>Schema-on-write</strong> (relational): the DB enforces structure at insert; malformed data is rejected at the door. <strong>Schema-on-read</strong> (most NoSQL): writes are unconstrained and <em>every reader</em> must interpret/validate the shape. This buys write flexibility and zero-migration field adds, but pushes the burden into application code and lets heterogeneous documents coexist — there is no single engine-enforced source of truth for structure."},
  {"sec":"DB-NOSQL","front":"When is a relational database still the right default over NoSQL?","back":"When access patterns are unknown, many, or ad-hoc; when strong multi-row ACID and referential integrity matter; when data is relational but not deep-traversal; and when the dataset fits comfortably on one (possibly large) node. Modern Postgres/MySQL also offer JSON columns and read replicas, so 'flexible schema' and 'scale reads' alone rarely justify leaving SQL."}
);

Object.assign(GLOSSARY_DATA, {
  "aggregate-oriented": {"term":"Aggregate-Oriented Design","group":"DB-NOSQL","aliases":["aggregate","aggregate-oriented","aggregate orientation","aggregates"],"eli5":"Group together the data you read and write as a unit, and store it as one chunk addressed by a key.","memory":"Aggregate = the chunk you hand over the counter all at once. One key, one chunk, one node.","full":"<p>An <b>aggregate</b> is a cluster of related data treated as a single unit for retrieval and update — a document, a key-value blob, or a wide-column partition. Key-value, document, and wide-column stores are all aggregate-oriented; they win at horizontal scaling precisely because an aggregate never spans nodes, so a read or write touches exactly one partition.</p><p>The flip side is that the database only understands <i>within-aggregate</i> structure. Joins across aggregates are the application's problem, and atomicity/isolation guarantees typically stop at the aggregate boundary. Graph databases are explicitly <i>not</i> aggregate-oriented — they shred data into fine-grained nodes and edges to make traversal cheap, which is exactly why they don't shard well.</p>","trap":"Saying 'aggregate' means a SQL <code>GROUP BY</code>/aggregation. Here it's a data-modeling unit (a la DDD), not an analytics rollup.","worked":"An e-commerce order with its line-items embedded is one aggregate: read the order page = one document fetch, no join. The customer is a separate aggregate, referenced by id.","related":["denormalization","single-aggregate-consistency","document-store","wide-column"]},
  "key-value-store": {"term":"Key-Value Store","group":"DB-NOSQL","aliases":["key-value store","key-value","kv store","key value store"],"eli5":"A giant distributed hash map: put and get blobs by a key, and the database doesn't look inside the value.","memory":"Coat-check: hand over the ticket (key), get the coat (blob). The attendant never opens the coat's pockets.","full":"<p>The simplest aggregate model: an <code>O(1)</code> dictionary of opaque values keyed by a primary key. On the primary path the engine cannot index or filter on the value's contents, so the only access path is the key (or a hash/range thereof). This minimalism is the feature — it enables predictable low latency and trivial horizontal partitioning via consistent hashing.</p><p>Redis (in-memory, also offers rich value types) and DynamoDB (used in pure KV mode) are canonical. Use it for caches, sessions, user profiles, shopping carts, rate-limit counters — anywhere the key is known at read time and you never need to query 'all values where X'.</p>","trap":"Claiming KV stores can't query inside values <i>at all</i> — Redis exposes typed structures (hashes, sorted sets) and DynamoDB adds secondary indexes. The pure-KV guarantee is just that the <i>primary</i> access path is key-only.","worked":"Session store: key = <code>session:abc123</code>, value = serialized session JSON. Every request reads by the cookie's session id; you never scan for 'sessions created today'.","related":["aggregate-oriented","document-store","polyglot-persistence"]},
  "document-store": {"term":"Document Store","group":"DB-NOSQL","aliases":["document store","document database","document model","document-oriented"],"eli5":"Like a key-value store, but the database can see inside each JSON document and query its fields.","memory":"A manila folder: one self-contained packet per entity, and the clerk can read and tab any sheet inside it.","full":"<p>Stores self-contained JSON/BSON aggregates whose internal structure is <b>transparent</b> to the engine: you can build secondary indexes on nested fields, filter and range-scan within a document, and do partial in-place updates. MongoDB is canonical (Couchbase, DocumentDB also). Rich querying is scoped to a single document's shape; cross-document joins exist (e.g. <code>$lookup</code>) but are slow and usually designed away via embedding.</p><p>The modeling discipline is choosing <b>embed vs reference</b>: embed owned, bounded, co-read children; reference shared, unbounded, or independently-updated ones. Documents can be heterogeneous — schema-on-read means two documents in a collection need not share fields.</p>","trap":"Treating a document DB like a relational DB with JSON — normalizing everything and joining at read time. That throws away the whole point; you model around the aggregate.","worked":"A blog post document embeds its tags and recent comments (bounded, co-read) but references the author by <code>authorId</code> (shared across many posts, updated independently).","related":["aggregate-oriented","schema-on-read","denormalization","single-aggregate-consistency","key-value-store"]},
  "wide-column": {"term":"Wide-Column Store","group":"DB-NOSQL","aliases":["wide-column","wide column","wide-column store","column-family","column family"],"eli5":"Partitioned rows where each row stores only the columns it actually has, and you design tables around the exact query you'll run.","memory":"'Query-first': you write the SELECT, then design the table to make it a single-partition lookup. Tables are answers, not entities.","full":"<p>A wide-column (column-family) store like Cassandra or HBase keys data by a <code>PRIMARY KEY</code> that splits into a <b>partition key</b> (selects the node via consistent hashing) and optional <b>clustering columns</b> (define on-disk sort order within the partition). Rows are <b>sparse</b>: columns are stored as per-row key→value cells, so absent columns cost nothing and a single partition can hold millions of cells (e.g. timestamps-as-columns for time series).</p><p>The defining constraint is <b>query-first modeling</b>: you can only efficiently query by the primary key in its clustering order. There's no cheap ad-hoc <code>WHERE</code> on arbitrary columns, so you build one denormalized table per access pattern and duplicate the data. Secondary indexes exist but are an anti-pattern at scale.</p>","trap":"Calling it a 'columnar' store like Parquet/Redshift. Wide-column is row-oriented per partition for OLTP point/range reads; a columnar/column-store lays out one column contiguously and is optimized for analytical scans — a different thing.","worked":"User activity feed: <code>PRIMARY KEY ((user_id), event_ts)</code> — partition by user, cluster by time DESC. 'Latest 50 events for a user' is one fast partition slice. 'All events of type X across users' is impossible without a separate table.","related":["aggregate-oriented","denormalization","query-driven-modeling"]},
  "graph-database": {"term":"Graph Database","group":"DB-NOSQL","aliases":["graph database","graph databases","graph db","graph store","graph model"],"eli5":"Stores nodes and the relationships between them so that 'walk from A to its connections' is a cheap pointer-follow instead of a join.","memory":"Index-free adjacency = each node has its neighbors' phone numbers in its own pocket. No phone book (index), no join — just dial.","full":"<p>Models data as nodes and typed, directed edges (both can carry properties). Its superpower is <b>index-free adjacency</b>: each node holds direct pointers to its edges, so traversing a relationship is a pointer chase whose cost depends on the local neighborhood, <i>not</i> on total dataset size. Neo4j (with Cypher) is canonical.</p><p>This is the answer to SQL's <b>join explosion</b>: a <i>k</i>-hop query in SQL is <i>k</i> self-joins whose cost scales with table size, whereas a graph traversal stays local. The price: index-free adjacency depends on data locality, which is destroyed by partitioning, so native graph DBs scale out poorly and are typically run on one large node. Use them for social graphs, fraud rings, recommendations, and dependency/permission graphs — deep, variable-length relationship queries.</p>","trap":"Reaching for a graph DB because data 'has relationships'. Almost all data does. The justification is <i>deep, variable-depth traversal</i> (3+ hops, shortest-path); shallow 1-hop lookups are fine in SQL.","worked":"'Find fraud rings: accounts within 4 hops of a flagged account sharing a device or address.' One Cypher traversal; in SQL it's 4 nested self-joins exploding combinatorially.","related":["aggregate-oriented","polyglot-persistence"]},
  "denormalization": {"term":"Denormalization & Duplication","group":"DB-NOSQL","aliases":["denormalization","denormalize","denormalized","duplication","data duplication"],"eli5":"Copy data into multiple places so each query reads from one spot, instead of joining at read time.","memory":"Pay at write time so reads are free. The copy is a cache you're responsible for invalidating.","full":"<p>Because aggregate stores lack cheap joins, you replace the <b>read-time join</b> with a <b>write-time copy</b>: embed or duplicate data so each access pattern is satisfied by one aggregate or one partition. Reads get fast and single-hop; the cost shifts to writes — every copy of a fact must be updated, and there's a window where copies disagree.</p><p>This is deliberate engineering, not a normalization failure. The discipline is bounding the fan-out (don't duplicate high-cardinality, frequently-mutated data) and owning the update path (often via app logic, change streams, or async fan-out). In wide-column stores it manifests as one table per query; in document stores as embedded sub-documents.</p>","trap":"Assuming duplicated copies stay in sync automatically. The DB won't do it — stale duplicates are <i>your</i> bug, and high update fan-out can make denormalization the wrong call.","worked":"Twitter-style timelines: on write, fan a tweet out into each follower's timeline partition (duplication). Reading a home timeline is then one partition read — but a celebrity's million-follower fan-out is the cost you've taken on.","related":["aggregate-oriented","query-driven-modeling","wide-column","document-store"]},
  "schema-on-read": {"term":"Schema-on-Read","group":"DB-NOSQL","aliases":["schema-on-read","schema on read","schemaless","schema-less","flexible schema"],"eli5":"The database accepts any shape; the code that reads the data is responsible for understanding its structure.","memory":"Schema-on-read = no bouncer at the door, so every guest inside has to figure out who everyone is. The schema moved from the DB to your code.","full":"<p>Under <b>schema-on-write</b> (relational) the DB enforces a structure at insert time and rejects malformed rows — one authoritative schema. Under <b>schema-on-read</b> (most NoSQL) writes are unconstrained, and every reader must interpret and validate the shape it gets. This enables zero-migration field additions and lets heterogeneous records coexist in one collection — great for fast iteration and varied data.</p><p>The cost is real: there's no single engine-enforced source of truth for structure, the validation burden moves into (every piece of) application code, and old documents in old shapes linger forever. 'Schemaless' is a misnomer — the schema still exists, it's just <i>implicit and enforced by readers</i> rather than the engine. Mature teams reintroduce discipline via app-side validators (e.g. Mongo's <code>$jsonSchema</code>) or a schema registry.</p>","trap":"Saying schema-on-read means 'no schema'. There's always a schema; you've just deferred and decentralized its enforcement to read time — usually a net <i>increase</i> in total schema-handling code.","worked":"An events collection holds <code>v1</code> docs with <code>{name}</code> and <code>v2</code> docs with <code>{firstName,lastName}</code>. Both are valid writes; the reader must handle both shapes forever (or backfill).","related":["document-store","query-driven-modeling"]},
  "query-driven-modeling": {"term":"Query-Driven Modeling","group":"DB-NOSQL","aliases":["query-driven modeling","query-first","query-first modeling","access-pattern modeling","query-driven"],"eli5":"Start from the exact queries you must serve, then design tables/documents to make each one a single cheap lookup.","memory":"Tables are answers, not entities. List the questions first; the schema falls out of them.","full":"<p>The inverse of relational design. In SQL you normalize around entities and let the optimizer figure out queries later. In NoSQL you <b>enumerate access patterns first</b> and shape storage so each is a single-partition, single-aggregate read — accepting denormalization and duplication as the price. The data model is a set of pre-computed answers, not a neutral representation of entities.</p><p>This makes known queries blazing fast and unknown/ad-hoc queries painful or impossible, so it's only safe when access patterns are well-understood and stable. DynamoDB single-table design is the purest expression: every supported query is engineered into the key schema and GSIs, and adding a genuinely new pattern can require a backfill/migration.</p>","trap":"Doing query-driven modeling when access patterns are unknown or constantly changing — you'll repeatedly hit 'can't query that' and end up doing migrations a relational DB would have avoided.","worked":"Before creating any Cassandra table you write the CQL <code>SELECT</code>s the app needs. 'Posts by user, newest first' and 'posts by hashtag, newest first' become two separate denormalized tables, each keyed to be one partition slice.","related":["wide-column","denormalization","schema-on-read","polyglot-persistence"]},
  "single-aggregate-consistency": {"term":"Single-Aggregate Consistency Boundary","group":"DB-NOSQL","aliases":["single-aggregate consistency","consistency boundary","aggregate boundary","atomicity boundary"],"eli5":"NoSQL gives you atomic all-or-nothing changes within one document/partition/item for free; spanning several costs extra.","memory":"Draw the aggregate boundary where the atomicity boundary needs to be. What changes together, lives together.","full":"<p>Aggregate stores typically guarantee atomicity and isolation only <b>within a single aggregate</b> — one document, one partition, one item. The corollary drives modeling: put data that must change together <i>in the same aggregate</i> so the common write is one atomic operation. Things in different aggregates need an explicit multi-aggregate transaction or app-level compensation (sagas, outbox).</p><p>Contrary to the old myth, modern NoSQL <i>does</i> offer transactions across aggregates — MongoDB multi-document (4.0+, cross-sharded-cluster in 4.2), DynamoDB <code>TransactWriteItems</code> (≤100 items, cannot span regions), Cassandra lightweight transactions (single-partition compare-and-set via Paxos). But they're costlier and more constrained than a relational <code>BEGIN/COMMIT</code>, so the goal is to design so you rarely need them.</p>","trap":"The blanket claim 'NoSQL has no transactions'. It's been false for years — the accurate statement is that cross-aggregate/distributed transactions are <i>expensive and bounded</i>, so you model to avoid them.","worked":"An account-balance + its ledger entries kept in one document update atomically with no transaction. Moving money <i>between two accounts</i> (two aggregates) is what forces a multi-document transaction or a saga.","related":["aggregate-oriented","document-store","wide-column"]},
  "polyglot-persistence": {"term":"Polyglot Persistence","group":"DB-NOSQL","aliases":["polyglot persistence","polyglot","polyglot storage"],"eli5":"Use several different databases in one system, each chosen to fit a specific access pattern.","memory":"Right tool for each job — but every new database is another pager that can wake you at 3am.","full":"<p>Rather than forcing one store to handle everything, run multiple purpose-built datastores side by side: e.g. Postgres for the transactional core, Redis for sessions/cache, Elasticsearch for full-text search, a graph DB for recommendations, an object store for blobs. Each plays to its strengths and the system's overall fit improves.</p><p>The cost is operational and architectural: more systems to run/monitor/back up, more failure modes, and — critically — <b>no global transaction or join across stores</b>, so cross-store consistency becomes an application concern (dual writes, change-data-capture, eventual reconciliation). The mature stance is to justify every additional store against this tax, not to collect databases.</p>","trap":"Pitching polyglot persistence as pure upside. The hidden bill is cross-store consistency and operational sprawl; dual-writing to two stores without CDC is a classic data-divergence bug.","worked":"A commerce app: orders in Postgres (ACID), product search in Elasticsearch (indexed from Postgres via CDC), cart in Redis (ephemeral, fast), 'customers who bought' in a graph DB. No single transaction spans them — the search index is eventually consistent with the source of truth.","related":["key-value-store","document-store","graph-database","query-driven-modeling"]}
});

</script>

<!-- content: 12-db-query.js -->
<script>
/* Query Execution & Optimization (DB-QUERY) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-QUERY","front":"The four stages a SQL query passes through before returning rows","back":"<strong>Parse</strong> (SQL text → AST, syntax + catalog validation) → <strong>plan/rewrite</strong> (logical plan, view expansion, predicate simplification) → <strong>cost-based optimize</strong> (enumerate physical plans, cost each via statistics, pick cheapest) → <strong>execute</strong> (run the chosen plan tree, often via an iterator/Volcano model). The optimizer is where statistics drive every decision."},
  {"sec":"DB-QUERY","front":"What inputs does a cost-based optimizer use to pick a plan?","back":"Table and index <strong>statistics</strong> — row counts, page counts, per-column histograms, number of distinct values (NDV), null fractions, and correlation. From these it estimates the <strong>cardinality</strong> (row count) flowing out of each operator, multiplies by per-row CPU/IO cost constants, and sums to a total cost. Cardinality estimation error is the dominant source of bad plans, and it compounds multiplicatively up the join tree."},
  {"sec":"DB-QUERY","front":"Why do stale statistics produce catastrophically bad plans?","back":"The optimizer estimates cardinality from stats captured at the last <code>ANALYZE</code>/stats-gather. If the table grew 100x or value distribution shifted, estimates can be off by orders of magnitude — e.g. it estimates 10 rows on the inner side and picks a <strong>nested-loop join</strong>, but 10M rows actually flow through, so the loop probes O(outer·inner) times instead of the ~O(n+m) a hash join would have cost. The plan looked cheap at plan time; it's ruinous at run time. Fix: refresh stats (auto-analyze, manual <code>ANALYZE</code>)."},
  {"sec":"DB-QUERY","front":"Sequential scan vs index scan vs bitmap (index) scan — when does each win?","back":"<ul><li><strong>Sequential scan</strong>: read the whole table in physical order. Wins for low-selectivity predicates (large fraction of rows) — sequential IO beats random.</li><li><strong>Index scan</strong>: walk a B-tree, fetch matching heap rows. Wins for high-selectivity (few rows); each match is a random heap fetch.</li><li><strong>Bitmap scan</strong>: build an in-memory bitmap of matching row locations from one or more indexes, sort by physical page, then fetch. Wins in the messy middle — too many rows for plain index (random IO), too few for a seq scan — and lets multiple indexes be combined.</li></ul>"},
  {"sec":"DB-QUERY","front":"Nested-loop join: how it works and when the optimizer chooses it","back":"For each row of the outer relation, probe the inner relation for matches: cost ≈ <code>|outer| × cost(inner probe)</code>. It wins when the outer is <strong>small</strong> and the inner has an <strong>index</strong> on the join key (each probe is an O(log n) index lookup), or for non-equi-join conditions that hash/merge can't handle. A naive nested loop over two large unindexed tables is O(n·m) — the classic stale-stats disaster."},
  {"sec":"DB-QUERY","front":"Hash join: how it works and its sweet spot","back":"<strong>Build</strong> phase: scan the smaller input and load it into an in-memory hash table keyed on the join column. <strong>Probe</strong> phase: scan the larger input, hash each row's key, look up matches. It's the default for <strong>large, unsorted equi-joins</strong> — roughly O(n+m), no index or pre-sort needed. Downsides: equality joins only, and if the build side exceeds <code>work_mem</code> it spills to disk (grace/hybrid hash join in partitions)."},
  {"sec":"DB-QUERY","front":"Sort-merge join: how it works and when it beats hash join","back":"Sort both inputs on the join key (or use inputs already sorted), then advance two cursors in lockstep merging matches — O(n log n + m log m), or O(n+m) if both already sorted. It wins when inputs are <strong>already sorted</strong> (e.g. from an index or a prior sort), for <strong>range/inequality</strong> join predicates, or when the output must be sorted anyway (feeding an <code>ORDER BY</code>/merge). Unlike hash join it needs no large hash table in memory."},
  {"sec":"DB-QUERY","front":"Decision summary: which join algorithm for which situation?","back":"<ul><li><strong>Nested-loop</strong>: small outer + indexed inner, or non-equi conditions.</li><li><strong>Hash join</strong>: large unsorted inputs, equi-join, enough memory for the build side.</li><li><strong>Sort-merge</strong>: inputs already sorted, range-join predicates, or output needs ordering.</li></ul>The optimizer costs all three using estimated cardinalities — wrong estimates pick the wrong algorithm."},
  {"sec":"DB-QUERY","front":"EXPLAIN vs EXPLAIN ANALYZE — what's the difference and the danger?","back":"<code>EXPLAIN</code> shows the chosen plan with the optimizer's <strong>estimated</strong> costs and row counts <em>without running the query</em>. <code>EXPLAIN ANALYZE</code> <strong>actually executes</strong> it and reports <em>real</em> timings, actual rows, and loop counts alongside the estimates. The key diagnostic move: compare estimated vs actual rows per node — a large gap pinpoints the bad cardinality estimate (often stale stats or correlated predicates). Danger: <code>EXPLAIN ANALYZE</code> runs side effects, so wrap <code>INSERT</code>/<code>UPDATE</code>/<code>DELETE</code> in a rolled-back transaction."},
  {"sec":"DB-QUERY","front":"What is predicate pushdown and why does it matter?","back":"An optimizer rewrite that moves filter (<code>WHERE</code>) and projection conditions <em>as close to the data source as possible</em> — below joins, into subqueries/views, into the scan, or down to a remote/storage layer. Filtering early shrinks the rows every downstream operator must process and, for columnar/remote stores (Parquet, FDWs, S3), lets the engine skip whole row groups or avoid network transfer. It's one of the highest-leverage logical transforms."},
  {"sec":"DB-QUERY","front":"The N+1 query problem — what it is and how to fix it","back":"Fetching a list of N parent rows with 1 query, then issuing 1 additional query <em>per parent</em> to load its children = <strong>N+1 round trips</strong>. Common in ORMs with lazy-loading. Each query is cheap but per-round-trip latency dominates. Fix: <strong>eager-load</strong> via a single <code>JOIN</code>, or a batched <code>WHERE child.parent_id IN (...)</code> (e.g. dataloader pattern, ORM <code>JOIN FETCH</code>/<code>includes</code>). It's a client/round-trip problem, not a planner problem — <code>EXPLAIN</code> won't show it."},
  {"sec":"DB-QUERY","front":"Why does large-OFFSET pagination degrade, and what's the fix?","back":"<code>LIMIT 20 OFFSET 100000</code> must still <strong>generate, sort, and discard</strong> the first 100,000 rows before returning 20 — cost grows linearly with the offset, so deep pages get progressively slower (O(offset)). Fix: <strong>keyset / cursor pagination</strong> — remember the last row's sort key and do <code>WHERE (created_at, id) > (:last_ts, :last_id) ORDER BY created_at, id LIMIT 20</code>. This seeks directly via the index in O(log n) regardless of depth. Tradeoff: no random page jumps, and the sort key must be unique/stable."},
  {"sec":"DB-QUERY","front":"Why does cardinality estimation error compound up a join tree?","back":"Each operator's estimate feeds the next as input. A 10x underestimate at a leaf scan becomes a 10x-too-small build side, which makes a later join's output estimate wrong too — errors <strong>multiply</strong>, not add, as you ascend an N-way join. This is why a single stale column histogram or a hidden correlation between predicates (assumed independent) can flip the whole plan. Multi-column / extended statistics exist precisely to capture correlation the independence assumption misses."},
  {"sec":"DB-QUERY","front":"Why doesn't an index always help, even on a filtered column?","back":"Three reasons: <strong>(1) Low selectivity</strong> — if the predicate matches a large fraction of rows, the random heap fetches per match cost more than a sequential scan, so the optimizer correctly ignores the index. <strong>(2) Non-sargable predicates</strong> — wrapping the column in a function (<code>WHERE lower(email)=...</code>) or leading-wildcard <code>LIKE '%x'</code> defeats B-tree seeks. <strong>(3) Bad stats</strong> — the optimizer mis-estimates selectivity and picks the wrong access path. An unused index still costs write amplification."},
  {"sec":"DB-QUERY","front":"What is a covering index (index-only scan) and why is it fast?","back":"An index that contains <em>every column the query needs</em> (via the key columns plus <code>INCLUDE</code>d payload columns), so the engine answers entirely from the index and <strong>skips the heap/table fetch</strong> — a random IO per row avoided. In Postgres this is an <strong>index-only scan</strong>, available only when the visibility map shows the pages are all-visible (otherwise it must still visit the heap to check tuple visibility). It's the cleanest way to kill heavy random-IO lookups on hot read paths."}
);

Object.assign(GLOSSARY_DATA, {
  "cost-based-optimizer": {"term":"Cost-Based Optimizer (CBO)","group":"DB-QUERY","aliases":["cost-based optimizer","cbo","query optimizer","optimizer","cost-based optimize"],"eli5":"The part of the database that guesses how expensive each possible way to run your query is, then picks the cheapest guess.","memory":"It's a price-comparison shopper that never tries the products — it only reads the (possibly outdated) price tags (stats) and buys the cheapest on paper.","full":"<p>The CBO enumerates candidate <b>physical plans</b> (different join orders, join algorithms, and access paths) for a logical query, assigns each a <b>cost</b> using table statistics plus per-operation cost constants (sequential page read, random page read, CPU per row/tuple), and picks the lowest-cost plan. The search space of join orders is super-exponential, so optimizers use dynamic programming (System R-style) up to a threshold and heuristics/genetic search beyond it.</p><p>Crucially the optimizer never measures — it <i>estimates</i>. Its accuracy is bounded entirely by the quality of its cardinality estimates, which is why statistics are the load-bearing input. A perfect cost model with bad row estimates still picks bad plans.</p>","trap":"Saying the optimizer 'finds the fastest plan.' It finds the <i>estimated-cheapest</i> plan under its cost model and stats; with bad estimates that's often far from fastest. Also, plan time is itself a cost — for trivial queries the optimizer deliberately stops searching early.","worked":"Two plans for <code>orders ⋈ customers</code>: hash join estimated cost 1,200, nested-loop estimated cost 800 (because stats say only 5 customers match). CBO picks nested-loop. If 5M actually match (stale stats), nested-loop runs for minutes while the rejected hash join would have finished in seconds.","related":["statistics","cardinality-estimation","explain-analyze","join-algorithms"]},
  "statistics": {"term":"Table Statistics","group":"DB-QUERY","aliases":["statistics","table statistics","stats","histogram","histograms","analyze","ndv"],"eli5":"A small cached summary of what's in each table — how many rows, and roughly how the values are distributed — that the optimizer reads to make guesses.","memory":"Stats are the database's mental model of its own data — and like any mental model, it goes wrong the moment reality changes but the model doesn't (stale stats).","full":"<p>Statistics are metadata the optimizer consults instead of scanning data: total row/page counts, per-column <b>histograms</b> (value distribution in buckets), <b>NDV</b> (number of distinct values), <b>null fraction</b>, most-common-values lists, and physical correlation. They're gathered by <code>ANALYZE</code> (Postgres), <code>ANALYZE TABLE</code> (MySQL/InnoDB), or auto-stats jobs, and sampled (not exhaustive) for speed.</p><p>From these the optimizer derives <b>selectivity</b> (fraction of rows a predicate keeps) and hence cardinality. By default most engines assume predicates are <i>independent</i> and multiply selectivities; real-world column correlation breaks this badly, which is why <b>extended/multi-column statistics</b> exist. Stale or missing stats are the #1 root cause of sudden plan regressions after a bulk load.</p>","trap":"Assuming stats auto-update instantly after every write. They update on a threshold of changed rows (autovacuum/auto-analyze) or on demand — a fresh bulk load or a brand-new table can have zero or default stats, producing wildly wrong estimates until analyzed.","worked":"A <code>status='pending'</code> filter: histogram says 'pending' is 2% of 10M rows → estimate 200K → hash join chosen. But after a backlog, 'pending' is now 60% and stats are stale → real 6M rows blow out memory and the wrong plan.","related":["cost-based-optimizer","cardinality-estimation","scan-types"]},
  "cardinality-estimation": {"term":"Cardinality Estimation","group":"DB-QUERY","aliases":["cardinality estimation","cardinality","row estimate","selectivity","estimated rows"],"eli5":"The optimizer's guess of how many rows will come out of each step of the plan — the number everything else depends on.","memory":"Cardinality errors are like a typo in step 1 of a long multiplication — every later digit inherits and amplifies it.","full":"<p>Cardinality is the estimated row count flowing out of an operator; selectivity is the fraction a predicate retains. The optimizer computes selectivity from histograms and NDV, then propagates cardinalities up the operator tree to size joins, choose algorithms, and decide access paths. Because each estimate feeds the next, <b>errors compound multiplicatively</b> across an N-way join — a leaf-level 10x error can become a 1000x error three joins up.</p><p>The two structural weaknesses are the <b>independence assumption</b> (correlated predicates like <code>city</code> and <code>zip</code> get under-estimated) and <b>join-key correlation/skew</b>. Modern engines patch this with extended statistics, and some (e.g. adaptive query execution, learned estimators) adjust mid-flight, but cardinality estimation remains the hardest, most error-prone part of query optimization.</p>","trap":"Treating a single huge estimate as the problem. The danger is <i>compounding</i>: small per-operator errors multiply up the join tree, so the worst blowups come from deep plans, not single nodes. Also: under-estimates are usually worse than over-estimates because they pick nested-loops and undersized hash tables.","worked":"<code>WHERE city='SF' AND state='CA'</code>: optimizer multiplies selectivities assuming independence → estimates 0.1% of rows. But every SF row is already CA, so the true selectivity equals just <code>city='SF'</code> — a 50x under-estimate that picks a nested-loop over a hash join.","related":["statistics","cost-based-optimizer","join-algorithms","explain-analyze"]},
  "scan-types": {"term":"Scan Types (Seq / Index / Bitmap)","group":"DB-QUERY","aliases":["scan types","sequential scan","seq scan","index scan","bitmap scan","bitmap index scan","table scan","access path"],"eli5":"The three basic ways to read rows off disk — read everything in order, jump straight to a few via an index, or collect locations first then read pages in order.","memory":"Seq = read the whole book. Index = use the index to flip to two pages. Bitmap = jot down all the page numbers first, then read them front-to-back so you never flip backwards.","full":"<p><b>Sequential scan</b> reads every page in physical order — cheap per page (sequential IO, readahead) but reads everything; optimal when the predicate keeps a large fraction of rows. <b>Index scan</b> traverses a B-tree and does a random heap fetch per match — optimal for high selectivity (few matches). <b>Bitmap scan</b> is the hybrid: it scans the index(es) to build a bitmap of qualifying row/page locations, optionally ANDs/ORs multiple indexes, sorts by physical position, then reads heap pages in order — converting random IO into mostly-sequential IO for the medium-selectivity middle ground.</p><p>The optimizer chooses among these by costing estimated selectivity against the sequential-vs-random IO cost ratio. This is exactly where a wrong selectivity estimate flips a good plan to a bad one.</p>","trap":"Believing 'index scan is always faster than seq scan.' For low-selectivity predicates the per-row random heap fetches make index scan slower than a sequential scan; the optimizer rightly prefers the seq scan, and forcing the index hurts.","worked":"A query matching 30% of a 10M-row table: index scan = 3M random fetches (terrible); seq scan reads all pages once. The CBO picks seq scan. Change it to match 0.01% and it flips to index scan.","related":["cost-based-optimizer","statistics","covering-index","predicate-pushdown"]},
  "join-algorithms": {"term":"Join Algorithms","group":"DB-QUERY","aliases":["join algorithms","nested-loop join","nested loop join","hash join","sort-merge join","merge join","join algorithm"],"eli5":"The three physical strategies for matching rows between two tables — loop-and-lookup, build-a-hash-table, or sort-both-and-zip.","memory":"Loop / Hash / Merge = Lookup each one / Build a phonebook / Sort then zip.","full":"<p><b>Nested-loop</b>: for each outer row, probe the inner — O(|outer|·probe). Great with a small outer and an indexed inner; the only option for non-equi conditions. <b>Hash join</b>: build a hash table on the smaller input, probe with the larger — ~O(n+m), the workhorse for large unsorted <i>equi-joins</i>, but equality-only and spills to disk if the build side exceeds <code>work_mem</code>. <b>Sort-merge</b>: sort both on the join key then merge cursors — O(n log n + m log m), wins when inputs are already sorted, for range predicates, or when ordered output is needed downstream.</p><p>The optimizer picks based on estimated input sizes, available indexes, sortedness, and the join predicate type. A cardinality under-estimate is what makes it pick a nested-loop where a hash join was needed — the textbook query blowup.</p>","trap":"Saying hash join is 'always best for big tables.' It's only for <i>equi-joins</i>, needs memory for the build side (spills otherwise), and loses to sort-merge when inputs are already sorted or the predicate is a range. Nested-loop also wins on a tiny outer with an indexed inner.","worked":"<code>big_orders ⋈ big_lineitems ON order_id</code> (equi, unsorted, no useful sort order needed): hash join, build on the smaller. Add <code>ORDER BY order_id</code> output and pre-sorted inputs: sort-merge may now win since it produces the ordering for free.","related":["cost-based-optimizer","cardinality-estimation","scan-types","predicate-pushdown"]},
  "explain-analyze": {"term":"EXPLAIN ANALYZE","group":"DB-QUERY","aliases":["explain analyze","explain","query plan","plan","execution plan"],"eli5":"A command that shows you the plan the optimizer chose — and, in ANALYZE mode, actually runs it and shows what really happened so you can compare guess vs reality.","memory":"EXPLAIN = the recipe the chef plans to cook. EXPLAIN ANALYZE = make him actually cook it and time every step, then compare to his estimate.","full":"<p><code>EXPLAIN</code> prints the chosen plan tree with <b>estimated</b> costs, row counts, and widths without executing. <code>EXPLAIN ANALYZE</code> <b>executes</b> the query and adds <b>actual</b> time, actual rows, and loop counts per node (add <code>BUFFERS</code> for IO). The senior diagnostic technique: read the tree bottom-up and compare <i>estimated rows vs actual rows</i> at each node — the first node where they diverge sharply is your bad estimate (stale stats, correlated predicates, or a missing extended-statistic).</p><p>Caveats: <code>ANALYZE</code> really runs DML, so wrap mutations in a transaction you <code>ROLLBACK</code>; timing instrumentation adds overhead; and one execution may not represent steady-state cache behavior.</p>","trap":"Reading only the costs. Costs are unitless optimizer estimates — the gold is the <b>estimated-vs-actual rows ratio</b>, which exposes the cardinality error driving a bad plan. Also forgetting that <code>EXPLAIN ANALYZE</code> executes side effects.","worked":"A node shows <code>(rows=12)</code> estimated but <code>(actual rows=4200000)</code> — a 350,000x miss. That node's under-estimate caused a nested-loop above it; fixing the stat (or adding extended stats) flips it to a hash join and the query goes from minutes to milliseconds.","related":["cost-based-optimizer","cardinality-estimation","statistics","join-algorithms"]},
  "predicate-pushdown": {"term":"Predicate Pushdown","group":"DB-QUERY","aliases":["predicate pushdown","pushdown","projection pushdown","filter pushdown"],"eli5":"Moving the WHERE filter as early/low as possible so you throw away rows before doing expensive work on them.","memory":"Filter at the door, not at the dinner table — don't seat 10,000 guests just to throw out 9,990.","full":"<p>A logical optimization that relocates filter and projection operators downward in the plan — below joins, into subqueries and views, and ideally into the scan or a remote storage layer — so fewer rows and columns propagate upward. Filtering before a join shrinks both join inputs; projecting early narrows row width. For columnar and federated sources it's transformative: pushing predicates into Parquet/ORC lets the reader skip row groups via min/max statistics, and pushing into a foreign data wrapper or object store avoids transferring rows over the network at all.</p><p>Pushdown is blocked by anything that breaks equivalence — non-deterministic functions, predicates over the output of a window/aggregate, or correlated conditions the rewrite can't prove safe. Where it can't push, you often see late, expensive filters in <code>EXPLAIN</code>.</p>","trap":"Assuming the engine always pushes filters down. Predicates over aggregate/window outputs (that's what <code>HAVING</code> is for), volatile functions, or across an <code>OUTER JOIN</code>'s null-extended side often <i>can't</i> be pushed — leaving an expensive late filter you must rewrite manually.","worked":"<code>SELECT * FROM (SELECT * FROM events) e JOIN users u ON ... WHERE e.day='2026-06-01'</code>: the optimizer pushes <code>day='2026-06-01'</code> into the events scan (and into the Parquet reader to skip other days' row groups) instead of joining all events first.","related":["cost-based-optimizer","scan-types","join-algorithms"]},
  "keyset-pagination": {"term":"Keyset (Cursor) Pagination","group":"DB-QUERY","aliases":["keyset pagination","cursor pagination","seek method","keyset","offset pagination"],"eli5":"Instead of skipping a million rows to get to page 5000, remember the last row you saw and jump straight past it using the index.","memory":"OFFSET counts every step from the start each time; keyset bookmarks where you stopped and opens straight to it.","full":"<p><code>LIMIT n OFFSET k</code> forces the engine to produce, order, and discard the first <code>k</code> rows on every page request — cost is O(k), so deep pages degrade linearly and page 10,000 is far slower than page 1. <b>Keyset pagination</b> (the 'seek method') instead carries the last row's ordering key as a cursor and filters <code>WHERE (sort_key, tiebreak_id) > (:last, :last_id) ORDER BY sort_key, id LIMIT n</code>, which an index satisfies with a single O(log n) seek regardless of depth.</p><p>Tradeoffs: the sort key must be <b>unique and stable</b> (append an id tiebreaker), you lose random 'jump to page N' access (only next/prev), and changing sort order needs a matching index. For infinite-scroll and APIs it's the standard; for small admin tables OFFSET is fine.</p>","trap":"Claiming keyset 'just adds a WHERE clause.' It also requires a <b>unique, immutable</b> compound sort key (a non-unique sort column silently skips or repeats rows at page boundaries) and gives up random page access — you can only walk forward/backward.","worked":"<code>... OFFSET 100000 LIMIT 20</code> scans 100,020 rows then drops 100,000. Replace with <code>WHERE (created_at,id) > ('2026-06-01T10:00',55123) ORDER BY created_at,id LIMIT 20</code> — an index seek touches ~20 rows total, flat cost at any depth.","related":["scan-types","cost-based-optimizer"]}
});

</script>

<script>
/* Replication (DB-REPL) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-REPL","front":"Single-leader replication: what is the write path?","back":"All writes go to one designated <strong>leader</strong> (primary); the leader applies the write, then streams the change to its <strong>followers</strong> (replicas/standbys) via a replication log. Followers apply changes in the same order and serve <strong>read-only</strong> traffic. Reads can scale horizontally by adding followers, but write throughput is capped by the single leader."},
  {"sec":"DB-REPL","front":"What gets shipped over the wire: statement-based vs WAL/logical replication?","back":"<ul><li><strong>Statement-based</strong>: ship the SQL itself — breaks on <code>NOW()</code>, <code>RANDOM()</code>, auto-increment, and non-deterministic triggers.</li><li><strong>WAL/physical</strong> shipping (Postgres streaming replication): ship the byte-level write-ahead-log records — tightly coupled to the storage engine and exact major version.</li><li><strong>Logical/row-based</strong> (MySQL row-based binlog, Postgres logical replication): ship the actual before/after row values — version-independent and supports selective/cross-version replication.</li></ul>"},
  {"sec":"DB-REPL","front":"Synchronous vs asynchronous replication: the core durability tradeoff","back":"<strong>Synchronous</strong>: the leader waits for the follower to confirm before acking the client — a committed write is guaranteed durable on 2+ nodes, but a single slow/down follower stalls all writes. <strong>Asynchronous</strong>: the leader acks immediately and streams later — fast and resilient to slow followers, but acked writes not yet shipped are <strong>lost</strong> if the leader fails. Sync trades availability for durability; async trades durability for availability."},
  {"sec":"DB-REPL","front":"Why semi-synchronous replication, and how does it bound the blast radius?","back":"<strong>Semi-synchronous</strong> keeps <em>one</em> follower synchronous and the rest async: every commit is durable on at least two nodes, but you don't block on the slowest replica. If the sync follower stalls, the leader typically <strong>promotes another replica to sync</strong> (or, in some configs, falls back to async) so writes don't hang forever. It's a common production setup (e.g., MySQL <code>rpl_semi_sync</code>, or Postgres with one entry in <code>synchronous_standby_names</code>)."},
  {"sec":"DB-REPL","front":"What does Postgres <code>synchronous_commit</code> actually control?","back":"It tunes <em>how durable</em> a commit must be before the leader acks: <code>off</code>/<code>local</code> (no replica wait — local WAL only), <code>remote_write</code> (standby received it in its OS cache), <code>on</code> (the default — standby <em>flushed</em> WAL to durable storage), <code>remote_apply</code> (standby has also <em>applied</em> it, so it's visible to queries there). Only <code>remote_apply</code> guarantees a follower read after commit sees the write — and it's the slowest. It can be set <strong>per-transaction</strong>, so you can run most writes cheap and force critical ones stricter."},
  {"sec":"DB-REPL","front":"Replication lag: what causes it and what is the user-visible symptom?","back":"<strong>Lag</strong> is the delay between a write committing on the leader and being applied on a follower; causes include network latency, follower I/O saturation, long-running replica queries, and single-threaded apply. The symptom is <strong>stale reads</strong>: a client reading from a lagging follower sees an older snapshot. Lag is usually sub-second but spikes to seconds/minutes under write bursts or replica load — this is the source of nearly every replica consistency anomaly."},
  {"sec":"DB-REPL","front":"Read-your-own-writes (read-after-write) consistency: the problem and fixes","back":"A user writes via the leader, then immediately reads from a lagging follower and <strong>doesn't see their own update</strong> — looks like data loss. Fixes: <strong>route reads of self-written data to the leader</strong> for a window after the write; track the write's <strong>log position (LSN)</strong> and read from a replica only once it has caught up to that position; or use <strong>sticky sessions / leader-read by user-id</strong> for recently-modified rows."},
  {"sec":"DB-REPL","front":"Monotonic reads: what anomaly does it prevent?","back":"It guarantees a client never sees time <strong>go backwards</strong> — having read a newer value, a subsequent read won't return an older one. The violation: successive reads hit <em>different</em> followers with different lag, so a comment appears then vanishes. The standard fix is <strong>session stickiness</strong> — pin a given user to one replica (e.g., hash user-id → replica) so their reads are monotonic, even if that replica is behind the leader."},
  {"sec":"DB-REPL","front":"Consistent-prefix reads: the multi-partition anomaly","back":"If writes are causally ordered (question then answer) but live on <strong>different partitions</strong> replicating independently, an observer can see the answer before the question. <strong>Consistent prefix reads</strong> guarantees that if writes happen in a certain order, anyone reading them sees them in that order. It's specifically a problem in <strong>sharded/partitioned</strong> systems where each partition has its own replication log and no global ordering; fixes need causal tracking or co-locating causally-related writes."},
  {"sec":"DB-REPL","front":"Multi-leader replication: when is it used and what is the cost?","back":"Two-plus leaders accept writes and replicate to each other — used for <strong>multi-datacenter</strong> (a leader per region, local write latency), offline clients, and collaborative editing. The unavoidable cost is <strong>write conflicts</strong>: the same record edited concurrently on two leaders. You must add conflict detection + resolution (LWW, version vectors, CRDTs, or app-level merge). Auto-increment keys and uniqueness constraints also become hazardous across leaders."},
  {"sec":"DB-REPL","front":"How are write conflicts resolved in multi-leader / leaderless systems?","back":"<ul><li><strong>Last-write-wins (LWW)</strong>: keep the highest timestamp — simple but <em>silently drops</em> concurrent writes and is unsafe under clock skew (Cassandra's conflict resolution).</li><li><strong>Version vectors</strong>: detect concurrent vs causal writes; surface concurrent ones as <strong>siblings</strong> for the app/client to merge (Dynamo/Riak).</li><li><strong>CRDTs</strong>: data types that merge automatically and commutatively with no data loss.</li><li><strong>App-defined merge</strong>: custom resolution on read or write.</li></ul>"},
  {"sec":"DB-REPL","front":"Leaderless (Dynamo-style) quorums: state the R + W > N rule and what it buys","back":"With <code>N</code> replicas, the client (or coordinator) writes to and waits for <code>W</code> acks and reads from <code>R</code> replicas. If <strong><code>W + R &gt; N</code></strong>, the read and write replica sets are guaranteed to <strong>overlap</strong> in at least one node, so a read sees the latest acked write. Common: <code>N=3, W=2, R=2</code>. Tune <code>W=N, R=1</code> for read-heavy or <code>R=N, W=1</code> for write-heavy — but quorums are <strong>not</strong> linearizable in general."},
  {"sec":"DB-REPL","front":"Why is a leaderless quorum NOT a strong-consistency guarantee even when R + W > N?","back":"Overlap guarantees a read <em>touches</em> a node with the latest write, but edge cases break strict consistency: <strong>sloppy quorums</strong> (writes accepted by non-home nodes during a partition) can make the W and R sets fail to overlap; concurrent writes need conflict resolution (LWW can lose data); a <strong>failed write</strong> that succeeded on some replicas isn't rolled back; and reads during in-flight replication may return either value. Quorums give high availability and tunable staleness, not linearizability."},
  {"sec":"DB-REPL","front":"Read repair vs anti-entropy: the two convergence mechanisms","back":"<strong>Read repair</strong> is <em>foreground</em> and lazy: on a quorum read, the coordinator detects a stale replica and writes the newer value back — fixes only data that is actually read. <strong>Anti-entropy</strong> is a <em>background</em> process that compares replicas (often via <strong>Merkle trees</strong> to find diffs cheaply) and syncs differences regardless of reads. Without anti-entropy, rarely-read keys never converge. Together they drive <strong>eventual consistency</strong>."},
  {"sec":"DB-REPL","front":"Hinted handoff: what problem does it solve and what does it NOT guarantee?","back":"When a target replica is down during a write, another node accepts the write and stores a <strong>hint</strong>, replaying it to the intended node once it recovers — this keeps <strong>write availability</strong> high during failures (a 'sloppy quorum'). It does <em>not</em> guarantee a subsequent quorum <strong>read</strong> sees that write, because the hint may sit on a node outside the read's home set. It improves durability/availability, not consistency."},
  {"sec":"DB-REPL","front":"Failover and split-brain: the danger and the guards","back":"On leader failure, a follower is <strong>promoted</strong> (often the one with the highest LSN / least lag). Risks: <strong>data loss</strong> (async writes not yet replicated are discarded), and <strong>split-brain</strong> — two nodes both believe they're leader and accept divergent writes. Guards: <strong>fencing / STONITH</strong>, <strong>quorum/lease-based</strong> election so a minority partition can't self-promote, and a fencing token to reject writes from a demoted old leader. Choosing the failover timeout trades false failovers against downtime."}
);

Object.assign(GLOSSARY_DATA, {
  "single-leader-replication": {"term":"Single-Leader Replication","group":"DB-REPL","aliases":["single-leader replication","single-leader","leader-follower","leader/follower","primary-replica","master-slave","leader","follower","followers","primary","standby","standbys"],"eli5":"One node takes all the writes and copies them to read-only copies.","memory":"One mouth talks (leader writes), many ears listen (followers read).","full":"<p>One node is the <b>leader</b> (primary); it accepts all writes, appends them to a replication log, and streams that log to <b>followers</b> (replicas/standbys) that apply changes in the same order. Followers serve reads, so the topology <b>scales reads</b> but never writes — the leader is the single write bottleneck. This is the default mode in Postgres streaming replication, MySQL, MongoDB replica sets, and most relational engines.</p><p>The log can ship as statement, physical WAL bytes, or logical rows; the choice dictates version-coupling and what's replayable. The leader is also the synchronization point that makes <code>read-after-write</code> easy (just read the leader) and makes ordering trivial — every replica converges to the same state because they replay one totally-ordered log.</p>","trap":"Saying single-leader replication scales writes. It only scales READS — every write still funnels through the one leader. Adding followers can even slow writes if any are synchronous.","worked":"Postgres primary with two streaming standbys: app sends INSERT/UPDATE to the primary; a read-router sends SELECTs to the standbys. 100k read QPS spread over replicas, but all writes hit one box.","related":["replication-lag","synchronous-replication","failover","multi-leader-replication"]},
  "synchronous-replication": {"term":"Synchronous vs Asynchronous Replication","group":"DB-REPL","aliases":["synchronous replication","asynchronous replication","synchronous","asynchronous","async","sync replication","semi-synchronous","semi-synchronous replication","semi-sync"],"eli5":"Wait for a copy to confirm before saying 'done' (safe but slow), or say 'done' immediately and copy later (fast but lossy).","memory":"SYNC = 'are you sure?' (wait for yes). ASYNC = 'fire and forget'.","full":"<p><b>Synchronous</b>: the leader blocks the client ack until a follower confirms it has the write, so a committed write survives leader loss — but one slow or dead follower stalls every write. <b>Asynchronous</b>: the leader acks immediately and ships later, so it's fast and tolerant of slow followers, but any acked-but-unshipped write is <b>lost on failover</b>. This is the central durability-vs-availability dial of replication.</p><p><b>Semi-synchronous</b> is the pragmatic middle: keep exactly one follower synchronous (guaranteeing two-node durability) and the rest async, promoting a new sync follower if it stalls. Postgres exposes this granularly via <code>synchronous_commit</code> and <code>synchronous_standby_names</code> (and supports <code>FIRST k</code>/<code>ANY k</code> quorum commit); MySQL has plugin-based <code>rpl_semi_sync</code>. Critically, sync vs async is configurable <b>per-transaction</b>, so you pay the latency only on writes that need it.</p>","trap":"Claiming synchronous replication means zero data loss, full stop. It means no loss of ACKED writes — but a fully synchronous setup sacrifices availability: one down replica can freeze all writes, which is why pure-sync is rarely run with a single standby.","worked":"MySQL semi-sync, N=3: leader writes the binlog, waits for 1 of 2 replicas to ack receipt (default AFTER_SYNC, before the storage-engine commit), then commits and acks the client — so the write is durable on two nodes' binlogs.","related":["single-leader-replication","replication-lag","failover","quorum"]},
  "replication-lag": {"term":"Replication Lag","group":"DB-REPL","aliases":["replication lag","lag","replica lag","stale read","stale reads","replication delay"],"eli5":"The seconds (or minutes) a copy is behind the original, so reading the copy can show old data.","memory":"The follower is a photo of the leader from a few seconds ago — fine for most reads, wrong right after you change something.","full":"<p><b>Replication lag</b> is the time between a write committing on the leader and being visible on a follower. With asynchronous replication it's unavoidable; it's usually milliseconds but spikes to seconds or minutes under write bursts, replica I/O saturation, long replica queries holding apply, or single-threaded log apply. The visible consequence is the <b>stale read</b>, and it's the root cause of read-your-own-writes, monotonic-reads, and consistent-prefix anomalies.</p><p>You measure it as a time delta (Postgres <code>replay_lag</code> / <code>pg_last_wal_replay_lsn</code>, MySQL <code>Seconds_Behind_Source</code>/<code>Seconds_Behind_Master</code>) or as an LSN/position gap. Mitigations are read-routing tricks (leader-reads for fresh data, LSN-gated replica reads, sticky sessions) rather than eliminating lag itself. Bounded-staleness reads (\"a replica no more than X seconds behind\") are a common compromise.</p>","trap":"Treating lag as a constant you can engineer away. It's a tail-latency distribution — p50 may be 5ms while p99 is 30s during a backup or batch load, and your consistency guarantees must hold at the tail, not the median.","worked":"User updates their avatar (leader), the page reloads reading a standby that's 4s behind, and the old avatar shows — a textbook read-your-own-writes failure caused by 4s of lag.","related":["read-your-writes","monotonic-reads","single-leader-replication","synchronous-replication"]},
  "read-your-writes": {"term":"Read-Your-Own-Writes Consistency","group":"DB-REPL","aliases":["read-your-own-writes","read-your-writes","read-after-write","read-after-write consistency","read your writes"],"eli5":"After you save something, you should always see your own change immediately.","memory":"\"I just typed it — I'd better see it.\" Route my own edits back to the source of truth.","full":"<p><b>Read-your-own-writes</b> (read-after-write) guarantees that a user who submits a write will see that write on their next read — it does <i>not</i> promise they see other users' concurrent writes. The failure mode is pure UX poison: a user edits a profile, reads a lagging replica, sees the old value, and assumes the save failed. It's a per-session guarantee defeated by <b>replication lag</b> on follower reads.</p><p>Implementation patterns: (1) for data the user can modify, <b>read from the leader</b> for a time window after their write; (2) remember the write's <b>LSN/log position</b> and only serve from a replica once it has applied past that position (\"read your writes via tokens\"); (3) sticky-route the user to the leader for their own recently-changed entities. Cross-device cases need a server-side timestamp/token rather than client wall-clock.</p>","trap":"Confusing read-your-writes with monotonic reads. RYW is about seeing YOUR latest write; monotonic reads is about not seeing time go backwards across successive reads. Sticky sessions help both, but they solve different anomalies.","worked":"Social-feed pattern: after you post, the client sends your LSN with reads; the router picks a replica that has replayed ≥ that LSN, else falls back to the leader, so your post always appears in your own timeline instantly.","related":["replication-lag","monotonic-reads","single-leader-replication"]},
  "monotonic-reads": {"term":"Monotonic Reads","group":"DB-REPL","aliases":["monotonic reads","monotonic read","consistent prefix","consistent-prefix reads","consistent prefix reads","sticky session","sticky sessions","session stickiness"],"eli5":"Once you've seen newer data, you should never see older data on a later read.","memory":"A clock that only ticks forward for you — never let a later read be 'earlier' than an earlier one.","full":"<p><b>Monotonic reads</b> guarantees that within a session, time never moves backward: after observing a value, a later read won't return an <i>older</i> one. The violation happens when successive reads land on <b>different replicas</b> with different lag — read replica A (caught up), then replica B (behind), and a record you saw seems to disappear. It's a weaker guarantee than strong consistency but stronger than eventual.</p><p>The canonical fix is <b>session stickiness</b>: deterministically map a user to one replica (e.g., hash of user-id → replica), so all their reads come from a consistently-positioned log, even if that replica lags the leader. A related but distinct multi-partition anomaly is <b>consistent-prefix reads</b> — seeing an answer before its question because the two writes live on independently-replicating partitions — which stickiness alone can't fix; it needs causal tracking or co-location.</p>","trap":"Thinking sticky sessions give strong consistency. They only prevent going BACKWARDS in time on a single replica; that replica can still be globally stale, and if it dies the user re-sticks to another replica that may be behind it.","worked":"User refreshes a comment thread twice. Without stickiness, refresh 1 hits a fresh replica (sees comment #57), refresh 2 hits a lagging replica (comment #57 gone). Hashing the user to one replica makes the sequence monotonic.","related":["read-your-writes","replication-lag","single-leader-replication"]},
  "multi-leader-replication": {"term":"Multi-Leader Replication","group":"DB-REPL","aliases":["multi-leader replication","multi-leader","multi-master","active-active","write conflict","write conflicts","conflict resolution","last-write-wins","LWW","version vector","version vectors","CRDT","CRDTs","siblings"],"eli5":"Several nodes all accept writes and sync to each other, so two people can edit the same row at once and clash.","memory":"Many leaders = many opinions; you need a referee (conflict resolution) because there's no single log to settle who's right.","full":"<p><b>Multi-leader</b> (multi-master / active-active) lets multiple nodes accept writes and replicate to one another — chosen for multi-datacenter (local write latency, per-region leader), offline-capable clients, and collaborative editing. The defining hazard is the <b>write conflict</b>: the same key updated concurrently on two leaders, with no single log to order them. Auto-increment IDs and uniqueness constraints also become unsafe across leaders.</p><p>Conflicts must be detected and resolved: <b>last-write-wins</b> (timestamp ordering — simple but silently drops writes and is clock-skew-sensitive), <b>version vectors</b> (distinguish concurrent from causal updates and expose <b>siblings</b> to merge), <b>CRDTs</b> (types that merge commutatively with no loss), or application-defined merge logic. The same conflict-resolution toolkit applies to leaderless systems, which also have no single authority on write order.</p>","trap":"Reaching for multi-leader to scale write throughput. Its purpose is geo-locality and availability, not throughput — and it ADDS the hard problem of conflict resolution. Single-region scale usually wants partitioning, not multiple leaders.","worked":"Two datacenters, one leader each. A user's row is edited in US-East (set name='A') and EU-West (set name='B') within the same second; both replicate; LWW keeps whichever timestamp is higher and the other edit is lost unless you store siblings.","related":["single-leader-replication","quorum","read-repair","failover"]},
  "read-repair": {"term":"Read Repair & Anti-Entropy","group":"DB-REPL","aliases":["read repair","read-repair","anti-entropy","anti entropy","merkle tree","merkle trees","eventual consistency","convergence"],"eli5":"Fix stale copies either when someone reads them (read repair) or in a background sweep that compares all copies (anti-entropy).","memory":"Read repair = fix it when you trip over it; anti-entropy = the Roomba that sweeps the whole floor on a schedule.","full":"<p>Leaderless stores converge via two complementary mechanisms. <b>Read repair</b> is foreground and lazy: on a quorum read the coordinator notices a replica returned an outdated value and writes the current one back — cheap, but only repairs keys that are actually read, so cold data stays divergent. <b>Anti-entropy</b> is a background sweep that compares replicas' full datasets and syncs differences regardless of reads, typically using <b>Merkle trees</b> so two nodes can find the differing key ranges with logarithmic data exchange instead of streaming everything.</p><p>Together they deliver <b>eventual consistency</b>: read repair handles hot keys quickly, anti-entropy guarantees even untouched keys eventually converge. Without anti-entropy, a write that landed on a minority of replicas for a rarely-read key could stay lost indefinitely. These are the durability/convergence backbone behind quorum reads and hinted handoff.</p>","trap":"Forgetting that read repair alone is insufficient. It only touches data that gets read — rarely-accessed keys never self-heal without anti-entropy, so 'we have read repair' is not a convergence guarantee for cold data.","worked":"Two Cassandra replicas exchange Merkle-tree root hashes; they differ, so they descend the tree, find one mismatched partition range, and stream only those rows — repairing without comparing the entire keyspace.","related":["quorum","hinted-handoff","multi-leader-replication"]},
  "hinted-handoff": {"term":"Hinted Handoff","group":"DB-REPL","aliases":["hinted handoff","hinted-handoff","hint","hints"],"eli5":"If the right node is down, a stand-in holds the write and delivers it once the node comes back.","memory":"Like leaving a package with your neighbor when you're out — it gets to you eventually, but a courier checking YOUR door right now won't find it.","full":"<p><b>Hinted handoff</b> keeps writes available during node failures: if a target replica is unreachable, another (non-home) node accepts the write and stores a <b>hint</b> — a note saying \"this belongs to node X\" — then replays it to X once it recovers. This is the mechanism behind a <b>sloppy quorum</b>: the W acks may come from nodes outside the key's normal home set, preserving write availability through partitions.</p><p>The crucial limitation: hinted handoff boosts <b>availability and eventual durability</b>, not read consistency. A subsequent quorum read targets the key's home replicas, which may not yet hold the hint, so the read can miss the just-written value until the hint is delivered or anti-entropy runs. Hints can also accumulate and expire (Cassandra drops hints after a window), after which only anti-entropy repair recovers the data.</p>","trap":"Believing hinted handoff makes a sloppy-quorum write immediately readable at quorum. The hint sits on a stand-in node OUTSIDE the read's home set, so R+W>N's overlap guarantee doesn't hold until the hint is handed off.","worked":"N=3, replica 3 is down. Write needs W=2; replicas {1,2} ack and a fourth node stores a hint for 3. When 3 returns, the hint replays. Between failure and replay, a read of {2,3} sees only 2's copy.","related":["quorum","read-repair","failover"]},
  "failover": {"term":"Failover & Split-Brain","group":"DB-REPL","aliases":["failover","fail over","split-brain","split brain","promotion","leader election","fencing","STONITH","fencing token"],"eli5":"When the leader dies, promote a replica — but make sure the old leader can't keep accepting writes too.","memory":"Split-brain = two kings, one kingdom. Fencing/STONITH is the coup that ensures only one survives.","full":"<p><b>Failover</b> promotes a follower to leader when the leader fails — usually the replica with the highest LSN / least lag, to minimize loss. Two dangers dominate. <b>Data loss</b>: with asynchronous replication, writes acked by the old leader but not yet shipped are discarded on promotion (and if the old leader rejoins, its un-replicated WAL is typically thrown away). <b>Split-brain</b>: a network partition leaves two nodes each believing they're leader, both taking divergent writes that can't be cleanly merged.</p><p>Guards: <b>quorum/lease-based election</b> so a minority partition can't self-promote; <b>fencing tokens</b> (monotonic epoch numbers) so storage rejects writes from a demoted old leader; and <b>STONITH</b> (\"shoot the other node in the head\") to forcibly kill the old leader. The failover <i>timeout</i> is itself a tradeoff — too short causes false failovers under transient blips, too long means extended write downtime.</p>","trap":"Assuming automatic failover is always safe to enable. Aggressive timeouts cause flapping/false failovers, and without fencing a returning old leader creates split-brain. Many shops run automated failover with strict fencing, or keep promotion human-gated, precisely to avoid these.","worked":"Postgres primary partitions away; Patroni uses a DCS (etcd) lease so only the majority side promotes a standby. The old primary, on reconnect, finds its lease gone and is fenced/rewound via pg_rewind rather than accepting writes.","related":["single-leader-replication","synchronous-replication","replication-lag","quorum"]}
});

</script>
