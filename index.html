<script>
/* Schema Design & Normalization (DB-MODELING) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-MODELING","front":"What three anomaly classes does normalization eliminate?","back":"Normalization removes redundancy that causes <strong>update anomalies</strong> (same fact stored in many rows must be changed everywhere or rows disagree), <strong>insertion anomalies</strong> (can't record a fact because other unrelated attributes are missing — e.g., can't add a department until an employee exists), and <strong>deletion anomalies</strong> (deleting the last row destroys an unrelated fact). The cure is to store each fact <em>once</em>, in the table where it functionally belongs."},
  {"sec":"DB-MODELING","front":"State the requirement for First Normal Form (1NF)","back":"Every column holds a single <strong>atomic</strong> value from its domain — no repeating groups, no comma-lists, no arrays-as-columns (<code>phone1, phone2, phone3</code>), and each row is uniquely identifiable. A table violates 1NF if a cell contains a set/list you'd have to parse. The fix is to break repeating groups into separate rows in a child table."},
  {"sec":"DB-MODELING","front":"What is a partial dependency, and which normal form forbids it?","back":"A <strong>partial dependency</strong> exists when a non-key attribute depends on only <em>part</em> of a composite primary key. <strong>2NF</strong> forbids it: a table is in 2NF if it's in 1NF and every non-key attribute depends on the <em>whole</em> key. Example: in <code>(order_id, product_id) → product_name</code>, <code>product_name</code> depends only on <code>product_id</code>, so it must move to a <code>products</code> table. Tables with a single-column key are automatically in 2NF."},
  {"sec":"DB-MODELING","front":"What is a transitive dependency, and which normal form forbids it?","back":"A <strong>transitive dependency</strong> is when a non-key attribute depends on another non-key attribute rather than directly on the key: <code>key → A → B</code>. <strong>3NF</strong> forbids it. Example: <code>employee_id → dept_id → dept_name</code>; <code>dept_name</code> depends on <code>dept_id</code> (a non-key), so it belongs in a <code>departments</code> table keyed by <code>dept_id</code>."},
  {"sec":"DB-MODELING","front":"How does BCNF differ from 3NF?","back":"BCNF is strictly stronger: for <em>every</em> non-trivial functional dependency <code>X → Y</code>, <code>X</code> must be a <strong>superkey</strong>. 3NF relaxes this by also allowing the dependency if <code>Y</code> is a <em>prime</em> attribute (part of some candidate key). The two differ only when a table has <strong>overlapping composite candidate keys</strong>; such a table can be in 3NF yet violate BCNF. The tradeoff: BCNF decomposition is sometimes <em>not dependency-preserving</em>, whereas a 3NF decomposition that preserves all FDs always exists — which is why 3NF is occasionally retained deliberately."},
  {"sec":"DB-MODELING","front":"Give a concrete table that is in 3NF but violates BCNF","back":"<code>(student, course) → instructor</code> and <code>instructor → course</code> (each instructor teaches exactly one course). Candidate keys are <code>{student, course}</code> and <code>{student, instructor}</code>, which overlap on <code>student</code>. It's 3NF because the only violating FD, <code>instructor → course</code>, has a <em>prime</em> right-hand side (<code>course</code> is part of a candidate key). But <code>instructor</code> is not a superkey, so <code>instructor → course</code> violates BCNF. Decomposing into <code>{instructor, course}</code> and <code>{student, instructor}</code> reaches BCNF but loses the <code>(student, course) → instructor</code> dependency."},
  {"sec":"DB-MODELING","front":"Why is denormalization a deliberate read-path optimization, and what does it cost?","back":"Denormalization pre-joins or duplicates data so a hot read path avoids expensive joins/aggregations, trading write-time work for read-time speed. Costs: every duplicated fact must be kept consistent on writes (more update logic, triggers, or app code), larger storage, and a window where copies can diverge. It's justified when reads vastly outnumber writes and the join is a proven bottleneck — not as a default."},
  {"sec":"DB-MODELING","front":"Name common denormalization techniques besides flattening joins","back":"<ul><li><strong>Precomputed/derived columns</strong> — store <code>order_total</code> instead of summing line items.</li><li><strong>Materialized views</strong> — persist a query result; refresh is manual/scheduled in Postgres (<code>REFRESH MATERIALIZED VIEW</code>), or synchronous in engines like Oracle (<code>ON COMMIT</code>) and SQL Server indexed views.</li><li><strong>Redundant foreign-key copies</strong> — duplicate a parent attribute onto the child to skip a join.</li><li><strong>Summary/rollup tables</strong> — pre-aggregated counts/sums for dashboards.</li><li><strong>Array/JSON columns</strong> — collapse a child collection into the parent row.</li></ul>"},
  {"sec":"DB-MODELING","front":"Surrogate key vs natural key — core tradeoff?","back":"A <strong>surrogate key</strong> (auto-increment or UUID) is system-generated, opaque, stable, and never changes — decoupling identity from business data. A <strong>natural key</strong> (SSN, ISBN, email) carries meaning and enforces real-world uniqueness for free, but business values can change or be reused, forcing cascading updates and leaking PII into every FK. Most OLTP designs use a surrogate PK <em>and</em> a <code>UNIQUE</code> constraint on the natural key to keep both benefits."},
  {"sec":"DB-MODELING","front":"Auto-increment integer vs UUID as a surrogate key — what's the index/write tradeoff?","back":"Sequential integers (or <code>BIGSERIAL</code>) append to the right edge of a B-tree, keeping inserts localized and the index dense — but they're guessable and leak row counts. Random <strong>UUIDv4</strong> PKs scatter inserts across the whole index, causing page splits and write amplification, and bloat secondary indexes (esp. InnoDB, where the clustered PK value is stored in every secondary index). <strong>UUIDv7</strong>/ULID restore time-ordering to fix the locality problem while keeping global uniqueness."},
  {"sec":"DB-MODELING","front":"What does a FOREIGN KEY constraint actually guarantee, and what are referential actions?","back":"A foreign key enforces <strong>referential integrity</strong>: a child row may only reference a parent key that exists (or be <code>NULL</code>), preventing orphans. On parent change you choose a referential action: <code>ON DELETE/UPDATE</code> with <code>RESTRICT</code>/<code>NO ACTION</code> (block), <code>CASCADE</code> (propagate), <code>SET NULL</code>, or <code>SET DEFAULT</code>. The DB enforces this on every write; the referenced column must be a <code>PRIMARY KEY</code> or <code>UNIQUE</code> constraint."},
  {"sec":"DB-MODELING","front":"Why are FK columns usually indexed even though the PK side already is?","back":"The constraint only requires an index on the <em>referenced</em> (parent) side. Whether the <em>referencing</em> (child) FK column is auto-indexed is engine-specific: Postgres never creates it, while InnoDB <em>does</em> create one when you declare the FK. Without such an index, <code>ON DELETE CASCADE</code> and parent-key updates must full-scan the child to find referencing rows, and joins from parent to child are slow. On Postgres especially, always index the child FK column for cascade performance and join paths."},
  {"sec":"DB-MODELING","front":"Why is highly normalized schema a good fit for OLTP but a poor fit for OLAP?","back":"OLTP workloads are short, write-heavy transactions touching few rows; normalization minimizes redundancy so a single update touches one place, preserving consistency and write throughput. OLAP workloads scan/aggregate huge row counts; a normalized schema forces many large joins per analytic query. OLAP therefore favors <strong>denormalized</strong> shapes (wide tables, star/snowflake schemas) where dimensions are pre-joined to facts, trading write simplicity for scan speed."},
  {"sec":"DB-MODELING","front":"How do NULLs interact with keys and uniqueness in normalization?","back":"A <code>PRIMARY KEY</code> column cannot be <code>NULL</code>. A <code>UNIQUE</code> constraint in standard SQL permits multiple <code>NULL</code>s (since <code>NULL ≠ NULL</code>), so it does <em>not</em> enforce one row — a classic gotcha when using a natural key as a uniqueness guard. Vendors differ: SQL Server allows only a single <code>NULL</code>, and Postgres 15+ offers <code>NULLS NOT DISTINCT</code> to opt into one-NULL semantics. Frequent NULLs in non-key columns can also signal a missing decomposition (an optional attribute set that belongs in its own table or a subtype)."},
  {"sec":"DB-MODELING","front":"What is the practical normalization target for most OLTP systems, and why not always BCNF?","back":"<strong>3NF</strong> is the pragmatic default: it eliminates the redundancy that causes most anomalies while remaining cheap to query. Engineers stop short of BCNF/4NF/5NF when full decomposition would (a) break <strong>dependency preservation</strong>, forcing application-level checks, or (b) add joins to hot paths with no real anomaly risk. The rule of thumb: <em>normalize to 3NF, then denormalize deliberately with evidence.</em>"}
);

Object.assign(GLOSSARY_DATA, {
  "functional-dependency": {"term":"Functional Dependency","group":"DB-MODELING","aliases":["functional dependency","functional dependencies","determinant","FD"],"eli5":"If knowing column A always tells you exactly one value of column B, then B depends on A.","memory":"\"X arrows Y\" = X is a lookup key for Y. If X repeats, Y repeats — that repetition is the redundancy normalization hunts.","full":"<p>A functional dependency <code>X → Y</code> means that for any two rows agreeing on <code>X</code>, they must agree on <code>Y</code> — <code>X</code> <em>determines</em> <code>Y</code>. FDs are the formal machinery behind every normal form: 2NF, 3NF, and BCNF are all stated as rules about which FDs are allowed given the table's candidate keys.</p><p>A <strong>superkey</strong> is any attribute set that functionally determines every other attribute; a <strong>candidate key</strong> is a minimal superkey. Normalization is essentially the act of ensuring every FD's left side (<code>determinant</code>) is a superkey, decomposing the table when it isn't.</p>","trap":"Confusing an FD with a correlation in the current data. An FD is a constraint on ALL possible states (a business rule), not a pattern that merely happens to hold in today's rows.","related":["normalization","bcnf","third-normal-form","surrogate-key"]},
  "normalization": {"term":"Normalization","group":"DB-MODELING","aliases":["normalization","normalize","normalized","normal form","normal forms","1NF","first normal form"],"eli5":"Reorganize tables so each fact lives in exactly one place, killing redundancy.","memory":"Codd's catechism: every non-key column must depend on \"the key (1NF/2NF), the whole key (2NF), and nothing but the key (3NF), so help me Codd (BCNF).\"","full":"<p>Normalization is a progressive decomposition of relations into smaller tables to eliminate redundancy and the update/insert/delete anomalies redundancy causes. The ladder: <strong>1NF</strong> (atomic columns, no repeating groups) → <strong>2NF</strong> (no partial dependency on part of a composite key) → <strong>3NF</strong> (no transitive dependency through a non-key) → <strong>BCNF</strong> (every determinant is a superkey).</p><p>Each step removes a specific class of anomaly by ensuring non-key attributes depend on \"the key, the whole key, and nothing but the key.\" The payoff is write correctness and minimal storage; the cost is more joins at read time.</p>","trap":"Claiming higher normal forms are always better. Past 3NF, gains shrink and you risk losing dependency preservation; production schemas routinely stop at 3NF and denormalize hot paths on purpose.","worked":"An <code>orders</code> table storing <code>customer_name, customer_email</code> on every order row repeats those facts per order (redundancy). Move them to a <code>customers</code> table keyed by <code>customer_id</code>; the order keeps only the FK. Now a customer email change is one update, not N.","related":["functional-dependency","third-normal-form","bcnf","denormalization","update-anomaly"]},
  "third-normal-form": {"term":"Third Normal Form (3NF)","group":"DB-MODELING","aliases":["third normal form","3NF","2NF","second normal form","transitive dependency","partial dependency"],"eli5":"No non-key column may depend on another non-key column or on only part of the key.","memory":"3NF = attributes depend on \"the key, the whole key (2NF), and nothing but the key (3NF).\"","full":"<p>A table is in <strong>3NF</strong> if it's in 2NF and has no <strong>transitive dependency</strong> — no non-key attribute determines another non-key attribute. 2NF first removes <strong>partial dependencies</strong> (a non-key attribute depending on only part of a composite key); 3NF then removes the <code>key → A → B</code> chains where <code>A</code> is non-key.</p><p>3NF is the industry's practical normalization target: it eliminates the anomaly-causing redundancy while keeping query join counts manageable, and (unlike BCNF) a 3NF decomposition that is both lossless and <em>dependency-preserving</em> is always achievable.</p>","trap":"Thinking single-column-PK tables still need a 2NF check. With a non-composite key there can be NO partial dependency, so such tables are automatically in 2NF — only 3NF/transitive checks remain.","worked":"<code>employees(emp_id PK, dept_id, dept_location)</code>: <code>emp_id → dept_id → dept_location</code> is transitive. Split into <code>employees(emp_id, dept_id)</code> and <code>departments(dept_id PK, dept_location)</code> so a department's location is stored once.","related":["normalization","bcnf","functional-dependency","update-anomaly"]},
  "bcnf": {"term":"Boyce-Codd Normal Form (BCNF)","group":"DB-MODELING","aliases":["BCNF","Boyce-Codd","Boyce-Codd Normal Form","superkey","candidate key"],"eli5":"A stricter 3NF: the left side of every dependency must be a superkey, no exceptions.","memory":"BCNF = \"every determinant is a superkey.\" If anything on the left of an arrow isn't a key, you're not in BCNF.","full":"<p><strong>BCNF</strong> requires that for every non-trivial functional dependency <code>X → Y</code>, <code>X</code> is a <strong>superkey</strong>. It closes the one loophole 3NF leaves: 3NF still permits <code>X → Y</code> where <code>Y</code> is a prime attribute (part of a candidate key) even if <code>X</code> isn't a superkey. The two diverge only when a table has multiple <strong>overlapping composite candidate keys</strong>.</p><p>The catch: BCNF decomposition can fail to be <strong>dependency-preserving</strong> — you may not be able to enforce every original FD with single-table constraints after splitting, requiring a join or application check. That's the principled reason engineers sometimes deliberately stop at 3NF.</p>","trap":"Assuming BCNF is always reachable and harmless. Unlike 3NF, a BCNF decomposition is not guaranteed to preserve all dependencies — the classic senior-interview \"3NF but not BCNF\" example exists precisely because of overlapping candidate keys.","worked":"<code>(student, course) → instructor</code>, <code>instructor → course</code>. Keys <code>{student,course}</code> and <code>{student,instructor}</code> overlap. It's 3NF (the violating FD's RHS <code>course</code> is prime) but <code>instructor → course</code> has a non-superkey determinant → not BCNF. Decomposing loses the original <code>(student,course) → instructor</code> FD.","related":["third-normal-form","functional-dependency","normalization"]},
  "surrogate-key": {"term":"Surrogate Key","group":"DB-MODELING","aliases":["surrogate key","surrogate keys","natural key","natural keys","auto-increment","UUID","ULID","UUIDv7"],"eli5":"A system-generated, meaningless ID used as the primary key instead of real-world data.","memory":"Surrogate = a barcode you stick on the entity; natural = a feature the entity was born with. Barcodes never need re-printing when the entity changes.","full":"<p>A <strong>surrogate key</strong> is an opaque, system-assigned identifier (auto-increment <code>BIGINT</code>, UUID, ULID) that has no business meaning and never changes, cleanly separating row identity from mutable business attributes. A <strong>natural key</strong> uses real-world data (email, SSN, ISBN) that already uniquely identifies the entity. Most OLTP schemas use a surrogate PK plus a <code>UNIQUE</code> constraint on the natural key — getting stability and real-world uniqueness both.</p><p>Choice of surrogate matters physically: sequential integers keep B-tree inserts localized but leak counts and are guessable; random <strong>UUIDv4</strong> scatters writes and bloats indexes (severe under InnoDB, whose secondary indexes store the clustered PK value in every entry); <strong>UUIDv7/ULID</strong> restore time-ordering while staying globally unique.</p>","trap":"\"Natural keys save a column, just use the email.\" Business values mutate and get reused — a changed email then cascades through every FK, and PII leaks into every referencing table. Surrogates exist to absorb that change.","worked":"Customers table: PK <code>customer_id BIGINT GENERATED ALWAYS AS IDENTITY</code>, plus <code>email TEXT UNIQUE</code>. When a customer changes their email, you update one column; no FK anywhere needs to move because they all reference <code>customer_id</code>.","related":["referential-integrity","normalization","functional-dependency"]},
  "referential-integrity": {"term":"Referential Integrity","group":"DB-MODELING","aliases":["referential integrity","foreign key","foreign keys","FK","ON DELETE CASCADE","referential action"],"eli5":"A foreign key guarantees you can't point at a parent row that doesn't exist.","memory":"FK = a pointer the database refuses to let dangle. The referential action decides what happens to the pointer when its target moves or dies.","full":"<p><strong>Referential integrity</strong> is the guarantee that every foreign-key value either matches an existing referenced key or is <code>NULL</code> — no orphan rows. The referenced column must be a <code>PRIMARY KEY</code> or <code>UNIQUE</code> constraint. The DBMS enforces it on every insert/update/delete that could break the link.</p><p>On parent mutation you pick a <strong>referential action</strong>: <code>NO ACTION</code>/<code>RESTRICT</code> (reject), <code>CASCADE</code> (delete/update children too), <code>SET NULL</code>, or <code>SET DEFAULT</code>. Crucially, whether the child FK column is auto-indexed is engine-specific — Postgres never creates it, InnoDB does when the FK is declared — so an unindexed FK (the Postgres default) makes cascades and parent-side changes scan the child table.</p>","trap":"Believing the FK auto-creates an index on the child column everywhere. In Postgres it does not (InnoDB does) — forgetting the Postgres case turns <code>ON DELETE CASCADE</code> and join paths into full child-table scans.","worked":"<code>orders.customer_id REFERENCES customers(customer_id) ON DELETE RESTRICT</code> blocks deleting a customer who still has orders. Switch to <code>ON DELETE CASCADE</code> and deleting the customer removes their orders too — and on Postgres you'd better have an index on <code>orders.customer_id</code> or that cascade scans the whole table.","related":["surrogate-key","normalization","olap-vs-oltp-schema"]},
  "update-anomaly": {"term":"Update / Insert / Delete Anomalies","group":"DB-MODELING","aliases":["update anomaly","update anomalies","insertion anomaly","deletion anomaly","anomaly","anomalies"],"eli5":"When the same fact is stored in many rows, changing, adding, or removing it gets dangerous.","memory":"Redundancy is the disease; update/insert/delete anomalies are the three symptoms. One fact, many copies = guaranteed drift.","full":"<p>These are the three failure modes redundancy creates, and the whole reason normalization exists. <strong>Update anomaly:</strong> a duplicated fact is changed in some rows but not all, leaving the table internally inconsistent. <strong>Insertion anomaly:</strong> you can't record one fact without inventing unrelated data (can't add a product category until at least one product exists in the same row). <strong>Deletion anomaly:</strong> removing the last row that happens to hold a fact destroys that fact unintentionally.</p><p>Each higher normal form targets a specific anomaly source; reaching 3NF/BCNF means every fact lives in exactly one place, so each of update/insert/delete touches exactly one row of truth.</p>","trap":"Calling any data error an \"anomaly.\" These three are specifically caused by storing a fact redundantly across rows — they vanish once the schema is normalized, which is the diagnostic test.","worked":"An <code>enrollments(student, course, instructor, instructor_office)</code> table repeats <code>instructor_office</code> on every enrollment. Move the instructor's office: update anomaly if you miss a row. Drop the only student of a course: deletion anomaly — you also lost the instructor's office.","related":["normalization","third-normal-form","denormalization"]},
  "olap-vs-oltp-schema": {"term":"OLTP vs OLAP Schema Shape","group":"DB-MODELING","aliases":["OLTP","OLAP","star schema","snowflake schema","normalized OLTP","denormalized OLAP","fact table","dimension"],"eli5":"Transactional systems want normalized tables; analytics systems want wide, pre-joined ones.","memory":"OLTP = many narrow writes → normalize. OLAP = few wide scans → denormalize. Write-optimized vs read/scan-optimized.","full":"<p><strong>OLTP</strong> handles many small write-heavy transactions touching few rows; it favors a <strong>normalized</strong> (≈3NF) schema so each write hits one place, maximizing consistency and write throughput. <strong>OLAP</strong> scans and aggregates enormous row counts; it favors <strong>denormalized</strong> shapes — wide tables and <strong>star schemas</strong> (a central fact table joined to pre-flattened dimension tables) — so analytic queries avoid many large joins.</p><p>This is the central schema-design tension: the same data modeled two ways for two access patterns. ETL/ELT pipelines bridge them, transforming normalized operational data into denormalized analytical models. (Star/snowflake modeling is covered in depth in the warehousing deck.)</p>","trap":"Trying to serve heavy analytics off the normalized OLTP database directly. The multi-join cost and lock/IO contention with transactional traffic is exactly why a separate denormalized warehouse exists.","worked":"OLTP: <code>orders</code>, <code>order_items</code>, <code>products</code>, <code>customers</code> as four normalized tables. OLAP: one <code>fact_sales</code> row per line item with <code>customer_dim</code> and <code>product_dim</code> attributes pre-joined, so a revenue-by-region query scans the fact table without traversing the operational join graph.","related":["denormalization","normalization","referential-integrity"]}
});

</script>

<script>
/* Concurrency Control & MVCC (DB-MVCC) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-MVCC","front":"What core problem does MVCC solve, in one sentence?","back":"MVCC keeps multiple <strong>timestamped versions</strong> of each row so that <strong>readers never block writers and writers never block readers</strong> — a reader sees a consistent snapshot while a concurrent writer creates a new version, eliminating the read-write lock contention that plagues lock-based concurrency control."},
  {"sec":"DB-MVCC","front":"What does a transaction's \"snapshot\" actually consist of under MVCC?","back":"It is not a physical copy. A snapshot is a <strong>visibility rule</strong> over the version chain: a set of transaction IDs (e.g. a Postgres snapshot records <code>xmin</code> = the lowest still-running xid, <code>xmax</code> = the next xid to be assigned, and the explicit list of in-progress xids in between). For each tuple version the engine decides visibility by comparing the version's creating/deleting txn IDs against that set. Note <code>xmin</code> is overloaded — it names both this snapshot field and the tuple-header creator field."},
  {"sec":"DB-MVCC","front":"How does a version chain link multiple versions of the same logical row?","back":"Each physical version stores pointers and txn metadata so the engine can walk to the version valid for a given snapshot. In <strong>Postgres</strong> versions live in the heap, each tagged with <code>xmin</code> (creator) and <code>xmax</code> (deleter/superseder); the chain is the sequence of heap tuples. In <strong>InnoDB</strong> the latest version is in the clustered index and older versions are reconstructed by following <code>DB_ROLL_PTR</code> back through undo-log records."},
  {"sec":"DB-MVCC","front":"Postgres vs InnoDB: where do old row versions physically live?","back":"<ul><li><strong>Postgres</strong>: old versions stay <em>in the table heap itself</em> as dead tuples; the row is never updated in place, so the heap accumulates versions until <code>VACUUM</code> reclaims them.</li><li><strong>InnoDB</strong>: the table holds only the <em>current</em> version; prior versions are kept as <strong>undo-log</strong> (rollback segment) entries and reconstructed on demand. Undo is purged once no snapshot needs it.</li></ul>"},
  {"sec":"DB-MVCC","front":"Why does Postgres suffer from table/index bloat and what fights it?","back":"Because <code>UPDATE</code>/<code>DELETE</code> mark old tuples dead in-place rather than removing them, dead tuples accumulate and inflate heap and index size — <strong>bloat</strong>. <code>VACUUM</code> reclaims dead-tuple space for reuse (autovacuum runs it automatically); <code>VACUUM FULL</code> rewrites the table to physically shrink it but takes an <code>ACCESS EXCLUSIVE</code> lock. Long-running transactions hold back the <em>xmin horizon</em> and prevent vacuuming of dead tuples newer than the oldest snapshot."},
  {"sec":"DB-MVCC","front":"What is the InnoDB \"history list\" and why can it explode?","back":"InnoDB chains all undo records needed to reconstruct old versions into the <strong>history list</strong>. A single <em>long-running</em> or forgotten-open transaction (e.g. an idle <code>REPEATABLE READ</code> session) keeps an old read view alive, so the purge thread cannot discard undo — the history list length grows unboundedly, slowing reads (longer version walks) and bloating the undo tablespace. It is the InnoDB analog of Postgres's xmin-horizon problem."},
  {"sec":"DB-MVCC","front":"Optimistic vs pessimistic concurrency control — the core distinction?","back":"<strong>Pessimistic</strong> assumes conflicts are likely and <em>acquires locks up front</em> to block conflicting access (e.g. 2PL). <strong>Optimistic</strong> assumes conflicts are rare: transactions run without locking, then <strong>validate at commit</strong> (check no conflicting write occurred via timestamps/version numbers) and <em>abort and retry</em> if validation fails. Optimistic wins under low contention; pessimistic wins when contention and retry cost are high."},
  {"sec":"DB-MVCC","front":"Why is MVCC for reads often paired with locking for writes, not pure OCC?","back":"MVCC removes read-write conflicts (readers use snapshots) but <strong>write-write conflicts still exist</strong> — two txns can't both create the successor version of the same row. Most MVCC engines resolve this <em>pessimistically</em>: the second writer takes a row <code>X</code> lock and blocks (or hits a serialization error under stricter isolation). So real systems are MVCC-for-reads + lock-for-writes, not pure optimistic."},
  {"sec":"DB-MVCC","front":"Two-Phase Locking (2PL): what are the two phases?","back":"A <strong>growing phase</strong> where a transaction only <em>acquires</em> locks, followed by a <strong>shrinking phase</strong> where it only <em>releases</em> them — once any lock is released, no new lock may be acquired. This discipline guarantees a <strong>conflict-serializable</strong> schedule. Note: 2PL governs <em>when</em> locks are released; it is orthogonal to how many locks exist."},
  {"sec":"DB-MVCC","front":"What is Strict 2PL and why do real databases use it instead of basic 2PL?","back":"<strong>Strict 2PL</strong> holds all <em>exclusive</em> locks until the transaction <strong>commits or aborts</strong> (Rigorous 2PL holds shared locks too). Basic 2PL allows a cascade: T2 reads T1's uncommitted write, then T1 aborts, forcing T2 to abort. Strict 2PL prevents these <strong>cascading aborts</strong> and makes recovery clean, which is why nearly all lock-based engines use it."},
  {"sec":"DB-MVCC","front":"Shared vs exclusive locks — compatibility rules?","back":"A <strong>shared (S)</strong> lock is taken for reads; an <strong>exclusive (X)</strong> lock for writes. <strong>S is compatible with S</strong> (many readers concurrently) but <strong>X is incompatible with everything</strong> (one writer, no concurrent readers or writers). Under MVCC, S locks for plain reads are largely unnecessary because reads use snapshots — only <code>SELECT ... FOR UPDATE/SHARE</code> takes explicit row locks."},
  {"sec":"DB-MVCC","front":"How do databases detect deadlocks, and how is one resolved?","back":"The engine maintains a <strong>wait-for graph</strong> with an edge T1 → T2 when T1 waits on a lock T2 holds. A <strong>cycle</strong> means deadlock. The engine periodically (or on lock-wait) searches for cycles and breaks them by choosing a <strong>victim</strong> to roll back — typically the transaction with the least work done / fewest locks / lowest undo cost — releasing its locks so others proceed. The victim gets a deadlock error and must retry."},
  {"sec":"DB-MVCC","front":"What is lock escalation and what is its main risk?","back":"<strong>Lock escalation</strong> converts many fine-grained locks (row/page) into one coarse lock (table) once a transaction holds too many, to cap lock-manager memory. Its risk is a <strong>sudden concurrency collapse</strong>: a table-level lock blocks all other access. SQL Server and DB2 escalate; <strong>Postgres and InnoDB do not</strong> escalate row locks (Postgres stores row locks on the tuple via <code>xmax</code> so it has no row-lock memory limit; InnoDB keeps compact per-row locks), which is a common interview gotcha. (Postgres does use escalation-like coarsening only for SSI predicate locks, never for ordinary row locks.)"},
  {"sec":"DB-MVCC","front":"Why does MVCC not prevent write skew, and what does?","back":"Snapshot Isolation (the typical MVCC level) checks only that <em>your own writes</em> didn't conflict; two txns can read an overlapping set and each write a <em>different</em> row, breaking a multi-row invariant (e.g. both doctors go off-call). MVCC's first-updater-wins doesn't catch this because the write sets are disjoint. <strong>Serializable Snapshot Isolation (SSI)</strong> — Postgres <code>SERIALIZABLE</code> — detects dangerous read-write dependency structures and aborts a transaction to prevent it."},
  {"sec":"DB-MVCC","front":"Postgres Read Committed vs Repeatable Read: how does snapshot timing differ?","back":"Under <strong>Read Committed</strong> (Postgres default) a <em>new snapshot is taken at the start of each statement</em>, so successive statements can see newly committed data. Under <strong>Repeatable Read</strong> a single snapshot is taken at the <em>first statement</em> and reused for the whole transaction, giving repeatable reads but raising the chance of a <code>could not serialize</code> error on conflicting updates that the txn must retry."},
  {"sec":"DB-MVCC","front":"What does \"first-updater-wins\" mean in Postgres MVCC, and how does it relate to \"first-committer-wins\"?","back":"They describe the same write-write resolution from two angles. Abstract SI is often stated as <strong>first-committer-wins</strong> (validate at commit, loser aborts). Postgres implements it as <strong>first-updater-wins</strong>: the second txn to update a row <strong>blocks on the row lock</strong> immediately; when the first commits, the blocked txn aborts with a serialization failure under RR/Serializable, or (under Read Committed) re-reads the new version and re-evaluates. Either way only one writer to a given row succeeds — this is how MVCC resolves <strong>write-write</strong> conflicts that snapshots alone cannot."}
);

Object.assign(GLOSSARY_DATA, {
  "version-chain": {"term":"Version Chain","group":"DB-MVCC","eli5":"A linked trail from a row's newest copy back through its older copies, with txn stamps that tell you which copy you're allowed to see.","memory":"xmin = born, xmax = died. Walk the chain until you find the version alive during your snapshot's lifetime.","full":"<p>A version chain is the ordered set of physical versions of one logical row, linked so the engine can find the version visible to a given snapshot. Each version carries the txn ID that created it and the txn ID that superseded/deleted it; <b>visibility</b> is decided by comparing these against the reader's snapshot.</p><p>Implementation differs sharply: <b>Postgres</b> stores each version as a separate heap tuple with <code>xmin</code>/<code>xmax</code>, so the chain lives in the table and indexes may point at multiple versions (mitigated by HOT updates). <b>InnoDB</b> keeps only the current version in the clustered index and walks <code>DB_ROLL_PTR</code> backward through undo records to <em>reconstruct</em> prior versions on demand.</p>","trap":"Assuming the chain is newest→oldest in both engines the same way. InnoDB reconstructs backward from undo (delta-based); Postgres keeps full physical tuples in the heap.","worked":"Postgres tuple history for R: (xmin=100,xmax=150)=v1 then (xmin=150,xmax=0)=v2. A snapshot from xid 120 sees v1 (created≤120, deleted at 150>120); a snapshot from xid 200 sees v2.","related":["mvcc","vacuum","undo-log","snapshot-isolation"]},
  "vacuum": {"term":"VACUUM & Bloat (Postgres)","group":"DB-MVCC","eli5":"Postgres never erases an old row in place, so junk piles up; VACUUM is the janitor that frees the space for reuse.","memory":"Updates leave corpses in the heap; VACUUM is the morgue cleanup. A long txn = a coroner who won't sign off, so bodies pile up.","full":"<p>Because Postgres performs updates by writing a <b>new heap tuple</b> and marking the old one dead (never in-place), dead tuples accumulate as <b>bloat</b>, inflating heap and index size and degrading scans. <code>VACUUM</code> (run continuously by <b>autovacuum</b>) marks dead-tuple space reusable and updates the visibility map and freeze state; <code>VACUUM FULL</code> physically rewrites the table to shrink it but holds <code>ACCESS EXCLUSIVE</code>.</p><p>The key operational hazard is the <b>xmin horizon</b>: a long-running transaction, an idle-in-transaction session, an abandoned replication slot, or a stale prepared transaction holds the horizon back so VACUUM cannot remove dead tuples newer than it — bloat grows unchecked. The analogous extreme is <b>transaction-ID wraparound</b>, which forces an anti-wraparound vacuum.</p>","trap":"Thinking <code>VACUUM</code> returns disk to the OS. Plain VACUUM only frees space <em>for reuse within the table</em>; only <code>VACUUM FULL</code> (or pg_repack) shrinks the file — and it locks the table.","worked":"A reporting query left open for 6 hours pins the xmin horizon; autovacuum on a hot table can't reap any of the millions of dead tuples created meanwhile, and the table doubles in size until the query ends.","related":["mvcc","version-chain","undo-log","snapshot-isolation"]},
  "undo-log": {"term":"Undo Log / Rollback Segment (InnoDB)","group":"DB-MVCC","eli5":"InnoDB keeps a side journal of how to undo recent changes, which doubles as the way to rebuild old row versions for readers.","memory":"Undo log = the \"Ctrl-Z stack\" that also lets time-travel readers rebuild the past. Purge = garbage collection gated by the oldest read view.","full":"<p>InnoDB stores only the current row version in the clustered index. Prior versions are reconstructed by applying <b>undo-log</b> records (in rollback segments / undo tablespaces) in reverse via the row's <code>DB_ROLL_PTR</code> and <code>DB_TRX_ID</code>. The same undo serves two jobs: <b>transaction rollback</b> and <b>MVCC read views</b>.</p><p>Undo can only be discarded by the <b>purge</b> threads once no active read view still needs it. A long-running or idle-open transaction keeps an old read view alive, so undo can't be purged and the <b>history list length</b> grows — the InnoDB equivalent of Postgres bloat, manifesting as slower reads (longer version walks) and a swelling undo tablespace.</p>","trap":"Claiming InnoDB stores full old tuples like Postgres. It stores <em>deltas</em> in undo and reconstructs versions on demand — different bloat profile, but the same long-txn pathology.","worked":"A session opens a REPEATABLE READ txn and idles. Its read view pins undo; SHOW ENGINE INNODB STATUS shows History list length climbing into the millions, and point queries slow as each must walk a long undo chain.","related":["mvcc","version-chain","vacuum","snapshot-isolation"]},
  "two-phase-locking": {"term":"Two-Phase Locking (2PL)","group":"DB-MVCC","eli5":"Grab all the locks you need first, then only let go — never grab again after releasing one.","memory":"Two phases = up the lock mountain (acquire), then down (release) — never climb back up. \"2PL\" ≠ \"2PC.\"","full":"<p>2PL is the canonical <b>pessimistic</b> protocol guaranteeing conflict-serializability: a transaction has a <b>growing phase</b> (only acquire locks) then a <b>shrinking phase</b> (only release). Locks come in <b>shared (S)</b> for reads and <b>exclusive (X)</b> for writes; S/S is compatible, anything-with-X is not.</p><p>Plain 2PL still permits <b>cascading aborts</b>, so production systems use <b>Strict 2PL</b> (hold X locks to commit/abort) or <b>Rigorous 2PL</b> (hold S locks too) for clean recovery. 2PL is <em>not</em> the same as two-phase <em>commit</em> (2PC), a frequent terminology trap. Combined with MVCC, engines typically use Strict 2PL only for writes while reads go lock-free via snapshots.</p>","trap":"Confusing 2PL (concurrency control within one node) with 2PC (atomic commit across nodes). Also: basic 2PL guarantees conflict-serializability but NOT cascadeless recovery — that needs Strict 2PL.","worked":"T1: lock-X(A), write A, lock-X(B), write B, then commit and release both. Because no release precedes the last acquire, the schedule is conflict-serializable.","related":["pessimistic-cc","deadlock","lock-escalation","ssi"]},
  "pessimistic-cc": {"term":"Optimistic vs Pessimistic Concurrency Control","group":"DB-MVCC","eli5":"Pessimistic locks first to avoid conflicts; optimistic runs freely and checks for conflicts only at commit, retrying if it lost.","memory":"Optimist asks forgiveness at commit; pessimist asks permission up front. Low contention → optimist; high contention → pessimist.","full":"<p><b>Pessimistic CC</b> (e.g. 2PL) acquires locks before access, blocking conflicting transactions; it pays cost up front and risks deadlocks but avoids wasted work. <b>Optimistic CC (OCC)</b> runs in a read-validate-write pattern: execute against a snapshot, then at commit <b>validate</b> that no conflicting committed write occurred (via version numbers/timestamps); if validation fails, <b>abort and retry</b>.</p><p>The choice is workload-driven: OCC excels under <b>low contention</b> (validation rarely fails, no lock overhead) and is the model behind compare-and-set columns, <code>SELECT ... version</code> checks, and many distributed stores; pessimistic locking wins under <b>high contention</b> where repeated aborts/retries would thrash. MVCC's write path is effectively a hybrid: snapshot reads (optimistic flavor) plus row X-locks or first-updater-wins for writes.</p>","trap":"Calling MVCC \"optimistic concurrency.\" MVCC is a versioning mechanism; it can back either an optimistic (validation/abort) or pessimistic (row-lock) write strategy depending on isolation level.","worked":"Optimistic UPDATE: <code>UPDATE acct SET bal=90, ver=ver+1 WHERE id=1 AND ver=7</code>. If another txn already bumped ver to 8, zero rows match → the app detects the lost update and retries.","related":["two-phase-locking","mvcc","snapshot-isolation","ssi"]},
  "lock-escalation": {"term":"Lock Escalation","group":"DB-MVCC","eli5":"When one transaction holds too many tiny row locks, some engines swap them for one big table lock to save memory — which can freeze everyone else out.","memory":"Too many small locks → one giant lock. SQL Server/DB2 escalate; Postgres/InnoDB don't (row locks). Escalation trades memory for concurrency.","full":"<p>Lock escalation converts a large number of fine-grained locks (row/page) into a single coarse lock (table) once a transaction crosses a threshold, bounding the lock manager's memory. <b>SQL Server</b> (~5,000 locks per object) and <b>DB2</b> do this; the danger is a <b>concurrency cliff</b> — a table-level X lock blocks all other access to that table.</p><p>A key interview point: <b>Postgres and InnoDB do not escalate row locks.</b> InnoDB tracks per-row locks compactly via a bitmap on the page and never coarsens them; Postgres stores row locks on the tuple itself via <code>xmax</code> (so there is no in-memory row-lock table to overflow), giving it no escalation step. (Postgres does use an escalation mechanism, but <em>only</em> for SSI predicate locks, never ordinary row locks.) Thus \"avoid lock escalation\" tuning advice is engine-specific, not universal.</p>","trap":"Stating that all databases escalate locks. Postgres and InnoDB do NOT escalate row locks — repeating SQL Server folklore here is a classic miss (Postgres escalates only SSI predicate locks).","worked":"A SQL Server <code>DELETE</code> touching 10k rows acquires row locks, crosses the threshold, and escalates to a table X lock; concurrent readers of unrelated rows in that table now block until the delete commits.","related":["two-phase-locking","deadlock","pessimistic-cc"]},
  "ssi": {"term":"Serializable Snapshot Isolation (SSI)","group":"DB-MVCC","eli5":"Run on snapshots like usual, but watch for the dangerous dependency pattern that breaks serializability and abort someone before it commits.","memory":"SSI = SI + a referee watching for two rw-edges meeting at a pivot, who ejects a player before the foul (cycle) completes. Always wrap in retry-on-40001.","full":"<p>SSI (Cahill et al., implemented as Postgres <code>SERIALIZABLE</code> since 9.1) layers true serializability on top of Snapshot Isolation <b>without read locks</b>. It tracks read-write (<b>rw-antidependency</b>) edges between concurrent transactions and aborts a transaction when it detects the <b>dangerous structure</b> — two consecutive rw-edges (T1→T2→T3) meeting at a <b>pivot</b> transaction T2 that has both an incoming and an outgoing rw-edge, the necessary condition for a non-serializable cycle.</p><p>The cost is occasional false-positive aborts (the dangerous structure is necessary but not sufficient), surfaced as <code>could not serialize access</code> (SQLSTATE 40001), plus tracking overhead (SIRead predicate locks), so applications <b>must retry</b> on serialization failures. SSI is how you get serializable correctness — catching write skew and phantoms — while keeping MVCC's non-blocking reads, rather than falling back to Strict 2PL with read locks.</p>","trap":"Assuming SERIALIZABLE means \"locks everything\" / blocks. SSI never blocks reads; it <em>aborts</em> at validation, so code without retry logic will surface spurious 40001 errors. Also: the dangerous structure is necessary but not sufficient, so SSI can abort false positives.","worked":"The doctors write-skew case under Postgres SERIALIZABLE: SSI sees txn A read-then-B-wrote and B read-then-A-wrote (two rw-edges forming a dangerous cycle), so it aborts one with 40001; the app retries and the invariant holds.","related":["snapshot-isolation","write-skew","mvcc","two-phase-locking","isolation-levels"]},
  "isolation-levels": {"term":"Isolation Levels & Engine Defaults","group":"DB-MVCC","eli5":"A dial from loose to strict that trades anomalies for concurrency — and every database ships with a different default setting.","memory":"Postgres → Read Committed; InnoDB → Repeatable Read; Oracle's \"Serializable\" is really SI. Same name, different guarantees.","full":"<p>The ANSI levels (Read Uncommitted → Read Committed → Repeatable Read → Serializable) are defined by which anomalies they forbid (dirty/non-repeatable/phantom reads), but real engines implement them via MVCC with different semantics. <b>Postgres defaults to Read Committed</b> (fresh snapshot per statement); its <code>REPEATABLE READ</code> is Snapshot Isolation; its <code>SERIALIZABLE</code> is SSI. <b>InnoDB defaults to Repeatable Read</b> and uses next-key (gap) locks so that locking reads do not see phantoms within RR.</p><p>Senior point: the <em>same level name means different things across engines</em>. Postgres RR rejects conflicting updates with serialization errors; InnoDB RR uses next-key locking on locking reads while plain SELECTs use a consistent snapshot. Oracle has no Read Uncommitted and implements \"Serializable\" as SI. Always pin the engine before reasoning about anomalies.</p>","trap":"Treating ANSI level names as portable guarantees. \"REPEATABLE READ\" in Postgres (snapshot, errors on conflict) ≠ in InnoDB (gap locks on locking reads) ≠ ANSI spec. Pin the engine first.","worked":"Identical app code: under Postgres RR a conflicting concurrent <code>UPDATE</code> raises <code>40001</code> (must retry); under InnoDB RR the same pattern resolves via next-key/row locking without that error — different outcomes from the \"same\" level.","related":["snapshot-isolation","ssi","write-skew","mvcc"]}
});

</script>

<script>
/* Distributed SQL / NewSQL (DB-NEWSQL) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-NEWSQL","front":"What problem does Distributed SQL / NewSQL solve?","back":"It delivers <strong>horizontal scale-out</strong> (like NoSQL) while keeping <strong>ACID transactions and a SQL interface</strong> (like a traditional RDBMS). The pitch is that you no longer have to choose between sharded-NoSQL scale and single-node relational guarantees: systems like <strong>Spanner</strong>, <strong>CockroachDB</strong>, <strong>TiDB</strong>, and <strong>YugabyteDB</strong> give you both, at the cost of higher per-transaction latency for anything spanning multiple shards."},
  {"sec":"DB-NEWSQL","front":"How do NewSQL systems physically partition data?","back":"They split a table's key space into contiguous <strong>key ranges</strong> (also called tablets/regions), sorted by primary key — <em>not</em> by hash like a typical NoSQL store. Each range covers an interval such as <code>[user_1000, user_2000)</code>. Ranges split automatically when they grow past a size threshold (e.g. ~512 MiB in CockroachDB) and merge when small, so range boundaries shift dynamically with the data."},
  {"sec":"DB-NEWSQL","front":"Why range-based sharding instead of hash-based?","back":"Range sharding preserves <strong>key ordering</strong>, which makes range scans and <code>ORDER BY</code> over the primary key efficient (contiguous reads). The downside is <strong>hotspots</strong>: monotonically increasing keys (timestamps, sequential IDs) all land in the last range, creating a write hotspot. Mitigations include hash-prefixed/sharded indexes and explicit pre-splitting. Hash sharding spreads load evenly but destroys ordered-scan locality."},
  {"sec":"DB-NEWSQL","front":"How is each key range replicated and kept consistent?","back":"Each range is its own <strong>consensus group</strong>: it has 3 or 5 replicas coordinated by <strong>Raft</strong> (CockroachDB, TiDB, YugabyteDB) or <strong>Paxos</strong> (Spanner). Writes go to the range's <strong>leaseholder/leader</strong>, which appends to the Raft log and commits once a quorum acknowledges. Consensus is <em>per range</em>, so a cluster runs thousands of independent Raft groups in parallel — that is what makes the architecture scale."},
  {"sec":"DB-NEWSQL","front":"How is a transaction that spans multiple key ranges committed?","back":"Via <strong>two-phase commit (2PC)</strong> layered on top of the per-range consensus groups. Each range's leaseholder acts as a 2PC participant, and a designated record (e.g. CockroachDB's <strong>transaction record</strong>, anchored on the first range written) acts as coordinator. The atomic flip of that single record's status to <code>COMMITTED</code> is what makes the whole multi-range transaction atomic; write intents/locks across the other ranges are then resolved asynchronously. Each phase is itself Raft-replicated, so the coordinator state is durable."},
  {"sec":"DB-NEWSQL","front":"Why is the 2PC coordinator not a single-point-of-failure here, unlike classic 2PC?","back":"In classic 2PC the coordinator is one process whose crash can block participants indefinitely (the blocking problem). In NewSQL, the coordinator state — the transaction record — is itself stored in a <strong>Raft-replicated range</strong>. If the node coordinating dies, another replica of that range serves the record and the transaction's fate is still durably recorded, so recovery can resolve in-doubt participants. Consensus underneath 2PC removes the coordinator availability hole (though participants can still block briefly while a new leaseholder is elected)."},
  {"sec":"DB-NEWSQL","front":"What is external consistency (strict serializability) and why do these systems target it?","back":"<strong>External consistency</strong> means that if transaction T1 commits before T2 begins in <em>real (wall-clock) time</em>, then every observer sees T1 before T2. It is <strong>strict serializability</strong> — serializability <em>plus</em> a real-time ordering guarantee (the transactional analog of linearizability, which is the single-object version). Spanner provides it globally. It matters because it lets developers reason as if there were one database; the hard part is assigning commit timestamps that respect real-time order <em>across machines with no shared clock</em>."},
  {"sec":"DB-NEWSQL","front":"How does Spanner's TrueTime enable external consistency?","back":"<strong>TrueTime</strong> exposes time as an <em>interval</em> <code>[earliest, latest]</code> with a bounded uncertainty ε (a few ms), backed by GPS + atomic clocks. To commit, Spanner picks commit timestamp <code>s = TT.now().latest</code> and then does <strong>commit-wait</strong>: it sleeps until <code>TT.now().earliest > s</code> before releasing locks/acknowledging. This guarantees that when the commit is visible, <code>s</code> is definitely in the real past everywhere, so timestamp order matches real-time order."},
  {"sec":"DB-NEWSQL","front":"What is the latency cost of TrueTime commit-wait, and what reduces it?","back":"Every read-write transaction pays a <strong>commit-wait of roughly 2ε</strong> (single-digit ms, often masked by overlapping it with the 2PC/replication round-trips) before releasing locks — added latency on the commit path. Google minimizes it by tightening ε with densely deployed GPS/atomic time masters so uncertainty stays in the low-single-digit-ms range. Shrinking ε directly shrinks commit-wait, which is why Spanner invests heavily in time infrastructure."},
  {"sec":"DB-NEWSQL","front":"How do CockroachDB / YugabyteDB get ordering without atomic clocks (HLC)?","back":"They use <strong>Hybrid Logical Clocks (HLC)</strong>: a physical NTP-synced wall-clock component plus a logical counter, giving timestamps that track real time but also capture causal (happens-before) order. Instead of commit-wait, CockroachDB enforces a <strong>maximum clock offset</strong> (default 500 ms): if a read sees a value with a timestamp inside its uncertainty window, it <strong>restarts the read at a higher timestamp</strong> (uncertainty restart) to avoid stale reads. A node that detects its clock has drifted beyond the bound relative to a majority of peers <strong>self-terminates</strong> to preserve safety."},
  {"sec":"DB-NEWSQL","front":"TrueTime commit-wait vs CockroachDB uncertainty restarts — what's the tradeoff?","back":"<strong>Spanner</strong> pays a deterministic <code>~2ε</code> wait on <em>every</em> commit but then reads are clean. <strong>CockroachDB</strong> pays nothing on the normal path but occasionally <strong>restarts reads</strong> that fall in the uncertainty window, and its safety depends on clocks staying within the configured max offset. Spanner moves uncertainty to dedicated hardware (small ε); CockroachDB tolerates commodity NTP clocks (larger window, default 500 ms) at the price of probabilistic restarts."},
  {"sec":"DB-NEWSQL","front":"What concurrency-control / isolation model do these systems use?","back":"Most combine <strong>MVCC</strong> (timestamped versions for non-blocking reads) with locking for writes, but defaults differ per system. <strong>CockroachDB</strong> defaults to <strong>SERIALIZABLE</strong> (and since v23.2 also offers <code>READ COMMITTED</code>). <strong>Spanner</strong> offers strict serializability for read-write transactions and lock-free <strong>snapshot reads</strong> at a chosen timestamp. <strong>TiDB</strong> defaults to Percolator-style <strong>snapshot isolation</strong> surfaced as <code>REPEATABLE READ</code> (no true SERIALIZABLE). Contrast single-node defaults: Postgres = Read Committed, InnoDB = Repeatable Read."},
  {"sec":"DB-NEWSQL","front":"What is a leaseholder (leader lease) and why does it matter for reads?","back":"Within a range's Raft group, one replica holds a time-bounded <strong>lease</strong> making it the single replica that may serve <strong>consistent reads without a Raft round-trip</strong> and that sequences writes. Reads hit the leaseholder and return immediately from its MVCC state. Co-locating the leaseholder near clients (and following the workload) is a key latency optimization; <strong>follower reads</strong> let stale-but-consistent reads be served from non-leaseholder replicas at an older (closed) timestamp to offload the leader."},
  {"sec":"DB-NEWSQL","front":"How does Vitess differ from Spanner/CockroachDB/TiDB?","back":"<strong>Vitess</strong> is not a from-scratch distributed storage engine — it's a <strong>sharding/proxy layer in front of many MySQL instances</strong>. It routes queries via a <code>VSchema</code>, picks shards by a <strong>vindex</strong> (sharding key), and scatter-gathers cross-shard queries. By default cross-shard transactions are <strong>best-effort</strong> (non-atomic); Vitess has an optional 2PC mode for atomic multi-shard commits, but it does not provide the seamless globally-strict ACID of Spanner-class systems. You keep MySQL/InnoDB semantics per shard — a different point on the curve."},
  {"sec":"DB-NEWSQL","front":"Why is cross-range (distributed) transaction latency the dominant cost of NewSQL?","back":"A multi-range transaction must run <strong>2PC across multiple consensus groups</strong>: each participant write needs a Raft quorum round-trip, plus the coordinator's commit-record flip needs another, plus (in Spanner) commit-wait. In a geo-distributed cluster these round-trips cross WAN links (tens of ms each), so a cross-region transaction can be an order of magnitude slower than a single-range one. The standard mitigation is <strong>data locality</strong>: schema/partitioning designed so most transactions touch a single range (interleaved/co-located tables, geo-partitioning by region)."}
);

Object.assign(GLOSSARY_DATA, {
  "newsql": {"term":"Distributed SQL / NewSQL","group":"DB-NEWSQL","aliases":["newsql","distributed sql","distributed sql system","distributed sql systems"],"eli5":"A database that scales out across many machines like NoSQL but still gives you SQL and real ACID transactions.","memory":"NewSQL = NoSQL's scale wearing an SQL suit and an ACID badge.","full":"<p><b>Distributed SQL</b> (a.k.a. NewSQL) refers to systems that provide <b>horizontal scale-out + ACID transactions + a SQL interface</b> simultaneously — historically you had to give up one. The canonical architecture: split data into ordered <b>key ranges</b>, replicate each range with a per-shard consensus group (Raft/Paxos), and run cross-range transactions via 2PC coordinated through those groups, with commit ordering derived from synchronized clocks.</p><p>Examples: <b>Google Spanner</b> (the progenitor), <b>CockroachDB</b>, <b>TiDB</b>, <b>YugabyteDB</b>. <b>Vitess</b> is adjacent — it shards MySQL behind a proxy but doesn't offer seamless distributed ACID by default. The whole value prop is 'don't choose between scale and transactions'; the bill comes due as cross-shard transaction latency.</p>","trap":"Saying NewSQL 'beats CAP.' It doesn't — under a partition these systems choose <b>consistency</b> (CP), sacrificing availability for the minority side. They make CP <em>practical and fast</em>, they don't escape the theorem.","related":["key-range","per-shard-consensus","distributed-2pc","external-consistency"]},
  "key-range": {"term":"Key Range (Range Sharding)","group":"DB-NEWSQL","aliases":["key range","key ranges","range sharding","range-based sharding","tablet","range split"],"eli5":"Data is cut into sorted slices of the primary-key space, and each slice is the unit of replication and movement.","memory":"Range = a sorted bookshelf split into shelves; hash = books thrown into random bins. Sorted shelves browse fast but the newest book always lands on the same shelf.","full":"<p>NewSQL systems partition a table by <b>contiguous key ranges</b> sorted on the primary key (e.g. <code>[a, m)</code>, <code>[m, z)</code>) rather than by hash. The range is the atomic unit of replication, lease assignment, and rebalancing. Ranges <b>auto-split</b> when they exceed a size threshold and <b>merge</b> when small, so boundaries adapt to data distribution and load.</p><p>The tradeoff is locality vs. balance. Ordering makes range scans and ordered indexes cheap, but <b>monotonic keys create a write hotspot</b> on the trailing range. Fixes: hash-sharded indexes, salted/prefixed keys, or explicit pre-splitting. Hash sharding (used by some NoSQL stores) avoids hotspots but can't do efficient ordered scans.</p>","trap":"Claiming range sharding inherently load-balances. <b>Sequential/timestamp keys hotspot one range</b> — you must hash-prefix or pre-split to spread writes.","worked":"A table keyed on <code>created_at</code> (always increasing) sends every insert to the last range's leaseholder → single-node write bottleneck. Re-key to <code>(hash_bucket, created_at)</code> with 16 buckets to fan writes across 16 ranges.","related":["newsql","per-shard-consensus","leaseholder","distributed-2pc"]},
  "per-shard-consensus": {"term":"Per-Shard Consensus (Raft/Paxos per range)","group":"DB-NEWSQL","aliases":["per-shard consensus","per-range consensus","consensus group","consensus groups","raft group","multi-raft"],"eli5":"Every key range runs its own little Raft/Paxos cluster, so thousands of consensus groups commit in parallel.","memory":"Not one parliament for the empire — one town council per district, all legislating at once.","full":"<p>Instead of one consensus group for the whole database, each <b>key range</b> is an independent <b>Raft</b> (CockroachDB, TiDB, YugabyteDB) or <b>Paxos</b> (Spanner) group with 3 or 5 replicas. Writes to a range go through its leader/leaseholder and commit on quorum ack. Because consensus is per-range, the cluster runs many groups concurrently ('Multi-Raft'), and throughput scales with the number of ranges rather than being bottlenecked on a single log.</p><p>This is the structural reason NewSQL scales writes where a single-Raft system would not: independent ranges = independent, parallel commit pipelines, with batching/coalescing of heartbeats across groups on a node to keep overhead manageable.</p>","trap":"Thinking the whole database shares one Raft log. It's <b>one Raft group per range</b>; a single global log would cap write throughput at one machine's commit rate.","related":["key-range","leaseholder","distributed-2pc","newsql"]},
  "distributed-2pc": {"term":"Distributed 2PC over Consensus Groups","group":"DB-NEWSQL","aliases":["2pc","two-phase commit","distributed 2pc","distributed transaction","distributed transactions","transaction record"],"eli5":"A transaction touching several ranges is committed atomically with two-phase commit, where each phase is itself Raft-replicated so the coordinator can't lose its memory.","memory":"2PC + Raft underneath = a notary whose ledger is backed up live, so the deal can't get stuck if the notary faints.","full":"<p>A transaction spanning multiple ranges uses <b>two-phase commit</b>: each participating range's leaseholder is a participant, and a single coordinator record (CockroachDB's <b>transaction record</b>, anchored on the first range written) holds the canonical status. The transaction becomes atomic at the instant that one record flips to <code>COMMITTED</code>; intents/locks written across ranges are then resolved asynchronously.</p><p>Crucially, <b>each step is Raft-replicated</b>. Classic 2PC's fatal flaw — a coordinator crash blocking participants forever — is removed because the coordinator's state survives on a replicated range, so an in-doubt transaction's fate is always durably recoverable. The cost is round-trips: prepare + commit, each a quorum hop, times the number of ranges involved.</p>","trap":"Saying NewSQL 'avoids 2PC' or that 2PC's blocking problem still fully applies. It <b>uses 2PC</b>, but <b>tames the blocking problem by replicating the coordinator state via consensus</b> — different from textbook 2PC (participants may still stall briefly during a leaseholder re-election).","related":["per-shard-consensus","external-consistency","isolation-mvcc","newsql"]},
  "external-consistency": {"term":"External Consistency (Strict Serializability)","group":"DB-NEWSQL","aliases":["external consistency","strict serializability","real-time ordering"],"eli5":"If one transaction finishes before another starts in wall-clock time, everyone sees them in that order — serializability plus real-time order.","memory":"Serializability says 'some order exists'; external consistency adds 'and it's the order your wristwatch saw.'","full":"<p><b>External consistency</b> (Spanner's term for <b>strict serializability</b>) = serializability + a real-time ordering guarantee: a transaction's commit timestamp must respect the real-time order of non-overlapping transactions. It's the strongest practical isolation/consistency level and lets clients treat a globally distributed database as if it were one machine. It is the multi-object transactional analog of <b>linearizability</b> (which is defined over single objects).</p><p>The engineering challenge is assigning commit timestamps that honor real time across nodes with no shared clock. Spanner solves it with <b>TrueTime</b> + commit-wait; CockroachDB approximates it with <b>HLC</b> + uncertainty restarts and a bounded max clock offset. This is why synchronized clocks are foundational to NewSQL, not a nice-to-have.</p>","trap":"Conflating serializability with external consistency. Plain serializability permits a schedule that <b>reorders transactions that didn't overlap in real time</b> (stale-read anomalies); external (strict) serializability forbids that.","related":["truetime","hybrid-logical-clock","distributed-2pc","isolation-mvcc"]},
  "isolation-mvcc": {"term":"MVCC & Isolation Defaults in NewSQL","group":"DB-NEWSQL","aliases":["mvcc","multi-version concurrency control","isolation level","serializable isolation","snapshot read"],"eli5":"Reads use timestamped versions (no blocking); writes take locks — and these systems often default to stronger isolation than single-node Postgres/MySQL.","memory":"Single-node DBs ship 'good enough' isolation; CockroachDB ships 'serializable by default' because distributed anomalies are nightmares to trace.","full":"<p>NewSQL stores keep <b>MVCC</b> versions tagged by commit timestamp, so reads at a timestamp are lock-free and consistent while writes use locks/intents. Isolation defaults differ from single-node norms: <b>CockroachDB</b> defaults to <code>SERIALIZABLE</code> (and since v23.2 also offers <code>READ COMMITTED</code>); <b>Spanner</b> gives strict serializability for read-write txns plus lock-free <b>snapshot reads</b> at a chosen timestamp; <b>TiDB</b> defaults to Percolator-style snapshot isolation (surfaced as <code>REPEATABLE READ</code>, with optional pessimistic locking — but no true <code>SERIALIZABLE</code>).</p><p>Contrast the single-node baselines interviewers expect: <b>Postgres defaults to Read Committed</b>, <b>InnoDB to Repeatable Read</b>. NewSQL often pushes the default <em>up</em> toward serializable because anomalies are far costlier to debug across a distributed cluster.</p>","trap":"Asserting all NewSQL is serializable-by-default. <b>CockroachDB</b> is; <b>TiDB</b>'s default is snapshot/repeatable-read, so it <b>permits write skew</b> unless you change isolation behavior — and snapshot isolation in general blocks lost-update and dirty reads but not write skew. Always qualify per system.","related":["external-consistency","distributed-2pc","hybrid-logical-clock","leaseholder"]},
  "leaseholder": {"term":"Leaseholder & Follower Reads","group":"DB-NEWSQL","aliases":["leaseholder","lease holder","leader lease","follower read","follower reads"],"eli5":"One replica per range holds a lease letting it serve consistent reads without asking the others; stale-but-consistent reads can be offloaded to followers.","memory":"Leaseholder = the branch manager who can sign off instantly; followers can only show you a slightly older ledger, but the one next door.","full":"<p>Within a range's Raft group, one replica holds a time-bounded <b>lease</b>, making it the sole replica that can serve <b>strongly-consistent reads without a consensus round-trip</b> (it knows it has the latest committed state) and that sequences writes into the Raft log. Placing the leaseholder near the dominant client region is a primary latency lever in geo-distributed deployments.</p><p><b>Follower reads</b> let non-leaseholder replicas serve reads at a slightly <em>older</em> timestamp (at or below the closed timestamp), trading freshness for the ability to read from a local replica — cutting cross-region latency and offloading the leaseholder for read-heavy workloads.</p>","trap":"Confusing the <b>Raft leader</b> with the <b>leaseholder</b>. They're usually co-located but are distinct roles — the lease governs read authority and write sequencing, and can be held/moved somewhat independently of raw Raft leadership.","related":["per-shard-consensus","key-range","isolation-mvcc","hybrid-logical-clock"]}
});

</script>
