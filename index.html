<script>
/* Time & Causality (DSS-CLOCK) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-CLOCK","front":"Why can't you trust wall-clock time to order events across machines?","back":"Each node has its own quartz oscillator that drifts (commonly tens to hundreds of ppm), and <code>NTP</code> corrections cause the clock to jump forward or even <em>step backward</em>. So comparing two machines' wall-clock timestamps can put a later event <em>before</em> an earlier one. There is no global synchronized 'now' you can sample atomically across nodes."},
  {"sec":"DSS-CLOCK","front":"Clock skew vs. clock drift — what's the difference?","back":"<strong>Skew</strong> is the instantaneous difference between two clocks at a moment in time (e.g., node A reads 10:00:02 while B reads 10:00:00 → 2s skew). <strong>Drift</strong> is the <em>rate</em> at which a clock gains or loses time because its oscillator isn't exactly nominal frequency (measured in ppm). Drift accumulates into skew between syncs."},
  {"sec":"DSS-CLOCK","front":"Why is using wall-clock time to measure elapsed durations a bug?","back":"Wall-clock (real-time) clocks are subject to <code>NTP</code> steps, leap seconds, and admins changing the time — they can jump backward, producing negative or absurd durations. Always measure elapsed time with a <strong>monotonic clock</strong> (e.g., <code>CLOCK_MONOTONIC</code>, <code>System.nanoTime()</code>, <code>time.monotonic()</code>), which only moves forward and ignores wall-clock adjustments."},
  {"sec":"DSS-CLOCK","front":"State the happens-before relation (→) and its three rules.","back":"<code>a → b</code> means <code>a</code> could have causally influenced <code>b</code>. It holds if: (1) <code>a</code> and <code>b</code> are in the same process and <code>a</code> comes first; (2) <code>a</code> is a message send and <code>b</code> is its receive; (3) transitivity — <code>a → b</code> and <code>b → c</code> imply <code>a → c</code>. It is a <em>partial</em> order: if neither <code>a → b</code> nor <code>b → a</code>, the events are <strong>concurrent</strong>."},
  {"sec":"DSS-CLOCK","front":"How do Lamport timestamps assign and compare clock values?","back":"Each process keeps a counter <code>C</code>. On every local event it does <code>C = C + 1</code>; it stamps and sends <code>C</code> with each message; on receive it sets <code>C = max(C, msg.C) + 1</code>. The guarantee: <code>a → b</code> implies <code>L(a) &lt; L(b)</code>. Ties are broken by process ID to get a consistent <strong>total order</strong>."},
  {"sec":"DSS-CLOCK","front":"What is the key limitation of Lamport timestamps?","back":"The implication is one-directional: <code>a → b ⟹ L(a) &lt; L(b)</code>, but <strong>not</strong> the converse. <code>L(a) &lt; L(b)</code> does <em>not</em> mean <code>a</code> happened-before <code>b</code> — they may be concurrent. So Lamport clocks give a consistent total order but <strong>cannot detect concurrency or causality</strong>."},
  {"sec":"DSS-CLOCK","front":"How does a vector clock work and what extra power does it give over Lamport?","back":"Each of <code>N</code> processes holds a vector <code>V[1..N]</code>. On a local event, process <code>i</code> does <code>V[i] += 1</code>; on receive it takes the element-wise <code>max</code> with the message's vector, then increments its own slot. Comparing vectors detects causality <em>exactly</em>: you can tell if <code>a → b</code>, <code>b → a</code>, or <code>a ∥ b</code> (concurrent) — which Lamport cannot."},
  {"sec":"DSS-CLOCK","front":"Give the comparison rules for two vector clocks Va and Vb.","back":"<ul><li><code>Va → Vb</code> (a before b): <code>Va[k] ≤ Vb[k]</code> for all <code>k</code> AND <code>Va ≠ Vb</code>.</li><li><code>Vb → Va</code>: the symmetric case.</li><li><strong>Concurrent</strong> (<code>a ∥ b</code>): neither dominates — some index where <code>Va &gt; Vb</code> and another where <code>Va &lt; Vb</code>.</li></ul>This concurrency case is exactly what surfaces conflicting writes (e.g., siblings in Dynamo)."},
  {"sec":"DSS-CLOCK","front":"What is the main cost of vector clocks, and how is it mitigated in practice?","back":"Size is <code>O(N)</code> in the number of participating actors, and it grows as nodes/clients join — entries also need pruning. Mitigations: track only writer nodes (not clients), use <strong>dotted version vectors</strong>, periodically prune stale entries, or fall back to <strong>hybrid logical clocks</strong> when you only need bounded-size causal ordering rather than full conflict detection."},
  {"sec":"DSS-CLOCK","front":"What problem do Hybrid Logical Clocks (HLC) solve that Lamport and vector clocks don't?","back":"Lamport/vector timestamps are pure logical counters with <em>no relation to real time</em>, so you can't query 'events around 10:05'. HLC combines a physical-time component with a logical counter: timestamps stay <strong>close to wall-clock time</strong> (within clock skew bounds) <em>and</em> respect happens-before, in fixed <code>O(1)</code> space. Used in CockroachDB and YugabyteDB."},
  {"sec":"DSS-CLOCK","front":"How does an HLC update on a local event and on a message receive?","back":"An HLC value is <code>(l, c)</code>: <code>l</code> ≈ physical time, <code>c</code> = logical counter. On a local/send event: set <code>l = max(l_prev, pt_now)</code>; if <code>l == l_prev</code> (physical time didn't advance the high bits) increment <code>c</code>, else reset <code>c = 0</code>. On receive: <code>l = max(l_prev, l_msg, pt_now)</code>, and <code>c</code> is derived from whichever term won the max (incremented when <code>l</code> ties a prior value). This keeps <code>l</code> bounded by physical time + max skew while preserving causality."},
  {"sec":"DSS-CLOCK","front":"What does Spanner's TrueTime API return, and why is that interval the key idea?","back":"<code>TT.now()</code> returns an <strong>interval</strong> <code>[earliest, latest]</code> that is <em>guaranteed</em> to contain the true absolute time, with a bounded uncertainty <code>ε</code> (commonly single-digit milliseconds). Backed by GPS receivers and atomic clocks per datacenter. The breakthrough is <em>exposing</em> clock uncertainty as an explicit bound rather than pretending the clock is exact."},
  {"sec":"DSS-CLOCK","front":"What is commit-wait in Spanner and what guarantee does it buy?","back":"After picking a commit timestamp <code>s</code> (typically <code>s = TT.now().latest</code>), a transaction <strong>waits until <code>TT.now().earliest &gt; s</code></strong> before releasing locks/acking — i.e., it sleeps out the uncertainty window <code>ε</code> (commonly a few ms) so <code>s</code> is guaranteed to be in the past everywhere. This ensures any transaction that <em>starts later in real time</em> gets a strictly greater timestamp, delivering <strong>external consistency</strong> for globally distributed transactions. Tighter <code>ε</code> = shorter waits = higher throughput."},
  {"sec":"DSS-CLOCK","front":"External consistency — what does Spanner mean by it, and how does it relate to linearizability?","back":"<strong>External consistency</strong> is Spanner's name for <strong>strict serializability</strong>: if transaction <code>T1</code> commits before <code>T2</code> begins <em>in real (wall-clock) time</em>, then <code>T1</code>'s timestamp &lt; <code>T2</code>'s. It is the multi-object generalization of <strong>linearizability</strong> (the single-object real-time guarantee), combined with serializability. TrueTime + commit-wait is what lets Spanner provide this across continents without a single global clock."},
  {"sec":"DSS-CLOCK","front":"In Lamport/vector clocks, why is the receive rule max(...)+1 rather than just +1?","back":"The <code>max</code> ensures the receiver's clock jumps ahead of the sender's stamp so the receive event gets a value strictly greater than the send — preserving <code>send → receive ⟹ L(send) &lt; L(receive)</code>. A plain <code>+1</code> on a lagging receiver could produce a receive timestamp ≤ the send timestamp, violating the happens-before guarantee."},
  {"sec":"DSS-CLOCK","front":"Why does NTP make a poor foundation for correctness-critical ordering?","back":"<code>NTP</code> sync error is typically milliseconds on a LAN but can be tens of milliseconds or worse over WAN, and it corrects by <em>stepping</em> (jumping) or <em>slewing</em> the clock — so timestamps are neither monotonic nor tightly bounded. Spanner's contribution was replacing 'trust NTP is roughly right' with TrueTime's <em>explicit, hardware-backed uncertainty bound</em> you can reason about."}
);

Object.assign(GLOSSARY_DATA, {
  "lamport-timestamp": {"term":"Lamport Timestamp","group":"DSS-CLOCK","aliases":["lamport timestamp","lamport timestamps","lamport clock","lamport clocks","logical clock","scalar clock"],"eli5":"A single counter per process that guarantees causes get smaller numbers than effects.","memory":"Lamport = 'Less-than is a One-way street' — causality ⟹ smaller, but smaller ⇏ causality.","full":"<p>A scalar logical clock. Increment on each event; piggyback the value on messages; on receive set <code>C = max(C, received) + 1</code>. The invariant is <code>a → b ⟹ L(a) &lt; L(b)</code>. Breaking ties with process ID yields a deterministic <b>total order</b> consistent with causality — useful for things like totally-ordered multicast and Lamport's mutual-exclusion algorithm.</p><p>The catch is the missing converse: <code>L(a) &lt; L(b)</code> tells you nothing about whether <code>a</code> caused <code>b</code> or they were concurrent. So Lamport clocks are great for <i>imposing</i> an order but useless for <i>detecting</i> concurrency or conflicts.</p>","trap":"Claiming that if <code>L(a) &lt; L(b)</code> then a happened-before b. That's the false converse. A smaller Lamport timestamp is consistent with a being concurrent with b; you cannot conclude causality from the ordering alone.","worked":"P1: send at C=1 → stamps 1. P2 idle at C=0, receives → C=max(0,1)+1=2. Now compare an unrelated P3 event at C=1 with P2's receive at C=2: 1 < 2, but they're concurrent — the ordering is arbitrary, not causal.","related":["happens-before","vector-clock","hybrid-logical-clock"]},
  "vector-clock": {"term":"Vector Clock","group":"DSS-CLOCK","aliases":["vector clock","vector clocks","version vector","version vectors","dotted version vector"],"eli5":"Each node carries a per-node counter array, so you can tell exactly who-knew-what and spot true conflicts.","memory":"Vector = 'View of everyone' — each slot is 'how many of node k's events I've seen'.","full":"<p>An array <code>V[1..N]</code>, one slot per process. Increment your own slot on a local event; element-wise <code>max</code> then increment on receive. Comparing two vectors gives the <b>exact</b> causal relationship: dominance one way = happens-before, dominance the other way = the reverse, and <i>incomparable</i> = concurrent. This is the only mechanism here that <b>detects concurrent updates</b>, which is why Dynamo-style stores use version vectors to surface conflicting writes (siblings).</p><p>Cost: <code>O(N)</code> space and metadata that grows with the number of writers, requiring pruning or schemes like <b>dotted version vectors</b> to stay bounded.</p>","trap":"Assuming vector clock size is O(number of replicas) and stays small. It actually grows with every distinct <i>actor</i> that writes (including clients if you're not careful), and stale entries accumulate — unbounded growth is the classic production failure, mitigated by tracking only server nodes and using dotted version vectors.","worked":"Va=[2,1,0], Vb=[2,3,0]: every Va[k] ≤ Vb[k] and Va ≠ Vb → a → b. But Va=[2,1,0], Vb=[1,3,0]: Va beats Vb at index 0, loses at index 1 → incomparable → concurrent → conflict to resolve.","related":["lamport-timestamp","happens-before","concurrent-events","hybrid-logical-clock"]},
  "concurrent-events": {"term":"Concurrent Events","group":"DSS-CLOCK","aliases":["concurrent events","concurrency","concurrent","incomparable","a ∥ b"],"eli5":"Two events where no information could have flowed from one to the other, so neither caused the other.","memory":"Concurrent ≠ simultaneous — it means causally disconnected, not same instant.","full":"<p>Events <code>a</code> and <code>b</code> are concurrent (<code>a ∥ b</code>) when neither <code>a → b</code> nor <code>b → a</code>. In a vector clock this shows up as <b>incomparable</b> vectors (each dominates the other at some index). Concurrency is the whole reason distributed time is a partial order, and detecting it is what lets a system flag <b>write-write conflicts</b> instead of silently losing data.</p><p>Note concurrency is a logical property, not a timing one: two events can be concurrent even if one occurred minutes after the other in real time, as long as no message linked them.</p>","trap":"Conflating 'concurrent' with 'happened at the same wall-clock instant'. Concurrency means causally independent — events seconds or minutes apart in real time are still concurrent if no causal chain (process order or message) connects them.","related":["happens-before","vector-clock","lamport-timestamp"]},
  "monotonic-clock": {"term":"Monotonic Clock","group":"DSS-CLOCK","aliases":["monotonic clock","monotonic clocks","CLOCK_MONOTONIC","nanoTime","elapsed-time clock"],"eli5":"A stopwatch that only ever counts up and ignores anyone resetting the wall clock.","memory":"Mono-tonic = 'one direction only' — up, never back, like an odometer.","full":"<p>A clock that is guaranteed never to go backward and is unaffected by <code>NTP</code> steps, leap seconds, or manual time changes (<code>CLOCK_MONOTONIC</code>, <code>System.nanoTime()</code>, <code>time.monotonic()</code>). Use it for <b>measuring elapsed time</b> — timeouts, latency, rate limiting, leases — anywhere a backward jump would cause a bug.</p><p>Its values are <i>meaningless across machines</i> and often even across reboots (typically counting from an arbitrary epoch like boot time), so never serialize or compare a monotonic reading between nodes. Wall-clock (real-time) clocks are for 'what time is it'; monotonic clocks are for 'how long has passed'.</p>","trap":"Using wall-clock time (<code>System.currentTimeMillis</code>, <code>time.time()</code>) to measure a duration or enforce a timeout. An NTP correction or leap second can move it backward and produce a negative interval — Cloudflare's Nov 2017 outage came from exactly this class of bug (a time going backward yielded a negative value where the code assumed it couldn't). Use a monotonic clock for elapsed time.","related":["clock-skew","truetime"]},
  "clock-skew": {"term":"Clock Skew & Drift","group":"DSS-CLOCK","aliases":["clock skew","clock drift","skew","drift","NTP","ntp jump","clock uncertainty"],"eli5":"Every machine's clock is a little wrong and gets wronger over time until something resyncs it with a jump.","memory":"Skew = the gap right now; Drift = how fast the gap grows; NTP = the periodic violent correction.","full":"<p><b>Skew</b> is the instantaneous offset between two clocks; <b>drift</b> is the rate they diverge because no quartz oscillator runs at exactly nominal frequency (typically tens of ppm, i.e., seconds per day uncorrected). <code>NTP</code> periodically resyncs, but it corrects by <b>stepping</b> (an instantaneous jump, possibly backward) or <b>slewing</b> (temporarily speeding/slowing the clock).</p><p>Consequence: cross-node wall-clock comparisons can be off by milliseconds to seconds and aren't monotonic. This is the root reason 'last write wins by timestamp' silently loses data, and why correctness-critical systems use logical clocks, HLCs, or bounded-uncertainty clocks (TrueTime) instead of raw timestamps.</p>","trap":"Believing NTP makes clocks 'accurate enough to order events'. NTP error is commonly a few ms on LAN but tens of ms+ on WAN, and corrections are non-monotonic jumps — never assume two nodes' timestamps are comparable for ordering or for last-write-wins conflict resolution.","related":["monotonic-clock","truetime","lamport-timestamp"]},
  "hybrid-logical-clock": {"term":"Hybrid Logical Clock (HLC)","group":"DSS-CLOCK","aliases":["hybrid logical clock","hybrid logical clocks","HLC","hlc"],"eli5":"A logical clock that also stays glued to wall-clock time, so timestamps both respect causality and look like real time.","memory":"HLC = Lamport counter riding shotgun next to a physical-time driver — logical order + real-ish time.","full":"<p>HLC stores <code>(l, c)</code>: <code>l</code> tracks physical time (advanced via <code>max(l_prev, physical_now, l_msg)</code>) and <code>c</code> is a logical tiebreaker counter that increments only when <code>l</code> doesn't move forward. It preserves happens-before like a Lamport clock, stays within bounded skew of real time, and is fixed <b>O(1)</b> size — the sweet spot between Lamport (no real-time meaning) and vector clocks (O(N) and full conflict detection).</p><p>Used by CockroachDB and YugabyteDB to timestamp transactions: you get causally-consistent ordering plus the ability to do meaningful time-bounded queries and follower reads, without per-node GPS hardware.</p>","trap":"Thinking HLC detects concurrency/conflicts like a vector clock. It doesn't — it's a scalar-style ordering clock (with a tiebreak counter), giving total ordering close to physical time, not the incomparability that flags concurrent writes. Use vector/version vectors for conflict detection.","related":["lamport-timestamp","vector-clock","truetime","clock-skew"]},
  "truetime": {"term":"TrueTime & Commit-Wait","group":"DSS-CLOCK","aliases":["truetime","true time","TrueTime","commit-wait","commit wait","external consistency","Spanner"],"eli5":"Spanner's clock returns a time range it's sure contains 'now', then transactions wait out that uncertainty to stay globally ordered.","memory":"TrueTime hands you a window, not a point; commit-wait sleeps until the window has fully passed your timestamp.","full":"<p>Google Spanner's <b>TrueTime</b> exposes <code>TT.now()</code> as an interval <code>[earliest, latest]</code> guaranteed to bracket true absolute time, with uncertainty <code>ε</code> (commonly a few ms), backed by per-datacenter GPS + atomic clocks. The insight is making clock uncertainty <i>explicit and bounded</i> instead of pretending the clock is a point.</p><p><b>Commit-wait</b>: a transaction picks commit timestamp <code>s</code> (typically <code>TT.now().latest</code>), then sleeps until <code>TT.now().earliest &gt; s</code> before releasing locks — guaranteeing <code>s</code> is in the past everywhere. This means any later-starting transaction (in real time) gets a larger timestamp, yielding <b>external consistency</b> (strict serializability) across the globe. Throughput is inversely tied to <code>ε</code>: tighter clocks → shorter waits.</p>","trap":"Saying Spanner has a 'perfectly synchronized global clock'. It doesn't — it has clocks with a <i>bounded uncertainty</i> ε, and it deliberately <b>waits out</b> that uncertainty (commit-wait) to get correctness. The waiting, not perfect sync, is what delivers external consistency.","worked":"Pick s = TT.now().latest at commit. Suppose ε ≈ 4 ms, so commit-wait sleeps ~ε until earliest > s. T2 starting after T1's ack samples a now whose earliest already exceeds s, so T2's timestamp > T1's → real-time order preserved globally.","related":["clock-skew","monotonic-clock","hybrid-logical-clock"]}
});

</script>

<!-- content: 11-dss-consensus.js -->
<script>
/* Consensus & Replicated Logs (DSS-CONSENSUS) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-CONSENSUS","front":"Why is consensus needed in a distributed system?","back":"To get a set of processes to <strong>agree on a single value or a single ordering of events</strong> despite crashes, message loss, and delays. In data platforms it underpins choosing one leader, committing one log entry at each index, and ensuring every replica applies the same sequence of operations."},
  {"sec":"DSS-CONSENSUS","front":"What is the replicated state machine (RSM) model?","back":"Every replica runs the same deterministic state machine and applies the <em>same commands in the same order</em> from a replicated log. If the logs agree, the states agree. Consensus's only job is to make all replicas agree on the contents and order of that log; the state machine does the rest deterministically."},
  {"sec":"DSS-CONSENSUS","front":"In Raft, what is a <code>term</code> and what is it for?","back":"A term is a monotonically increasing integer that acts as a <strong>logical clock</strong>. Each term begins with an election and has at most one leader. Terms let nodes detect stale information: any message carrying a term lower than the receiver's current term is rejected, and seeing a higher term forces a node to step down to follower."},
  {"sec":"DSS-CONSENSUS","front":"How does Raft elect a leader?","back":"A follower that hears no heartbeat within its election timeout becomes a <strong>candidate</strong>, increments its term, votes for itself, and sends <code>RequestVote</code> RPCs. If it collects votes from a <strong>majority</strong> of the cluster it becomes leader; if it sees a higher term or another valid leader it reverts to follower; if no one wins (split vote) it times out and tries again."},
  {"sec":"DSS-CONSENSUS","front":"Why does Raft use randomized election timeouts?","back":"Fixed timeouts make followers time out simultaneously, split the vote, and repeat — livelock. Randomizing each node's timeout (the Raft paper uses ~150–300ms) staggers candidacies so one node usually starts first, wins a majority, and sends heartbeats before others wake up. It's the key trick that makes leader election terminate quickly in practice."},
  {"sec":"DSS-CONSENSUS","front":"How does log replication work via <code>AppendEntries</code>?","back":"The leader appends a client command to its log, then sends <code>AppendEntries</code> RPCs (carrying the new entries plus the index/term of the entry immediately preceding them — <code>prevLogIndex</code>/<code>prevLogTerm</code>) to all followers. A follower appends only if its preceding entry matches; the leader decrements and retries on mismatch. Heartbeats are just empty <code>AppendEntries</code> that also keep followers from starting elections."},
  {"sec":"DSS-CONSENSUS","front":"When is a Raft log entry <em>committed</em>?","back":"When the leader has replicated it to a <strong>majority</strong> of the cluster <em>and the entry is from the leader's own current term</em>, it is committed and may be applied to the state machine. The leader advances its <code>commitIndex</code> and piggybacks it on later <code>AppendEntries</code> so followers apply the same entries. Committed entries are durable: they survive any future leader change. (Prior-term entries on a majority are NOT yet safe — see the Figure-8 rule.)"},
  {"sec":"DSS-CONSENSUS","front":"What is the Raft <em>election restriction</em> (a key safety rule)?","back":"A voter rejects a candidate whose log is <strong>less up-to-date</strong> than its own (compared by last entry's term, then index). This guarantees that only a node containing all committed entries can win a majority, so a new leader never lacks a committed entry — Raft never overwrites or loses committed data."},
  {"sec":"DSS-CONSENSUS","front":"What is the Log Matching Property in Raft?","back":"If two logs contain an entry with the <strong>same index and same term</strong>, then (a) those entries are identical and (b) all preceding entries are identical. <code>AppendEntries</code>'s consistency check (matching the previous index/term before appending) inductively maintains this, so once logs agree up to a point they agree on the entire prefix."},
  {"sec":"DSS-CONSENSUS","front":"Why must a Raft/Paxos cluster typically have an <em>odd</em> number of nodes?","back":"Availability needs a majority quorum of ⌊N/2⌋+1. Going from 3→4 or 5→6 raises the quorum (2→3, 3→4) while the number of failures tolerated stays the same (1, then 2), so the even node just adds cost and a higher chance of failing to reach quorum. Odd sizes maximize fault tolerance per node."},
  {"sec":"DSS-CONSENSUS","front":"How does a quorum (majority) prevent two leaders from committing conflicting entries?","back":"Any two majorities of the same cluster must <strong>overlap in at least one node</strong>. That shared node won't vote for two leaders in the same term, and won't acknowledge conflicting commits — so two values can never both achieve a majority for the same slot. Overlapping quorums are the mathematical core of consensus safety."},
  {"sec":"DSS-CONSENSUS","front":"What is split-brain, and how does Raft's term mechanism fence a stale leader?","back":"Split-brain is when a partition leaves an old leader still thinking it's in charge. In Raft the majority side elects a new leader with a <strong>higher term</strong>. The stale leader can't commit (it can't reach a majority), and the instant it receives any message with the higher term it <strong>steps down</strong>. Higher term = newer authority, which fences the zombie."},
  {"sec":"DSS-CONSENSUS","front":"Why can a stale Raft leader on the minority side of a partition not cause data loss?","back":"It can still <em>append</em> to its own log, but commit requires a majority it no longer has, so those entries never commit. When the partition heals, the higher-term leader's <code>AppendEntries</code> consistency check forces the stale node to <strong>truncate</strong> its uncommitted tail and adopt the leader's log. Only uncommitted (never-acknowledged) data is discarded."},
  {"sec":"DSS-CONSENSUS","front":"Raft vs Paxos — what's the practical difference?","back":"Both solve consensus with the same safety guarantees and majority quorums. <strong>Multi-Paxos</strong> is notoriously hard to specify and implement correctly; <strong>Raft</strong> was explicitly designed for <em>understandability</em> by decomposing the problem into leader election, log replication, and safety, and by enforcing a strong-leader, append-only, contiguous log. Same power, far easier to build right — which is why many modern systems use Raft."},
  {"sec":"DSS-CONSENSUS","front":"In Raft, can a leader commit an entry from a <em>previous</em> term just because it's on a majority?","back":"No — this is a subtle safety rule (the Raft \"Figure 8\" case). A leader may not consider a prior-term entry committed merely by counting replicas, because such an entry can still be overwritten by a later leader. It commits prior-term entries <strong>indirectly</strong>, only once it has replicated an entry from its <em>own current term</em> to a majority (which carries the older entries with it)."}
);

Object.assign(GLOSSARY_DATA, {
  "replicated-state-machine": {"term":"Replicated State Machine","group":"DSS-CONSENSUS","aliases":["replicated state machine","RSM","state machine replication","SMR"],"eli5":"If every server runs the same program and replays the same list of commands in the same order, they all end up in the same state.","memory":"Same log in → same state out. Consensus only has to agree on the <i>tape</i>; the <i>machine</i> is deterministic.","full":"<p>The RSM model reduces fault-tolerant services to one problem: agreeing on an ordered <b>log of commands</b>. Each replica feeds that log into an identical <i>deterministic</i> state machine, so identical input order guarantees identical output state. A database, a config store, or a queue offset tracker all fit this shape.</p><p>This is why consensus algorithms (Raft, Paxos) are described purely in terms of agreeing on log entries — the application layer is intentionally out of scope. Determinism is a hard requirement: any nondeterminism (wall-clock reads, random numbers, map iteration order, unsynchronized I/O) breaks replica convergence even with a perfectly agreed log.</p>","trap":"Thinking consensus replicates <i>state</i>. It replicates the <i>ordered command log</i>; the state machine reproduces state locally. If your apply step is nondeterministic, replicas diverge despite an identical log.","worked":"Three Raft nodes apply <code>SET x=1</code>, <code>SET x=2</code>, <code>INCR x</code> in that committed order and all reach <code>x=3</code> — even if a node received them in a different network order, because it applies strictly by log index.","related":["consensus","raft","commit-majority"]},
  "consensus": {"term":"Consensus","group":"DSS-CONSENSUS","aliases":["consensus","distributed consensus","agreement"],"eli5":"Getting a group of unreliable servers to all agree on exactly one value, and never change their minds.","memory":"Consensus = <b>SAT</b>: Safety Always, Termination eventually. FLP says you can't have both unconditionally.","full":"<p>Consensus requires three properties: <b>agreement</b> (no two correct nodes decide different values), <b>validity/integrity</b> (a decided value was actually proposed, and is decided at most once), and <b>termination</b> (correct nodes eventually decide). Real systems target the non-Byzantine, crash-fault model over networks that are asynchronous but mostly behave.</p><p>The FLP result proves no deterministic protocol can <i>guarantee</i> termination in a fully asynchronous network with even one crash, so practical algorithms (Raft, Paxos) preserve <i>safety</i> always and achieve <i>liveness</i> only under partial synchrony (using timeouts/randomization to make progress once the network behaves). Every decision costs at least one majority round-trip.</p>","trap":"Claiming a protocol gives both safety and liveness unconditionally. FLP forbids it — Raft/Paxos keep safety always but only make progress under partial synchrony.","related":["replicated-state-machine","quorum","raft"]},
  "raft": {"term":"Raft","group":"DSS-CONSENSUS","aliases":["Raft","raft consensus","strong leader"],"eli5":"A consensus algorithm built to be understandable: one elected leader owns an append-only log and copies it to everyone.","memory":"Raft = <b>L-L-S</b>: Leader election, Log replication, Safety. One leader, one append-only log, terms as the clock.","full":"<p>Raft decomposes consensus into three sub-problems: <b>leader election</b>, <b>log replication</b>, and <b>safety</b>. At any moment a node is <code>follower</code>, <code>candidate</code>, or <code>leader</code>. A single strong leader handles all client writes and is the only node that appends to the log; followers passively replicate, which makes the log <i>contiguous and append-only</i> and rules out the gaps/holes that make Multi-Paxos hard.</p><p>Time is divided into <b>terms</b>, each with at most one leader; the term acts as a logical clock that fences stale nodes. Safety rests on the election restriction (only an up-to-date log can win) and the Log Matching Property. Raft's deliberate design goal was <i>understandability</i>, trading the theoretical generality of Paxos for an algorithm engineers can implement correctly.</p>","trap":"Saying Raft is 'faster' or 'more available' than Paxos. It isn't — same quorum, same round-trips, same fault tolerance. Its win is <i>understandability/implementability</i>, not performance.","worked":"A 5-node cluster: node A wins term 7, becomes leader, and is the sole writer. Followers B–E only accept <code>AppendEntries</code> from A and never write to the log themselves.","related":["leader-election","term","election-restriction"]},
  "leader-election": {"term":"Leader Election","group":"DSS-CONSENSUS","aliases":["leader election","RequestVote","election timeout","randomized timeout"],"eli5":"When the boss goes silent, servers race on randomized timers to nominate themselves and whoever gets a majority of votes becomes the new boss.","memory":"Randomized timers = staggered start gun. One runner usually leaves the blocks first and wins before the others move.","full":"<p>Followers expect periodic heartbeats (empty <code>AppendEntries</code>). On timeout, a follower becomes a <code>candidate</code>, increments its term, votes for itself, and broadcasts <code>RequestVote</code>. Each node grants at most one vote per term (first-come, and only to a sufficiently up-to-date log), so at most one candidate can reach a majority — guaranteeing a single leader per term.</p><p>The crucial engineering detail is the <b>randomized election timeout</b> (the Raft paper uses ~150–300ms): without it, synchronized timeouts cause repeated split votes (livelock). Randomization makes one candidate almost always fire first, win, and heartbeat before others wake. Split votes still happen occasionally and simply resolve on the next randomized round.</p>","trap":"Forgetting WHY timeouts are randomized. The interview point isn't 'to detect failure' — it's to <i>break the symmetry</i> that causes split-vote livelock.","worked":"Five nodes, all timeout-fixed at 200ms → all become candidates at once → vote splits 1/1/1/1/1 → repeat forever. Randomize to 150–300ms and node C fires at 161ms, grabs 3 votes, and heartbeats the rest down.","related":["raft","term","quorum","election-restriction"]},
  "term": {"term":"Term (Logical Clock)","group":"DSS-CONSENSUS","aliases":["term","terms","logical clock","epoch","higher term"],"eli5":"A monotonically increasing counter that stamps 'how recent' a leader is, so old leaders get ignored.","memory":"Higher term wins, always. Term is the 'who's newer?' counter — the bouncer that throws out stale leaders.","full":"<p>A term is an integer that increments on every election attempt. Every RPC carries the sender's term. The rule is mechanical: if a node sees a term <i>lower</i> than its own, it rejects the message; if it sees a term <i>higher</i>, it updates its term and immediately reverts to <code>follower</code>. This single comparison is how Raft fences stale leaders and detects obsolete elections.</p><p>Terms make the system a logical clock rather than relying on wall-clock time. They are the mechanism that resolves split-brain: the partition that can elect a new leader produces a higher term, and that higher term automatically demotes the old leader the moment they reconnect. Equivalent concepts appear as 'epoch' in ZooKeeper/Kafka and 'ballot/proposal number' in Paxos.</p>","trap":"Confusing term with log index. Term = which election/leadership era; index = position in the log. Up-to-dateness compares <i>last-term first</i>, then index.","related":["raft","leader-election"]},
  "commit-majority": {"term":"Commit (Majority Replication)","group":"DSS-CONSENSUS","aliases":["commit","committed","commitIndex","commit rule"],"eli5":"A log entry counts as 'done and durable' only once a majority of servers have stored it — and, for safety, only once a current-term entry sits on top.","memory":"Committed = on a majority = unkillable. But you can only 'seal' old-term entries by committing a NEW-term entry on top.","full":"<p>In Raft the leader appends an entry locally, replicates it via <code>AppendEntries</code>, and marks it <b>committed</b> once it lives on a majority. Committed entries are then applied to the state machine and are guaranteed to survive any leader change (because any future leader must have an up-to-date log per the election restriction). The leader advances <code>commitIndex</code> and propagates it so followers apply the same prefix.</p><p>A critical safety subtlety: a leader must NOT mark an entry from a <i>previous</i> term committed just because it's now on a majority — such entries can still be overwritten. It commits prior-term entries only <i>indirectly</i>, by committing a fresh entry of its own current term (which drags the older ones along). This is the famous 'Figure 8' case in the Raft paper.</p>","trap":"Claiming any entry on a majority is committed. Prior-term entries on a majority are NOT safe until the leader also commits a current-term entry — the Raft Figure-8 gotcha.","worked":"Leader (term 4) sees an old term-2 entry on 3 of 5 nodes but does NOT mark it committed; only after its own term-4 entry reaches a majority does the term-2 entry become committed indirectly.","related":["raft","quorum","election-restriction"]},
  "election-restriction": {"term":"Election Restriction & Log Matching","group":"DSS-CONSENSUS","aliases":["election restriction","log matching","Log Matching Property","up-to-date log","log-matching"],"eli5":"You can only become leader if your log is at least as current as the majority's, which guarantees no committed data is ever lost.","memory":"'Only the most up-to-date wins.' Vote restriction + log-matching = committed entries can never be lost or overwritten.","full":"<p><b>Election restriction</b>: a node grants its vote only if the candidate's log is at least as up-to-date as its own, compared by (last entry's term, then index). Because a committed entry sits on a majority, and any winning candidate also needs a majority, the two majorities overlap — so the winner is guaranteed to already hold every committed entry. New leaders therefore never need to fetch or recreate committed data; the log only ever grows forward.</p><p><b>Log Matching Property</b>: if two logs share an entry with the same index and term, those entries and all preceding ones are identical. The <code>AppendEntries</code> consistency check (a follower appends only if its previous index/term matches the leader's) maintains this inductively, letting the leader force-overwrite a follower's divergent <i>uncommitted</i> tail safely.</p>","trap":"Comparing logs by length/index alone. Up-to-dateness is <i>last-term first</i>, then index — a longer log with an older last term is LESS up-to-date and is rejected.","worked":"Candidate X has 10 entries, last term 3; voter Y has 8 entries, last term 4. Y refuses X's vote because Y's last term (4) > X's (3) — Y's log is more up-to-date despite being shorter.","related":["raft","commit-majority","term","quorum"]},
  "no-consensus-needed": {"term":"When You Do NOT Need Consensus","group":"DSS-CONSENSUS","aliases":["no consensus","avoid consensus","crdt","commutative operations","leaderless replication"],"eli5":"If you don't need everyone to agree on one global order, skip the expensive majority round-trips.","memory":"No shared order needed → no consensus needed. CRDTs commute, Dynamo reconciles, partitions don't talk.","full":"<p>Consensus buys a single agreed order at the cost of a majority round-trip per decision. You can avoid it whenever a total order isn't required. <b>CRDTs / commutative or idempotent operations</b> merge to the same result regardless of order, so replicas converge without coordination. <b>Leaderless quorum-replicated</b> stores (Dynamo-style, with overlapping R+W quorums) accept concurrent writes and reconcile later, trading linearizability for availability and eventual consistency.</p><p>Other escape hatches: <b>embarrassingly parallel or cleanly partitioned</b> workloads with no cross-partition invariant, and read-mostly data behind a single owner. Reach for consensus only when you genuinely need <i>linearizable</i> agreement on order — a unique leader, a single committed value per slot, or a globally serialized log.</p>","trap":"Reaching for Raft/Paxos when commutativity or partitioning would do. Consensus is the most expensive coordination primitive — use it only for linearizable order.","worked":"A like-counter modeled as a grow-only CRDT counter needs no consensus: each replica increments locally and the merge (max/sum per replica) is order-independent — versus a bank ledger requiring a serialized, agreed transaction order.","related":["consensus","quorum","raft"]}
});

</script>
