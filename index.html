<script>
/* Foundations · Core Data Structures (FND-DS) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-DS","front":"Why is dynamic-array append <code>O(1)</code> amortized but not worst-case?","back":"Most appends write into spare capacity in <code>O(1)</code>. When full, the array doubles: it allocates a new buffer and copies all <em>n</em> elements (one <code>O(n)</code> step). Geometric growth makes the total copy cost across <em>n</em> appends sum to <code>O(n)</code>, so <strong>amortized</strong> cost is <code>O(1)</code> per append — but any single append can still be <code>O(n)</code>."},
  {"sec":"FND-DS","front":"Why must dynamic arrays grow by a multiplicative factor, not a fixed increment?","back":"Growing by a constant <em>k</em> elements each resize forces a copy every <em>k</em> appends, giving <code>O(n)</code> resizes and <strong><code>O(n²)</code> total</strong> insert cost. A multiplicative factor (e.g. ×1.5 or ×2) gives <code>O(log n)</code> resizes whose copy costs form a geometric series summing to <code>O(n)</code>, i.e. <code>O(1)</code> amortized. The factor trades memory slack for fewer copies."},
  {"sec":"FND-DS","front":"Array vs linked list: when does the linked list's <code>O(1)</code> insert actually lose?","back":"A linked list gives <code>O(1)</code> splice <em>only if you already hold the node</em>; finding the position is still <code>O(n)</code>. Meanwhile arrays win in practice because contiguous memory is cache-friendly and prefetchable, while list nodes scatter across the heap, causing a cache miss per hop. For traversal-heavy or index-heavy workloads, arrays usually beat lists even where Big-O suggests otherwise."},
  {"sec":"FND-DS","front":"Hash table collision resolution: chaining vs open addressing tradeoffs","back":"<ul><li><strong>Chaining</strong>: each bucket holds a list; tolerates load factor >1, simple deletion, but extra pointers and poor cache locality.</li><li><strong>Open addressing</strong> (linear/quadratic probe, double hashing): stores entries inline — cache-friendly, no pointers — but degrades sharply as load factor → 1, deletion needs tombstones, and clustering hurts probe length.</li></ul>"},
  {"sec":"FND-DS","front":"What does the load factor (<code>α = n/m</code>) control in a hash table?","back":"It's the expected occupancy. For <strong>chaining</strong>, average probe length is <code>1 + α</code>, so lookups stay <code>O(1)</code> as long as <code>α</code> is bounded. For <strong>open addressing</strong>, expected probes for a miss are ~<code>1/(1−α)</code>, which explodes as <code>α → 1</code> — so open-addressed tables resize at a lower threshold (~0.7) than chained ones (~1.0)."},
  {"sec":"FND-DS","front":"Why does hash-table resize cost <code>O(n)</code>, and why is it still <code>O(1)</code> amortized?","back":"Resizing allocates a larger bucket array and <strong>rehashes every element</strong> into it (you can't reuse old bucket indices because <em>m</em> changed), an <code>O(n)</code> operation. Because the table grows geometrically (like a dynamic array), resizes are rare enough that the cost amortizes to <code>O(1)</code> per insert. Latency-sensitive systems use <strong>incremental rehashing</strong> (spreading the work across many operations, e.g. Redis) to avoid the single big stall."},
  {"sec":"FND-DS","front":"Heap vs sorted array vs BST for a priority queue — which operations win?","back":"A binary <strong>heap</strong> gives <code>O(1)</code> find-min, <code>O(log n)</code> insert and extract-min, and <code>O(n)</code> build-heap — but no efficient search or ordered iteration. A sorted array gives <code>O(1)</code> min but <code>O(n)</code> insert. A balanced BST gives <code>O(log n)</code> for everything <em>including</em> ordered traversal and arbitrary search. Choose a heap when you only ever need the extreme; choose a BST when you also need order/search."},
  {"sec":"FND-DS","front":"Why do databases and filesystems use B+trees instead of binary search trees?","back":"BSTs have fanout 2, so a tree over <em>n</em> keys is ~<code>log₂ n</code> deep — and on disk <strong>every node is a separate I/O</strong>. B+trees pack hundreds of keys per node (one disk page), giving fanout in the hundreds and depth <code>log_B n</code> ≈ 3–4 for billions of keys. That minimizes disk seeks, and B+tree leaves are linked for efficient <strong>range scans</strong>."},
  {"sec":"FND-DS","front":"B-tree vs B+tree: what's the structural difference and why it matters?","back":"A <strong>B-tree</strong> stores values in both internal and leaf nodes. A <strong>B+tree</strong> stores values <em>only in leaves</em>; internal nodes hold keys for routing only, and all leaves are linked in a sorted list. B+tree advantages: higher fanout (internal nodes pack more keys → shallower tree) and fast in-order <strong>range scans</strong> by walking the leaf chain — which is why nearly all relational indexes are B+trees."},
  {"sec":"FND-DS","front":"AVL vs red-black tree: what's the real-world tradeoff?","back":"Both are <code>O(log n)</code> self-balancing BSTs. <strong>AVL</strong> enforces stricter balance (height difference ≤1), giving shorter trees and faster lookups but more rotations on insert/delete. <strong>Red-black</strong> allows looser balance (longest path ≤ 2× shortest), so fewer rotations and cheaper writes. Rule of thumb: AVL for read-heavy/lookup-dominated workloads, red-black for write-heavy ones (it's what most language standard libraries ship)."},
  {"sec":"FND-DS","front":"When is a trie the right structure over a hash table for string keys?","back":"A <strong>trie</strong> gives <code>O(k)</code> lookup (independent of how many keys are stored), supports <strong>prefix queries</strong> / autocomplete and ordered traversal, and shares common prefixes to save space on dense key sets. Use it for prefix search, longest-prefix matching (IP routing), or dictionary-style lookups. A hash table is better when you only need exact-match lookup and keys share few prefixes (tries waste pointers on sparse sets)."},
  {"sec":"FND-DS","front":"Adjacency list vs adjacency matrix: when to use each?","back":"<ul><li><strong>Adjacency list</strong>: <code>O(V+E)</code> space, <code>O(degree)</code> to enumerate a vertex's neighbors, <code>O(degree)</code> edge lookup. Best for <strong>sparse</strong> graphs (E ≪ V²).</li><li><strong>Adjacency matrix</strong>: <code>O(V²)</code> space, <code>O(1)</code> edge existence test, fast for <strong>dense</strong> graphs and matrix algorithms, but wastes memory on sparse graphs.</li></ul>Most real-world graphs are sparse, so adjacency lists dominate."},
  {"sec":"FND-DS","front":"Stack, queue, and deque: definitions and a typical backing structure","back":"<strong>Stack</strong> = LIFO (push/pop one end) — DFS, call frames, undo. <strong>Queue</strong> = FIFO (enqueue tail, dequeue head) — BFS, task buffers. <strong>Deque</strong> = double-ended, push/pop both ends — sliding-window maxima, work-stealing schedulers. All three are typically backed by a dynamic array (ring buffer) or doubly linked list, giving amortized <code>O(1)</code> operations."},
  {"sec":"FND-DS","front":"\"Which structure for which access pattern\" — the staff-level cheat sheet","back":"<ul><li>Exact-match key lookup, no order → <strong>hash table</strong>.</li><li>Ordered scans + range queries + search → <strong>balanced BST / B+tree</strong>.</li><li>Repeatedly pull the min/max → <strong>heap</strong>.</li><li>Prefix / autocomplete → <strong>trie</strong>.</li><li>Index by position, iterate fast → <strong>dynamic array</strong>.</li><li>On-disk / huge dataset → <strong>B+tree</strong> (minimize I/O).</li></ul>The deciding question is always: do you need <em>order</em>, and where does the data <em>live</em> (cache vs RAM vs disk)?"}
);

Object.assign(GLOSSARY_DATA, {
  "dynamic-array": {"term":"Dynamic Array","group":"FND-DS","aliases":["dynamic array","dynamic arrays","array list","arraylist","vector","growable array","contiguous array"],"eli5":"A resizable array that quietly allocates a bigger block and copies everything over when it runs out of room.","memory":"Think 'parking lot that repaves itself twice as big when full' — same row of cars, just a bigger lot, everybody moves once.","full":"<p>A <b>dynamic array</b> (C++ <code>vector</code>, Java <code>ArrayList</code>, Python <code>list</code>, Go slice) stores elements <b>contiguously</b> with a size and a capacity. Index access is <code>O(1)</code>; append is amortized <code>O(1)</code> via geometric growth. Insertion/deletion in the middle is <code>O(n)</code> because elements must shift.</p><p>Contiguity is its superpower: sequential traversal is <b>cache-friendly</b> and prefetchable, often making it faster in practice than a linked list even where Big-O is equal. Growth factor (typically 1.5–2×) trades memory slack for fewer copies; a smaller factor wastes less memory and can reuse freed blocks.</p>","trap":"Claiming insert/delete is <code>O(1)</code>. Only <i>append/pop at the end</i> is amortized <code>O(1)</code>; arbitrary-position insert/delete is <code>O(n)</code> due to shifting.","worked":"A <code>vector</code> at size=4, capacity=4 gets a 5th push: it allocates capacity 8, copies 4 elements, then writes the 5th. Next 3 pushes are pure <code>O(1)</code>.","related":["amortized-analysis","linked-list","cache-locality"]},
  "hash-table": {"term":"Hash Table","group":"FND-DS","aliases":["hash table","hash tables","hashtable","hash map","hashmap","dictionary"],"eli5":"Turn a key into an array index with a hash function so you can jump straight to its slot instead of searching.","memory":"'Coat-check': the hash function is the ticket number that tells you exactly which hook your coat is on — no scanning the rack.","full":"<p>A <b>hash table</b> maps keys to buckets via <code>h(key) mod m</code>, giving average <code>O(1)</code> insert/lookup/delete. Collisions are inevitable (pigeonhole) and resolved by <b>chaining</b> (bucket holds a list) or <b>open addressing</b> (probe to the next free slot). Performance hinges on a good hash (uniform spread) and a bounded <b>load factor</b>; when exceeded, the table resizes and rehashes everyone (<code>O(n)</code>, amortized away).</p><p>Worst case is <code>O(n)</code> when keys collide into one bucket — a real attack surface (algorithmic-complexity DoS via hash flooding), mitigated by randomized/seeded hashes like SipHash. Hash tables give no ordering, so range/ordered queries need a tree instead.</p>","trap":"Calling lookup <code>O(1)</code> worst-case. It's <code>O(1)</code> <i>average / amortized</i>; with adversarial keys or a bad hash it degrades to <code>O(n)</code>. Also: hash tables don't preserve order (insertion-ordered maps are a separate guarantee).","worked":"Insert 70 keys into m=100 buckets (α=0.7). With chaining, an average lookup probes ~1.7 entries; bump to 700 keys without resizing and chains average ~8 — why you resize at α≈0.7–1.0.","related":["load-factor","amortized-analysis","cache-locality"]},
  "load-factor": {"term":"Load Factor","group":"FND-DS","aliases":["load factor","load factors","α","fill ratio"],"eli5":"How full the hash table is — entries divided by buckets — which decides when it's time to grow.","memory":"Load factor is the 'restaurant occupancy sign' — chaining lets people wait in line (α>1 ok), open addressing makes them circle for parking (α near 1 is gridlock).","full":"<p>The <b>load factor</b> <code>α = n/m</code> (entries ÷ buckets) is the dial that governs hash-table speed. For <b>chaining</b>, expected probe length is <code>1 + α</code>, so it degrades gracefully and tolerates α ≥ 1. For <b>open addressing</b>, expected probes for an unsuccessful search are ~<code>1/(1−α)</code>, which blows up as α → 1 — at α=0.9 that's ~10 probes, so open-addressed tables resize earlier (≈0.7).</p><p>Crossing the threshold triggers a <b>resize</b>: allocate a bigger bucket array and rehash all entries. Because growth is geometric, resizes are rare and amortize to <code>O(1)</code> per insert, though they cause a latency spike that incremental rehashing schemes spread out.</p>","trap":"Using the same resize threshold for both schemes. Open addressing must resize well below 1 (≈0.7) or probe chains explode; chaining can run at α≈1 happily.","worked":"Open-addressed table at α=0.5 → ~2 probes/miss; at α=0.8 → ~5; at α=0.9 → ~10. Same table chained at α=0.9 → ~1.9. The contrast is exactly why thresholds differ.","related":["hash-table","amortized-analysis"]},
  "binary-heap": {"term":"Binary Heap","group":"FND-DS","aliases":["binary heap","heap","heaps","min-heap","max-heap","priority queue","priority queues"],"eli5":"A nearly-complete binary tree where each parent beats its children, so the best element is always sitting at the root.","memory":"Heap = corporate org chart where every boss out-ranks their reports; the CEO (best element) is always at the top, instantly reachable.","full":"<p>A <b>binary heap</b> is a complete binary tree (so it packs into an array: children of <code>i</code> at <code>2i+1</code>, <code>2i+2</code>) satisfying the heap property — parent ≤ children (min-heap) or ≥ (max-heap). It gives <code>O(1)</code> peek-min, <code>O(log n)</code> insert (sift-up) and extract-min (sift-down), and <b><code>O(n)</code> build-heap</b> via bottom-up heapify. It's the standard backing for a <b>priority queue</b>.</p><p>It deliberately does <i>not</i> support efficient search or ordered iteration — only the extreme element is cheap. For decrease-key-heavy graph algorithms (Dijkstra), a Fibonacci or pairing heap improves amortized bounds; for ordered + min access, use a balanced BST instead.</p>","trap":"Thinking build-heap is <code>O(n log n)</code>. Inserting <i>n</i> items one-by-one is <code>O(n log n)</code>, but <b>bottom-up heapify of an existing array is <code>O(n)</code></b> — the cost is dominated by the many cheap leaf sift-downs.","worked":"Heapsort: build-heap in <code>O(n)</code>, then extract-max <i>n</i> times at <code>O(log n)</code> each = <code>O(n log n)</code> total, in-place, no extra memory.","related":["self-balancing-bst","amortized-analysis"]},
  "self-balancing-bst": {"term":"Self-Balancing BST","group":"FND-DS","aliases":["self-balancing bst","self-balancing tree","balanced bst","balanced binary search tree","avl tree","avl","red-black tree","red-black","bst"],"eli5":"A binary search tree that rotates itself after inserts/deletes so it never becomes a lopsided <code>O(n)</code> chain.","memory":"AVL = the 'neat freak' (rebalances constantly, pristine height); red-black = 'good enough' (tolerates some mess, less fussing) → AVL reads faster, red-black writes faster.","full":"<p>A plain <b>BST</b> gives <code>O(log n)</code> ops only when balanced; adversarial/sorted inserts degrade it to an <code>O(n)</code> linked list. <b>Self-balancing</b> variants enforce a height invariant via rotations. <b>AVL</b> keeps subtree heights within 1 (strict → shorter trees, faster reads, more rotations on write). <b>Red-black</b> uses node colors so the longest path ≤ 2× the shortest (looser → fewer rotations, faster writes); it backs <code>std::map</code>, Java <code>TreeMap</code>, and Linux kernel structures.</p><p>The payoff over a hash table: balanced BSTs keep keys <b>ordered</b>, giving <code>O(log n)</code> predecessor/successor, range queries, and in-order traversal — at the cost of slower point lookups and worse cache behavior than a hash.</p>","trap":"Saying a BST is <code>O(log n)</code> unconditionally. A <i>plain</i> BST is <code>O(n)</code> worst-case (sorted input builds a chain); only self-balancing variants guarantee <code>O(log n)</code>.","worked":"Insert 1,2,3,4,5 into a plain BST → a right-leaning chain of height 5 (O(n) search). An AVL rotates after the 3rd insert, staying height ~2–3.","related":["binary-heap","b-tree","trie","cache-locality"]},
  "b-tree": {"term":"B-tree / B+tree","group":"FND-DS","aliases":["b-tree","b-trees","btree","b+tree","b+trees","b+ tree"],"eli5":"A bushy, shallow search tree where each node holds hundreds of keys, so finding anything on disk takes only a few page reads.","memory":"B-tree = a phone book with thick tabbed sections: a few flips (page reads) land you on the right page holding hundreds of names.","full":"<p>A <b>B-tree</b> is a balanced, high-<b>fanout</b> search tree designed for block storage: each node is one disk/SSD page holding many keys, so fanout is in the hundreds and height is <code>log_B n</code> ≈ 3–4 even for billions of keys — minimizing the <b>I/O count</b> that dominates disk-resident structures. A <b>B+tree</b> stores values only in leaves (internal nodes route), packs internal nodes denser, and <b>links leaves in sorted order</b> for fast range scans.</p><p>This is why virtually every relational-DB and filesystem index is a B+tree: it converts the 'minimize comparisons' goal of in-memory trees into 'minimize page reads.' LSM-trees are the write-optimized alternative when ingest rate beats read latency.</p>","trap":"Saying the 'B' stands for 'binary.' B-trees are explicitly <i>not</i> binary — high fanout is the whole point; B+trees additionally keep all data in linked leaves (B-trees can hold values in internal nodes).","worked":"1 billion keys, fanout 256: height = log₂₅₆(10⁹) ≈ 3.7, so ~4 page reads per lookup vs ~30 for a binary tree (log₂ 10⁹) — ~8× fewer I/Os.","related":["self-balancing-bst","cache-locality","trie"]},
  "cache-locality": {"term":"Cache Locality","group":"FND-DS","aliases":["cache locality","cache-locality","cache-friendly","contiguity","spatial locality","locality of reference"],"eli5":"Memory you access tends to live near memory you just accessed, so keeping data packed and sequential makes the CPU cache do the work.","memory":"'Groceries on one shelf vs scattered across the store' — the array is the single shelf (grab the whole row at once); the linked list sends you sprinting aisle to aisle.","full":"<p><b>Cache locality</b> is why Big-O alone mispredicts real performance. RAM is ~100× slower than L1 cache, so a cache miss costs hundreds of cycles. <b>Spatial locality</b> (contiguous data, like arrays) lets the CPU fetch a whole cache line and prefetch ahead; <b>temporal locality</b> reuses recently-touched data. Pointer-chasing structures (linked lists, scattered tree/hash nodes) defeat this — each hop is a likely cache miss.</p><p>This is the practical reason dynamic arrays often beat linked lists, open addressing can beat chaining, and B-trees/flat layouts win on modern hardware: the <i>constant factor</i> from memory hierarchy frequently dominates the asymptotic term at realistic <i>n</i>.</p>","trap":"Picking a structure purely by asymptotic complexity. A linked list's <code>O(1)</code> splice loses to an array's <code>O(n)</code> shift for small/medium <i>n</i> because cache misses dwarf the asymptotic difference — measure, don't assume.","worked":"Summing 10M ints: a contiguous array streams through cache at near memory bandwidth; the same values in a linked list run several times slower purely from per-node cache misses, despite identical <code>O(n)</code>.","related":["dynamic-array","linked-list","hash-table","b-tree"]},
  "linked-list": {"term":"Linked List","group":"FND-DS","aliases":["linked list","linked lists","singly linked list","doubly linked list"],"eli5":"A chain of nodes where each one points to the next, so you can splice in or out in place — but only after you've walked to the spot.","memory":"A scavenger hunt: each clue (node) only tells you where the next one is — no map, no jumping to clue #500 directly.","full":"<p>A <b>linked list</b> stores elements in heap-scattered nodes connected by pointers (singly or doubly). It gives <code>O(1)</code> insert/delete <b>once you hold the node</b>, and stable references that don't invalidate on growth — useful for LRU caches, adjacency lists, and intrusive kernel lists. But indexing and search are <code>O(n)</code>, and every traversal hop is a likely cache miss.</p><p>Compared to a dynamic array, it wins only when you do many splices at known positions and rarely random-access or iterate; otherwise the array's contiguity usually makes it faster in practice despite equal Big-O.</p>","trap":"Citing <code>O(1)</code> insertion as a blanket win. It's <code>O(1)</code> only if you already have a pointer to the node; <i>finding</i> that position is <code>O(n)</code>, and cache misses make real-world traversal slower than arrays.","worked":"Deleting the middle element of a 1M-element array shifts 500K items (<code>O(n)</code> copies); in a doubly linked list with the node in hand it's two pointer rewrites — but reaching that node first cost a 500K-hop walk.","related":["dynamic-array","cache-locality"]},
  "trie": {"term":"Trie (Prefix Tree)","group":"FND-DS","aliases":["trie","tries","prefix tree","prefix trees","radix tree","digital tree"],"eli5":"A tree keyed by the characters of a string, so words sharing a prefix share a path from the root.","memory":"A trie is a 'choose-your-own-adventure dictionary': spell the word letter by letter, branching down the page — and everyone spelling 'CAT…' walks the same first three steps.","full":"<p>A <b>trie</b> stores strings by character along tree edges; a key's lookup/insert is <code>O(k)</code> in the key length, <b>independent of how many keys are stored</b>. Its killer features are <b>prefix queries</b> (autocomplete, 'all keys starting with…'), <b>longest-prefix match</b> (IP routing tables), and ordered traversal — none of which a hash table offers. Shared prefixes can also compress storage on dense key sets.</p><p>The cost is pointer overhead and cache-unfriendliness on sparse sets; <b>radix/Patricia tries</b> compress single-child chains to fix this. Choose a trie for prefix/range-on-strings work; choose a hash table for pure exact-match with few shared prefixes.</p>","trap":"Assuming a trie always beats a hash table for strings. For pure exact-match with sparse, unrelated keys, a hash table is faster and more memory-efficient; the trie only pulls ahead when you need <i>prefix</i> operations.","worked":"Autocomplete on 1M words: a hash table can't answer 'words starting with cha' without scanning all keys; a trie walks 3 edges to the 'cha' node and enumerates its subtree directly.","related":["self-balancing-bst","b-tree","hash-table"]}
});

</script>

<script>
/* Foundations · Hashing & Consistent Hashing (FND-HASH) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-HASH","front":"The three core properties of a good hash function","back":"<ul><li><strong>Deterministic</strong>: same input always yields the same output.</li><li><strong>Uniform</strong>: outputs spread evenly across the range, minimizing collisions for any key distribution.</li><li><strong>Avalanche</strong>: flipping one input bit flips ~50% of output bits, so similar keys land far apart.</li></ul>Note: cryptographic strength (preimage/collision resistance) is a <em>separate</em> requirement, needed only for security, not for hash tables."},
  {"sec":"FND-HASH","front":"Chaining vs open addressing for collision resolution","back":"<strong>Chaining</strong> stores colliding keys in a per-bucket linked list (or tree); simple, degrades gracefully past load factor 1, but costs pointers and cache misses. <strong>Open addressing</strong> probes for another slot in the array itself (linear/quadratic/double hashing); cache-friendly and no pointers, but must stay below ~0.7 load factor and needs tombstones on delete."},
  {"sec":"FND-HASH","front":"What is load factor and when do hash tables resize?","back":"Load factor <code>α = n / m</code> (entries over buckets). It governs expected probe/chain length. Chaining tolerates <code>α &gt; 1</code>; open addressing degrades sharply near <code>α ≈ 0.7-0.8</code>. Tables typically <strong>double capacity and rehash all keys</strong> when α crosses a threshold, giving <em>amortized</em> O(1) inserts despite the O(n) rehash."},
  {"sec":"FND-HASH","front":"Why does mod-N hashing fall apart when the node count changes?","back":"With <code>server = hash(key) % N</code>, changing <code>N</code> changes the modulus for <em>almost every</em> key, so roughly <strong>(N-1)/N of all keys remap</strong> when you add/remove one node. That triggers a near-total cache flush or data reshuffle. Consistent hashing remaps only ~<code>1/N</code> of keys instead."},
  {"sec":"FND-HASH","front":"How does the consistent hashing ring place keys onto nodes?","back":"Hash both nodes and keys into the same circular space (e.g. <code>[0, 2^32)</code>). Each key is owned by the <strong>first node encountered walking clockwise</strong> from the key's position. Adding/removing a node only reassigns the keys in that node's arc to its neighbor, so only ~<code>1/N</code> of keys move."},
  {"sec":"FND-HASH","front":"Why do consistent hashing rings need virtual nodes?","back":"With few physical nodes, random ring placement creates <strong>uneven arc sizes</strong> (high load variance) and a removed node dumps its <em>entire</em> arc onto one neighbor. Giving each physical node many <strong>virtual nodes (vnodes)</strong> — hundreds of points on the ring — smooths the load distribution and spreads a departing node's keys across many survivors. Load std-dev shrinks roughly as <code>1/√(vnodes per node)</code>."},
  {"sec":"FND-HASH","front":"Rendezvous (HRW) hashing: how does it pick a node?","back":"For each key, compute <code>hash(key, node_i)</code> for <em>every</em> node and pick the node with the <strong>highest score</strong> (Highest Random Weight). When a node leaves, only keys that scored it #1 move, and they redistribute evenly across remaining nodes — no ring or vnode bookkeeping. Cost is O(nodes) per lookup, fine for modest cluster sizes."},
  {"sec":"FND-HASH","front":"Consistent hashing vs rendezvous hashing — when to pick which?","back":"Both achieve minimal disruption (~<code>1/N</code> remap). <strong>Rendezvous</strong> is simpler, needs no vnode tuning, gives naturally even load, and supports clean top-<em>k</em> replica selection — but is O(N) per lookup. <strong>Consistent hashing</strong> is O(log V) per lookup via binary search over the sorted ring of V vnode positions, scaling better to large clusters, at the cost of vnode management. Use rendezvous for small/medium N; the ring for large dynamic fleets."},
  {"sec":"FND-HASH","front":"Range sharding vs hash sharding — the core trade-off","back":"<strong>Range sharding</strong> keeps keys ordered by partition (e.g. by timestamp), enabling efficient range scans but risking <strong>hot spots</strong> on sequential/skewed writes. <strong>Hash sharding</strong> scatters keys uniformly for balanced load, but <strong>destroys locality</strong> — range queries must fan out to all shards. Choose by query pattern: scans → range; point access / write-balance → hash."},
  {"sec":"FND-HASH","front":"What guarantee does a Bloom filter give, and what does it never give?","back":"A Bloom filter answers set membership: a <strong>\"no\" is always correct</strong> (no false negatives), but a <strong>\"yes\" may be wrong</strong> (false positives). It uses <code>k</code> hash functions over an <code>m</code>-bit array; you trade a tunable false-positive rate for big space savings. <em>Standard</em> Bloom filters can't delete (use a counting Bloom filter for that)."},
  {"sec":"FND-HASH","front":"How are a Bloom filter's parameters (m, k, p) related?","back":"For <code>n</code> items in <code>m</code> bits, the optimal hash count is <code>k = (m/n) ln 2</code>, giving false-positive rate <code>p ≈ (0.6185)^(m/n)</code>. Rule of thumb: about <strong>~9.6 bits per element per 1% FP rate</strong>, and each ~10× drop in <code>p</code> costs ~4.8 more bits/element. The FP rate is minimized when ~50% of bits are set."},
  {"sec":"FND-HASH","front":"What does HyperLogLog estimate, and why is it so cheap?","back":"HyperLogLog estimates the <strong>cardinality</strong> (count of distinct elements) of a huge stream using ~1.5 KB to hit ~2% error for cardinalities into the billions. It buckets by leading hash bits and tracks the <strong>max run of leading zeros</strong> per bucket — a long run implies many distinct values — then harmonic-mean-averages across buckets. Counters are <strong>mergeable</strong>, so shards combine losslessly."},
  {"sec":"FND-HASH","front":"Why use a non-cryptographic hash (e.g. xxHash, MurmurHash) for hash tables and sharding?","back":"Hash tables, sharding, and sketches need <strong>speed and good distribution</strong>, not adversary resistance — cryptographic hashes (SHA-256) are 10-100× slower for no benefit. Exception: if untrusted clients control keys, a weak hash enables <strong>algorithmic-complexity (HashDoS) attacks</strong>, so use a seeded/keyed hash like SipHash."},
  {"sec":"FND-HASH","front":"How do you add replication on a consistent hashing ring?","back":"Store each key on the <strong>next <code>R</code> distinct physical nodes clockwise</strong> from its ring position (skipping vnodes of nodes already chosen). This gives a deterministic, membership-derived replica set with no separate directory. Dynamo-style systems use exactly this \"preference list\" for N replicas."},
  {"sec":"FND-HASH","front":"Why double (not +1) when resizing a hash table?","back":"Each resize costs O(n) to rehash everyone. <strong>Geometric growth</strong> (×2) makes resizes exponentially rare, so the total rehash work across <code>n</code> inserts is O(n) — yielding <strong>amortized O(1)</strong> per insert. Growing by a constant (+k) would make insertion O(n) amortized, since you'd rehash repeatedly."}
);

Object.assign(GLOSSARY_DATA, {
  "avalanche-effect": {"term":"Avalanche Effect","group":"FND-HASH","aliases":["avalanche","avalanche effect"],"eli5":"Change one tiny bit of the input and about half the output bits flip, so near-identical keys end up nowhere near each other.","memory":"\"Avalanche\" = one snowflake (input bit) triggers half the mountain (output bits) to move.","full":"<p>The avalanche effect is the property that a single-bit change in the input flips roughly 50% of the output bits, with no statistical correlation between which input bit changed and which output bits flip. It's what makes a hash function <b>diffuse</b> structure in real-world keys (sequential IDs, shared prefixes) into a uniform spread across buckets.</p><p>Without strong avalanche, structured keys like <code>user_1000</code>, <code>user_1001</code> cluster into adjacent buckets, spiking collisions and probe lengths. Good general-purpose hashes (MurmurHash3, xxHash) are explicitly designed and tested for avalanche; this is distinct from cryptographic collision resistance.</p>","trap":"Thinking avalanche requires a cryptographic hash. It doesn't — fast non-crypto hashes achieve excellent avalanche; crypto adds <em>irreversibility</em>, which hash tables don't need.","worked":"Hashing <code>\"key1\"</code> vs <code>\"key2\"</code> with a good 32-bit hash yields outputs differing in ~16 of 32 bits, landing them in unrelated buckets even though the inputs differ by one character.","related":["uniformity","non-cryptographic-hash"]},
  "uniformity": {"term":"Uniformity (Hash Distribution)","group":"FND-HASH","aliases":["uniformity","uniform distribution","uniformly distributed"],"eli5":"A good hash spreads keys evenly across all buckets, like dealing cards to players one each instead of dumping the deck on one person.","full":"<p>Uniformity means hash outputs are spread evenly across the output range regardless of input distribution. It directly controls the expected collision rate and therefore the expected probe length (open addressing) or chain length (chaining). Under the <b>simple uniform hashing assumption</b>, expected chain length equals the load factor <code>α</code>, giving O(1 + α) operations.</p><p>Uniformity is necessary but not sufficient: a hash can be uniform over random inputs yet cluster on the <em>structured</em> inputs you actually see, which is why the avalanche effect matters in practice. Skewed key popularity (a few hot keys) can still create hotspots no hash function can fix.</p>","trap":"Assuming a uniform hash guarantees balanced <em>load</em>. If a handful of keys are accessed far more than others, even perfect uniformity leaves you with hot shards — that's a key-skew problem, not a hash problem.","related":["avalanche-effect","load-factor","consistent-hashing"]},
  "rehashing": {"term":"Rehashing / Resizing","group":"FND-HASH","aliases":["rehashing","rehash","resizing","resize"],"eli5":"When the table gets too crowded, build a bigger one and re-file every key into it.","memory":"Double-and-copy = the \"moving to a bigger house\" tax you pay rarely, so the average rent stays cheap.","full":"<p>Rehashing reallocates the bucket array (usually doubling) and recomputes each key's bucket for the new size, because <code>hash(key) % m</code> changes when <code>m</code> changes. A single rehash is O(n), but <b>geometric resizing</b> amortizes it to O(1) per insert: the total rehash work across n inserts is bounded by n + n/2 + n/4 + ... &lt; 2n.</p><p>The latency cost of a rehash is a stop-the-world spike, which is why latency-sensitive systems use <b>incremental rehashing</b> (Redis keeps two tables and migrates a few buckets per operation) to amortize the spike over time.</p>","trap":"Claiming hash-table insert is \"O(1) worst case.\" It's <em>amortized</em> O(1); the worst-case single insert that triggers a resize is O(n).","related":["load-factor","consistent-hashing"]},
  "open-addressing": {"term":"Open Addressing","group":"FND-HASH","aliases":["open addressing","open-addressed","probing"],"eli5":"On a collision, don't make a list — just keep checking the next slots in the array until you find an empty one.","memory":"Open addressing = \"musical chairs in one room\"; chaining = \"each chair has its own waiting line.\"","full":"<p>Open addressing stores all entries directly in the bucket array; collisions are resolved by <b>probing</b> a deterministic sequence of slots. Variants trade off clustering: <i>linear probing</i> (slot+1) is cache-friendliest but suffers primary clustering; <i>quadratic probing</i> reduces clustering; <i>double hashing</i> uses a second hash for the step size and spreads best.</p><p>Deletion is the gotcha: you can't just empty a slot or you'd break probe chains, so you write a <b>tombstone</b> marker. Tombstones accumulate and degrade performance, eventually forcing a rehash. The whole scheme requires α &lt; 1 and performs best below ~0.7.</p>","trap":"Forgetting tombstones — naively clearing a deleted slot makes later keys in the same probe chain unfindable. Interviewers love this one.","related":["load-factor","uniformity","non-cryptographic-hash"]},
  "consistent-hashing": {"term":"Consistent Hashing","group":"FND-HASH","aliases":["consistent hashing","consistent hash","the ring","hash ring"],"eli5":"Put servers and keys on a clock face; each key belongs to the next server clockwise, so adding a server only steals keys from one neighbor.","memory":"It's a clock: removing a node just hands its slice to the next hour mark — nobody else's time changes.","full":"<p>Consistent hashing maps both nodes and keys into a circular hash space (e.g. <code>[0, 2^32)</code>); a key is owned by the first node clockwise from it. The defining property: when a node is added or removed, only the keys in <b>one arc</b> (~<code>1/N</code> of all keys) are reassigned, versus ~<code>(N-1)/N</code> for naive <code>mod N</code>. This is why it underpins distributed caches (memcached clients), Dynamo, Cassandra, and CDN routing.</p><p>In practice each node owns many <b>virtual nodes</b> to even out arc sizes, and replication walks clockwise to the next R distinct physical nodes. Lookups are O(log V) via binary search over the sorted ring of V vnode positions.</p>","trap":"Saying it makes load \"perfectly balanced.\" Without virtual nodes, random placement gives high arc-size variance; balance comes from vnodes, not the ring alone.","worked":"10 nodes, add an 11th: naive mod-N remaps ~91% of keys; consistent hashing remaps only ~1/11 ≈ 9%, landing on the new node's arc.","related":["virtual-nodes","rendezvous-hashing","rehashing","uniformity"]},
  "virtual-nodes": {"term":"Virtual Nodes (vnodes)","group":"FND-HASH","aliases":["virtual nodes","virtual node","vnodes","vnode"],"eli5":"Give each real server hundreds of positions on the ring instead of one, so the load smooths out and no single neighbor inherits everything.","memory":"One server wearing many hats around the clock — so when it leaves, its work is shared by everyone, not dumped on the next guy.","full":"<p>A virtual node is one of many ring positions assigned to a single physical node (commonly 100-300+). They solve two problems with a bare ring: (1) with few nodes, random placement yields wildly unequal arc sizes; (2) removing a physical node dumps its <em>entire</em> arc onto one successor. With vnodes, each physical node's keyspace is the union of many small scattered arcs, so load variance drops and a departing node's keys spread across <b>many</b> survivors.</p><p>The standard-deviation of load shrinks roughly as <code>1/√(vnodes per node)</code>, so a few hundred vnodes gets load imbalance into the low single-digit percent. The cost is a larger sorted ring and more metadata.</p>","trap":"Confusing vnodes with replicas. Vnodes are extra <em>positions of the same node</em> for load balancing; replicas are <em>copies on different nodes</em> for durability. Orthogonal concepts.","related":["consistent-hashing","rendezvous-hashing"]},
  "rendezvous-hashing": {"term":"Rendezvous (HRW) Hashing","group":"FND-HASH","aliases":["rendezvous hashing","rendezvous","hrw","hrw hashing","highest random weight"],"eli5":"For each key, score every server and pick the highest scorer; if a server vanishes, only keys that crowned it move.","memory":"Every node bids on every key; highest bid wins. Lose a bidder and only its winning lots get re-auctioned.","full":"<p>Rendezvous (Highest Random Weight) hashing computes <code>w_i = hash(key, node_i)</code> for every node and selects the node with the maximum weight. Like consistent hashing it achieves minimal disruption — removing a node only reassigns the keys that ranked it first, redistributed evenly across the survivors — but with <b>no ring, no virtual nodes, and naturally uniform load</b>.</p><p>The trade-off is O(N) work per lookup (you score all nodes), versus O(log V) for a sorted ring, so it shines for small-to-medium clusters. A bonus: taking the top-<i>k</i> scores gives a clean, stable replica set for free, which is harder to express cleanly on a ring.</p>","trap":"Dismissing it as \"just consistent hashing.\" Its O(N)-per-lookup cost differs, it needs no vnode tuning to balance, and its top-k replica selection is cleaner. Different operational profile.","worked":"4 nodes; node B dies. Only keys whose highest score was B move, and they scatter across A, C, D by their next-highest scores — no neighbor gets a lopsided dump.","related":["consistent-hashing","virtual-nodes"]},
  "bloom-filter": {"term":"Bloom Filter","group":"FND-HASH","aliases":["bloom filter","bloom filters","bloom"],"eli5":"A tiny bit-array that can say \"definitely not in the set\" or \"probably in the set\" — it never misses a real member but occasionally cries wolf.","memory":"\"No\" is gospel, \"yes\" is a maybe. False positives possible, false negatives impossible.","full":"<p>A Bloom filter is a probabilistic set: <code>k</code> hash functions map each element to <code>k</code> bits in an <code>m</code>-bit array, all set on insert; a query checks whether all <code>k</code> bits are set. The asymmetry is the whole point — a \"no\" is <b>always correct (no false negatives)</b>, but a \"yes\" can be a <b>false positive</b> because unrelated inserts may have set those bits. Optimal <code>k = (m/n)ln2</code> gives FP rate <code>p ≈ 0.6185^(m/n)</code>, roughly 9.6 bits/element per 1% FP.</p><p>It's used as a cheap gatekeeper before expensive lookups — LSM-tree storage engines (RocksDB, Cassandra) put a Bloom filter per SSTable so a point read can skip files that definitely lack the key. Standard filters can't delete or count; counting Bloom filters and cuckoo filters address those needs.</p>","trap":"Saying it can have false negatives, or that you can delete from a standard one. Both wrong — set bits are never unset, so members are never missed, and clearing bits would risk dropping other members.","worked":"An LSM read for key X checks each SSTable's Bloom filter; filters returning \"no\" let you skip those files' disk reads entirely, turning many I/Os into bit checks.","related":["hyperloglog","non-cryptographic-hash"]},
  "hyperloglog": {"term":"HyperLogLog","group":"FND-HASH","aliases":["hyperloglog","hll","loglog"],"eli5":"Counts how many <em>distinct</em> things you've seen in a giant stream using a couple kilobytes, by watching for improbably long runs of leading zeros in the hashes.","memory":"\"Longest streak of zeros\" = how many coins you'd flip to see that many heads in a row — rare streaks mean you flipped a LOT of distinct coins.","full":"<p>HyperLogLog estimates set <b>cardinality</b> (distinct count) in roughly constant tiny memory. It hashes each element, uses the first <code>p</code> bits to pick one of <code>m = 2^p</code> registers, and stores the maximum count of <b>leading zeros</b> seen in the rest — since the chance of seeing <code>k</code> leading zeros is <code>2^(-k)</code>, a long run implies many distinct elements. It then combines registers via a <b>harmonic mean</b> (which tames outliers) to estimate cardinality with standard error ≈ <code>1.04/√m</code>.</p><p>About 1.5 KB (m=2^12 registers) gives ~2% error for counts into the billions. Crucially, two HLLs over different shards <b>merge losslessly</b> by taking the per-register max — making it ideal for distributed distinct-count (unique visitors, distinct IPs) where exact counting would need O(n) memory.</p>","trap":"Confusing it with a Bloom filter. Bloom answers <em>membership</em> (is X in the set?); HLL answers <em>how many distinct</em> — it can't tell you whether any specific element is present.","worked":"Counting unique visitors across 100 servers: each keeps a 1.5 KB HLL, you merge by per-register max into one estimate ±2%, instead of shipping billions of IDs to dedupe.","related":["bloom-filter","non-cryptographic-hash"]},
  "non-cryptographic-hash": {"term":"Non-Cryptographic Hash","group":"FND-HASH","aliases":["non-cryptographic hash","non-crypto hash","murmurhash","xxhash","fast hash"],"eli5":"A fast, well-mixing hash for tables and sharding that doesn't waste cycles being attack-proof.","memory":"Crypto hashes guard secrets; fast hashes just shuffle keys. Use the shuffler — unless strangers pick your keys.","full":"<p>Non-cryptographic hashes (MurmurHash3, xxHash, FNV, CityHash) optimize for <b>speed and distribution/avalanche</b>, not adversary resistance. For hash tables, sharding, consistent-hashing rings, Bloom filters, and HLL, that's exactly what you want — SHA-256 would be 10-100× slower for zero functional benefit, since you never need to resist a forger.</p><p>The one caveat is <b>HashDoS</b>: if untrusted clients control keys, they can craft colliding inputs to force every key into one bucket, turning O(1) lookups into O(n) and DoSing the service. The fix is a <b>seeded/keyed</b> hash with a per-process secret (e.g. SipHash, which Python, Rust, and others adopted for their default dict/map hashing).</p>","trap":"Reaching for SHA-256 in a hot path \"to be safe.\" It's wasted CPU unless inputs are adversarial; even then, keyed SipHash beats it on speed while blocking HashDoS.","related":["avalanche-effect","uniformity","open-addressing"]}
});

</script>

<!-- content: 10-fnd-lb.js -->
<script>
/* Foundations · Load Balancing & Proxies (FND-LB) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"FND-LB","front":"L4 vs L7 load balancing — what each can route on","back":"<strong>L4</strong> (transport) balances on <code>IP:port</code> and TCP/UDP state — it forwards packets/connections without reading the payload, so it's cheap and fast and protocol-agnostic. <strong>L7</strong> (application) terminates the connection and parses HTTP, so it can route on <code>Host</code>, path, headers, cookies, and method, do TLS termination, retries, and content-based routing — at higher CPU cost."},
  {"sec":"FND-LB","front":"Why L4 cannot do path-based or cookie-based routing","back":"An L4 balancer never reads the application payload — it only sees <code>IP:port</code> and TCP segments, often forwarding the original packets so the bytes are encrypted/opaque to it. Path (<code>/api</code> vs <code>/img</code>), <code>Host</code>, and cookie routing all require parsing HTTP, which only an L7 proxy (which terminates the connection) can do."},
  {"sec":"FND-LB","front":"Round-robin's blind spot","back":"Plain <strong>round-robin</strong> assumes every request costs the same and every backend is identical. It ignores in-flight load, so a slow/expensive request pinned to one node still gets equal new traffic, and a heterogeneous fleet gets evenly hammered regardless of capacity. Use <strong>weighted round-robin</strong> for mixed capacity or <strong>least-connections</strong> for variable request cost."},
  {"sec":"FND-LB","front":"Least-connections — when it beats round-robin","back":"<strong>Least-connections</strong> sends the next request to the backend with the fewest active connections, approximating current load. It wins when request durations vary widely (long-poll, streaming, slow queries) because round-robin would keep feeding a node already saturated with long-lived work. It's a poor proxy for load when connections are cheap but per-request CPU varies — then prefer <strong>least-response-time</strong>."},
  {"sec":"FND-LB","front":"Least-response-time / least-pending-requests","back":"Routes to the backend with the lowest measured latency (often blended with active connection count). Unlike least-connections it captures <em>backend health</em>, not just connection count — a node that's connected to few clients but responding slowly (GC pause, hot disk) gets traffic steered away. It's the most adaptive algorithm but needs reliable per-backend latency telemetry."},
  {"sec":"FND-LB","front":"Why naive (modulo) hashing breaks on backend count change","back":"<code>hash(key) % N</code> maps a key to one of <code>N</code> backends. Change <code>N</code> (add/remove a node) and the <em>vast majority</em> of keys remap — e.g. going 8→7 nodes moves ~6/7 of keys — catastrophic for cache hit rate and session affinity. <strong>Consistent hashing</strong> fixes this: removing one of <code>N</code> nodes remaps only ~<code>1/N</code> of keys (adding the next node, ~<code>1/(N+1)</code>)."},
  {"sec":"FND-LB","front":"Active vs passive health checks","back":"<strong>Active</strong>: the LB proactively probes each backend on a schedule (e.g. <code>GET /healthz</code> every few seconds) and ejects on consecutive failures. <strong>Passive</strong> (outlier detection): the LB infers health from <em>real</em> traffic — counting 5xx/timeouts/connection errors — and ejects a node that misbehaves. Active detects a dead node with no traffic; passive catches failures a synthetic probe misses. Production systems run both."},
  {"sec":"FND-LB","front":"Health-check flapping and how to damp it","back":"A backend hovering at the threshold can oscillate in/out of rotation, causing churn and uneven load. Damp it with <strong>hysteresis</strong>: require N consecutive failures to eject (<code>unhealthy_threshold</code>) and M consecutive successes to re-add (<code>healthy_threshold</code>), plus a base ejection time that grows on repeat offenders. Don't probe a deep dependency in <code>/healthz</code> or one slow DB can eject the whole fleet at once."},
  {"sec":"FND-LB","front":"Sticky sessions — why they hurt horizontal scaling","back":"Stickiness pins a client to one backend (via cookie or source-IP hash) so in-memory session state stays local. The costs: <strong>uneven load</strong> (long-lived clients pile onto specific nodes), <strong>broken elasticity</strong> (a new node gets only new sessions, so it can't absorb existing hot load), and <strong>state loss</strong> when that node dies or drains. The scalable fix is <em>stateless</em> backends with shared session state (Redis/JWT)."},
  {"sec":"FND-LB","front":"Two ways to implement session stickiness","back":"<ul><li><strong>Cookie-based</strong> (L7): the LB issues/reads an affinity cookie naming the backend. Survives client NAT/IP changes; needs an L7 proxy.</li><li><strong>Source-IP hash</strong> (L4): hash the client IP to a backend. Works at L4 with no cookie, but breaks behind shared NAT/CGNAT (many clients → one node) and re-shuffles when the backend set changes unless consistent hashing is used.</li></ul>"},
  {"sec":"FND-LB","front":"Reverse proxy vs forward proxy","back":"A <strong>reverse proxy</strong> sits in front of <em>servers</em>, acts on their behalf, and is what clients connect to (TLS termination, LB, caching, WAF) — clients don't know the real backends. A <strong>forward proxy</strong> sits in front of <em>clients</em> and acts on their behalf to reach the internet (egress control, corporate filtering, caching, anonymity) — the destination server sees the proxy, not the client."},
  {"sec":"FND-LB","front":"The load balancer as a single point of failure","back":"Putting one LB in front of a redundant fleet just moves the SPOF to the LB. Eliminate it with redundancy: an <strong>HA pair</strong> (active/passive sharing a floating VIP via VRRP, or active/active), and at the edge <strong>DNS load balancing</strong> or <strong>anycast</strong> so the entry point itself isn't a single box. Health of the LB tier must be monitored independently of the backends."},
  {"sec":"FND-LB","front":"Anycast vs DNS round-robin for distributing the LB tier","back":"<strong>DNS LB</strong> hands out different A-records (round-robin/geo/weighted) but is coarse: clients/resolvers cache records past TTL, so failover is slow and traffic split is approximate. <strong>Anycast</strong> advertises one IP from many locations; BGP routes each client to the nearest PoP and reconverges (typically within seconds) when a site withdraws the route — fast failover and built-in geo-proximity, at the cost of needing BGP/PoP infrastructure."},
  {"sec":"FND-LB","front":"Connection draining (graceful shutdown)","back":"When taking a backend out of rotation (deploy, scale-down), <strong>draining</strong> stops sending it <em>new</em> connections while letting existing in-flight requests finish (up to a timeout) before the node is killed. Without it you reset live connections and drop requests mid-flight. The LB marks the node <code>DRAINING</code>, fails health checks for new routing, and waits out the drain timeout. Pair with the app honoring <code>SIGTERM</code>."},
  {"sec":"FND-LB","front":"Consistent hashing — the property that matters for LBs","back":"It maps both keys and backends onto a hash ring; a key goes to the next backend clockwise. Removing one of <code>N</code> nodes only reassigns the keys in its arc — about <code>1/N</code> of keys (adding the next node, ~<code>1/(N+1)</code>) — instead of remapping the vast majority like <code>% N</code>. <strong>Virtual nodes</strong> (many ring points per backend) smooth out the otherwise lumpy key distribution and let you weight nodes. Essential for cache affinity and sharded routing."}
);

Object.assign(GLOSSARY_DATA, {
  "l4-vs-l7": {"term":"L4 vs L7 Load Balancing","group":"FND-LB","aliases":["l4","l7","layer 4","layer 7","l4 load balancing","l7 load balancing","application load balancer","network load balancer"],"eli5":"L4 moves packets by IP and port without looking inside; L7 reads the HTTP request and routes on its content.","memory":"Layer 4 = the <b>4-way</b> tuple (src IP, src port, dst IP, dst port). Layer 7 = the layer that speaks <b>HTTP words</b>.","full":"<p><b>L4 (transport-layer)</b> balancing operates on TCP/UDP — it sees <code>src/dst IP:port</code> and connection state, and typically forwards the original packets (DSR or NAT) without terminating the connection. That makes it cheap, low-latency, and protocol-agnostic, but blind to anything in the payload. <b>L7 (application-layer)</b> balancing <i>terminates</i> the client connection, parses HTTP/gRPC, and opens its own connection to a backend — enabling routing on <code>Host</code>/path/header/cookie, TLS termination, header rewriting, retries, and per-request observability.</p><p>The trade is cost vs control: L7 burns CPU per request and adds a hop of latency, but unlocks content-based routing and L7 retries/circuit-breaking. Modern stacks layer them: an L4 edge (or NLB) spreads raw connections across a fleet of L7 proxies that do the smart routing.</p>","trap":"Saying L7 is \"always better.\" L4 is the right tool for non-HTTP protocols, ultra-low-latency paths, or when you must preserve the client's source IP without header tricks — and it scales to far higher connection rates because it doesn't terminate or parse.","worked":"Route <code>/checkout</code> to the payments service and <code>/static</code> to a cache: only L7 can read the path. Spread 2M concurrent WebSocket connections across 50 proxies: let an L4 NLB do it — L7 termination would be wasted CPU.","related":["reverse-proxy","health-check","consistent-hashing"]},
  "lb-algorithms": {"term":"Load Balancing Algorithms","group":"FND-LB","aliases":["round-robin","round robin","weighted round-robin","least-connections","least connections","least-response-time","least response time","balancing algorithm"],"eli5":"The rule the balancer uses to pick which backend gets the next request.","memory":"<b>R-W-L-L-H</b>: Rotate, Weight, Least-conn, Least-latency, Hash — increasing awareness of real load.","full":"<p>The core family: <b>round-robin</b> (rotate evenly — assumes uniform requests and uniform backends); <b>weighted round-robin</b> (rotate proportionally to declared capacity — for heterogeneous fleets); <b>least-connections</b> (fewest active connections — tracks load when request durations vary); <b>least-response-time</b> (lowest measured latency, often blended with connection count — adapts to backend health, not just count); and <b>hash-based</b> (IP hash / <b>consistent hash</b> — for affinity and cache locality).</p><p>Pick by what your requests look like. Uniform, short requests on identical nodes → round-robin is fine and cheapest. Wildly variable durations → least-connections. Backends with variable latency (GC, cold cache, noisy neighbors) → least-response-time. Need a key to stick to a node → consistent hash. A common production default is least-request with the <b>power-of-two-choices</b> trick: sample two random backends and pick the lesser-loaded, getting most of least-connections' benefit with O(1) state.</p>","trap":"Claiming least-connections \"balances load.\" It balances <i>connection count</i>, which only proxies load when per-connection cost is uniform. One cheap node holding many idle keep-alives looks busy; a node with few connections doing heavy CPU looks idle. Use least-response-time when cost ≠ connection count.","worked":"A fleet has three 4-vCPU boxes and one 1-vCPU box. Plain round-robin sends 25% of traffic to the small box and overloads it while the big boxes idle. Weighted round-robin with weights <code>4,4,4,1</code> routes ~31% to each large box and ~8% to the small one, matching the split to capacity without any per-request load tracking.","related":["consistent-hashing","sticky-sessions","l4-vs-l7"]},
  "health-check": {"term":"Active vs Passive Health Checks","group":"FND-LB","aliases":["health check","health checks","healthcheck","active health check","passive health check","outlier detection"],"eli5":"Active checks poke each backend on a timer; passive checks watch real traffic and eject whatever is failing.","memory":"<b>Active = doctor's checkup</b> (scheduled, even when you feel fine); <b>Passive = ER visit</b> (you only show up because something actually broke).","full":"<p><b>Active</b> health checks send synthetic probes (e.g. <code>GET /healthz</code> every few seconds) and eject a backend after <code>unhealthy_threshold</code> consecutive failures, re-adding after <code>healthy_threshold</code> successes. They detect a dead or cold node even with zero live traffic. <b>Passive</b> checks (a.k.a. <b>outlier detection</b>) infer health from actual requests — consecutive 5xx, timeouts, or connection resets — catching real-world failures a shallow probe would miss, with no extra probe traffic.</p><p>The thresholds exist to provide <b>hysteresis</b> so a borderline node doesn't <b>flap</b> in and out. Two classic mistakes: probing a shared deep dependency in <code>/healthz</code> (one slow DB ejects the whole fleet simultaneously — a correlated failure), and making the probe so shallow it returns 200 while the app can't actually serve. Run active + passive together.</p>","trap":"\"A 200 from <code>/healthz</code> means the node is healthy.\" Only if the probe exercises the real serving path. A liveness probe that just returns 200 from the web layer keeps a node in rotation while its DB pool is exhausted — you need readiness semantics, and passive ejection as a backstop.","worked":"A node's disk fills; it still answers a trivial <code>/healthz</code> 200 (active passes) but throws 500s on real writes. Passive outlier detection sees the 5xx burst and ejects it within a few requests.","related":["connection-draining","lb-spof","l4-vs-l7"]},
  "sticky-sessions": {"term":"Sticky Sessions (Session Affinity)","group":"FND-LB","aliases":["sticky sessions","sticky session","session affinity","session stickiness","affinity cookie","source ip affinity"],"eli5":"Pinning a given client to the same backend every time so in-memory session state stays reachable.","memory":"Sticky = chewing gum under one desk: convenient until you need to switch desks (scale/fail over) and the gum doesn't come with you.","full":"<p>Stickiness binds a client to one backend, via an LB-issued <b>affinity cookie</b> (L7) or a <b>source-IP hash</b> (L4). It exists to keep server-local session state (login, cart, upload progress) reachable without a shared store. The price is paid in scalability: load gets <b>uneven</b> as long-lived clients accrete on specific nodes; <b>elasticity breaks</b> because a freshly added node only receives <i>new</i> sessions and can't relieve existing hot nodes; and a node failure/drain <b>loses</b> every session pinned to it.</p><p>Source-IP affinity additionally collapses under shared NAT/CGNAT (thousands of clients behind one IP all land on one backend) and reshuffles when the backend set changes unless consistent hashing backs it. The staff-level answer is to make backends <b>stateless</b> — externalize session state to Redis/Memcached or a signed token (JWT) — so any node can serve any request and stickiness becomes an optimization, not a correctness crutch.</p>","trap":"\"Sticky sessions are how you scale stateful apps.\" Backwards — they let you <i>avoid</i> fixing state, and they actively fight horizontal scaling and fast failover. The scalable pattern is stateless backends + shared session store; stickiness then only buys cache-locality.","worked":"Autoscaler adds 5 nodes during a spike. With stickiness, existing overloaded nodes keep their pinned users and the new nodes sit nearly idle (only new sessions route to them) — the scale-out doesn't relieve the hot spot.","related":["consistent-hashing","lb-algorithms","l4-vs-l7"]},
  "reverse-proxy": {"term":"Reverse Proxy vs Forward Proxy","group":"FND-LB","aliases":["reverse proxy","forward proxy","proxy","reverse-proxy","forward-proxy"],"eli5":"A reverse proxy fronts your servers and answers for them; a forward proxy fronts your clients and reaches the internet for them.","memory":"<b>Forward</b> proxy protects/serves the side it <i>forwards from</i> (clients, outbound). <b>Reverse</b> proxy protects the <i>reverse</i> side (servers, inbound).","full":"<p>A <b>reverse proxy</b> sits in front of backend <i>servers</i> and is the endpoint clients actually connect to. It acts on the servers' behalf: TLS termination, load balancing, response caching, compression, WAF/rate-limiting, and hiding backend topology. Clients have no idea which real server answered. A <b>forward proxy</b> sits in front of <i>clients</i> and acts on their behalf to reach origin servers — used for egress filtering/DLP in corporate networks, caching, and client anonymity. Here the <i>origin</i> sees the proxy's IP, not the client's.</p><p>Direction is the whole distinction: reverse = \"who clients reach to get <i>to</i> my services\"; forward = \"what my clients go <i>through</i> to reach the world.\" An L7 load balancer is a reverse proxy with balancing logic. The same software (nginx, Envoy, HAProxy) can play either role depending on which side it shields.</p>","trap":"Calling any proxy a \"reverse proxy\" because it caches. The defining question isn't the feature set — it's <i>whose behalf</i> it acts on and which side is hidden. A CDN is a reverse proxy (fronts origins); a corporate web gateway is a forward proxy (fronts employees).","worked":"Cloudflare/nginx in front of your API = reverse proxy (clients hit it, it hides your origins). A company's Squid gateway that all laptops must route outbound through = forward proxy (it hides/controls the clients).","related":["l4-vs-l7","lb-spof"]},
  "lb-spof": {"term":"LB as a SPOF — HA, Anycast & DNS LB","group":"FND-LB","aliases":["single point of failure","spof","ha pair","high availability pair","floating vip","vrrp","anycast","dns load balancing","dns round robin"],"eli5":"One load balancer in front of a redundant fleet just relocates the single point of failure — so the LB tier itself must be made redundant.","memory":"Don't guard the gold with one guard — and don't guard the <i>gate</i> with one guard either. HA pair guards the gate; anycast/DNS gives you many gates.","full":"<p>A lone LB is a <b>single point of failure</b>: lose it and the whole fleet behind it is unreachable. Inside a site you remove it with an <b>HA pair</b> — two LBs sharing a <b>floating VIP</b> via <b>VRRP</b> (active/passive: standby grabs the VIP on failover) or active/active. Across sites you remove the <i>entry-point</i> SPOF with <b>DNS load balancing</b> (multiple A-records, geo/weighted) or <b>anycast</b> (one IP advertised from many PoPs via BGP).</p><p><b>DNS LB</b> is coarse and slow to fail over: resolvers cache records past the TTL, so a dead endpoint keeps getting traffic until caches expire, and the split is only approximate. <b>Anycast</b> reconverges in seconds via BGP withdrawal and routes each client to the nearest PoP, but needs BGP and multi-site infrastructure. The LB tier's own health must be monitored independently — a healthy backend behind a wedged LB is still an outage.</p>","trap":"\"We're HA because we have two backends.\" Redundant backends behind one LB still fail wholesale when the LB dies. And \"DNS failover is instant\" — it isn't; client/resolver caching past TTL (and ignored TTLs) makes DNS failover unreliable for fast recovery.","worked":"Active/passive HAProxy pair, VIP <code>10.0.0.5</code> held by node A via VRRP. Node A dies → node B claims the VIP and broadcasts a gratuitous ARP within a second or two, so traffic continues with no DNS change and no client reconfiguration.","related":["health-check","connection-draining","reverse-proxy"]},
  "connection-draining": {"term":"Connection Draining","group":"FND-LB","aliases":["connection draining","draining","graceful shutdown","deregistration delay","drain timeout","graceful drain"],"eli5":"When pulling a backend out of rotation, stop sending it new requests but let the in-flight ones finish before killing it.","memory":"Draining = \"last call\" at a bar: no <i>new</i> drinks served, but everyone already holding one gets to finish before the lights go out.","full":"<p>Draining (a.k.a. <b>deregistration delay</b> / graceful shutdown) is how you remove a backend — for a deploy, scale-in, or maintenance — without dropping live work. The LB marks the node <code>DRAINING</code>: it stops routing <b>new</b> connections to it while allowing existing in-flight requests to complete, up to a <b>drain timeout</b>, after which remaining connections are forcibly closed. Skipping this resets active connections and returns errors mid-request to users who did nothing wrong.</p><p>It must be coordinated with the app: on <code>SIGTERM</code> the process should fail readiness/health (so the LB stops new traffic), keep serving open requests, then exit — and the drain timeout should exceed your longest reasonable request. For long-lived connections (WebSocket, gRPC streams) draining also means signaling clients to reconnect (e.g. <code>GOAWAY</code>) rather than waiting indefinitely.</p>","trap":"Conflating draining with a hard health-check failure. A failed health check ejects instantly and abandons in-flight requests; draining is the <i>graceful</i> path that keeps serving existing connections. Forgetting it during rolling deploys is a classic source of intermittent 502s.","worked":"Rolling deploy of a node serving 30s report queries with a 60s drain timeout: it's marked draining, finishes its open queries over the next ~30s with zero dropped requests, then terminates — instead of 502-ing every in-flight report.","related":["health-check","lb-spof"]}
});

</script>
