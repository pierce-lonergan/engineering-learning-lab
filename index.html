<script>
/* ACID & Transactions (DB-ACID) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-ACID","front":"What does each letter of ACID stand for?","back":"<strong>A</strong>tomicity (all-or-nothing), <strong>C</strong>onsistency (each txn moves the DB between valid states honoring declared constraints), <strong>I</strong>solation (concurrent txns don't observe each other's partial work), <strong>D</strong>urability (committed writes survive a crash). They are properties the DB engine guarantees around a <code>BEGIN</code>…<code>COMMIT</code> unit of work."},
  {"sec":"DB-ACID","front":"Atomicity: what mechanism implements rollback?","back":"The engine records <strong>undo</strong> information (the prior value / inverse of each change) before mutating data. On <code>ROLLBACK</code> the uncommitted changes are reversed by applying the undo records, so the transaction is all-or-nothing. In ARIES-style systems undo also runs during crash recovery for losers (txns uncommitted at crash time), after the redo pass has reconstructed state."},
  {"sec":"DB-ACID","front":"Why is the 'C' in ACID the weakest / most application-dependent letter?","back":"Consistency means a txn preserves <strong>declared invariants</strong> (PK/FK, <code>CHECK</code>, uniqueness, and any application-level rules). The DB only enforces what you've declared; logical correctness beyond that is the application's job. A/I/D are engine guarantees with their own mechanisms, whereas C is partly the developer's responsibility and is upheld <em>via</em> the A/I/D machinery — which is why many argue it doesn't really belong in the acronym."},
  {"sec":"DB-ACID","front":"How does ACID's 'C' differ from CAP's 'C'?","back":"They are <strong>unrelated despite sharing a word</strong>. ACID's Consistency = a single txn preserves declared integrity constraints/invariants. CAP's Consistency = <strong>linearizability</strong> across a distributed system (every read sees the latest committed write). Conflating them is a classic interview trap."},
  {"sec":"DB-ACID","front":"Isolation: what does the isolation LEVEL actually control?","back":"It picks a point on the correctness-vs-concurrency tradeoff by deciding which read <em>phenomena</em> are permitted. The ANSI standard defines levels by three: dirty read, non-repeatable read, and phantom. SQL levels (ascending): <code>READ UNCOMMITTED</code> → <code>READ COMMITTED</code> → <code>REPEATABLE READ</code> → <code>SERIALIZABLE</code>; higher levels forbid more phenomena at the cost of concurrency. (Write skew is a separate, snapshot-isolation anomaly the ANSI ladder doesn't name.)"},
  {"sec":"DB-ACID","front":"Which read phenomena does each SQL isolation level permit (per the ANSI standard)?","back":"<ul><li><code>READ UNCOMMITTED</code>: dirty + non-repeatable + phantom</li><li><code>READ COMMITTED</code>: non-repeatable + phantom (no dirty)</li><li><code>REPEATABLE READ</code>: phantom only</li><li><code>SERIALIZABLE</code>: none</li></ul>The standard defines levels by which phenomena are <em>allowed</em>, not by implementation; real MVCC engines often forbid more than required (e.g. Postgres <code>REPEATABLE READ</code> also blocks phantoms)."},
  {"sec":"DB-ACID","front":"What is the difference between a non-repeatable read and a phantom read?","back":"A <strong>non-repeatable read</strong>: re-reading the <em>same row</em> returns a different value because another txn committed an update/delete to it. A <strong>phantom read</strong>: re-running the same <em>predicate/range query</em> returns a different <em>set</em> of rows because another txn inserted or deleted rows matching the predicate. ANSI <code>REPEATABLE READ</code> blocks the former; <code>SERIALIZABLE</code> blocks both."},
  {"sec":"DB-ACID","front":"What real isolation level do Postgres and MySQL/InnoDB default to?","back":"<strong>Postgres</strong> defaults to <code>READ COMMITTED</code>. <strong>MySQL/InnoDB</strong> defaults to <code>REPEATABLE READ</code>. Both are MVCC engines, so even at these levels plain (non-locking) readers don't block writers. Don't state a universal default — it's vendor-specific."},
  {"sec":"DB-ACID","front":"Durability: what makes a COMMIT survive a crash?","back":"The <strong>write-ahead log (WAL)</strong> records the change and is forced to stable storage with <code>fsync</code> <em>before</em> <code>COMMIT</code> returns. Recovery replays the WAL (redo) so committed data persists even if dirty data pages never reached disk at crash time. Group commit batches fsyncs across concurrent commits to amortize the cost."},
  {"sec":"DB-ACID","front":"Why is WAL faster than flushing data pages on every commit?","back":"WAL turns scattered random page writes into a <strong>sequential log append</strong> — only the (small) log record must be fsync'd at commit; the actual data pages are flushed lazily/asynchronously at checkpoints. One sequential fsync of a log record is far cheaper than the random I/O of writing every touched heap/index page synchronously."},
  {"sec":"DB-ACID","front":"What is a SAVEPOINT and how does it interact with ROLLBACK?","back":"<code>SAVEPOINT s1</code> marks a point inside an open transaction. <code>ROLLBACK TO SAVEPOINT s1</code> undoes work done after the savepoint while <strong>keeping the transaction open</strong> and earlier work intact, enabling partial rollback (e.g. recover from one failed statement) without aborting the whole txn. <code>RELEASE SAVEPOINT s1</code> discards the marker, folding its work into the enclosing txn."},
  {"sec":"DB-ACID","front":"Walk through the transaction lifecycle and its terminal states.","back":"<code>BEGIN</code> (or <code>START TRANSACTION</code>) opens the txn → statements execute, optionally bracketed by <code>SAVEPOINT</code> markers → it ends in exactly one terminal state: <code>COMMIT</code> (durably persist all work, release locks) or <code>ROLLBACK</code>/abort (undo all work). A crash, deadlock-victim selection, or constraint violation forces an implicit abort."},
  {"sec":"DB-ACID","front":"What does BASE stand for and what does it trade away?","back":"<strong>B</strong>asically <strong>A</strong>vailable, <strong>S</strong>oft state, <strong>E</strong>ventually consistent. It favors availability (and partition tolerance) over strong consistency: reads may return stale data, state can change without new input as replicas reconcile in the background, and replicas converge over time. It's the philosophy of many AP-leaning stores (Dynamo, Cassandra, Riak)."},
  {"sec":"DB-ACID","front":"ACID vs BASE — what's the senior-level nuance beyond 'SQL vs NoSQL'?","back":"The split is about <strong>consistency/availability tradeoffs, not the data model</strong>. Many NoSQL/NewSQL systems offer ACID (Spanner and FoundationDB are strictly serializable; MongoDB multi-doc txns run snapshot isolation), while many SQL deployments run weak isolation or async read replicas that behave BASE-like. Judge a system by its actual isolation level and durability config, not its category label."},
  {"sec":"DB-ACID","front":"What is write skew, and which isolation levels allow vs prevent it?","back":"<strong>Write skew</strong>: two concurrent txns read an overlapping set, then update <em>different</em> rows in a way that jointly violates an invariant (e.g. two on-call doctors each check 'someone else is on call' and both go off-call). It is the signature anomaly of <strong>Snapshot Isolation</strong> — and so appears under the SI-based <code>REPEATABLE READ</code> of Postgres and InnoDB. It is prevented by <code>SERIALIZABLE</code> (Postgres uses SSI) or by materializing the conflict (<code>SELECT … FOR UPDATE</code>, an explicit lock, or a constraint forcing a write-write conflict)."},
  {"sec":"DB-ACID","front":"Does Snapshot Isolation prevent phantom reads?","back":"Yes — SI (and Postgres/InnoDB <code>REPEATABLE READ</code>) gives each txn a consistent snapshot, so a repeated range query sees the same set: no phantom by the classic ANSI definition. What SI does <em>not</em> prevent is <strong>write skew</strong> (and the read-only-transaction anomaly). So SI is strictly stronger than ANSI RR on phantoms yet still weaker than serializable — the two are not comparable on a single axis."}
);

Object.assign(GLOSSARY_DATA, {
  "atomicity": {"term":"Atomicity","group":"DB-ACID","aliases":["atomicity","atomic","all-or-nothing"],"eli5":"A transaction either fully happens or doesn't happen at all — never half.","memory":"Atomic = no splitting the atom; the txn is one indivisible particle.","full":"<p><b>Atomicity</b> guarantees that the statements in a transaction are an indivisible unit: on <code>COMMIT</code> all effects apply; on <code>ROLLBACK</code> or crash none do. It is implemented with <b>undo</b> information — the engine records the prior value (or an inverse operation) before each mutation so the change can be reversed.</p><p>During crash recovery, an ARIES-style engine first redoes all logged changes, then undoes the writes of 'loser' transactions (uncommitted at crash time) by walking the undo records. Atomicity says nothing about concurrency or durability — only that partial work is never left behind.</p>","trap":"Saying atomicity means 'transactions don't interfere.' That's Isolation. Atomicity is purely about all-or-nothing for one txn's own writes.","worked":"Transfer $100: debit A, then the server crashes before crediting B. Undo reverses the debit on recovery, so A is whole again — no money vanishes.","related":["isolation","durability","undo-log","transaction-lifecycle","savepoint"]},
  "consistency-acid": {"term":"Consistency (ACID)","group":"DB-ACID","aliases":["consistency","acid consistency","valid state"],"eli5":"Every committed transaction leaves the database obeying all its declared rules.","memory":"C = the database's Constitution: a txn can't pass a law that breaks the existing rules.","full":"<p><b>Consistency</b> in ACID means a transaction takes the database from one <b>valid state</b> to another, preserving all declared integrity constraints — primary/foreign keys, <code>UNIQUE</code>, <code>CHECK</code>, <code>NOT NULL</code> — and any application-defined invariants. If a statement would violate a declared constraint, the txn aborts.</p><p>Crucially the engine only enforces what you <i>declare</i>; broader logical correctness is the application's responsibility. This makes C the 'odd letter out': it's partly an application property and is upheld via the A/I/D machinery rather than a separate mechanism of its own.</p>","trap":"Confusing it with CAP's Consistency (linearizability). ACID-C is constraint preservation by a single txn; CAP-C is a distributed read-recency guarantee. Totally different concepts that share a word.","worked":"A <code>CHECK (balance >= 0)</code> constraint: any txn that would push balance negative is rejected, keeping every committed state valid.","related":["atomicity","isolation","durability","base"]},
  "isolation": {"term":"Isolation","group":"DB-ACID","aliases":["isolation","isolation level","concurrency control"],"eli5":"Concurrent transactions behave as if they ran one at a time — to the degree the isolation level promises.","memory":"Isolation = each txn in its own soundproof booth; the level sets how thick the walls are.","full":"<p><b>Isolation</b> governs what one transaction can observe of another's in-flight work. The <b>isolation level</b> chooses the tradeoff: stronger levels forbid more anomalies but reduce concurrency. The ANSI ladder is <code>READ UNCOMMITTED</code> → <code>READ COMMITTED</code> → <code>REPEATABLE READ</code> → <code>SERIALIZABLE</code>, defined by which of dirty/non-repeatable/phantom reads they permit.</p><p>Implementations differ: lock-based engines use shared/exclusive + range (next-key) locks; MVCC engines (Postgres, InnoDB) give each txn a consistent snapshot so plain readers don't block writers. Because MVCC differs from the lock-based model the standard assumed, vendors often forbid more anomalies than the level strictly requires — e.g. Postgres <code>REPEATABLE READ</code> is Snapshot Isolation, which also blocks phantoms (but still permits write skew).</p>","trap":"Assuming <code>SERIALIZABLE</code> means literal serial execution, or that two engines' same-named levels are identical. Levels are defined by which anomalies are allowed, and implementations vary widely.","worked":"At <code>READ COMMITTED</code> a report re-reading a row mid-txn can see a newer committed value (non-repeatable read); at <code>REPEATABLE READ</code> it sees the same snapshot throughout.","related":["atomicity","consistency-acid","isolation-level","write-skew","mvcc"]},
  "durability": {"term":"Durability","group":"DB-ACID","aliases":["durability","durable","persisted"],"eli5":"Once a commit returns success, the data won't be lost even if the server crashes a millisecond later.","memory":"Durable = written in the ledger (WAL) in ink before you're told 'done', not in pencil in RAM.","full":"<p><b>Durability</b> guarantees that the effects of a committed transaction survive crashes and power loss. It's achieved with a <b>write-ahead log</b>: the change record is forced to stable storage via <code>fsync</code> <i>before</i> <code>COMMIT</code> acknowledges. Recovery replays (redo) the WAL so committed changes are reconstructed even if their data pages never reached disk.</p><p>Durability is a tunable spectrum: synchronous local fsync (default), <code>synchronous_commit=off</code> in Postgres (fast but can lose the last few commits on crash), or synchronous replication (survives whole-node loss). Group commit batches many txns' fsyncs into one to raise throughput without weakening the guarantee.</p>","trap":"Claiming durability requires data pages on disk at commit. Only the WAL record must be fsync'd; dirty pages flush lazily at checkpoint. Also: durability ≠ surviving node loss unless you've configured synchronous replicas.","worked":"COMMIT fsyncs the WAL, power dies before the heap page flushes. On restart, redo replays the WAL record and the row reappears — commit honored.","related":["atomicity","write-ahead-log","transaction-lifecycle"]},
  "write-ahead-log": {"term":"Write-Ahead Log (WAL)","group":"DB-ACID","aliases":["write-ahead log","wal","redo log","write ahead logging"],"eli5":"Write down what you're about to change, durably, before you change the actual data.","memory":"WAL = 'write your intent in the captain's logbook before touching the ship.'","full":"<p>The <b>write-ahead log</b> enforces the rule: log the change record to durable storage <i>before</i> modifying the corresponding data page. This single sequential, fsync'd append underpins both Durability (redo committed txns on recovery) and Atomicity (undo information lets you reverse losers).</p><p>It's a performance win because it converts scattered random page writes into one sequential log write at commit, deferring the random heap/index I/O to asynchronous checkpoints. MySQL/InnoDB splits this into a redo log plus a separate undo log; Postgres keeps undo information in-row via MVCC and uses the WAL for redo. ARIES is the canonical algorithm (WAL + redo + undo + checkpoints + LSNs).</p>","trap":"Thinking WAL is only for durability. It's also the basis for redo on recovery, replication streaming, and point-in-time recovery; undo/rollback data lives alongside it (InnoDB undo log) or in MVCC row versions (Postgres).","worked":"Postgres COMMIT: WAL record fsync'd → ack returned → data page still dirty in shared_buffers → a later checkpoint writes it to disk.","related":["durability","atomicity","undo-log","transaction-lifecycle"]},
  "isolation-level": {"term":"Isolation Level","group":"DB-ACID","aliases":["isolation level","isolation levels","read committed","repeatable read","serializable","read uncommitted"],"eli5":"A dial that trades concurrency for how many read anomalies you're willing to tolerate.","memory":"RU < RC < RR < SER — fewer ghosts allowed as you climb; the price is contention/aborts.","full":"<p>An <b>isolation level</b> is defined by which phenomena it permits. ANSI ladder: <code>READ UNCOMMITTED</code> (allows dirty reads), <code>READ COMMITTED</code> (no dirty; allows non-repeatable + phantom), <code>REPEATABLE READ</code> (allows phantoms only, per the standard), <code>SERIALIZABLE</code> (none). Vendor defaults vary: <b>Postgres = Read Committed</b>, <b>InnoDB = Repeatable Read</b>.</p><p>Real engines often diverge from the standard. Postgres <code>REPEATABLE READ</code> is Snapshot Isolation (blocks phantoms but allows write skew); Postgres <code>SERIALIZABLE</code> uses SSI (Serializable Snapshot Isolation) to detect dangerous read-write dependencies and abort one txn. InnoDB <code>REPEATABLE READ</code> uses next-key (gap) locks on locking reads to suppress phantoms but behaves SI-like for plain reads (and exhibits write skew). Always pin the actual engine + level rather than reasoning from the abstract standard.</p>","trap":"Stating 'Repeatable Read prevents all anomalies.' Note the direction depends on implementation: lock-based ANSI RR blocks write skew but allows phantoms, whereas SI-based RR (Postgres/InnoDB) blocks phantoms but allows write skew. Only Serializable is anomaly-free either way.","worked":"InnoDB RR uses next-key (gap) locks on a <code>SELECT … FOR UPDATE</code> range scan so a repeated scan won't see phantoms — going beyond what the bare standard requires.","related":["isolation","write-skew","mvcc","consistency-acid"]},
  "write-skew": {"term":"Write Skew","group":"DB-ACID","aliases":["write skew","write-skew"],"eli5":"Two transactions each read a shared situation, then update different rows so that together they break a rule neither broke alone.","memory":"Skew = both doctors check 'someone else is on call', both clock off — phantom of safety, real gap.","full":"<p><b>Write skew</b> is the signature anomaly of Snapshot Isolation. Two concurrent txns read an overlapping data set, make decisions based on that snapshot, then write to <i>disjoint</i> rows. Because they don't write-conflict, MVCC's first-committer-wins check doesn't fire and both commit — but their combined effect violates an invariant that held in each individual snapshot.</p><p>It is allowed under Snapshot Isolation, and therefore under the SI-based <code>REPEATABLE READ</code> of Postgres and InnoDB. (By contrast, a strict lock-based ANSI RR prevents it — the levels differ by implementation.) It is prevented by <code>SERIALIZABLE</code> (Postgres via SSI dependency detection) or by manually materializing the conflict — <code>SELECT … FOR UPDATE</code>, an explicit lock row, or a constraint that forces a write-write conflict.</p>","trap":"Believing Snapshot Isolation = Serializable. SI prevents dirty/non-repeatable reads and phantoms but NOT write skew or the read-only-transaction anomaly. Note write skew is NOT one of the three ANSI phenomena — the standard ladder doesn't even name it.","worked":"On-call constraint 'at least 1 doctor on call'. Alice and Bob each read count=2, each set themselves off-call; both commit at SI → count=0, invariant broken.","related":["isolation-level","isolation","mvcc"]},
  "base": {"term":"BASE","group":"DB-ACID","aliases":["base","basically available","eventually consistent","soft state"],"eli5":"Stay available and let replicas agree later, instead of locking everything to stay perfectly consistent now.","memory":"Acid vs Base — chemistry pun: ACID is strict/reactive-now, BASE is mellow/settles-later. Eventually = soft.","full":"<p><b>BASE</b> — Basically Available, Soft state, Eventually consistent — is the design philosophy positioned opposite ACID. It prioritizes availability (and partition tolerance): the system answers reads/writes even during partitions (possibly with stale data), state can change in the background as replicas reconcile, and all replicas converge given no new writes.</p><p>It's the operating model of AP-leaning stores (Dynamo, Cassandra, Riak). The key senior framing: BASE vs ACID is a <b>consistency/availability spectrum, not a data-model or SQL/NoSQL distinction</b> — Spanner and FoundationDB are NoSQL-era yet strictly serializable, MongoDB multi-doc txns are ACID at snapshot isolation, while a SQL DB read off async replicas behaves BASE-like.</p>","trap":"Equating BASE with NoSQL and ACID with relational. Many NoSQL systems are ACID; many relational deployments (read replicas, weak isolation) behave BASE-like.","worked":"Write to a Cassandra cluster with consistency ONE: ack returns before all replicas update; a read from another replica may briefly return the old value until anti-entropy/read-repair converges.","related":["consistency-acid","durability","isolation"]},
  "transaction-lifecycle": {"term":"Transaction Lifecycle","group":"DB-ACID","aliases":["transaction lifecycle","begin","commit","rollback","start transaction","abort"],"eli5":"A transaction opens, does work (maybe with checkpoints), then either fully commits or fully unwinds.","memory":"BEGIN → work (with SAVEPOINT bookmarks) → COMMIT or ROLLBACK. One door in, two doors out.","full":"<p>A transaction starts with <code>BEGIN</code> / <code>START TRANSACTION</code>, executes statements (optionally bracketed with <code>SAVEPOINT</code> markers for partial rollback), and ends in exactly one terminal state: <code>COMMIT</code> (durably persist all work, release locks/visibility) or <code>ROLLBACK</code>/abort (undo everything). A crash, deadlock-victim selection, or constraint violation forces an implicit abort.</p><p>Many engines also run in <b>autocommit</b> mode where each lone statement is its own implicit transaction. The lifecycle ties the four guarantees together: atomicity covers the BEGIN→COMMIT span, isolation governs what's visible during it, consistency is checked before COMMIT succeeds, and durability is locked in at COMMIT.</p>","trap":"Assuming a failed statement auto-rolls-back the whole txn everywhere. Postgres aborts the txn (you must ROLLBACK, or roll back to a savepoint); some engines let you continue past the error. Behavior is engine-specific.","worked":"<code>BEGIN; UPDATE …; SAVEPOINT s1; UPDATE …(fails); ROLLBACK TO s1; UPDATE …; COMMIT;</code> — the first update survives, the failed one is undone.","related":["atomicity","durability","savepoint","consistency-acid"]},
  "savepoint": {"term":"Savepoint","group":"DB-ACID","aliases":["savepoint","savepoints","nested transaction"],"eli5":"A bookmark inside a transaction you can rewind to without throwing away the whole thing.","memory":"Savepoint = a checkpoint flag in a video game level — die, respawn here, not at the start.","full":"<p>A <b>savepoint</b> (<code>SAVEPOINT name</code>) is a named marker within an open transaction. <code>ROLLBACK TO SAVEPOINT name</code> undoes work performed after the marker while leaving the transaction open and all earlier work intact; <code>RELEASE SAVEPOINT name</code> discards the marker (merging its work into the outer txn). Together they provide nested/partial rollback semantics.</p><p>Internally a savepoint records a position in the undo log / a sub-transaction id, so rollback simply reverses records back to that point. They're the mechanism ORMs use to emulate nested transactions and to retry a single failed statement without aborting a large batch.</p>","trap":"Thinking ROLLBACK TO a savepoint ends the transaction. It does not — the txn stays open and you must still COMMIT or ROLLBACK the whole thing.","worked":"Bulk import: wrap each row in a savepoint; on a duplicate-key error, <code>ROLLBACK TO</code> that savepoint, skip the row, and keep importing inside one transaction.","related":["transaction-lifecycle","atomicity","undo-log"]}
});

</script>

<script>
/* Indexing (DB-INDEX) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-INDEX","front":"What does an index fundamentally trade away, and what does it buy?","back":"An index buys faster reads (point lookups, range scans, sorted retrieval, and sometimes <code>ORDER BY</code>/<code>GROUP BY</code> without a sort) at the cost of <strong>extra storage</strong> and <strong>slower writes</strong> — every <code>INSERT</code>/<code>DELETE</code>, and every <code>UPDATE</code> that changes an <em>indexed</em> column, must also maintain the index structure. It is a classic space-and-write-cost-for-read-speed trade, so each index should earn its keep against the query mix."},
  {"sec":"DB-INDEX","front":"Clustered vs non-clustered index: what is physically different?","back":"A <strong>clustered index</strong> stores the table rows themselves in the leaf nodes, physically ordered by the index key — so the index <em>is</em> the table. A <strong>non-clustered (secondary) index</strong> is a separate structure whose leaves hold the key plus a pointer back to the row. A table can have at most one clustered index (rows can be ordered only one way) but many secondary indexes."},
  {"sec":"DB-INDEX","front":"Why does an InnoDB secondary index require two lookups?","back":"InnoDB secondary-index leaves store the indexed column(s) plus the <strong>primary key value</strong> (not a physical row address). To fetch non-indexed columns the engine takes the PK from the secondary index and walks the clustered (PK) B-tree a second time — a <strong>bookmark lookup</strong>. This is why a fat PK bloats every secondary index, and why covering indexes (which skip the second walk) are so valuable in InnoDB."},
  {"sec":"DB-INDEX","front":"What is a covering index / index-only scan?","back":"A <strong>covering index</strong> contains every column a query references (in the key or as <code>INCLUDE</code> columns), so the engine answers entirely from the index and never touches the table heap or clustered index — an <strong>index-only scan</strong>. This eliminates the per-row bookmark/heap lookup, which is often the dominant cost when a query matches many rows but only needs a few columns."},
  {"sec":"DB-INDEX","front":"State the leftmost-prefix rule for composite indexes.","back":"A composite index on <code>(a, b, c)</code> can be used to satisfy predicates on a <em>contiguous left prefix</em>: <code>(a)</code>, <code>(a, b)</code>, or <code>(a, b, c)</code>. A query filtering only on <code>b</code>, only on <code>c</code>, or on <code>(b, c)</code> generally cannot seek the index, because the rows are ordered by <code>a</code> first. Column order is therefore a design decision, not arbitrary."},
  {"sec":"DB-INDEX","front":"On a composite index (a, b, c), what happens after a range predicate on a column?","back":"The index can <strong>seek</strong> using equality predicates up to and including the first <strong>range</strong> column, but columns to its right can no longer be used for seeking — only for filtering within the matched range. For <code>WHERE a = ? AND b &gt; ? AND c = ?</code>, the index seeks on <code>a</code> and the <code>b</code> range, but <code>c</code> is just a residual filter. Put equality columns before range columns."},
  {"sec":"DB-INDEX","front":"What are selectivity and cardinality, and how do they relate?","back":"<strong>Cardinality</strong> is the number of distinct values in a column; <strong>selectivity</strong> is roughly distinct values / total rows (how well a value narrows the result). High cardinality usually means high selectivity. The planner uses these statistics to estimate how many rows a predicate returns and whether an index seek beats a scan."},
  {"sec":"DB-INDEX","front":"Why do low-selectivity columns (e.g. a boolean) index poorly?","back":"A predicate like <code>is_active = true</code> might match 60% of rows. Reading the index then doing a <strong>random</strong> bookmark/heap lookup for each of those rows is far slower than one <strong>sequential</strong> table scan, so the planner correctly ignores the index. Indexes pay off when a predicate is selective enough that random index-driven access beats sequential scanning — often a single-digit-percent rule of thumb."},
  {"sec":"DB-INDEX","front":"Name the concrete ways an extra index can HURT.","back":"<ul><li><strong>Write amplification</strong>: every insert/delete, and updates that change the indexed column, maintain the index (more B-tree splits, more WAL/redo).</li><li><strong>Storage + memory</strong>: it consumes disk and competes for buffer-pool/cache pages.</li><li><strong>Planner cost</strong>: more candidate paths to evaluate, and risk of a bad plan.</li><li><strong>Bloat/fragmentation</strong>: churn leaves dead entries until rebuilt/vacuumed.</li></ul>"},
  {"sec":"DB-INDEX","front":"What is index bloat and what causes it?","back":"<strong>Bloat</strong> is index pages becoming sparsely filled with dead or stale entries over time. In Postgres, MVCC means an <code>UPDATE</code> can create a new tuple version and a new index entry, leaving the old ones for <code>VACUUM</code>; heavy churn or long-lived transactions blocking cleanup leave half-empty pages. The fix is <code>REINDEX</code>/<code>VACUUM</code>; mitigations include <code>fillfactor</code> and (Postgres) HOT updates that avoid index churn when no indexed column changes."},
  {"sec":"DB-INDEX","front":"What is a partial (filtered) index and when does it win?","back":"A <strong>partial index</strong> indexes only rows matching a <code>WHERE</code> predicate, e.g. <code>CREATE INDEX ... WHERE status = 'pending'</code>. It is smaller, cheaper to maintain, and ideal when queries always target a small hot subset (active rows, soft-deleted = false) or when you want a unique constraint over a subset. Postgres calls these <em>partial</em> indexes; SQL Server calls them <em>filtered</em> indexes."},
  {"sec":"DB-INDEX","front":"What is an expression / functional index, and what trap does it solve?","back":"An <strong>expression (functional) index</strong> indexes the result of an expression rather than a raw column, e.g. <code>CREATE INDEX ... ON users (lower(email))</code>. It exists because a predicate that wraps a column in a function — <code>WHERE lower(email) = ?</code> — makes the column <strong>non-sargable</strong> and disables a plain index; the query must match the indexed expression <em>exactly</em> for the index to be used."},
  {"sec":"DB-INDEX","front":"Hash index vs B-tree index: when would you choose a hash index?","back":"A <strong>B-tree</strong> supports equality <em>and</em> range/sort/prefix queries in <code>O(log n)</code> and is the sensible default. A <strong>hash</strong> index supports only equality (<code>=</code>) — no ranges, no <code>ORDER BY</code>, no leftmost-prefix — but offers O(1)-ish point lookups and can be smaller for long keys. In modern Postgres (v10+) hash indexes are WAL-logged and crash-safe, yet B-tree is still preferred unless you have pure equality on a large/long key."},
  {"sec":"DB-INDEX","front":"Why is InnoDB's choice of primary key so consequential?","back":"InnoDB tables are <strong>clustered on the PK</strong>, and every secondary index stores the PK as its row pointer. A large or random PK (e.g. a random UUIDv4) therefore (1) bloats every secondary index by repeating the wide key, and (2) causes random insert positions in the clustered tree → page splits and poor locality. A small, monotonically increasing key (auto-increment, or a time-ordered UUIDv7) keeps inserts append-mostly and indexes compact."},
  {"sec":"DB-INDEX","front":"Why is a query predicate that wraps the column in a function 'non-sargable'?","back":"<strong>Sargable</strong> = Search ARGument ABLE: the engine can use the index B-tree's ordering to seek. <code>WHERE date_col &gt;= '2026-01-01'</code> is sargable; <code>WHERE year(date_col) = 2026</code> is not, because the index is ordered by <code>date_col</code>, not by <code>year(date_col)</code> — so the engine must compute the function for every row (a scan). The fix is to rewrite as a range, or build a matching expression index."},
  {"sec":"DB-INDEX","front":"How does column order in a composite index affect covering and sort elimination?","back":"Beyond the leftmost-prefix seek rule, a composite index also stores rows <strong>pre-sorted</strong> by its key order, so an index on <code>(a, b)</code> can satisfy <code>ORDER BY a, b</code> (and <code>WHERE a = ? ORDER BY b</code>) without a sort step. Adding the columns a query <em>selects</em> (or putting them in <code>INCLUDE</code>) can also make it covering. So order columns by: equality predicates first, then the range/sort column, then included payload."}
);

Object.assign(GLOSSARY_DATA, {
  "clustered-index": {"term":"Clustered Index","group":"DB-INDEX","aliases":["clustered index","clustering index","index-organized table","clustered"],"eli5":"The table's rows are physically stored sorted by this key, so the index IS the table.","memory":"Clustered = the rows live IN the index leaves. There can be only one physical order, so only one clustered index.","full":"<p>A clustered index determines the <b>physical storage order</b> of the table's rows: the leaf level of the B-tree holds the full rows, ordered by the clustering key. Because rows can only be laid out one way, a table has <b>at most one</b> clustered index. InnoDB always clusters on the primary key (or a hidden rowid if none is declared); SQL Server makes the PK clustered by default but lets you choose; Postgres heap tables are <i>not</i> clustered (the one-shot <code>CLUSTER</code> command only reorders once and does not maintain order).</p><p>Range scans and PK lookups on a clustered table are fast and sequential because matching rows are physically adjacent. The cost is that every secondary index must reference rows <i>by the clustering key</i>, so a wide or random clustering key penalizes the whole schema.</p>","trap":"Saying 'the clustered index points to the rows.' It doesn't point — the leaf level <i>contains</i> the rows. The pointer model is the non-clustered/secondary index.","worked":"InnoDB <code>orders</code> table clustered on <code>order_id</code>: <code>SELECT * FROM orders WHERE order_id BETWEEN 100 AND 200</code> reads one contiguous run of leaf pages — no secondary lookup.","related":["secondary-index","innodb-pk-clustering","covering-index"]},
  "secondary-index": {"term":"Secondary (Non-Clustered) Index","group":"DB-INDEX","aliases":["secondary index","non-clustered index","nonclustered index","secondary indexes","bookmark lookup"],"eli5":"A separate sorted structure that points back to the rows instead of storing them.","memory":"Secondary index = signpost, not the destination. In InnoDB the signpost says 'go ask the PK tree.'","full":"<p>A secondary index is a B-tree separate from the table data; its leaves store the indexed key plus a <b>row locator</b>. The form of that locator is the key tradeoff: a heap-organized engine (Postgres, SQL Server heap) stores a physical address (ctid / RID), while <b>InnoDB stores the primary-key value</b>. With a PK locator, retrieving non-indexed columns requires a second traversal of the clustered index — a <b>bookmark lookup</b> — costing an extra B-tree descent per row.</p><p>Secondary indexes are how you serve queries that don't filter on the PK. Their downside is maintenance: every secondary index must be updated when its indexed columns change, and (in InnoDB) each repeats the full PK in every leaf entry.</p>","trap":"Assuming a secondary index always lets you avoid touching the table. Only a <i>covering</i> index does; otherwise you pay the bookmark/heap lookup per matched row.","worked":"InnoDB index on <code>email</code>: <code>WHERE email = ?</code> finds the PK in the email index, then re-descends the clustered PK tree to read <code>name</code>, <code>created_at</code>, etc. Two descents.","related":["clustered-index","covering-index","innodb-pk-clustering"]},
  "covering-index": {"term":"Covering Index","group":"DB-INDEX","aliases":["covering index","index-only scan","index only scan","covering indexes","INCLUDE columns"],"eli5":"An index that holds every column the query needs, so the engine never reads the table.","memory":"Covering = the index 'covers' the whole query, so the table never gets a phone call.","full":"<p>A query is <b>covered</b> when all columns it references (in <code>SELECT</code>, <code>WHERE</code>, <code>JOIN</code>, <code>ORDER BY</code>) are present in a single index. The planner then performs an <b>index-only scan</b>, answering from the index B-tree alone and skipping the heap/clustered lookup — eliminating the per-row random I/O that usually dominates. Postgres and SQL Server let you add non-key payload columns via <code>INCLUDE</code>, keeping them in the leaf only (so they don't affect ordering or the key-size limit).</p><p>Caveat: Postgres index-only scans still consult the <b>visibility map</b>; if a page isn't all-visible (recently updated, not yet vacuumed), it falls back to a heap fetch. So covering is a planner opportunity, not an absolute guarantee on every row.</p>","trap":"Thinking <code>INCLUDE</code> columns help filtering. They're payload only — usable for output/covering, but not for seeking; only key columns drive the seek and ordering.","worked":"<code>CREATE INDEX ix ON orders(customer_id) INCLUDE (status, total)</code> covers <code>SELECT status,total FROM orders WHERE customer_id=?</code> — index-only, no heap fetch.","related":["secondary-index","composite-index","selectivity"]},
  "composite-index": {"term":"Composite Index (Leftmost-Prefix)","group":"DB-INDEX","aliases":["composite index","compound index","multi-column index","multicolumn index","leftmost prefix","leftmost-prefix"],"eli5":"One index on several columns, usable only from the left edge inward.","memory":"Read the index like a phone book sorted by (last, first): you can find 'Smith' or 'Smith, John' but not all the 'John's.","full":"<p>A composite index on <code>(a, b, c)</code> sorts entries by <code>a</code>, then <code>b</code> within equal <code>a</code>, then <code>c</code>. This ordering means it can <b>seek</b> only on a contiguous <b>leftmost prefix</b>: <code>(a)</code>, <code>(a,b)</code>, or <code>(a,b,c)</code>. A predicate on <code>b</code> alone cannot seek because <code>b</code> values are scattered across every <code>a</code> bucket. Equally, once you hit a <b>range</b> predicate, columns to its right stop being seekable and become residual filters — so equality columns belong before range/sort columns.</p><p>Column order also controls <b>sort elimination</b> (the index can serve a matching <code>ORDER BY</code> with no sort) and whether the index <b>covers</b> a query. One well-ordered composite index often replaces several single-column ones.</p>","trap":"Believing column order doesn't matter / that <code>(a,b)</code> serves a lone <code>WHERE b=?</code>. It doesn't — the planner can't seek a non-leading column.","worked":"Index <code>(tenant_id, created_at)</code>: serves <code>WHERE tenant_id=? ORDER BY created_at</code> with no sort, but is useless for <code>WHERE created_at &gt; ?</code> across all tenants.","related":["covering-index","selectivity","sargable"]},
  "selectivity": {"term":"Selectivity & Cardinality","group":"DB-INDEX","aliases":["selectivity","cardinality","low-selectivity","low selectivity","high cardinality","selective"],"eli5":"How well a value narrows the rows down — a unique id is great, a boolean is terrible.","memory":"Selective = picky. A picky predicate (few rows) loves an index; a permissive one (most rows) prefers a scan.","full":"<p><b>Cardinality</b> = number of distinct values in a column; <b>selectivity</b> ≈ distinct values ÷ total rows (or, for a predicate, the fraction of rows it returns — lower fraction = more selective). The optimizer uses column statistics (histograms, n_distinct, MySQL's sampled index cardinality) to estimate rows returned and decide between an <b>index seek</b> (random access, good when few rows match) and a <b>sequential scan</b> (good when many rows match).</p><p>A low-selectivity column indexes poorly: matching a large fraction of rows turns the index into a slow series of random lookups that a single sequential scan beats. This is why booleans, status enums, and gender columns rarely warrant a standalone index — though they can be useful as a <i>partial</i> index or as a secondary column in a composite index.</p>","trap":"Indexing a low-cardinality flag and expecting a speedup. The planner often ignores it; if it doesn't, the random I/O can be slower than the scan it replaced.","worked":"10M rows, <code>is_active</code> true for 6M: <code>WHERE is_active=true</code> via index = 6M random fetches; a seq scan reading 10M sequentially is cheaper, so the planner scans.","related":["partial-index","composite-index","covering-index"]},
  "innodb-pk-clustering": {"term":"InnoDB PK Clustering","group":"DB-INDEX","aliases":["innodb primary key","innodb clustering","pk clustering","secondary index stores the pk","random uuid primary key"],"eli5":"InnoDB stores rows sorted by primary key, and every other index points via that primary key.","memory":"InnoDB row pointer = the PK itself. So the PK is paid for twice: clustering order AND every secondary leaf.","full":"<p>InnoDB is always <b>index-organized on the primary key</b>: the clustered index leaves hold the rows, ordered by PK. Critically, <b>secondary indexes store the PK value as their row pointer</b>, not a physical address. Two consequences follow. First, every secondary index repeats the full PK in each entry, so a wide PK bloats the entire index set. Second, the PK's insertion pattern dictates write locality.</p><p>A <b>monotonic</b> PK (auto-increment, time-ordered UUIDv7) means inserts append to the rightmost page — minimal splits, dense pages, good cache behavior. A <b>random</b> PK (UUIDv4) scatters inserts across the tree, causing page splits, fragmentation, and write amplification. This is the canonical 'don't use random UUIDs as your InnoDB PK' result; if you need a UUID, use a time-ordered variant or keep an internal auto-increment PK and a unique secondary index on the UUID.</p>","trap":"Choosing a random UUIDv4 as the InnoDB PK 'for distribution.' It maximizes page splits and bloats every secondary index — the opposite of what you want in a clustered engine.","worked":"Switching a high-insert InnoDB table from UUIDv4 PK to auto-increment PK (UUID as unique secondary) typically shrinks indexes and cuts insert-time page splits dramatically.","related":["clustered-index","secondary-index"]},
  "sargable": {"term":"Sargability & Expression Indexes","group":"DB-INDEX","aliases":["sargable","sargability","non-sargable","expression index","functional index","function-based index"],"eli5":"A predicate is sargable if the engine can use the index's sort order to seek it.","memory":"SARGable = Search-ARGument-able. Touch the column with a function and you've broken the search argument.","full":"<p><b>SARGable</b> (Search ARGument ABLE) describes a predicate the engine can satisfy by <b>seeking</b> the B-tree rather than scanning. Wrapping the indexed column in a function or arithmetic breaks this: <code>WHERE lower(email)=?</code>, <code>WHERE year(d)=2026</code>, or <code>WHERE col+0=5</code> force a per-row computation because the index is ordered by the <i>raw</i> column, not the expression. Leading-wildcard <code>LIKE '%x'</code> is likewise non-sargable.</p><p>The fixes: rewrite as a range (<code>d &gt;= '2026-01-01' AND d &lt; '2027-01-01'</code>), or build an <b>expression/functional index</b> that indexes the exact expression (<code>CREATE INDEX ON users (lower(email))</code>). The query predicate must match the indexed expression textually/semantically for the planner to use it.</p>","trap":"Adding a plain index on <code>email</code> and expecting <code>WHERE lower(email)=?</code> to use it. It won't — you need an expression index on <code>lower(email)</code> (or to store a normalized column).","worked":"Slow: <code>WHERE year(created_at)=2026</code> (scan). Fast: <code>WHERE created_at &gt;= '2026-01-01' AND created_at &lt; '2027-01-01'</code> (seek on the existing B-tree).","related":["composite-index","partial-index","btree-vs-hash"]},
  "partial-index": {"term":"Partial / Filtered Index","group":"DB-INDEX","aliases":["partial index","filtered index","partial indexes","conditional index"],"eli5":"An index that only includes rows matching a condition, so it's small and cheap.","memory":"Partial = index the hot rows only. Tiny index, big win — as long as the query's WHERE matches the index's WHERE.","full":"<p>A partial index (Postgres term; <b>filtered index</b> in SQL Server) applies a <code>WHERE</code> clause at index-build time so only matching rows are stored. It shines when queries always target a small, hot subset — <code>WHERE status='pending'</code>, <code>WHERE deleted_at IS NULL</code> — because the index is far smaller, cheaper to maintain, and stays cache-resident. It can also enforce a <b>scoped uniqueness</b> (e.g. unique <code>username</code> only among non-deleted rows).</p><p>The catch: the planner can only use the partial index when it can prove the query predicate <b>implies</b> the index's filter. <code>WHERE status='pending'</code> matches an index built <code>WHERE status='pending'</code>; a parameterized <code>WHERE status=?</code> may not, since the value isn't known to satisfy the filter at plan time.</p>","trap":"Building a partial index then querying with a variable that the planner can't prove satisfies the filter — the index silently goes unused.","worked":"<code>CREATE INDEX ix ON jobs(created_at) WHERE status='queued'</code>: a worker polling <code>WHERE status='queued' ORDER BY created_at</code> scans a tiny index even if 99% of the table is 'done'.","related":["selectivity","sargable"]},
  "btree-vs-hash": {"term":"B-tree vs Hash Index","group":"DB-INDEX","aliases":["b-tree index","btree index","hash index","btree vs hash","index type"],"eli5":"B-tree handles ranges and sorting; hash only does exact-match equality.","memory":"B-tree = sorted (ranges + order). Hash = scattered buckets (equality only). Need a range? You need a tree.","full":"<p>A <b>B-tree</b> (technically B+tree) keeps keys sorted, giving <code>O(log n)</code> equality lookups <i>and</i> range scans, <code>ORDER BY</code> elimination, leftmost-prefix matching, and <code>LIKE 'prefix%'</code>. It is the default for almost everything. A <b>hash index</b> maps keys to buckets, giving fast <b>equality-only</b> lookups (<code>=</code>) but no ordering, no ranges, no prefix, no composite-prefix use.</p><p>Choose hash only for pure point-lookups on a large/long key where O(1)-style access and a smaller footprint matter. Note vendor history: Postgres hash indexes were not WAL-logged (crash-unsafe, discouraged) before v10; since v10 they are WAL-logged and crash-safe, yet B-tree remains the recommended default. (Distinct from MySQL/InnoDB's automatic, in-memory <i>adaptive hash index</i>, which you don't create explicitly.)</p>","trap":"Reaching for a hash index for general use. It can't do ranges, sorts, or prefixes, so it loses most of what indexes are used for — B-tree is the safe default.","worked":"<code>WHERE token = ?</code> on a long random token column: a hash index is a legitimate fit. <code>WHERE created_at BETWEEN ? AND ?</code>: hash is useless, B-tree required.","related":["composite-index","sargable","covering-index"]}
});

</script>

<!-- content: 12-db-iso.js -->
<script>
/* Isolation Levels & Anomalies (DB-ISO) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DB-ISO","front":"The four ANSI/ISO SQL isolation levels, weakest to strongest","back":"<ul><li><code>READ UNCOMMITTED</code></li><li><code>READ COMMITTED</code></li><li><code>REPEATABLE READ</code></li><li><code>SERIALIZABLE</code></li></ul>The standard defines each level by which of three phenomena it <em>must</em> prevent — dirty read, non-repeatable read, phantom read — not by an implementation. A level may prevent <em>more</em> than required (e.g. Postgres <code>REPEATABLE READ</code> also blocks phantoms)."},
  {"sec":"DB-ISO","front":"The three phenomena the ANSI standard uses to define isolation levels, and which level first prevents each","back":"<ul><li><strong>Dirty read</strong> — prevented at <code>READ COMMITTED</code> and above.</li><li><strong>Non-repeatable read</strong> — prevented at <code>REPEATABLE READ</code> and above.</li><li><strong>Phantom read</strong> — prevented only at <code>SERIALIZABLE</code> (per the standard's floor).</li></ul>Each stronger level forbids one additional phenomenon. The standard specifies <em>phenomena prevented</em>, leaving the mechanism (locking vs. MVCC) to the engine."},
  {"sec":"DB-ISO","front":"Dirty read vs. non-repeatable read vs. phantom read — distinguish precisely","back":"<ul><li><strong>Dirty read</strong>: you read a row another txn wrote but has <em>not committed</em> (it may still roll back).</li><li><strong>Non-repeatable read</strong>: you re-read the <em>same row</em> and its value changed because another txn committed an <code>UPDATE</code>/<code>DELETE</code> in between.</li><li><strong>Phantom read</strong>: you re-run the <em>same predicate query</em> and the <em>set of rows</em> changes because another txn committed an <code>INSERT</code>/<code>DELETE</code> matching that predicate.</li></ul>Key axis: dirty = uncommitted data; non-repeatable = a row mutated; phantom = the membership of a result set changed."},
  {"sec":"DB-ISO","front":"Why is the original ANSI SQL-92 isolation definition considered flawed (Berenson et al., 1995)?","back":"The phenomena are written in ambiguous English: under a <em>strict</em> reading they exclude more interleavings than intended, while the locking interpretation the committee had in mind is narrower. Critically, the three named phenomena <strong>fail to characterize Snapshot Isolation</strong>, which prevents all three yet still permits <strong>lost update</strong> and <strong>write skew</strong> and is not serializable. The 1995 critique added phenomena including P4 (lost update) and A5B (write skew) to close the gap."},
  {"sec":"DB-ISO","front":"Lost update anomaly — what it is and which levels prevent it","back":"Two txns read the same value, each computes a new value from it, and both write — the second overwrites the first, so one update is silently lost (the read-modify-write race in <em>app code</em>, e.g. read <code>balance</code>, add 10, write back). <code>READ COMMITTED</code> does <strong>not</strong> protect this read-then-write gap. Snapshot Isolation prevents it via first-committer-wins (the second writer aborts). Under weaker levels, defend with <code>SELECT ... FOR UPDATE</code>, an atomic in-place <code>UPDATE ... SET x = x + 1</code>, or compare-and-set on a version column."},
  {"sec":"DB-ISO","front":"Write skew — the canonical example and why it's dangerous","back":"Two txns read an overlapping data set, each checks an invariant that currently holds, then each writes to a <em>different</em> row, and together they violate the invariant. Classic: two doctors both on call; each checks \"at least one other is on call\" (true), each takes themselves off call concurrently, leaving zero on call. Dangerous because each txn in isolation is correct — the conflict is on the <em>predicate that was read</em>, not on any single written row, so write-write conflict detection misses it."},
  {"sec":"DB-ISO","front":"Why does Snapshot Isolation prevent lost update but NOT write skew?","back":"SI gives each txn a consistent snapshot and uses <strong>first-committer-wins</strong>: if two concurrent txns write the <em>same</em> row, the second to commit aborts. Lost update is two writes to the same row, so it is caught. Write skew is two writes to <em>different</em> rows whose combination breaks an invariant, so no write-write conflict exists and first-committer-wins sees nothing to abort. SI detects only write-write conflicts, never the read-write (predicate) conflicts that cause write skew."},
  {"sec":"DB-ISO","front":"Read skew (read-only anomaly) — what it is, and why SI eliminates it","back":"A read-only transaction observes an <em>inconsistent</em> view by reading two related items across a concurrent committed update — e.g. read account A before a transfer commits, then read account B after, so money appears to vanish. Snapshot Isolation eliminates read skew because the whole txn reads from one consistent snapshot. This is a major reason SI is popular despite still allowing write skew. (Read-committed, which re-snapshots per statement, does <em>not</em> prevent read skew.)"},
  {"sec":"DB-ISO","front":"What is Snapshot Isolation (SI) and how is it implemented?","back":"Each transaction reads from a <strong>consistent snapshot</strong> of the database as of its start (or first statement), implemented with <strong>MVCC</strong>: writers create new row versions and never block readers; readers see only versions committed before their snapshot. Writes are validated at commit with <strong>first-committer-wins</strong> on write-write conflicts. SI prevents dirty, non-repeatable, phantom, lost-update, and read-skew anomalies — but permits <strong>write skew</strong> (and the related predicate/read-write anomalies), so it is strictly weaker than serializable."},
  {"sec":"DB-ISO","front":"Serializable Snapshot Isolation (SSI) — how it upgrades SI to true serializability","back":"SSI runs on top of SI/MVCC but adds runtime detection of a <strong>dangerous structure</strong>: it tracks read-write (rw) <em>anti-dependencies</em> between concurrent txns and aborts a transaction that sits as the <em>pivot</em> of two consecutive rw-edges (one incoming, one outgoing) — the condition Fekete et al. proved necessary for a non-serializable cycle. It is optimistic (no read locks), staying high-concurrency, and pays with occasional false-positive aborts. Postgres <code>SERIALIZABLE</code> has been SSI since 9.1."},
  {"sec":"DB-ISO","front":"Postgres SERIALIZABLE vs. two-phase-locking serializable — key behavioral difference","back":"Postgres implements <code>SERIALIZABLE</code> as <strong>SSI</strong> (optimistic), not strict 2PL. Consequences: readers never take row locks and never block writers; conflicts are detected at runtime via rw-antidependency tracking and surface as a <strong>serialization failure</strong> (<code>SQLSTATE 40001</code>) the application must <em>retry</em>. So serializable code must wrap transactions in a retry loop. A lock-based serializable would instead block (and risk deadlock) rather than abort."},
  {"sec":"DB-ISO","front":"What does each engine's 'REPEATABLE READ' actually deliver?","back":"<ul><li><strong>Postgres RR</strong> = full Snapshot Isolation: also prevents phantoms (stronger than ANSI requires), still allows write skew, and aborts a writer that hits a row changed since its snapshot with <code>40001</code>.</li><li><strong>MySQL/InnoDB RR</strong> (default) = consistent-read snapshot for plain <code>SELECT</code>, but locking reads (<code>SELECT ... FOR UPDATE</code>, <code>UPDATE</code>) read the latest committed row and use next-key (gap) locks to block many phantoms — a snapshot/locking hybrid, not pure SI.</li></ul>'Repeatable Read' is not a portable contract — verify per engine."},
  {"sec":"DB-ISO","front":"Default isolation level: Postgres vs. MySQL/InnoDB vs. the SQL standard","back":"<ul><li><strong>Postgres</strong> defaults to <code>READ COMMITTED</code>.</li><li><strong>MySQL/InnoDB</strong> defaults to <code>REPEATABLE READ</code>.</li><li><strong>SQL standard</strong> names <code>SERIALIZABLE</code> as the default — almost no production engine honors this.</li></ul>Oracle and SQL Server also default to <code>READ COMMITTED</code>; Oracle has no true <code>READ UNCOMMITTED</code>, and its <code>SERIALIZABLE</code> is actually snapshot isolation. Always confirm the configured default rather than assuming."},
  {"sec":"DB-ISO","front":"Under READ COMMITTED, what surprises an app developer at statement boundaries?","back":"Each <em>statement</em> sees a fresh snapshot of the latest committed data, so two <code>SELECT</code>s in the same transaction can return different values (non-repeatable read is allowed). In Postgres, an <code>UPDATE</code> whose target row was changed by a concurrently-committed txn <strong>re-locks the new version and re-evaluates its <code>WHERE</code></strong> against it (the EvalPlanQual re-check) — which can yield surprising outcomes and is why a read-then-write split across statements still loses updates under RC."},
  {"sec":"DB-ISO","front":"How do you prevent write skew without going full SERIALIZABLE?","back":"Because SI misses the read-write conflict, you must <em>materialize</em> it so the engine can detect a write-write conflict:<ul><li><code>SELECT ... FOR UPDATE</code> on the rows the invariant depends on (promote the read to a write-intent).</li><li>Insert/lock a dedicated 'guard' row representing the predicate (materializing the conflict).</li><li>Add a real constraint / unique index if the invariant is expressible as one.</li></ul>Or simply run <code>SERIALIZABLE</code>/SSI and retry on <code>40001</code>. Plain SI alone cannot stop write skew."}
);

Object.assign(GLOSSARY_DATA, {
  "ansi-isolation-levels": {"term":"ANSI Isolation Levels","group":"DB-ISO","aliases":["ansi isolation levels","isolation level","isolation levels","sql isolation levels","four isolation levels"],"eli5":"A dial from 'fast but anything goes' to 'slow but perfectly correct' that controls how much concurrent transactions can see each other's mess.","memory":"Levels = read locks you progressively refuse to release early: no read lock → short read lock → long read lock → long read lock + range/predicate lock.","full":"<p>The SQL standard defines four levels — <code>READ UNCOMMITTED</code>, <code>READ COMMITTED</code>, <code>REPEATABLE READ</code>, <code>SERIALIZABLE</code> — by which of three phenomena each must forbid: dirty read, non-repeatable read, phantom read. Each stronger level forbids one more phenomenon. Crucially the standard specifies <em>phenomena prevented</em>, not a mechanism, so engines implement them differently (locking vs. MVCC) and may prevent more than required.</p><p>Defining levels by phenomena rather than by serializability is its original sin: as Berenson et al. (1995) showed, the three phenomena are insufficient to pin down real implementations and cannot even distinguish Snapshot Isolation, which forbids all three yet is not serializable.</p>","trap":"Saying 'SERIALIZABLE is just REPEATABLE READ plus phantom protection.' True to the standard's letter, but in practice serializable also forbids write skew and lost update, which RR/SI do not — the three named phenomena don't capture the real gap.","related":["dirty-read","non-repeatable-read","phantom-read","serializable","snapshot-isolation"]},
  "read-committed": {"term":"Read Committed","group":"DB-ISO","aliases":["read committed","read-committed"],"eli5":"You only ever see data that has actually been committed, but each statement gets a fresh look — so values can change under you between statements.","full":"<p><code>READ COMMITTED</code> forbids dirty reads but allows non-repeatable reads and phantoms. In MVCC engines like Postgres, every <em>statement</em> takes a new snapshot of the latest committed state; in lock-based engines it holds write locks to commit but releases read locks immediately. It is the default in Postgres, Oracle, and SQL Server.</p><p>The subtle hazard is read-modify-write in application code: two transactions each read a value, compute, then write, producing a lost update because RC provides no protection across the read-then-write gap. Postgres re-locks and re-evaluates an <code>UPDATE</code>'s <code>WHERE</code> against the latest row version if a concurrent commit changed it (EvalPlanQual), which makes an atomic in-place update safe but does nothing for a read split across statements.</p>","trap":"Assuming Read Committed prevents lost updates. It does not across a read-then-write gap — you need <code>FOR UPDATE</code>, an atomic <code>UPDATE ... SET x = x + 1</code>, or a higher level.","worked":"Txn A and B both run <code>SELECT balance FROM acct WHERE id=1</code> (=100), each computes 110 in app code, each writes 110. Final balance is 110, not 120 — one +10 is lost.","related":["dirty-read","non-repeatable-read","lost-update","ansi-isolation-levels"]},
  "dirty-read": {"term":"Dirty Read","group":"DB-ISO","aliases":["dirty read","dirty reads","read uncommitted"],"eli5":"Reading data another transaction wrote but hasn't committed — it might roll back and never have existed.","memory":"'Dirty' = uncommitted = could be wiped by a rollback. The only dirt that even the weakest committed levels scrub first.","full":"<p>A dirty read (phenomenon P1/A1) occurs when transaction T2 reads a row version written by T1 before T1 commits. If T1 rolls back, T2 acted on data that never officially existed. Only <code>READ UNCOMMITTED</code> permits this; every level at <code>READ COMMITTED</code> and above forbids it.</p><p>In practice most MVCC databases never expose dirty reads at all because uncommitted versions simply aren't visible to other snapshots — Oracle and Postgres effectively have no true <code>READ UNCOMMITTED</code> (Postgres silently treats it as <code>READ COMMITTED</code>).</p>","trap":"Claiming you must set READ COMMITTED to avoid dirty reads in Postgres. Postgres never shows dirty reads even if you request READ UNCOMMITTED — it has no weaker-than-RC mode.","related":["read-committed","ansi-isolation-levels","mvcc"]},
  "non-repeatable-read": {"term":"Non-Repeatable Read","group":"DB-ISO","aliases":["non-repeatable read","non repeatable read","nonrepeatable read","fuzzy read"],"eli5":"You read the same row twice in one transaction and get two different values because someone committed an update in between.","full":"<p>A non-repeatable (or 'fuzzy') read is when re-reading the <em>same row</em> within one transaction yields a different value, because a concurrent transaction committed an <code>UPDATE</code> or <code>DELETE</code> to that row between your two reads. It is allowed under <code>READ COMMITTED</code> and forbidden at <code>REPEATABLE READ</code> and above.</p><p>The defining contrast is with phantom read: a non-repeatable read is about an <em>existing row's value</em> changing, whereas a phantom is about the <em>set of rows matching a predicate</em> changing. RR / snapshot isolation fixes non-repeatable reads by pinning the transaction to one snapshot.</p>","trap":"Conflating it with phantom read. Non-repeatable read = a row you already saw mutated; phantom = new/removed rows appear in a predicate's result. Different fix in lock-based systems (row lock vs. range/gap lock).","related":["phantom-read","repeatable-read-engine-specific","read-committed","ansi-isolation-levels"]},
  "phantom-read": {"term":"Phantom Read","group":"DB-ISO","aliases":["phantom read","phantom reads","phantom","phantoms"],"eli5":"You run the same WHERE-query twice and the set of matching rows changes because someone inserted or deleted rows that match.","memory":"Phantoms are rows that weren't there when you first looked — you must lock the empty space (gap locks) to keep ghosts out.","full":"<p>A phantom read occurs when a transaction re-executes a <em>predicate</em> query (e.g. <code>SELECT COUNT(*) WHERE status='open'</code>) and the result set gains or loses rows because another transaction committed <code>INSERT</code>s or <code>DELETE</code>s matching that predicate. The ANSI standard only requires <code>SERIALIZABLE</code> to prevent phantoms.</p><p>Real engines vary: Postgres <code>REPEATABLE READ</code> (Snapshot Isolation) already prevents phantoms via its snapshot; InnoDB <code>REPEATABLE READ</code> uses <strong>next-key (gap) locks</strong> on locking reads to block phantom inserts in a scanned range. Preventing phantoms requires locking <em>ranges</em> or <em>predicates</em>, not just existing rows — which is why it's the hardest of the three phenomena.</p>","trap":"Saying only SERIALIZABLE prevents phantoms. That's the standard's floor; Postgres RR (snapshot) and InnoDB RR (gap locks) both block phantoms in practice.","related":["non-repeatable-read","serializable","snapshot-isolation","repeatable-read-engine-specific"]},
  "lost-update": {"term":"Lost Update","group":"DB-ISO","aliases":["lost update","lost updates"],"eli5":"Two transactions read the same value, both edit it, and the second write silently clobbers the first.","memory":"Two people editing the same Google Doc cell offline; last sync wins, the other's edit vanishes.","full":"<p>Lost update (Berenson's P4) is the read-modify-write race: T1 and T2 both read x, each computes a new x from the value read, and both write — the later commit overwrites the earlier, losing one update. It is <em>not</em> one of the three ANSI phenomena, which is exactly why the 1995 critique added it.</p><p><code>READ COMMITTED</code> does not prevent it across a read-then-write gap. Snapshot Isolation does, via <strong>first-committer-wins</strong>: two concurrent writes to the same row cause the second to abort. Without SI, defend with atomic in-place updates (<code>UPDATE ... SET x = x + 1</code>), pessimistic <code>SELECT ... FOR UPDATE</code>, or optimistic compare-and-set on a version column.</p>","trap":"Thinking REPEATABLE READ blocks lost update by silently merging the writes. SI/Postgres RR blocks it by aborting the conflicting writer (you must retry); it does not merge — and plain RC offers nothing across statements.","related":["snapshot-isolation","write-skew","read-committed","first-committer-wins"]},
  "snapshot-isolation": {"term":"Snapshot Isolation","group":"DB-ISO","aliases":["snapshot isolation","si","snapshot","consistent snapshot"],"eli5":"Every transaction reads from a frozen photo of the database taken at its start, so reads never block and never see partial work — but it still allows write skew.","memory":"Snapshot = a photograph: consistent and immune to others' edits, but two people photographing different corners can still co-author an impossible scene (write skew).","full":"<p>Snapshot Isolation gives each transaction a consistent view as of its start time, implemented with <strong>MVCC</strong>: writers create new row versions, readers see only versions committed before their snapshot, so readers never block writers and vice versa. At commit, <strong>first-committer-wins</strong> aborts a transaction that wrote a row already written by a concurrent committed transaction. SI prevents dirty reads, non-repeatable reads, phantoms, read skew, and lost update.</p><p>What it does <em>not</em> prevent is write skew (and read-write predicate conflicts generally), so SI is strictly weaker than serializable. Postgres <code>REPEATABLE READ</code> is exactly SI; Oracle's <code>SERIALIZABLE</code> is actually SI (a common gotcha). Serializable Snapshot Isolation (SSI) closes the gap by detecting dangerous rw-antidependency structures.</p>","trap":"Assuming a level literally named 'SERIALIZABLE' is serializable — Oracle's is SI and permits write skew. Always check whether 'serializable' means SSI/2PL or just SI.","related":["mvcc","write-skew","lost-update","first-committer-wins","serializable-snapshot-isolation","read-committed"]},
  "serializable-snapshot-isolation": {"term":"Serializable Snapshot Isolation (SSI)","group":"DB-ISO","aliases":["serializable snapshot isolation","ssi","serializable snapshot"],"eli5":"Run Snapshot Isolation but watch for the specific read-write conflict patterns that could make a non-serializable cycle, and abort one transaction when you spot one.","memory":"SSI = SI with a cycle cop watching read-write edges; see two consecutive rw-arrows through one transaction (the pivot) and it pulls someone over (aborts).","full":"<p>SSI (Cahill, Fekete, Röhm, 2008; in Postgres since 9.1) makes SI fully serializable optimistically. It keeps MVCC and never takes read locks; instead it tracks <strong>rw-antidependencies</strong> (T1 reads a version, T2 overwrites what T1 read) and aborts a transaction when it detects a 'dangerous structure' — a pivot transaction with both an incoming and an outgoing rw-edge to concurrent transactions, the necessary condition (proved by Fekete et al.) for a serialization-graph cycle.</p><p>The payoff is serializability without the blocking of strict 2PL; the cost is <strong>false-positive aborts</strong> (it over-approximates cycles, since not every dangerous structure is a real cycle), surfaced as <code>SQLSTATE 40001</code>, so applications must retry. SSI is the reason Postgres <code>SERIALIZABLE</code> is practical at scale, and it specifically catches write skew.</p>","trap":"Thinking serializable always means it blocks/locks. SSI is optimistic — it aborts and demands a retry instead. Forgetting the retry loop is the real bug.","related":["snapshot-isolation","serializable","write-skew","mvcc"]},
  "serializable": {"term":"Serializable","group":"DB-ISO","aliases":["serializable","serializability","serializable isolation"],"eli5":"The result of running transactions concurrently is guaranteed identical to some order of running them one at a time — the gold standard of correctness.","memory":"'As if single-file': pick any line order for the transactions — the database guarantees the outcome matches one of them.","full":"<p><code>SERIALIZABLE</code> is the strongest SQL isolation level: any concurrent execution is equivalent to <em>some</em> serial order, so no anomaly — dirty, non-repeatable, phantom, lost update, write skew, read skew — can occur. The SQL standard names it the default, though virtually no engine defaults to it.</p><p>It can be implemented three ways with very different operational characteristics: <strong>strict two-phase locking</strong> (blocks, risks deadlocks), <strong>Serializable Snapshot Isolation</strong> (optimistic, aborts with <code>40001</code>, no read locks — Postgres), or <strong>serial execution</strong> on a single thread (e.g. VoltDB/H-Store-style). Note serializable is about a valid <em>order</em>, not necessarily real-time order — <em>strict</em> serializability adds the real-time constraint (covered in the consistency-models deck).</p>","trap":"Equating serializable with strict serializability / linearizability. Serializable permits any equivalent serial order; it does not require it to respect real-time ordering. They're orthogonal guarantees.","related":["serializable-snapshot-isolation","snapshot-isolation","phantom-read","write-skew","ansi-isolation-levels"]},
  "repeatable-read-engine-specific": {"term":"Repeatable Read (engine-specific)","group":"DB-ISO","aliases":["repeatable read","repeatable-read","innodb repeatable read","rr"],"eli5":"A level whose name promises stable re-reads, but what it actually guarantees depends heavily on which database you're using.","memory":"'Repeatable Read' is a brand name, not a spec — Postgres ships SI under it, InnoDB ships a gap-lock hybrid under it.","full":"<p><code>REPEATABLE READ</code> in the ANSI standard forbids dirty and non-repeatable reads but allows phantoms. Real engines diverge sharply: <strong>Postgres RR is full Snapshot Isolation</strong> — it also prevents phantoms and raises <code>40001</code> on write-write conflicts (so it can abort, unlike a textbook RR). <strong>InnoDB RR</strong> (MySQL's default) gives consistent-read snapshots for plain <code>SELECT</code> but locking reads see the latest committed row, and it uses <strong>next-key/gap locks</strong> to block many phantoms — a snapshot/locking hybrid.</p><p>The lesson for portability: 'Repeatable Read' is not a stable cross-engine contract. The same DDL/DML can exhibit different anomalies and different abort-vs-block behavior depending on the engine, so verify the specific engine's semantics rather than rely on the level's name.</p>","trap":"Writing portable code assuming RR behaves identically on Postgres and MySQL. Postgres RR aborts on write conflicts (needs retry); InnoDB RR tends to block and uses gap locks. Different anomaly profile, different failure mode.","related":["snapshot-isolation","phantom-read","non-repeatable-read","ansi-isolation-levels"]},
  "mvcc": {"term":"MVCC (Multi-Version Concurrency Control)","group":"DB-ISO","aliases":["mvcc","multi-version concurrency control","multiversion concurrency control","row versions"],"eli5":"Instead of overwriting rows, the database keeps multiple versions so each transaction reads the version valid for its snapshot — letting readers and writers run without blocking each other.","memory":"MVCC = Git for rows: writes append a new commit (version); each reader checks out the snapshot it's pinned to. Garbage (old versions) needs collecting.","full":"<p>MVCC is the storage mechanism underpinning Snapshot Isolation and most modern Read Committed implementations. Each write produces a new row <em>version</em> tagged with transaction visibility info; a transaction's snapshot determines which versions it can see. The headline benefit is <strong>readers don't block writers and writers don't block readers</strong>, eliminating dirty reads structurally.</p><p>Costs: obsolete versions must be reclaimed — Postgres needs <code>VACUUM</code> (and suffers table bloat / transaction-ID wraparound risk if it falls behind); Oracle and MySQL/InnoDB use rollback/undo segments and can throw 'snapshot too old' errors on long-running queries. MVCC alone gives SI, not serializability — write-write conflicts still need first-committer-wins, and write skew still needs SSI or locking.</p>","trap":"Assuming MVCC implies serializability or that it's free. It gives non-blocking snapshots (SI at best) and requires version cleanup (VACUUM/undo) with its own failure modes.","related":["snapshot-isolation","read-committed","first-committer-wins","dirty-read"]},
  "first-committer-wins": {"term":"First-Committer-Wins","group":"DB-ISO","aliases":["first-committer-wins","first committer wins","first-updater-wins","write-write conflict"],"eli5":"Under Snapshot Isolation, if two concurrent transactions write the same row, the first to commit succeeds and the second is forced to abort.","memory":"Two people grab the same item at checkout; whoever scans first keeps it, the other gets 'sorry, taken' (abort). But two people grabbing different items (write skew) both succeed.","full":"<p>First-committer-wins is the commit-time conflict rule that makes Snapshot Isolation safe against lost updates. When a transaction tries to commit, if any concurrent transaction has already committed a write to a row it also wrote, it aborts with a serialization error. Postgres' practical variant is 'first-updater-wins,' enforced via row locks at write time so the second writer blocks until the first commits, then aborts.</p><p>The key limitation: it only fires on <strong>write-write</strong> overlap. It cannot detect read-write (predicate) conflicts, which is precisely why SI permits write skew. To catch those you need read-set tracking (SSI) or explicit locking that turns a read into a write-intent (<code>SELECT ... FOR UPDATE</code>).</p>","trap":"Expecting first-committer-wins to stop write skew. It only sees overlapping writes to the same row; different-row writes sail through, which is the write-skew hole.","related":["snapshot-isolation","lost-update","write-skew","mvcc"]}
});

</script>
