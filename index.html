<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engineering Learning Lab · Pierce Lonergan</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], processEscapes: true },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel2: #1e222b;
    --ink: #e7e9ee;
    --ink-dim: #9aa3b2;
    --line: #2a2f3a;
    --accent: #5b9dff;
    --accent2: #8b7cff;
    --term: #7cc4ff;
    --good: #46d39a;
    --bad: #ff6b6b;
    --warn: #ffcf5c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }

  /* ---------- Top bar ---------- */
  header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { font-weight: 800; font-size: 16px; letter-spacing: .2px; white-space: nowrap; }
  .brand span { color: var(--accent); }
  .tabs { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  .tab {
    border: 0; background: transparent; color: var(--ink-dim);
    padding: 7px 16px; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 600;
  }
  .tab.active { background: var(--accent); color: #06122b; }
  .search { margin-left: auto; position: relative; }
  .search input {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 14px 9px 34px; border-radius: 999px; width: 240px; font-size: 13.5px; outline: none;
  }
  .search input:focus { border-color: var(--accent); }
  .search::before { content: "⌕"; position: absolute; left: 12px; top: 7px; color: var(--ink-dim); font-size: 16px; }
  .search-results {
    position: absolute; top: 42px; right: 0; width: 340px; max-height: 60vh; overflow: auto;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 6px;
    display: none; box-shadow: 0 18px 50px rgba(0,0,0,.5);
  }
  .search-results.show { display: block; }
  .sr-item { padding: 9px 11px; border-radius: 9px; cursor: pointer; }
  .sr-item:hover { background: var(--panel); }
  .sr-item .t { font-weight: 700; font-size: 13.5px; }
  .sr-item .d { color: var(--ink-dim); font-size: 12px; }

  main { max-width: 1040px; margin: 0 auto; padding: 22px 18px 120px; }

  /* ---------- Study (cards) ---------- */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink-dim);
    padding: 6px 13px; border-radius: 999px; font-size: 12.5px; cursor: pointer; font-weight: 600;
  }
  .chip.active { color: var(--ink); border-color: var(--accent); background: rgba(91,157,255,.12); }
  .chip .ct { opacity:.6; font-weight:500; font-size:11px; margin-left:2px; }
  .deck-chip { --dc: var(--accent); }
  .deck-chip.active { border-color: var(--dc); background: color-mix(in srgb, var(--dc) 14%, transparent); color: var(--ink); }
  .deck-chip.active::before { content:""; display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--dc); margin-right:6px; vertical-align:middle; }
  .topic-row { margin-top:-6px; padding-left:2px; }
  .topic-row .chip { font-size:12px; padding:5px 11px; }
  .deck-section { margin-top: 22px; }
  .deck-h { font-size: 15px; font-weight: 800; color: var(--ink); padding: 6px 0 4px 12px; border-left: 3px solid var(--dc); margin-bottom: 8px; }
  .topic-h { font-size: 11.5px; text-transform: uppercase; letter-spacing: .09em; color: var(--ink-dim); margin: 14px 0 8px 2px; font-weight: 700; }
  .sr-deck { font-size: 10px; color: var(--ink-dim); font-weight: 500; background: var(--panel); border:1px solid var(--line); border-radius:999px; padding:0 6px; margin-left:6px; }
  .count { color: var(--ink-dim); font-size: 12.5px; margin-left: auto; }
  .bp-select { width: 100%; max-width: 340px; margin: 6px auto 4px; padding: 8px; border-radius: 8px; background: var(--panel); color: var(--ink); border: 1px solid var(--line); font-size: 13.5px; }
  .bp-blurb, .bp-pool { font-size: 12px; color: var(--ink-dim); margin: 4px 0; }
  #lenpick button.off { opacity: .4; cursor: not-allowed; }

  .flash {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line); border-radius: var(--radius);
    min-height: 320px; padding: 26px 30px; position: relative; cursor: pointer;
    display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .flash .sec { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--accent); font-weight: 700; }
  .flash .face-label { position: absolute; top: 18px; right: 22px; font-size: 10.5px; color: var(--ink-dim); letter-spacing: .12em; text-transform: uppercase; }
  .flash .term-q { font-size: 26px; font-weight: 800; margin: auto 0; text-align: center; }
  .flash .ans { font-size: 15.5px; }
  .flash .ans ul { margin: 6px 0 6px 18px; padding: 0; }
  .flash .ans table { border-collapse: collapse; width: 100%; font-size: 13.5px; margin: 6px 0; }
  .flash .ans td, .flash .ans th { border: 1px solid var(--line); padding: 4px 8px; text-align: left; }
  .flash .hint { text-align: center; color: var(--ink-dim); font-size: 12.5px; margin-top: 14px; }
  .nav-row { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 18px; }
  .btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink);
    padding: 9px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #06122b; border-color: var(--accent); }

  /* ---------- Explore (glossary grid) ---------- */
  .gloss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
  .gloss-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 15px; cursor: pointer;
  }
  .gloss-card:hover { border-color: var(--accent); transform: translateY(-2px); transition: .12s; }
  .gloss-card .gt { font-weight: 700; font-size: 14.5px; margin-bottom: 4px; }
  .gloss-card .gd { color: var(--ink-dim); font-size: 12.5px; }
  .gloss-card .badge { display: inline-block; margin-top: 9px; font-size: 10.5px; color: var(--accent2); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }
  .group-title { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin: 26px 0 10px; font-weight: 700; }

  /* ---------- Test (quiz) ---------- */
  .quiz-wrap { max-width: 720px; margin: 0 auto; }
  .qcard { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px 26px; }
  .qmeta { color: var(--ink-dim); font-size: 12.5px; display: flex; justify-content: space-between; margin-bottom: 12px; }
  .qtext { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .choice {
    display: block; width: 100%; text-align: left; border: 1px solid var(--line); background: var(--panel2);
    color: var(--ink); padding: 13px 16px; border-radius: 11px; margin-bottom: 10px; cursor: pointer; font-size: 14.5px;
  }
  .choice:hover { border-color: var(--accent); }
  .choice.correct { border-color: var(--good); background: rgba(70,211,154,.13); }
  .choice.wrong { border-color: var(--bad); background: rgba(255,107,107,.12); }
  .choice .mk { font-weight: 800; margin-right: 9px; color: var(--ink-dim); }
  .explain { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 14px; font-size: 14px; display: none; }
  .explain.show { display: block; }
  .explain .why { color: var(--ink-dim); }
  .scorebar { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; color: var(--ink-dim); font-size: 13px; }
  /* review / spaced repetition */
  .due-badge { display:none; background:#d56f7a; color:#fff; font-size:10px; font-weight:700; line-height:1; border-radius:999px; padding:2px 6px; margin-left:3px; vertical-align:middle; }
  .rv-sub { color: var(--ink-dim); font-size: 13.5px; margin: 6px 0 16px; }
  .rv-grades { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:16px; }
  .rv-g { border:1px solid var(--line); background:var(--panel2); color:var(--ink); padding:12px 6px; border-radius:11px; cursor:pointer; font-size:14px; font-weight:600; transition:.12s; position:relative; }
  .rv-g:hover { transform:translateY(-1px); }
  .rv-g small { display:block; font-size:10px; opacity:.6; font-weight:500; margin-top:2px; }
  .rv-again { border-color:rgba(255,107,107,.55); color:#ff6b6b; }
  .rv-hard  { border-color:rgba(255,159,67,.55);  color:#ff9f43; }
  .rv-good  { border-color:rgba(91,157,255,.55);  color:#5b9dff; }
  .rv-easy  { border-color:rgba(70,211,154,.55);  color:#46d39a; }
  .progress { height: 6px; background: var(--panel); border-radius: 999px; overflow: hidden; flex: 1; }
  .progress > div { height: 100%; background: var(--accent); width: 0%; }

  /* ---------- Term links ---------- */
  .term {
    color: var(--term); border-bottom: 1.5px dotted rgba(124,196,255,.6);
    cursor: pointer; font-weight: 600;
  }
  .term:hover { background: rgba(124,196,255,.14); border-radius: 3px; }

  /* ---------- Tooltip ---------- */
  #tooltip {
    position: fixed; z-index: 60; max-width: 320px; background: #0c0e13; color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; font-size: 13px; line-height: 1.45;
    box-shadow: 0 16px 44px rgba(0,0,0,.6); pointer-events: none; opacity: 0; transition: opacity .12s; display: none;
  }
  #tooltip .tt-term { font-weight: 800; color: var(--term); display: block; margin-bottom: 3px; font-size: 13px; }
  #tooltip .tt-hint { color: var(--ink-dim); font-size: 11px; margin-top: 6px; font-style: italic; }

  /* ---------- Drill drawer ---------- */
  #scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 70; opacity: 0; pointer-events: none; transition: opacity .2s; }
  #scrim.show { opacity: 1; pointer-events: auto; }
  #drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 94vw); z-index: 80;
    background: var(--panel); border-left: 1px solid var(--line);
    transform: translateX(102%); transition: transform .26s cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column;
  }
  #drawer.show { transform: translateX(0); }
  .drawer-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .crumbs { font-size: 12px; color: var(--ink-dim); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .crumbs .c { cursor: pointer; }
  .crumbs .c:hover { color: var(--ink); }
  .crumbs .sep { opacity: .5; margin: 0 5px; }
  .icon-btn { border: 1px solid var(--line); background: var(--panel2); color: var(--ink); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 16px; line-height: 1; }
  .icon-btn:hover { border-color: var(--accent); }
  .drawer-body { padding: 20px 22px 60px; overflow: auto; }
  .drawer-body h2 { margin: 0 0 4px; font-size: 23px; }
  .eli5 { color: var(--ink); background: rgba(91,157,255,.1); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 8px; font-size: 15px; margin: 12px 0 18px; }
  .drawer-body p { margin: 0 0 12px; font-size: 14.5px; }
  .drawer-body ul, .drawer-body ol { margin: 6px 0 14px 20px; padding: 0; font-size: 14.5px; }
  .drawer-body li { margin-bottom: 5px; }
  .drawer-body strong { color: #fff; }
  .deeper { border: 1px solid var(--line); border-radius: 10px; margin: 14px 0; overflow: hidden; }
  .deeper > summary { cursor: pointer; padding: 11px 14px; font-weight: 700; font-size: 13.5px; background: var(--panel2); color: var(--ink); list-style: none; }
  .deeper > summary::-webkit-details-marker { display: none; }
  .deeper > summary::before { content: "▸ "; color: var(--accent); }
  .deeper[open] > summary::before { content: "▾ "; }
  .deeper .deeper-in { padding: 12px 15px; }
  .worked { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin: 12px 0; font-size: 13.5px; }
  .worked .wt { font-weight: 700; color: var(--warn); margin-bottom: 6px; }
  /* acronym expansion + equations + examples */
  .expand-sub { color: var(--ink-dim); font-size: 13px; margin: -4px 0 10px; font-style: italic; }
  .equation-block { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin: 14px 0; }
  .equation-block .eq-math { overflow-x: auto; overflow-y: hidden; text-align: center; font-size: 15px; }
  .eq-where { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 10px; }
  .eq-where-h { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin-bottom: 7px; }
  .eq-where ul { margin: 0 0 0 2px; padding: 0; list-style: none; font-size: 13.5px; }
  .eq-where li { margin: 0 0 6px 0; display: flex; gap: 8px; align-items: baseline; }
  .eq-where .eq-sym { color: var(--term); min-width: 30px; flex-shrink: 0; }
  .examples { margin: 20px 0 6px; }
  .examples-h { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent2); font-weight: 700; margin-bottom: 11px; }
  .example-card { background: var(--panel2); border: 1px solid var(--line); border-left: 3px solid var(--accent2); border-radius: 10px; padding: 13px 15px; margin-bottom: 12px; }
  .ex-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .ex-scenario { font-size: 13.5px; margin-bottom: 8px; }
  .ex-given { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 6px; line-height: 1.8; }
  .ex-steps { overflow-x: auto; overflow-y: hidden; font-size: 14px; margin: 4px 0; }
  .ex-result { background: rgba(70,211,154,.12); border: 1px solid rgba(70,211,154,.4); border-radius: 8px; padding: 7px 11px; font-size: 14px; font-weight: 600; margin-top: 8px; }
  .minichart { margin-top: 12px; }
  .minichart .mc-title { font-size: 11.5px; color: var(--ink-dim); margin-bottom: 5px; }
  .minichart svg { width: 100%; height: auto; display: block; }
  /* code blocks */
  pre.code { background:#0b0d12; border:1px solid var(--line); border-radius:10px; padding:12px 14px; overflow-x:auto; margin:11px 0; position:relative; }
  pre.code code { font-family:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size:12.5px; line-height:1.6; white-space:pre; color:#cdd3e0; display:block; }
  pre.code[data-lang]::before { content:attr(data-lang); position:absolute; top:6px; right:10px; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); opacity:.7; }
  .tok-kw   { color:#c792ea; font-weight:600; }
  .tok-str  { color:#a3d977; }
  .tok-num  { color:#f0a866; }
  .tok-com  { color:#6a7385; font-style:italic; }
  .tok-fn   { color:#5b9dff; }
  .tok-type { color:#5fb0a8; }
  .tok-ann  { color:#d56f7a; }
  /* comparison tables */
  .cmp-wrap { overflow-x:auto; margin:11px 0; }
  table.cmp { border-collapse:collapse; width:100%; font-size:13px; }
  table.cmp th, table.cmp td { border:1px solid var(--line); padding:6px 10px; text-align:left; vertical-align:top; }
  table.cmp th { background:var(--panel2); color:var(--ink-dim); font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; }
  table.cmp tr.win td { background:rgba(70,211,154,.10); }
  table.cmp tr.win td:first-child { color:#46d39a; font-weight:600; }
  /* console */
  .console { background:#0b0d12; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:11px 0; font-family:'JetBrains Mono', ui-monospace, monospace; font-size:12.5px; }
  .console .con-cmd { padding:9px 12px; color:#e7e9ee; border-bottom:1px solid var(--line); }
  .console .con-prompt { color:#46d39a; user-select:none; }
  .console .con-out { padding:9px 12px; color:#9aa3b2; white-space:pre-wrap; }
  /* diagrams (sequence / boxes) */
  .diagram { background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:12px 10px; margin:12px 0; overflow-x:auto; }
  .diagram .dg-title { font-size:12px; color:var(--ink-dim); margin:0 0 6px 6px; font-weight:600; }
  .diagram svg { display:block; max-width:100%; height:auto; }
  .memory { background: rgba(139,124,255,.13); border-left: 3px solid var(--accent2); border-radius: 8px; padding: 8px 12px 8px 34px; font-size: 13px; margin: 0 0 14px; position: relative; }
  .memory::before { content: "🧠"; position: absolute; left: 11px; top: 8px; }
  .trap { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.4); border-radius: 10px; padding: 10px 13px; font-size: 13.5px; margin: 16px 0; }
  .trap .trap-h { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--bad); font-weight: 700; margin-bottom: 4px; }
  .trap .trap-h::before { content: "\26A0  "; }
  .related { margin-top: 22px; }
  .related .rt { font-size: 11.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin-bottom: 8px; }
  .rel-chip { display: inline-block; margin: 0 7px 7px 0; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 12.5px; cursor: pointer; color: var(--term); }
  .rel-chip:hover { border-color: var(--accent); background: rgba(124,196,255,.1); }

  /* ---------- Graphics ---------- */
  .graphic { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin: 16px 0; }
  .graphic .g-title { font-weight: 700; font-size: 13.5px; margin-bottom: 4px; }
  .graphic .g-sub { color: var(--ink-dim); font-size: 12px; margin-bottom: 10px; }
  .graphic svg { width: 100%; height: auto; display: block; touch-action: none; }
  .readout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .ro { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; }
  .ro .k { font-size: 10.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .05em; }
  .ro .v { font-size: 16px; font-weight: 800; }
  .ctrls { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
  .ctrl { font-size: 12px; color: var(--ink-dim); display: flex; flex-direction: column; gap: 3px; min-width: 120px; }
  .ctrl input[type=range] { width: 150px; }
  .toggle-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .toggle-row button { font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel); color: var(--ink-dim); cursor: pointer; }
  .toggle-row button.on { color: #06122b; background: var(--accent); border-color: var(--accent); }

  .empty { color: var(--ink-dim); text-align: center; padding: 60px 0; }
  kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="brand">Engineering <span>Learning Lab</span></div>
  <div class="tabs">
    <button class="tab active" data-mode="study">Study</button>
    <button class="tab" data-mode="explore">Explore</button>
    <button class="tab" data-mode="test">Quiz</button>
    <button class="tab" data-mode="exam">Exam</button>
    <button class="tab" data-mode="review">Review <span class="due-badge" id="dueBadge"></span></button>
  </div>
  <div class="search">
    <input id="searchBox" type="text" placeholder="Search any concept…" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<main id="view"></main>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Drill drawer -->
<div id="scrim"></div>
<aside id="drawer">
  <div class="drawer-head">
    <button class="icon-btn" id="drawerBack" title="Back">‹</button>
    <div class="crumbs" id="crumbs"></div>
    <button class="icon-btn" id="drawerClose" title="Close">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
/* ============================================================================
   DATA STORES  (filled in chunks)
   ============================================================================ */
const GLOSSARY = {};   // id -> { term, eli5, full, deeper?, worked?, related?, graphic?, aliases?, group? }
const QUIZ = [];       // { q, choices:[...], answer:idx, explain (html), terms:[...] }
const CARDS = [];      // { sec, front, back }  (reused from the printable deck)
const SECTIONS = {};   // topic code -> display name
const DECKS = [];      // [{id,name,color,topics:[topicCode...]}]
const TOPIC2DECK = {}; // topic code -> deck object
let _searchIdx = null; // [{id,hay}] built at boot

/* ============================================================================

   Each fn receives a mount element and builds its own UI + interactivity.

const GRAPHICS = {};

/* ---- helper: format dollars ---- */
function usd(n){ return '$' + Math.round(n).toLocaleString(); }
function svgEl(tag, attrs){ const e = document.createElementNS('http://www.w3.org/2000/svg', tag); for(const k in attrs) e.setAttribute(k, attrs[k]); return e; }

/* ============================================================================
   CODE — dependency-free, multi-language syntax highlighter + content helpers.
   Output is wrapped in <pre class="code"> so the auto-linker, dollar-escaper,
   and MathJax all skip it.  Use CODE(lang, src) inside any card/glossary string.
   ============================================================================ */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function WORDS(s){ return new Set((s||'').trim().split(/\s+/).filter(Boolean)); }
const LANG_KW = {
  java:'abstract assert boolean break byte case catch char class const continue default do double else enum extends final finally float for goto if implements import instanceof int interface long native new package private protected public return short static strictfp super switch synchronized this throw throws transient try void volatile while var record sealed permits yield non-sealed true false null',
  scala:'abstract case catch class def do else extends false final finally for forSome given if implicit import lazy match new null object override package private protected return sealed super this throw trait try true type val var while with yield using export then enum inline',
  python:'False None True and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield match case self async',
  sql:'select from where group by having order limit offset join inner left right outer full cross on as and or not in exists between like ilike is null distinct union all intersect except insert into values update set delete create table alter drop index view materialized with recursive partition over window rank dense_rank row_number lag lead case when then else end cast count sum avg min max coalesce nullif primary key foreign references default constraint unique check',
  bash:'if then else elif fi for while do done case esac function in select until time echo printf export local readonly return set unset source eval exec trap shift getopts cd',
  yaml:'true false null yes no on off',
  json:'true false null',
  groovy:'def class if else for while return new import package try catch finally throw assert in as switch case default boolean int long double float String void static final private public protected true false null this' };
const LANG_TYPES = {
  java:'String Integer Long Double Boolean Float Short Byte Character Object List ArrayList Map HashMap Set HashSet Optional Stream Collection Iterator Runnable Callable Future CompletableFuture Exception RuntimeException void int long double boolean byte char float short',
  scala:'String Int Long Double Boolean Float Byte Char Unit Any AnyRef AnyVal Nothing List Seq Vector Map Set Option Some None Either Try Future Array Iterator',
  python:'str int float bool bytes list dict set tuple frozenset None Exception ValueError KeyError TypeError',
  sql:'INT INTEGER BIGINT SMALLINT DECIMAL NUMERIC FLOAT DOUBLE REAL VARCHAR CHAR TEXT BOOLEAN DATE TIMESTAMP TIME INTERVAL JSON JSONB UUID SERIAL' };
const LINECOM = { java:['//'], scala:['//'], groovy:['//'], sql:['--'], python:['#'], bash:['#'], yaml:['#'], json:[] };
const BLOCKCOM = { java:1, scala:1, groovy:1, sql:1 };
const BACKTICK = { scala:1, groovy:1 };
const _reCache = {};
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function buildCodeRe(lang){
  const com=[];
  if(BLOCKCOM[lang]) com.push('/\\*[\\s\\S]*?\\*/');
  const lc=LINECOM[lang]||[]; if(lc.length) com.push('(?:'+lc.map(escRe).join('|')+')[^\\n]*');
  const parts=[];
  if(com.length) parts.push('(?<com>'+com.join('|')+')');
  parts.push('(?<str>"""[\\s\\S]*?"""|\\x27\\x27\\x27[\\s\\S]*?\\x27\\x27\\x27|"(?:\\\\.|[^"\\\\\\n])*"|\\x27(?:\\\\.|[^\\x27\\\\\\n])*\\x27'+(BACKTICK[lang]?'|`(?:\\\\.|[^`\\\\])*`':'')+')');
  parts.push('(?<num>0[xXbB][0-9a-fA-F_]+|\\d[\\d_]*(?:\\.\\d+)?(?:[eE][+-]?\\d+)?[fFlLdD]?)');
  parts.push('(?<ann>@[A-Za-z_]\\w*)');
  parts.push('(?<id>[A-Za-z_$][\\w$]*)');
  return new RegExp(parts.join('|'),'gy');
}
function HIGHLIGHT(lang, code){
  lang=(lang||'').toLowerCase();
  const re=_reCache[lang]||(_reCache[lang]=buildCodeRe(lang));
  const kw=WORDS(LANG_KW[lang]), types=WORDS(LANG_TYPES[lang]);
  let i=0,out='';
  while(i<code.length){
    re.lastIndex=i; const m=re.exec(code);
    if(m && m.index===i){
      const g=m.groups, txt=m[0];
      if(g.com) out+='<span class="tok-com">'+escHtml(txt)+'</span>';
      else if(g.str) out+='<span class="tok-str">'+escHtml(txt)+'</span>';
      else if(g.num) out+='<span class="tok-num">'+escHtml(txt)+'</span>';
      else if(g.ann) out+='<span class="tok-ann">'+escHtml(txt)+'</span>';
      else if(g.id!=null){
        const low=lang==='sql'?txt.toLowerCase():txt;
        const isCall=/^\s*\(/.test(code.slice(i+txt.length));
        if(kw.has(low)) out+='<span class="tok-kw">'+escHtml(txt)+'</span>';
        else if(types.has(txt)||(/^[A-Z]/.test(txt)&&lang!=='sql')) out+='<span class="tok-type">'+escHtml(txt)+'</span>';
        else if(isCall) out+='<span class="tok-fn">'+escHtml(txt)+'</span>';
        else out+=escHtml(txt);
      } else out+=escHtml(txt);
      i+=txt.length;
    } else { out+=escHtml(code[i]); i++; }
  }
  return '<pre class="code no-link" data-lang="'+escHtml(lang)+'"><code>'+out+'</code></pre>';
}
/* CODE(lang, src) — trims a leading newline + common indentation so template
   literals read naturally in source. */
function CODE(lang, src){
  src=String(src).replace(/^\n/,'').replace(/\s+$/,'');
  const lines=src.split('\n');
  let min=Infinity; lines.forEach(l=>{ if(l.trim()){ const m=l.match(/^[ \t]*/)[0].length; if(m<min) min=m; } });
  if(min!==Infinity && min>0) src=lines.map(l=>l.slice(min)).join('\n');
  return HIGHLIGHT(lang, src);
}
/* TABLE({headers, rows, highlight}) — comparison table; highlight = winning row indices set bold/green */
function TABLE(spec){
  spec=spec||{}; const hi=new Set(spec.highlight||[]);
  let h='<div class="cmp-wrap no-link"><table class="cmp"><thead><tr>'+(spec.headers||[]).map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';
  (spec.rows||[]).forEach((r,ri)=>{ h+='<tr'+(hi.has(ri)?' class="win"':'')+'>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  return h+'</tbody></table></div>';
}
/* CONSOLE({cmd, out, prompt}) — terminal chrome with a dimmed command + output */
function CONSOLE(spec){
  spec=spec||{};
  return '<div class="console no-link"><div class="con-cmd"><span class="con-prompt">'+escHtml(spec.prompt||'$')+'</span> '+escHtml(spec.cmd||'')+'</div>'+(spec.out!=null?'<div class="con-out">'+escHtml(spec.out)+'</div>':'')+'</div>';
}

/* ----- diagram factories: SEQUENCE (UML) + BOXES (architecture), as inline SVG strings ----- */
let _dgN = 0;
/* SEQUENCE({title?, actors:[{id,label}], messages:[{from,to,label,kind?,note?,color?}]})
   kind: 'sync'(default, solid+filled head) | 'async'(open head) | 'return'(dashed) ; from===to => self-call */
function SEQUENCE(spec){
  spec=spec||{}; const A=spec.actors||[], M=spec.messages||[];
  const n=Math.max(1,A.length);
  const lane=Math.max(110, Math.min(180, Math.floor(700/n)));
  const padX=18, topH=42, rowH=44, botPad=16;
  const W=padX*2+lane*n, H=topH+12+M.length*rowH+botPad;
  const xOf=i=> padX+lane*i+lane/2;
  const idx={}; A.forEach((a,i)=>{ idx[a.id]=i; });
  const uid=++_dgN, AR='dgA'+uid, OP='dgO'+uid;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Inter, system-ui, sans-serif">';
  s+='<defs><marker id="'+AR+'" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#7c98c8"/></marker>';
  s+='<marker id="'+OP+'" markerWidth="11" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0 0L8 3L0 6" fill="none" stroke="#7c98c8" stroke-width="1.3"/></marker></defs>';
  A.forEach((a,i)=>{ const x=xOf(i);
    s+='<rect x="'+(x-lane*0.42).toFixed(1)+'" y="8" width="'+(lane*0.84).toFixed(1)+'" height="26" rx="6" fill="#1e222b" stroke="#3a4150"/>';
    s+='<text x="'+x.toFixed(1)+'" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#cdd3e0">'+escHtml(a.label)+'</text>';
    s+='<line x1="'+x.toFixed(1)+'" y1="34" x2="'+x.toFixed(1)+'" y2="'+(H-8)+'" stroke="#2a2f3a" stroke-width="1.5" stroke-dasharray="4 4"/>';
  });
  M.forEach((m,k)=>{ const y=topH+12+rowH*k+rowH*0.55;
    const i=idx[m.from], j=idx[m.to], xi=xOf(i), xj=xOf(j);
    const col=m.color||'#8aa6d6', dash=m.kind==='return'?' stroke-dasharray="6 4"':'', mk=m.kind==='async'?OP:AR;
    if(m.from===m.to){
      s+='<path d="M'+xi.toFixed(1)+' '+(y-9)+' h30 v18 h-30" fill="none" stroke="'+col+'" stroke-width="1.5" marker-end="url(#'+mk+')"/>';
      s+='<text x="'+(xi+36).toFixed(1)+'" y="'+(y-3)+'" font-size="11" fill="#9aa3b2">'+escHtml(m.label)+'</text>';
    } else {
      const x2=(xj+(xj>xi?-6:6)).toFixed(1);
      s+='<line x1="'+xi.toFixed(1)+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'" stroke="'+col+'" stroke-width="1.6"'+dash+' marker-end="url(#'+mk+')"/>';
      s+='<text x="'+((xi+xj)/2).toFixed(1)+'" y="'+(y-7)+'" text-anchor="middle" font-size="11" fill="#cdd3e0">'+escHtml(m.label)+'</text>';
      if(m.note) s+='<text x="'+((xi+xj)/2).toFixed(1)+'" y="'+(y+13)+'" text-anchor="middle" font-size="9.5" fill="#6a7385" font-style="italic">'+escHtml(m.note)+'</text>';
    }
  });
  s+='</svg>';
  return '<div class="diagram no-link">'+(spec.title?'<div class="dg-title">'+escHtml(spec.title)+'</div>':'')+s+'</div>';
}
/* BOXES({title?, nodeW?, nodes:[{id,label,col,row,color?}], edges:[{from,to,label?,dashed?}]})
   Grid layout via 0-based col/row. Edges auto-connect nearest box edges. */
function BOXES(spec){
  spec=spec||{}; const N=spec.nodes||[], E=spec.edges||[];
  let maxC=0,maxR=0; N.forEach(n=>{ maxC=Math.max(maxC,n.col||0); maxR=Math.max(maxR,n.row||0); });
  const nodeW=spec.nodeW||132, nodeH=46, gapX=46, gapY=34, padX=16, padY=16, titleH=spec.title?22:0;
  const W=padX*2+(maxC+1)*nodeW+maxC*gapX, H=padY*2+titleH+(maxR+1)*nodeH+maxR*gapY;
  const xOf=c=>padX+c*(nodeW+gapX), yOf=r=>padY+titleH+r*(nodeH+gapY);
  const pos={}; N.forEach(n=>{ const x=xOf(n.col||0), y=yOf(n.row||0); pos[n.id]={x,y,w:nodeW,h:nodeH,cx:x+nodeW/2,cy:y+nodeH/2}; });
  const uid=++_dgN, AR='bx'+uid;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Inter, system-ui, sans-serif">';
  s+='<defs><marker id="'+AR+'" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#7c98c8"/></marker></defs>';
  if(spec.title) s+='<text x="'+padX+'" y="15" font-size="12" font-weight="600" fill="#9aa3b2">'+escHtml(spec.title)+'</text>';
  E.forEach(e=>{ const a=pos[e.from], b=pos[e.to]; if(!a||!b) return;
    const dx=b.cx-a.cx, dy=b.cy-a.cy; let x1,y1,x2,y2;
    if(Math.abs(dx)>=Math.abs(dy)){ if(dx>=0){ x1=a.x+a.w; x2=b.x; } else { x1=a.x; x2=b.x+b.w; } y1=a.cy; y2=b.cy; }
    else { if(dy>=0){ y1=a.y+a.h; y2=b.y; } else { y1=a.y; y2=b.y+b.h; } x1=a.cx; x2=b.cx; }
    const ex=x2-(x2>x1?6:(x2<x1?-6:0)), ey=y2-(y2>y1?6:(y2<y1?-6:0)), dash=e.dashed?' stroke-dasharray="6 4"':'';
    s+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+ex.toFixed(1)+'" y2="'+ey.toFixed(1)+'" stroke="#5a6376" stroke-width="1.6"'+dash+' marker-end="url(#'+AR+')"/>';
    if(e.label) s+='<text x="'+((x1+x2)/2).toFixed(1)+'" y="'+((y1+y2)/2-4).toFixed(1)+'" text-anchor="middle" font-size="10" fill="#9aa3b2">'+escHtml(e.label)+'</text>';
  });
  N.forEach(n=>{ const p=pos[n.id], c=n.color||'#5b9dff';
    s+='<rect x="'+p.x+'" y="'+p.y+'" width="'+p.w+'" height="'+p.h+'" rx="8" fill="#1b1f27" stroke="'+c+'" stroke-width="1.5"/>';
    s+='<rect x="'+p.x+'" y="'+p.y+'" width="4" height="'+p.h+'" rx="2" fill="'+c+'"/>';
    s+='<text x="'+p.cx.toFixed(1)+'" y="'+(p.cy+4).toFixed(1)+'" text-anchor="middle" font-size="11.5" font-weight="600" fill="#dde2ec">'+escHtml(n.label)+'</text>';
  });
  s+='</svg>';
  return '<div class="diagram no-link">'+s+'</div>';
}

/* ============================================================================
   AUTO-LINKER  — wrap known glossary terms in clickable spans, safely
   (walks text nodes only; never breaks HTML; links each term once per block)
   ============================================================================ */
let ALIAS = null;
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function buildAlias(){
  const pairs = [];
  for(const id in GLOSSARY){
    const g = GLOSSARY[id];
    const names = [g.term].concat(g.aliases||[]);
    for(const n of names){ if(n && n.length>=3) pairs.push([n, id]); }
  }
  pairs.sort((a,b)=> b[0].length - a[0].length);
  const map = {}; const toks = [];
  for(const [alias,id] of pairs){
    const key = alias.toLowerCase();
    if(!(key in map)){ map[key]=id; toks.push(escapeRegex(alias)); }
  }
  let re;
  try { re = new RegExp('(?<![\\w-])(' + toks.join('|') + ')(?![\\w-])', 'gi'); }
  catch(e){ re = new RegExp('\\b(' + toks.join('|') + ')\\b', 'gi'); }
  ALIAS = { re, map };
}
function autolink(root, opts){
  if(!ALIAS) return;
  opts = opts || {};
  const skip = opts.skip || null;
  const once = new Set(); if(skip) once.add(skip);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      let p = node.parentNode;
      while(p && p !== root){
        const tag = p.nodeName;
        if(tag==='A'||tag==='SCRIPT'||tag==='STYLE'||tag==='BUTTON'||tag==='SUMMARY') return NodeFilter.FILTER_REJECT;
        if(tag==='PRE'||tag==='CODE') return NodeFilter.FILTER_REJECT;  // never link inside code blocks
        if(tag==='SVG'||tag==='svg'||tag.indexOf('MJX')===0) return NodeFilter.FILTER_REJECT;  // never touch rendered math or graphics
        if(p.classList && (p.classList.contains('term')||p.classList.contains('no-link'))) return NodeFilter.FILTER_REJECT;
        p = p.parentNode;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = []; while(walker.nextNode()) nodes.push(walker.currentNode);
  const { re, map } = ALIAS;
  for(const tn of nodes){
    const text = tn.nodeValue; re.lastIndex = 0;
    let m, last = 0, frag = null;
    while((m = re.exec(text))){
      const id = map[m[1].toLowerCase()];
      if(!id) continue;
      if(once.has(id)) continue;
      once.add(id);
      if(!frag) frag = document.createDocumentFragment();
      frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const s = document.createElement('span'); s.className='term'; s.dataset.term=id; s.textContent=m[1];
      frag.appendChild(s);
      last = m.index + m[1].length;
    }
    if(frag){ frag.appendChild(document.createTextNode(text.slice(last))); tn.parentNode.replaceChild(frag, tn); }
  }
}
/* typeset math first (so the linker can't corrupt LaTeX), THEN link terms */
/* escape literal currency dollars (e.g., $10) so MathJax treats them as text,
   not as inline-math delimiters. Only escapes "$" directly before a digit and
   NOT part of a "$$" display-math opener. Runs before MathJax typesets. */
function escapeCurrencyDollars(root){
  let re; try{ re = /(?<!\$)\$(?=\d)/g; }catch(e){ re = /\$(?=\d)/g; }
  function inCode(n){ let p=n.parentNode; while(p && p!==root){ if(p.nodeName==='PRE'||p.nodeName==='CODE') return true; p=p.parentNode; } return false; }
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
  for(const n of nodes){ if(inCode(n)) continue; if(n.nodeValue.indexOf('$')>=0 && /\$\d/.test(n.nodeValue)) n.nodeValue = n.nodeValue.replace(re, '\\$'); }
}
function typesetThenLink(el, opts){
  try{ escapeCurrencyDollars(el); }catch(e){}
  const done = ()=>{ try{ autolink(el, opts||{}); }catch(e){} };
  if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).then(done).catch(done);
  else done();
}

/* ============================================================================
   DRILL DRAWER  — navigation stack + breadcrumbs
   ============================================================================ */
let stack = [];
const drawer = document.getElementById('drawer');
const scrim = document.getElementById('scrim');

function openTerm(id, reset){
  if(!GLOSSARY[id]){ return; }
  if(reset) stack = [];
  if(stack[stack.length-1] !== id) stack.push(id);
  renderDrawer();
  drawer.classList.add('show'); scrim.classList.add('show');
  hideTooltip();
}
function drawerBack(){
  stack.pop();
  if(stack.length){ renderDrawer(); }
  else closeDrawer();
}
function closeDrawer(){ drawer.classList.remove('show'); scrim.classList.remove('show'); stack=[]; }

/* ---- rich-content renderers: equations (with per-variable glossary),
        multi worked-examples, and a generic per-example MINICHART ---- */
function renderEquation(eq){
  let h='<div class="equation-block"><div class="eq-math">$$'+eq.latex+'$$</div>';
  if(eq.where && eq.where.length){
    h+='<div class="eq-where"><div class="eq-where-h">where each term means</div><ul>'
      + eq.where.map(w=>'<li><span class="eq-sym no-link">$'+w.s+'$</span><span>'+w.d+'</span></li>').join('')
      + '</ul></div>';
  }
  return h+'</div>';
}
function renderExamples(list){
  let h='<div class="examples"><div class="examples-h">Worked Examples</div>';
  list.forEach((ex,i)=>{
    h+='<div class="example-card"><div class="ex-title no-link">'+(i+1)+'. '+ex.title+'</div>';
    if(ex.scenario) h+='<div class="ex-scenario">'+ex.scenario+'</div>';
    if(ex.given && ex.given.length) h+='<div class="ex-given no-link">'+ex.given.map(x=>'<span class="eq-sym">$'+x.s+'$</span> = '+x.d).join(' &nbsp;&middot;&nbsp; ')+'</div>';
    if(ex.steps && ex.steps.length) h+='<div class="ex-steps no-link">'+ex.steps.map(s=>'$$'+s+'$$').join('')+'</div>';
    if(ex.result) h+='<div class="ex-result">'+ex.result+'</div>';
    if(ex.chart) h+='<div class="minichart" data-chart="'+encodeURIComponent(JSON.stringify(ex.chart))+'"></div>';
    if(ex.graphicId && GRAPHICS[ex.graphicId]) h+='<div class="graphic" data-graphic="'+ex.graphicId+'"></div>';
    h+='</div>';
  });
  return h+'</div>';
}
function MINICHART(mount, spec){
  spec=spec||{}; const W=480; const unit=spec.unit||'';
  function fmt(v){ const r=Math.round(v*100)/100; if(unit==='$') return '$'+r.toLocaleString(); if(unit==='%') return r+'%'; return r+(unit?' '+unit:''); }
  if(spec.title){ const t=document.createElement('div'); t.className='mc-title'; t.textContent=spec.title; mount.appendChild(t); }
  if(spec.type==='bars'){
    const data=spec.data||[]; const max=spec.max || (Math.max.apply(null,data.map(d=>Math.abs(d.value)))*1.18) || 1;
    const rh=30, H=data.length*rh+8, x0=8, x1=W-160;
    const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    data.forEach((d,i)=>{ const y=i*rh+6; const w=Math.max(2,Math.abs(d.value)/max*(x1-x0)); const col=d.color||'#5b9dff';
      svg.appendChild(svgEl('rect',{x:x0,y:y,width:w,height:18,rx:4,fill:col,opacity:.85}));
      const lab=svgEl('text',{x:x0+w+8,y:y+13,fill:'#e7e9ee','font-size':12}); lab.textContent=d.label+'  '+fmt(d.value); svg.appendChild(lab); });
    mount.appendChild(svg); return;
  }
  if(spec.type==='stack'){
    const seg=spec.segments||[]; const tot=seg.reduce((s,x)=>s+Math.abs(x.value),0)||1;
    const H=68, x0=8, x1=W-8; const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H}); let x=x0;
    seg.forEach(s=>{ const w=Math.abs(s.value)/tot*(x1-x0); svg.appendChild(svgEl('rect',{x:x,y:18,width:Math.max(1,w),height:24,fill:s.color||'#5b9dff',opacity:.85}));
      if(w>42){ const t=svgEl('text',{x:x+w/2,y:34,'text-anchor':'middle',fill:'#06122b','font-size':10,'font-weight':'700'}); t.textContent=fmt(s.value); svg.appendChild(t); }
      if(w>30){ const lab=svgEl('text',{x:x+w/2,y:57,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); lab.textContent=s.label; svg.appendChild(lab); } x+=w; });
    mount.appendChild(svg); return;
  }
  if(spec.type==='numberline'){
    const min=spec.min, max=spec.max, H=64, padL=16,padR=16; const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    const xOf=v=>padL+(W-padL-padR)*(v-min)/((max-min)||1);
    svg.appendChild(svgEl('line',{x1:padL,y1:40,x2:W-padR,y2:40,stroke:'#2a2f3a','stroke-width':2}));
    [min,max].forEach(v=>{ const t=svgEl('text',{x:xOf(v),y:56,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=fmt(v); svg.appendChild(t); });
    (spec.marks||[]).forEach(m=>{ const x=xOf(m.value); svg.appendChild(svgEl('circle',{cx:x,cy:40,r:6,fill:m.color||'#5b9dff',stroke:'#fff','stroke-width':1.5}));
      const t=svgEl('text',{x:x,y:24,'text-anchor':'middle',fill:m.color||'#e7e9ee','font-size':10}); t.textContent=m.label+' '+fmt(m.value); svg.appendChild(t); });
    mount.appendChild(svg); return;
  }
  if(spec.type==='line'){
    const pts=spec.points||[]; if(!pts.length) return; const H=160,padL=44,padR=12,padT=12,padB=22, plotW=W-padL-padR, plotH=H-padT-padB;
    const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
    const xmin=Math.min.apply(null,xs), xmax=Math.max.apply(null,xs), ymin=Math.min(0,Math.min.apply(null,ys)), ymax=(Math.max.apply(null,ys)*1.1)||1;
    const xOf=x=>padL+plotW*(x-xmin)/((xmax-xmin)||1), yOf=y=>padT+plotH*(1-(y-ymin)/((ymax-ymin)||1));
    const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    svg.appendChild(svgEl('line',{x1:padL,y1:yOf(ymin),x2:W-padR,y2:yOf(ymin),stroke:'#2a2f3a'}));
    const yl=svgEl('text',{x:padL-6,y:yOf(ymax)+4,'text-anchor':'end',fill:'#9aa3b2','font-size':9}); yl.textContent=fmt(ymax); svg.appendChild(yl);
    let d=''; pts.forEach((p,i)=>{ d+=(i?'L':'M')+xOf(p[0])+' '+yOf(p[1])+' '; });
    svg.appendChild(svgEl('path',{d,fill:'none',stroke:spec.color||'#5b9dff','stroke-width':2.4}));
    (spec.marks||[]).forEach(m=>{ svg.appendChild(svgEl('circle',{cx:xOf(m[0]),cy:yOf(m[1]),r:4,fill:'#46d39a'})); });
    if(spec.xlabel){ const t=svgEl('text',{x:W/2,y:H-2,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=spec.xlabel; svg.appendChild(t); }
    mount.appendChild(svg); return;
  }
}

function renderDrawer(){
  const id = stack[stack.length-1];
  const g = GLOSSARY[id];
  // breadcrumbs
  const cr = document.getElementById('crumbs');
  cr.innerHTML = stack.map((sid,i)=>{
    const name = GLOSSARY[sid] ? GLOSSARY[sid].term : sid;
    return '<span class="c" data-i="'+i+'">'+name+'</span>' + (i<stack.length-1?'<span class="sep">›</span>':'');
  }).join('');

  let html = '<h2 class="no-link">'+g.term+'</h2>';
  if(g.expand) html += '<div class="expand-sub no-link">'+g.expand+'</div>';
  if(g.eli5) html += '<div class="eli5 no-link">'+g.eli5+'</div>';
  if(g.memory) html += '<div class="memory">'+g.memory+'</div>';
  if(g.equation) html += renderEquation(g.equation);
  if(g.full) html += g.full;
  if(g.graphic && GRAPHICS[g.graphic]) html += '<div class="graphic" data-graphic="'+g.graphic+'"></div>';
  if(g.examples && g.examples.length) html += renderExamples(g.examples);
  if(g.trap) html += '<div class="trap"><span class="trap-h">Gotcha</span>'+g.trap+'</div>';
  if(g.worked) html += '<div class="worked"><div class="wt">Worked example</div>'+g.worked+'</div>';
  if(g.deeper) html += '<details class="deeper"><summary>Go deeper</summary><div class="deeper-in">'+g.deeper+'</div></details>';
  if(g.related && g.related.length){
    html += '<div class="related"><div class="rt">Related concepts</div>'
      + g.related.map(r=> GLOSSARY[r] ? '<span class="rel-chip" data-term="'+r+'">'+GLOSSARY[r].term+'</span>' : '').join('')
      + '</div>';
  }
  const body = document.getElementById('drawerBody');
  body.innerHTML = html;
  body.scrollTop = 0;

  // mount graphics
  body.querySelectorAll('[data-graphic]').forEach(el=>{
    const fn = GRAPHICS[el.dataset.graphic]; if(fn) fn(el);
  });
  // mount per-example mini-charts
  body.querySelectorAll('[data-chart]').forEach(el=>{
    try{ MINICHART(el, JSON.parse(decodeURIComponent(el.dataset.chart))); }catch(e){}
  });
  // typeset math first, then autolink everything except the current term
  typesetThenLink(body, { skip:id });
}

function startQuiz(){

  for(let i=quizOrder.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [quizOrder[i],quizOrder[j]]=[quizOrder[j],quizOrder[i]]; }

function renderTest(v){
  if(!QUIZ.length){ v.innerHTML='<div class="empty">Question bank loading…</div>'; return; }

      + '<div class="qtext">Quiz complete</div>'

  v.innerHTML = '<div class="quiz-wrap">'
    + '<div class="scorebar"><span>Q'+(quizPos+1)+' / '+quizOrder.length+'</span><div class="progress"><div style="width:'+(quizPos/quizOrder.length*100)+'%"></div></div><span>Score '+quizScore+'</span></div>'
    + '<div class="qcard">'

    + '<div class="qtext">'+q.q+'</div>'
    + '<div id="choices">'+ q.choices.map((ch,i)=>'<button class="choice" data-i="'+i+'"><span class="mk">'+String.fromCharCode(65+i)+'</span>'+ch+'</button>').join('') +'</div>'
    + '<div class="explain" id="explain"></div>'
    + '<div class="nav-row" style="justify-content:flex-end;margin-top:16px"><button class="btn primary" id="qnext" style="display:none">Next ›</button></div>'
    + '</div></div>';

  const choicesEl = v.querySelector('#choices');
  const explainEl = v.querySelector('#explain');
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([v]).catch(()=>{});
  choicesEl.querySelectorAll('.choice').forEach(btn=>{
    btn.onclick = ()=>{
      if(quizAnswered) return; quizAnswered=true;
      const pick = +btn.dataset.i;
      const correct = q.answer;
      choicesEl.querySelectorAll('.choice').forEach((b,i)=>{
        if(i===correct) b.classList.add('correct');

        b.style.pointerEvents='none';

      if(pick===correct) quizScore++;
      explainEl.innerHTML = '<div class="why">'+(pick===correct?'<b style="color:var(--good)">Correct.</b> ':'<b style="color:var(--bad)">Not quite.</b> ')+q.explain+'</div>';
      explainEl.classList.add('show');
      typesetThenLink(explainEl, {});
      const nx=v.querySelector('#qnext'); nx.style.display='inline-block';
      nx.onclick=()=>{ quizPos++; renderTest(v); };
    };
  });
}

/* ============================================================================
   EXAM SIMULATOR  — section-weighted, timed, auto-generated from all cards
   ============================================================================ */
/* Curated cross-deck "interview" mocks. Topic weights are RELATIVE (auto-normalized). */
const EXAM_BLUEPRINTS_CURATED = {
  "interview:senior-de": { label:"Senior Data Engineer", group:"interview", pass:0.72,
    blurb:"Streaming-heavy: messaging, delivery semantics, lakehouse modeling.",
    topics:{ MSG:3, DELIV:3, MEDALLION:2, EDA:1 } },
  "interview:backend-platform": { label:"Backend / Platform", group:"interview", pass:0.72,
    blurb:"Event-driven architecture and reliable messaging.",
    topics:{ EDA:3, MSG:2, DELIV:2 } }
};
/* Live registry, rebuilt at boot from DECKS + CARDS so content waves need no exam edits. */
let EXAM_BLUEPRINTS = {};
let examBlueprintId = "all";
function bpEligible(bp){ const t=Object.keys(bp.topics); return CARDS.filter(c=> t.indexOf(c.sec)>=0); }
function bpPoolSize(bp){ return bpEligible(bp).length; }
function buildBlueprints(){
  EXAM_BLUEPRINTS = {};
  const cardSecs = new Set(CARDS.map(c=>c.sec));
  // (1) All-cards default: every live topic, equal weight
  const allTopics={}; cardSecs.forEach(t=> allTopics[t]=1);
  EXAM_BLUEPRINTS["all"] = { label:"All decks", group:"all", pass:0.72, blurb:"Every card across every deck.", topics:allTopics };
  // (2) one mock per deck that owns a card-bearing topic; topic weight = its card count
  DECKS.forEach(d=>{ const tw={}; (d.topics||[]).forEach(t=>{ if(cardSecs.has(t)) tw[t]=CARDS.filter(c=>c.sec===t).length; });
    if(Object.keys(tw).length) EXAM_BLUEPRINTS["deck:"+d.id] = { label:d.name, group:"deck", deckColor:d.color, pass:0.72, blurb:"Single-deck mock.", topics:tw }; });
  // (3) curated interviews: keep only topics with live cards; drop the blueprint if it empties
  for(const id in EXAM_BLUEPRINTS_CURATED){ const bp=EXAM_BLUEPRINTS_CURATED[id]; const tw={};
    for(const t in bp.topics){ if(cardSecs.has(t)) tw[t]=bp.topics[t]; }
    if(Object.keys(tw).length) EXAM_BLUEPRINTS[id] = Object.assign({}, bp, {topics:tw}); }
  // (4) self-heal a stale selection
  if(!EXAM_BLUEPRINTS[examBlueprintId]) examBlueprintId = "all";
}
function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return (d.textContent||'').replace(/\s+/g,' ').trim(); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function firstSentence(txt){ const m=txt.match(/^.*?[.:](\s|$)/); let s=m?m[0]:txt; if(s.length<45) s=txt.slice(0,170); return s.trim(); }

// blueprint-aware MCQ generator. n = requested length; bpId selects the active blueprint.
// Guarantees: builds exactly min(n, poolSize) questions; never over-draws a thin topic;
// a 1-card topic still yields a 4-choice MCQ via cross-pool distractor borrowing;
// returns [] only when the blueprint has no eligible cards (caller shows empty-state).
function buildExam(n, bpId){
  const bp = EXAM_BLUEPRINTS[bpId] || EXAM_BLUEPRINTS["all"];
  const eligible = bpEligible(bp);
  if(!eligible.length) return [];
  n = Math.min(n, eligible.length);                 // tiny-pool clamp: 12 cards => max 12 Qs

  // group eligible cards by topic (card.sec); drop topics with no cards
  const byTopic = {}; Object.keys(bp.topics).forEach(t=> byTopic[t]=[]);
  eligible.forEach(c=> byTopic[c.sec].push(c));
  const topics = Object.keys(byTopic).filter(t=> byTopic[t].length);

  // relative-weight -> integer counts, each clamped to that topic's available cards, >=1 where possible
  const wsum = topics.reduce((s,t)=> s + (bp.topics[t]||0), 0) || topics.length;
  const cap = t=> byTopic[t].length;
  let counts = topics.map(t=> Math.min(cap(t), Math.max(1, Math.round(n * (bp.topics[t]||1) / wsum))));
  let total = counts.reduce((a,b)=>a+b,0);
  let guard = 0;
  while(total > n && guard++ < 9999){               // trim from the largest allocation still >1
    let idx=-1, best=1; topics.forEach((t,i)=>{ if(counts[i]>best){ best=counts[i]; idx=i; } });
    if(idx<0) break; counts[idx]--; total--;
  }
  guard = 0;
  while(total < n && guard++ < 9999){                // grow the topic with the most spare cards
    let idx=-1, slack=0; topics.forEach((t,i)=>{ const s=cap(t)-counts[i]; if(s>slack){ slack=s; idx=i; } });
    if(idx<0) break; counts[idx]++; total++;
  }

  // build questions per topic
  const qs=[];
  topics.forEach((t,i)=>{
    const pool = shuffle(byTopic[t]);
    for(let k=0; k<counts[i] && k<pool.length; k++){
      const card = pool[k], correct = card.front;
      // distractors: prefer same-topic fronts; if <3, escalate to the blueprint pool, then ALL cards,
      // so even a single-card topic (e.g. a 1-card deck mock) still yields a full 4-choice MCQ.
      let distract = shuffle(pool.filter(c=>c.front!==correct)).slice(0,3).map(c=>c.front);
      if(distract.length < 3){
        [eligible, CARDS].forEach(src=>{ if(distract.length>=3) return;
          const extra = shuffle(src.filter(c=> c.front!==correct && distract.indexOf(c.front)<0)).map(c=>c.front);
          distract = distract.concat(extra).slice(0,3); });
      }
      const choices = shuffle([correct].concat(distract));
      let sent = firstSentence(stripHtml(card.back));
      try { const r=new RegExp(stripHtml(correct).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'); sent=sent.replace(r,'_____'); } catch(e){}
      qs.push({ stem:'Which concept best matches this description?  “'+sent+'”',
                choices, answer:choices.indexOf(correct),
                area:(SECTIONS[card.sec]||card.sec),   // results tally keyed by topic display name
                sec:card.sec, back:card.back, front:correct });
    }
  });
  return shuffle(qs);
}

let examState=null, examTimer=null;
function renderExam(v){
  if(!examState){
    const groups = { interview:[], deck:[], all:[] };
    Object.keys(EXAM_BLUEPRINTS).forEach(id=>{ const bp=EXAM_BLUEPRINTS[id]; (groups[bp.group]||groups.deck).push({id,bp}); });
    const opt = arr => arr.map(o=>'<option value="'+o.id+'"'+(o.id===examBlueprintId?' selected':'')+'>'+o.bp.label+' ('+bpPoolSize(o.bp)+')</option>').join('');
    v.innerHTML = '<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
      + '<div class="qtext">Exam Simulator</div>'
      + '<p style="color:var(--ink-dim)">Pick a blueprint, length, and timing. <span id="passCopy"></span></p>'
      + '<select id="bpPick" class="bp-select">'
      +   (groups.interview.length?'<optgroup label="Interview mocks">'+opt(groups.interview)+'</optgroup>':'')
      +   (groups.deck.length?'<optgroup label="Single-deck mocks">'+opt(groups.deck)+'</optgroup>':'')
      +   (groups.all.length?'<optgroup label="All decks">'+opt(groups.all)+'</optgroup>':'')
      + '</select>'
      + '<p id="bpBlurb" class="bp-blurb"></p>'
      + '<div class="toggle-row" style="justify-content:center" id="lenpick">'
      +   '<button data-n="20">Quick · 20</button><button data-n="60" class="on">Standard · 60</button><button data-n="130">Full · 130</button>'
      + '</div>'
      + '<p id="poolNote" class="bp-pool"></p>'
      + '<label style="display:block;margin:14px 0;color:var(--ink-dim);font-size:13px"><input type="checkbox" id="timed" checked> Timed (≈78 sec/question)</label>'
      + '<button class="btn primary" id="startExam">Begin</button>'
      + '</div></div>';
    let len=60;
    const lenBtns = [...v.querySelectorAll('#lenpick button')];
    function syncPicker(){
      const bp = EXAM_BLUEPRINTS[examBlueprintId]; const pool = bpPoolSize(bp);
      v.querySelector('#bpBlurb').textContent = bp.blurb||'';
      v.querySelector('#passCopy').textContent = 'Pass mark is '+Math.round((bp.pass||0.72)*100)+'%.';
      lenBtns.forEach(b=>{ const tooBig=(+b.dataset.n)>pool && pool>0; b.disabled=tooBig; b.classList.toggle('off',tooBig); });
      if(len>pool){ const enabled=lenBtns.filter(b=>!b.disabled).map(b=>+b.dataset.n);
        len = enabled.length ? Math.max(...enabled) : pool;
        lenBtns.forEach(b=> b.classList.toggle('on', +b.dataset.n===len)); }
      const note=v.querySelector('#poolNote');
      note.textContent = pool===0 ? 'No cards in this blueprint yet.'
                       : pool<20  ? 'Only '+pool+' concepts here — exam will use all '+Math.min(len,pool)+'.'
                       : pool+' cards available.';
      v.querySelector('#startExam').disabled = pool===0;
    }
    v.querySelector('#bpPick').onchange = e=>{ examBlueprintId=e.target.value; syncPicker(); };
    lenBtns.forEach(b=> b.onclick=()=>{ if(b.disabled) return; lenBtns.forEach(x=>x.classList.remove('on')); b.classList.add('on'); len=+b.dataset.n; });
    v.querySelector('#startExam').onclick=()=>{
      const timed=v.querySelector('#timed').checked;
      const bp=EXAM_BLUEPRINTS[examBlueprintId];
      const qs=buildExam(len, examBlueprintId);
      if(!qs.length){ v.querySelector('#poolNote').textContent='This mock has no cards yet — pick another.'; return; }
      examState={ qs, pos:0, answers:[], timed, remaining:Math.round(qs.length*78), bpId:examBlueprintId, pass:(bp.pass||0.72) };
      renderExam(v);
    };
    syncPicker();
    return;
  }
  if(examState.pos>=examState.qs.length){ return renderExamResults(v); }
  const q=examState.qs[examState.pos];
  v.innerHTML = '<div class="quiz-wrap">'
    + '<div class="scorebar"><span>Q'+(examState.pos+1)+' / '+examState.qs.length+'</span><div class="progress"><div style="width:'+(examState.pos/examState.qs.length*100)+'%"></div></div><span id="examClock"></span></div>'
    + '<div class="qcard"><div class="qmeta"><span>'+q.area+'</span></div>'
    + '<div class="qtext">'+q.stem+'</div>'
    + '<div id="choices">'+q.choices.map((c,i)=>'<button class="choice" data-i="'+i+'"><span class="mk">'+String.fromCharCode(65+i)+'</span>'+c+'</button>').join('')+'</div>'
    + '<div class="nav-row" style="justify-content:space-between;margin-top:16px"><button class="btn" id="examSkip">Skip</button><button class="btn primary" id="examNext" disabled>Next ›</button></div>'
    + '</div></div>';
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([v]).catch(()=>{});
  let chosen=null;
  v.querySelectorAll('.choice').forEach(b=> b.onclick=()=>{
    chosen=+b.dataset.i;
    v.querySelectorAll('.choice').forEach(x=> x.classList.remove('correct','wrong'));
    b.style.borderColor='var(--accent)';
    v.querySelector('#examNext').disabled=false;
  });
  v.querySelector('#examNext').onclick=()=>{ examState.answers[examState.pos]=chosen; examState.pos++; renderExam(v); };
  v.querySelector('#examSkip').onclick=()=>{ examState.answers[examState.pos]=(chosen==null?null:chosen); examState.pos++; renderExam(v); };
  startExamClock(v);
}
function startExamClock(v){
  clearInterval(examTimer);
  if(!examState.timed){ const c=document.getElementById('examClock'); if(c) c.textContent='untimed'; return; }
  function tick(){
    if(!examState || mode!=='exam'){ clearInterval(examTimer); return; }
    const mm=Math.floor(examState.remaining/60), ss=examState.remaining%60;
    const el=document.getElementById('examClock');
    if(el){ el.textContent='⏱ '+mm+':'+String(ss).padStart(2,'0'); el.style.color = examState.remaining<60?'var(--bad)':'var(--ink-dim)'; }
    if(examState.remaining<=0){ clearInterval(examTimer); examState.pos=examState.qs.length; renderExam(v); return; }
    examState.remaining--;
  }
  tick(); examTimer=setInterval(tick,1000);
}
function renderExamResults(v){
  clearInterval(examTimer);
  const qs=examState.qs, ans=examState.answers;
  let correct=0; const tally={};
  qs.forEach((q,i)=>{ const ok=ans[i]===q.answer; if(ok)correct++; (tally[q.area]=tally[q.area]||{c:0,t:0}); tally[q.area].t++; if(ok)tally[q.area].c++; });
  const passMark=Math.round((examState.pass||0.72)*100);
  const pct=Math.round(correct/qs.length*100), pass=pct>=passMark;
  let html='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
    + '<div class="qtext">'+(pass?'<span style="color:var(--good)">PASS</span>':'<span style="color:var(--bad)">Below pass mark</span>')+'</div>'
    + '<div style="font-size:46px;font-weight:800;color:'+(pass?'var(--good)':'var(--bad)')+'">'+pct+'%</div>'
    + '<div class="qmeta" style="justify-content:center;margin:2px 0 8px"><span>'+((EXAM_BLUEPRINTS[examState.bpId]||{label:'Exam'}).label)+'</span></div>'
    + '<p style="color:var(--ink-dim)">'+correct+' / '+qs.length+' correct · pass mark '+passMark+'%</p>'
    + '<div class="readout" style="text-align:left">';
  Object.keys(tally).forEach(a=>{ const t=tally[a]; html+='<div class="ro"><div class="k">'+a+'</div><div class="v">'+t.c+'/'+t.t+' · '+Math.round(t.c/t.t*100)+'%</div></div>'; });
  html += '</div><div class="nav-row"><button class="btn" id="examReview">Review misses</button><button class="btn primary" id="examAgain">New exam</button></div>'
    + '</div><div id="reviewArea"></div></div>';
  v.innerHTML=html;
  v.querySelector('#examAgain').onclick=()=>{ examState=null; renderExam(v); };
  v.querySelector('#examReview').onclick=()=>{
    const misses=qs.map((q,i)=>({q,i})).filter(x=> ans[x.i]!==x.q.answer);
    const ra=document.getElementById('reviewArea');
    if(!misses.length){ ra.innerHTML='<div class="empty">Perfect score — nothing to review.</div>'; return; }
    ra.innerHTML = misses.map(x=>{
      const q=x.q, your = (x.i in ans && ans[x.i]!=null) ? q.choices[ans[x.i]] : '(skipped)';
      return '<div class="qcard" style="margin-top:12px"><div class="qmeta"><span>'+q.area+'</span></div>'
        + '<div style="font-size:14.5px;margin-bottom:8px">'+q.stem+'</div>'
        + '<div style="font-size:13px;color:var(--bad)">You: '+your+'</div>'
        + '<div style="font-size:13px;color:var(--good);margin-bottom:8px">Correct: '+q.front+'</div>'
        + '<div class="explain show"><div class="why">'+q.back+'</div></div></div>';
    }).join('');
    typesetThenLink(ra,{});
    ra.scrollIntoView({behavior:'smooth'});
  };
}

/* ============================================================================
   SPACED REPETITION — Review mode (Leitner / SM-2-lite) + localStorage scheduler.
   Degrades to in-memory if storage is blocked; never blocks Study/Quiz.
   ============================================================================ */
const SRS_KEY='ell_srs_v1';
let _srs=null;
function srsLoad(){ if(_srs) return _srs; try{ const r=localStorage.getItem(SRS_KEY); _srs=r?JSON.parse(r):{}; }catch(e){ _srs={}; } return _srs; }
function srsSave(){ try{ localStorage.setItem(SRS_KEY, JSON.stringify(_srs||{})); }catch(e){} }
function cardId(c){ if(c._id) return c._id; const s=(c.sec||'')+'|'+(c.front||''); let h=5381; for(let i=0;i<s.length;i++) h=((h*33)^s.charCodeAt(i))>>>0; return (c._id='k'+h.toString(36)); }
const SRS_DAY=86400000, SRS_BOX_DAYS=[0,1,3,7,16,35,90], SRS_NEW_PER=20;
function srsGrade(c,q){ const st=srsLoad(), id=cardId(c), now=Date.now(); let s=st[id]||{box:0,due:0,reps:0,lapses:0};
  if(q==='again'){ s.box=0; s.lapses=(s.lapses||0)+1; s.due=now+60000; }
  else if(q==='hard'){ s.box=Math.max(1,s.box); s.due=now+Math.round(SRS_BOX_DAYS[s.box]*0.6*SRS_DAY); }
  else if(q==='good'){ s.box=Math.min(6,s.box+1); s.due=now+SRS_BOX_DAYS[s.box]*SRS_DAY; }
  else if(q==='easy'){ s.box=Math.min(6,s.box+2); s.due=now+Math.round(SRS_BOX_DAYS[s.box]*1.3*SRS_DAY); }
  s.reps=(s.reps||0)+1; s.last=now; st[id]=s; srsSave(); return s; }
function srsDueCount(){ const st=srsLoad(), now=Date.now(); let d=0; for(const c of CARDS){ const s=st[cardId(c)]; if(s && s.due<=now) d++; } return d; }
function srsStats(){ const st=srsLoad(), now=Date.now(); const s={total:CARDS.length,seen:0,newCount:0,due:0,learning:0,young:0,mature:0};
  for(const c of CARDS){ const x=st[cardId(c)]; if(!x){ s.newCount++; continue; } s.seen++; if(x.due<=now) s.due++; if(x.box<=2) s.learning++; else if(x.box<=4) s.young++; else s.mature++; } return s; }
function updateDueBadge(){ const b=document.getElementById('dueBadge'); if(!b) return; const n=srsDueCount(); b.textContent=n>0?n:''; b.style.display=n>0?'inline-block':'none'; }
function srsStatGrid(s){ const box=(k,v,c)=>'<div class="ro"><div class="k">'+k+'</div><div class="v" style="color:'+(c||'var(--ink)')+'">'+v+'</div></div>';
  return '<div class="readout" style="margin-top:18px">'+box('Total',s.total)+box('New',s.newCount,'#9aa3b2')+box('Learning',s.learning,'#ff9f43')+box('Young',s.young,'#5b9dff')+box('Mature',s.mature,'#46d39a')+box('Due now',s.due,'#d56f7a')+'</div>'; }
function buildReviewQueue(newOnly){ const st=srsLoad(), now=Date.now(); const due=[], fresh=[];
  CARDS.forEach(c=>{ const s=st[cardId(c)]; if(!s) fresh.push(c); else if(s.due<=now) due.push({c,d:s.due}); });
  due.sort((a,b)=>a.d-b.d);
  return newOnly ? shuffle(fresh).slice(0,SRS_NEW_PER) : due.map(x=>x.c).concat(shuffle(fresh).slice(0,SRS_NEW_PER)); }
let reviewState=null;
function rvGradeAdvance(g, v){ const c=reviewState.queue[reviewState.pos]; if(!c) return; srsGrade(c,g); reviewState.res[g]++; reviewState.graded++; if(g==='again') reviewState.queue.push(c); reviewState.pos++; reviewState.shown=false; updateDueBadge(); renderReview(v); }
function renderReview(v){
  if(!reviewState){
    const st=srsStats(), dueN=st.due, newAvail=st.newCount, startN=dueN+Math.min(SRS_NEW_PER,newAvail);
    v.innerHTML='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
      +'<div class="qtext">Spaced Repetition</div>'
      +(startN>0
         ? '<p class="rv-sub">'+dueN+' due'+(newAvail>0?' &middot; up to '+Math.min(SRS_NEW_PER,newAvail)+' new':'')+'</p><button class="btn primary" id="rvStart">Start review &middot; '+startN+'</button>'
         : '<p class="rv-sub">🎉 All caught up — nothing due right now.</p>'+(st.seen<st.total?'<div style="margin-top:8px"><button class="btn" id="rvLearn">Learn new cards</button></div>':''))
      +'</div>'+srsStatGrid(st)+'</div>';
    const a=document.getElementById('rvStart'); if(a) a.onclick=()=>{ reviewState={queue:buildReviewQueue(false),pos:0,shown:false,graded:0,res:{again:0,hard:0,good:0,easy:0}}; renderReview(v); };
    const l=document.getElementById('rvLearn'); if(l) l.onclick=()=>{ reviewState={queue:buildReviewQueue(true),pos:0,shown:false,graded:0,res:{again:0,hard:0,good:0,easy:0}}; renderReview(v); };
    return;
  }
  if(reviewState.pos>=reviewState.queue.length) return renderReviewDone(v);
  const c=reviewState.queue[reviewState.pos];
  v.innerHTML='<div class="quiz-wrap">'
    +'<div class="scorebar"><span>'+(reviewState.pos+1)+' / '+reviewState.queue.length+'</span><div class="progress"><div style="width:'+(reviewState.pos/reviewState.queue.length*100)+'%"></div></div><span>graded '+reviewState.graded+'</span></div>'
    +'<div class="flash" id="rvFlash">'
      +'<div class="sec">'+(SECTIONS[c.sec]||c.sec)+'</div>'
      +(reviewState.shown?'<div class="ans">'+c.back+'</div>':'<div class="term-q">'+c.front+'</div>')
      +'<div class="hint">'+(reviewState.shown?'How well did you recall it?':'Tap to reveal · Space')+'</div>'
    +'</div>'
    +(reviewState.shown
      ? '<div class="rv-grades"><button class="rv-g rv-again" data-g="again">Again<small>1</small></button><button class="rv-g rv-hard" data-g="hard">Hard<small>2</small></button><button class="rv-g rv-good" data-g="good">Good<small>3</small></button><button class="rv-g rv-easy" data-g="easy">Easy<small>4</small></button></div>'
      : '<div class="nav-row"><button class="btn primary" id="rvReveal">Reveal</button></div>')
    +'</div>';
  const flash=document.getElementById('rvFlash');
  flash.onclick=(e)=>{ if(e.target.closest('.term')) return; if(!reviewState.shown){ reviewState.shown=true; renderReview(v); } };
  if(reviewState.shown) typesetThenLink(flash.querySelector('.ans'),{}); else if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([flash]).catch(()=>{});
  const rev=document.getElementById('rvReveal'); if(rev) rev.onclick=()=>{ reviewState.shown=true; renderReview(v); };
  v.querySelectorAll('.rv-g').forEach(b=> b.onclick=()=> rvGradeAdvance(b.dataset.g, v));
}
function renderReviewDone(v){ const r=reviewState.res;
  v.innerHTML='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
    +'<div class="qtext">Session complete</div>'
    +'<div style="font-size:42px;font-weight:800;color:var(--accent)">'+reviewState.graded+'</div>'
    +'<p class="rv-sub">'+r.good+' good &middot; '+r.easy+' easy &middot; '+r.hard+' hard &middot; '+r.again+' again</p>'
    +'<button class="btn primary" id="rvBack">Back to review</button></div></div>';
  document.getElementById('rvBack').onclick=()=>{ reviewState=null; updateDueBadge(); renderReview(v); };
}
/* Review keyboard: Space reveals, 1-4 grade */
document.addEventListener('keydown', e=>{
  if(mode!=='review' || !reviewState || reviewState.pos>=reviewState.queue.length) return;
  if(e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
  const v=document.getElementById('view');
  if(e.key===' '){ e.preventDefault(); if(!reviewState.shown){ reviewState.shown=true; renderReview(v); } }
  else if(reviewState.shown){ const map={'1':'again','2':'hard','3':'good','4':'easy'}; if(map[e.key]){ e.preventDefault(); rvGradeAdvance(map[e.key], v); } }
});

/* Study / Quiz / Exam keyboard (Review keeps its own handler above; mutually mode-gated). */
document.addEventListener('keydown', e=>{
  if(e.target && /INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;   // don't fire while typing/selecting
  if(document.activeElement===searchBox) return;
  if(drawer.classList.contains('show')) return;                           // term modal open -> Escape owns the keys
  const v=document.getElementById('view');
  if(mode==='study'){
    if(!studyCards().length) return;
    if(e.key===' '||e.key==='f'){ e.preventDefault(); const b=document.getElementById('flip'); if(b) b.click(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); const b=document.getElementById('next'); if(b) b.click(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); const b=document.getElementById('prev'); if(b) b.click(); }
  } else if(mode==='test'){
    if(/^[1-4]$/.test(e.key)){ if(quizAnswered) return; const b=v.querySelector('.choice[data-i="'+(+e.key-1)+'"]'); if(b){ e.preventDefault(); b.click(); } }
    else if(e.key==='Enter'){ const qn=document.getElementById('qnext'); if(qn && qn.style.display!=='none'){ e.preventDefault(); qn.click(); } }
  } else if(mode==='exam' && examState && examState.pos<examState.qs.length){
    if(/^[1-4]$/.test(e.key)){ const b=v.querySelector('.choice[data-i="'+(+e.key-1)+'"]'); if(b){ e.preventDefault(); b.click(); } }
    else if(e.key==='Enter'){ const nx=document.getElementById('examNext'); if(nx && !nx.disabled){ e.preventDefault(); nx.click(); } }
    else if(e.key==='s'||e.key==='S'){ e.preventDefault(); const b=document.getElementById('examSkip'); if(b) b.click(); }
  }
});

function boot(){
  Object.assign(SECTIONS, SECTIONS_DATA);
  CARDS.push(...CARDS_DATA);

  if(typeof ENHANCE !== 'undefined'){ for(const id in ENHANCE){ if(GLOSSARY[id]) Object.assign(GLOSSARY[id], ENHANCE[id]); else GLOSSARY[id]=ENHANCE[id]; } }
  QUIZ.push(...QUIZ_DATA);
  if(typeof DECKS_DATA!=='undefined') DECKS.push(...DECKS_DATA);
  DECKS.forEach(d=>{ (d.topics||[]).forEach(t=>{ TOPIC2DECK[t]=d; }); });
  buildBlueprints();
  buildAlias();
  buildSearchIndex();

  render();
}
function buildSearchIndex(){ _searchIdx = Object.keys(GLOSSARY).map(id=>{ const g=GLOSSARY[id]; return {id, hay:(g.term+' '+(g.aliases||[]).join(' ')+' '+(g.eli5||'')).toLowerCase()}; }); }
