<script>
/* Consumer Groups & Offsets (DSS-CONSUMER) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-CONSUMER","front":"What problem does a consumer group solve, and what is its core invariant?","back":"A <strong>consumer group</strong> is the unit of <strong>horizontal scaling and fault tolerance</strong> for consuming a topic. Core invariant: <strong>each partition is consumed by exactly one consumer within a given group at a time</strong> (a consumer may own many partitions, but a partition is never split across two consumers in the same group). Multiple independent groups each get their own full copy of the stream and track offsets separately."},
  {"sec":"DSS-CONSUMER","front":"Why is the number of partitions the hard ceiling on consumer parallelism within a group?","back":"Because a partition maps to <strong>at most one consumer in the group</strong>, the maximum number of <em>actively working</em> consumers equals the partition count. If you run <code>N</code> consumers against <code>P</code> partitions with <code>N &gt; P</code>, the extra <code>N - P</code> consumers sit <strong>idle</strong> as hot standbys. To scale throughput beyond <code>P</code>, you must increase the partition count."},
  {"sec":"DSS-CONSUMER","front":"What is the group coordinator and which broker plays that role?","back":"The <strong>group coordinator</strong> is a broker that manages one group's membership, heartbeats, and offset commits. The specific broker is the <strong>leader of the <code>__consumer_offsets</code> partition</strong> that the group hashes to (via <code>group.id</code>). It detects member failures (missed heartbeats), triggers rebalances, and elects one consumer as the <strong>group leader</strong> that actually computes the partition assignment."},
  {"sec":"DSS-CONSUMER","front":"Who computes the partition assignment — the coordinator or a consumer?","back":"A consumer does. The coordinator picks one member as the <strong>group leader</strong> and ships it the full member list and subscriptions; the leader runs the configured <strong>assignor</strong> (e.g. <code>RangeAssignor</code>, <code>CooperativeStickyAssignor</code>) <em>client-side</em> and returns the assignment to the coordinator, which fans it out. This keeps assignment logic pluggable without redeploying brokers."},
  {"sec":"DSS-CONSUMER","front":"Contrast the range, round-robin, and sticky assignment strategies.","back":"<ul><li><strong>Range</strong>: per-topic, assigns contiguous partition ranges per consumer; with multiple topics it <em>skews</em> load onto lower-numbered consumers.</li><li><strong>Round-robin</strong>: lays all subscribed partitions across all topics in one list and deals them out — balanced for uniform subscriptions, but reshuffles everything on any change.</li><li><strong>Sticky</strong>: balanced like round-robin but <strong>minimizes movement</strong> across rebalances, preserving most existing assignments.</li></ul>"},
  {"sec":"DSS-CONSUMER","front":"What does eager (stop-the-world) rebalancing do, and why is it costly?","back":"In the <strong>eager protocol</strong>, every consumer <strong>revokes ALL its partitions</strong> at the start of a rebalance, then the leader reassigns from scratch. During the gap <strong>no one is consuming any partition</strong> — a global processing pause. Because the revoke is all-or-nothing, the cost scales with the group's <strong>total assignment size</strong>, not the size of the change, so even adding one consumer halts the whole group briefly."},
  {"sec":"DSS-CONSUMER","front":"How does incremental cooperative rebalancing avoid the stop-the-world pause?","back":"It runs in <strong>two rounds</strong> and only revokes partitions that must actually <em>move</em>. Round 1: the leader computes the target assignment and members revoke just the partitions being reassigned away; round 2: those freed partitions are granted to their new owners. Consumers <strong>keep processing partitions they retain</strong> throughout, so there is no global pause. This is the behavior of <code>CooperativeStickyAssignor</code>."},
  {"sec":"DSS-CONSUMER","front":"What is a rebalance storm and what commonly triggers one?","back":"A <strong>rebalance storm</strong> is repeated, cascading rebalances that starve the group of progress. Common triggers: slow processing causing <code>max.poll.interval.ms</code> to be exceeded (the consumer is ejected, rejoins, repeat); GC pauses or network blips dropping heartbeats; or rolling deploys where each pod restart kicks a full eager rebalance. The group spends more time rebalancing than consuming."},
  {"sec":"DSS-CONSUMER","front":"How does static membership (group.instance.id) reduce rebalances?","back":"Setting a stable <strong><code>group.instance.id</code></strong> makes a consumer a <strong>static member</strong>: on restart it rejoins with the same identity and <strong>reclaims its previous assignment</strong> without triggering a rebalance, as long as it returns within <code>session.timeout.ms</code>. This is ideal for rolling restarts/deploys of stateful consumers, eliminating the churn of bounce-induced rebalances. The trade-off: a genuinely dead static member's partitions aren't reassigned until <code>session.timeout.ms</code> elapses."},
  {"sec":"DSS-CONSUMER","front":"Where are committed offsets stored in modern Kafka, and what kind of topic is it?","back":"In the internal <strong><code>__consumer_offsets</code></strong> topic — a <strong>compacted</strong> Kafka topic (commonly <strong>50 partitions</strong> by default) keyed by <code>(group, topic, partition)</code>. Each commit is a record; compaction retains the latest offset per key. A group is routed to a single partition (and thus coordinator) by hashing its <code>group.id</code>. (Older Kafka stored offsets in ZooKeeper.)"},
  {"sec":"DSS-CONSUMER","front":"What exactly does a committed offset represent — the last record read or something else?","back":"It represents the <strong>next offset to read</strong> — i.e. <code>last_processed_offset + 1</code>, the position to resume from. A common off-by-one bug is committing the offset of the record just processed instead of <code>offset + 1</code>, causing that record to be re-delivered on restart. The committed offset is the consumer's durable bookmark, independent of the partition's own log."},
  {"sec":"DSS-CONSUMER","front":"Why can auto-commit cause both data loss AND duplicates?","back":"With <code>enable.auto.commit=true</code>, the consumer commits the largest offset returned by the previous <code>poll()</code> on a timer (<code>auto.commit.interval.ms</code>, default 5s) — <strong>based on what was polled, not what was processed</strong>. <strong>Data loss</strong>: offsets advance, then the consumer crashes before processing those polled records — they're skipped on restart. <strong>Duplicates</strong>: records processed but the consumer dies before the next auto-commit — they're re-read. Auto-commit decouples the commit from your actual work."},
  {"sec":"DSS-CONSUMER","front":"How do you achieve at-least-once delivery with manual commits?","back":"<strong>Commit AFTER processing</strong>: poll → fully process/persist the batch → then commit the offsets (<code>commitSync</code>/<code>commitAsync</code>). If you crash after processing but before committing, you reprocess those records (a duplicate) — never lose them, hence <strong>at-least-once</strong>. Committing <em>before</em> processing gives at-most-once (possible loss). True exactly-once needs transactions or an idempotent sink."},
  {"sec":"DSS-CONSUMER","front":"What is consumer lag and why is it the primary health signal?","back":"<strong>Consumer lag</strong> = <code>log-end-offset</code> (latest produced) − <code>committed-offset</code> (consumer position), per partition. It measures how far behind the consumer is, in records. <strong>Steadily growing lag</strong> means consumers can't keep up (under-provisioned, slow processing, or stuck) and is the canonical alerting metric — more actionable than CPU because it directly reflects end-to-end freshness. Watch per-partition lag, since one hot partition can lag while others are caught up."},
  {"sec":"DSS-CONSUMER","front":"A consumer's heartbeat is fine but it still gets kicked out — why?","back":"Heartbeats run on a <strong>background thread</strong> (governed by <code>heartbeat.interval.ms</code> / <code>session.timeout.ms</code>) and only prove the process is alive. Liveness of <em>processing</em> is governed separately by <strong><code>max.poll.interval.ms</code></strong>: if your code takes too long between <code>poll()</code> calls (a slow batch), the coordinator considers the consumer stuck and <strong>removes it from the group</strong> even though heartbeats were arriving. Fix by processing faster, lowering <code>max.poll.records</code>, or raising the interval."},
  {"sec":"DSS-CONSUMER","front":"Two services both need every event from one topic — same group or different groups?","back":"<strong>Different <code>group.id</code>s.</strong> Consumers in the <em>same</em> group split the partitions and each event goes to only one of them (queue/competing-consumers semantics). To give each service the <strong>full stream</strong> (pub/sub fan-out), put them in separate groups; each group maintains independent offsets in <code>__consumer_offsets</code> and can replay at its own pace."}
);

Object.assign(GLOSSARY_DATA, {
  "partition-consumer-mapping": {"term":"Partition–Consumer Exclusivity","group":"DSS-CONSUMER","aliases":["partition assignment","one consumer per partition","exactly one consumer"],"eli5":"Inside one group, a partition belongs to a single consumer — never shared — so partition count caps your parallelism.","memory":"Partitions are parking spots; consumers are cars. Extra cars circle the lot with nowhere to park.","full":"<p>The defining constraint of a consumer group: a partition is assigned to <b>at most one consumer in that group</b>. This is what guarantees <b>per-partition ordering</b> is preserved end-to-end (a single consumer sees a partition's records in offset order) and avoids two consumers double-processing the same partition.</p><p>The direct consequence is that the <b>number of partitions is the upper bound on useful consumers in a group</b>. Consumers beyond the partition count get no assignment and idle as standbys. Scaling throughput past that ceiling requires increasing the partition count (which itself has ordering and key-distribution implications).</p>","trap":"Believing more consumers always means more throughput. Beyond the partition count, added consumers are idle — the partition count is the real parallelism limit.","related":["consumer-group","assignor","consumer-lag"]},
  "group-coordinator": {"term":"Group Coordinator","group":"DSS-CONSUMER","aliases":["group coordinator","coordinator"],"eli5":"The broker that referees one group: tracks who's alive, stores commits, and kicks off rebalances.","memory":"Coordinator = referee (blows the whistle, keeps the clock). Group leader = the player who actually draws up the play.","full":"<p>The group coordinator is the broker responsible for a specific consumer group. It is the <b>leader of the <code>__consumer_offsets</code> partition</b> that the group's <code>group.id</code> hashes to, which is why offset storage and coordination live on the same broker. It receives heartbeats, persists offset commits, and triggers a rebalance when membership changes (join, leave, or missed <code>session.timeout.ms</code>).</p><p>Crucially, the coordinator does <b>not</b> compute the assignment itself. It elects one member as the <b>group leader</b>, hands it the membership and subscription metadata, and the leader runs the client-side assignor and returns the plan. The coordinator then distributes that plan and tracks the generation/epoch.</p>","trap":"Thinking the broker/coordinator computes partition assignments. Assignment is client-side, done by the elected group leader consumer — the coordinator just orchestrates.","worked":"Group <code>etl</code> hashes to partition 17 of <code>__consumer_offsets</code>; the broker leading that partition is <code>etl</code>'s coordinator. Move that partition's leadership (broker failure) → the group gets a new coordinator and may rebalance.","related":["consumer-group","rebalance","consumer-offsets-topic","static-membership"]},
  "assignor": {"term":"Partition Assignment Strategy","group":"DSS-CONSUMER","aliases":["assignor","assignment strategy","partition.assignment.strategy","range assignor","round-robin","sticky","cooperative-sticky","CooperativeStickyAssignor"],"eli5":"The pluggable algorithm the group leader uses to decide which consumer gets which partitions.","memory":"Range = slice each topic into ranges (skews). RoundRobin = deal cards one-by-one (balanced, but reshuffles). Sticky = balanced AND keeps your hand. Cooperative-sticky = sticky without the stop-the-world.","full":"<p>Configured via <code>partition.assignment.strategy</code> and executed by the group leader. The classic strategies: <b>Range</b> (per-topic contiguous ranges — simple but skews load to lower-indexed consumers when subscribing to multiple topics); <b>RoundRobin</b> (balanced across all topic-partitions for uniform subscriptions, but reshuffles globally on any change); <b>Sticky</b> (balanced AND minimizes reassignment churn between rebalances).</p><p><b>CooperativeStickyAssignor</b> combines stickiness with the <b>incremental cooperative</b> rebalance protocol, so retained partitions keep being consumed during a rebalance instead of a stop-the-world revoke. It is the modern default choice for low-disruption groups.</p>","trap":"Treating 'sticky' and 'cooperative' as the same thing. Stickiness is about <em>what</em> the result looks like (minimal movement); cooperative is about <em>how</em> the rebalance executes (incremental, no global pause). CooperativeSticky does both.","related":["partition-consumer-mapping","rebalance","group-coordinator"]},
  "rebalance": {"term":"Rebalancing (Eager vs Incremental Cooperative)","group":"DSS-CONSUMER","aliases":["rebalance","rebalancing","eager rebalance","stop-the-world","incremental cooperative rebalancing","cooperative rebalance"],"eli5":"The protocol that redistributes partitions when group membership changes — either a global pause (eager) or a surgical handoff (cooperative).","memory":"Eager = fire everyone then rehire (stop-the-world). Cooperative = only the partitions changing hands clock out.","full":"<p>A rebalance redistributes partitions when a consumer joins, leaves, or times out. The <b>eager (stop-the-world)</b> protocol has every member <b>revoke all partitions</b>, then reassign from scratch — during the gap the entire group stops consuming, so cost scales with total assignment size even for a tiny membership change.</p><p>The <b>incremental cooperative</b> protocol revokes <b>only the partitions that must move</b>, in two rounds (revoke-then-grant), letting consumers keep processing everything they retain. This eliminates the global pause and makes rolling deploys far cheaper, at the price of an extra rebalance round.</p>","trap":"Claiming a rebalance always pauses the whole group. That's only true for the eager protocol; with cooperative-sticky, retained partitions never stop being consumed.","worked":"Add one consumer to a 9-consumer group: eager revokes all assignments group-wide and pauses; cooperative revokes only the handful of partitions being handed to the newcomer, and the other 8 consumers never miss a poll.","related":["assignor","rebalance-storm","group-coordinator","static-membership"]},
  "rebalance-storm": {"term":"Rebalance Storm","group":"DSS-CONSUMER","aliases":["rebalance storm","rebalance loop","cascading rebalances"],"eli5":"A group stuck in a loop of back-to-back rebalances, making little real progress.","memory":"Death spiral: too-slow poll → evicted → rejoin → rebalance → still slow → evicted again.","full":"<p>A rebalance storm is repeated, self-reinforcing rebalancing. The classic cause is exceeding <b><code>max.poll.interval.ms</code></b>: a consumer's processing of a batch takes too long, the coordinator evicts it, it rejoins triggering a rebalance, then it falls behind again and the cycle repeats. Other causes: long GC pauses or network blips dropping heartbeats, undersized <code>session.timeout.ms</code>, or rolling restarts where each bounce kicks an eager rebalance.</p><p>Mitigations: reduce <code>max.poll.records</code> so each poll's work fits the interval, raise <code>max.poll.interval.ms</code>, use <b>static membership</b> to survive restarts, and adopt the <b>cooperative</b> protocol so each rebalance is cheaper and non-blocking.</p>","trap":"Blaming heartbeats for eviction during long processing. Heartbeats are on a separate thread and keep firing; it's <code>max.poll.interval.ms</code> (poll liveness) that ejects a slow processor.","related":["rebalance","static-membership","consumer-lag"]},
  "static-membership": {"term":"Static Membership","group":"DSS-CONSUMER","aliases":["static membership","group.instance.id","static member"],"eli5":"Give a consumer a stable identity so a quick restart reclaims its old partitions without triggering a rebalance.","memory":"A named seat with your jacket on it — step out and back, the seat's still yours (until the session timeout).","full":"<p>By default, consumer identities are ephemeral, so any restart looks like a leave+join and forces a rebalance. Setting <b><code>group.instance.id</code></b> (KIP-345, Kafka 2.3+) makes the consumer a <b>static member</b> with a persistent identity. On restart, if it rejoins within <code>session.timeout.ms</code>, the coordinator <b>returns its previous assignment without rebalancing</b> the group.</p><p>This is the standard mitigation for rolling deploys and pod restarts of stateful consumers: it converts a guaranteed rebalance-per-bounce into a no-op handoff. The trade-off is that a genuinely dead static member's partitions aren't reassigned until <code>session.timeout.ms</code> elapses, so the timeout should be tuned high enough for restarts but not so high that real failures starve those partitions.</p>","trap":"Assuming static membership eliminates rebalances entirely. It only suppresses the restart-induced ones <em>within</em> <code>session.timeout.ms</code>; scaling events and genuine timeouts still rebalance.","related":["rebalance","rebalance-storm","group-coordinator"]},
  "consumer-offsets-topic": {"term":"__consumer_offsets Topic","group":"DSS-CONSUMER","aliases":["__consumer_offsets","consumer offsets topic","offsets topic"],"eli5":"The internal, compacted Kafka topic where every group's committed positions are durably stored.","memory":"Offsets live in Kafka itself — a compacted topic keyed by (group, topic, partition), not in ZooKeeper anymore.","full":"<p><code>__consumer_offsets</code> is an internal Kafka topic (commonly <b>50 partitions</b> by default, via <code>offsets.topic.num.partitions</code>) that stores offset commits as records keyed by <code>(group, topic, partition)</code>. It is <b>log-compacted</b>, so only the latest committed offset per key is retained long-term. A group's commits all land on one partition — chosen by hashing <code>group.id</code> — and the leader of that partition is the group's <b>coordinator</b>.</p><p>Storing offsets in a regular Kafka topic (rather than ZooKeeper, as old versions did) means commits get the same replication and durability guarantees as data, and offset reads/writes scale with the cluster.</p>","trap":"Saying offsets are stored in ZooKeeper. That was pre-0.9 behavior; modern Kafka uses the compacted <code>__consumer_offsets</code> topic, and the group's coordinator is that topic-partition's leader.","related":["offset","group-coordinator","commit-semantics","consumer-group"]},
  "commit-semantics": {"term":"Commit Semantics & Delivery Guarantees","group":"DSS-CONSUMER","aliases":["commit semantics","auto-commit","enable.auto.commit","at-least-once","at-most-once","commitSync","manual commit"],"eli5":"WHEN you commit the offset relative to processing decides whether you risk losing or duplicating records.","memory":"Commit AFTER process = at-least-once (dupes, no loss). Commit BEFORE process = at-most-once (loss, no dupes). Auto-commit = risk of BOTH.","full":"<p>With <b>auto-commit</b> (<code>enable.auto.commit=true</code>, interval default 5s), the consumer commits the largest offset returned by the previous <code>poll()</code> on a timer, decoupled from your processing. Crash after that commit but before processing those polled records → <b>data loss</b>; crash after processing but before the next auto-commit → <b>duplicates</b>. Auto-commit is convenient but gives weak guarantees.</p><p>For <b>at-least-once</b>, disable auto-commit and <b>commit AFTER fully processing</b> the batch (<code>commitSync</code>/<code>commitAsync</code>): a crash before the commit reprocesses (duplicate) but never loses. Committing <em>before</em> processing yields <b>at-most-once</b> (possible loss). <b>Exactly-once</b> needs Kafka transactions or an idempotent/dedup sink.</p>","trap":"Calling commit-after-process 'exactly-once.' It's at-least-once — a crash in the commit gap reprocesses records. Exactly-once requires transactions or idempotency on the sink.","worked":"poll() returns 500 records, you write all 500 to the DB, THEN <code>commitSync()</code>. Crash between the DB write and the commit → those 500 are reprocessed (handle via idempotent upserts).","related":["offset","consumer-offsets-topic","consumer-lag"]},
  "consumer-lag": {"term":"Consumer Lag","group":"DSS-CONSUMER","aliases":["consumer lag","lag","partition lag"],"eli5":"How many records behind the latest the consumer is — the number to alert on.","memory":"Lag = end − committed. Growing lag is the smoke alarm; watch it per-partition, not just the sum.","full":"<p>Consumer lag for a partition is <code>log-end-offset − committed-offset</code>: the count of produced-but-not-yet-consumed records. It is the <b>primary health signal</b> for a consumer group because, unlike CPU or memory, it directly measures end-to-end <b>data freshness</b> and whether consumers are keeping up with producers.</p><p>Flat lag = healthy; <b>monotonically growing lag</b> = consumers can't keep pace (under-provisioned, slow processing, stuck partition, or a poison record). Always inspect lag <b>per partition</b>: aggregate lag can look fine while one hot partition (skewed key) silently falls hours behind.</p>","trap":"Alerting only on total/average lag. A single skewed or stuck partition can lag badly while the aggregate looks healthy — per-partition lag is what catches it.","worked":"Partition end-offset 1,000,000, committed 999,200 → lag 800. If that 800 climbs every minute, the consumer is falling behind and freshness SLAs will break.","related":["offset","partition-consumer-mapping","rebalance-storm"]}
});

</script>

<!-- content: 11-dss-coord.js -->
<script>
/* Coordination & Leader Election (DSS-COORD) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-COORD","front":"What is a strongly-consistent coordination service (ZooKeeper, etcd) actually <em>for</em>?","back":"It's a small, highly-available metadata store offering <strong>linearizable</strong> writes through a consensus log (ZAB for ZooKeeper, Raft for etcd). Canonical uses: <strong>config storage</strong>, <strong>leader election</strong>, <strong>group membership</strong>, <strong>distributed locks</strong>, and <strong>service discovery</strong>. It is <em>not</em> a database — keep the data small (KBs per key) and the write rate modest; it trades throughput for correctness."},
  {"sec":"DSS-COORD","front":"Why must ZooKeeper/etcd hold only a small amount of data?","back":"Every write goes through the consensus log and is replicated to a quorum, so large values or high write rates blow up replication latency, snapshot size, and recovery time. There's also a memory constraint, though the two differ: <strong>ZooKeeper keeps its entire data tree in RAM</strong> (with disk snapshots/txn-log), while <strong>etcd persists to a memory-mapped bbolt file on disk</strong> and relies on the OS page cache for hot pages (etcd defaults to a ~2 GB space quota). Treat it as a coordination kernel — pointers and small config, not blobs or bulk data."},
  {"sec":"DSS-COORD","front":"How does leader election work on top of a coordination service?","back":"Candidates create an <strong>ephemeral sequential</strong> znode (ZooKeeper) or contend on a <strong>lease-backed key</strong> via the campaign recipe (etcd); the lowest sequence number / lowest creation-revision holder is leader. The holder's ephemeral node / lease-attached key vanishes when its session/lease expires, automatically triggering re-election. The service guarantees a single linearizable winner; your job is to add fencing for safety (see fencing token)."},
  {"sec":"DSS-COORD","front":"What is a session/lease TTL, and what happens when it expires?","back":"A client maintains a <strong>session</strong> (ZooKeeper) or <strong>lease</strong> (etcd) by sending periodic heartbeats/keep-alives. If the server misses heartbeats for the TTL window, it declares the session dead and <strong>deletes all ephemeral nodes / lease-attached keys</strong> owned by it. This is the mechanism that makes a crashed leader's lock release automatically — but it also means a slow/paused-but-alive client can lose its lease while still thinking it holds the lock."},
  {"sec":"DSS-COORD","front":"Why is a plain distributed lock <em>unsafe</em> even with a correct lock service?","back":"The lock service can be perfectly linearizable and still fail you, because the <strong>client</strong> can stall. A GC pause, page fault, or network delay can freeze the holder past its TTL; the service grants the lock to someone else, and now <strong>two clients believe they hold it</strong>. When the paused client wakes and writes to the protected resource, it corrupts state. The lock service cannot fix this alone — the protected resource must reject stale writers."},
  {"sec":"DSS-COORD","front":"What is a fencing token and how does it close the dual-holder hole?","back":"Every time the lock is granted, the service returns a <strong>monotonically increasing token</strong> (ZooKeeper's <code>zxid</code> or the znode's version/<code>cversion</code>; etcd's lock-key revision). The client includes this token on every write to the protected resource, and the resource <strong>remembers the highest token it has seen and rejects any write with a lower token</strong>. A revived GC-paused holder carries an old (lower) token, so its writes are fenced out — even though it still believes it owns the lock."},
  {"sec":"DSS-COORD","front":"Why must the fencing check happen at the <em>resource</em>, not at the client or lock service?","back":"The danger is a client that already passed the lock check and then stalls. By the time it writes, the lock service has moved on, but the client doesn't know that. Only the <strong>resource being protected</strong> (DB, object store, file) sees the actual write and can compare the token to the highest it has accepted. If the resource can't reject stale tokens, you fundamentally cannot make the lock safe — no amount of lock-service correctness helps."},
  {"sec":"DSS-COORD","front":"What is the thundering-herd / herd effect on watches, and how do you avoid it?","back":"If N clients all set a watch on the <strong>same</strong> znode (e.g., the lock node), a single change notifies all N at once; they all wake, re-read, and re-contend — an O(N) stampede on every release. The fix is the <strong>ephemeral-sequential lock recipe</strong>: each waiter watches <em>only the node immediately ahead of it</em> in the sequence, so a release wakes <strong>exactly one</strong> successor. This converts an O(N) herd into an O(1) handoff."},
  {"sec":"DSS-COORD","front":"What's the difference between a ZooKeeper watch and an etcd watch?","back":"A <strong>ZooKeeper watch is one-shot</strong>: it fires once and you must re-register, and between fire and re-read you can miss intermediate states (you see the latest, not every transition). An <strong>etcd watch is a streaming subscription</strong>: it delivers an ordered event stream from a given revision and buffers recent history, so you can resume after a disconnect and replay changes — <em>as long as that revision hasn't been compacted away</em>. This makes etcd watches better for change-feed semantics."},
  {"sec":"DSS-COORD","front":"Why is gossip/SWIM used for membership in large clusters instead of ZooKeeper?","back":"A strongly-consistent service centralizes membership through consensus, which doesn't scale to thousands of nodes churning constantly — every join/leave/heartbeat hits the quorum. <strong>Gossip/SWIM</strong> is decentralized and eventually consistent: each node periodically probes a few random peers and piggybacks membership updates, giving O(log N) propagation with no central bottleneck. You trade linearizable membership for scalability and partition tolerance (used by Cassandra, Consul's Serf layer, Akka Cluster)."},
  {"sec":"DSS-COORD","front":"How does SWIM detect failures without a heartbeat storm?","back":"SWIM separates <strong>failure detection</strong> from <strong>dissemination</strong>. Detection: each period a node directly pings one random peer; if no ack, it asks <code>k</code> other nodes to <strong>indirect-ping</strong> it (defeating a single bad link) before declaring it <em>suspect</em>. Dissemination: status changes ride piggybacked on normal gossip traffic. This keeps per-node load <strong>constant</strong> regardless of cluster size, unlike all-to-all heartbeating which is O(N²)."},
  {"sec":"DSS-COORD","front":"What is the SWIM <em>suspicion</em> mechanism and why does it matter?","back":"Instead of immediately marking a non-responding node <code>dead</code>, SWIM marks it <code>suspect</code> and gossips that suspicion with an incarnation number. The accused node can <strong>refute</strong> it by re-broadcasting itself with a higher incarnation number (\"I'm alive\"). Only after a timeout does suspicion become death. This dramatically reduces <strong>false positives</strong> from transient slowness or packet loss, at the cost of slightly slower true-failure detection."},
  {"sec":"DSS-COORD","front":"Why can't you safely build a distributed lock on Redis <code>SETNX</code> alone?","back":"Single-node <code>SET key val NX PX ttl</code> has no consensus, so a primary failover can hand the same lock to two clients. Even Redlock (multi-node) is contested: it relies on bounded clock drift and process pauses, which distributed systems don't guarantee. The deeper point is universal — <strong>any</strong> TTL lock needs <strong>fencing tokens</strong> at the resource; without them, GC pauses defeat it regardless of how the lock is stored."},
  {"sec":"DSS-COORD","front":"Why are ephemeral nodes the key primitive for failure detection?","back":"An <strong>ephemeral node</strong> is bound to a client session and <strong>auto-deleted when that session expires</strong>. This ties liveness to a single observable event: the node's existence. Leader election, membership lists, and locks all reduce to \"watch for the ephemeral node to disappear,\" so a crashed process is cleaned up without any explicit unlock/leave call. The tradeoff is that a session-expiry false positive (long GC pause) can evict a still-live process — exactly why fencing is needed."},
  {"sec":"DSS-COORD","front":"What does \"split-brain\" mean for a coordination cluster, and how does quorum prevent it?","back":"Split-brain is two sides of a partition both believing they're authoritative. A consensus service prevents it by requiring a <strong>majority quorum</strong> (⌊n/2⌋+1) to commit any write or elect a leader: at most one partition can hold a majority, so the minority side <strong>cannot make progress</strong> and is forced read-stale or unavailable. This is why you run an <strong>odd</strong> number of nodes (3 or 5) — going from 3→4 or 5→6 raises the quorum size without raising the failure tolerance."},
  {"sec":"DSS-COORD","front":"Why don't you put a coordination service in the hot path of every request?","back":"Its writes are linearizable and quorum-replicated, so latency and throughput are intentionally limited — it's a coordination kernel, not a key-value cache. Best practice: use it to <strong>elect/configure/discover</strong> infrequently and <strong>cache the result locally</strong>, re-fetching only on a watch event. Routing every data request through it makes the consensus quorum your bottleneck and single point of contention."}
);

Object.assign(GLOSSARY_DATA, {
  "coordination-service": {"term":"Coordination Service","group":"DSS-COORD","aliases":["coordination service","coordination services","zookeeper","etcd","metadata store"],"eli5":"A small, super-reliable shared notebook that a whole cluster agrees on, used for the handful of facts everyone must agree on exactly.","memory":"Think \"the cluster's notary public\" — slow, trusted, stamps the few documents everyone must agree on, not your filing cabinet.","full":"<p>A <b>coordination service</b> (ZooKeeper, etcd, and Consul's KV layer) is a highly-available, strongly-consistent metadata store. Writes go through a consensus protocol (<b>ZAB</b> for ZooKeeper, <b>Raft</b> for etcd) and are committed only after a majority quorum acknowledges, giving <b>linearizable</b> reads/writes. The keyspace is deliberately small: ZooKeeper holds its whole data tree in memory (with disk snapshots), while etcd persists to a memory-mapped on-disk B+tree (bbolt) and defaults to a modest space quota.</p><p>Its job is the small set of facts a cluster must agree on exactly: <b>config</b>, <b>leader election</b>, <b>group membership</b>, <b>distributed locks</b>, and <b>service discovery</b>. It deliberately trades throughput for correctness, so you coordinate through it occasionally and cache results locally — never route bulk data or per-request traffic through it.</p>","trap":"Calling it a database. It's a coordination kernel: small values, modest write rate, tight space quota. Storing blobs or high-rate data there cripples snapshots, replication, and recovery.","worked":"Kafka historically used ZooKeeper to store the controller election, broker membership, and topic metadata — a few KB of pointers — while the actual message data lived on the brokers' disks, never in ZooKeeper.","related":["consensus-quorum","leader-election","ephemeral-node"]},
  "fencing-token": {"term":"Fencing Token","group":"DSS-COORD","aliases":["fencing token","fencing tokens","fencing","fence token"],"eli5":"A ticket number that only ever goes up; the resource ignores anyone showing an older ticket, so a frozen-then-revived lock holder can't sneak a stale write through.","memory":"\"Take a number\" at the deli: the counter only calls higher numbers, so your old ticket is worthless when you wake up late.","full":"<p>A <b>fencing token</b> is a monotonically increasing number the lock service returns each time it grants the lock (e.g., ZooKeeper <code>zxid</code> or the znode's version/<code>cversion</code>; etcd's lock-key revision). The client must attach this token to every write against the protected resource, and the <b>resource remembers the highest token it has accepted and rejects anything lower</b>.</p><p>This is the only correct fix for the dual-holder problem. A lock service can be perfectly linearizable yet still let two clients believe they hold the lock — because one client's process stalled (GC pause) past its TTL. The revived client carries an <b>old, lower</b> token, so the resource fences its writes out. Crucially the check lives at the resource, since that's the only place that observes the actual write after the stall.</p>","trap":"Believing a correct lock service makes locks safe. The failure is in the <em>client</em> (a pause after acquiring), so no amount of lock-service consistency helps — you need fencing at the resource. \"Just use a stronger lock\" is the wrong answer.","worked":"Holder A gets token 33, GC-pauses for 12s, loses its lease; B gets token 34 and writes. A wakes and writes with token 33 — the storage layer, having recorded 34 as its high-water mark, rejects 33. State stays consistent.","related":["distributed-lock","lease-ttl","leader-election","coordination-service"]},
  "distributed-lock": {"term":"Distributed Lock","group":"DSS-COORD","aliases":["distributed lock","distributed locks","mutex","lock"],"eli5":"A cluster-wide \"only one at a time\" flag — surprisingly dangerous because the holder can freeze without knowing it lost the lock.","memory":"A lock is a promise the holder might be unconscious for — always assume the holder can faint mid-critical-section.","full":"<p>A <b>distributed lock</b> grants one client exclusive access to a resource across machines, usually as an ephemeral/lease-backed key in a coordination service. It is one of the most misused primitives in distributed systems because <b>liveness and safety are in tension</b>: to avoid deadlock on crash you attach a TTL, but a TTL means a slow-but-alive holder can lose the lock while still acting as if it holds it.</p><p>The result is two simultaneous \"holders.\" A coordination service cannot prevent this on its own — the client-side stall happens after the lock check. The lock is only safe if writes carry a <b>fencing token</b> the resource validates. Often the better design is to avoid the lock entirely: use leader election plus idempotent, single-writer operations.</p>","trap":"Treating a distributed lock like an in-process mutex. In-process, the thread holding it is by definition running; across the network, the holder can be paused, partitioned, or dead while the lock looks held by someone else.","worked":"Redis Redlock is the classic cautionary tale: Kleppmann's critique showed it can hand the same lock to two clients under clock drift or GC pauses, and that it still requires fencing tokens to be safe.","related":["fencing-token","lease-ttl","ephemeral-node","leader-election"]},
  "lease-ttl": {"term":"Lease / Session TTL","group":"DSS-COORD","aliases":["lease","leases","session ttl","ttl","session","keep-alive"],"eli5":"A countdown that you keep resetting with heartbeats; if you go quiet too long, the cluster assumes you died and reclaims everything you held.","memory":"A dead-man's switch: keep your thumb on it (heartbeat) or everything you're holding drops.","full":"<p>A <b>lease</b> (etcd) or <b>session</b> (ZooKeeper) is a time-bounded liveness contract. The client sends periodic keep-alives/heartbeats; if the server misses them for the <b>TTL</b> window, it declares the client dead and <b>deletes every ephemeral node / lease-attached key the client owned</b>, releasing its locks and removing it from membership automatically.</p><p>This is what makes crash recovery automatic — but it is also the root of the unsafe-lock problem. The server can only observe \"no heartbeats,\" which is indistinguishable from \"alive but GC-paused.\" So a long pause causes the lease to expire under a still-running client. Tuning the TTL trades faster failure detection (short TTL) against more false expirations (long pauses, GC, slow networks).</p>","trap":"Assuming \"my lease is valid because I think I'm alive.\" Validity is the <em>server's</em> judgment based on heartbeats it received; you can believe you hold a lease the server already expired.","worked":"etcd: create a lease with TTL 10s, attach a key, and spawn a keep-alive loop pinging every ~3s. If the process GC-pauses for 11s, the lease expires server-side, the key vanishes, and another client can grab the leader key — even though your process is about to resume.","related":["fencing-token","distributed-lock","ephemeral-node","leader-election"]},
  "ephemeral-node": {"term":"Ephemeral Node","group":"DSS-COORD","aliases":["ephemeral node","ephemeral nodes","ephemeral znode","ephemeral sequential","znode"],"eli5":"A note pinned to the board that automatically falls off the moment the person who pinned it leaves the room.","memory":"Ephemeral = \"exists only as long as you're breathing into it\"; sequential = \"and it stamps you a ticket number.\"","full":"<p>An <b>ephemeral node</b> is a ZooKeeper znode bound to the creating client's session; it is <b>automatically deleted when that session expires</b>. The <b>ephemeral sequential</b> variant also appends a monotonically increasing suffix, giving each creator a unique ordered name. This single primitive underpins locks, membership, and leader election: liveness becomes \"does the node still exist?\"</p><p>The ordering enables the herd-free lock recipe — each waiter watches only the node immediately before it, so a release wakes exactly one successor. The auto-delete-on-session-loss behavior gives crash cleanup for free, but inherits the lease problem: a long GC pause expires the session and deletes your node even though your process is alive, which is why downstream writes still need fencing.</p>","trap":"Assuming the ephemeral node disappears the instant your process dies. It disappears when the <em>session</em> expires, which lags by up to the TTL — so for a window, your lock/leadership node still exists after you've effectively gone.","worked":"Lock recipe: clients create <code>/lock/n_0000001</code>, <code>n_0000002</code>… The holder of the lowest number owns the lock; <code>n_0000002</code> watches only <code>n_0000001</code>. When <code>n_0000001</code>'s session dies, only one waiter is notified — no thundering herd.","related":["herd-effect","leader-election","distributed-lock","lease-ttl"]},
  "herd-effect": {"term":"Thundering-Herd on Watches","group":"DSS-COORD","aliases":["herd effect","thundering herd","thundering-herd","herd","watch herd"],"eli5":"If everyone is staring at the same door, opening it once makes the whole crowd rush in at the same instant.","memory":"Don't make the whole queue watch the cashier — make each person watch only the back of the person in front of them.","full":"<p>The <b>thundering-herd effect</b> arises when many clients set a watch on the <b>same</b> node. A single change notifies all of them simultaneously, and they all wake, re-read, and re-contend — an O(N) stampede on every state change, which hammers the coordination service exactly when it's already handling churn.</p><p>The fix is structural: use <b>ephemeral sequential</b> nodes and have each waiter watch <b>only the node immediately ahead of it</b> in the sequence. A release then notifies exactly one successor, turning an O(N) herd into an O(1) chained handoff. The same anti-pattern appears in caches (key expiry stampede) and is solved by the same idea: avoid fanning one event out to everyone.</p>","trap":"Putting a watch on the lock node itself \"so everyone knows when it's free.\" That's the herd. Watch your predecessor only.","worked":"100 services contend for one lock. Naive: all 100 watch <code>/lock</code>; each release wakes 100, causing 99 wasted re-reads. Recipe: each watches its predecessor; a release wakes exactly 1. Service load drops from O(N) to O(1) per handoff.","related":["ephemeral-node","distributed-lock","coordination-service"]},
  "swim-gossip": {"term":"Gossip / SWIM Membership","group":"DSS-COORD","aliases":["gossip","swim","gossip protocol","swim protocol","membership protocol","epidemic protocol"],"eli5":"Instead of one boss tracking who's alive, every node quietly asks a few random neighbors and spreads the news like rumor, so it scales to huge clusters.","memory":"SWIM = rumor mill with a fairness rule: before you declare someone dead, ask around (indirect probe) and let them deny it (suspicion).","full":"<p><b>Gossip</b> (epidemic) protocols and the <b>SWIM</b> variant provide decentralized, eventually-consistent membership and failure detection for large, churning clusters where a consensus service would bottleneck. Each node periodically <b>probes a few random peers</b> and piggybacks membership deltas; information spreads in O(log N) rounds with constant per-node load — versus O(N²) all-to-all heartbeating.</p><p>SWIM's two innovations: (1) <b>indirect probing</b> — if a direct ping fails, ask <code>k</code> peers to ping the target, defeating a single bad link before declaring failure; and (2) the <b>suspicion</b> mechanism — mark a silent node <code>suspect</code>, gossip it, and let the node <b>refute</b> with a higher incarnation number before timing out to <code>dead</code>. This slashes false positives at the cost of slightly slower true-failure detection. It's used by Cassandra, Consul/Serf, and Akka Cluster.</p>","trap":"Expecting gossip membership to be linearizable. It's <em>eventually</em> consistent — two nodes can briefly disagree on who's alive. Use it for scale/availability, and a consensus service for facts that must be exactly agreed.","worked":"Cassandra uses a gossip protocol so a 1,000-node ring tracks membership and load with each node talking to only a few peers per round, propagating a node-down fact cluster-wide in a handful of rounds without any central registry.","related":["coordination-service","consensus-quorum"]},
  "consensus-quorum": {"term":"Consensus Quorum","group":"DSS-COORD","aliases":["quorum","consensus","majority quorum","raft","zab","split-brain","split brain"],"eli5":"Nothing counts as agreed unless a majority of the nodes signed off, which makes it impossible for two halves of a split network to both think they're in charge.","memory":"Two majorities can't avoid each other — they must share at least one member, who refuses to vote twice. That overlap is the whole trick.","full":"<p>A <b>consensus quorum</b> is the majority (<code>⌊n/2⌋+1</code>) of nodes that must acknowledge a write or a leader election before it commits, under protocols like <b>Raft</b> (etcd) and <b>ZAB</b> (ZooKeeper). Because any two majorities overlap in at least one node, at most one value can be chosen and at most one leader elected — this is what gives the service its linearizable guarantee.</p><p>Quorum is also the cure for <b>split-brain</b>: during a network partition, only the side holding a majority can make progress; the minority is forced unavailable/read-stale and cannot elect a competing leader. This is why you deploy an <b>odd</b> number of nodes (3 or 5): five nodes tolerate two failures, but six also tolerate only two while adding cost and a larger quorum to coordinate.</p>","trap":"\"More nodes = more fault tolerance.\" Going from 3→4 or 5→6 does <em>not</em> raise tolerance (still 1 and 2 failures) but raises the quorum size and latency. Always use odd counts.","worked":"A 5-node etcd cluster splits 3|2. The 3-side keeps a quorum and continues electing/committing; the 2-side can't reach 3, so it serves no writes and elects no leader — no split-brain, just reduced availability on the minority side.","related":["coordination-service","leader-election","fencing-token"]}
});

</script>

<script>
/* Exactly-Once Streaming (DSS-EOS) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-EOS","front":"Why is exactly-once <em>delivery</em> over a network impossible?","back":"Because of the <strong>Two Generals problem</strong>: a sender can never know whether a lost message was the request or the acknowledgment, so it must either retry (risking duplicate delivery, <em>at-least-once</em>) or not retry (risking loss, <em>at-most-once</em>). No protocol guarantees a message is delivered exactly once. What <em>is</em> achievable is exactly-once <strong>processing/effects</strong>: the message may be delivered many times, but its observable side effect occurs once, via deduplication, idempotency, or transactions."},
  {"sec":"DSS-EOS","front":"Exactly-once delivery vs exactly-once processing vs effectively-once","back":"<ul><li><strong>Exactly-once delivery</strong> (over a network): impossible.</li><li><strong>Exactly-once processing</strong>: the system's internal state reflects each input exactly once — achievable with idempotent producers + transactions and offset commits inside the transaction.</li><li><strong>Effectively-once</strong>: end-to-end the external <em>effect</em> happens once, leaning on idempotent or transactional sinks to absorb the duplicates that at-least-once delivery still produces.</li></ul>"},
  {"sec":"DSS-EOS","front":"What does Kafka's idempotent producer actually deduplicate, and what doesn't it cover?","back":"Set <code>enable.idempotence=true</code> (the default since Kafka 3.0). The broker assigns each producer a <strong>producer id (PID)</strong> and tracks a monotonically increasing <strong>sequence number per (PID, partition)</strong>. A retried send carrying an already-seen sequence number is dropped, so producer retries don't create duplicates. It is scoped to a <strong>single producer session and a single partition</strong> — it does <em>not</em> dedupe across producer restarts (new PID), across partitions, or against application-level resends."},
  {"sec":"DSS-EOS","front":"What happens when the broker sees a too-low vs too-high sequence number from an idempotent producer?","back":"The broker compares the incoming sequence number to the last one it durably stored for that <code>(PID, partition)</code>. A number <strong>at or below</strong> the last stored one is a duplicate (a retry): the broker <em>silently discards the write and re-acks it as success</em> — the application never sees an error, this is the dedupe. A number <strong>higher</strong> than expected (a gap) raises <code>OutOfOrderSequenceException</code>, signalling a lost/dropped batch; for an idempotent (non-transactional) producer this is effectively fatal and the producer must be recreated."},
  {"sec":"DSS-EOS","front":"Why does <code>enable.idempotence=true</code> require <code>max.in.flight.requests.per.connection ≤ 5</code> and <code>acks=all</code>?","back":"<code>acks=all</code> ensures the sequence-number state is replicated to the ISR before acknowledgment, so a leader failover can't forget what it has seen. The in-flight cap of <strong>5</strong> exists because the broker only retains the last 5 batches per producer to validate/de-dup sequence numbers; allowing more in flight could let a retried batch fall outside that window and break ordering/dedup. When idempotence is on, modern clients set <code>acks=all</code>, <code>retries&gt;0</code>, and <code>max.in.flight≤5</code> automatically; idempotence is the default in recent Kafka versions."},
  {"sec":"DSS-EOS","front":"What problem do Kafka transactions solve that the idempotent producer cannot?","back":"Idempotence only protects a single producer session writing to single partitions. <strong>Transactions</strong> give <em>atomicity across multiple partitions and topics in one transaction</em>, plus they let you <strong>atomically commit consumer offsets in the same transaction as the output writes</strong> — the foundation of atomic <em>read-process-write</em>. Either all output records and the offset advance commit, or none do."},
  {"sec":"DSS-EOS","front":"How does a Kafka read-process-write loop achieve exactly-once?","back":"Inside one transaction: <code>beginTransaction()</code> → produce the output records → <code>sendOffsetsToTransaction(offsets, consumerGroupMetadata)</code> → <code>commitTransaction()</code>. The input offsets are committed <strong>through the producer into the same transaction</strong> (written to <code>__consumer_offsets</code>, which participates as a transaction partition) rather than via the consumer. So on crash, either the outputs <em>and</em> the offset advance are both durable, or both roll back — the record is reprocessed but its effect lands once. Consumers must set <code>isolation.level=read_committed</code>."},
  {"sec":"DSS-EOS","front":"What does <code>isolation.level=read_committed</code> do, and what is the LSO?","back":"A <code>read_committed</code> consumer only returns records from <strong>committed</strong> transactions and filters out aborted ones (using the abort markers). It will not advance past the <strong>Last Stable Offset (LSO)</strong> — the offset of the first still-open (uncommitted) transaction — so an in-flight transaction <em>blocks</em> downstream reads of later records in that partition until it commits or aborts. The default, <code>read_uncommitted</code>, returns everything including data that may later abort."},
  {"sec":"DSS-EOS","front":"What is <code>transactional.id</code> and why must it be stable across restarts?","back":"It's a user-assigned, durable identifier for a transactional producer. On <code>initTransactions()</code> the coordinator maps it to a PID and, crucially, an <strong>epoch</strong>. A <em>stable</em> id across restarts lets the coordinator recognize the restarted instance, fence the old one, and abort any transaction the previous incarnation left open. A random id each restart breaks zombie fencing and orphans hung transactions (which pin the LSO)."},
  {"sec":"DSS-EOS","front":"How does Kafka zombie fencing work?","back":"Each <code>transactional.id</code> carries a monotonically increasing <strong>epoch</strong>. When a producer calls <code>initTransactions()</code>, the coordinator bumps the epoch (and aborts any pending transaction from the prior epoch). Any write or commit from a producer using an <em>older</em> epoch — a 'zombie': a hung or network-partitioned instance the system already replaced — is rejected with <code>ProducerFencedException</code>. This guarantees only one live producer per transactional id can commit."},
  {"sec":"DSS-EOS","front":"How do Flink checkpoint barriers create a consistent distributed snapshot?","back":"Flink uses a variant of the <strong>Chandy–Lamport</strong> algorithm (asynchronous barrier snapshotting). The source injects numbered <strong>barriers</strong> into the stream; each operator snapshots its state when a barrier passes. With multiple inputs the operator <strong>aligns</strong> barriers — buffering the inputs that already delivered their barrier until the matching barrier arrives on every input channel — so the snapshot is a clean cut. A completed checkpoint is a globally consistent state from which the whole job can recover, giving exactly-once <em>state</em>."},
  {"sec":"DSS-EOS","front":"How does a two-phase-commit (2PC) sink give Flink end-to-end exactly-once?","back":"Checkpoints alone only make Flink's <em>internal</em> state exactly-once; external writes still need coordination. A transactional sink implements <code>TwoPhaseCommitSinkFunction</code>: on each checkpoint it <strong>pre-commits</strong> (writes data in an open external/Kafka transaction but doesn't commit). The actual <strong>commit</strong> happens only when the checkpoint completes globally (the <code>notifyCheckpointComplete</code> callback). The checkpoint acts as the 2PC coordinator; data becomes visible only after the snapshot is durable, so recovery replays to a state matching what was committed."},
  {"sec":"DSS-EOS","front":"Why is the commit phase of a 2PC sink the dangerous part, and what is the recovery rule?","back":"Pre-commit is safe — uncommitted data is invisible and can be aborted on recovery. The <strong>commit</strong> step is the irreversible one: if Flink crashes <em>after</em> a checkpoint completes but <em>before</em> the external commit returns, recovery must <strong>retry the commit</strong> (commit must be idempotent / re-runnable), never re-do the write. Hence the rule: once a transaction's checkpoint is committed, you can only retry its commit — you cannot abort it."},
  {"sec":"DSS-EOS","front":"Why do idempotent or transactional sinks still matter even with exactly-once processing upstream?","back":"End-to-end delivery to the outside world is still at-least-once: a sink can crash between writing and acknowledging, forcing a replay. To make the external <em>effect</em> exactly-once ('effectively once') the sink must absorb duplicates — either <strong>idempotent writes</strong> (upsert by primary key, dedupe key, conditional put) or a <strong>transactional sink</strong> that commits atomically with the processing checkpoint/offset. Without one of these, exactly-once upstream still yields duplicate side effects."},
  {"sec":"DSS-EOS","front":"Kafka Streams: what single config turns on EOS, and what does it bundle?","back":"Set <code>processing.guarantee=exactly_once_v2</code> (the v2 protocol from KIP-447, which scales with <strong>one producer per stream thread</strong> instead of one producer per task). It transparently enables the idempotent + transactional producer, commits source offsets inside the transaction, and writes state-store changelog records and output records in the same transaction — giving read-process-write EOS without hand-writing the transaction calls. <code>at_least_once</code> is the default."}
);

Object.assign(GLOSSARY_DATA, {
  "exactly-once-delivery-impossibility": {"term":"Exactly-Once Delivery Impossibility","group":"DSS-EOS","aliases":["exactly-once delivery","two generals","two generals problem","exactly-once semantics"],"eli5":"You can never be sure a network message and its acknowledgment both arrived, so you must choose between possibly-duplicate and possibly-lost — never exactly one.","memory":"Two Generals can't sync an attack — and neither can two TCP endpoints sync 'delivered exactly once'.","full":"<p>The <b>Two Generals problem</b> proves that over an unreliable channel no finite protocol can guarantee both parties agree a message was delivered exactly once: any ack can be lost, and an ack-of-ack can be lost, ad infinitum. So delivery is fundamentally either <b>at-least-once</b> (retry on uncertainty, risk duplicates) or <b>at-most-once</b> (don't retry, risk loss).</p><p>The industry's 'exactly-once' is therefore never about delivery. It's about exactly-once <b>processing/effects</b>: accept at-least-once delivery on the wire, then use sequence-number dedup, transactions, or idempotent sinks so each input affects state and external systems exactly once.</p>","trap":"Claiming Kafka or Flink gives 'exactly-once delivery'. They give exactly-once <em>processing</em> (effectively-once end-to-end); the network is still at-least-once underneath.","worked":"A payment service retries a charge after a timeout. The first charge actually succeeded; the ack was lost. Without an idempotency key the customer is billed twice — the canonical at-least-once duplicate.","related":["effectively-once","idempotent-producer","kafka-transactions"]},
  "idempotent-producer": {"term":"Kafka Idempotent Producer","group":"DSS-EOS","aliases":["idempotent producer","producer id","PID","enable.idempotence","sequence number","sequence numbers","OutOfOrderSequenceException"],"eli5":"Each producer gets an ID and numbers its messages per partition, so the broker can throw away a retried message it has already stored.","memory":"PID + per-partition sequence number = the broker's 'I've seen this one already' receipt.","full":"<p>With <code>enable.idempotence=true</code> (default since Kafka 3.0) the broker assigns a <b>producer id (PID)</b> and tracks a monotonic <b>sequence number per (PID, partition)</b>. A retried batch carrying an already-stored sequence number is silently discarded and re-acked as success (the dedupe — the app sees no error); a gap (number higher than expected) raises <code>OutOfOrderSequenceException</code>, which for an idempotent-only producer is effectively fatal. This eliminates duplicates caused by <i>producer retries</i> at no throughput cost.</p><p>Scope is narrow: <b>one producer session, per partition</b>. It does not survive a producer restart (a new PID is issued), does not span partitions, and cannot dedupe application-level resends. Requires <code>acks=all</code> and <code>max.in.flight.requests.per.connection ≤ 5</code> (the broker retains only the last 5 batches per producer for dedup).</p>","trap":"Thinking the idempotent producer gives cross-partition or cross-restart exactly-once. It only kills duplicates from retries within one session on one partition — anything broader needs transactions.","worked":"Producer sends batch seq=42 to partition 0, the ack is lost, it retries seq=42. Broker sees 42 already committed, drops the write but returns a success ack. No duplicate despite the retry.","related":["kafka-transactions","exactly-once-delivery-impossibility","transactional-id-fencing"]},
  "kafka-transactions": {"term":"Kafka Transactions","group":"DSS-EOS","aliases":["kafka transactions","transactional producer","read-process-write","sendOffsetsToTransaction","atomic read-process-write"],"eli5":"Wrap output writes to many partitions plus the consumer-offset advance in one all-or-nothing commit.","memory":"Transactions = 'write the outputs AND move the read offset, atomically' — the offset travels through the producer, not the consumer.","full":"<p>Kafka transactions give <b>atomicity across multiple partitions/topics</b> and, critically, let you commit the input consumer offsets <i>inside</i> the same transaction via <code>sendOffsetsToTransaction()</code>. This makes the <b>read-process-write</b> loop exactly-once: outputs and the offset advance commit together or roll back together. A <b>transaction coordinator</b> on the broker writes its decision log to <code>__transaction_state</code> and appends commit/abort control records into every involved data partition (including <code>__consumer_offsets</code>).</p><p>Consumers must run <code>isolation.level=read_committed</code> to skip aborted data and respect the Last Stable Offset. Transactions add latency (coordinator round-trips, control records) and depend on a stable <code>transactional.id</code> for fencing.</p>","trap":"Committing offsets with the consumer's <code>commitSync()</code> instead of <code>sendOffsetsToTransaction()</code>. That puts the offset advance outside the transaction, reintroducing duplicate or lost processing on crash.","worked":"Process orders topic → emit invoices topic. One transaction writes invoices AND advances the orders offset. Crash mid-batch rolls back both, so the order is reprocessed cleanly with no orphan invoice.","related":["idempotent-producer","transactional-id-fencing","read-committed-lso","effectively-once"]},
  "transactional-id-fencing": {"term":"transactional.id and Zombie Fencing","group":"DSS-EOS","aliases":["transactional.id","zombie fencing","epoch","producer epoch","ProducerFencedException","fencing"],"eli5":"A stable transaction name plus an ever-increasing epoch lets the broker kick out a stale, replaced producer instance.","memory":"Same id, higher epoch = 'the new king'; the old epoch holder is the zombie and gets fenced.","full":"<p><code>transactional.id</code> is a durable, user-chosen identity for a transactional producer. <code>initTransactions()</code> maps it to a PID and bumps a monotonic <b>epoch</b>; the coordinator only honors writes/commits from the current epoch. A 'zombie' — an old instance that hung or got partitioned and was replaced — still uses the <b>old epoch</b> and is rejected with <code>ProducerFencedException</code>. This guarantees <b>at most one live producer per transactional id</b> can commit.</p><p>The id <b>must be stable across restarts</b>: it lets the coordinator recognize the restarted instance, fence the predecessor, and abort any transaction the old incarnation left open (which would otherwise pin the LSO and stall <code>read_committed</code> consumers).</p>","trap":"Generating a fresh random <code>transactional.id</code> on each start (or sharing one id across instances). Random ids defeat fencing and orphan open transactions; a shared id makes instances fence each other in a loop.","worked":"Instance A stalls on GC; the scheduler starts B with the same id. B's <code>initTransactions()</code> bumps the epoch and aborts A's open transaction. A wakes and tries to commit — fenced with <code>ProducerFencedException</code>.","related":["kafka-transactions","idempotent-producer","read-committed-lso"]},
  "read-committed-lso": {"term":"read_committed and the Last Stable Offset","group":"DSS-EOS","aliases":["read_committed","isolation.level","last stable offset","LSO","read_uncommitted"],"eli5":"A committed-only consumer hides aborted records and refuses to read past the first still-open transaction.","memory":"LSO is a 'do not read past the open transaction' wall; read_committed politely waits behind it.","full":"<p><code>isolation.level=read_committed</code> makes a consumer return only records from <b>committed</b> transactions, filtering aborted ones using the abort markers in the partition. It will not advance past the <b>Last Stable Offset (LSO)</b> — the offset of the earliest still-open transaction — so an in-flight transaction <b>blocks</b> consumption of everything after it in that partition until it commits or aborts.</p><p>The default <code>read_uncommitted</code> returns all records immediately, including data from transactions that may later abort. EOS pipelines require <code>read_committed</code> end-to-end; otherwise downstream consumers see speculative or rolled-back data.</p>","trap":"Forgetting that one hung transaction stalls a whole partition for read_committed consumers — they don't just skip it, they block at the LSO. Long/orphaned transactions cause silent consumer lag.","worked":"Producer opens a transaction at offset 100 and hangs. Records 100–500 are already on disk, but a read_committed consumer is stuck at LSO=100 — zero lag progress — until that transaction commits, aborts, or times out (<code>transaction.timeout.ms</code>).","related":["kafka-transactions","transactional-id-fencing"]},
  "checkpoint-barrier": {"term":"Flink Checkpoint Barriers","group":"DSS-EOS","aliases":["checkpoint barrier","checkpoint barriers","barrier alignment","chandy-lamport","chandy lamport","distributed snapshot","aligned checkpoint"],"eli5":"Markers flow through the stream and each operator snapshots its state as the marker passes, producing a clean global cut.","memory":"Barriers are a colored line drawn across the stream; alignment makes every operator cut on the same line.","full":"<p>Flink takes <b>asynchronous barrier snapshots</b>, a variant of the <b>Chandy–Lamport</b> distributed-snapshot algorithm tailored to a streaming DAG. Sources inject numbered <b>barriers</b> into the record stream; when a barrier reaches an operator it snapshots its state to durable storage. With multiple input channels the operator does <b>barrier alignment</b>: it buffers channels whose barrier already arrived until the same-numbered barrier arrives on <i>every</i> input, ensuring the snapshot is a consistent cut (no record counted on one side but not the other).</p><p>A completed checkpoint is a globally consistent state for recovery, giving exactly-once <b>state</b>. Alignment can add latency under backpressure; <b>unaligned checkpoints</b> let the barrier overtake in-flight data (capturing those buffers in the snapshot) for faster barrier passage at the cost of larger snapshots.</p>","trap":"Assuming checkpoints alone give end-to-end exactly-once. They give exactly-once <em>internal state</em> only — external writes still need a 2PC or idempotent sink.","worked":"An operator with two inputs gets barrier 7 on input A, then keeps buffering A's later records until barrier 7 also arrives on input B; only then does it snapshot and forward barrier 7 — a clean cut at checkpoint 7.","related":["two-phase-commit-sink","effectively-once"]},
  "two-phase-commit-sink": {"term":"Two-Phase-Commit Sink","group":"DSS-EOS","aliases":["two-phase commit sink","2PC sink","TwoPhaseCommitSinkFunction","pre-commit","transactional sink"],"eli5":"The sink writes data in an open transaction at each checkpoint and only commits it once the checkpoint is durably complete.","memory":"Pre-commit = invisible ink on checkpoint; commit = develop the photo only after the snapshot is safely saved.","full":"<p>To extend Flink's exactly-once <i>state</i> to external systems, transactional sinks implement two-phase commit with the <b>checkpoint as coordinator</b>. On each checkpoint the sink <b>pre-commits</b>: it writes output inside an open external/Kafka transaction but does not commit. When the checkpoint completes globally, the framework calls <code>notifyCheckpointComplete</code> and the sink performs the real <b>commit</b>, making data visible.</p><p>Recovery rule: pre-committed-but-uncommitted data is invisible and is aborted on restart; but if a crash happens after a checkpoint completed yet before the external commit returned, recovery must <b>retry the commit idempotently</b> — never re-write. Commits, once their checkpoint is durable, must eventually succeed.</p>","trap":"Treating the commit step as abortable. After its checkpoint completes, a commit can only be <em>retried</em>, not undone — designing a sink whose commit isn't idempotently re-runnable breaks recovery.","worked":"Flink → Kafka sink opens a Kafka transaction per checkpoint, writes records (pre-commit), and on <code>notifyCheckpointComplete</code> calls <code>commitTransaction()</code>. If it crashes after checkpoint N completes but before committing, restart replays from N and re-issues the commit.","related":["checkpoint-barrier","kafka-transactions","effectively-once"]},
  "effectively-once": {"term":"Effectively-Once (Idempotent/Transactional Sinks)","group":"DSS-EOS","aliases":["effectively once","effectively-once","idempotent sink","idempotent sinks","exactly-once processing"],"eli5":"The external effect happens once even though delivery to the sink is still at-least-once, because the sink swallows duplicates.","memory":"Effectively-once = at-least-once delivery + a sink that doesn't care how many times you tell it the same thing.","full":"<p>Because the final hop to an external system is still at-least-once (a sink can crash between writing and acking, forcing a replay), true end-to-end exactly-once is realized as <b>effectively-once</b>: the observable <i>effect</i> occurs once. Two mechanisms achieve it: an <b>idempotent sink</b> (upsert by primary key, dedupe key, conditional put — replays overwrite to the same value) or a <b>transactional sink</b> that commits atomically with the processing checkpoint/offset (2PC).</p><p>This is why exactly-once upstream is necessary but not sufficient: without an idempotent or transactional sink, duplicate deliveries still produce duplicate side effects (double rows, double emails, double charges).</p>","trap":"Saying a pipeline is exactly-once end-to-end while the sink is a plain append/insert. At-least-once replays then duplicate rows — you need upsert/dedup or a transactional commit at the sink.","worked":"A dedup pipeline writes to Postgres with <code>INSERT ... ON CONFLICT (id) DO UPDATE</code>. A replayed record re-upserts the same row — effectively-once, despite at-least-once delivery from the source.","related":["exactly-once-delivery-impossibility","two-phase-commit-sink","kafka-transactions","checkpoint-barrier"]}
});

</script>
