<script>
/* Streaming at Scale & Failure (DSS-SCALE) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-SCALE","front":"Why is consumer lag the primary health metric for a stream?","back":"Lag is the gap between the latest offset in a partition (log end offset) and the consumer's committed offset — i.e. how many records are <em>unprocessed</em>. It's the single number that directly reflects whether processing keeps up with ingestion: throughput, latency, and stalls all surface as lag. Crucially you must alert on lag <strong>trend</strong> (steadily rising = under-provisioned or stuck) not absolute value, since a brief spike after a deploy is normal."},
  {"sec":"DSS-SCALE","front":"Lag in records vs. lag in time — which should you alert on, and why?","back":"Prefer <strong>time lag</strong> (how old the oldest unprocessed record is) over record-count lag for SLOs. 100k records of lag means nothing without throughput context: at 100k rec/s it's 1 second; at 100 rec/s it's ~17 minutes. Time lag maps directly to the freshness SLA the business cares about. Tools like Burrow evaluate lag as a per-partition trend (consumer status) rather than a raw threshold."},
  {"sec":"DSS-SCALE","front":"What is backpressure and why must a slow consumer propagate it upstream?","back":"Backpressure is the mechanism by which a slow sink/operator signals <em>upstream</em> producers to slow down rather than silently buffering without bound. Without it, an unbounded queue grows until OOM, or the system drops data. Correct designs make the slowest stage set the pace of the whole pipeline — pressure flows backward against the direction of data flow, ultimately throttling the source."},
  {"sec":"DSS-SCALE","front":"How does Flink's credit-based flow control implement backpressure?","back":"Each downstream input channel advertises <strong>credits</strong> = the number of free buffers it has. An upstream subtask may only send as many buffers as it has credits for that channel. When a downstream operator slows, its buffers fill, credits drop to zero, and the upstream simply stops sending — pressure propagates hop-by-hop back to the source <em>without</em> filling the shared TCP socket buffer (which would have blocked unrelated multiplexed channels, the pre-1.5 problem)."},
  {"sec":"DSS-SCALE","front":"How do Reactive Streams implement backpressure (demand signaling)?","back":"It's a <strong>pull-push hybrid</strong>: the <code>Subscriber</code> calls <code>request(n)</code> on its <code>Subscription</code> to grant the <code>Publisher</code> permission to emit at most <em>n</em> more elements. The publisher must never emit more than the cumulative outstanding demand. This bounds in-flight work by the consumer's stated capacity, turning backpressure into an explicit cooperative protocol rather than relying on blocking or dropping."},
  {"sec":"DSS-SCALE","front":"Why does an unbounded buffer 'solve' backpressure only in theory?","back":"An unbounded buffer converts a throughput problem into a memory/latency problem and defers the failure: it absorbs bursts but under sustained overload grows until OOM, and meanwhile end-to-end latency balloons as records sit in the queue. Production systems use <strong>bounded</strong> buffers so that a full buffer becomes the backpressure signal — the buffer filling is the mechanism, not a failure to be engineered away."},
  {"sec":"DSS-SCALE","front":"What does a Flink checkpoint actually capture for exactly-once recovery?","back":"A consistent snapshot of (1) every operator's <strong>state</strong> (keyed state, windows, aggregations) and (2) the <strong>source offsets</strong> corresponding to that state — all aligned to the same logical point in the stream via barriers. On recovery, Flink restores operator state <em>and</em> rewinds sources to those offsets atomically, so reprocessed records exactly reconstruct the lost in-flight work."},
  {"sec":"DSS-SCALE","front":"How do checkpoint barriers create a consistent snapshot across a distributed dataflow?","back":"The source injects numbered <strong>barriers</strong> into the stream. An operator with multiple inputs <strong>blocks (stops consuming)</strong> each channel once its barrier <em>n</em> arrives, waits until barrier <em>n</em> has arrived on <em>all</em> input channels (barrier alignment), then snapshots its state and forwards the barrier downstream. This Chandy-Lamport-style protocol yields a globally consistent cut without stopping the world. <strong>Unaligned checkpoints</strong> persist in-flight buffers as state so barriers can overtake queued data, avoiding stalls under backpressure at the cost of larger checkpoints."},
  {"sec":"DSS-SCALE","front":"Exactly-once processing vs. exactly-once delivery — what's actually guaranteed?","back":"Stream engines provide exactly-once <strong>state/processing</strong> semantics: each record affects internal state once despite failures. End-to-end exactly-once to an external sink additionally requires either an <strong>idempotent</strong> sink or a <strong>transactional/2PC</strong> sink committed on checkpoint (Flink's <code>TwoPhaseCommitSinkFunction</code>, Kafka transactions). The Gotcha: 'exactly-once' almost always means effectively-once via dedup/transactions, not literally-delivered-once over the network."},
  {"sec":"DSS-SCALE","front":"How does replay/reprocessing work, and what makes it possible?","back":"Because the log is a durable, immutable, ordered record retained independently of consumption, you can <strong>reset a consumer group's committed offsets</strong> (e.g. <code>kafka-consumer-groups --reset-offsets --to-earliest --execute</code>, with the group stopped) and re-read history. This drives reprocessing for bug fixes, new derived views, or backfills. The log being the source of truth is what lets you rebuild downstream state from scratch — the foundation of the Kappa architecture."},
  {"sec":"DSS-SCALE","front":"What is a poison pill in a stream and why is it dangerous?","back":"A record the consumer can never successfully process — malformed payload, unparseable schema, or one that deterministically throws. It's dangerous because naive at-least-once retry loops <strong>head-of-line block</strong> the partition forever: the offset never advances, lag climbs, and every retry re-fails on the same record, stalling all records behind it. Worse, if processing keeps exceeding <code>max.poll.interval.ms</code>, the consumer gets evicted and triggers repeated rebalances."},
  {"sec":"DSS-SCALE","front":"How does a dead-letter queue resolve poison pills, and what's the tradeoff?","back":"After N failed attempts the consumer routes the bad record to a <strong>dead-letter queue/topic</strong> and commits past it, so the partition keeps flowing. You preserve the record for later inspection/replay instead of dropping it. The tradeoff: DLQ-ing breaks <strong>ordering</strong> guarantees (the bad record is processed out of band, others move ahead) and can mask a real upstream bug if no one monitors the DLQ depth and alerts on it."},
  {"sec":"DSS-SCALE","front":"What do backward, forward, and full schema compatibility mean?","back":"<ul><li><strong>Backward</strong> (Confluent default): new schema can read data written with the old schema → upgrade <em>consumers</em> first. Allowed: delete fields, add optional/defaulted fields.</li><li><strong>Forward</strong>: old schema can read data written with the new schema → upgrade <em>producers</em> first. Allowed: add fields, delete fields that had defaults.</li><li><strong>Full</strong>: both directions hold (only add/remove fields with defaults) → either side can upgrade independently.</li></ul>"},
  {"sec":"DSS-SCALE","front":"What does a schema registry enforce, and how does it ride along with messages?","back":"It's a versioned store of schemas that <strong>rejects producer writes</strong> violating the subject's compatibility rule, preventing breaking changes from ever entering the topic. Messages carry only a small <strong>schema ID</strong> (Confluent wire format: magic byte <code>0x00</code> + 4-byte big-endian ID + Avro payload); consumers fetch and cache the schema by ID. This shrinks payloads and decouples producers/consumers from sharing schema files."},
  {"sec":"DSS-SCALE","front":"Why can rebalancing make consumer lag spikes self-inflicting?","back":"When a consumer group rebalances (member join/leave/timeout), partitions are revoked and reassigned; under the classic eager protocol <em>all</em> consumers pause processing during the rebalance. Frequent rebalances — often caused by processing exceeding <code>max.poll.interval.ms</code> so the broker evicts the consumer — create a doom loop: slow processing → eviction → rebalance pause → more lag → more evictions. <strong>Cooperative/incremental rebalancing</strong> mitigates by only moving the reassigned partitions, letting unaffected members keep processing."},
  {"sec":"DSS-SCALE","front":"Why does Kafka guarantee ordering only per-partition, and what breaks if you ignore it?","back":"Ordering is total <em>within a partition</em> only; across partitions there's no global order because they're consumed in parallel by different members. If you need per-entity ordering (e.g. all events for an account), you must <strong>partition by that key</strong> so they land on one partition. Ignoring this means a DLQ retry, a reshuffle, or a key-less producer can reorder causally-dependent events — a classic source of corrupted derived state."}
);

Object.assign(GLOSSARY_DATA, {
  "credit-based-flow-control": {"term":"Credit-Based Flow Control","group":"DSS-SCALE","aliases":["credit-based flow control","credit-based","credits"],"eli5":"Downstream hands out tickets for how much data it can accept; upstream may only send that much.","memory":"Credits = drink tickets at the bar — the bartender (upstream) only pours as many as you hold.","full":"<p>Flink's network-layer backpressure mechanism (since 1.5). Each downstream input channel tracks the number of free network buffers it has and advertises this count as <b>credits</b> to its upstream producer. The producer is permitted to transmit at most <code>credits</code> buffers for that specific channel; when credits reach zero it stops sending on that channel.</p><p>The key advantage over the older approach is that pressure is applied <b>per logical channel</b> before data hits the shared TCP connection. Previously, a single backpressured channel could fill the TCP socket buffer and block <i>all</i> multiplexed channels on that connection, including healthy ones (head-of-line blocking at the transport layer).</p>","trap":"Saying Flink backpressure 'uses TCP backpressure.' Pre-1.5 it effectively did and that caused cross-channel head-of-line blocking; the credit-based system explicitly avoids relying on the TCP buffer.","related":["backpressure","checkpoint-barrier"]},
  "reactive-streams": {"term":"Reactive Streams Demand","group":"DSS-SCALE","aliases":["reactive streams","reactive stream","request(n)","demand"],"eli5":"The consumer explicitly asks for N items at a time; the producer never sends more than asked.","memory":"request(n) = the subscriber's tab; the publisher serves up to the tab and no further.","full":"<p>Reactive Streams is a standard (in the JDK as <code>java.util.concurrent.Flow</code>) defining a backpressure protocol between a <code>Publisher</code> and a <code>Subscriber</code> via a <code>Subscription</code>. The subscriber calls <code>subscription.request(n)</code> to signal it can handle <i>n</i> more elements; the publisher must emit no more than the cumulative outstanding demand.</p><p>This is a <b>dynamic pull-push hybrid</b>: push for low latency when demand is available, pull-bounded so a fast publisher can never overwhelm a slow subscriber. It makes backpressure an explicit, cooperative, in-band signal rather than relying on blocking calls or silent dropping.</p>","trap":"Confusing it with simple bounded blocking queues. Reactive Streams demand is non-blocking and asynchronous — the publisher is told the budget rather than discovering it by blocking on a full queue.","related":["backpressure","credit-based-flow-control"]},
  "checkpointing": {"term":"Checkpointing & Exactly-Once","group":"DSS-SCALE","aliases":["checkpoint","checkpointing","exactly-once","exactly once","savepoint"],"eli5":"Periodically save a consistent photo of all state + where you were in the input, so you can rewind and replay after a crash.","memory":"Snapshot state + bookmark the input together; on crash, rewind the bookmark and replay onto the snapshot.","full":"<p>A checkpoint is a consistent, distributed snapshot of (a) all operator state and (b) the source offsets aligned to that state. On failure the engine restores the snapshotted state <b>and</b> rewinds sources to the recorded offsets <b>atomically</b>, then replays from there — so each record affects internal state exactly once despite reprocessing. Flink uses a Chandy-Lamport variant driven by <a>checkpoint barriers</a>.</p><p>End-to-end exactly-once to an <i>external</i> sink additionally requires an idempotent sink or a transactional sink that commits on checkpoint completion (two-phase commit). Without that, you get exactly-once <i>state</i> but at-least-once <i>output</i>.</p>","trap":"Equating exactly-once processing with exactly-once delivery. The engine guarantees state correctness; delivering each output exactly once needs idempotency or transactions at the sink.","worked":"Flink checkpoint at offset 1000 saves a running count = 500. Crash at offset 1100. Restore count=500, rewind Kafka source to 1000, replay 1000→1100. The 100 records re-add to the count once, reconstructing the correct value — not double-counted.","related":["checkpoint-barrier","log-as-source-of-truth","backpressure"]},
  "log-as-source-of-truth": {"term":"Log as Source of Truth / Replay","group":"DSS-SCALE","aliases":["log as source of truth","replay","reprocessing","offset reset","kappa"],"eli5":"The stream is a durable, replayable history — you can rewind a reader to any point and recompute everything.","memory":"The log is a DVR, not a live broadcast — rewind and replay any time.","full":"<p>Kafka-style logs are durable, append-only, ordered, and retained <b>independently of consumption</b> (by time/size, or compacted by key). Because the log persists history rather than discarding on read, a consumer's position is just a stored <b>offset</b> you can move. Resetting a group's offsets (e.g. <code>--reset-offsets --to-earliest</code> or to a timestamp, with the group stopped) replays history to rebuild derived state, backfill a new view, or recover from a processing bug.</p><p>This is the foundation of the <b>Kappa architecture</b>: there is no separate batch layer; you fix code and reprocess the log. It requires consumers to be reset-safe (idempotent sinks or rebuildable target tables) so replay doesn't double-apply.</p>","trap":"Assuming you can always replay. Retention/compaction may have already deleted the records, and replaying into a non-idempotent sink double-writes. Replay is a property you must design for, not a free lunch.","worked":"Bug double-counted revenue for a week. Fix the operator, reset the consumer group to the timestamp before the bug, drop the corrupted target table, and replay — the corrected logic recomputes the derived state from the immutable log.","related":["checkpointing","consumer-lag","dead-letter-queue"]},
  "schema-registry": {"term":"Schema Registry & Compatibility","group":"DSS-SCALE","aliases":["schema registry","schema evolution","backward compatibility","forward compatibility","full compatibility","compatibility"],"eli5":"A gatekeeper that versions your message schemas and blocks changes that would break readers or writers.","memory":"BACK-ward = readers (consumers) go BACK and upgrade first; FOR-ward = producers go FORth (write the new shape) first.","full":"<p>A schema registry stores versioned schemas per <b>subject</b> (usually <code>&lt;topic&gt;-value</code>) and enforces a compatibility rule on every producer registration, rejecting breaking changes before they enter the topic. Messages carry a compact <b>schema ID</b> (Confluent wire format: magic byte <code>0x00</code>, a 4-byte big-endian ID, then the Avro/Protobuf payload); consumers fetch and cache the writer schema by ID.</p><p>Compatibility modes define who can upgrade first: <b>BACKWARD</b> (default; new schema reads old data → upgrade consumers first; add optional/defaulted fields, delete fields), <b>FORWARD</b> (old schema reads new data → upgrade producers first; add fields, delete fields that had defaults), <b>FULL</b> (both → independent upgrades; only add/remove fields with defaults). <code>*_TRANSITIVE</code> variants check against all prior versions, not just the latest.</p>","trap":"Mixing up direction. BACKWARD does NOT mean 'old code reads new data' — that's FORWARD. BACKWARD = new schema can read old data, so consumers upgrade first.","worked":"Subject set to BACKWARD. You add a field with a default → new consumers read old records (field gets the default) → allowed. You add a field <i>without</i> a default → new consumers can't read old records → the registry rejects the producer's schema registration.","related":["dead-letter-queue","log-as-source-of-truth"]},
  "consumer-group-rebalancing": {"term":"Consumer Group Rebalancing","group":"DSS-SCALE","aliases":["consumer group rebalancing","rebalance","rebalancing","cooperative rebalancing","incremental rebalancing"],"eli5":"When members join or leave a group, partitions get reshuffled — and naively that pauses everyone.","memory":"Eager rebalance = everyone drops their cards and re-deals; cooperative = only the moved cards change hands.","full":"<p>A consumer group divides a topic's partitions among its members. When a member joins, leaves, or is evicted (heartbeat timeout, or processing exceeding <code>max.poll.interval.ms</code>), the group <b>rebalances</b> to reassign partitions. Under the classic eager protocol this is <b>stop-the-world</b>: all members revoke all partitions and pause processing until reassignment completes.</p><p>This creates a doom loop with slow processing: a slow poll → eviction → rebalance pause → lag grows → more evictions. <b>Cooperative (incremental) rebalancing</b> mitigates it by revoking only the partitions actually being reassigned, letting unaffected members keep processing. Static membership (<code>group.instance.id</code>) further avoids rebalances on transient restarts.</p>","trap":"Blaming lag spikes on the brokers when the real cause is your own slow processing tripping <code>max.poll.interval.ms</code>, evicting the consumer and triggering a stop-the-world rebalance.","related":["consumer-lag","dead-letter-queue"]}
});

</script>

<!-- content: 11-dss-time.js -->
<script>
/* Event Time, Watermarks & Windowing (DSS-TIME) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-TIME","front":"Event time vs ingestion time vs processing time","back":"<strong>Event time</strong> is when the event actually occurred at the source (embedded in the payload). <strong>Ingestion time</strong> is when the broker/system first received it (e.g. Kafka's <code>LogAppendTime</code>). <strong>Processing time</strong> is the wall clock of the operator when it handles the event. Only event time is intrinsic to the data; the other two depend on pipeline timing and machine clocks."},
  {"sec":"DSS-TIME","front":"Why event-time processing is required for correct, replayable results","back":"Results computed on event time are <em>deterministic under replay</em>: reprocessing the same log (after a bug fix, backfill, or recovery) yields identical windows regardless of when or how fast it runs. Processing-time results are non-reproducible because they depend on machine speed, lag, and arrival order, so a replay puts events in different windows."},
  {"sec":"DSS-TIME","front":"What does a watermark of value T actually assert?","back":"A watermark <code>W(T)</code> is a claim that <em>no further event with event-time &lt; T should still arrive</em> on that stream. It is a heuristic, monotonically non-decreasing marker that lets the engine decide when event time has 'advanced enough' to safely close and fire windows whose end is &le; T. It is a completeness estimate, not a guarantee."},
  {"sec":"DSS-TIME","front":"How does a watermark drive window firing?","back":"A window fires (emits its result) when the watermark passes the window's end. For a tumbling window <code>[t, t+W)</code>, the engine waits until <code>watermark &ge; t+W</code>, signalling that all in-time events for that window have presumably arrived, then computes and emits the aggregate. The watermark is the trigger clock; window end is the threshold."},
  {"sec":"DSS-TIME","front":"The latency vs completeness tradeoff in watermark generation","back":"Watermarks let you tune one knob between two costs. Advance them <em>aggressively</em> (close to max-seen timestamp) and windows fire with low latency but may miss stragglers (incomplete). Advance them <em>conservatively</em> (large lag/delay) and you capture more late events (complete) but every window's result is delayed. There is no setting that is both instant and complete on an unbounded out-of-order stream."},
  {"sec":"DSS-TIME","front":"Allowed lateness: what it is and how it differs from the watermark","back":"<strong>Allowed lateness</strong> (e.g. Flink <code>allowedLateness(d)</code>) keeps a window's state alive for an extra duration <code>d</code> <em>after</em> the watermark has already passed its end. Events arriving in that grace period are still routed to the window and trigger a recomputation/update. The watermark fires the first result; allowed lateness governs how long late events can still amend it before state is purged."},
  {"sec":"DSS-TIME","front":"Three strategies for handling late data (past the watermark)","back":"<ul><li><strong>Drop</strong> — discard events past <code>watermark + allowedLateness</code>; the common default since <code>allowedLateness</code> is typically 0, so simplest but lossy.</li><li><strong>Side-output</strong> — divert late events to a separate stream/DLQ for reconciliation or batch correction (Flink <code>sideOutputLateData</code>).</li><li><strong>Update/retract</strong> — re-fire the window with a corrected result, emitting an update or a retraction+new value downstream.</li></ul>"},
  {"sec":"DSS-TIME","front":"Tumbling window","back":"Fixed-size, <em>non-overlapping, contiguous</em> time buckets — e.g. 5-minute windows <code>[00:00,00:05)</code>, <code>[00:05,00:10)</code>. Every event belongs to exactly one window. Used for periodic aggregations like 'count per minute'. Hop size equals window size."},
  {"sec":"DSS-TIME","front":"Hopping / sliding window","back":"Fixed-size windows that <em>advance by a slide/hop smaller than the window size</em>, so they overlap and an event falls into <code>size/hop</code> windows. Example: size 10 min, hop 1 min → a '10-minute moving aggregate' updated every minute. 'Sliding' (Flink) and 'hopping' (Kafka Streams / Beam) are the <em>same time-defined overlapping window</em> under different vendor names — neither is event-triggered."},
  {"sec":"DSS-TIME","front":"Session window","back":"A <em>data-driven, variable-length</em> window that groups events separated by gaps smaller than a <strong>session gap (inactivity timeout)</strong>. A new event within the gap extends the session; a gap longer than the timeout closes it. Window boundaries depend on the data, not a fixed clock, so per-key window count and length vary — ideal for user-activity/clickstream bursts."},
  {"sec":"DSS-TIME","front":"Why is stream ordering only guaranteed per Kafka partition, forcing out-of-order handling?","back":"Kafka preserves offset order only <em>within a single partition</em>. Across partitions (and across producers, retries, network paths, and clock-skewed sources) there is no global event-time order, so a consumer routinely sees a later-timestamp event before an earlier one. Event-time windowing + watermarks exist precisely to reassemble correct results from this out-of-order arrival."},
  {"sec":"DSS-TIME","front":"How is a watermark typically generated from observed timestamps?","back":"A common heuristic is <strong>bounded out-of-orderness</strong>: <code>watermark = max_event_time_seen - maxOutOfOrderness</code>. You pick a delay (e.g. 5s) reflecting how out-of-order the stream is; the watermark trails the max timestamp by that bound. Larger bound = more completeness, more latency. Other strategies use percentiles of observed lateness or per-partition minimums."},
  {"sec":"DSS-TIME","front":"Idle / stalled partitions and watermark stalls","back":"An operator's watermark is the <em>minimum</em> across all its input partitions (you can only claim completeness up to the slowest source). If one partition goes idle and stops emitting, its watermark freezes, stalling the whole downstream watermark and preventing any window from firing. Engines mitigate with <em>idleness detection</em> that marks quiet partitions idle so they stop holding back the global watermark."},
  {"sec":"DSS-TIME","front":"Perfect vs heuristic watermarks","back":"A <strong>perfect watermark</strong> can only exist when you know the complete bounds of the source (e.g. a static file or a strictly ordered, gap-free log) — then no event after W can exist. On real distributed sources you use a <strong>heuristic watermark</strong> that estimates completeness and is sometimes wrong, which is exactly why allowed lateness and late-data handling are necessary."},
  {"sec":"DSS-TIME","front":"Where does windowed/streaming state live, and why must it be bounded?","back":"Each open window holds aggregation state (accumulators, buffered events) in the operator's state store, typically checkpointed (e.g. RocksDB + snapshots). Watermarks plus allowed lateness define when state can be <em>purged</em>: once <code>watermark &gt; window_end + allowedLateness</code>, the window is garbage-collected. Without this bound, session windows and large lateness allowances cause unbounded state growth and OOM."},
  {"sec":"DSS-TIME","front":"Why can event-time and processing-time results diverge for the same window definition?","back":"Under processing time, window membership depends on <em>when</em> an event is handled, so lag spikes, replays, and parallelism shuffle events across windows and produce different counts each run. Under event time, membership depends only on the event's embedded timestamp, so the same input always yields the same windows — at the cost of buffering and waiting on watermarks for stragglers."}
);

Object.assign(GLOSSARY_DATA, {
  "event-time": {"term":"Event Time","group":"DSS-TIME","aliases":["event time","event-time","event timestamp"],"eli5":"The moment the thing actually happened, written into the event itself — not when the computer got around to seeing it.","memory":"Event time = the timestamp the event was BORN with; processing time = the timestamp it was MET.","full":"<p><b>Event time</b> is the timestamp embedded in the event by its source, representing when the real-world occurrence happened. It is intrinsic to the data and immutable, which is what makes event-time computation <i>deterministic and replayable</i>: the same log reprocessed at any speed, on any number of machines, lands every event in the same window.</p><p>The cost is that events arrive out of order and late relative to event time, so the engine cannot know it has 'seen everything' for a window just because clock time has passed. This is the entire motivation for watermarks: a mechanism to estimate how far event time has progressed despite disordered arrival.</p>","trap":"Saying event time is 'the Kafka timestamp.' Kafka's record timestamp can be <code>CreateTime</code> (producer-set, ~event time) OR <code>LogAppendTime</code> (broker-set ingestion time), configured per-topic via <code>message.timestamp.type</code> — don't assume it's event time.","worked":"A mobile app buffers events offline and uploads at 09:05 a purchase that occurred at 08:50. Event time = 08:50 (so it belongs in the 08:50 window); processing time = 09:05.","related":["processing-time","watermark","out-of-order-events"]},
  "processing-time": {"term":"Processing Time","group":"DSS-TIME","aliases":["processing time","processing-time","ingestion time","wall-clock time"],"eli5":"The clock on the machine at the instant it handles the event — fast and simple, but never reproducible.","memory":"Processing time is a stopwatch you start when YOU look; event time is the date stamped on the letter.","full":"<p><b>Processing time</b> is the operator's wall-clock time when it processes an event; <b>ingestion time</b> is a closely related variant stamped when the event first enters the system. Both are trivial to implement (no watermarks, no buffering, lowest latency) because 'now' is always known and monotonic.</p><p>The fatal weakness for analytics is non-determinism: results depend on arrival order, consumer lag, backpressure, and parallelism, so a replay or recovery produces different windows. Use processing time only when you genuinely care about 'what the system is doing right now' (e.g. ops dashboards, rate limiting), not about correct attribution of events to the time they occurred.</p>","trap":"Claiming processing-time windows are 'good enough and just lower latency.' They're not merely lower latency — they're <i>wrong on replay</i>: backfilling history through a processing-time pipeline dumps years of events into one giant 'now' window.","related":["event-time","latency-completeness-tradeoff"]},
  "watermark": {"term":"Watermark","group":"DSS-TIME","aliases":["watermark","watermarks","low watermark"],"eli5":"A moving marker that says 'I believe I've now seen everything up to time T' so the system knows when to close a window.","memory":"A watermark is the high-tide line on a beach: it says 'the water has reached here,' i.e. event time has progressed this far — and like tide claims, it can be slightly wrong.","full":"<p>A <b>watermark</b> <code>W(T)</code> flows through the dataflow as a claim that no event with event-time &lt; T should still arrive. It is monotonically non-decreasing and triggers window firing: a window ending at <code>e</code> fires when the watermark reaches <code>e</code>. Watermarks are how an event-time system converts 'wait for stragglers' into a concrete, bounded decision.</p><p>Generation is heuristic — commonly <code>maxEventTimeSeen - maxOutOfOrderness</code> (bounded out-of-orderness). An operator with multiple inputs takes the <i>minimum</i> input watermark, so a single lagging or idle partition holds back the whole pipeline. Because watermarks can be wrong, they pair with allowed lateness and late-data routing.</p>","trap":"Saying a watermark <i>guarantees</i> no later events. It's a heuristic promise; events can and do arrive after it (that's why allowed lateness exists). Implementation detail: Flink's bounded-out-of-orderness emits <code>maxTimestamp − outOfOrderness − 1ms</code> (the window's max event-time is exclusive), so don't be surprised by an off-by-one-ms boundary.","worked":"With <code>maxOutOfOrderness=5s</code> and the latest seen event-time = 12:00:30, the watermark is ~12:00:25 — the 12:00:00–12:00:05 window has already fired; an event stamped 12:00:24 arriving now is late.","related":["event-time","allowed-lateness","latency-completeness-tradeoff","out-of-order-events","late-data-handling"]},
  "allowed-lateness": {"term":"Allowed Lateness","group":"DSS-TIME","aliases":["allowed lateness","allowedLateness","grace period","lateness"],"eli5":"A grace period that keeps a window's state alive after it first fires, so genuinely late events can still update the answer.","memory":"Watermark = closing time; allowed lateness = the bouncer letting a few latecomers in for one more round before locking the doors.","full":"<p><b>Allowed lateness</b> (Flink <code>allowedLateness(d)</code>; Beam's analogous grace period) extends a window's lifetime by duration <code>d</code> beyond when the watermark passed its end. The window emits an initial result on the watermark, but for the next <code>d</code> it retains state and re-fires an updated result for each late-but-not-too-late event. Only once <code>watermark &gt; windowEnd + d</code> is the state purged.</p><p>It is the explicit second lever of the latency/completeness tradeoff: the watermark controls the first-fire delay, allowed lateness controls how long you keep correcting. The cost is state retention (memory) and downstream consumers that must handle updates/retractions rather than a single final value.</p>","trap":"Conflating allowed lateness with the watermark delay. Bigger out-of-orderness delays the FIRST result for everyone; allowed lateness fires the first result on time but keeps amending it for stragglers — different costs (latency vs. extra emissions+state).","related":["watermark","late-data-handling","windowing"]},
  "late-data-handling": {"term":"Late Data Handling","group":"DSS-TIME","aliases":["late data","late-data handling","late events","side output","dropped events"],"eli5":"What you do with an event that shows up after you'd already decided the window was done.","memory":"Drop / Side-output / Update = Forget it, Filebox it, or Fix it.","full":"<p>An event is <b>late</b> when its event-time falls before the current watermark; it's <i>droppably</i> late when also past <code>windowEnd + allowedLateness</code>. Three policies exist: <b>drop</b> (silent discard — common default, simplest, lossy), <b>side-output</b> (route to a separate stream/DLQ for batch reconciliation; Flink <code>sideOutputLateData()</code>), and <b>update/retract</b> (re-emit a corrected window result, requiring downstream idempotency or retraction support).</p><p>Choosing well is a data-quality decision: dropping is fine for approximate ops metrics, side-output suits regulated/financial pipelines that must account for every record, and update/retract suits materialized views that must converge to the exact answer.</p>","trap":"Assuming late data is automatically captured. By default many engines <i>silently drop</i> events past the watermark (allowedLateness defaults to 0); if you don't configure lateness or a side output, that data vanishes with no error.","related":["allowed-lateness","watermark","windowing"]},
  "windowing": {"term":"Windowing","group":"DSS-TIME","aliases":["window","windows","windowing","tumbling window","hopping window","sliding window","session window"],"eli5":"Chopping an endless stream into finite chunks you can actually aggregate over.","memory":"Tumbling = floor tiles (no overlap); Hopping = roof shingles (overlap); Session = conversations (end when everyone goes quiet).","full":"<p><b>Windowing</b> assigns each event to one or more bounded buckets so aggregation over an unbounded stream is possible. The three families: <b>tumbling</b> (fixed size, non-overlapping, exactly one window per event), <b>hopping/sliding</b> (fixed size, hop &lt; size, overlapping, multiple windows per event), and <b>session</b> (data-driven, variable length, closed by an inactivity gap).</p><p>Window <i>assignment</i> (which buckets an event belongs to) is independent of window <i>triggering</i> (when results fire) — triggering is the watermark's job. The window type determines state cost: tumbling is cheap, hopping multiplies state by the overlap factor (<code>size/hop</code>), and session windows can grow unbounded under continuous activity.</p>","trap":"Calling a sliding window 'overlapping tumbling.' The distinction is hop size: tumbling has hop = size (no overlap); hopping/sliding has hop < size (overlap, so an event lands in size/hop windows). Note 'sliding' (Flink) and 'hopping' (Kafka Streams/Beam) are vendor synonyms for the same time-based overlapping window.","worked":"Size-10m / hop-2m hopping windows: an event at 12:03 falls into the windows starting 11:54, 11:56, 11:58, 12:00, 12:02 — i.e. 5 windows (10/2).","related":["watermark","session-gap","allowed-lateness"]},
  "session-gap": {"term":"Session Gap (Inactivity Timeout)","group":"DSS-TIME","aliases":["session gap","inactivity gap","session timeout","gap duration"],"eli5":"The quiet period that has to pass with no events before a user's session is considered over.","memory":"Session gap = the awkward-silence rule: keep talking and the conversation continues; go quiet past the gap and it's officially over.","full":"<p>A <b>session gap</b> is the maximum inactivity allowed between consecutive events before a session window closes. While events keep arriving within the gap, the window keeps extending; once a gap exceeds the timeout, the session is finalized. Because boundaries are defined by the data, two events for the same key may merge into one session retroactively when a bridging event arrives, so engines must support <i>session merging</i>.</p><p>This makes session windows the most state-intensive and ordering-sensitive type: a late event in the gap can stitch two previously separate sessions into one, requiring the engine to merge accumulators and re-fire. Watermarks still drive when a session is considered safely closed.</p>","trap":"Thinking session windows have a fixed length or fixed end time. They don't — length is purely data-driven, and an out-of-order event landing inside the gap can merge two open sessions, changing boundaries after the fact.","worked":"Gap = 30 min. Clicks at 10:00, 10:20, 10:45 form one session [10:00–10:45] (each gap < 30m). A click at 11:30 starts a new session because 45 min of silence exceeded the gap.","related":["windowing","out-of-order-events","watermark"]},
  "latency-completeness-tradeoff": {"term":"Latency vs Completeness Tradeoff","group":"DSS-TIME","aliases":["latency vs completeness","latency-completeness tradeoff","completeness tradeoff","bounded out-of-orderness"],"eli5":"You can fire window results fast, or you can fire them complete — the watermark delay is the dial between the two.","memory":"Fast, complete, cheap — pick two; the watermark delay is where you cash in latency for completeness.","full":"<p>On an unbounded, out-of-order stream you cannot have both instant and fully-complete results. The watermark delay (e.g. <code>maxOutOfOrderness</code>) is the dial: a small delay fires windows quickly but risks excluding stragglers; a large delay captures more events but delays every result. Allowed lateness adds a second dial — fire early, then keep correcting — at the cost of extra emissions and retained state.</p><p>The mature framing (from Google's Dataflow model) decouples <i>what/where/when/how</i>: <b>when</b> to fire (triggers/watermarks) and <b>how</b> refinements relate (accumulate vs. accumulate-and-retract) are tuned independently, letting you emit a fast speculative result and later a complete one rather than choosing a single point on the curve.</p>","trap":"Believing a 'correct' watermark setting exists that's both timely and complete. There isn't — it's a tradeoff curve, not a solvable optimum; you choose the operating point per use case (and can hedge with early+late firings).","related":["watermark","allowed-lateness","late-data-handling","processing-time"]},
  "out-of-order-events": {"term":"Out-of-Order Events","group":"DSS-TIME","aliases":["out-of-order","out of order events","disorder","reordering"],"eli5":"Events showing up in a different order than they actually happened, because networks, retries, and partitions don't preserve time order.","memory":"Out-of-order = mail delivered out of postmark order: a letter dated Monday can land after one dated Tuesday.","full":"<p><b>Out-of-order</b> arrival means an event with a larger event-time is observed before one with a smaller event-time. Causes include multiple partitions/shards with no cross-partition ordering, producer retries, network paths of differing latency, clock skew across sources, and devices that buffer offline. Kafka preserves order only <i>within a partition</i>, so any keyed-across-partitions or multi-source stream is inherently disordered in event time.</p><p>Out-of-orderness is the root problem watermarks, allowed lateness, and event-time windows exist to solve. Quantifying it (e.g. the p99 of <code>arrivalTime − eventTime</code>) is how you choose your watermark bound and lateness grace — set them from the observed disorder distribution, not a guess.</p>","trap":"Assuming Kafka gives global ordering. It only guarantees order within a single partition — repartitioning, multiple producers, or multiple source topics reintroduce disorder, which is why event-time logic is mandatory even on 'ordered' Kafka.","related":["watermark","event-time","session-gap"]}
});

</script>

<!-- content: 11-dss-txn.js -->
<script>
/* Distributed Transactions & Sagas (DSS-TXN) — fact-checked content wave (auto-assembled) */
CARDS_DATA.push(
  {"sec":"DSS-TXN","front":"Why can't you use a single ACID transaction across two microservices/shards?","back":"Each service owns its own datastore, so there is no shared transaction manager or shared write-ahead log to atomically commit both. A local <code>BEGIN/COMMIT</code> only spans one database. Crossing the boundary requires an external protocol (2PC) or an application-level pattern (saga) to coordinate atomicity, and each choice trades away either availability or isolation."},
  {"sec":"DSS-TXN","front":"2PC: what happens in the prepare (voting) phase vs the commit phase?","back":"In <strong>prepare</strong>, the coordinator asks every participant \"can you commit?\"; each durably writes the changes to its log and replies <code>YES</code> (a binding vote — it must now be able to commit or abort on command) or <code>NO</code>. In <strong>commit</strong>, if all voted YES the coordinator writes a commit decision and tells everyone to commit; if any voted NO, it tells everyone to abort. A YES vote means the participant has given up its right to unilaterally abort."},
  {"sec":"DSS-TXN","front":"The 2PC blocking problem: why is a coordinator crash after participants vote YES catastrophic?","back":"Once a participant has voted <code>YES</code>, it is <em>in doubt</em>: it cannot commit (the global decision might be abort) nor abort (it might be commit) on its own. If the coordinator crashes after collecting votes but before broadcasting the decision, in-doubt participants <strong>block</strong> — holding locks and staying unavailable — until the coordinator recovers. This is why 2PC is called a blocking protocol."},
  {"sec":"DSS-TXN","front":"Why does 2PC couple availability and scale poorly?","back":"It holds locks across the entire round trip (prepare + commit + acks), so latency and lock-hold time grow with the slowest participant; throughput is gated on the most contended row. Availability is multiplicative — the transaction needs <em>every</em> participant <em>and</em> the coordinator up at commit time, so adding nodes lowers the probability all are simultaneously available. Cross-shard contention and blocking-on-coordinator-failure make it a poor fit for high-throughput, partition-prone systems."},
  {"sec":"DSS-TXN","front":"Does 3PC fix the 2PC blocking problem?","back":"It reduces it but doesn't eliminate it. 3PC adds a <code>pre-commit</code> phase so survivors can reach the decision via timeout without the coordinator, making it non-blocking under a <em>synchronous, fail-stop</em> model. But it assumes bounded message delay and breaks under network partitions (it can commit on one side and abort on the other), so in practice the production answer is to make the commit decision fault-tolerant via consensus (Paxos/Raft) — e.g. Spanner's Paxos-replicated 2PC — not to deploy 3PC."},
  {"sec":"DSS-TXN","front":"What is the saga pattern, and what guarantee does it give up?","back":"A saga is a sequence of <em>local</em> transactions <code>T1..Tn</code>, each committed independently in its own service; if step <code>Ti</code> fails, the saga runs <strong>compensating</strong> transactions <code>Ci-1..C1</code> to semantically undo the earlier steps. It provides <strong>atomicity without isolation</strong> — the whole thing eventually completes or fully compensates, but partial states are visible to others mid-flight."},
  {"sec":"DSS-TXN","front":"Orchestration vs choreography for sagas — the core tradeoff?","back":"<strong>Orchestration</strong>: a central coordinator tells each service what to do next and drives compensation — explicit, easy to reason about and monitor, but a single point of logic/coupling. <strong>Choreography</strong>: services react to each other's events with no central brain — loosely coupled and resilient, but the flow is emergent (hard to trace, easy to create cyclic event dependencies). Staff answer: orchestration for complex/long flows, choreography for simple event-driven ones."},
  {"sec":"DSS-TXN","front":"Why must a compensating action be a semantic undo, not a rollback?","back":"The original local transaction already <strong>committed</strong>, so there is no log to roll back and other parties may have already observed the effect. Compensation issues a <em>new</em> business operation that reverses the intent — e.g. \"refund $50\" not \"un-charge,\" \"cancel reservation\" not \"delete row.\" Some effects can't be undone (an email sent), so those steps belong at the end (pivot) or need a different design."},
  {"sec":"DSS-TXN","front":"What is a \"semantic lock\" in a saga, and why do you need one?","back":"Because sagas have no isolation, a half-finished saga's intermediate state is visible. A semantic lock is an application-level marker — e.g. an order in <code>PENDING</code> status or funds in a <code>HELD</code> state — that signals \"this is in-flight, don't act on it yet.\" Other transactions check the flag to avoid acting on dirty/uncommitted-intent data. It's the saga's answer to the lost isolation guarantee."},
  {"sec":"DSS-TXN","front":"Name the classic anomalies sagas suffer from lost isolation, and a countermeasure for each.","back":"<ul><li><strong>Dirty reads</strong>: another tx reads intermediate saga state that later gets compensated — use semantic locks / status flags.</li><li><strong>Lost updates</strong>: a concurrent write clobbers a saga's update — use optimistic/version locks or commutative updates.</li><li><strong>Fuzzy / non-repeatable reads</strong>: re-reading mid-saga sees a changed value — use the reread-value or pessimistic-view countermeasure.</li></ul>A structural countermeasure across all three: reorder steps so the riskiest run first (fail fast, shorter exposure, less to compensate)."},
  {"sec":"DSS-TXN","front":"Why does every saga step need to be idempotent?","back":"Steps and compensations are delivered over unreliable channels with at-least-once semantics (retries after timeouts, redelivered messages, coordinator restarts). Without idempotency a retry double-charges or double-ships. Implement it with a dedup/idempotency key (e.g. the saga ID + step) so a re-applied message is a no-op the second time. Compensations must be idempotent too — and ideally <em>commutative</em>, since a compensation may arrive before its forward action's effect is visible."},
  {"sec":"DSS-TXN","front":"What does the transactional outbox solve, and how?","back":"It solves the <strong>dual-write</strong> problem: you can't atomically \"update my DB <em>and</em> publish to Kafka\" because they're separate systems. Instead, in the <em>same local transaction</em> you write the business row and an <code>outbox</code> row; a separate relay (poller or CDC like Debezium) reads the outbox and publishes to the broker. The DB commit makes the event durable atomically with the state change; the relay then guarantees at-least-once delivery."},
  {"sec":"DSS-TXN","front":"Outbox gives you at-least-once — what must consumers and the relay still handle?","back":"<strong>Duplicates.</strong> The relay can publish an event, then crash before marking the outbox row sent, and republish on restart — so consumers must dedupe on the event/idempotency key. Ordering is only guaranteed per-key if you partition by aggregate ID. Exactly-once \"effectively\" = at-least-once delivery + idempotent consumer; the outbox provides the first half, not the second."},
  {"sec":"DSS-TXN","front":"TCC (Try-Confirm-Cancel) / reservation pattern — how does it differ from a plain saga?","back":"TCC splits each step into <strong>Try</strong> (reserve/hold resources without committing the business effect — e.g. earmark inventory, authorize a card), then <strong>Confirm</strong> (apply the held effect) or <strong>Cancel</strong> (release the hold). The reservation acts as a built-in semantic lock, so isolation is better than a raw saga, at the cost of every service exposing three operations and the holds needing TTL/expiry to avoid leaks if a coordinator dies."},
  {"sec":"DSS-TXN","front":"When does TCC's reservation leak, and how do you defend against it?","back":"If the coordinator crashes after <code>Try</code> but before <code>Confirm</code>/<code>Cancel</code>, the resource stays reserved indefinitely (the dual of 2PC's in-doubt block, but non-blocking for <em>other</em> work). Defenses: give every reservation a <strong>TTL</strong> so it auto-cancels, make <code>Cancel</code> idempotent and safe to call even if <code>Try</code> never ran (\"empty/null cancel\"), and guard against <code>Try</code> arriving <em>after</em> a <code>Cancel</code> (\"hanging\" — record the cancel so a late Try is rejected)."},
  {"sec":"DSS-TXN","front":"How do you make a long-running saga durable across coordinator restarts?","back":"Persist the saga's state machine — current step, inputs, and per-step status — to a durable store before each step, so on restart the orchestrator can resume or compensate from where it left off (this is what Temporal/Cadence and AWS Step Functions provide via event-sourced execution history). The log must be the source of truth; combined with idempotent steps, a crashed-then-replayed saga reaches the same terminal state (committed or fully compensated)."}
);

Object.assign(GLOSSARY_DATA, {
  "two-phase-commit": {"term":"Two-Phase Commit (2PC)","group":"DSS-TXN","aliases":["2pc","two-phase commit","two phase commit"],"eli5":"A coordinator asks everyone \"ready?\", and only if all say yes does it tell everyone to commit.","memory":"\"Prepare, then commit\" = ask the room before you announce the decision.","full":"<p>2PC is an atomic-commit protocol across multiple participants, each managing its own datastore. <b>Phase 1 (prepare/vote):</b> the coordinator asks each participant to prepare; the participant durably logs its changes and votes <code>YES</code> (binding — it surrenders the right to unilaterally abort) or <code>NO</code>. <b>Phase 2 (commit/abort):</b> if all voted YES the coordinator durably records and broadcasts commit, otherwise abort; participants apply the decision and ack.</p><p>It gives strong atomicity and isolation but is a <b>blocking</b> protocol: a coordinator failure after votes are cast leaves YES-voters in-doubt, holding locks until recovery. It also serializes on the slowest participant and has multiplicative availability, which is why it scales poorly across many shards.</p>","trap":"Saying 2PC \"guarantees\" the transaction completes. It guarantees atomicity (all-or-nothing) but NOT liveness — a coordinator crash can block participants indefinitely. Atomicity is not availability.","worked":"Coordinator gets YES from shard A and shard B, then crashes before sending commit. A and B both hold their row locks, unable to commit or abort, until the coordinator's log is recovered and replayed.","related":["coordinator-blocking","saga","three-phase-commit"]},
  "coordinator-blocking": {"term":"The Blocking / In-Doubt Problem","group":"DSS-TXN","aliases":["blocking problem","in-doubt","in doubt","coordinator failure","blocking protocol"],"eli5":"After you promise to commit, you're stuck waiting if the boss who decides disappears.","memory":"In-doubt = handcuffed: you said YES, now only the coordinator holds the key.","full":"<p>In 2PC, once a participant votes <code>YES</code> it is <b>in-doubt</b>: the global outcome is now solely the coordinator's to decide, so the participant can neither commit (decision might be abort) nor abort (decision might be commit) on its own. If the coordinator crashes between collecting votes and broadcasting the decision, every in-doubt participant <b>blocks</b>, retaining locks and refusing conflicting work.</p><p>This couples the transaction's progress to the coordinator's availability. Real systems mitigate it by replicating the coordinator's decision via consensus (Raft/Paxos) so the decision survives a single node's death — e.g. Spanner runs 2PC <i>over</i> Paxos groups — or by asking peers (cooperative termination) which still blocks if all relevant nodes are down.</p>","trap":"Claiming 3PC fully solves blocking. It removes it only under fail-stop with reliable timeouts; under a network partition 3PC can split-brain (commit one side, abort the other). The production fix is consensus-replicated state, not 3PC.","related":["two-phase-commit","three-phase-commit"]},
  "saga": {"term":"Saga Pattern","group":"DSS-TXN","aliases":["saga","sagas","saga pattern"],"eli5":"Do a chain of small committed steps, and if one fails, run \"undo\" steps for the ones already done.","memory":"Saga = a story told in committed chapters; a bad ending makes you write apology chapters (compensations), not tear out pages.","full":"<p>A saga replaces one distributed ACID transaction with a sequence of <b>local</b> transactions <code>T1..Tn</code>, each committing independently in its own service. On failure at step <code>Ti</code>, the saga executes <b>compensating</b> transactions <code>Ci-1..C1</code> in reverse to semantically undo prior steps. It is driven by either an orchestrator or event choreography.</p><p>The defining trade is <b>atomicity without isolation</b>: the saga reaches a consistent terminal state (all committed, or all compensated), but because each <code>Ti</code> commits immediately, intermediate state is visible to concurrent transactions. Recovering that lost isolation is the saga designer's main job — via semantic locks, status flags, reordering, and commutative updates.</p>","trap":"Treating a compensation as a rollback. The original step already committed and may have been observed; you must issue a NEW business action that reverses intent (refund), and some effects (a sent email) can't be undone at all.","worked":"Book trip: reserve flight (T1), reserve hotel (T2), charge card (T3). Hotel sold out at T2 → run C1 = cancel flight. The flight reservation was already committed and visible to others between T1 and C1.","related":["compensating-transaction","atomicity-without-isolation","orchestration-vs-choreography","semantic-lock","two-phase-commit"]},
  "compensating-transaction": {"term":"Compensating Transaction","group":"DSS-TXN","aliases":["compensating transaction","compensation","compensating action","compensating actions"],"eli5":"A new business operation that semantically reverses a step that already committed.","memory":"Compensate = apologize and make it right, not pretend it never happened.","full":"<p>A compensating transaction <code>Ci</code> undoes the business effect of an already-committed step <code>Ti</code>. Because <code>Ti</code> is durable and possibly already observed, <code>Ci</code> is not a database rollback but a forward action that negates intent: <code>refund</code> for <code>charge</code>, <code>release</code> for <code>reserve</code>.</p><p>Good compensations are <b>idempotent</b> (a retry won't double-refund) and ideally <b>commutative</b> with the forward action, because in an asynchronous saga a compensation can race ahead of the effect it's meant to cancel. Steps that are impossible to compensate (irreversible side effects) should be ordered <b>last</b> — the \"pivot\" step after which the saga can only roll forward.</p>","trap":"Assuming every step has a clean inverse. Sending an email, firing a webhook, or shipping a package can't be un-done — design these as pivot/last steps or accept a manual remediation path.","related":["saga","idempotency","semantic-lock"]},
  "atomicity-without-isolation": {"term":"Atomicity Without Isolation (ACD)","group":"DSS-TXN","aliases":["atomicity without isolation","acd","lack of isolation","no isolation"],"eli5":"The whole thing either finishes or fully undoes itself, but other people can see the messy middle.","memory":"ACID minus the I — the saga keeps Atomicity but not the velvet rope around its work.","full":"<p>Sagas preserve Atomicity (all-or-compensated), Consistency, and Durability, but sacrifice <b>Isolation</b> — hence sometimes called \"ACD.\" Because each local step commits immediately, a concurrent transaction can read state from a saga that is still in progress (or about to be compensated), producing classic anomalies: dirty reads, lost updates, and non-repeatable reads.</p><p>Countermeasures re-introduce isolation at the application layer: <b>semantic locks</b>/status flags to hide in-flight rows, <b>optimistic versioning</b> to catch lost updates, <b>re-reading at commit</b>, and <b>reordering</b> steps so the most-likely-to-fail run first (less compensation, less time exposed).</p>","trap":"Saying sagas give \"eventual consistency like a normal transaction.\" They give atomicity, but a window of visible inconsistency is fundamental — if your domain can't tolerate dirty intermediate reads, a raw saga is the wrong tool (consider TCC or 2PC).","related":["saga","semantic-lock","compensating-transaction"]},
  "orchestration-vs-choreography": {"term":"Orchestration vs Choreography","group":"DSS-TXN","aliases":["orchestration","choreography","orchestrated saga","choreographed saga"],"eli5":"One conductor telling each player when to go, versus dancers each reacting to the others' moves.","memory":"Orchestra has a conductor; a choreography has none — the dancers just know the steps.","full":"<p>Two ways to coordinate a saga. <b>Orchestration</b>: a central orchestrator holds the workflow, invoking each service and triggering compensations on failure. It centralizes the logic — easy to observe, test, and reason about — but the orchestrator is a coupling point and must itself be made durable. <b>Choreography</b>: each service emits events and others react; there is no central controller.</p><p>Choreography is loosely coupled and avoids a coordinator bottleneck, but the end-to-end flow is emergent and hard to trace, prone to cyclic event chains and \"who handles the compensation?\" ambiguity. Heuristic: orchestrate complex, long-lived, or many-step flows (often with a durable engine like Temporal/Step Functions); choreograph simple, few-step, event-native ones.</p>","trap":"Believing choreography is \"more decoupled therefore always better.\" Decoupling moves complexity into emergent behavior — debugging a 6-service event cascade with no central log is often harder than maintaining one orchestrator.","related":["saga","compensating-transaction"]},
  "semantic-lock": {"term":"Semantic Lock","group":"DSS-TXN","aliases":["semantic lock","semantic locks","countermeasure","status flag"],"eli5":"A status flag that says \"this is in-flight, don't touch it yet.\"","memory":"A semantic lock is a \"WET PAINT\" sign — not a physical barrier, just a flag everyone agrees to respect.","full":"<p>Since sagas lack isolation, a semantic lock is an application-level signal on a record indicating it is part of an in-progress saga — typically a status field like <code>PENDING</code>, <code>HELD</code>, or <code>RESERVED</code>. Concurrent transactions inspect the flag and refuse or defer conflicting actions, recreating the effect of a lock without a real transactional one.</p><p>The committing step clears the flag (e.g. <code>PENDING → CONFIRMED</code>); the compensating step clears it the other way (<code>PENDING → CANCELLED</code>). This is the saga analogue of a real lock and the foundation of the TCC reservation. The cost: every reader must be flag-aware, and you need timeouts so a dead coordinator doesn't leave records locked forever.</p>","trap":"Forgetting that consumers must opt in. A semantic lock only works if EVERY reader checks the flag; one path that ignores it reintroduces the dirty read you were preventing.","related":["saga","atomicity-without-isolation","try-confirm-cancel"]},
  "try-confirm-cancel": {"term":"TCC (Try-Confirm-Cancel)","group":"DSS-TXN","aliases":["tcc","try-confirm-cancel","try confirm cancel","reservation pattern","reservation"],"eli5":"First reserve resources without really committing, then either confirm the reservation or release it.","memory":"TCC = put a hold on your hotel card: Try (authorize), Confirm (charge), Cancel (release the hold).","full":"<p>TCC structures each participant as three operations. <b>Try</b> reserves/holds resources and validates, without making the business effect final (earmark stock, authorize a card). <b>Confirm</b> commits the held effect using only the reserved resources; <b>Cancel</b> releases the hold. A coordinator runs Try across all participants, then Confirms all (if every Try succeeded) or Cancels all.</p><p>The reservation is a built-in <b>semantic lock</b>, so TCC has better isolation than a raw saga, while remaining non-blocking for unrelated work (unlike 2PC). Costs: every service must expose three idempotent operations, and reservations need a <b>TTL</b> plus \"empty cancel\" (Cancel with no prior Try) and \"hanging try\" (Try after Cancel) handling so a dead coordinator can't leak a hold forever.</p>","trap":"Thinking TCC is just 2PC renamed. 2PC holds DB locks and blocks in-doubt; TCC holds an application-level RESERVATION with a TTL — other transactions and resources stay available, and a lost coordinator leaks a hold (auto-expiring) rather than freezing the participant.","related":["saga","semantic-lock","idempotency","two-phase-commit"]},
  "three-phase-commit": {"term":"Three-Phase Commit (3PC)","group":"DSS-TXN","aliases":["3pc","three-phase commit","three phase commit","pre-commit"],"eli5":"2PC plus an extra \"get ready to commit\" step so nodes can finish on their own if the coordinator dies.","memory":"3PC = \"on your marks (vote), get set (pre-commit), go (commit)\" — the extra cue lets runners start even if the starter faints.","full":"<p>3PC inserts a <b>pre-commit</b> phase between vote and commit. After collecting YES votes, the coordinator broadcasts <code>pre-commit</code>; participants ack, and only then does it send the final commit. The extra phase ensures every participant knows the decision is going to be commit before anyone actually commits, so survivors can use timeouts to reach the same decision without the coordinator — making 3PC <b>non-blocking under fail-stop</b>.</p><p>The catch: 3PC relies on bounded message delay and synchronized timeouts, and it is <b>not safe under network partitions</b> — a partition can drive one group to commit while another aborts (split-brain). That's why production systems skip 3PC and instead make the commit decision itself fault-tolerant via consensus (Paxos/Raft).</p>","trap":"Offering 3PC as the answer to \"how do you fix 2PC blocking?\" in a real system. The accepted answer is consensus-replicated commit state (Raft/Paxos), because 3PC breaks under partitions — the exact failure mode you care about.","related":["two-phase-commit","coordinator-blocking"]}
});

</script>
