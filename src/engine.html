/* ============================================================================
   VELOCITY — evidence-based rapid-recall arcade (retrieval practice + SRS).
   Grounded in the deep-research brief: competitive SAME-TOPIC distractors (the #1
   lever for transfer), a gentle speed bonus that NEVER gates correctness, every
   miss instantly shows the answer (halves misinformation uptake), difficulty +
   timer adapt to each card's SRS mastery, the queue rides the SM-2/Leitner
   scheduler (spaced; missed cards re-queued, never re-shown back-to-back), and a
   Zen mode drops the timer/lives for pure retrieval practice.
   ============================================================================ */
let velo=null, veloTimer=null;
const VELO_BASE=100, VELO_SPEED_MAX=60, VELO_HEARTS=3;

function veloPool(scope){
  if(scope==='weak'){ const st=srsLoad(), now=Date.now();
    const due=CARDS.filter(c=>{ const s=st[cardId(c)]; return s && s.due<=now; });
    return due.length>=10 ? due : CARDS; }                       // fall back if too few due
  if(scope && scope.slice(0,5)==='deck:'){ const d=DECKS.find(x=>x.id===scope.slice(5)); const ts=new Set(d?(d.topics||[]):[]);
    return CARDS.filter(c=>ts.has(c.sec)); }
  return CARDS;
}
function veloBox(c){ const s=srsLoad()[cardId(c)]; return s?s.box:0; }            // 0..6 mastery
function veloBudget(q){ if(velo&&velo.zen) return Infinity; return Math.max(6, Math.min(16, Math.round(4 + (q.prompt.length/18) + (6-q.box)))); }
function veloBuildQueue(pool){ const st=srsLoad(), now=Date.now(), due=[], rest=[];
  pool.forEach(c=>{ const s=st[cardId(c)]; if(s&&s.due<=now) due.push({c,d:s.due}); else rest.push(c); });
  due.sort((a,b)=>a.d-b.d);
  return due.map(x=>x.c).concat(shuffle(rest)); }                // due-first, then shuffled rest (spacing rides SRS)
// distractors: prefer SAME TOPIC (most confusable) -> same deck -> global, each tier shuffled
function veloDistractors(correct, sec, n){
  const deck=TOPIC2DECK[sec], dt=deck?new Set(deck.topics||[]):new Set();
  const t1=[],t2=[],t3=[], seen=new Set([correct.toLowerCase()]);
  for(const x of CARDS){ const f=x.front, k=f.toLowerCase(); if(seen.has(k)) continue; seen.add(k);
    if(x.sec===sec) t1.push(f); else if(dt.has(x.sec)) t2.push(f); else t3.push(f); }
  return shuffle(t1).concat(shuffle(t2)).concat(shuffle(t3)).slice(0,n);
}
function veloQuestion(c){
  const correct=c.front, box=veloBox(c), nOpts = box>=4?4 : box>=2?3 : 2;   // adaptive: harder when mastered
  const options=shuffle([correct].concat(veloDistractors(correct,c.sec,nOpts-1)));
  let sent=firstSentence(stripHtml(c.back));
  try{ const r=new RegExp(stripHtml(correct).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'); sent=sent.replace(r,'_____'); }catch(e){}
  return { card:c, prompt:sent, options, answer:correct, box };
}

/* ---- Velocity visuals: rocket, starfield + dopamine juice ---- */
const VELO_ROCKET_SVG='<svg viewBox="0 0 40 70" width="34" height="60" aria-hidden="true">'
  +'<defs><linearGradient id="vrbody" x1="0" x2="1"><stop offset="0" stop-color="#aebfdd"/><stop offset=".5" stop-color="#eef3fb"/><stop offset="1" stop-color="#aebfdd"/></linearGradient></defs>'
  +'<path d="M9 41 L1 56 L9 50 Z" fill="#d56f7a"/><path d="M31 41 L39 56 L31 50 Z" fill="#d56f7a"/>'
  +'<path d="M20 2 C29 11 31 24 31 36 L31 50 L9 50 L9 36 C9 24 11 11 20 2 Z" fill="url(#vrbody)" stroke="#7c8cae" stroke-width="1"/>'
  +'<circle cx="20" cy="26" r="6.5" fill="#5b9dff" stroke="#22304e" stroke-width="1.6"/><circle cx="18" cy="24" r="2" fill="#cfe6ff"/>'
  +'<path d="M13.5 50 L26.5 50 L24 57 L16 57 Z" fill="#8d9bbd"/></svg>';
function veloAltitude(s){ return -(Math.min(s,10)/10)*58; }
function veloStarfield(el){ if(!el) return; let h='';
  for(let i=0;i<26;i++){ const x=(Math.random()*100).toFixed(1), sz=(Math.random()*1.6+0.6).toFixed(1), dur=(Math.random()*5+4).toFixed(1), delay=(-Math.random()*9).toFixed(1), op=(Math.random()*0.5+0.25).toFixed(2);
    h+='<i class="velo-star" style="left:'+x+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+op+';animation-duration:'+dur+'s;animation-delay:'+delay+'s"></i>'; }
  el.innerHTML=h; }
function veloRocketCenter(sky){ const r=document.getElementById('veloRocket'); if(!r||!sky) return {x:50,y:62}; const sr=sky.getBoundingClientRect(), rr=r.getBoundingClientRect();
  return { x:(rr.left+rr.width/2-sr.left)/sr.width*100, y:(rr.top+rr.height/2-sr.top)/sr.height*100 }; }
function veloBurst(sky){ if(!sky) return; const c=veloRocketCenter(sky), cols=['#ffd166','#5b9dff','#46d39a','#ff7a45','#ffffff'];
  for(let i=0;i<13;i++){ const p=document.createElement('i'); p.className='velo-particle'; const a=Math.random()*Math.PI*2, d=18+Math.random()*42;
    p.style.setProperty('--tx',(Math.cos(a)*d).toFixed(0)+'px'); p.style.setProperty('--ty',(Math.sin(a)*d).toFixed(0)+'px');
    p.style.left=c.x+'%'; p.style.top=c.y+'%'; p.style.background=cols[i%cols.length]; sky.appendChild(p); setTimeout(()=>p.remove(),650); } }
function veloStreakLines(sky){ if(!sky) return; for(let i=0;i<7;i++){ const l=document.createElement('i'); l.className='velo-streakline';
  l.style.left=(8+Math.random()*84).toFixed(0)+'%'; l.style.animationDelay=(Math.random()*0.09).toFixed(2)+'s'; sky.appendChild(l); setTimeout(()=>l.remove(),520); } }
function veloFloatTxt(sky, txt){ if(!sky) return; const c=veloRocketCenter(sky); const f=document.createElement('div'); f.className='velo-float'; f.textContent=txt;
  f.style.left=c.x+'%'; f.style.top=(c.y-6)+'%'; sky.appendChild(f); setTimeout(()=>f.remove(),900); }
function veloMilestone(sky, s){ if(!sky) return; const m=document.createElement('div'); m.className='velo-milestone';
  m.textContent = s>=10?'🚀 ORBIT! '+s+' streak':'⚡ BOOST · '+s+' streak'; sky.appendChild(m); setTimeout(()=>m.remove(),1200); }

function renderVelocity(v){
  if(veloTimer){ clearInterval(veloTimer); veloTimer=null; }
  if(!velo){                                                     // ---- landing ----
    const decksWithCards = DECKS.filter(d=>(d.topics||[]).some(t=>CARDS.some(c=>c.sec===t)));
    const due = srsDueCount();
    v.innerHTML='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
      +'<div class="qtext">Velocity ⚡</div>'
      +'<p class="rv-sub">Read the definition, tap the concept. Fast + right builds a streak; every miss teaches. It rides your spaced-repetition queue — so playing is real review.</p>'
      +'<div class="velo-scope">'
      +  '<button class="btn velo-scope-btn on" data-scope="weak">Weak spots'+(due>0?' · '+due+' due':'')+'</button>'
      +  '<button class="btn velo-scope-btn" data-scope="all">All decks · '+CARDS.length+'</button>'
      +'</div>'
      +'<select id="veloDeck" class="bp-select"><option value="">— or drill one deck —</option>'
      +  decksWithCards.map(d=>'<option value="deck:'+d.id+'">'+d.name+' ('+CARDS.filter(c=>(d.topics||[]).indexOf(c.sec)>=0).length+')</option>').join('')
      +'</select>'
      +'<label class="velo-zen"><input type="checkbox" id="veloZen"> Zen mode — no timer, no lives (pure practice)</label>'
      +'<button class="btn primary" id="veloStart">Start ⚡</button>'
      +'</div></div>';
    let scope='weak';
    const btns=[].slice.call(v.querySelectorAll('.velo-scope-btn'));
    btns.forEach(b=> b.onclick=()=>{ btns.forEach(x=>x.classList.remove('on')); b.classList.add('on'); scope=b.dataset.scope; v.querySelector('#veloDeck').value=''; });
    v.querySelector('#veloDeck').onchange=e=>{ if(e.target.value){ scope=e.target.value; btns.forEach(x=>x.classList.remove('on')); } else { scope='weak'; btns[0].classList.add('on'); } };
    v.querySelector('#veloStart').onclick=()=>{
      const zen=v.querySelector('#veloZen').checked;
      const queue=veloBuildQueue(veloPool(scope));
      if(!queue.length) return;
      velo={ scope, zen, queue, pos:0, score:0, streak:0, best:0, hearts: zen?Infinity:VELO_HEARTS, correct:0, answered:0, missed:0, q:null, locked:false, over:false };
      renderVelocity(v);
    };
    return;
  }
  if(velo.over || velo.pos>=velo.queue.length) return renderVeloDone(v);
  const c=velo.queue[velo.pos];
  const q=(velo.q && velo.q.card===c) ? velo.q : (velo.q=veloQuestion(c));
  const budget=veloBudget(q);
  velo.locked=false;
  const heartsHtml = velo.zen ? '<span class="velo-zen-tag">zen</span>'
    : '<span class="hh">'+'♥'.repeat(Math.max(0,velo.hearts))+'</span><span class="hh-off">'+'♥'.repeat(Math.max(0,VELO_HEARTS-velo.hearts))+'</span>';
  v.innerHTML='<div class="velo-wrap">'
    +'<div class="velo-hud"><span class="velo-score" id="veloScore">'+velo.score+'</span>'
    +  '<span class="velo-streak'+(velo.streak>=3?' hot':'')+'">'+(velo.streak>0?'🔥 '+velo.streak:'')+'</span>'
    +  '<span class="velo-hearts">'+heartsHtml+'</span></div>'
    +'<div class="velo-sky" id="veloSky"><div class="velo-stars" id="veloStars"></div><div class="velo-flash"></div>'
    +  '<div class="velo-rocket" id="veloRocket" style="transform:translateY('+veloAltitude(velo.streak)+'px)"><div class="velo-rocket-inner" id="veloRocketInner">'+VELO_ROCKET_SVG+'<div class="velo-flame"></div></div></div>'
    +'</div>'
    +(velo.zen?'':'<div class="velo-timebar"><div class="velo-timefill" id="veloTime"></div></div>')
    +'<div class="velo-prompt">'+q.prompt+'</div>'
    +'<div class="velo-tiles" id="veloTiles">'
    +  q.options.map((o,i)=>'<button class="velo-tile" data-i="'+i+'"><span class="velo-key">'+(i+1)+'</span>'+o+'</button>').join('')
    +'</div>'
    +'<div class="velo-feedback" id="veloFb"></div>'
    +'<div style="text-align:center;margin-top:10px"><button class="btn" id="veloQuit">End game</button></div>'
    +'</div>';
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([v]).catch(()=>{});
  v.querySelectorAll('.velo-tile').forEach(b=> b.onclick=()=> veloAnswer(+b.dataset.i, v, q, budget));
  veloStarfield(document.getElementById('veloStars'));
  v.querySelector('#veloQuit').onclick=()=>{ velo.over=true; renderVelocity(v); };
  if(!velo.zen){
    const deadline=Date.now()+budget*1000; q._deadline=deadline;
    veloTimer=setInterval(()=>{
      if(mode!=='velocity'){ clearInterval(veloTimer); veloTimer=null; return; }
      if(!velo || velo.locked) return;
      const rem=(deadline-Date.now())/1000, frac=Math.max(0,rem/budget);
      const el=document.getElementById('veloTime'); if(el){ el.style.width=(frac*100)+'%'; el.style.background = frac<0.25?'var(--bad)':frac<0.5?'var(--warn)':'var(--good)'; }
      if(rem<=0) veloAnswer(-1, v, q, budget);
    },50);
  }
}

function veloAnswer(idx, v, q, budget){
  if(!velo || velo.locked) return; velo.locked=true;
  if(veloTimer){ clearInterval(veloTimer); veloTimer=null; }
  velo.answered++;
  const tiles=v.querySelectorAll('.velo-tile');
  const correctIdx=q.options.indexOf(q.answer);
  const isCorrect = idx>=0 && q.options[idx]===q.answer;
  tiles.forEach((t,i)=>{ t.disabled=true; if(i===correctIdx) t.classList.add('correct'); else if(i===idx) t.classList.add('wrong'); });
  const fb=document.getElementById('veloFb');
  if(isCorrect){
    const rem = velo.zen?0 : Math.max(0,(q._deadline-Date.now())/1000);
    const frac = (velo.zen||!budget||budget===Infinity)?0 : Math.max(0,Math.min(1,rem/budget));
    velo.streak++; velo.best=Math.max(velo.best,velo.streak);
    const mult = 1 + Math.min(velo.streak-1,9)*0.1;             // gentle streak multiplier, accuracy-led
    const speed = Math.round(VELO_SPEED_MAX*frac);              // small speed bonus ON TOP of correctness
    const pts = Math.round((VELO_BASE+speed)*mult);
    velo.score+=pts; velo.correct++;
    srsGrade(q.card,'good'); updateDueBadge();                  // successful retrieval -> advance in SRS
    if(fb) fb.innerHTML='<div class="velo-fb-ok">✓ +'+pts+(speed>0?'  <span class="velo-spd">SPEEDY +'+speed+'</span>':'')+(mult>1?'  <span class="velo-mult">×'+mult.toFixed(1)+'</span>':'')+'</div>';
    const sky=document.getElementById('veloSky'), inner=document.getElementById('veloRocketInner'), rk=document.getElementById('veloRocket');
    if(rk) rk.style.transform='translateY('+veloAltitude(velo.streak)+'px)';           // climb with streak
    if(inner){ inner.classList.add('boost'); }
    if(sky){ veloStreakLines(sky); veloBurst(sky); veloFloatTxt(sky,'+'+pts); }
    const sc=document.getElementById('veloScore'); if(sc){ sc.textContent=velo.score; sc.classList.remove('pop'); void sc.offsetWidth; sc.classList.add('pop'); }
    if(sky && (velo.streak===5||velo.streak===10||velo.streak===15||velo.streak===20)) veloMilestone(sky, velo.streak);
    setTimeout(()=>{ velo.pos++; renderVelocity(v); }, 750);
  } else {
    velo.streak=0; if(!velo.zen) velo.hearts--; velo.missed++;
    srsGrade(q.card,'again'); updateDueBadge();                 // miss -> reset + resurfaces soon
    const at=Math.min(velo.queue.length, velo.pos+6); velo.queue.splice(at,0,q.card);  // re-queue (continued testing)
    const why=firstSentence(stripHtml(q.card.back));
    if(fb) fb.innerHTML='<div class="velo-fb-no">'+(idx<0?'⏱ Time — ':'✗ ')+'Answer: <b>'+q.answer+'</b><div class="velo-why">'+why+'</div></div>';
    const skyN=document.getElementById('veloSky'), innerN=document.getElementById('veloRocketInner'), rkN=document.getElementById('veloRocket');
    if(rkN) rkN.style.transform='translateY(0px)';                                     // streak broke -> fall back to ground
    if(innerN) innerN.classList.add('stall');
    if(skyN){ skyN.classList.add('flash'); setTimeout(function(){ if(skyN) skyN.classList.remove('flash'); },420); }
    const over = !velo.zen && velo.hearts<=0;
    setTimeout(()=>{ velo.pos++; if(over) velo.over=true; renderVelocity(v); }, 1900);
  }
}

function renderVeloDone(v){
  if(veloTimer){ clearInterval(veloTimer); veloTimer=null; }
  const acc = velo.answered? Math.round(velo.correct/velo.answered*100):0;
  const reason = (!velo.zen && velo.hearts<=0) ? 'Out of lives' : 'Round complete';
  v.innerHTML='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
    +'<div class="qtext">'+reason+'</div>'
    +'<div style="font-size:46px;font-weight:800;color:var(--accent)">'+velo.score+'</div>'
    +'<div class="readout" style="text-align:left;margin-top:14px">'
    +  '<div class="ro"><div class="k">Accuracy</div><div class="v">'+acc+'% · '+velo.correct+'/'+velo.answered+'</div></div>'
    +  '<div class="ro"><div class="k">Best streak</div><div class="v">🔥 '+velo.best+'</div></div>'
    +  '<div class="ro"><div class="k">Concepts advanced</div><div class="v" style="color:var(--good)">'+velo.correct+'</div></div>'
    +  '<div class="ro"><div class="k">Re-queued to review</div><div class="v" style="color:#ff9f43">'+velo.missed+'</div></div>'
    +'</div>'
    +'<p class="rv-sub" style="margin-top:14px">Every answer fed your spaced-repetition schedule — misses come back sooner, hits get spaced out. Real progress, not just points.</p>'
    +'<div class="nav-row"><button class="btn" id="veloAgain">Play again</button><button class="btn primary" id="veloReview">Go to Review</button></div>'
    +'</div></div>';
  v.querySelector('#veloAgain').onclick=()=>{ velo=null; renderVelocity(v); };
  v.querySelector('#veloReview').onclick=()=>{ velo=null; setMode('review'); };
}

/* Study / Quiz / Exam keyboard (Review keeps its own handler above; mutually mode-gated). */
document.addEventListener('keydown', e=>{
  if(e.target && /INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;   // don't fire while typing/selecting
  if(document.activeElement===searchBox) return;
  if(drawer.classList.contains('show')) return;                           // term modal open -> Escape owns the keys
  const v=document.getElementById('view');
  if(mode==='study'){
    if(!studyCards().length) return;
    if(e.key===' '||e.key==='f'){ e.preventDefault(); const b=document.getElementById('flip'); if(b) b.click(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); const b=document.getElementById('next'); if(b) b.click(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); const b=document.getElementById('prev'); if(b) b.click(); }
  } else if(mode==='test'){
    if(/^[1-4]$/.test(e.key)){ if(quizAnswered) return; const b=v.querySelector('.choice[data-i="'+(+e.key-1)+'"]'); if(b){ e.preventDefault(); b.click(); } }
    else if(e.key==='Enter'){ const qn=document.getElementById('qnext'); if(qn && qn.style.display!=='none'){ e.preventDefault(); qn.click(); } }
  } else if(mode==='exam' && examState && examState.pos<examState.qs.length){
    if(/^[1-4]$/.test(e.key)){ const b=v.querySelector('.choice[data-i="'+(+e.key-1)+'"]'); if(b){ e.preventDefault(); b.click(); } }
    else if(e.key==='Enter'){ const nx=document.getElementById('examNext'); if(nx && !nx.disabled){ e.preventDefault(); nx.click(); } }
    else if(e.key==='s'||e.key==='S'){ e.preventDefault(); const b=document.getElementById('examSkip'); if(b) b.click(); }
  } else if(mode==='velocity' && velo && !velo.over && !velo.locked){
    if(/^[1-4]$/.test(e.key)){ const b=v.querySelector('.velo-tile[data-i="'+(+e.key-1)+'"]'); if(b && !b.disabled){ e.preventDefault(); b.click(); } }
  }
});

function boot(){
  Object.assign(SECTIONS, SECTIONS_DATA);
  CARDS.push(...CARDS_DATA);
  Object.assign(GLOSSARY, GLOSSARY_DATA);
  // merge enhancement layer (equations, multi-examples, acronym expansions) into existing concepts
  if(typeof ENHANCE !== 'undefined'){ for(const id in ENHANCE){ if(GLOSSARY[id]) Object.assign(GLOSSARY[id], ENHANCE[id]); else GLOSSARY[id]=ENHANCE[id]; } }
  QUIZ.push(...QUIZ_DATA);
  if(typeof DECKS_DATA!=='undefined') DECKS.push(...DECKS_DATA);
  DECKS.forEach(d=>{ (d.topics||[]).forEach(t=>{ TOPIC2DECK[t]=d; }); });
  buildBlueprints();
  buildAlias();
  buildSearchIndex();
  updateDueBadge();
  render();
}
function buildSearchIndex(){ _searchIdx = Object.keys(GLOSSARY).map(id=>{ const g=GLOSSARY[id]; return {id, hay:(g.term+' '+(g.aliases||[]).join(' ')+' '+(g.eli5||'')).toLowerCase()}; }); }
